*.","ko":"우리는 해안을 따라 운전했다."}]},{"id":"vocab-0514","word":"coat","ipa":"/koʊt/","kr":"**코트**","mark":"*","pos":"명","mean":"① 외투 ② 코트","ex":[{"en":"Put on your **coat** before you go outside.","ko":"밖에 나가기 전에 외투를 입어라."},{"en":"James wore a long winter **coat**.","ko":"제임스는 긴 겨울 코트를 입었다."}]},{"id":"vocab-0515","word":"code","ipa":"/koʊd/","kr":"**코드**","mark":"**","pos":"명","mean":"① 암호 ② 규칙 ③ 코드","ex":[{"en":"You need a **code** to open the door.","ko":"문을 열려면 암호가 필요하다."},{"en":"Every employee must follow the **code** of conduct.","ko":"모든 직원은 행동 규칙을 따라야 한다."},{"en":"The developer reviewed the **code**.","ko":"그 개발자는 코드를 검토했다."}]},{"id":"vocab-0516","word":"coffee","ipa":"/ˈkɔːfi/","kr":"**코ː**피","mark":"*","pos":"명","mean":"커피","ex":[{"en":"Grace drinks **coffee** every morning.","ko":"그레이스는 매일 아침 커피를 마신다."}]},{"id":"vocab-0517","word":"coin","ipa":"/kɔɪn/","kr":"**코인**","mark":"**","pos":"명","mean":"동전","ex":[{"en":"Ryan found a **coin** on the street.","ko":"라이언은 길에서 동전 하나를 발견했다."}]},{"id":"vocab-0518","word":"coincide","ipa":"/ˌkoʊɪnˈsaɪd/","kr":"코인**사이드**","mark":"","pos":"동","mean":"① 동시에 일어나다 ② 일치하다","ex":[{"en":"The two system failures **coincided**.","ko":"두 시스템 장애가 동시에 일어났다."},{"en":"The numbers **coincide** with our records.","ko":"그 숫자들은 우리의 기록과 일치한다."}]},{"id":"vocab-0519","word":"cold","ipa":"/koʊld/","kr":"**콜드**","mark":"*","pos":"형/명","mean":"① 추운 ② 차가운 ③ 감기","ex":[{"en":"It is **cold** in the server room.","ko":"서버실은 춥다."},{"en":"Please bring me a **cold** drink.","ko":"차가운 음료를 가져다 주세요."},{"en":"I caught a **cold** last week.","ko":"나는 지난주에 감기에 걸렸다."}]},{"id":"vocab-0520","word":"collaborate","ipa":"/kəˈlæbəreɪt/","kr":"컬**래**버레이트","mark":"","pos":"동","mean":"① 협력하다 ② 공동 작업하다","ex":[{"en":"The two artists **collaborated** on the project.","ko":"두 예술가는 그 프로젝트에서 협력했다."},{"en":"HR **collaborated** with IT to improve onboarding.","ko":"HR은 온보딩을 개선하기 위해 IT와 공동 작업했다."}]},{"id":"vocab-0521","word":"collapse","ipa":"/kəˈlæps/","kr":"컬**랩스**","mark":"","pos":"동/명","mean":"① 붕괴하다 ② 무너짐","ex":[{"en":"The old roof may **collapse**.","ko":"그 낡은 지붕은 붕괴할 수 있다."},{"en":"The sudden **collapse** blocked the road.","ko":"갑작스러운 무너짐이 길을 막았다."}]},{"id":"vocab-0522","word":"collar","ipa":"/ˈkɑːlər/","kr":"**칼**러","mark":"","pos":"명","mean":"① 옷깃 ② 목걸이","ex":[{"en":"His shirt **collar** was too tight.","ko":"그의 셔츠 옷깃은 너무 꽉 끼었다."},{"en":"The dog wore a red **collar**.","ko":"그 개는 빨간 목걸이를 하고 있었다."}]},{"id":"vocab-0523","word":"colleague","ipa":"/ˈkɑːliːɡ/","kr":"**칼**리ː그","mark":"","pos":"명","mean":"동료","ex":[{"en":"I had lunch with a **colleague**.","ko":"나는 동료와 점심을 먹었다."}]},{"id":"vocab-0524","word":"collect","ipa":"/kəˈlekt/","kr":"컬**렉트**","mark":"*","pos":"동","mean":"① 모으다 ② 수집하다","ex":[{"en":"Please **collect** the signed forms.","ko":"서명된 양식들을 모아 주세요."},{"en":"She **collects** old stamps.","ko":"그녀는 오래된 우표를 수집한다."}]},{"id":"vocab-0525","word":"college","ipa":"/ˈkɑːlɪdʒ/","kr":"**칼**리지","mark":"*","pos":"명","mean":"대학","ex":[{"en":"Jun plans to go to **college** next year.","ko":"준은 내년에 대학에 갈 계획이다."}]},{"id":"vocab-0526","word":"colony","ipa":"/ˈkɑːləni/","kr":"**칼**러니","mark":"","pos":"명","mean":"① 식민지 ② 군락","ex":[{"en":"The island was once a British **colony**.","ko":"그 섬은 한때 영국의 식민지였다."},{"en":"A large **colony** of ants lived under the tree.","ko":"큰 개미 군락이 나무 아래에 살았다."}]},{"id":"vocab-0527","word":"color / colour","ipa":"/ˈkʌlər/","kr":"**컬**러","mark":"*","pos":"명/동","mean":"① 색 ② 색칠하다","ex":[{"en":"What **color** is your bag?","ko":"네 가방은 무슨 색이니?"},{"en":"The children **colored** the map blue.","ko":"아이들은 지도를 파랗게 색칠했다."}]},{"id":"vocab-0528","word":"column","ipa":"/ˈkɑːləm/","kr":"**칼**럼","mark":"","pos":"명","mean":"① 기둥 ② 칼럼","ex":[{"en":"The building has tall **columns**.","ko":"그 건물은 높은 기둥들을 가지고 있다."},{"en":"Claire writes a weekly **column** for the newspaper.","ko":"클레어는 신문에 주간 칼럼을 쓴다."}]},{"id":"vocab-0529","word":"combat","ipa":"/ˈkɑːmbæt/","kr":"**캄**뱃","mark":"","pos":"명/동","mean":"① 전투 ② 싸우다","ex":[{"en":"Soldiers trained for **combat**.","ko":"군인들은 전투를 위해 훈련했다."},{"en":"We need new tools to **combat** cyber attacks.","ko":"우리는 사이버 공격과 싸울 새 도구가 필요하다."}]},{"id":"vocab-0530","word":"combine","ipa":"/kəmˈbaɪn/","kr":"컴**바인**","mark":"**","pos":"동","mean":"① 결합하다 ② 합치다","ex":[{"en":"The internal system **combines** speed with security.","ko":"내부 시스템은 속도와 보안을 결합한다."},{"en":"**Combine** the flour and water in a bowl.","ko":"그릇에서 밀가루와 물을 섞으세요."}]},{"id":"vocab-0531","word":"come","ipa":"/kʌm/","kr":"**컴**","mark":"*","pos":"동","mean":"오다","ex":[{"en":"Please **come** to the meeting room.","ko":"회의실로 와 주세요."}]},{"id":"vocab-0532","word":"comedy","ipa":"/ˈkɑːmədi/","kr":"**카**머디","mark":"**","pos":"명","mean":"① 희극 ② 코미디","ex":[{"en":"The school performed a short **comedy**.","ko":"그 학교는 짧은 희극을 공연했다."},{"en":"We watched a funny **comedy** after dinner.","ko":"우리는 저녁 식사 후 재미있는 코미디를 봤다."}]},{"id":"vocab-0533","word":"comfort (comfortable)","ipa":"/ˈkʌmfərt/","kr":"**컴**퍼트","mark":"**","pos":"명/동","mean":"① 편안함 ② 위로하다","ex":[{"en":"A quiet office gives me **comfort**.","ko":"조용한 사무실은 나에게 편안함을 준다."},{"en":"Her words gave me **comfort**.","ko":"그녀의 말은 나에게 위로가 되었다."}]},{"id":"vocab-0534","word":"comic","ipa":"/ˈkɑːmɪk/","kr":"**카**믹","mark":"*","pos":"형/명","mean":"① 웃기는 ② 만화","ex":[{"en":"The actor played a **comic** role.","ko":"그 배우는 웃기는 역할을 맡았다."},{"en":"Daniel reads a **comic** after dinner.","ko":"다니엘은 저녁 식사 후에 만화책을 읽는다."}]},{"id":"vocab-0535","word":"command","ipa":"/kəˈmænd/","kr":"커**맨드**","mark":"**","pos":"명/동","mean":"① 명령 ② 명령하다","ex":[{"en":"The general gave a **command**.","ko":"장군이 명령을 내렸다."},{"en":"The officer **commanded** the team to wait.","ko":"그 장교는 팀에게 기다리라고 명령했다."}]},{"id":"vocab-0536","word":"comment","ipa":"/ˈkɑːment/","kr":"**카**멘트","mark":"**","pos":"명/동","mean":"① 논평 ② 언급하다","ex":[{"en":"Nora made a helpful **comment**.","ko":"노라는 도움이 되는 논평을 했다."},{"en":"He **commented** on the new policy.","ko":"그는 새 정책에 대해 언급했다."}]},{"id":"vocab-0537","word":"commerce","ipa":"/ˈkɑːmɜːrs/","kr":"**카**머스","mark":"**","pos":"명","mean":"① 상업 ② 무역","ex":[{"en":"The river was important for **commerce**.","ko":"그 강은 상업에 중요했다."},{"en":"The port is important for international **commerce**.","ko":"그 항구는 국제 무역에 중요하다."}]},{"id":"vocab-0538","word":"commit (commission)","ipa":"/kəˈmɪt/","kr":"커**밋**","mark":"","pos":"동","mean":"① 저지르다 ② 전념하다","ex":[{"en":"He **committed** a serious error.","ko":"그는 심각한 오류를 저질렀다."},{"en":"He **committed** himself to the project.","ko":"그는 그 프로젝트에 전념했다."}]},{"id":"vocab-0539","word":"committee","ipa":"/kəˈmɪti/","kr":"커**미**티","mark":"**","pos":"명","mean":"위원회","ex":[{"en":"The **committee** will meet on Friday.","ko":"위원회는 금요일에 회의를 열 것이다."}]},{"id":"vocab-0540","word":"commodity","ipa":"/kəˈmɑːdəti/","kr":"커**마**더티","mark":"","pos":"명","mean":"① 상품 ② 물품","ex":[{"en":"Rice is an important **commodity**.","ko":"쌀은 중요한 상품이다."},{"en":"Basic **commodities** arrived by truck.","ko":"기본 물품들이 트럭으로 도착했다."}]},{"id":"vocab-0541","word":"common","ipa":"/ˈkɑːmən/","kr":"**카**먼","mark":"**","pos":"형","mean":"① 흔한 ② 공통의","ex":[{"en":"This is a **common** mistake.","ko":"이것은 흔한 실수다."},{"en":"The two teams have a **common** goal.","ko":"그 두 팀은 공통의 목표가 있다."}]},{"id":"vocab-0542","word":"communicate (communication)","ipa":"/kəˈmjuːnɪkeɪt/","kr":"커**뮤ː**니케이트","mark":"**","pos":"동","mean":"① 의사소통하다 ② 전달하다","ex":[{"en":"We **communicate** by email.","ko":"우리는 이메일로 의사소통한다."},{"en":"Please **communicate** the change to all staff.","ko":"변경 사항을 모든 직원에게 전달해 주세요."}]},{"id":"vocab-0543","word":"communist","ipa":"/ˈkɑːmjunɪst/","kr":"**카**뮤니스트","mark":"","pos":"명/형","mean":"① 공산주의자 ② 공산주의의","ex":[{"en":"Alex was a committed **communist**.","ko":"알렉스는 확고한 공산주의자였다."},{"en":"Minho wrote about the **communist** movement.","ko":"민호는 공산주의 운동에 관해 썼다."}]},{"id":"vocab-0544","word":"community","ipa":"/kəˈmjuːnəti/","kr":"커**뮤ː**너티","mark":"**","pos":"명","mean":"① 지역사회 ② 공동체","ex":[{"en":"The whole **community** helped the family.","ko":"지역 사회 전체가 그 가족을 도왔다."},{"en":"The volunteers formed a strong **community**.","ko":"자원봉사자들은 강한 공동체를 만들었다."}]},{"id":"vocab-0545","word":"companion","ipa":"/kəmˈpæniən/","kr":"컴**패**니언","mark":"","pos":"명","mean":"① 동반자 ② 친구","ex":[{"en":"The dog was his faithful **companion**.","ko":"그 개는 그의 충실한 동반자였다."},{"en":"Julia was my **companion** on the business trip.","ko":"줄리아는 출장에서 내 친구이자 동행자였다."}]},{"id":"vocab-0546","word":"company","ipa":"/ˈkʌmpəni/","kr":"**컴**퍼니","mark":"*","pos":"명","mean":"① 회사 ② 함께 있음","ex":[{"en":"Julia works for a software **company**.","ko":"줄리아는 소프트웨어 회사에서 일한다."},{"en":"I enjoyed her **company** during lunch.","ko":"나는 점심 동안 그녀와 함께 있음을 즐겼다."}]},{"id":"vocab-0547","word":"compare","ipa":"/kəmˈper/","kr":"컴**페어**","mark":"**","pos":"동","mean":"비교하다","ex":[{"en":"**Compare** the two pictures.","ko":"두 그림을 비교해라."}]},{"id":"vocab-0548","word":"compatible","ipa":"/kəmˈpætəbl/","kr":"컴**패**터블","mark":"","pos":"형","mean":"① 호환되는 ② 잘 맞는","ex":[{"en":"This device is **compatible** with our system.","ko":"이 장치는 우리 시스템과 호환된다."},{"en":"Their working styles are **compatible**.","ko":"그들의 업무 방식은 서로 잘 맞는다."}]},{"id":"vocab-0549","word":"compel","ipa":"/kəmˈpel/","kr":"컴**펠**","mark":"","pos":"동","mean":"① 강요하다 ② 억지로 시키다","ex":[{"en":"Hunger **compelled** him to steal.","ko":"배고픔이 그에게 도둑질을 강요했다."},{"en":"The deadline **compelled** us to work late.","ko":"마감일은 우리에게 늦게까지 일하도록 억지로 시켰다."}]},{"id":"vocab-0550","word":"compensate","ipa":"/ˈkɑːmpenseɪt/","kr":"**캄**펜세이트","mark":"","pos":"동","mean":"보상하다","ex":[{"en":"A small company **compensated** him for the damage.","ko":"한 소규모 회사는 그에게 피해를 보상했다."}]},{"id":"vocab-0551","word":"compete (competent)","ipa":"/kəmˈpiːt/","kr":"컴**피ː**트","mark":"","pos":"동","mean":"경쟁하다","ex":[{"en":"Several teams will **compete** for the prize.","ko":"여러 팀이 상을 놓고 경쟁할 것이다."}]},{"id":"vocab-0552","word":"compile","ipa":"/kəmˈpaɪl/","kr":"컴**파일**","mark":"","pos":"동","mean":"① 편집하다 ② 모으다","ex":[{"en":"She **compiled** the reports into one document.","ko":"그녀는 보고서들을 한 문서로 편집했다."},{"en":"We **compiled** data from five offices.","ko":"우리는 다섯 사무실에서 자료를 모았다."}]},{"id":"vocab-0553","word":"complain","ipa":"/kəmˈpleɪn/","kr":"컴**플레인**","mark":"**","pos":"동","mean":"① 불평하다 ② 항의하다","ex":[{"en":"Customers **complained** about the slow service.","ko":"고객들은 느린 서비스에 대해 불평했다."},{"en":"Customers **complained** to the manager about the delay.","ko":"고객들은 지연에 대해 관리자에게 항의했다."}]},{"id":"vocab-0554","word":"complement","ipa":"/ˈkɑːmplɪment/","kr":"**캄**플리먼트","mark":"","pos":"명/동","mean":"① 보완물 ② 보완하다","ex":[{"en":"This guide is a useful **complement** to the course.","ko":"이 안내서는 그 강좌의 유용한 보완물이다."},{"en":"The wine **complements** the meal.","ko":"그 와인은 식사를 보완한다."}]},{"id":"vocab-0555","word":"complete","ipa":"/kəmˈpliːt/","kr":"컴**플리ː**트","mark":"**","pos":"형/동","mean":"① 완전한 ② 완료하다","ex":[{"en":"We need a **complete** list of employees.","ko":"우리는 완전한 직원 목록이 필요하다."},{"en":"She **completed** the task.","ko":"그녀는 그 일을 완료했다."}]},{"id":"vocab-0556","word":"complex (complexity)","ipa":"/kəmˈpleks/","kr":"컴**플렉스**","mark":"**","pos":"형/명","mean":"① 복잡한 ② 복합 건물","ex":[{"en":"This is a **complex** problem.","ko":"이것은 복잡한 문제다."},{"en":"The local office is part of a large business **complex**.","ko":"지역 사무실은 큰 복합 건물의 일부다."}]},{"id":"vocab-0557","word":"complicate","ipa":"/ˈkɑːmplɪkeɪt/","kr":"**캄**플리케이트","mark":"**","pos":"동","mean":"복잡하게 하다","ex":[{"en":"Bad weather **complicated** our plans.","ko":"나쁜 날씨가 우리의 계획을 복잡하게 만들었다."}]},{"id":"vocab-0558","word":"component","ipa":"/kəmˈpoʊnənt/","kr":"컴**포**넌트","mark":"","pos":"명","mean":"① 부품 ② 구성 요소","ex":[{"en":"This small **component** is broken.","ko":"이 작은 부품은 고장 났다."},{"en":"Trust is a key **component** of teamwork.","ko":"신뢰는 팀워크의 핵심 구성 요소다."}]},{"id":"vocab-0559","word":"compose","ipa":"/kəmˈpoʊz/","kr":"컴**포즈**","mark":"","pos":"동","mean":"① 구성하다 ② 작곡하다","ex":[{"en":"Five departments **compose** the division.","ko":"다섯 부서가 그 본부를 구성한다."},{"en":"She **composed** a short song.","ko":"그녀는 짧은 노래를 작곡했다."}]},{"id":"vocab-0560","word":"compound","ipa":"/ˈkɑːmpaʊnd/","kr":"**캄**파운드","mark":"","pos":"명/형","mean":"① 화합물 ② 복합의","ex":[{"en":"Water is a chemical **compound**.","ko":"물은 화합물이다."},{"en":"This is a **compound** sentence.","ko":"이것은 복합 문장이다."}]},{"id":"vocab-0561","word":"comprehend (comprehensive)","ipa":"/ˌkɑːmprɪˈhend/","kr":"캄프리**헨드**","mark":"","pos":"동","mean":"이해하다","ex":[{"en":"I could not **comprehend** his explanation.","ko":"나는 그의 설명을 이해할 수 없었다."}]},{"id":"vocab-0562","word":"comprise","ipa":"/kəmˈpraɪz/","kr":"컴**프라이즈**","mark":"","pos":"동","mean":"① 구성되다 ② 이루어지다","ex":[{"en":"Ten students **comprise** the team.","ko":"학생 열 명이 그 팀을 구성한다."},{"en":"The course **comprises** six short lessons.","ko":"그 강좌는 여섯 개의 짧은 수업으로 이루어진다."}]},{"id":"vocab-0563","word":"compromise","ipa":"/ˈkɑːmprəmaɪz/","kr":"**캄**프러마이즈","mark":"","pos":"명/동","mean":"① 타협 ② 타협하다","ex":[{"en":"They reached a **compromise**.","ko":"그들은 타협에 이르렀다."},{"en":"Both sides agreed to **compromise**.","ko":"양측은 타협하기로 동의했다."}]},{"id":"vocab-0564","word":"compute (computer)","ipa":"/kəmˈpjuːt/","kr":"컴**퓨ː**트","mark":"*","pos":"동","mean":"계산하다","ex":[{"en":"The program **computes** the total automatically.","ko":"그 프로그램은 합계를 자동으로 계산한다."}]},{"id":"vocab-0565","word":"conceal","ipa":"/kənˈsiːl/","kr":"컨**시ː**일","mark":"","pos":"동","mean":"① 숨기다 ② 감추다","ex":[{"en":"Jun tried to **conceal** the error.","ko":"준은 그 오류를 숨기려고 했다."},{"en":"His calm voice could not **conceal** his fear.","ko":"그의 차분한 목소리도 그의 두려움을 감추지 못했다."}]},{"id":"vocab-0566","word":"conceive","ipa":"/kənˈsiːv/","kr":"컨**시ː**브","mark":"","pos":"동","mean":"① 상상하다 ② 생각해내다","ex":[{"en":"Can you **conceive** a world without email?","ko":"이메일 없는 세상을 상상할 수 있나요?"},{"en":"She **conceived** a new plan.","ko":"그녀는 새로운 계획을 생각해 냈다."}]},{"id":"vocab-0567","word":"concentrate","ipa":"/ˈkɑːnsntreɪt/","kr":"**칸**선트레이트","mark":"**","pos":"동","mean":"집중하다","ex":[{"en":"I cannot **concentrate** in a noisy room.","ko":"나는 시끄러운 방에서는 집중할 수 없다."}]},{"id":"vocab-0568","word":"concept","ipa":"/ˈkɑːnsept/","kr":"**칸**셉트","mark":"**","pos":"명","mean":"개념","ex":[{"en":"The **concept** is easy to understand.","ko":"그 개념은 이해하기 쉽다."}]},{"id":"vocab-0569","word":"concern","ipa":"/kənˈsɜːrn/","kr":"컨**선ː**","mark":"**","pos":"명/동","mean":"① 걱정 ② 관심 ③ 관련되다","ex":[{"en":"Her health is a serious **concern**.","ko":"그녀의 건강은 심각한 걱정거리이다."},{"en":"Our manager showed **concern** for the new staff.","ko":"우리 관리자는 신입 직원들에게 관심을 보였다."},{"en":"This rule **concerns** all employees.","ko":"이 규칙은 모든 직원과 관련된다."}]},{"id":"vocab-0570","word":"concert","ipa":"/ˈkɑːnsərt/","kr":"**칸**서트","mark":"**","pos":"명","mean":"① 연주회 ② 콘서트","ex":[{"en":"The orchestra gave a free **concert**.","ko":"그 관현악단은 무료 연주회를 열었다."},{"en":"We went to a **concert** last night.","ko":"우리는 어젯밤 콘서트에 갔다."}]},{"id":"vocab-0571","word":"conclude","ipa":"/kənˈkluːd/","kr":"컨**클루ː**드","mark":"","pos":"동","mean":"① 결론짓다 ② 끝맺다","ex":[{"en":"We **concluded** that the plan was safe.","ko":"우리는 그 계획이 안전하다고 결론지었다."},{"en":"She **concluded** the meeting at noon.","ko":"그녀는 정오에 회의를 끝맺었다."}]},{"id":"vocab-0572","word":"concrete","ipa":"/ˈkɑːnkriːt/","kr":"**칸**크리ː트","mark":"","pos":"명/형","mean":"① 콘크리트 ② 구체적인","ex":[{"en":"The floor is made of **concrete**.","ko":"그 바닥은 콘크리트로 만들어졌다."},{"en":"Give me a **concrete** example.","ko":"구체적인 예를 들어 주세요."}]},{"id":"vocab-0573","word":"condemn","ipa":"/kənˈdem/","kr":"컨**뎀**","mark":"","pos":"동","mean":"① 비난하다 ② 규탄하다","ex":[{"en":"Leaders **condemned** the violent attack.","ko":"지도자들은 폭력적인 공격을 비난했다."},{"en":"They **condemned** the violence.","ko":"그들은 그 폭력을 규탄했다."}]},{"id":"vocab-0574","word":"condition","ipa":"/kənˈdɪʃn/","kr":"컨**디**션","mark":"*","pos":"명","mean":"① 상태 ② 조건","ex":[{"en":"The car is in good **condition**.","ko":"그 차는 좋은 상태다."},{"en":"Flexible hours were a **condition** of the offer.","ko":"유연 근무는 그 제안의 조건이었다."}]},{"id":"vocab-0575","word":"conduct","ipa":"/kənˈdʌkt/","kr":"컨**덕트**","mark":"","pos":"명/동","mean":"① 행동 ② 수행하다 ③ 지휘하다","ex":[{"en":"His **conduct** at work was professional.","ko":"그의 직장에서의 행동은 전문적이었다."},{"en":"They **conducted** an experiment.","ko":"그들은 실험을 수행했다."},{"en":"Yuna will **conduct** the orchestra tonight.","ko":"유나는 오늘 밤 그 오케스트라를 지휘할 것이다."}]},{"id":"vocab-0576","word":"confer","ipa":"/kənˈfɜːr/","kr":"컨**퍼ː**","mark":"","pos":"동","mean":"① 수여하다 ② 상의하다","ex":[{"en":"The university **conferred** a degree on her.","ko":"그 대학은 그녀에게 학위를 수여했다."},{"en":"The teachers **conferred** about the problem.","ko":"교사들은 그 문제에 관해 상의했다."}]},{"id":"vocab-0577","word":"confess","ipa":"/kənˈfes/","kr":"컨**페스**","mark":"","pos":"동","mean":"① 고백하다 ② 자백하다","ex":[{"en":"He **confessed** that he had lied.","ko":"그는 거짓말을 했다고 고백했다."},{"en":"The suspect **confessed** to the crime.","ko":"그 용의자는 그 범죄를 자백했다."}]},{"id":"vocab-0578","word":"confide (confident)","ipa":"/kənˈfaɪd/","kr":"컨**파이드**","mark":"","pos":"동","mean":"① 비밀을 털어놓다 ② 신뢰하다","ex":[{"en":"She **confided** her secret to me.","ko":"그녀는 나에게 비밀을 털어놓았다."},{"en":"I **confide** important work to her.","ko":"나는 중요한 일을 그녀에게 신뢰하여 맡긴다."}]},{"id":"vocab-0579","word":"confine","ipa":"/kənˈfaɪn/","kr":"컨**파인**","mark":"","pos":"동","mean":"① 가두다 ② 국한하다","ex":[{"en":"The police **confined** him to a small room.","ko":"경찰은 그를 작은 방에 가두었다."},{"en":"Please **confine** the discussion to this issue.","ko":"논의를 이 문제로 국한해 주세요."}]},{"id":"vocab-0580","word":"confirm","ipa":"/kənˈfɜːrm/","kr":"컨**펌ː**","mark":"**","pos":"동","mean":"① 확인하다 ② 확정하다","ex":[{"en":"Please **confirm** your reservation.","ko":"예약을 확인해 주세요."},{"en":"We will **confirm** the schedule tomorrow.","ko":"우리는 내일 일정을 확정할 것이다."}]},{"id":"vocab-0581","word":"conflict","ipa":"/ˈkɑːnflɪkt/","kr":"**칸**플릭트","mark":"**","pos":"명/동","mean":"① 갈등 ② 충돌하다","ex":[{"en":"There was a **conflict** between them.","ko":"그들 사이에 갈등이 있었다."},{"en":"The new rule **conflicts** with our policy.","ko":"새 규칙은 우리 정책과 충돌한다."}]},{"id":"vocab-0582","word":"conform","ipa":"/kənˈfɔːrm/","kr":"컨**폼ː**","mark":"","pos":"동","mean":"① 따르다 ② 순응하다","ex":[{"en":"All products must **conform** to safety rules.","ko":"모든 제품은 안전 규정을 따라야 한다."},{"en":"New employees soon **conform** to the team culture.","ko":"신입 직원들은 곧 팀 문화에 순응한다."}]},{"id":"vocab-0583","word":"confront","ipa":"/kənˈfrʌnt/","kr":"컨**프런트**","mark":"","pos":"동","mean":"① 맞서다 ② 직면하다","ex":[{"en":"We must **confront** the problem directly.","ko":"우리는 그 문제에 직접 맞서야 한다."},{"en":"A budget shortage **confronted** the team this quarter.","ko":"이번 분기에 그 팀은 예산 부족에 직면했다."}]},{"id":"vocab-0584","word":"confuse","ipa":"/kənˈfjuːz/","kr":"컨**퓨ː**즈","mark":"**","pos":"동","mean":"① 혼란시키다 ② 혼동하다","ex":[{"en":"The similar names **confused** me.","ko":"비슷한 이름들이 나를 혼란스럽게 했다."},{"en":"Do not **confuse** the two account names.","ko":"두 계정 이름을 혼동하지 마라."}]},{"id":"vocab-0585","word":"congratulate","ipa":"/kənˈɡrætʃuleɪt/","kr":"컨**그래**출레이트","mark":"*","pos":"동","mean":"축하하다","ex":[{"en":"I **congratulated** her on her success.","ko":"나는 그녀의 성공을 축하했다."}]},{"id":"vocab-0586","word":"congress","ipa":"/ˈkɑːŋɡrəs/","kr":"**캉**그러스","mark":"","pos":"명","mean":"① 의회 ② 회의","ex":[{"en":"The bill was discussed in **Congress**.","ko":"그 법안은 의회에서 논의되었다."},{"en":"The **congress** passed a new law.","ko":"의회가 새 법을 통과시켰다."}]},{"id":"vocab-0587","word":"connect","ipa":"/kəˈnekt/","kr":"커**넥트**","mark":"**","pos":"동","mean":"① 연결하다 ② 잇다","ex":[{"en":"**Connect** the printer to the computer.","ko":"프린터를 컴퓨터에 연결해라."},{"en":"A bridge **connects** the two buildings.","ko":"다리가 그 두 건물을 잇는다."}]},{"id":"vocab-0588","word":"conscience","ipa":"/ˈkɑːnʃəns/","kr":"**칸**션스","mark":"","pos":"명","mean":"양심","ex":[{"en":"His **conscience** would not let him lie.","ko":"그의 양심은 그가 거짓말하도록 두지 않았다."}]},{"id":"vocab-0589","word":"conscious","ipa":"/ˈkɑːnʃəs/","kr":"**칸**셔스","mark":"**","pos":"형","mean":"① 의식하는 ② 자각하는","ex":[{"en":"Emma was **conscious** of the danger.","ko":"엠마는 위험을 의식하고 있었다."},{"en":"Sora is **conscious** of her own limits.","ko":"소라는 자신의 한계를 자각하고 있다."}]},{"id":"vocab-0590","word":"consent","ipa":"/kənˈsent/","kr":"컨**센트**","mark":"","pos":"명/동","mean":"① 동의 ② 동의하다","ex":[{"en":"They entered the room with her **consent**.","ko":"그들은 그녀의 동의를 받고 방에 들어갔다."},{"en":"The parents gave their **consent**.","ko":"부모가 동의했다."}]},{"id":"vocab-0591","word":"conserve","ipa":"/kənˈsɜːrv/","kr":"컨**서ː**브","mark":"","pos":"동","mean":"① 보존하다 ② 아끼다","ex":[{"en":"The museum works to **conserve** old documents.","ko":"그 박물관은 오래된 문서를 보존하려고 노력한다."},{"en":"Turn off the lights to **conserve** energy.","ko":"에너지를 아끼려면 불을 꺼라."}]},{"id":"vocab-0592","word":"consider","ipa":"/kənˈsɪdər/","kr":"컨**시**더","mark":"**","pos":"동","mean":"① 고려하다 ② 여기다","ex":[{"en":"Please **consider** my suggestion.","ko":"내 제안을 고려해 주세요."},{"en":"We **consider** her a strong candidate.","ko":"우리는 그녀를 유력한 지원자로 여긴다."}]},{"id":"vocab-0593","word":"consist (consistent)","ipa":"/kənˈsɪst/","kr":"컨**시스트**","mark":"","pos":"동","mean":"① 구성되다 ② 이루어지다","ex":[{"en":"Our study group **consists** of five members.","ko":"우리 스터디 그룹은 다섯 명으로 구성된다."},{"en":"The package **consists** of three parts.","ko":"그 패키지는 세 부분으로 이루어진다."}]},{"id":"vocab-0594","word":"constant","ipa":"/ˈkɑːnstənt/","kr":"**칸**스턴트","mark":"**","pos":"형","mean":"① 끊임없는 ② 일정한","ex":[{"en":"There was a **constant** noise.","ko":"끊임없는 소음이 있었다."},{"en":"Keep the room at a **constant** temperature.","ko":"그 방을 일정한 온도로 유지해라."}]},{"id":"vocab-0595","word":"constitute (constitution)","ipa":"/ˈkɑːnstɪtuːt/","kr":"**칸**스티투ː트","mark":"","pos":"동","mean":"① 구성하다 ② ~이 되다","ex":[{"en":"Women **constitute** half of the group.","ko":"여성이 그 집단의 절반을 구성한다."},{"en":"These parts **constitute** the whole.","ko":"이 부분들이 전체를 구성한다."}]},{"id":"vocab-0596","word":"constrain","ipa":"/kənˈstreɪn/","kr":"컨**스트레인**","mark":"","pos":"동","mean":"① 제한하다 ② 강요하다","ex":[{"en":"A small budget **constrained** our choices.","ko":"적은 예산이 우리의 선택을 제한했다."},{"en":"Lack of time **constrained** us to choose quickly.","ko":"시간 부족은 우리에게 빨리 선택하도록 강요했다."}]},{"id":"vocab-0597","word":"construct (construction)","ipa":"/kənˈstrʌkt/","kr":"컨**스트럭트**","mark":"","pos":"동","mean":"① 건설하다 ② 구성하다","ex":[{"en":"They **constructed** a bridge over the river.","ko":"그들은 강 위에 다리를 건설했다."},{"en":"These sections **construct** a clear argument.","ko":"이 부분들은 명확한 주장을 구성한다."}]},{"id":"vocab-0598","word":"consult","ipa":"/kənˈsʌlt/","kr":"컨**설트**","mark":"","pos":"동","mean":"① 상담하다 ② 참고하다","ex":[{"en":"You should **consult** a doctor.","ko":"의사와 상담하는 것이 좋다."},{"en":"**Consult** the user guide before installation.","ko":"설치 전에 사용 설명서를 참고해라."}]},{"id":"vocab-0599","word":"consume (consumer, consumption)","ipa":"/kənˈsuːm/","kr":"컨**숨ː**","mark":"**","pos":"동","mean":"① 소비하다 ② 먹다","ex":[{"en":"Cars **consume** a lot of fuel.","ko":"자동차는 많은 연료를 소비한다."},{"en":"We **consumed** a light meal before the flight.","ko":"우리는 비행 전에 가벼운 식사를 먹었다."}]},{"id":"vocab-0600","word":"contact","ipa":"/ˈkɑːntækt/","kr":"**칸**택트","mark":"**","pos":"명/동","mean":"① 접촉 ② 연락 ③ 연락하다","ex":[{"en":"Avoid direct **contact** with the chemical.","ko":"그 화학 물질과 직접 접촉을 피하라."},{"en":"I had no **contact** with him.","ko":"나는 그와 연락이 없었다."},{"en":"Please **contact** me by email.","ko":"이메일로 나에게 연락해 주세요."}]},{"id":"vocab-0601","word":"contain","ipa":"/kənˈteɪn/","kr":"컨**테인**","mark":"**","pos":"동","mean":"① 담고 있다 ② 포함하다","ex":[{"en":"This box **contains** old photographs.","ko":"이 상자에는 오래된 사진들이 들어 있다."},{"en":"The monthly report **contains** three recommendations.","ko":"월간 보고서는 세 가지 권고안을 포함한다."}]},{"id":"vocab-0602","word":"contemporary","ipa":"/kənˈtempəreri/","kr":"컨**템**퍼레리","mark":"","pos":"형/명","mean":"① 현대의 ② 동시대의","ex":[{"en":"The museum displays **contemporary** art.","ko":"그 박물관은 현대 미술을 전시한다."},{"en":"Julia was a **contemporary** of the famous writer.","ko":"줄리아는 그 유명한 작가와 동시대의 사람이었다."}]},{"id":"vocab-0603","word":"contend","ipa":"/kənˈtend/","kr":"컨**텐드**","mark":"","pos":"동","mean":"① 다투다 ② 주장하다","ex":[{"en":"Several teams **contend** for the contract.","ko":"여러 팀이 그 계약을 놓고 다툰다."},{"en":"Some experts **contend** that the rule is unfair.","ko":"일부 전문가들은 그 규칙이 불공정하다고 주장한다."}]},{"id":"vocab-0604","word":"content","ipa":"/ˈkɑːntent/","kr":"**칸**텐트","mark":"**","pos":"명/형","mean":"① 내용 ② 만족하는","ex":[{"en":"The **content** of the book is useful.","ko":"그 책의 내용은 유용하다."},{"en":"Lina is **content** with the new schedule.","ko":"리나는 새 일정에 만족한다."}]},{"id":"vocab-0605","word":"contest","ipa":"/ˈkɑːntest/","kr":"**칸**테스트","mark":"**","pos":"명/동","mean":"① 대회 ② 경쟁하다","ex":[{"en":"Emma entered a writing **contest**.","ko":"엠마는 글쓰기 대회에 참가했다."},{"en":"Three teams **contested** the final prize.","ko":"세 팀이 최종 상을 놓고 경쟁했다."}]},{"id":"vocab-0606","word":"context","ipa":"/ˈkɑːntekst/","kr":"**칸**텍스트","mark":"**","pos":"명","mean":"① 맥락 ② 문맥","ex":[{"en":"The word has a different meaning in this **context**.","ko":"그 단어는 이 맥락에서 다른 뜻을 가진다."},{"en":"Understand the word in **context**.","ko":"그 단어를 문맥 속에서 이해해라."}]},{"id":"vocab-0607","word":"continent","ipa":"/ˈkɑːntɪnənt/","kr":"**칸**티넌트","mark":"","pos":"명","mean":"대륙","ex":[{"en":"Asia is the largest **continent**.","ko":"아시아는 가장 큰 대륙이다."}]},{"id":"vocab-0608","word":"continue","ipa":"/kənˈtɪnjuː/","kr":"컨**티**뉴","mark":"**","pos":"동","mean":"계속하다","ex":[{"en":"Please **continue** your work.","ko":"네 일을 계속해라."}]},{"id":"vocab-0609","word":"contract","ipa":"/ˈkɑːntrækt/","kr":"**칸**트랙트","mark":"**","pos":"명/동","mean":"① 계약 ② 계약하다 ③ 수축하다","ex":[{"en":"They signed a **contract**.","ko":"그들은 계약서에 서명했다."},{"en":"Our company **contracted** a local vendor.","ko":"우리 회사는 현지 공급업체와 계약했다."},{"en":"Metal can **contract** in cold weather.","ko":"금속은 추운 날씨에 수축할 수 있다."}]},{"id":"vocab-0610","word":"contradict","ipa":"/ˌkɑːntrəˈdɪkt/","kr":"칸트러**딕트**","mark":"","pos":"동","mean":"① 모순되다 ② 반박하다","ex":[{"en":"His actions **contradict** his words.","ko":"그의 행동은 그의 말과 모순된다."},{"en":"The data **contradicts** his claim, so I must contradict him.","ko":"그 자료는 그의 주장을 반박하므로 나는 그를 반박해야 한다."}]},{"id":"vocab-0611","word":"contrary","ipa":"/ˈkɑːntreri/","kr":"**칸**트레리","mark":"","pos":"형/명","mean":"① 반대의 ② 정반대","ex":[{"en":"The result was **contrary** to our hopes.","ko":"결과는 우리의 바람과 반대였다."},{"en":"The result was the **contrary** of what we expected.","ko":"그 결과는 우리가 예상한 것의 정반대였다."}]},{"id":"vocab-0612","word":"contrast","ipa":"/ˈkɑːntræst/","kr":"**칸**트래스트","mark":"","pos":"명/동","mean":"① 대조 ② 대조하다","ex":[{"en":"There is a sharp **contrast** between them.","ko":"그들 사이에는 뚜렷한 대조가 있다."},{"en":"The white walls **contrast** with the dark floor.","ko":"흰 벽은 어두운 바닥과 대조를 이룬다."}]},{"id":"vocab-0613","word":"contribute","ipa":"/kənˈtrɪbjuːt/","kr":"컨**트리**뷰트","mark":"**","pos":"동","mean":"① 기여하다 ② 기부하다","ex":[{"en":"She **contributed** to the project.","ko":"그녀는 그 프로젝트에 기여했다."},{"en":"Employees **contributed** money to the charity.","ko":"직원들은 자선 단체에 돈을 기부했다."}]},{"id":"vocab-0614","word":"control","ipa":"/kənˈtroʊl/","kr":"컨**트롤**","mark":"*","pos":"명/동","mean":"① 통제 ② 지배 ③ 통제하다","ex":[{"en":"Our manager kept **control** of the situation.","ko":"우리 관리자는 그 상황을 통제했다."},{"en":"The organization gained **control** of the market.","ko":"그 조직은 시장의 지배권을 얻었다."},{"en":"Noah lost **control** of the car.","ko":"노아는 차의 통제를 잃었다."}]},{"id":"vocab-0615","word":"controversy","ipa":"/ˈkɑːntrəvɜːrsi/","kr":"**칸**트러버시","mark":"","pos":"명","mean":"① 논란 ② 논쟁","ex":[{"en":"The decision caused great **controversy**.","ko":"그 결정은 큰 논란을 일으켰다."},{"en":"The two experts had a long **controversy**.","ko":"두 전문가는 긴 논쟁을 벌였다."}]},{"id":"vocab-0616","word":"convene (convenient, convention)","ipa":"/kənˈviːn/","kr":"컨**빈ː**","mark":"","pos":"동","mean":"① 소집하다 ② 모이다","ex":[{"en":"The board will **convene** tomorrow.","ko":"이사회는 내일 소집될 것이다."},{"en":"The committee will **convene** next week.","ko":"위원회는 다음 주에 모일 것이다."}]},{"id":"vocab-0617","word":"converse (conversation)","ipa":"/kənˈvɜːrs/","kr":"컨**버ː**스","mark":"**","pos":"동","mean":"대화하다","ex":[{"en":"They **conversed** quietly by the window.","ko":"그들은 창가에서 조용히 대화했다."}]},{"id":"vocab-0618","word":"convert","ipa":"/kənˈvɜːrt/","kr":"컨**버ː**트","mark":"","pos":"동","mean":"① 전환하다 ② 바꾸다","ex":[{"en":"We **converted** the paper form to a digital file.","ko":"우리는 종이 양식을 디지털 파일로 전환했다."},{"en":"This tool **converts** text into speech.","ko":"이 도구는 글을 음성으로 바꾼다."}]},{"id":"vocab-0619","word":"convey","ipa":"/kənˈveɪ/","kr":"컨**베이**","mark":"","pos":"동","mean":"① 전달하다 ② 나르다","ex":[{"en":"Her smile **conveyed** gratitude.","ko":"그녀의 미소는 감사의 뜻을 전달했다."},{"en":"The truck **conveys** goods to the warehouse.","ko":"그 트럭은 물품을 창고로 나른다."}]},{"id":"vocab-0620","word":"convict","ipa":"/kənˈvɪkt/","kr":"컨**빅트**","mark":"","pos":"동/명","mean":"① 유죄를 선고하다 ② 죄수","ex":[{"en":"The jury **convicted** him of theft.","ko":"배심원단은 그에게 절도죄로 유죄를 선고했다."},{"en":"The **convict** returned to prison.","ko":"그 죄수는 교도소로 돌아갔다."}]},{"id":"vocab-0621","word":"convince","ipa":"/kənˈvɪns/","kr":"컨**빈스**","mark":"**","pos":"동","mean":"① 확신시키다 ② 설득하다","ex":[{"en":"The evidence **convinced** me that she was right.","ko":"그 증거는 그녀가 옳다고 나를 확신시켰다."},{"en":"She **convinced** me to try again.","ko":"그녀는 내가 다시 해 보도록 설득했다."}]},{"id":"vocab-0622","word":"cook","ipa":"/kʊk/","kr":"**쿡**","mark":"*","pos":"동/명","mean":"① 요리하다 ② 요리사","ex":[{"en":"I **cook** dinner for my family.","ko":"나는 가족을 위해 저녁을 요리한다."},{"en":"The **cook** prepared lunch for the staff.","ko":"그 요리사는 직원들을 위해 점심을 준비했다."}]},{"id":"vocab-0623","word":"cookie / cooky","ipa":"/ˈkʊki/","kr":"**쿠**키","mark":"*","pos":"명","mean":"① 쿠키 ② 과자","ex":[{"en":"One child ate two **cookies**.","ko":"한 아이는 쿠키 두 개를 먹었다."},{"en":"One child chose a chocolate **cookie**.","ko":"한 아이는 초콜릿 과자를 골랐다."}]},{"id":"vocab-0624","word":"cool","ipa":"/kuːl/","kr":"**쿨ː**","mark":"*","pos":"형","mean":"① 시원한 ② 멋진","ex":[{"en":"The water is **cool**.","ko":"그 물은 시원하다."},{"en":"That new app is really **cool**.","ko":"그 새 앱은 정말 멋지다."}]},{"id":"vocab-0625","word":"cooperate","ipa":"/koʊˈɑːpəreɪt/","kr":"코**아**퍼레이트","mark":"","pos":"동","mean":"협력하다","ex":[{"en":"The two schools agreed to **cooperate**.","ko":"두 학교는 협력하기로 합의했다."}]},{"id":"vocab-0626","word":"coordinate","ipa":"/koʊˈɔːrdɪneɪt/","kr":"코**오ː**디네이트","mark":"","pos":"동","mean":"① 조정하다 ② 조화시키다","ex":[{"en":"She **coordinated** the volunteers.","ko":"그녀는 자원봉사자들을 조정했다."},{"en":"The colors **coordinate** well with the logo.","ko":"그 색들은 로고와 잘 조화를 이룬다."}]},{"id":"vocab-0627","word":"cop","ipa":"/kɑːp/","kr":"**캅**","mark":"**","pos":"명","mean":"경찰관","ex":[{"en":"A **cop** directed traffic at the corner.","ko":"경찰관이 모퉁이에서 교통을 정리했다."}]},{"id":"vocab-0628","word":"cope","ipa":"/koʊp/","kr":"**코프**","mark":"**","pos":"동","mean":"① 대처하다 ② 극복하다","ex":[{"en":"Ethan learned to **cope** with stress.","ko":"이선은 스트레스에 대처하는 법을 배웠다."},{"en":"With support, she learned to **cope** with the crisis.","ko":"지원이 있어 그녀는 그 위기에 대처하는 법을 배웠다."}]},{"id":"vocab-0629","word":"copy","ipa":"/ˈkɑːpi/","kr":"**카**피","mark":"**","pos":"명/동","mean":"① 복사본 ② 복사하다","ex":[{"en":"Please keep a **copy** of the contract.","ko":"계약서 복사본을 보관해 주세요."},{"en":"Please **copy** this page.","ko":"이 페이지를 복사해 주세요."}]},{"id":"vocab-0630","word":"copyright","ipa":"/ˈkɑːpiraɪt/","kr":"**카**피라이트","mark":"","pos":"명","mean":"저작권","ex":[{"en":"The book is protected by **copyright**.","ko":"그 책은 저작권으로 보호된다."}]},{"id":"vocab-0631","word":"cord","ipa":"/kɔːrd/","kr":"**코ː**드","mark":"","pos":"명","mean":"① 끈 ② 전선","ex":[{"en":"Tie the package with a **cord**.","ko":"꾸러미를 끈으로 묶어라."},{"en":"Unplug the power **cord** before repair.","ko":"수리 전에 전선을 뽑아라."}]},{"id":"vocab-0632","word":"core","ipa":"/kɔːr/","kr":"**코ː**","mark":"","pos":"명","mean":"① 핵심 ② 중심","ex":[{"en":"Trust is at the **core** of their relationship.","ko":"신뢰는 그들의 관계의 핵심이다."},{"en":"Security is at the **core** of the system.","ko":"보안은 그 시스템의 중심에 있다."}]},{"id":"vocab-0633","word":"corn","ipa":"/kɔːrn/","kr":"**콘ː**","mark":"","pos":"명","mean":"옥수수","ex":[{"en":"The farmer grows **corn**.","ko":"그 농부는 옥수수를 기른다."}]},{"id":"vocab-0634","word":"corner","ipa":"/ˈkɔːrnər/","kr":"**코ː**너","mark":"*","pos":"명","mean":"① 모퉁이 ② 구석","ex":[{"en":"The store is on the **corner**.","ko":"그 가게는 모퉁이에 있다."},{"en":"The box is in the **corner** of the room.","ko":"상자는 방 구석에 있다."}]},{"id":"vocab-0635","word":"corporate (corporation)","ipa":"/ˈkɔːrpərət/","kr":"**코ː**퍼릿","mark":"","pos":"형","mean":"① 기업의 ② 회사의","ex":[{"en":"Mina works in **corporate** finance.","ko":"미나는 기업 금융 분야에서 일한다."},{"en":"The **corporate** policy applies to all offices.","ko":"그 회사의 정책은 모든 사무실에 적용된다."}]},{"id":"vocab-0636","word":"correct","ipa":"/kəˈrekt/","kr":"커**렉트**","mark":"**","pos":"형/동","mean":"① 정확한 ② 바로잡다","ex":[{"en":"Your answer is **correct**.","ko":"네 답은 정확하다."},{"en":"Please **correct** the wrong date.","ko":"잘못된 날짜를 바로잡아 주세요."}]},{"id":"vocab-0637","word":"correspond","ipa":"/ˌkɔːrəˈspɑːnd/","kr":"코러**스판드**","mark":"","pos":"동","mean":"① 일치하다 ② 편지를 주고받다","ex":[{"en":"The numbers **correspond** to the names.","ko":"그 숫자들은 이름과 일치한다."},{"en":"We **correspond** by email every week.","ko":"우리는 매주 이메일로 편지를 주고받는다."}]},{"id":"vocab-0638","word":"corridor","ipa":"/ˈkɔːrɪdɔːr/","kr":"**코ː**리도어","mark":"","pos":"명","mean":"복도","ex":[{"en":"We walked down the long **corridor**.","ko":"우리는 긴 복도를 따라 걸었다."}]},{"id":"vocab-0639","word":"corrupt","ipa":"/kəˈrʌpt/","kr":"커**럽트**","mark":"","pos":"형/동","mean":"① 부패한 ② 타락시키다","ex":[{"en":"The **corrupt** official accepted money.","ko":"그 부패한 관리는 돈을 받았다."},{"en":"Power can **corrupt** honest people.","ko":"권력은 정직한 사람들을 타락시킬 수 있다."}]},{"id":"vocab-0640","word":"cost","ipa":"/kɔːst/","kr":"**코ː**스트","mark":"*","pos":"명/동","mean":"① 비용 ② 비용이 들다","ex":[{"en":"The total **cost** is shown below.","ko":"총비용은 아래에 표시되어 있다."},{"en":"The trip **cost** a lot of money.","ko":"그 여행은 많은 돈이 들었다."}]},{"id":"vocab-0641","word":"costume","ipa":"/kɑːˈstuːm/","kr":"카**스툼ː**","mark":"","pos":"명","mean":"① 의상 ② 복장","ex":[{"en":"Mina wore a traditional **costume**.","ko":"미나는 전통 의상을 입었다."},{"en":"Employees must wear formal business **costume** at the event.","ko":"직원들은 그 행사에서 정식 업무 복장을 입어야 한다."}]},{"id":"vocab-0642","word":"cottage","ipa":"/ˈkɑːtɪdʒ/","kr":"**카**티지","mark":"**","pos":"명","mean":"① 오두막 ② 시골집","ex":[{"en":"They stayed in a small **cottage**.","ko":"그들은 작은 오두막에 머물렀다."},{"en":"They bought a small country **cottage**.","ko":"그들은 작은 시골집을 샀다."}]},{"id":"vocab-0643","word":"cotton","ipa":"/ˈkɑːtn/","kr":"**카**튼","mark":"**","pos":"명","mean":"① 면 ② 목화","ex":[{"en":"This shirt is made of **cotton**.","ko":"이 셔츠는 면으로 만들어졌다."},{"en":"**Cotton** grows well in warm climates.","ko":"목화는 따뜻한 기후에서 잘 자란다."}]},{"id":"vocab-0644","word":"cough","ipa":"/kɔːf/","kr":"**코ː**프","mark":"**","pos":"동/명","mean":"① 기침하다 ② 기침","ex":[{"en":"He **coughed** all night.","ko":"그는 밤새 기침했다."},{"en":"His **cough** was getting worse.","ko":"그의 기침은 더 심해지고 있었다."}]},{"id":"vocab-0645","word":"could","ipa":"/kʊd/","kr":"**쿠드**","mark":"*","pos":"동","mean":"① ~할 수 있었다 ② ~할 수도 있다","ex":[{"en":"I **could** swim when I was five.","ko":"나는 다섯 살 때 수영할 수 있었다."},{"en":"The delay **could** affect the launch.","ko":"그 지연은 출시에도 영향을 미칠 수 있다."}]},{"id":"vocab-0646","word":"council","ipa":"/ˈkaʊnsl/","kr":"**카운**슬","mark":"**","pos":"명","mean":"① 의회 ② 협의회","ex":[{"en":"The city **council** approved the plan.","ko":"시 의회는 그 계획을 승인했다."},{"en":"The safety **council** meets once a month.","ko":"안전 협의회는 한 달에 한 번 만난다."}]},{"id":"vocab-0647","word":"counsel","ipa":"/ˈkaʊnsl/","kr":"**카운**슬","mark":"","pos":"명/동","mean":"① 조언 ② 상담하다","ex":[{"en":"Hana gave wise **counsel**.","ko":"하나는 현명한 조언을 해 주었다."},{"en":"The teacher **counseled** the student.","ko":"선생님은 그 학생에게 상담을 해 주었다."}]},{"id":"vocab-0648","word":"count (discount, counter)","ipa":"/kaʊnt/","kr":"**카운트**","mark":"**","pos":"동/명","mean":"① 세다 ② 계산 ③ 중요하다","ex":[{"en":"**Count** the apples in the basket.","ko":"바구니 속 사과를 세어라."},{"en":"Please check the final **count**.","ko":"최종 계산을 확인해 주세요."},{"en":"Every customer **counts**.","ko":"모든 고객은 중요하다."}]},{"id":"vocab-0649","word":"counterpart","ipa":"/ˈkaʊntərpɑːrt/","kr":"**카운**터파트","mark":"","pos":"명","mean":"① 상대 ② 대응하는 것","ex":[{"en":"Emma met her Japanese **counterpart**.","ko":"엠마는 일본 측 상대를 만났다."},{"en":"This button is the digital **counterpart** of the old switch.","ko":"이 버튼은 옛 스위치에 대응하는 디지털 장치다."}]},{"id":"vocab-0650","word":"country","ipa":"/ˈkʌntri/","kr":"**컨**트리","mark":"*","pos":"명","mean":"① 나라 ② 시골","ex":[{"en":"Korea is a beautiful **country**.","ko":"한국은 아름다운 나라다."},{"en":"They moved to the **country** for a quieter life.","ko":"그들은 더 조용한 삶을 위해 시골로 이사했다."}]},{"id":"vocab-0651","word":"countryside","ipa":"/ˈkʌntrisaɪd/","kr":"**컨**트리사이드","mark":"**","pos":"명","mean":"① 시골 ② 전원","ex":[{"en":"They moved to the **countryside**.","ko":"그들은 시골로 이사했다."},{"en":"They enjoyed the quiet rural **countryside**.","ko":"그들은 조용한 전원 풍경을 즐겼다."}]},{"id":"vocab-0652","word":"county","ipa":"/ˈkaʊnti/","kr":"**카운**티","mark":"**","pos":"명","mean":"① 군 ② 자치주","ex":[{"en":"The river runs through the **county**.","ko":"그 강은 그 군을 가로질러 흐른다."},{"en":"The **county** manages local roads and parks.","ko":"그 자치주는 지역 도로와 공원을 관리한다."}]},{"id":"vocab-0653","word":"couple","ipa":"/ˈkʌpl/","kr":"**커**플","mark":"*","pos":"명","mean":"① 두 사람 ② 커플 ③ 몇 개","ex":[{"en":"A **couple** waited in the lobby.","ko":"두 사람이 로비에서 기다렸다."},{"en":"A young **couple** moved in next door.","ko":"젊은 커플이 옆집으로 이사 왔다."},{"en":"I need a **couple** of minutes.","ko":"나는 몇 분이 필요하다."}]},{"id":"vocab-0654","word":"coupon","ipa":"/ˈkuːpɑːn/","kr":"**쿠ː**판","mark":"","pos":"명","mean":"① 쿠폰 ② 할인권","ex":[{"en":"I used a **coupon** to buy the shoes.","ko":"나는 신발을 살 때 쿠폰을 사용했다."},{"en":"This discount **coupon** saves ten percent.","ko":"이 할인권은 10퍼센트를 절약해 준다."}]},{"id":"vocab-0655","word":"courage (discourage, encourage)","ipa":"/ˈkɜːrɪdʒ/","kr":"**커ː**리지","mark":"","pos":"명","mean":"용기","ex":[{"en":"It took **courage** to tell the truth.","ko":"진실을 말하는 데는 용기가 필요했다."}]},{"id":"vocab-0656","word":"course","ipa":"/kɔːrs/","kr":"**코ː**스","mark":"*","pos":"명","mean":"① 강좌 ② 진로 ③ 코스","ex":[{"en":"I signed up for an English **course**.","ko":"나는 영어 강좌에 등록했다."},{"en":"Yuna chose a career **course** in IT.","ko":"유나는 IT 진로를 선택했다."},{"en":"We ordered a three-**course** meal.","ko":"우리는 세 코스 식사를 주문했다."}]},{"id":"vocab-0657","word":"court","ipa":"/kɔːrt/","kr":"**코ː**트","mark":"*","pos":"명","mean":"① 법정 ② 경기장","ex":[{"en":"The case went to **court**.","ko":"그 사건은 법정으로 갔다."},{"en":"The players returned to the **court**.","ko":"선수들은 경기장으로 돌아갔다."}]},{"id":"vocab-0658","word":"cousin","ipa":"/ˈkʌzn/","kr":"**커**즌","mark":"*","pos":"명","mean":"사촌","ex":[{"en":"My **cousin** visits us every summer.","ko":"내 사촌은 매년 여름 우리를 방문한다."}]},{"id":"vocab-0659","word":"cover (discover)","ipa":"/ˈkʌvər/","kr":"**커**버","mark":"*","pos":"동/명","mean":"① 덮다 ② 다루다 ③ 덮개","ex":[{"en":"Snow **covered** the ground.","ko":"눈이 땅을 덮었다."},{"en":"The monthly report **covers** customer support issues.","ko":"월간 보고서는 고객 지원 문제를 다룬다."},{"en":"The laptop **cover** is scratched.","ko":"노트북 덮개에 흠집이 났다."}]},{"id":"vocab-0660","word":"cow","ipa":"/kaʊ/","kr":"**카우**","mark":"*","pos":"명","mean":"① 젖소 ② 암소","ex":[{"en":"The **cow** gives us milk.","ko":"그 젖소는 우리에게 우유를 준다."},{"en":"The farmer keeps one **cow** for milk.","ko":"그 농부는 우유를 위해 암소 한 마리를 기른다."}]},{"id":"vocab-0661","word":"crack","ipa":"/kræk/","kr":"**크랙**","mark":"**","pos":"명/동","mean":"① 금 ② 갈라지다","ex":[{"en":"There is a **crack** in the wall.","ko":"벽에 금이 가 있다."},{"en":"Cold weather made the glass **crack**.","ko":"추운 날씨가 유리를 갈라지게 했다."}]},{"id":"vocab-0662","word":"craft","ipa":"/kræft/","kr":"**크래프트**","mark":"","pos":"명","mean":"① 공예 ② 기술","ex":[{"en":"The children made a paper **craft**.","ko":"아이들은 종이 공예품을 만들었다."},{"en":"Good communication is a useful management **craft**.","ko":"좋은 의사소통은 유용한 관리 기술이다."}]},{"id":"vocab-0663","word":"crash","ipa":"/kræʃ/","kr":"**크래시**","mark":"**","pos":"명/동","mean":"① 충돌 ② 추락하다","ex":[{"en":"The car **crashed** into a tree.","ko":"자동차가 나무에 충돌했다."},{"en":"The plane **crashed** into the sea.","ko":"그 비행기는 바다로 추락했다."}]},{"id":"vocab-0664","word":"crawl","ipa":"/krɔːl/","kr":"**크롤ː**","mark":"**","pos":"동","mean":"기어가다","ex":[{"en":"The baby began to **crawl**.","ko":"아기가 기어가기 시작했다."}]},{"id":"vocab-0665","word":"crayon","ipa":"/ˈkreɪɑːn/","kr":"**크레이**안","mark":"*","pos":"명","mean":"크레용","ex":[{"en":"Lina drew a sun with a yellow **crayon**.","ko":"리나는 노란 크레용으로 해를 그렸다."}]},{"id":"vocab-0666","word":"craze (crazy)","ipa":"/kreɪz/","kr":"**크레이즈**","mark":"","pos":"명","mean":"① 열풍 ② 대유행","ex":[{"en":"The new app started a fitness **craze**.","ko":"그 새 앱은 운동 열풍을 일으켰다."},{"en":"The game became a **craze**.","ko":"그 게임은 대유행이 되었다."}]},{"id":"vocab-0667","word":"cream","ipa":"/kriːm/","kr":"**크림ː**","mark":"*","pos":"명","mean":"크림","ex":[{"en":"Yuna put **cream** in her coffee.","ko":"유나는 커피에 크림을 넣었다."}]},{"id":"vocab-0668","word":"create (creature)","ipa":"/kriˈeɪt/","kr":"크리**에이트**","mark":"**","pos":"동","mean":"① 창조하다 ② 만들다","ex":[{"en":"Artists **create** beautiful things.","ko":"예술가는 아름다운 것을 창조한다."},{"en":"The project **created** new jobs.","ko":"그 프로젝트는 새로운 일자리를 만들었다."}]},{"id":"vocab-0669","word":"credible (incredible)","ipa":"/ˈkredəbl/","kr":"**크레**더블","mark":"","pos":"형","mean":"믿을 만한","ex":[{"en":"The witness gave a **credible** account.","ko":"그 목격자는 믿을 만한 설명을 했다."}]},{"id":"vocab-0670","word":"credit","ipa":"/ˈkredɪt/","kr":"**크레**딧","mark":"**","pos":"명","mean":"① 신용 ② 공로 ③ 학점","ex":[{"en":"James paid by **credit** card.","ko":"제임스는 신용카드로 지불했다."},{"en":"Claire deserves **credit** for the idea.","ko":"클레어는 그 아이디어에 대한 공로를 인정받을 만하다."},{"en":"This course is worth three **credits**.","ko":"이 강좌는 3학점이다."}]},{"id":"vocab-0671","word":"creep","ipa":"/kriːp/","kr":"**크리ː**프","mark":"","pos":"동","mean":"살금살금 기다","ex":[{"en":"The cat **crept** toward the bird.","ko":"고양이가 새를 향해 살금살금 다가갔다."}]},{"id":"vocab-0672","word":"crew","ipa":"/kruː/","kr":"**크루ː**","mark":"","pos":"명","mean":"① 승무원 ② 팀","ex":[{"en":"The **crew** prepared the plane.","ko":"승무원들이 비행기를 준비했다."},{"en":"The project **crew** worked as one team.","ko":"그 프로젝트 작업진은 한 팀으로 일했다."}]},{"id":"vocab-0673","word":"crime (criminal)","ipa":"/kraɪm/","kr":"**크라임**","mark":"**","pos":"명","mean":"범죄","ex":[{"en":"The police are investigating the **crime**.","ko":"경찰은 그 범죄를 수사하고 있다."}]},{"id":"vocab-0674","word":"crisis","ipa":"/ˈkraɪsɪs/","kr":"**크라이**시스","mark":"**","pos":"명","mean":"위기","ex":[{"en":"The country faced an economic **crisis**.","ko":"그 나라는 경제 위기에 직면했다."}]},{"id":"vocab-0675","word":"crisp","ipa":"/krɪsp/","kr":"**크리스프**","mark":"**","pos":"형","mean":"① 바삭한 ② 상쾌한","ex":[{"en":"The fried chicken stayed **crisp**.","ko":"그 튀긴 닭고기는 바삭한 상태를 유지했다."},{"en":"The air felt **crisp** that morning.","ko":"그날 아침 공기는 상쾌하게 느껴졌다."}]},{"id":"vocab-0676","word":"criterion","ipa":"/kraɪˈtɪriən/","kr":"크라이**티**리언","mark":"","pos":"명","mean":"기준","ex":[{"en":"Price is not the only **criterion**.","ko":"가격이 유일한 기준은 아니다."}]},{"id":"vocab-0677","word":"critic (criticize / criticise, criticism)","ipa":"/ˈkrɪtɪk/","kr":"**크리**틱","mark":"","pos":"명","mean":"① 비평가 ② 평론가","ex":[{"en":"The film received praise from **critics**.","ko":"그 영화는 비평가들에게 찬사를 받았다."},{"en":"The film **critic** wrote a short review.","ko":"그 영화 평론가는 짧은 평론을 썼다."}]},{"id":"vocab-0678","word":"crop","ipa":"/krɑːp/","kr":"**크랍**","mark":"","pos":"명","mean":"① 농작물 ② 수확량","ex":[{"en":"Wheat is the region's main **crop**.","ko":"밀은 그 지역의 주요 농작물이다."},{"en":"This year's rice **crop** was a large harvest.","ko":"올해 쌀 수확량은 많았다."}]},{"id":"vocab-0679","word":"cross","ipa":"/krɔːs/","kr":"**크로ː**스","mark":"*","pos":"동/명","mean":"① 건너다 ② 십자가","ex":[{"en":"Look both ways before you **cross**.","ko":"건너기 전에 양쪽을 봐라."},{"en":"A small **cross** hung on the wall.","ko":"작은 십자가가 벽에 걸려 있었다."}]},{"id":"vocab-0680","word":"crowd","ipa":"/kraʊd/","kr":"**크라우드**","mark":"**","pos":"명","mean":"① 군중 ② 무리","ex":[{"en":"A large **crowd** gathered.","ko":"많은 군중이 모였다."},{"en":"A **crowd** of tourists entered the museum.","ko":"관광객 무리가 박물관에 들어갔다."}]},{"id":"vocab-0681","word":"crown","ipa":"/kraʊn/","kr":"**크라운**","mark":"**","pos":"명","mean":"왕관","ex":[{"en":"The queen wore a silver **crown**.","ko":"여왕은 은색 왕관을 썼다."}]},{"id":"vocab-0682","word":"crucial","ipa":"/ˈkruːʃl/","kr":"**크루ː**셜","mark":"","pos":"형","mean":"① 중대한 ② 결정적인","ex":[{"en":"This is a **crucial** decision.","ko":"이것은 중대한 결정이다."},{"en":"A clear backup plan was **crucial** to our success.","ko":"명확한 백업 계획은 우리의 성공에 결정적이었다."}]},{"id":"vocab-0683","word":"cruel","ipa":"/ˈkruːəl/","kr":"**크루ː**얼","mark":"**","pos":"형","mean":"잔인한","ex":[{"en":"It was a **cruel** joke.","ko":"그것은 잔인한 농담이었다."}]},{"id":"vocab-0684","word":"cruise","ipa":"/kruːz/","kr":"**크루ː**즈","mark":"","pos":"명/동","mean":"① 유람선 여행 ② 순항하다","ex":[{"en":"They went on a **cruise** around the island.","ko":"그들은 섬 주위를 도는 유람선 여행을 갔다."},{"en":"The ship **cruised** along the coast.","ko":"그 배는 해안을 따라 순항했다."}]},{"id":"vocab-0685","word":"crush","ipa":"/krʌʃ/","kr":"**크러시**","mark":"","pos":"동","mean":"① 으깨다 ② 뭉개다","ex":[{"en":"**Crush** the garlic before cooking.","ko":"요리하기 전에 마늘을 으깨라."},{"en":"The heavy box **crushed** the empty can.","ko":"무거운 상자가 빈 깡통을 뭉갰다."}]},{"id":"vocab-0686","word":"cry","ipa":"/kraɪ/","kr":"**크라이**","mark":"*","pos":"동/명","mean":"① 울다 ② 외침","ex":[{"en":"The baby began to **cry** when the door slammed.","ko":"문이 쾅 닫히자 아기가 울기 시작했다."},{"en":"We heard a baby's **cry** from the next room.","ko":"우리는 옆방에서 아기의 울음소리를 들었다."}]},{"id":"vocab-0687","word":"crystal","ipa":"/ˈkrɪstl/","kr":"**크리**스틀","mark":"","pos":"명","mean":"① 수정 ② 결정","ex":[{"en":"The **crystal** shone in the light.","ko":"그 수정은 빛 속에서 빛났다."},{"en":"The cave contained beautiful **crystals**.","ko":"그 동굴에는 아름다운 결정들이 있었다."}]},{"id":"vocab-0688","word":"cultivate","ipa":"/ˈkʌltɪveɪt/","kr":"**컬**티베이트","mark":"","pos":"동","mean":"① 경작하다 ② 기르다","ex":[{"en":"Farmers **cultivate** the land.","ko":"농부들은 땅을 경작한다."},{"en":"Good managers **cultivate** new talent.","ko":"좋은 관리자들은 새로운 인재를 기른다."}]},{"id":"vocab-0689","word":"culture","ipa":"/ˈkʌltʃər/","k is hand.","ko":"그의 손에 작은 상처가 있다."}]},{"id":"vocab-0705","word":"cute","ipa":"/kjuːt/","kr":"**큐ː**트","mark":"**","pos":"형","mean":"귀여운","ex":[{"en":"The new office mascot is very **cute**.","ko":"새 사무실 마스코트는 매우 귀엽다."}]},{"id":"vocab-0706","word":"cycle (recycle, cyclist)","ipa":"/ˈsaɪkl/","kr":"**사이**클","mark":"**","pos":"명/동","mean":"① 주기 ② 자전거를 타다","ex":[{"en":"The hiring **cycle** takes about two weeks.","ko":"채용 주기는 약 2주가 걸린다."},{"en":"I **cycle** to work on sunny days.","ko":"나는 맑은 날에 자전거를 타고 출근한다."}]},{"id":"vocab-0707","word":"cynical","ipa":"/ˈsɪnɪkl/","kr":"**시**니컬","mark":"","pos":"형","mean":"냉소적인","ex":[{"en":"Lucas has a **cynical** view of life.","ko":"루카스는 인생에 대해 냉소적인 시각을 지녔다."}]},{"id":"vocab-0708","word":"dairy","ipa":"/ˈderi/","kr":"**데**리","mark":"","pos":"명","mean":"① 유제품 ② 낙농장","ex":[{"en":"Milk is a **dairy** product.","ko":"우유는 유제품이다."},{"en":"The local **dairy** sells fresh milk.","ko":"그 지역 낙농장은 신선한 우유를 판다."}]},{"id":"vocab-0709","word":"damage","ipa":"/ˈdæmɪdʒ/","kr":"**대**미지","mark":"**","pos":"명/동","mean":"① 손상 ② 피해를 입히다","ex":[{"en":"The storm **damaged** several houses.","ko":"폭풍이 집 여러 채를 손상시켰다."},{"en":"The storm caused great **damage**.","ko":"그 폭풍은 큰 피해를 입혔다."}]},{"id":"vocab-0710","word":"damp","ipa":"/dæmp/","kr":"**댐프**","mark":"","pos":"형","mean":"① 축축한 ② 습한","ex":[{"en":"The ground was still **damp**.","ko":"땅은 아직 축축했다."},{"en":"The basement is dark and **damp**.","ko":"지하실은 어둡고 습하다."}]},{"id":"vocab-0711","word":"dance","ipa":"/dæns/","kr":"**댄스**","mark":"*","pos":"동/명","mean":"① 춤추다 ② 춤","ex":[{"en":"They **danced** at the company party.","ko":"그들은 회사 파티에서 춤췄다."},{"en":"They **danced** to the music.","ko":"그들은 음악에 맞추어 춤을 추었다."}]},{"id":"vocab-0712","word":"danger","ipa":"/ˈdeɪndʒər/","kr":"**데인**저","mark":"*","pos":"명","mean":"위험","ex":[{"en":"The sign warns of **danger**.","ko":"그 표지판은 위험을 경고한다."}]},{"id":"vocab-0713","word":"dare","ipa":"/der/","kr":"**데어**","mark":"**","pos":"동","mean":"① 감히 ~하다 ② 도전하다","ex":[{"en":"She **dared** to speak the truth.","ko":"그녀는 감히 진실을 말했다."},{"en":"She **dared** him to speak in public.","ko":"그녀는 그에게 공개적으로 말해 보라고 도전했다."}]},{"id":"vocab-0714","word":"dark","ipa":"/dɑːrk/","kr":"**다ː**크","mark":"*","pos":"형/명","mean":"① 어두운 ② 어둠","ex":[{"en":"The hallway became **dark** after the power failure.","ko":"정전 후에 복도가 어두워졌다."},{"en":"We could not see anything in the **dark**.","ko":"우리는 어둠 속에서 아무것도 볼 수 없었다."}]},{"id":"vocab-0715","word":"darling","ipa":"/ˈdɑːrlɪŋ/","kr":"**다ː**링","mark":"**","pos":"명","mean":"사랑하는 사람","ex":[{"en":"Good night, my **darling**.","ko":"잘 자, 내 사랑."}]},{"id":"vocab-0716","word":"dash","ipa":"/dæʃ/","kr":"**대시**","mark":"","pos":"동/명","mean":"① 돌진하다 ② 질주","ex":[{"en":"He **dashed** across the road.","ko":"그는 길을 가로질러 돌진했다."},{"en":"Jun made a **dash** for the elevator.","ko":"준은 엘리베이터를 향해 질주했다."}]},{"id":"vocab-0717","word":"database","ipa":"/ˈdeɪtəbeɪs/","kr":"**데이**터베이스","mark":"","pos":"명","mean":"데이터베이스","ex":[{"en":"The names are stored in a **database**.","ko":"그 이름들은 데이터베이스에 저장되어 있다."}]},{"id":"vocab-0718","word":"date","ipa":"/deɪt/","kr":"**데잇**","mark":"*","pos":"명","mean":"① 날짜 ② 데이트","ex":[{"en":"What is the **date** today?","ko":"오늘 날짜가 뭐니?"},{"en":"They went on a **date** after work.","ko":"그들은 퇴근 후 데이트를 했다."}]},{"id":"vocab-0719","word":"datum (data)","ipa":"/ˈdeɪtəm/","kr":"**데이**텀","mark":"","pos":"명","mean":"① 자료 ② 데이터","ex":[{"en":"Each **datum** was checked carefully.","ko":"각 자료는 신중하게 확인되었다."},{"en":"Each **datum** is stored separately.","ko":"각 데이터는 별도로 저장된다."}]},{"id":"vocab-0720","word":"daughter","ipa":"/ˈdɔːtər/","kr":"**도ː**터","mark":"*","pos":"명","mean":"딸","ex":[{"en":"Their **daughter** is ten years old.","ko":"그들의 딸은 열 살이다."}]},{"id":"vocab-0721","word":"dawn","ipa":"/dɔːn/","kr":"**돈ː**","mark":"**","pos":"명","mean":"① 새벽 ② 여명","ex":[{"en":"We left at **dawn**.","ko":"우리는 새벽에 떠났다."},{"en":"A pale light appeared at **dawn**.","ko":"여명에 희미한 빛이 나타났다."}]},{"id":"vocab-0722","word":"day","ipa":"/deɪ/","kr":"* },{"en":"James was **decent** to every customer.","ko":"제임스는 모든 고객에게 예의 바랐다."}]},{"id":"vocab-0731","word":"decide (decision)","ipa":"/dɪˈsaɪd/","kr":"디**사이드**","mark":"*","pos":"동","mean":"결정하다","ex":[{"en":"We **decided** to leave early.","ko":"우리는 일찍 떠나기로 결정했다."}]},{"id":"vocab-0732","word":"deck","ipa":"/dek/","kr":"**덱**","mark":"**","pos":"명","mean":"갑판","ex":[{"en":"We stood on the ship's **deck**.","ko":"우리는 배의 갑판에 서 있었다."}]},{"id":"vocab-0733","word":"declare","ipa":"/dɪˈkler/","kr":"디**클레어**","mark":"","pos":"동","mean":"① 선언하다 ② 신고하다","ex":[{"en":"The judge **declared** him innocent.","ko":"판사는 그가 무죄라고 선언했다."},{"en":"You must **declare** expensive goods at customs.","ko":"세관에서 비싼 물품을 신고해야 한다."}]},{"id":"vocab-0734","word":"decline (declension)","ipa":"/dɪˈklaɪn/","kr":"디**클라인**","mark":"","pos":"동/명","mean":"① 감소하다 ② 거절하다 ③ 감소","ex":[{"en":"Sales **declined** last month.","ko":"지난달에 판매량이 감소했다."},{"en":"She **declined** the job offer.","ko":"그녀는 그 일자리 제안을 거절했다."},{"en":"Sales began to **decline**.","ko":"매출이 감소하기 시작했다."}]},{"id":"vocab-0735","word":"decorate","ipa":"/ˈdekəreɪt/","kr":"**데**커레이트","mark":"**","pos":"동","mean":"장식하다","ex":[{"en":"They **decorated** the room with flowers.","ko":"그들은 꽃으로 방을 장식했다."}]},{"id":"vocab-0736","word":"decrease","ipa":"/dɪˈkriːs/","kr":"디**크리ː**스","mark":"","pos":"동/명","mean":"① 감소하다 ② 감소","ex":[{"en":"The population began to **decrease**.","ko":"인구가 감소하기 시작했다."},{"en":"A **decrease** in errors improved the service.","ko":"오류의 감소가 서비스를 개선했다."}]},{"id":"vocab-0737","word":"dedicate","ipa":"/ˈdedɪkeɪt/","kr":"**데**디케이트","mark":"","pos":"동","mean":"① 바치다 ② 헌신하다","ex":[{"en":"She **dedicated** the book to her parents.","ko":"그녀는 그 책을 부모님께 바쳤다."},{"en":"He **dedicated** himself to employee training.","ko":"그는 직원 교육에 헌신했다."}]},{"id":"vocab-0738","word":"deep","ipa":"/diːp/","kr":"**딥ː**","mark":"*","pos":"형/부","mean":"① 깊은 ② 깊게","ex":[{"en":"The lake is very **deep**.","ko":"그 호수는 매우 깊다."},{"en":"The river runs **deep**.","ko":"그 강은 깊게 흐른다."}]},{"id":"vocab-0739","word":"defeat","ipa":"/dɪˈfiːt/","kr":"디**피ː**트","mark":"","pos":"동/명","mean":"① 패배시키다 ② 패배","ex":[{"en":"Our team **defeated** the strongest competitor.","ko":"우리 팀은 가장 강한 경쟁자를 패배시켰다."},{"en":"The **defeat** ended their season.","ko":"그 패배로 그들의 시즌이 끝났다."}]},{"id":"vocab-0740","word":"defend (defendant)","ipa":"/dɪˈfend/","kr":"디**펜드**","mark":"","pos":"동","mean":"① 방어하다 ② 옹호하다","ex":[{"en":"The soldiers **defended** the town.","ko":"군인들은 그 마을을 방어했다."},{"en":"The lawyer **defended** the employee's rights.","ko":"그 변호사는 직원의 권리를 옹호했다."}]},{"id":"vocab-0741","word":"defense / defence","ipa":"/dɪˈfens/","kr":"디**펜스**","mark":"**","pos":"명","mean":"① 방어 ② 수비","ex":[{"en":"The wall was built for **defense**.","ko":"그 벽은 방어를 위해 지어졌다."},{"en":"The home team has a strong **defense**.","ko":"홈팀은 수비가 강하다."}]},{"id":"vocab-0742","word":"deficiency","ipa":"/dɪˈfɪʃnsi/","kr":"디**피**션시","mark":"","pos":"명","mean":"① 결핍 ② 부족","ex":[{"en":"A vitamin **deficiency** can cause illness.","ko":"비타민 결핍은 병을 일으킬 수 있다."},{"en":"Iron **deficiency** often causes tiredness.","ko":"철분 부족은 흔히 피로를 일으킨다."}]},{"id":"vocab-0743","word":"deficit","ipa":"/ˈdefɪsɪt/","kr":"**데**피싯","mark":"","pos":"명","mean":"① 적자 ② 부족","ex":[{"en":"The local company has a large **deficit**.","ko":"그 지역 회사는 큰 적자를 안고 있다."},{"en":"That team faces a staff **deficit**.","ko":"그 팀은 인력 부족에 직면했다."}]},{"id":"vocab-0744","word":"define","ipa":"/dɪˈfaɪn/","kr":"디**파인**","mark":"**","pos":"동","mean":"정의하다","ex":[{"en":"Can you **define** this word?","ko":"이 단어를 정의할 수 있니?"}]},{"id":"vocab-0745","word":"definite","ipa":"/ˈdefɪnət/","kr":"**데**피닛","mark":"**","pos":"형","mean":"① 확실한 ② 분명한","ex":[{"en":"We need a **definite** answer.","ko":"우리는 확실한 답이 필요하다."},{"en":"There is a **definite** difference between the two plans.","ko":"그 두 계획 사이에는 분명한 차이가 있다."}]},{"id":"vocab-0746","word":"degree","ipa":"/dɪˈɡriː/","kr":"디**그리ː**","mark":"**","pos":"명","mean":"① 정도 ② 학위 ③ 도","ex":[{"en":"The two versions differ **to some degree**.","ko":"두 버전은 어느 정도 다르다."},{"en":"Sora earned a **degree** in computer science.","ko":"소라는 컴퓨터 과학 학위를 받았다."},{"en":"The temperature rose by three **degrees**.","ko":"기온이 3도 올랐다."}]},{"id":"vocab-0747","word":"delay","ipa":"/dɪˈleɪ/","kr":"디**레이**","mark":"**","pos":"명/동","mean":"① 지연 ② 미루다","ex":[{"en":"Bad weather **delayed** the flight.","ko":"나쁜 날씨가 비행을 지연시켰다."},{"en":"We decided to **delay** the meeting until Friday.","ko":"우리는 회의를 금요일까지 미루기로 했다."}]},{"id":"vocab-0748","word":"delegate","ipa":"/ˈdelɪɡət/","kr":"**델**리깃","mark":"","pos":"명/동","mean":"① 대표 ② 위임하다","ex":[{"en":"Each country sent a **delegate**.","ko":"각 나라는 대표 한 명을 보냈다."},{"en":"A department manager **delegated** the task to me.","ko":"한 부서 관리자는 그 업무를 나에게 위임했다."}]},{"id":"vocab-0749","word":"delete","ipa":"/dɪˈliːt/","kr":"디**리ː**트","mark":"","pos":"동","mean":"삭제하다","ex":[{"en":"Please **delete** this file.","ko":"이 파일을 삭제해 주세요."}]},{"id":"vocab-0750","word":"deliberate","ipa":"/dɪˈlɪbərət/","kr":"디**리**버릿","mark":"","pos":"형","mean":"① 고의의 ② 신중한","ex":[{"en":"It was a **deliberate** mistake.","ko":"그것은 고의적인 실수였다."},{"en":"After careful thought, she made a **deliberate** decision.","ko":"신중히 생각한 뒤 그녀는 신중한 결정을 내렸다."}]},{"id":"vocab-0751","word":"delicate","ipa":"/ˈdelɪkət/","kr":"**델**리킷","mark":"","pos":"형","mean":"① 섬세한 ② 연약한","ex":[{"en":"Handle the **delicate** glass carefully.","ko":"그 섬세한 유리잔을 조심해서 다루어라."},{"en":"The **delicate** plant needs gentle care.","ko":"그 연약한 식물은 부드러운 관리가 필요하다."}]},{"id":"vocab-0752","word":"delicious","ipa":"/dɪˈlɪʃəs/","kr":"딜**리**셔스","mark":"*","pos":"형","mean":"맛있는","ex":[{"en":"The soup smells **delicious**.","ko":"그 수프는 맛있는 냄새가 난다."}]},{"id":"vocab-0753","word":"delight","ipa":"/dɪˈlaɪt/","kr":"딜**라잇**","mark":"**","pos":"명/동","mean":"① 기쁨 ② 기쁘게 하다","ex":[{"en":"The gift filled her with **delight**.","ko":"그 선물은 그녀를 기쁨으로 채웠다."},{"en":"The news **delighted** the whole team.","ko":"그 소식은 팀 전체를 기쁘게 했다."}]},{"id":"vocab-0754","word":"deliver","ipa":"/dɪˈlɪvər/","kr":"딜**리**버","mark":"**","pos":"동","mean":"① 배달하다 ② 전달하다","ex":[{"en":"They **deliver** food to our door.","ko":"그들은 우리 집 문 앞까지 음식을 배달한다."},{"en":"Please **deliver** this message to the team.","ko":"이 메시지를 팀에 전달해 주세요."}]},{"id":"vocab-0755","word":"demand","ipa":"/dɪˈmænd/","kr":"디**맨드**","mark":"**","pos":"명/동","mean":"① 요구 ② 수요 ③ 요구하다","ex":[{"en":"The **demand** for higher pay grew.","ko":"더 높은 임금에 대한 요구가 커졌다."},{"en":"**Demand** for cloud services is growing.","ko":"클라우드 서비스에 대한 수요가 증가하고 있다."},{"en":"Customers **demanded** better service.","ko":"고객들은 더 나은 서비스를 요구했다."}]},{"id":"vocab-0756","word":"democracy","ipa":"/dɪˈmɑːkrəsi/","kr":"디**마**크러시","mark":"","pos":"명","mean":"민주주의","ex":[{"en":"Korea is a **democracy**.","ko":"한국은 민주주의 국가다."}]},{"id":"vocab-0757","word":"democrat","ipa":"/ˈdeməkræt/","kr":"**데**머크랫","mark":"","pos":"명","mean":"민주주의자","ex":[{"en":"Ethan described himself as a **democrat**.","ko":"이선은 자신을 민주주의자라고 말했다."}]},{"id":"vocab-0758","word":"demon","ipa":"/ˈdiːmən/","kr":"**디ː**먼","mark":"","pos":"명","mean":"① 악마 ② 악령","ex":[{"en":"The hero fought a powerful **demon**.","ko":"그 영웅은 강력한 악마와 싸웠다."},{"en":"The story says an evil spirit was a **demon**.","ko":"그 이야기는 악령이 악마였다고 말한다."}]},{"id":"vocab-0759","word":"demonstrate","ipa":"/ˈdemənstreɪt/","kr":"**데**먼스트레이트","mark":"**","pos":"동","mean":"① 증명하다 ② 시위하다","ex":[{"en":"The results **demonstrate** that the tool works.","ko":"그 결과는 그 도구가 작동한다는 것을 증명한다."},{"en":"Workers **demonstrated** outside the office.","ko":"노동자들은 사무실 밖에서 시위했다."}]},{"id":"vocab-0760","word":"dense","ipa":"/dens/","kr":"**덴스**","mark":"","pos":"형","mean":"① 빽빽한 ② 밀집한","ex":[{"en":"The forest is very **dense**.","ko":"그 숲은 매우 빽빽하다."},{"en":"This district has a **dense** population.","ko":"이 지역은 인구가 밀집해 있다."}]},{"id":"vocab-0761","word":"dentist","ipa":"/ˈdentɪst/","kr":"**덴**티스트","mark":"**","pos":"명","mean":"치과 의사","ex":[{"en":"I visit the **dentist** twice a year.","ko":"나는 일 년에 두 번 치과에 간다."}]},{"id":"vocab-0762","word":"deny","ipa":"/dɪˈnaɪ/","kr":"디**나이**","mark":"**","pos":"동","mean":"① 부인하다 ② 거부하다","ex":[{"en":"He **denied** taking the money.","ko":"그는 돈을 가져갔다는 사실을 부인했다."},{"en":"Our manager **denied** our request for more time.","ko":"우리 관리자는 더 많은 시간을 달라는 우리의 요청을 거부했다."}]},{"id":"vocab-0763","word":"depart (department, departure)","ipa":"/dɪˈpɑːrt/","kr":"디**파ː**트","mark":"","pos":"동","mean":"① 출발하다 ② 떠나다","ex":[{"en":"The train **departs** at nine.","ko":"그 기차는 아홉 시에 출발한다."},{"en":"The bus will **depart** at six.","ko":"그 버스는 6시에 떠날 것이다."}]},{"id":"vocab-0764","word":"depend (dependence, independent)","ipa":"/dɪˈpend/","kr":"디**펜드**","mark":"**","pos":"동","mean":"① 의존하다 ② ~에 달려 있다","ex":[{"en":"Children **depend** on their parents.","ko":"아이들은 부모에게 의존한다."},{"en":"Success **depends** on hard work.","ko":"성공은 노력에 달려 있다."}]},{"id":"vocab-0765","word":"depict","ipa":"/dɪˈpɪkt/","kr":"디**픽트**","mark":"","pos":"동","mean":"① 묘사하다 ② 그리다","ex":[{"en":"The painting **depicts** a quiet village.","ko":"그 그림은 조용한 마을을 묘사한다."},{"en":"The artist **depicted** the city in bright colors.","ko":"그 화가는 도시를 밝은 색으로 그렸다."}]},{"id":"vocab-0766","word":"deposit","ipa":"/dɪˈpɑːzɪt/","kr":"디**파**짓","mark":"","pos":"명/동","mean":"① 보증금 ② 예금하다","ex":[{"en":"We paid a **deposit** for the apartment.","ko":"우리는 그 아파트의 보증금을 냈다."},{"en":"She **deposited** the money in the bank.","ko":"그녀는 돈을 은행에 예금했다."}]},{"id":"vocab-0767","word":"depress","ipa":"/dɪˈpres/","kr":"디**프레스**","mark":"**","pos":"동","mean":"① 우울하게 하다 ② 낙담시키다","ex":[{"en":"The bad news **depressed** her.","ko":"그 나쁜 소식이 그녀를 우울하게 했다."},{"en":"Repeated failures can **depress** new learners.","ko":"반복된 실패는 새 학습자들을 낙담시킬 수 있다."}]},{"id":"vocab-0768","word":"deprive","ipa":"/dɪˈpraɪv/","kr":"디**프라이브**","mark":"","pos":"동","mean":"① 박탈하다 ② 빼앗다","ex":[{"en":"The rule **deprived** employees of a useful benefit.","ko":"그 규칙은 직원들에게서 유용한 혜택을 박탈했다."},{"en":"The illness **deprived** him of sleep.","ko":"그 병은 그에게서 잠을 빼앗았다."}]},{"id":"vocab-0769","word":"derive","ipa":"/dɪˈraɪv/","kr":"디**라이브**","mark":"","pos":"동","mean":"① 끌어내다 ② 유래하다","ex":[{"en":"We **derived** a useful lesson from the error.","ko":"우리는 그 오류에서 유용한 교훈을 끌어냈다."},{"en":"Many English words **derive** from Latin.","ko":"많은 영어 단어가 라틴어에서 유래한다."}]},{"id":"vocab-0770","word":"descend","ipa":"/dɪˈsend/","kr":"디**센드**","mark":"","pos":"동","mean":"① 내려가다 ② 하강하다","ex":[{"en":"We **descended** the hill slowly.","ko":"우리는 언덕을 천천히 내려갔다."},{"en":"The plane began to **descend** for landing.","ko":"비행기는 착륙을 위해 하강하기 시작했다."}]},{"id":"vocab-0771","word":"describe (description)","ipa":"/dɪˈskraɪb/","kr":"디**스크라이브**","mark":"**","pos":"동","mean":"① 묘사하다 ② 설명하다","ex":[{"en":"Please **describe** your house.","ko":"네 집을 묘사해 봐라."},{"en":"Please **describe** how the new process works.","ko":"새 절차가 어떻게 작동하는지 설명해 주세요."}]},{"id":"vocab-0772","word":"desert","ipa":"/ˈdezərt/","kr":"**데**저트","mark":"**","pos":"명","mean":"사막","ex":[{"en":"Few plants grow in the **desert**.","ko":"사막에서는 식물이 거의 자라지 않는다."}]},{"id":"vocab-0773","word":"deserve","ipa":"/dɪˈzɜːrv/","kr":"디**저ː**브","mark":"**","pos":"동","mean":"~을 받을 만하다","ex":[{"en":"You **deserve** a reward.","ko":"너는 상을 받을 만하다."}]},{"id":"vocab-0774","word":"design","ipa":"/dɪˈzaɪn/","kr":"디**자인**","mark":"*","pos":"명/동","mean":"① 디자인 ② 설계하다","ex":[{"en":"She **designed** a simple logo.","ko":"그녀는 단순한 로고를 디자인했다."},{"en":"The engineer **designed** a safer network.","ko":"그 기술자는 더 안전한 네트워크를 설계했다."}]},{"id":"vocab-0775","word":"designate","ipa":"/ˈdezɪɡneɪt/","kr":"**데**지그네이트","mark":"","pos":"동","mean":"① 지정하다 ② 지명하다","ex":[{"en":"This area was **designated** as a park.","ko":"이 지역은 공원으로 지정되었다."},{"en":"The board **designated** her as team leader.","ko":"이사회는 그녀를 팀장으로 지명했다."}]},{"id":"vocab-0776","word":"desire","ipa":"/dɪˈzaɪər/","kr":"디**자이**어","mark":"**","pos":"명/동","mean":"① 욕망 ② 바라다","ex":[{"en":"Olivia has a strong **desire** to win.","ko":"올리비아는 이기고 싶은 강한 욕망이 있다."},{"en":"I **desire** a better work-life balance.","ko":"나는 더 나은 일과 삶의 균형을 바란다."}]},{"id":"vocab-0777","word":"desk","ipa":"/desk/","kr":"**데스크**","mark":"*","pos":"명","mean":"책상","ex":[{"en":"My books are on the **desk**.","ko":"내 책들은 책상 위에 있다."}]},{"id":"vocab-0778","word":"despair","ipa":"/dɪˈsper/","kr":"디**스페어**","mark":"","pos":"명/동","mean":"① 절망 ② 절망하다","ex":[{"en":"Noah was filled with **despair**.","ko":"노아는 절망으로 가득 찼다."},{"en":"Claire refused to give in to **despair**.","ko":"클레어는 절망에 굴복하기를 거부했다."}]},{"id":"vocab-0779","word":"desperate","ipa":"/ˈdespərət/","kr":"**데**스퍼릿","mark":"**","pos":"형","mean":"① 필사적인 ② 절망적인","ex":[{"en":"Olivia made a **desperate** attempt.","ko":"올리비아는 필사적인 시도를 했다."},{"en":"A growing company faced a **desperate** situation.","ko":"한 성장 중인 회사는 절망적인 상황에 직면했다."}]},{"id":"vocab-0780","word":"despite","ipa":"/dɪˈspaɪt/","kr":"디**스파잇**","mark":"**","pos":"전","mean":"~에도 불구하고","ex":[{"en":"**Despite** the rain, the game continued.","ko":"비에도 불구하고 경기는 계속되었다."}]},{"id":"vocab-0781","word":"destine (destination)","ipa":"/ˈdestɪn/","kr":"**데**스틴","mark":"","pos":"동","mean":"① 운명 짓다 ② 예정하다","ex":[{"en":"The book seemed **destined** for success.","ko":"그 책은 성공할 운명인 듯했다."},{"en":"The shipment is **destined** to arrive tomorrow.","ko":"그 배송품은 내일 도착하도록 예정되어 있다."}]},{"id":"vocab-0782","word":"destiny","ipa":"/ˈdestəni/","kr":"**데**스터니","mark":"","pos":"명","mean":"운명","ex":[{"en":"Olivia believed it was her **destiny**.","ko":"올리비아는 그것이 자신의 운명이라고 믿었다."}]},{"id":"vocab-0783","word":"destroy","ipa":"/dɪˈstrɔɪ/","kr":"디**스트로이**","mark":"**","pos":"동","mean":"파괴하다","ex":[{"en":"The fire **destroyed** the house.","ko":"그 화재가 집을 파괴했다."}]},{"id":"vocab-0784","word":"destruct (destruction)","ipa":"/dɪˈstrʌkt/","kr":"디**스트럭트**","mark":"","pos":"동","mean":"파괴하다","ex":[{"en":"The device will **destruct** itself after use.","ko":"그 장치는 사용 후 스스로 파괴될 것이다."}]},{"id":"vocab-0785","word":"detach","ipa":"/dɪˈtætʃ/","kr":"디**태치**","mark":"","pos":"동","mean":"① 분리하다 ② 떼어내다","ex":[{"en":"**Detach** the cable from the monitor.","ko":"모니터에서 케이블을 분리해라."},{"en":"The label **detaches** easily from the bottle.","ko":"그 라벨은 병에서 쉽게 떼어진다."}]},{"id":"vocab-0786","word":"detail","ipa":"/ˈdiːteɪl/","kr":"**디ː**테일","mark":"**","pos":"명","mean":"세부 사항","ex":[{"en":"Please check every **detail** in the contract.","ko":"계약서의 모든 세부 사항을 확인해 주세요."}]},{"id":"vocab-0787","word":"detect","ipa":"/dɪˈtekt/","kr":"디**텍트**","mark":"**","pos":"동","mean":"① 발견하다 ② 감지하다","ex":[{"en":"The test can **detect** the disease early.","ko":"그 검사는 질병을 일찍 발견할 수 있다."},{"en":"The alarm can **detect** smoke.","ko":"그 경보기는 연기를 감지할 수 있다."}]},{"id":"vocab-0788","word":"determine","ipa":"/dɪˈtɜːrmɪn/","kr":"디**터ː**민","mark":"**","pos":"동","mean":"① 결정하다 ② 알아내다","ex":[{"en":"The results will **determine** the winner.","ko":"그 결과가 우승자를 결정할 것이다."},{"en":"The test will **determine** the cause of the error.","ko":"그 검사는 오류의 원인을 알아낼 것이다."}]},{"id":"vocab-0789","word":"develop","ipa":"/dɪˈveləp/","kr":"디**벨**럽","mark":"**","pos":"동","mean":"① 발전시키다 ② 개발하다","ex":[{"en":"The city **developed** quickly.","ko":"그 도시는 빠르게 발전했다."},{"en":"The firm **developed** a new product.","ko":"그 기업은 신제품을 개발했다."}]},{"id":"vocab-0790","word":"device","ipa":"/dɪˈvaɪs/","kr":"디**바이스**","mark":"","pos":"명","mean":"① 장치 ② 기기","ex":[{"en":"This **device** measures temperature.","ko":"이 장치는 온도를 측정한다."},{"en":"Turn off every mobile **device** during the meeting.","ko":"회의 중에는 모든 모바일 기기를 꺼라."}]},{"id":"vocab-0791","word":"devil","ipa":"/ˈdevl/","kr":"**데**블","mark":"","pos":"명","mean":"악마","ex":[{"en":"The story is about a man who meets the **devil**.","ko":"그 이야기는 악마를 만난 남자에 관한 것이다."}]},{"id":"vocab-0792","word":"devise","ipa":"/dɪˈvaɪz/","kr":"디**바이즈**","mark":"","pos":"동","mean":"① 고안하다 ② 궁리하다","ex":[{"en":"They **devised** a plan to save water.","ko":"그들은 물을 절약할 계획을 고안했다."},{"en":"We must **devise** a way to reduce costs.","ko":"우리는 비용을 줄일 방법을 궁리해야 한다."}]},{"id":"vocab-0793","word":"devote","ipa":"/dɪˈvoʊt/","kr":"디**보트**","mark":"","pos":"동","mean":"① 바치다 ② 전념하다","ex":[{"en":"She **devoted** her time to the project.","ko":"그녀는 자신의 시간을 그 프로젝트에 바쳤다."},{"en":"He **devoted** himself to science.","ko":"그는 과학에 전념했다."}]},{"id":"vocab-0794","word":"diabetes","ipa":"/ˌdaɪəˈbiːtiːz/","kr":"다이어**비ː**티즈","mark":"","pos":"명","mean":"당뇨병","ex":[{"en":"Exercise can help manage **diabetes**.","ko":"운동은 당뇨병 관리에 도움이 될 수 있다."}]},{"id":"vocab-0795","word":"dialogue / dialog","ipa":"/ˈdaɪəlɔːɡ/","kr":"**다이**얼로그","mark":"*","pos":"명","mean":"대화","ex":[{"en":"The story contains a lot of **dialogue**.","ko":"그 이야기에는 대화가 많이 들어 있다."}]},{"id":"vocab-0796","word":"diary","ipa":"/ˈdaɪəri/","kr":"**다이**어리","mark":"**","pos":"명","mean":"일기","ex":[{"en":"Claire writes in her **diary** every night.","ko":"클레어는 매일 밤 일기를 쓴다."}]},{"id":"vocab-0797","word":"dictate","ipa":"/ˈdɪkteɪt/","kr":"**딕**테이트","mark":"","pos":"동","mean":"① 받아쓰게 하다 ② 명령하다","ex":[{"en":"The teacher **dictated** a sentence.","ko":"선생님이 한 문장을 받아쓰게 했다."},{"en":"This manager cannot **dictate** every detail.","ko":"이 관리자는 모든 세부 사항을 명령할 수 없다."}]},{"id":"vocab-0798","word":"dictionary","ipa":"/ˈdɪkʃəneri/","kr":"**딕**셔네리","mark":"**","pos":"명","mean":"사전","ex":[{"en":"Look up the word in a **dictionary**.","ko":"그 단어를 사전에서 찾아봐라."}]},{"id":"vocab-0799","word":"die","ipa":"/daɪ/","kr":"**다이**","mark":"*","pos":"동","mean":"죽다","ex":[{"en":"The plant **died** without water.","ko":"그 식물은 물이 없어 죽었다."}]},{"id":"vocab-0800","word":"diet","ipa":"/ˈdaɪət/","kr":"**다이**엇","mark":"**","pos":"명","mean":"① 식단 ② 다이어트","ex":[{"en":"A healthy **diet** includes vegetables.","ko":"건강한 식단에는 채소가 포함된다."},{"en":"Minho started a **diet** to lose weight.","ko":"민호는 체중을 줄이려고 다이어트를 시작했다."}]},{"id":"vocab-0801","word":"differ (different)","ipa":"/ˈdɪfər/","kr":"**디**퍼","mark":"","pos":"동","mean":"① 다르다 ② 의견이 다르다","ex":[{"en":"Our opinions **differ**.","ko":"우리의 의견은 다르다."},{"en":"My answer **differs** from yours.","ko":"내 답은 네 답과 다르다."}]},{"id":"vocab-0802","word":"difficult","ipa":"/ˈdɪfɪkəlt/","kr":"**디**피컬트","mark":"*","pos":"형","mean":"① 어려운 ② 힘든","ex":[{"en":"The new software is **difficult** to use.","ko":"새 소프트웨어는 사용하기 어렵다."},{"en":"It was a **difficult** week for the team.","ko":"그 팀에게 힘든 한 주였다."}]},{"id":"vocab-0803","word":"dig","ipa":"/dɪɡ/","kr":"**딕**","mark":"**","pos":"동","mean":"① 파다 ② 캐다","ex":[{"en":"Workers **dug** a deep hole for the cable.","ko":"작업자들은 케이블을 위해 깊은 구멍을 팠다."},{"en":"They **dug** gold from the old mine.","ko":"그들은 오래된 광산에서 금을 캤다."}]},{"id":"vocab-0804","word":"dignity","ipa":"/ˈdɪɡnəti/","kr":"**딕**너티","mark":"","pos":"명","mean":"① 존엄 ② 품위","ex":[{"en":"Everyone should be treated with **dignity**.","ko":"모든 사람은 존엄하게 대우받아야 한다."},{"en":"Yuna faced hardship with **dignity**.","ko":"유나는 어려움을 품위 있게 마주했다."}]},{"id":"vocab-0805","word":"dimension","ipa":"/dɪˈmenʃn/","kr":"디**멘**션","mark":"","pos":"명","mean":"① 차원 ② 크기","ex":[{"en":"The problem has many **dimensions**.","ko":"그 문제는 여러 차원을 지닌다."},{"en":"Measure the **dimensions** of the box.","ko":"그 상자의 크기를 재라."}]},{"id":"vocab-0806","word":"diminish","ipa":"/dɪˈmɪnɪʃ/","kr":"디**미**니시","mark":"","pos":"동","mean":"① 줄어들다 ② 감소시키다","ex":[{"en":"The pain slowly **diminished**.","ko":"통증이 천천히 줄어들었다."},{"en":"Better tools can **diminish** the workload.","ko":"더 나은 도구는 업무량을 감소시킬 수 있다."}]},{"id":"vocab-0807","word":"dine","ipa":"/daɪn/","kr":"**다인**","mark":"","pos":"동","mean":"식사하다","ex":[{"en":"We **dined** at a fine restaurant.","ko":"우리는 훌륭한 식당에서 식사했다."}]},{"id":"vocab-0808","word":"dinner","ipa":"/ˈdɪnər/","kr":"**디**너","mark":"*","pos":"명","mean":"저녁 식사","ex":[{"en":"**Dinner** is ready.","ko":"저녁 식사가 준비됐다."}]},{"id":"vocab-0809","word":"dip","ipa":"/dɪp/","kr":"**딥**","mark":"","pos":"동/명","mean":"① 담그다 ② 살짝 적심","ex":[{"en":"**Dip** the brush in the paint.","ko":"붓을 페인트에 담가라."},{"en":"The bread needs only a quick **dip** in the soup.","ko":"그 빵은 수프에 살짝 적시면 된다."}]},{"id":"vocab-0810","word":"diplomat","ipa":"/ˈdɪpləmæt/","kr":"**디**플러맷","mark":"","pos":"명","mean":"외교관","ex":[{"en":"The **diplomat** met the president to discuss trade.","ko":"그 외교관은 무역을 논의하려고 대통령을 만났다."}]},{"id":"vocab-0811","word":"direct","ipa":"/dəˈrekt/","kr":"더**렉트**","mark":"**","pos":"형/동","mean":"① 직접적인 ② 지시하다","ex":[{"en":"We need a **direct** answer from the vendor.","ko":"우리는 공급업체의 직접적인 답변이 필요하다."},{"en":"This manager **directed** us to wait outside.","ko":"이 관리자는 우리에게 밖에서 기다리라고 지시했다."}]},{"id":"vocab-0812","word":"dirt (dirty)","ipa":"/dɜːrt/","kr":"**더ː**트","mark":"**","pos":"명","mean":"① 먼지 ② 흙","ex":[{"en":"There was **dirt** on the monitor.","ko":"모니터에 먼지가 있었다."},{"en":"His shoes were covered in **dirt**.","ko":"그의 신발은 흙으로 뒤덮였다."}]},{"id":"vocab-0813","word":"disappoint","ipa":"/ˌdɪsəˈpɔɪnt/","kr":"디서**포인트**","mark":"**","pos":"동","mean":"실망시키다","ex":[{"en":"I do not want to **disappoint** you.","ko":"나는 너를 실망시키고 싶지 않다."}]},{"id":"vocab-0814","word":"disaster","ipa":"/dɪˈzæstər/","kr":"디**재**스터","mark":"","pos":"명","mean":"① 재난 ② 재앙","ex":[{"en":"The storm caused a major **disaster**.","ko":"그 폭풍은 큰 재난을 일으켰다."},{"en":"A long system failure could become a **disaster**.","ko":"장시간의 시스템 장애는 재앙이 될 수 있다."}]},{"id":"vocab-0815","word":"disc (disk)","ipa":"/dɪsk/","kr":"**디스크**","mark":"**","pos":"명","mean":"① 원반 ② 디스크","ex":[{"en":"The moon looks like a bright **disc**.","ko":"달은 밝은 원반처럼 보인다."},{"en":"The data is stored on the **disc**.","ko":"그 데이터는 디스크에 저장되어 있다."}]},{"id":"vocab-0816","word":"discipline","ipa":"/ˈdɪsəplɪn/","kr":"**디**서플린","mark":"**","pos":"명","mean":"① 규율 ② 훈련","ex":[{"en":"Good **discipline** helps students learn.","ko":"좋은 규율은 학생들의 학습을 돕는다."},{"en":"The course teaches mental **discipline**.","ko":"그 과정은 정신 훈련을 가르친다."}]},{"id":"vocab-0817","word":"discourse","ipa":"/ˈdɪskɔːrs/","kr":"**디**스코ː스","mark":"","pos":"명","mean":"① 담화 ② 담론","ex":[{"en":"The article studies political **discourse**.","ko":"그 기사는 정치 담화를 연구한다."},{"en":"The book discusses political **discourse** in modern media.","ko":"그 책은 현대 미디어의 정치 담론을 논한다."}]},{"id":"vocab-0818","word":"discriminate","ipa":"/dɪˈskrɪmɪneɪt/","kr":"디**스크리**미네이트","mark":"","pos":"동","mean":"① 차별하다 ② 구별하다","ex":[{"en":"We must not **discriminate** against anyone.","ko":"우리는 누구도 차별해서는 안 된다."},{"en":"The test can **discriminate** between the two materials.","ko":"그 검사는 두 재료를 구별할 수 있다."}]},{"id":"vocab-0819","word":"discuss","ipa":"/dɪˈskʌs/","kr":"디**스커스**","mark":"*","pos":"동","mean":"① 논의하다 ② 토론하다","ex":[{"en":"We **discussed** the problem together.","ko":"우리는 그 문제를 함께 논의했다."},{"en":"That team **discussed** the proposal for an hour.","ko":"그 팀은 제안을 한 시간 동안 토론했다."}]},{"id":"vocab-0820","word":"disgust","ipa":"/dɪsˈɡʌst/","kr":"디스**거스트**","mark":"**","pos":"명/동","mean":"① 혐오 ② 역겹게 하다","ex":[{"en":"The smell filled her with **disgust**.","ko":"그 냄새는 그녀에게 혐오감을 주었다."},{"en":"The rotten smell **disgusted** everyone.","ko":"썩은 냄새가 모두를 역겹게 했다."}]},{"id":"vocab-0821","word":"dish","ipa":"/dɪʃ/","kr":"**디시**","mark":"**","pos":"명","mean":"① 접시 ② 요리","ex":[{"en":"Wash the **dishes**, please.","ko":"접시를 씻어 주세요."},{"en":"This **dish** is very spicy.","ko":"이 요리는 매우 맵다."}]},{"id":"vocab-0822","word":"dismiss","ipa":"/dɪsˈmɪs/","kr":"디스**미스**","mark":"","pos":"동","mean":"① 해고하다 ② 묵살하다","ex":[{"en":"A local company **dismissed** two employees.","ko":"한 지역 회사는 직원 두 명을 해고했다."},{"en":"She **dismissed** the warning as unimportant.","ko":"그녀는 그 경고를 중요하지 않다고 묵살했다."}]},{"id":"vocab-0823","word":"display","ipa":"/dɪˈspleɪ/","kr":"디**스플레이**","mark":"**","pos":"명/동","mean":"① 전시 ② 진열하다","ex":[{"en":"The museum **displays** old paintings.","ko":"그 박물관은 오래된 그림들을 전시한다."},{"en":"The store **displayed** new shoes.","ko":"그 가게는 새 신발을 진열했다."}]},{"id":"vocab-0824","word":"dispute","ipa":"/dɪˈspjuːt/","kr":"디**스퓨ː**트","mark":"","pos":"명/동","mean":"① 분쟁 ② 반박하다","ex":[{"en":"The two sides settled the **dispute**.","ko":"양측은 그 분쟁을 해결했다."},{"en":"The lawyer **disputed** the witness's claim.","ko":"그 변호사는 증인의 주장을 반박했다."}]},{"id":"vocab-0825","word":"disrupt","ipa":"/dɪsˈrʌpt/","kr":"디스**럽트**","mark":"","pos":"동","mean":"① 방해하다 ② 지장을 주다","ex":[{"en":"The noise **disrupted** the meeting.","ko":"그 소음은 회의를 방해했다."},{"en":"The storm **disrupted** the flights.","ko":"그 폭풍이 항공편에 지장을 주었다."}]},{"id":"vocab-0826","word":"distance","ipa":"/ˈdɪstəns/","kr":"**디**스턴스","mark":"**","pos":"명","mean":"거리","ex":[{"en":"The school is within walking **distance**.","ko":"그 학교는 걸어갈 수 있는 거리에 있다."}]},{"id":"vocab-0827","word":"distinct","ipa":"/dɪˈstɪŋkt/","kr":"디**스팅트**","mark":"","pos":"형","mean":"① 뚜렷한 ② 별개의","ex":[{"en":"There is a **distinct** difference.","ko":"뚜렷한 차이가 있다."},{"en":"The two departments have **distinct** roles.","ko":"두 부서는 별개의 역할을 가진다."}]},{"id":"vocab-0828","word":"distinguish","ipa":"/dɪˈstɪŋɡwɪʃ/","kr":"디**스팅**귀시","mark":"","pos":"동","mean":"구별하다","ex":[{"en":"Can you **distinguish** right from wrong?","ko":"너는 옳고 그름을 구별할 수 있니?"}]},{"id":"vocab-0829","word":"distort","ipa":"/dɪˈstɔːrt/","kr":"디**스토ː**트","mark":"","pos":"동","mean":"① 왜곡하다 ② 비틀다","ex":[{"en":"The mirror **distorted** his face.","ko":"그 거울은 그의 얼굴을 왜곡했다."},{"en":"Heat **distorted** the plastic frame.","ko":"열이 플라스틱 틀을 비틀었다."}]},{"id":"vocab-0830","word":"distract","ipa":"/dɪˈstrækt/","kr":"디**스트랙트**","mark":"","pos":"동","mean":"산만하게 하다","ex":[{"en":"Noise **distracts** me from studying.","ko":"소음이 공부에서 나를 산만하게 한다."}]},{"id":"vocab-0831","word":"distribute","ipa":"/dɪˈstrɪbjuːt/","kr":"디**스트리**뷰트","mark":"","pos":"동","mean":"① 분배하다 ② 나누어 주다","ex":[{"en":"The project manager **distributed** the tasks evenly.","ko":"프로젝트 관리자는 업무를 고르게 분배했다."},{"en":"They **distributed** food to the poor.","ko":"그들은 가난한 사람들에게 음식을 나누어 주었다."}]},{"id":"vocab-0832","word":"district","ipa":"/ˈdɪstrɪkt/","kr":"**디**스트릭트","mark":"**","pos":"명","mean":"① 지역 ② 구역","ex":[{"en":"This is a busy shopping **district**.","ko":"이곳은 붐비는 쇼핑 지역이다."},{"en":"This parking **district** is marked in blue.","ko":"이 주차 구역은 파란색으로 표시되어 있다."}]},{"id":"vocab-0833","word":"disturb","ipa":"/dɪˈstɜːrb/","kr":"디**스터ː**브","mark":"**","pos":"동","mean":"① 방해하다 ② 어지럽히다","ex":[{"en":"Please do not **disturb** me.","ko":"나를 방해하지 마세요."},{"en":"Do not **disturb** or disorder the files.","ko":"파일들을 방해하거나 어지럽히지 마라."}]},{"id":"vocab-0834","word":"dive","ipa":"/daɪv/","kr":"**다이브**","mark":"**","pos":"동/명","mean":"① 뛰어들다 ② 잠수","ex":[{"en":"He **dived** into the pool.","ko":"그는 수영장으로 뛰어들었다."},{"en":"The **dive** lasted twenty minutes.","ko":"그 잠수는 20분 동안 계속되었다."}]},{"id":"vocab-0835","word":"diverse","ipa":"/daɪˈvɜːrs/","kr":"다이**버ː**스","mark":"","pos":"형","mean":"다양한","ex":[{"en":"The city has a **diverse** population.","ko":"그 도시는 다양한 인구를 가지고 있다."}]},{"id":"vocab-0836","word":"divide","ipa":"/dɪˈvaɪd/","kr":"디**바이드**","mark":"**","pos":"동","mean":"① 나누다 ② 분할하다","ex":[{"en":"**Divide** the work among four people.","ko":"그 일을 네 사람에게 나누어라."},{"en":"The whole team **divided** the project into three stages.","ko":"팀 전체는 프로젝트를 세 단계로 분할했다."}]},{"id":"vocab-0837","word":"divine","ipa":"/dɪˈvaɪn/","kr":"디**바인**","mark":"","pos":"형","mean":"① 신성한 ② 신의","ex":[{"en":"The ritual was considered **divine**.","ko":"그 의식은 신성한 것으로 여겨졌다."},{"en":"They believed in **divine** power.","ko":"그들은 신의 힘을 믿었다."}]},{"id":"vocab-0838","word":"divorce","ipa":"/dɪˈvɔːrs/","kr":"디**보ː**스","mark":"**","pos":"명/동","mean":"① 이혼 ② 이혼하다","ex":[{"en":"Their **divorce** made them sad.","ko":"그들의 이혼은 그들을 슬프게 했다."},{"en":"They decided to get a **divorce**.","ko":"그들은 이혼하기로 결정했다."}]},{"id":"vocab-0839","word":"do","ipa":"/duː/","kr":"**두ː**","mark":"*","pos":"동","mean":"하다","ex":[{"en":"What are you **doing** now?","ko":"너는 지금 무엇을 하고 있니?"}]},{"id":"vocab-0840","word":"doctor","ipa":"/ˈdɑːktər/","kr":"**닥**터","mark":"*","pos":"명","mean":"의사","ex":[{"en":"You should see a **doctor**.","ko":"너는 의사의 진찰을 받아야 한다."}]},{"id":"vocab-0841","word":"document","ipa":"/ˈdɑːkjumənt/","kr":"**다**큐먼트","mark":"**","pos":"명","mean":"① 문서 ② 서류","ex":[{"en":"Please sign the **document**.","ko":"그 문서에 서명해 주세요."},{"en":"Bring the original **documents** to the interview.","ko":"면접에 원본 서류를 가져오세요."}]},{"id":"vocab-0842","word":"dog","ipa":"/dɔːɡ/","kr":"**독ː**","mark":"*","pos":"명","mean":"개","ex":[{"en":"The **dog** is sleeping by the door.","ko":"그 개는 문 옆에서 자고 있다."}]},{"id":"vocab-0843","word":"doll","ipa":"/dɑːl/","kr":"**달**","mark":"*","pos":"명","mean":"인형","ex":[{"en":"One child played with a **doll**.","ko":"한 아이는 인형을 가지고 놀았다."}]},{"id":"vocab-0844","word":"dolphin","ipa":"/ˈdɑːlfɪn/","kr":"**달**핀","mark":"**","pos":"명","mean":"돌고래","ex":[{"en":"We saw a **dolphin** near the boat.","ko":"우리는 배 근처에서 돌고래 한 마리를 보았다."}]},{"id":"vocab-0845","word":"domain","ipa":"/doʊˈmeɪn/","kr":"도**메인**","mark":"","pos":"명","mean":"① 영역 ② 분야","ex":[{"en":"This issue belongs to the **domain** of science.","ko":"이 문제는 과학의 영역에 속한다."},{"en":"Cybersecurity is his main **domain** of work.","ko":"사이버 보안은 그의 주된 업무 분야다."}]},{"id":"vocab-0846","word":"domestic","ipa":"/dəˈmestɪk/","kr":"더**메**스틱","mark":"**","pos":"형","mean":"① 국내의 ② 가정의","ex":[{"en":"They sell **domestic** products.","ko":"그들은 국내 제품을 판다."},{"en":"**Domestic** work takes time every day.","ko":"가정의 일은 매일 시간이 걸린다."}]},{"id":"vocab-0847","word":"dominate (dominant)","ipa":"/ˈdɑːmɪneɪt/","kr":"**다**미네이트","mark":"","pos":"동","mean":"① 지배하다 ② 우세하다","ex":[{"en":"One team **dominated** the game.","ko":"한 팀이 그 경기를 지배했다."},{"en":"Our team **dominated** in the second half.","ko":"우리 팀은 후반전에 우세했다."}]},{"id":"vocab-0848","word":"donate","ipa":"/ˈdoʊneɪt/","kr":"**도**네이트","mark":"**","pos":"동","mean":"기부하다","ex":[{"en":"She **donated** clothes to charity.","ko":"그녀는 자선 단체에 옷을 기부했다."}]},{"id":"vocab-0849","word":"door","ipa":"/dɔːr/","kr":"**도ː**","mark":"*","pos":"명","mean":"문","ex":[{"en":"Could you close the **door**?","ko":"문을 닫아 주실 수 있나요?"}]},{"id":"vocab-0850","word":"dose","ipa":"/doʊs/","kr":"**도스**","mark":"","pos":"명","mean":"① 복용량 ② 투여량","ex":[{"en":"Take the correct **dose** after dinner.","ko":"저녁 식사 후에 정확한 복용량을 먹어라."},{"en":"The doctor reduced the **dose**.","ko":"그 의사는 투여량을 줄였다."}]},{"id":"vocab-0851","word":"dot","ipa":"/dɑːt/","kr":"**닷*
