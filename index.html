":"턱수염","ex":[{"en":"My grandfather has a white **beard**.","ko":"우리 할아버지는 흰 턱수염이 있다."}]},{"id":"vocab-0245","word":"beast","ipa":"/biːst/","kr":"**비ː**스트","mark":"","pos":"명","mean":"짐승","ex":[{"en":"The lion is a wild **beast**.","ko":"사자는 야생 짐승이다."}]},{"id":"vocab-0246","word":"beat","ipa":"/biːt/","kr":"**비ː**트","mark":"**","pos":"동/명","mean":"① 때리다 ② 이기다 ③ 박자","ex":[{"en":"He **beat** the drum with a stick.","ko":"그는 막대기로 북을 때렸다."},{"en":"Our team **beat** the local champions.","ko":"우리 팀은 지역 챔피언들을 이겼다."},{"en":"The song has a steady **beat**.","ko":"그 노래는 일정한 박자가 있다."}]},{"id":"vocab-0247","word":"beauty","ipa":"/ˈbjuːti/","kr":"**뷰ː**티","mark":"*","pos":"명","mean":"① 아름다움 ② 미인","ex":[{"en":"We admired the **beauty** of the lake.","ko":"우리는 호수의 아름다움에 감탄했다."},{"en":"The actress was a famous **beauty**.","ko":"그 여배우는 유명한 미인이었다."}]},{"id":"vocab-0248","word":"because","ipa":"/bɪˈkɔːz/","kr":"비**코ː**즈","mark":"*","pos":"접","mean":"~때문에","ex":[{"en":"I stayed home **because** I was sick.","ko":"나는 아팠기 때문에 집에 있었다."}]},{"id":"vocab-0249","word":"become","ipa":"/bɪˈkʌm/","kr":"비**컴**","mark":"*","pos":"동","mean":"~이 되다","ex":[{"en":"She **became** a famous singer.","ko":"그녀는 유명한 가수가 되었다."}]},{"id":"vocab-0250","word":"bed","ipa":"/bed/","kr":"**베드**","mark":"*","pos":"명","mean":"침대","ex":[{"en":"I lay on the **bed**.","ko":"나는 침대에 누웠다."}]},{"id":"vocab-0251","word":"bee","ipa":"/biː/","kr":"**비ː**","mark":"*","pos":"명","mean":"벌","ex":[{"en":"A **bee** landed on the flower.","ko":"벌 한 마리가 꽃에 내려앉았다."}]},{"id":"vocab-0252","word":"beef","ipa":"/biːf/","kr":"**비ː**프","mark":"*","pos":"명","mean":"소고기","ex":[{"en":"We ate **beef** for dinner.","ko":"우리는 저녁으로 소고기를 먹었다."}]},{"id":"vocab-0253","word":"beer","ipa":"/bɪr/","kr":"**비어**","mark":"**","pos":"명","mean":"맥주","ex":[{"en":"Alex ordered a glass of **beer**.","ko":"알렉스는 맥주 한 잔을 주문했다."}]},{"id":"vocab-0254","word":"before","ipa":"/bɪˈfɔːr/","kr":"비**포ː**","mark":"*","pos":"전/접","mean":"① ~전에 ② ~하기 전에","ex":[{"en":"Please finish the report **before** Friday.","ko":"금요일 전에 그 보고서를 끝내 주세요."},{"en":"Wash your hands **before** dinner.","ko":"저녁 식사 전에 손을 씻어라."}]},{"id":"vocab-0255","word":"beg","ipa":"/beɡ/","kr":"**베그**","mark":"**","pos":"동","mean":"① 구걸하다 ② 간청하다","ex":[{"en":"A man **begged** for food outside the station.","ko":"한 남자가 역 밖에서 음식을 구걸했다."},{"en":"He **begged** her to stay.","ko":"그는 그녀에게 머물러 달라고 간청했다."}]},{"id":"vocab-0256","word":"begin","ipa":"/bɪˈɡɪn/","kr":"비**긴**","mark":"*","pos":"동","mean":"시작하다","ex":[{"en":"Let's **begin** the class.","ko":"수업을 시작하자."}]},{"id":"vocab-0257","word":"behalf","ipa":"/bɪˈhæf/","kr":"비**해프**","mark":"","pos":"명","mean":"① 대신 ② 이익","ex":[{"en":"Nora spoke on **behalf** of the team.","ko":"노라는 팀을 대신하여 말했다."},{"en":"The change was made on **behalf** of the staff.","ko":"그 변경은 직원들의 이익을 위해 이루어졌다."}]},{"id":"vocab-0258","word":"behave (behavior / behaviour)","ipa":"/bɪˈheɪv/","kr":"비**헤이브**","mark":"","pos":"동","mean":"① 행동하다 ② 처신하다","ex":[{"en":"The children **behaved** well.","ko":"아이들은 얌전하게 행동했다."},{"en":"Please **behave** well at school.","ko":"학교에서 잘 처신해라."}]},{"id":"vocab-0259","word":"behind","ipa":"/bɪˈhaɪnd/","kr":"비**하인드**","mark":"*","pos":"전/부","mean":"① ~뒤에 ② 뒤에","ex":[{"en":"The parking lot is **behind** the building.","ko":"주차장은 그 건물 뒤에 있다."},{"en":"The cat hid **behind** the sofa.","ko":"고양이가 소파 뒤에 숨었다."}]},{"id":"vocab-0260","word":"belief","ipa":"/bɪˈliːf/","kr":"비**리ː**프","mark":"**","pos":"명","mean":"① 믿음 ② 신념","ex":[{"en":"Hana has a strong **belief** in herself.","ko":"하나는 자신에 대한 강한 믿음이 있다."},{"en":"Honesty is one of her core **beliefs**.","ko":"정직은 그녀의 핵심 신념 중 하나다."}]},{"id":"vocab-0261","word":"believe","ipa":"/bɪˈliːv/","kr":"비**리ː**브","mark":"*","pos":"동","mean":"믿다","ex":[{"en":"I **believe** his story.","ko":"나는 그의 이야기를 믿는다."}]},{"id":"vocab-0262","word":"bell","ipa":"/bel/","kr":"**벨**","mark":"*","pos":"명","mean":"① 종 ② 벨","ex":[{"en":"The school **bell** rang.","ko":"학교 종이 울렸다."},{"en":"The front desk rang the **bell**.","ko":"프런트 데스크가 벨을 울렸다."}]},{"id":"vocab-0263","word":"belong","ipa":"/bɪˈlɔːŋ/","kr":"비**롱ː**","mark":"**","pos":"동","mean":"① 속하다 ② ~의 것이다","ex":[{"en":"This file **belongs** to the HR team.","ko":"이 파일은 HR 팀에 속한다."},{"en":"This book **belongs** to me.","ko":"이 책은 내 것이다."}]},{"id":"vocab-0264","word":"below","ipa":"/bɪˈloʊ/","kr":"비**로**","mark":"*","pos":"전/부","mean":"① ~아래에 ② 아래에","ex":[{"en":"The keys are **below** the monitor.","ko":"열쇠는 모니터 아래에 있다."},{"en":"More details are listed **below**.","ko":"더 많은 세부 사항이 아래에 나와 있다."}]},{"id":"vocab-0265","word":"belt","ipa":"/belt/","kr":"**벨트**","mark":"*","pos":"명","mean":"① 벨트 ② 띠","ex":[{"en":"James wore a leather **belt**.","ko":"제임스는 가죽 벨트를 맸다."},{"en":"Ethan tightened his **belt**.","ko":"이선은 허리띠를 조였다."}]},{"id":"vocab-0266","word":"bench","ipa":"/bentʃ/","kr":"**벤치**","mark":"**","pos":"명","mean":"① 벤치 ② 긴 의자","ex":[{"en":"We sat on a park **bench**.","ko":"우리는 공원 벤치에 앉았다."},{"en":"We waited on a long wooden **bench**.","ko":"우리는 긴 나무 의자에서 기다렸다."}]},{"id":"vocab-0267","word":"bend","ipa":"/bend/","kr":"**벤드**","mark":"**","pos":"동","mean":"① 구부리다 ② 굽히다","ex":[{"en":"**Bend** the wire into a circle.","ko":"철사를 원 모양으로 구부려라."},{"en":"**Bend** your knees before you lift the box.","ko":"상자를 들기 전에 무릎을 굽혀라."}]},{"id":"vocab-0268","word":"beneath","ipa":"/bɪˈniːθ/","kr":"비**니ː**쓰","mark":"**","pos":"전/부","mean":"① ~아래에 ② 밑에","ex":[{"en":"The keys were **beneath** the newspaper.","ko":"열쇠는 신문 아래에 있었다."},{"en":"The dog slept **beneath** the tree.","ko":"개가 나무 밑에서 잤다."}]},{"id":"vocab-0269","word":"benefit","ipa":"/ˈbenɪfɪt/","kr":"**베**니핏","mark":"**","pos":"명/동","mean":"① 이익 ② 혜택 ③ 이롭다","ex":[{"en":"The new policy brings a clear **benefit**.","ko":"새 정책은 분명한 이익을 가져온다."},{"en":"Employees receive a health **benefit**.","ko":"직원들은 건강 혜택을 받는다."},{"en":"Regular breaks **benefit** your concentration.","ko":"규칙적인 휴식은 집중력에 이롭다."}]},{"id":"vocab-0270","word":"beside","ipa":"/bɪˈsaɪd/","kr":"비**사이드**","mark":"*","pos":"전","mean":"~옆에","ex":[{"en":"Sophia sat **beside** me.","ko":"소피아는 내 옆에 앉았다."}]},{"id":"vocab-0271","word":"bet","ipa":"/bet/","kr":"**벳**","mark":"**","pos":"명/동","mean":"① 내기 ② 내기하다","ex":[{"en":"We made a small **bet** on the game.","ko":"우리는 그 경기에 작은 내기를 걸었다."},{"en":"They **bet** ten dollars on the result.","ko":"그들은 결과에 10달러를 내기했다."}]},{"id":"vocab-0272","word":"betray","ipa":"/bɪˈtreɪ/","kr":"비**트레이**","mark":"","pos":"동","mean":"배신하다","ex":[{"en":"He **betrayed** his best friend.","ko":"그는 자신의 가장 친한 친구를 배신했다."}]},{"id":"vocab-0273","word":"between","ipa":"/bɪˈtwiːn/","kr":"비**트윈ː**","mark":"*","pos":"전","mean":"~사이에","ex":[{"en":"The café is **between** the bank and the post office.","ko":"그 카페는 은행과 우체국 사이에 있다."}]},{"id":"vocab-0274","word":"beyond","ipa":"/bɪˈjɑːnd/","kr":"비**욘드**","mark":"**","pos":"전/부","mean":"① ~너머 ② ~을 넘어서","ex":[{"en":"The village lies **beyond** the hill.","ko":"그 마을은 언덕 너머에 있다."},{"en":"The problem is **beyond** my control.","ko":"그 문제는 내 통제를 넘어선다."}]},{"id":"vocab-0275","word":"bias","ipa":"/ˈbaɪəs/","kr":"**바이**어스","mark":"","pos":"명","mean":"① 편견 ② 치우침","ex":[{"en":"Good judges must avoid **bias**.","ko":"훌륭한 심판은 편견을 피해야 한다."},{"en":"Good data can reduce **bias** in decisions.","ko":"좋은 자료는 결정의 치우침을 줄일 수 있다."}]},{"id":"vocab-0276","word":"big","ipa":"/bɪɡ/","kr":"**빅**","mark":"*","pos":"형","mean":"큰","ex":[{"en":"They live in a **big** house.","ko":"그들은 큰 집에 산다."}]},{"id":"vocab-0277","word":"bike","ipa":"/baɪk/","kr":"**바익**","mark":"*","pos":"명","mean":"자전거","ex":[{"en":"Grace rides her **bike** to school.","ko":"그레이스는 자전거를 타고 학교에 간다."}]},{"id":"vocab-0278","word":"bill","ipa":"/bɪl/","kr":"**빌**","mark":"*","pos":"명","mean":"① 청구서 ② 지폐 ③ 법안","ex":[{"en":"Please pay the **bill**.","ko":"청구서를 지불해 주세요."},{"en":"I paid with a ten-dollar **bill**.","ko":"나는 10달러 지폐로 지불했다."},{"en":"The Senate passed the **bill**.","ko":"상원은 그 법안을 통과시켰다."}]},{"id":"vocab-0279","word":"billion","ipa":"/ˈbɪljən/","kr":"**빌**리언","mark":"**","pos":"명","mean":"10억","ex":[{"en":"Our company earned two **billion** dollars.","ko":"우리 회사는 20억 달러를 벌었다."}]},{"id":"vocab-0280","word":"bin","ipa":"/bɪn/","kr":"**빈**","mark":"**","pos":"명","mean":"① 쓰레기통 ② 통","ex":[{"en":"Throw it in the **bin**.","ko":"그것을 쓰레기통에 버려라."},{"en":"Put the paper in the recycling **bin**.","ko":"그 종이를 재활용 통에 넣어라."}]},{"id":"vocab-0281","word":"bind","ipa":"/baɪnd/","kr":"**바인드**","mark":"**","pos":"동","mean":"① 묶다 ② 결속하다","ex":[{"en":"**Bind** the papers with a string.","ko":"종이들을 끈으로 묶어라."},{"en":"A shared goal can **bind** the team together.","ko":"공동 목표는 팀을 결속할 수 있다."}]},{"id":"vocab-0282","word":"biography","ipa":"/baɪˈɑːɡrəfi/","kr":"바이**아**그러피","mark":"","pos":"명","mean":"전기","ex":[{"en":"I read a **biography** of the scientist.","ko":"나는 그 과학자의 전기를 읽었다."}]},{"id":"vocab-0283","word":"biology","ipa":"/baɪˈɑːlədʒi/","kr":"바이**알**러지","mark":"","pos":"명","mean":"생물학","ex":[{"en":"We studied plants in **biology** class.","ko":"우리는 생물학 수업에서 식물을 공부했다."}]},{"id":"vocab-0284","word":"bird","ipa":"/bɜːrd/","kr":"**버ː**드","mark":"*","pos":"명","mean":"새","ex":[{"en":"A **bird** sang outside my window.","ko":"새 한 마리가 내 창밖에서 노래했다."}]},{"id":"vocab-0285","word":"birth","ipa":"/bɜːrθ/","kr":"**버ː**쓰","mark":"*","pos":"명","mean":"① 탄생 ② 출생","ex":[{"en":"The **birth** of the baby made them happy.","ko":"아기의 탄생은 그들을 행복하게 했다."},{"en":"Please enter your date of **birth**.","ko":"당신의 출생일을 입력해 주세요."}]},{"id":"vocab-0286","word":"biscuit","ipa":"/ˈbɪskɪt/","kr":"**비**스킷","mark":"*","pos":"명","mean":"① 비스킷 ② 과자","ex":[{"en":"Nora ate a **biscuit** with tea.","ko":"노라는 차와 함께 비스킷을 먹었다."},{"en":"A child ate a **biscuit** after lunch.","ko":"한 아이는 점심 후에 과자를 먹었다."}]},{"id":"vocab-0287","word":"bit","ipa":"/bɪt/","kr":"**빗**","mark":"**","pos":"명","mean":"① 조금 ② 약간","ex":[{"en":"Add a **bit** of salt.","ko":"소금을 조금 넣어라."},{"en":"The server is a **bit** slow today.","ko":"오늘 서버가 약간 느리다."}]},{"id":"vocab-0288","word":"bite","ipa":"/baɪt/","kr":"**바잇**","mark":"**","pos":"동/명","mean":"① 물다 ② 한 입","ex":[{"en":"The dog may **bite** strangers.","ko":"그 개는 낯선 사람을 물 수도 있다."},{"en":"Lina took one **bite** of the sandwich.","ko":"리나는 샌드위치를 한 입 먹었다."}]},{"id":"vocab-0289","word":"bitter","ipa":"/ˈbɪtər/","kr":"**비**터","mark":"**","pos":"형","mean":"① 쓴 ② 쓰라린","ex":[{"en":"The medicine tastes **bitter**.","ko":"그 약은 쓴맛이 난다."},{"en":"The loss left a **bitter** memory.","ko":"그 손실은 쓰라린 기억을 남겼다."}]},{"id":"vocab-0290","word":"black","ipa":"/blæk/","kr":"**블랙**","mark":"*","pos":"형/명","mean":"① 검은 ② 검정","ex":[{"en":"Grace wore a **black** coat.","ko":"그레이스는 검은 외투를 입었다."},{"en":"**Black** is the main color of the logo.","ko":"검정은 그 로고의 주된 색이다."}]},{"id":"vocab-0291","word":"blame","ipa":"/bleɪm/","kr":"**블레임**","mark":"**","pos":"명/동","mean":"① 비난 ② 탓하다","ex":[{"en":"Minho accepted the **blame** for the error.","ko":"민호는 그 오류에 대한 비난을 받아들였다."},{"en":"Don't **blame** others for your mistakes.","ko":"네 실수를 남 탓하지 마라."}]},{"id":"vocab-0292","word":"blank","ipa":"/blæŋk/","kr":"**블랭크**","mark":"**","pos":"형/명","mean":"① 빈 ② 빈칸","ex":[{"en":"Fill in the **blank**.","ko":"빈칸을 채워라."},{"en":"Write your name in the **blank** space.","ko":"빈칸에 이름을 써라."}]},{"id":"vocab-0293","word":"blanket","ipa":"/ˈblæŋkɪt/","kr":"**블랭**킷","mark":"**","pos":"명","mean":"담요","ex":[{"en":"Jun covered the child with a **blanket**.","ko":"준은 아이에게 담요를 덮어 주었다."}]},{"id":"vocab-0294","word":"blast","ipa":"/blæst/","kr":"**블래스트**","mark":"","pos":"명/동","mean":"① 폭발 ② 폭파하다","ex":[{"en":"The **blast** broke the windows.","ko":"그 폭발로 창문들이 깨졌다."},{"en":"The workers will **blast** the rock tomorrow.","ko":"작업자들은 내일 그 바위를 폭파할 것이다."}]},{"id":"vocab-0295","word":"blend","ipa":"/blend/","kr":"**블렌드**","mark":"","pos":"동/명","mean":"① 섞다 ② 혼합","ex":[{"en":"**Blend** the eggs and flour.","ko":"달걀과 밀가루를 섞어라."},{"en":"This tea is a **blend** of three herbs.","ko":"이 차는 세 가지 허브의 혼합이다."}]},{"id":"vocab-0296","word":"bless","ipa":"/bles/","kr":"**블레스**","mark":"**","pos":"동","mean":"축복하다","ex":[{"en":"They asked the priest to **bless** the meal.","ko":"그들은 신부에게 식사를 축복해 달라고 부탁했다."}]},{"id":"vocab-0297","word":"blind","ipa":"/blaɪnd/","kr":"**블라인드**","mark":"**","pos":"형","mean":"① 눈먼 ② 앞을 못 보는","ex":[{"en":"The **blind** man crossed the street safely.","ko":"그 눈먼 남자는 안전하게 길을 건넜다."},{"en":"The old man is **blind**.","ko":"그 노인은 앞을 못 본다."}]},{"id":"vocab-0298","word":"blink","ipa":"/blɪŋk/","kr":"**블링크**","mark":"","pos":"동/명","mean":"① 깜박이다 ② 깜박임","ex":[{"en":"She **blinked** in the bright light.","ko":"그녀는 밝은 빛에 눈을 깜박였다."},{"en":"His **blink** was almost too fast to notice.","ko":"그의 눈 깜박임은 거의 알아차리기 어려울 만큼 빨랐다."}]},{"id":"vocab-0299","word":"block","ipa":"/blɑːk/","kr":"**블락**","mark":"**","pos":"명/동","mean":"① 블록 ② 막다","ex":[{"en":"A child built a tower with **blocks**.","ko":"한 아이는 블록으로 탑을 쌓았다."},{"en":"A fallen tree **blocked** the road.","ko":"쓰러진 나무가 길을 막았다."}]},{"id":"vocab-0300","word":"blonde","ipa":"/blɑːnd/","kr":"**블론드**","mark":"**","pos":"형/명","mean":"① 금발의 ② 금발인 사람","ex":[{"en":"Hana has long **blonde** hair.","ko":"하나는 긴 금발 머리를 가지고 있다."},{"en":"A **blonde** stood near the entrance.","ko":"금발인 사람이 입구 근처에 서 있었다."}]},{"id":"vocab-0301","word":"blood","ipa":"/blʌd/","kr":"**블러드**","mark":"*","pos":"명","mean":"① 피 ② 혈액","ex":[{"en":"There was **blood** on his shirt.","ko":"그의 셔츠에 피가 묻어 있었다."},{"en":"The test measures sugar in the **blood**.","ko":"그 검사는 혈액 속 당을 측정한다."}]},{"id":"vocab-0302","word":"bloom","ipa":"/bluːm/","kr":"**블룸ː**","mark":"**","pos":"동/명","mean":"① 꽃이 피다 ② 꽃","ex":[{"en":"These flowers **bloom** in early spring.","ko":"이 꽃들은 이른 봄에 핀다."},{"en":"The roses are in full **bloom**.","ko":"장미가 만개해 있다."}]},{"id":"vocab-0303","word":"blossom","ipa":"/ˈblɑːsəm/","kr":"**블라**섬","mark":"","pos":"명/동","mean":"① 꽃 ② 꽃이 피다","ex":[{"en":"Cherry **blossoms** are beautiful.","ko":"벚꽃은 아름답다."},{"en":"Cherry **blossoms** appear in spring.","ko":"봄에는 벚꽃이 핀다."}]},{"id":"vocab-0304","word":"blow","ipa":"/bloʊ/","kr":"**블로**","mark":"**","pos":"동/명","mean":"① speech **bored** the audience.","ko":"긴 연설은 청중을 지루하게 했다."}]},{"id":"vocab-0320","word":"borrow","ipa":"/ˈbɑːroʊ/","kr":"**바**로","mark":"*","pos":"동","mean":"빌리다","ex":[{"en":"May I **borrow** your pen?","ko":"네 펜을 빌려도 될까?"}]},{"id":"vocab-0321","word":"boss","ipa":"/bɔːs/","kr":"**보ː**스","mark":"**","pos":"명","mean":"① 상사 ② 사장","ex":[{"en":"My **boss** called a meeting.","ko":"내 상사가 회의를 소집했다."},{"en":"The **boss** owns the small restaurant.","ko":"그 사장이 작은 식당을 소유한다."}]},{"id":"vocab-0322","word":"both","ipa":"/boʊθ/","kr":"**보쓰**","mark":"*","pos":"형/대","mean":"① 둘 다의 ② 양쪽","ex":[{"en":"**Both** answers are correct.","ko":"두 답 모두 맞다."},{"en":"Put one chair on **both** sides of the table.","ko":"탁자의 양쪽에 의자 하나씩 놓아라."}]},{"id":"vocab-0323","word":"bother","ipa":"/ˈbɑːðər/","kr":"**바**더","mark":"**","pos":"동","mean":"① 귀찮게 하다 ② 신경 쓰다","ex":[{"en":"Don't **bother** me now.","ko":"지금 나를 귀찮게 하지 마라."},{"en":"Do not **bother** about the small mistake.","ko":"그 작은 실수에 신경 쓰지 마라."}]},{"id":"vocab-0324","word":"bottle","ipa":"/ˈbɑːtl/","kr":"**바**틀","mark":"*","pos":"명","mean":"병","ex":[{"en":"Hana filled the **bottle** with water.","ko":"하나는 병에 물을 채웠다."}]},{"id":"vocab-0325","word":"bottom","ipa":"/ˈbɑːtəm/","kr":"**바**텀","mark":"*","pos":"명","mean":"① 맨 아래 ② 바닥","ex":[{"en":"Sign at the **bottom** of the page.","ko":"페이지 맨 아래에 서명해라."},{"en":"The spare key was at the **bottom** of the bag.","ko":"여분의 열쇠는 가방 바닥에 있었다."}]},{"id":"vocab-0326","word":"bounce","ipa":"/baʊns/","kr":"**바운스**","mark":"**","pos":"동/명","mean":"① 튀다 ② 튀기다","ex":[{"en":"The ball **bounced** across the floor.","ko":"공이 바닥을 가로질러 튀었다."},{"en":"**Bounce** the ball three times.","ko":"공을 세 번 튀겨라."}]},{"id":"vocab-0327","word":"boundary","ipa":"/ˈbaʊndri/","kr":"**바운**드리","mark":"","pos":"명","mean":"① 경계 ② 한계","ex":[{"en":"The fence marks the **boundary** of our yard.","ko":"그 울타리는 우리 마당의 경계를 나타낸다."},{"en":"We must work within the budget **boundary**.","ko":"우리는 예산 한계 안에서 일해야 한다."}]},{"id":"vocab-0328","word":"bow","ipa":"/baʊ/","kr":"**바우**","mark":"**","pos":"동/명","mean":"① 절하다 ② 활 ③ 나비매듭","ex":[{"en":"He **bowed** to the audience.","ko":"그는 관객에게 절했다."},{"en":"Minho carried a **bow** and several arrows.","ko":"민호는 활과 화살 몇 개를 들고 있었다."},{"en":"Emma tied the box with a red **bow**.","ko":"엠마는 상자를 빨간 나비매듭으로 묶었다."}]},{"id":"vocab-0329","word":"bowl","ipa":"/boʊl/","kr":"**볼**","mark":"**","pos":"명","mean":"① 그릇 ② 사발","ex":[{"en":"Olivia poured soup into a **bowl**.","ko":"올리비아는 그릇에 수프를 부었다."},{"en":"Grace served rice in a wooden **bowl**.","ko":"그레이스는 나무 사발에 밥을 담았다."}]},{"id":"vocab-0330","word":"box","ipa":"/bɑːks/","kr":"**박스**","mark":"*","pos":"명","mean":"상자","ex":[{"en":"The gift came in a small **box**.","ko":"그 선물은 작은 상자에 담겨 왔다."}]},{"id":"vocab-0331","word":"boy","ipa":"/bɔɪ/","kr":"**보이**","mark":"*","pos":"명","mean":"소년","ex":[{"en":"The **boy** is riding a bicycle.","ko":"그 소년은 자전거를 타고 있다."}]},{"id":"vocab-0332","word":"brain","ipa":"/breɪn/","kr":"**브레인**","mark":"**","pos":"명","mean":"① 뇌 ② 두뇌","ex":[{"en":"The **brain** controls the body.","ko":"뇌는 몸을 통제한다."},{"en":"Good sleep helps the **brain** work well.","ko":"충분한 수면은 두뇌가 잘 작동하도록 돕는다."}]},{"id":"vocab-0333","word":"brake","ipa":"/breɪk/","kr":"**브레익**","mark":"**","pos":"명/동","mean":"① 브레이크 ② 제동을 걸다","ex":[{"en":"Alex pressed the **brake** suddenly.","ko":"알렉스는 갑자기 브레이크를 밟았다."},{"en":"**Brake** before you reach the corner.","ko":"모퉁이에 도착하기 전에 제동을 걸어라."}]},{"id":"vocab-0334","word":"branch","ipa":"/bræntʃ/","kr":"**브랜치**","mark":"**","pos":"명","mean":"① 나뭇가지 ② 지점","ex":[{"en":"A bird sat on the **branch**.","ko":"새 한 마리가 나뭇가지에 앉았다."},{"en":"Julia works at the Seoul **branch**.","ko":"줄리아는 서울 지점에서 일한다."}]},{"id":"vocab-0335","word":"brand","ipa":"/brænd/","kr":"**브랜드**","mark":"**","pos":"명","mean":"① 상표 ② 브랜드","ex":[{"en":"This **brand** is popular with teenagers.","ko":"이 상표는 십 대들에게 인기가 있다."},{"en":"The organization launched a new **brand**.","ko":"그 조직은 새 브랜드를 출시했다."}]},{"id":"vocab-0336","word":"brave","ipa":"/breɪv/","kr":"**브레이브**","mark":"*","pos":"형","mean":"용감한","ex":[{"en":"The **brave** firefighter entered the building.","ko":"용감한 소방관은 건물 안으로 들어갔다."}]},{"id":"vocab-0337","word":"bread","ipa":"/bred/","kr":"**브레드**","mark":"*","pos":"명","mean":"빵","ex":[{"en":"Nora made fresh **bread** this morning.","ko":"노라는 오늘 아침 신선한 빵을 만들었다."}]},{"id":"vocab-0338","word":"break","ipa":"/breɪk/","kr":"**브레익**","mark":"*","pos":"동/명","mean":"① 깨다 ② 부수다 ③ 휴식","ex":[{"en":"Be careful not to **break** the glass.","ko":"유리잔을 깨뜨리지 않도록 조심해라."},{"en":"Do not **break** the device.","ko":"그 장치를 부수지 마라."},{"en":"Let's take a short **break**.","ko":"짧은 휴식을 취하자."}]},{"id":"vocab-0339","word":"breakfast","ipa":"/ˈbrekfəst/","kr":"**브렉**퍼스트","mark":"*","pos":"명","mean":"아침 식사","ex":[{"en":"We had eggs for **breakfast**.","ko":"우리는 아침 식사로 달걀을 먹었다."}]},{"id":"vocab-0340","word":"breast","ipa":"/brest/","kr":"**브레스트**","mark":"**","pos":"명","mean":"가슴","ex":[{"en":"Alex held the baby against his **breast**.","ko":"알렉스는 아기를 가슴에 안았다."}]},{"id":"vocab-0341","word":"breath","ipa":"/breθ/","kr":"**브레쓰**","mark":"**","pos":"명","mean":"① 숨 ② 호흡","ex":[{"en":"Take a deep **breath**.","ko":"깊게 숨을 쉬어라."},{"en":"His **breath** became slow and steady.","ko":"그의 호흡은 느리고 안정되었다."}]},{"id":"vocab-0342","word":"breathe","ipa":"/briːð/","kr":"**브리ː**드","mark":"**","pos":"동","mean":"① 숨 쉬다 ② 호흡하다","ex":[{"en":"It is hard to **breathe** in the smoke.","ko":"연기 속에서는 숨 쉬기가 어렵다."},{"en":"Try to **breathe** slowly and evenly.","ko":"천천히 고르게 호흡하려고 해라."}]},{"id":"vocab-0343","word":"breed","ipa":"/briːd/","kr":"**브리ː**드","mark":"","pos":"동/명","mean":"① 번식하다 ② 품종","ex":[{"en":"Rabbits **breed** quickly.","ko":"토끼는 빠르게 번식한다."},{"en":"This **breed** of dog is very calm.","ko":"이 품종의 개는 매우 차분하다."}]},{"id":"vocab-0344","word":"breeze","ipa":"/briːz/","kr":"**브리ː**즈","mark":"","pos":"명","mean":"산들바람","ex":[{"en":"A cool **breeze** came through the window.","ko":"시원한 산들바람이 창문으로 들어왔다."}]},{"id":"vocab-0345","word":"brick","ipa":"/brɪk/","kr":"**브릭**","mark":"**","pos":"명","mean":"벽돌","ex":[{"en":"The wall is made of red **bricks**.","ko":"그 벽은 붉은 벽돌로 만들어졌다."}]},{"id":"vocab-0346","word":"bridge","ipa":"/brɪdʒ/","kr":"**브릿지**","mark":"*","pos":"명","mean":"다리","ex":[{"en":"We crossed the **bridge**.","ko":"우리는 다리를 건넜다."}]},{"id":"vocab-0347","word":"brief","ipa":"/briːf/","kr":"**브리ː**프","mark":"**","pos":"형","mean":"① 간단한 ② 짧은","ex":[{"en":"Please give me a **brief** summary.","ko":"간단한 요약을 해 주세요."},{"en":"Jun gave a **brief** speech.","ko":"준은 짧은 연설을 했다."}]},{"id":"vocab-0348","word":"bright","ipa":"/braɪt/","kr":"**브라잇**","mark":"*","pos":"형","mean":"① 밝은 ② 영리한","ex":[{"en":"This room is **bright** and warm.","ko":"이 방은 밝고 따뜻하다."},{"en":"Nora is a **bright** new employee.","ko":"노라는 영리한 신입 직원이다."}]},{"id":"vocab-0349","word":"brilliant","ipa":"/ˈbrɪljənt/","kr":"**브릴**리언트","mark":"**","pos":"형","mean":"① 훌륭한 ② 눈부신","ex":[{"en":"Olivia had a **brilliant** idea.","ko":"올리비아는 훌륭한 생각을 해냈다."},{"en":"A **brilliant** light filled the room.","ko":"눈부신 빛이 방을 가득 채웠다."}]},{"id":"vocab-0350","word":"bring","ipa":"/brɪŋ/","kr":"**브링**","mark":"*","pos":"동","mean":"① 가져오다 ② 데려오다","ex":[{"en":"Please **bring** your notebook tomorrow.","ko":"내일 공책을 가져와 주세요."},{"en":"Can I **bring** a guest to the event?","ko":"그 행사에 손님을 데려와도 될까요?"}]},{"id":"vocab-0351","word":"broad","ipa":"/brɔːd/","kr":"**브로ː**드","mark":"**","pos":"형","mean":"넓은","ex":[{"en":"The river is **broad** and deep.","ko":"그 강은 넓고 깊다."}]},{"id":"vocab-0352","word":"broadcast","ipa":"/ˈbrɔːdkæst/","kr":"**브로ː**드캐스트","mark":"","pos":"명/동","mean":"① 방송 ② 방송하다","ex":[{"en":"The live **broadcast** starts at nine.","ko":"생방송은 아홉 시에 시작한다."},{"en":"The game will be **broadcast** live.","ko":"그 경기는 생방송으로 중계될 것이다."}]},{"id":"vocab-0353","word":"brother","ipa":"/ˈbrʌðər/","kr":"**브러**더","mark":"*","pos":"명","mean":"① 형 ② 오빠 ③ 남동생","ex":[{"en":"My **brother** is older than me.","ko":"내 형은 나보다 나이가 많다."},{"en":"Her **brother** picked her up after work."," rk":"","pos":"명","mean":"① 대량 ② 대부분","ex":[{"en":"We buy rice in **bulk**.","ko":"우리는 쌀을 대량으로 산다."},{"en":"The **bulk** of the work is finished.","ko":"일의 대부분이 끝났다."}]},{"id":"vocab-0362","word":"bull","ipa":"/bʊl/","kr":"**불**","mark":"","pos":"명","mean":"황소","ex":[{"en":"A **bull** stood in the field.","ko":"황소 한 마리가 들판에 서 있었다."}]},{"id":"vocab-0363","word":"bully","ipa":"/ˈbʊli/","kr":"**불**리","mark":"","pos":"명/동","mean":"① 괴롭히는 사람 ② 괴롭히다","ex":[{"en":"The school reported the **bully** to his parents.","ko":"학교는 그 괴롭히는 사람을 부모에게 알렸다."},{"en":"Do not **bully** younger students.","ko":"어린 학생들을 괴롭히지 마라."}]},{"id":"vocab-0364","word":"bump","ipa":"/bʌmp/","kr":"**범프**","mark":"**","pos":"동/명","mean":"① 부딪치다 ② 혹","ex":[{"en":"I **bumped** into the table.","ko":"나는 탁자에 부딪쳤다."},{"en":"A small **bump** formed on his head.","ko":"그의 머리에 작은 혹이 생겼다."}]},{"id":"vocab-0365","word":"bunch","ipa":"/bʌntʃ/","kr":"**번치**","mark":"**","pos":"명","mean":"① 다발 ② 무리","ex":[{"en":"Emma bought a **bunch** of flowers.","ko":"엠마는 꽃 한 다발을 샀다."},{"en":"A **bunch** of children waited outside.","ko":"아이들 무리가 밖에서 기다렸다."}]},{"id":"vocab-0366","word":"bundle","ipa":"/ˈbʌndl/","kr":"**번**들","mark":"","pos":"명/동","mean":"① 묶음 ② 다발로 묶다","ex":[{"en":"Leo carried a **bundle** of sticks.","ko":"레오는 막대기 한 묶음을 날랐다."},{"en":"Please **bundle** the cables together.","ko":"케이블들을 함께 다발로 묶어 주세요."}]},{"id":"vocab-0367","word":"burden","ipa":"/ˈbɜːrdn/","kr":"**버ː**든","mark":"","pos":"명","mean":"① 짐 ② 부담","ex":[{"en":"The debt was a heavy **burden**.","ko":"그 빚은 무거운 짐이었다."},{"en":"The extra work became a **burden**.","ko":"추가 업무는 부담이 되었다."}]},{"id":"vocab-0368","word":"burn","ipa":"/bɜːrn/","kr":"**번ː**","mark":"*","pos":"동/명","mean":"① 타다 ② 화상","ex":[{"en":"Dry wood **burns** quickly.","ko":"마른 나무는 빨리 탄다."},{"en":"Owen had a small **burn** on his hand.","ko":"오언은 손에 작은 화상을 입었다."}]},{"id":"vocab-0369","word":"burst","ipa":"/bɜːrst/","kr":"**버ː**스트","mark":"**","pos":"동/명","mean":"① 터지다 ② 폭발","ex":[{"en":"The pipe may **burst** in the cold.","ko":"그 파이프는 추위에 터질 수 있다."},{"en":"We heard a sudden **burst** outside.","ko":"우리는 밖에서 갑작스러운 폭발을 들었다."}]},{"id":"vocab-0370","word":"bury","ipa":"/ˈberi/","kr":"**베**리","mark":"**","pos":"동","mean":"① 묻다 ② 매장하다","ex":[{"en":"They **buried** the box in the garden.","ko":"그들은 정원에 상자를 묻었다."},{"en":"The family **buried** him near the church.","ko":"그 가족은 그를 교회 근처에 매장했다."}]},{"id":"vocab-0371","word":"bus","ipa":"/bʌs/","kr":"**버스**","mark":"*","pos":"명","mean":"버스","ex":[{"en":"I take the **bus** to work.","ko":"나는 버스를 타고 출근한다."}]},{"id":"vocab-0372","word":"bush","ipa":"/bʊʃ/","kr":"**부시**","mark":"**","pos":"명","mean":"① 덤불 ② 관목","ex":[{"en":"A rabbit hid in the **bush**.","ko":"토끼가 덤불 속에 숨었다."},{"en":"A small **bush** grows by the gate.","ko":"작은 관목이 문 옆에서 자란다."}]},{"id":"vocab-0373","word":"business","ipa":"/ˈbɪznəs/","kr":"**비**즈니스","mark":"*","pos":"명","mean":"① 사업 ② 일","ex":[{"en":"Yuna started her own **business**.","ko":"유나는 자신의 사업을 시작했다."},{"en":"We have important **business** to finish today.","ko":"우리는 오늘 끝내야 할 중요한 일이 있다."}]},{"id":"vocab-0374","word":"busy","ipa":"/ˈbɪzi/","kr":"**비**지","mark":"*","pos":"형","mean":"바쁜","ex":[{"en":"The support team is **busy** this morning.","ko":"지원팀은 오늘 아침 바쁘다."}]},{"id":"vocab-0375","word":"but","ipa":"/bʌt/","kr":"**벗**","mark":"*","pos":"접","mean":"① 그러나 ② 하지만","ex":[{"en":"The plan is simple, **but** it may work.","ko":"그 계획은 단순하다. 그러나 효과가 있을 수 있다."},{"en":"I called twice, **but** she did not answer.","ko":"나는 두 번 전화했지만 그녀는 받지 않았다."}]},{"id":"vocab-0376","word":"butcher","ipa":"/ˈbʊtʃər/","kr":"**부**처","mark":"","pos":"명","mean":"정육점 주인","ex":[{"en":"The **butcher** cut the meat carefully.","ko":"정육점 주인은 고기를 조심스럽게 잘랐다."}]},{"id":"vocab-0377","word":"butter","ipa":"/ˈbʌtər/","kr":"**버**터","mark":"*","pos":"명","mean":"버터","ex":[{"en":"Sophia spread **butter** on the bread.","ko":"소피아는 빵에 버터를 발랐다."}]},{"id":"vocab-0378","word":"button","ipa":"/ˈbʌtn/","kr":"**버**튼","mark":"*","pos":"명","mean":"① 단추 ② 버튼","ex":[{"en":"One **button** is missing from my shirt.","ko":"내 셔츠에서 단추 하나가 떨어졌다."},{"en":"Press the red **button**.","ko":"빨간 버튼을 눌러라."}]},{"id":"vocab-0379","word":"buy","ipa":"/baɪ/","kr":"**바이**","mark":"*","pos":"동","mean":"사다","ex":[{"en":"I need to **buy** some milk.","ko":"나는 우유를 좀 사야 한다."}]},{"id":"vocab-0380","word":"buzz","ipa":"/bʌz/","kr":"**버즈**","mark":"","pos":"명/동","mean":"① 윙윙거리는 소리 ② 윙윙거리다","ex":[{"en":"I heard a **buzz** from the old light.","ko":"나는 낡은 전등에서 윙윙거리는 소리를 들었다."},{"en":"The phone **buzzed** on the desk.","ko":"전화기가 책상 위에서 윙윙거렸다."}]},{"id":"vocab-0381","word":"by","ipa":"/baɪ/","kr":"**바이**","mark":"*","pos":"전","mean":"① ~옆에 ② ~에 의해 ③ ~까지","ex":[{"en":"The printer is **by** the window.","ko":"프린터는 창문 옆에 있다."},{"en":"The latest report was written **by** Mina.","ko":"최근 보고서는 미나에 의해 작성되었다."},{"en":"Come **by** five o'clock.","ko":"다섯 시까지 와라."}]},{"id":"vocab-0382","word":"cable","ipa":"/ˈkeɪbl/","kr":"**케이**블","mark":"**","pos":"명","mean":"① 케이블 ② 전선","ex":[{"en":"Connect the **cable** to the TV.","ko":"케이블을 텔레비전에 연결해라."},{"en":"The power **cable** is under the desk.","ko":"전원 전선은 책상 아래에 있다."}]},{"id":"vocab-0383","word":"cage","ipa":"/keɪdʒ/","kr":"**케이지**","mark":"**","pos":"명","mean":"① 우리 ② 새장","ex":[{"en":"The rabbits live in a large **cage**.","ko":"토끼들은 큰 우리에서 산다."},{"en":"The bird flew out of the **cage**.","ko":"새가 새장 밖으로 날아갔다."}]},{"id":"vocab-0384","word":"cake","ipa":"/keɪk/","kr":"**케익**","mark":"*","pos":"명","mean":"케이크","ex":[{"en":"Claire baked a chocolate **cake**.","ko":"클레어는 초콜릿 케이크를 구웠다."}]},{"id":"vocab-0385","word":"calculate (calculator)","ipa":"/ˈkælkjuleɪt/","kr":"**캘**큘레이트","mark":"**","pos":"동","mean":"계산하다","ex":[{"en":"**Calculate** the total price.","ko":"총 가격을 계산해라."}]},{"id":"vocab-0386","word":"calendar","ipa":"/ˈkælɪndər/","kr":"**캘**린더","mark":"**","pos":"명","mean":"달력","ex":[{"en":"Mark the date on the **calendar**.","ko":"달력에 그 날짜를 표시해라."}]},{"id":"vocab-0387","word":"call","ipa":"/kɔːl/","kr":"**콜ː**","mark":"*","pos":"동/명","mean":"① 부르다 ② 전화하다 ③ 전화","ex":[{"en":"Please **call** the next applicant.","ko":"다음 지원자를 불러 주세요."},{"en":"**Call** me tonight.","ko":"오늘 밤에 나에게 전화해라."},{"en":"I got a **call** from HR.","ko":"나는 HR에서 전화를 받았다."}]},{"id":"vocab-0388","word":"calm","ipa":"/kɑːm/","kr":"**캄ː**","mark":"**","pos":"형/동","mean":"① 침착한 ② 진정시키다","ex":[{"en":"Try to stay **calm**.","ko":"침착함을 유지하도록 해라."},{"en":"Her voice **calmed** the nervous child.","ko":"그녀의 목소리가 긴장한 아이를 진정시켰다."}]},{"id":"vocab-0389","word":"camera","ipa":"/ˈkæmərə/","kr":"**캐**머러","mark":"*","pos":"명","mean":"카메라","ex":[{"en":"Ethan took a picture with his **camera**.","ko":"이선은 카메라로 사진을 찍었다."}]},{"id":"vocab-0390","word":"camp","ipa":"/kæmp/","kr":"**캠프**","mark":"*","pos":"명/동","mean":"① 야영지 ② 야영하다","ex":[{"en":"We set up **camp** near the lake.","ko":"우리는 호수 근처에 야영지를 세웠다."},{"en":"We **camped** beside the lake for two nights.","ko":"우리는 호숫가에서 이틀 밤 야영했다."}]},{"id":"vocab-0391","word":"campaign","ipa":"/kæmˈpeɪn/","kr":"캠**페인**","mark":"*","pos":"명","mean":"① 캠페인 ② 운동","ex":[{"en":"The school began a recycling **campaign**.","ko":"그 학교는 재활용 캠페인을 시작했다."},{"en":"The business began a safety **campaign**.","ko":"그 사업체는 안전 운동을 시작했다."}]},{"id":"vocab-0392","word":"can","ipa":"/kæn/","kr":"**캔**","mark":"*","pos":"동/명","mean":"① ~할 수 있다 ② 깡통","ex":[{"en":"I **can** swim very well.","ko":"나는 수영을 아주 잘할 수 있다."},{"en":"Put the empty **can** in the recycling bin.","ko":"빈 깡통을 재활용 통에 넣어라."}]},{"id":"vocab-0393","word":"cancel","ipa":"/ˈkænsl/","kr":"**캔**슬","mark":"","pos":"동","mean":"취소하다","ex":[{"en":"They **canceled** the game because of rain.","ko":"그들은 비 때문에 경기를 취소했다."}]},{"id":"vocab-0394","word":"cancer","ipa":"/ˈkænsər/","kr":"**캔**서","mark":"","pos":"명","mean":"암","ex":[{"en":"Early treatment can help fight **cancer**.","ko":"조기 치료는 암과 싸우는 데 도움이 될 수 있다."}]},{"id":"vocab-0395","word":"candidate","ipa":"/ˈkændɪdeɪt/","kr":"**캔**디데이트","mark":"","pos":"명","mean":"① 후보자 ② 지원자","ex":[{"en":"Each **candidate** gave a short speech.","ko":"각 후보자는 짧은 연설을 했다."},{"en":"Each **candidate** must submit a résumé.","ko":"각 지원자는 이력서를 제출해야 한다."}]},{"id":"vocab-0396","word":"candy","ipa":"/ˈkændi/","kr":"**캔**디","mark":"*","pos":"명","mean":"사탕","ex":[{"en":"A child asked for a piece of **candy**.","ko":"한 아이는 사탕 한 개를 달라고 했다."}]},{"id":"vocab-0397","word":"canvas","ipa":"/ˈkænvəs/","kr":"**캔**버스","mark":"","pos":"명","mean":"① 캔버스 ② 화폭","ex":[{"en":"The artist painted on **canvas**.","ko":"그 화가는 캔버스에 그림을 그렸다."},{"en":"The artist covered the **canvas** with blue paint.","ko":"그 화가는 화폭을 파란 물감으로 덮었다."}]},{"id":"vocab-0398","word":"cap","ipa":"/kæp/","kr":"**캡**","mark":"*","pos":"명","mean":"① 모자 ② 뚜껑","ex":[{"en":"Owen wore a baseball **cap**.","ko":"오언은 야구 모자를 썼다."},{"en":"Put the **cap** back on the bottle.","ko":"병에 뚜껑을 다시 씌워라."}]},{"id":"vocab-0399","word":"capable","ipa":"/ˈkeɪpəbl/","kr":"**케이**퍼블","mark":"**","pos":"형","mean":"① ~할 수 있는 ② 유능한","ex":[{"en":"Julia is **capable** of solving the problem.","ko":"줄리아는 그 문제를 해결할 수 있다."},{"en":"Grace is a **capable** and trusted manager.","ko":"그레이스는 유능하고 신뢰받는 관리자다."}]},{"id":"vocab-0400","word":"cape","ipa":"/keɪp/","kr":"**케입**","mark":"**","pos":"명","mean":"① 곶 ② 망토","ex":[{"en":"The ship sailed around the **cape**.","ko":"배가 곶을 돌아 항해했다."},{"en":"The hero wore a red **cape**.","ko":"그 영웅은 빨간 망토를 입었다."}]},{"id":"vocab-0401","word":"capital","ipa":"/ˈkæpɪtl/","kr":"**캐**피틀","mark":"**","pos":"명/형","mean":"① 수도 ② 자본 ③ 대문자의","ex":[{"en":"Seoul is the **capital** of Korea.","ko":"서울은 한국의 수도다."},{"en":"The startup needs more **capital**.","ko":"그 스타트업은 더 많은 자본이 필요하다."},{"en":"Begin the name with a **capital** letter.","ko":"그 이름을 대문자로 시작해라."}]},{"id":"vocab-0402","word":"captain","ipa":"/ˈkæptɪn/","kr":"**캡**틴","mark":"**","pos":"명","mean":"① 선장 ② 주장 ③ 대위","ex":[{"en":"The **captain** welcomed us onto the ship.","ko":"선장이 우리를 배에 맞아들였다."},{"en":"The **captain** led the team onto the field.","ko":"주장은 팀을 이끌고 경기장에 들어갔다."},{"en":"The **captain** gave the soldiers an order.","ko":"그 대위는 군인들에게 명령을 내렸다."}]},{"id":"vocab-0403","word":"capture","ipa":"/ˈkæptʃər/","kr":"**캡**처","mark":"","pos":"동/명","mean":"① 붙잡다 ② 포착하다 ③ 포획","ex":[{"en":"The police **captured** the thief.","ko":"경찰이 도둑을 붙잡았다."},{"en":"The camera **captured** the beautiful sunset.","ko":"그 카메라는 아름다운 석양을 포착했다."},{"en":"The **capture** of the wild animal took hours.","ko":"그 야생 동물의 포획에는 몇 시간이 걸렸다."}]},{"id":"vocab-0404","word":"car","ipa":"/kɑːr/","kr":"**카ː**","mark":"*","pos":"명","mean":"자동차","ex":[{"en":"Yuna drives her **car** to work.","ko":"유나는 자동차를 운전해 출근한다."}]},{"id":"vocab-0405","word":"card","ipa":"/kɑːrd/","kr":"**카ː**드","mark":"*","pos":"명","mean":"① 카드 ② 엽서","ex":[{"en":"I sent a birthday **card**.","ko":"나는 생일 카드를 보냈다."},{"en":"I bought a picture **card** at the museum.","ko":"나는 박물관에서 그림 엽서를 샀다."}]},{"id":"vocab-0406","word":"care","ipa":"/ker/","kr":"**케어**","mark":"*","pos":"명/동","mean":"① 돌봄 ② 조심 ③ 돌보다","ex":[{"en":"The patient needs daily **care**.","ko":"그 환자는 매일 돌봄이 필요하다."},{"en":"Take **care** of yourself.","ko":"몸조심해라."},{"en":"Sophia takes **care** of her little brother.","ko":"소피아는 남동생을 돌본다."}]},{"id":"vocab-0407","word":"career","ipa":"/kəˈrɪr/","kr":"커**리어**","mark":"**","pos":"명","mean":"① 경력 ② 직업","ex":[{"en":"Ryan began his **career** as a teacher.","ko":"라이언은 교사로 경력을 시작했다."},{"en":"Sophia chose a **career** in medicine.","ko":"소피아는 의학 분야의 직업을 선택했다."}]},{"id":"vocab-0408","word":"carpet","ipa":"/ˈkɑːrpɪt/","kr":"**카ː**핏","mark":"**","pos":"명","mean":"① 카펫 ② 양탄자","ex":[{"en":"The floor is covered with a soft **carpet**.","ko":"바닥은 부드러운 카펫으로 덮여 있다."},{"en":"The room has a soft wool **carpet**.","ko":"그 방에는 부드러운 양탄자가 있다."}]},{"id":"vocab-0409","word":"carrot","ipa":"/ˈkærət/","kr":"**캐**럿","mark":"*","pos":"명","mean":"당근","ex":[{"en":"The rabbit ate a **carrot**.","ko":"토끼가 당근을 먹었다."}]},{"id":"vocab-0410","word":"carry","ipa":"/ˈkæri/","kr":"**캐**리","mark":"*","pos":"동","mean":"① 나르다 ② 지니다","ex":[{"en": d the book in the library **catalogue**.","ko":"나는 도서관 목록에서 그 책을 찾았다."},{"en":"The new **catalogue** lists every product.","ko":"새 카탈로그는 모든 제품을 나열한다."}]},{"id":"vocab-0419","word":"catch","ipa":"/kætʃ/","kr":"**캐치**","mark":"*","pos":"동","mean":"① 잡다 ② 붙잡다","ex":[{"en":"She **caught** the ball with one hand.","ko":"그녀는 한 손으로 공을 잡았다."},{"en":"The guard **caught** the thief.","ko":"경비원은 도둑을 붙잡았다."}]},{"id":"vocab-0420","word":"category","ipa":"/ˈkætəɡɔːri/","kr":"**캐**터고리","mark":"**","pos":"명","mean":"① 범주 ② 분류","ex":[{"en":"This book belongs to a different **category**.","ko":"이 책은 다른 범주에 속한다."},{"en":"Books are sorted by **category**.","ko":"책은 범주별로 분류된다."}]},{"id":"vocab-0421","word":"cater","ipa":"/ˈkeɪtər/","kr":"**케이**터","mark":"","pos":"동","mean":"① 음식을 공급하다 ② 충족시키다","ex":[{"en":"The restaurant **caters** for large groups.","ko":"그 식당은 대규모 단체에 음식을 제공한다."},{"en":"The service **caters** to small businesses.","ko":"그 서비스는 소규모 사업체의 요구를 충족시킨다."}]},{"id":"vocab-0422","word":"cattle","ipa":"/ˈkætl/","kr":"**캐**틀","mark":"","pos":"명","mean":"소 (집합)","ex":[{"en":"The **cattle** are grazing in the field.","ko":"소들이 들판에서 풀을 뜯고 있다."}]},{"id":"vocab-0423","word":"cause (causal)","ipa":"/kɔːz/","kr":"**코ː**즈","mark":"**","pos":"명/동","mean":"① 원인 ② 야기하다","ex":[{"en":"What was the **cause** of the fire?","ko":"화재의 원인은 무엇이었나?"},{"en":"A network error **caused** the delay.","ko":"네트워크 오류가 그 지연을 야기했다."}]},{"id":"vocab-0424","word":"caution","ipa":"/ˈkɔːʃn/","kr":"**코ː**션","mark":"","pos":"명","mean":"① 주의 ② 경고","ex":[{"en":"Drive with **caution** on wet roads.","ko":"젖은 도로에서는 주의해서 운전해라."},{"en":"The sign gave a clear **caution** about ice.","ko":"그 표지판은 얼음에 대한 분명한 경고를 했다."}]},{"id":"vocab-0425","word":"cave","ipa":"/keɪv/","kr":"**케이브**","mark":"","pos":"명","mean":"동굴","ex":[{"en":"We explored a dark **cave**.","ko":"우리는 어두운 동굴을 탐험했다."}]},{"id":"vocab-0426","word":"cease","ipa":"/siːs/","kr":"**시ː**스","mark":"","pos":"동","mean":"① 그치다 ② 중단하다","ex":[{"en":"The rain **ceased** before noon.","ko":"비는 정오 전에 그쳤다."},{"en":"The organization will **cease** production next month.","ko":"그 조직은 다음 달에 생산을 중단할 것이다."}]},{"id":"vocab-0427","word":"ceiling","ipa":"/ˈsiːlɪŋ/","kr":"**실ː**링","mark":"**","pos":"명","mean":"천장","ex":[{"en":"Our room has a high **ceiling**.","ko":"우리 방은 천장이 높다."}]},{"id":"vocab-0428","word":"celebrate","ipa":"/ˈselɪbreɪt/","kr":"**셀**러브레이트","mark":"","pos":"동","mean":"① 축하하다 ② 기념하다","ex":[{"en":"We **celebrated** her birthday together.","ko":"우리는 함께 그녀의 생일을 축하했다."},{"en":"The business **celebrated** its tenth anniversary.","ko":"그 사업체는 창립 10주년을 기념했다."}]},{"id":"vocab-0429","word":"celebrity","ipa":"/səˈlebrəti/","kr":"설**레**브러티","mark":"","pos":"명","mean":"유명 인사","ex":[{"en":"The **celebrity** greeted her fans.","ko":"그 유명인은 팬들에게 인사했다."}]},{"id":"vocab-0430","word":"cell","ipa":"/sel/","kr":"**셀**","mark":"**","pos":"명","mean":"① 세포 ② 감방","ex":[{"en":"The human body contains many **cells**.","ko":"인체에는 많은 세포가 들어 있다."},{"en":"The prisoner returned to his **cell**.","ko":"그 죄수는 감방으로 돌아갔다."}]},{"id":"vocab-0431","word":"censor","ipa":"/ˈsensər/","kr":"**센**서","mark":"","pos":"동/명","mean":"① 검열하다 ② 검열관","ex":[{"en":"The government **censored** the report.","ko":"정부는 그 보고서를 검열했다."},{"en":"The **censor** reviewed the film before release.","ko":"검열관은 개봉 전에 그 영화를 검토했다."}]},{"id":"vocab-0432","word":"center","ipa":"/ˈsentər/","kr":"**센**터","mark":"*","pos":"명","mean":"① 중심 ② 센터","ex":[{"en":"The park is in the **center** of town.","ko":"그 공원은 마을 중심에 있다."},{"en":"The training **center** opens at nine.","ko":"그 교육 센터는 아홉 시에 문을 연다."}]},{"id":"vocab-0433","word":"century","ipa":"/ˈsentʃəri/","kr":"**센**추리","mark":"**","pos":"명","mean":"① 세기 ② 100년","ex":[{"en":"This company was founded in the last **century**.","ko":"이 회사는 지난 세기에 설립되었다."},{"en":"This castle is a **century** old.","ko":"이 성은 100년 되었다."}]},{"id":"vocab-0434","word":"certain","ipa":"/ˈsɜːrtn/","kr":"**서ː**튼","mark":"*","pos":"형","mean":"① 확실한 ② 어떤","ex":[{"en":"I am **certain** that the backup worked.","ko":"나는 백업이 작동했다고 확신한다."},{"en":"A **certain** employee left this note.","ko":"어떤 직원이 이 메모를 남겼다."}]},{"id":"vocab-0435","word":"certificate","ipa":"/sərˈtɪfɪkət/","kr":"서**티**피킷","mark":"","pos":"명","mean":"① 증명서 ② 자격증","ex":[{"en":"Lina received a **certificate**.","ko":"리나는 증명서를 받았다."},{"en":"Hana earned a cloud security **certificate**.","ko":"하나는 클라우드 보안 자격증을 취득했다."}]},{"id":"vocab-0436","word":"chain","ipa":"/tʃeɪn/","kr":"**체인**","mark":"**","pos":"명","mean":"① 사슬 ② 체인","ex":[{"en":"The bicycle was locked with a **chain**.","ko":"자전거는 사슬로 잠겨 있었다."},{"en":"This store is part of a national **chain**.","ko":"이 가게는 전국 체인의 일부다."}]},{"id":"vocab-0437","word":"chair","ipa":"/tʃer/","kr":"**체어**","mark":"*","pos":"명","mean":"의자","ex":[{"en":"Please sit on the **chair**.","ko":"의자에 앉으세요."}]},{"id":"vocab-0438","word":"chairman","ipa":"/ˈtʃermən/","kr":"**체어**먼","mark":"**","pos":"명","mean":"① 의장 ② 회장","ex":[{"en":"The **chairman** opened the meeting.","ko":"의장이 회의를 시작했다."},{"en":"The **chairman** approved the budget.","ko":"그 회장이 예산을 승인했다."}]},{"id":"vocab-0439","word":"challenge","ipa":"/ˈtʃælɪndʒ/","kr":"**챌**린지","mark":"**","pos":"명/동","mean":"① 도전 ② 도전하다","ex":[{"en":"The exam was a real **challenge**.","ko":"그 시험은 정말 도전이었다."},{"en":"He **challenged** me to a race.","ko":"그는 나에게 경주를 하자고 도전했다."}]},{"id":"vocab-0440","word":"chamber","ipa":"/ˈtʃeɪmbər/","kr":"**체임**버","mark":"","pos":"명","mean":"① 방 ② 회의실","ex":[{"en":"The king entered the **chamber**.","ko":"왕이 방으로 들어갔다."},{"en":"That meeting took place in a large **chamber**.","ko":"그 회의는 큰 회의실에서 열렸다."}]},{"id":"vocab-0441","word":"champion","ipa":"/ˈtʃæmpiən/","kr":"**챔**피언","mark":"**","pos":"명","mean":"① 챔피언 ② 우승자","ex":[{"en":"Sophia became the national **champion**.","ko":"소피아는 전국 챔피언이 되었다."},{"en":"The final winner was crowned **champion**.","ko":"최종 우승자는 챔피언으로 선정되었다."}]},{"id":"vocab-0442","word":"chance","ipa":"/tʃæns/","kr":"**챈스**","mark":"*","pos":"명","mean":"① 기회 ② 가능성","ex":[{"en":"Give me another **chance**.","ko":"나에게 한 번 더 기회를 주세요."},{"en":"There is a good **chance** of rain.","ko":"비가 올 가능성이 높다."}]},{"id":"vocab-0443","word":"change","ipa":"/tʃeɪndʒ/","kr":"**체인지**","mark":"*","pos":"명/동","mean":"① 변화 ② 잔돈 ③ 바꾸다","ex":[{"en":"The new policy brought a major **change**.","ko":"새 정책은 큰 변화를 가져왔다."},{"en":"Do you have **change** for ten dollars?","ko":"10달러짜리의 잔돈이 있나요?"},{"en":"We need to **change** the meeting time.","ko":"우리는 회의 시간을 바꿔야 한다."}]},{"id":"vocab-0444","word":"channel","ipa":"/ˈtʃænl/","kr":"**채**널","mark":"**","pos":"명","mean":"① 채널 ② 수로","ex":[{"en":"Change the television **channel**.","ko":"텔레비전 채널을 바꿔라."},{"en":"Water flows through this narrow **channel**.","ko":"물은 이 좁은 수로를 통해 흐른다."}]},{"id":"vocab-0445","word":"chaos","ipa":"/ˈkeɪɑːs/","kr":"**케이**아스","mark":"","pos":"명","mean":"① 혼돈 ② 혼란","ex":[{"en":"The sudden outage caused **chaos** in the office.","ko":"갑작스러운 정전은 사무실에 혼돈을 일으켰다."},{"en":"The storm caused **chaos**.","ko":"폭풍이 혼란을 일으켰다."}]},{"id":"vocab-0446","word":"character","ipa":"/ˈkærəktər/","kr":"**캐**릭터","mark":"**","pos":"명","mean":"① 성격 ② 등장인물 ③ 문자","ex":[{"en":"Emma has a kind **character**.","ko":"엠마는 친절한 성격을 지녔다."},{"en":"My favorite **character** is the brave girl.","ko":"내가 가장 좋아하는 등장인물은 그 용감한 소녀이다."},{"en":"The password must contain eight **characters**.","ko":"비밀번호는 여덟 문자를 포함해야 한다."}]},{"id":"vocab-0447","word":"characteristic","ipa":"/ˌkærəktəˈrɪstɪk/","kr":"캐릭터**리**스틱","mark":"**","pos":"명/형","mean":"① 특징 ② 특유의","ex":[{"en":"Patience is an important **characteristic**.","ko":"인내심은 중요한 특징이다."},{"en":"A warm smile is **characteristic** of her.","ko":"따뜻한 미소는 그녀에게 특유의 것이다."}]},{"id":"vocab-0448","word":"charge (discharge)","ipa":"/tʃɑːrdʒ/","kr":"**차ː**지","mark":"**","pos":"명/동","mean":"① 요금 ② 책임 ③ 충전하다","ex":[{"en":"There is no **charge** for delivery.","ko":"배달에는 요금이 없다."},{"en":"Mina is in **charge** of the support team.","ko":"미나는 지원팀을 책임지고 있다."},{"en":"Please **charge** the laptop before the trip.","ko":"출장 전에 노트북을 충전해 주세요."}]},{"id":"vocab-0449","word":"charity","ipa":"/ˈtʃærəti/","kr":"**채**러티","mark":"","pos":"명","mean":"① 자선 ② 자선 단체","ex":[{"en":"Grace gives much of her time to **charity**.","ko":"그레이스는 많은 시간을 자선에 바친다."},{"en":"The **charity** runs a shelter.","ko":"그 자선 단체는 보호소를 운영한다."}]},{"id":"vocab-0450","word":"charm","ipa":"/tʃɑːrm/","kr":"**참ː**","mark":"**","pos":"명/동","mean":"① 매력 ② 매혹하다","ex":[{"en":"The old town has a special **charm**.","ko":"그 오래된 마을에는 특별한 매력이 있다."},{"en":"The old town **charmed** every visitor.","ko":"그 오래된 마을은 모든 방문객을 매혹했다."}]},{"id":"vocab-0451","word":"chart","ipa":"/tʃɑːrt/","kr":"**차ː**트","mark":"**","pos":"명","mean":"① 도표 ② 차트","ex":[{"en":"The **chart** shows monthly sales.","ko":"그 도표는 월별 판매량을 보여 준다."},{"en":"The sales **chart** shows steady growth.","ko":"판매 차트는 꾸준한 성장을 보여 준다."}]},{"id":"vocab-0452","word":"chase","ipa":"/tʃeɪs/","kr":"**체이스**","mark":"**","pos":"동/명","mean":"① 뒤쫓다 ② 추격","ex":[{"en":"The dog **chased** the ball.","ko":"그 개는 공을 뒤쫓았다."},{"en":"The police began a long **chase**.","ko":"경찰은 긴 추격을 시작했다."}]},{"id":"vocab-0453","word":"chat","ipa":"/tʃæt/","kr":"**챗**","mark":"**","pos":"동/명","mean":"① 잡담하다 ② 수다","ex":[{"en":"We **chatted** for a few minutes after lunch.","ko":"우리는 점심 후 몇 분 동안 잡담했다."},{"en":"We **chatted** over coffee.","ko":"우리는 커피를 마시며 수다를 떨었다."}]},{"id":"vocab-0454","word":"cheap","ipa":"/tʃiːp/","kr":"**치ː**프","mark":"*","pos":"형","mean":"① 싼 ② 값싼","ex":[{"en":"This ticket is **cheap**.","ko":"이 표는 싸다."},{"en":"We bought a **cheap** printer for the office.","ko":"우리는 사무실용 값싼 프린터를 샀다."}]},{"id":"vocab-0455","word":"check / cheque","ipa":"/tʃek/","kr":"**첵**","mark":"*","pos":"동/명","mean":"① 확인하다 ② 점검 ③ 수표","ex":[{"en":"Please **check** your answers.","ko":"답을 확인해 주세요."},{"en":"The engineer completed a safety **check**.","ko":"그 기술자는 안전 점검을 마쳤다."},{"en":"Leo paid by **check**.","ko":"레오는 수표로 지불했다."}]},{"id":"vocab-0456","word":"cheek","ipa":"/tʃiːk/","kr":"**치ː**크","mark":"**","pos":"명","mean":"① 뺨 ② 볼","ex":[{"en":"The cold air touched my **cheek**.","ko":"찬 공기가 내 뺨에 닿았다."},{"en":"The young child kissed her mother on the **cheek**.","ko":"그 어린아이는 어머니의 볼에 입을 맞추었다."}]},{"id":"vocab-0457","word":"cheer","ipa":"/tʃɪr/","kr":"**치어**","mark":"**","pos":"동/명","mean":"① 응원하다 ② 환호","ex":[{"en":"The crowd **cheered** for the team.","ko":"관중은 그 팀을 응원했다."},{"en":"The crowd **cheered** loudly.","ko":"관중이 크게 환호했다."}]},{"id":"vocab-0458","word":"cheese","ipa":"/tʃiːz/","kr":"**치ː**즈","mark":"*","pos":"명","mean":"치즈","ex":[{"en":"I like **cheese** on pizza.","ko":"나는 피자에 치즈 얹는 것을 좋아한다."}]},{"id":"vocab-0459","word":"chef","ipa":"/ʃef/","kr":"**셰프**","mark":"","pos":"명","mean":"① 요리사 ② 주방장","ex":[{"en":"The **chef** made a delicious meal.","ko":"요리사가 맛있는 식사를 만들었다."},{"en":"The head **chef** checked every dish.","ko":"수석 주방장은 모든 요리를 확인했다."}]},{"id":"vocab-0460","word":"chemical","ipa":"/ˈkemɪkl/","kr":"**케**미컬","mark":"","pos":"명/형","mean":"① 화학 물질 ② 화학의","ex":[{"en":"This **chemical** is dangerous.","ko":"이 화학 물질은 위험하다."},{"en":"Keep dangerous **chemicals** away from children.","ko":"위험한 화학 물질을 아이들에게서 멀리 두어라."}]},{"id":"vocab-0461","word":"chest","ipa":"/tʃest/","kr":"**체스트**","mark":"**","pos":"명","mean":"① 가슴 ② 상자","ex":[{"en":"Lucas felt pain in his **chest**.","ko":"루카스는 가슴에 통증을 느꼈다."},{"en":"The documents were locked in a wooden **chest**.","ko":"그 문서들은 나무 상자에 잠겨 있었다."}]},{"id":"vocab-0462","word":"chew","ipa":"/tʃuː/","kr":"**추ː**","mark":"**","pos":"동","mean":"씹다","ex":[{"en":"**Chew** your food well.","ko":"음식을 잘 씹어라."}]},{"id":"vocab-0463","word":"chicken","ipa":"/ˈtʃɪkɪn/","kr":"**치**킨","mark":"*","pos":"명","mean":"① 닭 ② 닭고기","ex":[{"en":"A **chicken** walked across the yard.","ko":"닭 한 마리가 마당을 가로질러 걸었다."},{"en":"We grilled **chicken** for dinner.","ko":"우리는 저녁으로 닭고기를 구웠다."}]},{"id":"vocab-0464","word":"chief","ipa":"/tʃiːf/","kr":"**치ː**프","mark":"**","pos":"명/형","mean":"① 우두머리 ② 주요한","ex":[{"en":"The village **chief** welcomed us.","ko":"마을 우두머리가 우리 ":"","pos":"동","mean":"① 인용하다 ② 언급하다","ex":[{"en":"The writer **cited** several studies.","ko":"그 작가는 여러 연구를 인용했다."},{"en":"The final report **cites** several recent problems.","ko":"최종 보고서는 최근 문제 몇 가지를 언급한다."}]},{"id":"vocab-0483","word":"citizen","ipa":"/ˈsɪtɪzn/","kr":"**시**티즌","mark":"**","pos":"명","mean":"① 시민 ② 국민","ex":[{"en":"Every **citizen** has rights and duties.","ko":"모든 시민에게는 권리와 의무가 있다."},{"en":"Every **citizen** must obey the law.","ko":"모든 국민은 법을 따라야 한다."}]},{"id":"vocab-0484","word":"city","ipa":"/ˈsɪti/","kr":"**시**티","mark":"*","pos":"명","mean":"도시","ex":[{"en":"The **city** is crowded at night.","ko":"그 도시는 밤에 붐빈다."}]},{"id":"vocab-0485","word":"civil","ipa":"/ˈsɪvl/","kr":"**시**블","mark":"**","pos":"형","mean":"① 시민의 ② 민간의","ex":[{"en":"They discussed **civil** rights.","ko":"그들은 시민의 권리를 논의했다."},{"en":"A **civil** company handled the project, not the army.","ko":"군대가 아니라 민간 회사가 그 프로젝트를 맡았다."}]},{"id":"vocab-0486","word":"claim","ipa":"/kleɪm/","kr":"**클레임**","mark":"**","pos":"동/명","mean":"① 주장하다 ② 요구 ③ 주장","ex":[{"en":"The vendor **claims** the system is secure.","ko":"그 공급업체는 그 시스템이 안전하다고 주장한다."},{"en":"One customer made a **claim** for a refund.","ko":"한 고객은 환불을 요구했다."},{"en":"He **claims** that he is innocent.","ko":"그는 자신이 무죄라고 주장한다."}]},{"id":"vocab-0487","word":"clap","ipa":"/klæp/","kr":"**클랩**","mark":"","pos":"동/명","mean":"① 박수치다 ② 박수","ex":[{"en":"The audience **clapped** after the speech.","ko":"청중은 연설 후에 박수쳤다."},{"en":"A loud **clap** came from the audience.","ko":"큰 박수 소리가 관중석에서 들렸다."}]},{"id":"vocab-0488","word":"clash","ipa":"/klæʃ/","kr":"**클래시**","mark":"","pos":"동/명","mean":"① 충돌하다 ② 충돌","ex":[{"en":"The two groups **clashed** over the issue.","ko":"두 집단은 그 문제를 두고 충돌했다."},{"en":"A brief **clash** broke out near the entrance.","ko":"입구 근처에서 짧은 충돌이 일어났다."}]},{"id":"vocab-0489","word":"class (classic, classify)","ipa":"/klæs/","kr":"**클래스**","mark":"*","pos":"명","mean":"① 학급 ② 수업 ③ 계층","ex":[{"en":"Our **class** has twenty students.","ko":"우리 학급에는 학생이 스무 명 있다."},{"en":"Our **class** starts at ten.","ko":"우리 수업은 10시에 시작한다."},{"en":"The policy affected every social **class**.","ko":"그 정책은 모든 사회 계층에 영향을 미쳤다."}]},{"id":"vocab-0490","word":"clause","ipa":"/klɔːz/","kr":"**클로ː**즈","mark":"","pos":"명","mean":"① 조항 ② 절","ex":[{"en":"Read the final **clause** of the contract.","ko":"계약서의 마지막 조항을 읽어라."},{"en":"This **clause** contains a complete sentence.","ko":"이 절은 완전한 문장을 포함한다."}]},{"id":"vocab-0491","word":"clay","ipa":"/kleɪ/","kr":"**클레이**","mark":"","pos":"명","mean":"① 점토 ② 찰흙","ex":[{"en":"The pot is made of **clay**.","ko":"그 항아리는 점토로 만들어졌다."},{"en":"The children made animals from **clay**.","ko":"아이들은 찰흙으로 동물을 만들었다."}]},{"id":"vocab-0492","word":"clean","ipa":"/kliːn/","kr":"**클린ː**","mark":"*","pos":"형/동","mean":"① 깨끗한 ② 청소하다","ex":[{"en":"Keep your room **clean**.","ko":"방을 깨끗하게 유지해라."},{"en":"Please **clean** your room before dinner.","ko":"저녁 식사 전에 방을 청소해 주세요."}]},{"id":"vocab-0493","word":"clear (clarify)","ipa":"/klɪr/","kr":"**클리어**","mark":"*","pos":"형/동","mean":"① 맑은 ② 분명한 ③ 치우다","ex":[{"en":"The sky is **clear** today.","ko":"오늘 하늘이 맑다."},{"en":"The instructions are **clear**.","ko":"그 지시 사항은 분명하다."},{"en":"Please **clear** the boxes from the hallway.","ko":"복도에서 상자들을 치워 주세요."}]},{"id":"vocab-0494","word":"clerk","ipa":"/klɜːrk/","kr":"**클러ː**크","mark":"**","pos":"명","mean":"① 점원 ② 사무원","ex":[{"en":"The **clerk** helped me find the book.","ko":"점원이 내가 책을 찾도록 도와주었다."},{"en":"The office **clerk** filed the documents.","ko":"그 사무원이 문서들을 정리했다."}]},{"id":"vocab-0495","word":"clever","ipa":"/ˈklevər/","kr":"**클레**버","mark":"*","pos":"형","mean":"① 영리한 ② 똑똑한","ex":[{"en":"That was a **clever** solution.","ko":"그것은 영리한 해결책이었다."},{"en":"The **clever** student found the answer.","ko":"그 똑똑한 학생이 답을 찾았다."}]},{"id":"vocab-0496","word":"click","ipa":"/klɪk/","kr":"**클릭**","mark":"**","pos":"동/명","mean":"① 클릭하다 ② 딸깍 소리","ex":[{"en":"**Click** the button to continue.","ko":"계속하려면 버튼을 클릭해라."},{"en":"I heard a **click** from the lock.","ko":"나는 자물쇠에서 딸깍 소리를 들었다."}]},{"id":"vocab-0497","word":"client","ipa":"/ˈklaɪənt/","kr":"**클라이**언트","mark":"**","pos":"명","mean":"① 고객 ② 의뢰인","ex":[{"en":"The **client** asked for a revised proposal.","ko":"그 고객은 수정된 제안서를 요청했다."},{"en":"The lawyer met his **client**.","ko":"변호사가 의뢰인을 만났다."}]},{"id":"vocab-0498","word":"cliff","ipa":"/klɪf/","kr":"**클리프**","mark":"**","pos":"명","mean":"절벽","ex":[{"en":"They stood at the top of the **cliff**.","ko":"그들은 절벽 꼭대기에 서 있었다."}]},{"id":"vocab-0499","word":"climate","ipa":"/ˈklaɪmət/","kr":"**클라이**밋","mark":"**","pos":"명","mean":"기후","ex":[{"en":"The island has a warm **climate**.","ko":"그 섬은 기후가 따뜻하다."}]},{"id":"vocab-0500","word":"climb","ipa":"/klaɪm/","kr":"**클라임**","mark":"*","pos":"동","mean":"① 오르다 ② 등반하다","ex":[{"en":"We **climbed** the stairs to the roof.","ko":"우리는 지붕으로 가는 계단을 올랐다."},{"en":"They **climbed** the mountain before sunrise.","ko":"그들은 해 뜨기 전에 산을 등반했다."}]},{"id":"vocab-0501","word":"cling","ipa":"/klɪŋ/","kr":"**클링**","mark":"","pos":"동","mean":"① 매달리다 ② 달라붙다","ex":[{"en":"A child **clung** to the railing.","ko":"한 아이는 난간에 매달렸다."},{"en":"Wet paper can **cling** to the glass.","ko":"젖은 종이는 유리에 달라붙을 수 있다."}]},{"id":"vocab-0502","word":"clinic","ipa":"/ˈklɪnɪk/","kr":"**클리**닉","mark":"","pos":"명","mean":"① 병원 ② 진료소","ex":[{"en":"The **clinic** treats many local patients.","ko":"그 병원은 많은 지역 환자를 치료한다."},{"en":"Mina went to the **clinic** for a checkup.","ko":"미나는 검진을 받으러 진료소에 갔다."}]},{"id":"vocab-0503","word":"clip","ipa":"/klɪp/","kr":"**클립**","mark":"**","pos":"명/동","mean":"① 클립 ② 오려내다","ex":[{"en":"Use a **clip** to hold the papers.","ko":"종이를 고정하려면 클립을 사용해라."},{"en":"She **clipped** the coupon from the page.","ko":"그녀는 페이지에서 쿠폰을 오려냈다."}]},{"id":"vocab-0504","word":"clock","ipa":"/klɑːk/","kr":"**클락**","mark":"*","pos":"명","mean":"시계","ex":[{"en":"The **clock** on the wall is slow.","ko":"벽에 걸린 시계가 느리다."}]},{"id":"vocab-0505","word":"close (disclose, enclose)","ipa":"/k
