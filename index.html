  applyFilter();
  saveState();
});
reviewBtns.forEach(b=>{
  b.addEventListener("click",()=>{
    const k=b.dataset.review;
    if(!REVIEW_KEYS.includes(k)) return;
    state.reviewAll=false;
    state.reviewOn[k]=!state.reviewOn[k];
    updateFilterUI();
    applyFilter();
    saveState();
  });
});

Object.keys(gradeBtns).forEach(g=>{
  gradeBtns[g].addEventListener("click",()=>{
    state.gradeOn[g]=!state.gradeOn[g]; // 셋 다 꺼진 빈 결과도 정상 상태
    updateFilterUI();
    applyFilter();   // orderMode 유지된 채 재구성
    saveState();
  });
});

const shuffleBtn=document.getElementById("shuffle"),shuffleLabel=document.getElementById("shuffleLabel");
shuffleBtn.addEventListener("click",()=>{
  // 순서대로 ↔ 랜덤 토글. 상태를 state.orderMode에 보관.
  state.orderMode = state.orderMode==="shuffle" ? "sequential" : "shuffle";
  const on = state.orderMode==="shuffle";
  shuffleBtn.classList.toggle("on",on);
  shuffleBtn.setAttribute("aria-pressed",String(on));
  shuffleLabel.textContent = on ? "랜덤" : "순서대로";
  // 현재 필터를 유지한 채 순서만 재구성 (켜면 섞고, 끄면 원래 순서)
  if(cards.length){
    order=cards.map((_,i)=>i);
    if(on) shuffleArr(order);
    pos=0;
    renderCard();
  }
  saveState();
});

const maskBtn=document.getElementById("maskMode");
maskBtn.addEventListener("click",()=>{
  state.masked=!state.masked;
  maskBtn.classList.toggle("on",state.masked);
  maskBtn.setAttribute("aria-pressed",String(state.masked));
  maskBtn.textContent=state.masked?"뜻 보기":"뜻 숨기기";
  renderCard();
  saveState();
});

const speedBtn=document.getElementById("speed"),speedLabel=document.getElementById("speedLabel");
speedBtn.addEventListener("click",()=>{
  state.slow=!state.slow;speedBtn.classList.toggle("on",state.slow);
  speedBtn.setAttribute("aria-pressed",String(state.slow));
  speedLabel.textContent=state.slow?"속도-느림":"속도-보통";
  saveState();
});

// 전역 단축키를 무시할 포커스 대상 (입력/버튼/링크/선택/편집영역)
function isInteractive(elm){
  if(!elm)return false;
  const tag=elm.tagName;
  if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||tag==="BUTTON"||tag==="A")return true;
  if(elm.isContentEditable)return true;
  return false;
}
document.addEventListener("keydown",e=>{
  if(isInteractive(e.target))return;   // 포커스가 조작 요소에 있으면 단축키 미실행
  if(e.key==="ArrowLeft"){e.preventDefault();go(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();go(1);}
  else if(e.key===" "){e.preventDefault();const c=stage.querySelector(".card.masked");if(c)c.classList.remove("masked");}
  else if(e.key==="1"){e.preventDefault();setStatus("unknown");}
  else if(e.key==="2"){e.preventDefault();setStatus("unsure");}
  else if(e.key==="3"){e.preventDefault();setStatus("known");}
});

// TTS 미지원 브라우저: 관련 UI(속도 버튼)를 통째로 숨김.
// 표제어 재생 아이콘·예문 재생 버튼은 renderCard에서 애초에 생성하지 않음.
if(!TTS){
  speedBtn.hidden=true;
}

/* ---- 검색 / 색인 ---- */
const searchBox=document.getElementById("searchBox");
const suggestEl=document.getElementById("suggest");
let sgActive=-1, sgItems=[];

function escHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

// 괄호 앞 기본형만 비교 대상으로 ("a (an)" -> "a")
function baseWord(w){return stripBold(w||"").split("(")[0].trim().toLowerCase();}

function runSearch(){
  const q=searchBox.value.trim().toLowerCase();
  sgActive=-1; sgItems=[];
  if(!q){suggestEl.hidden=true;suggestEl.innerHTML="";return;}
  // 현재 필터를 통과한 cards 안에서 접두 일치, 최대 5개
  const hits=[];
  for(let i=0;i<cards.length && hits.length<5;i++){
    if(baseWord(cards[i].word).startsWith(q)) hits.push(i);
  }
  if(!hits.length){
    suggestEl.hidden=false;
    suggestEl.innerHTML='<li class="sg-empty" aria-disabled="true">일치하는 단어가 없어요 — 필터/철자를 확인해 보세요</li>';
    return;
  }
  sgItems=hits;
  suggestEl.innerHTML=hits.map((ci,idx)=>{
    const d=cards[ci];
    // 입력한 접두 부분을 굵게 (기본형 기준 글자수만큼)
    const qlen=q.length;
    const bold="<b>"+escHtml(d.word.slice(0,qlen))+"</b>"+escHtml(d.word.slice(qlen));
    const star=d.mark==="**"?"★★":(d.mark==="*"?"★":"☆");
    const posTxt=d.pos?('<span class="sg-pos">'+escHtml(d.pos)+"</span>"):"";
    return '<li data-ci="'+ci+'" data-idx="'+idx+'">'+
      '<span class="sg-word">'+bold+"</span>"+posTxt+
      '<span class="sg-star">'+star+"</span></li>";
  }).join("");
  suggestEl.hidden=false;
}

// 선택한 카드로 이동 — order(셔플 반영) 상의 위치를 찾아 pos 설정
function gotoCard(ci){
  const p=order.indexOf(ci);
  if(p<0) return;
  pos=p;
  renderCard();
  suggestEl.hidden=true;
  searchBox.blur();
}

function highlight(n){
  const lis=[...suggestEl.querySelectorAll("li[data-ci]")];
  if(!lis.length)return;
  sgActive=(n+lis.length)%lis.length;
  lis.forEach((li,i)=>li.classList.toggle("active",i===sgActive));
}

searchBox.addEventListener("input",runSearch);
searchBox.addEventListener("focus",()=>{if(searchBox.value.trim())runSearch();});
searchBox.addEventListener("keydown",e=>{
  const lis=[...suggestEl.querySelectorAll("li[data-ci]")];
  if(e.key==="ArrowDown"){e.preventDefault();highlight(sgActive+1);}
  else if(e.key==="ArrowUp"){e.preventDefault();highlight(sgActive-1);}
  else if(e.key==="Enter"){
    e.preventDefault();
    const pick = sgActive>=0 ? lis[sgActive] : lis[0];
    if(pick) gotoCard(parseInt(pick.dataset.ci,10));
  }else if(e.key==="Escape"){suggestEl.hidden=true;searchBox.blur();}
});
suggestEl.addEventListener("click",e=>{
  const li=e.target.closest("li[data-ci]");
  if(li) gotoCard(parseInt(li.dataset.ci,10));
});
document.addEventListener("click",e=>{
  if(!e.target.closest(".search-wrap")) suggestEl.hidden=true;
});

/* ---- 학습 상태 초기화 · 불러오기 · 저장 · QR 공유 ---- */
const loadBtn=document.getElementById("loadProgress");
const saveBtn=document.getElementById("saveProgress");
const stateModal=document.getElementById("stateModal");
const stateDialog=stateModal.querySelector(".state-dialog");
const stateModalTitle=document.getElementById("stateModalTitle");
const stateModalHelp=document.getElementById("stateModalHelp");
const stateCode=document.getElementById("stateCode");
const stateQrPanel=document.getElementById("stateQrPanel");
const stateQrGraphic=document.getElementById("stateQrGraphic");
const stateQrNote=document.getElementById("stateQrNote");
const stateQr=document.getElementById("stateQr");
const stateMessage=document.getElementById("stateMessage");
const stateCancel=document.getElementById("stateCancel");
const statePrimary=document.getElementById("statePrimary");
const shareToast=document.getElementById("shareToast");
let stateModalMode="save";
let stateModalView="code";
let stateShareUrl="";
let stateModalReturnFocus=null;
let shareToastTimer=0;

function setStateMessage(text,isError=false){
  stateMessage.textContent=text||"";
  stateMessage.classList.toggle("error",!!isError);
}
function showShareToast(text,isError=false){
  clearTimeout(shareToastTimer);
  shareToast.textContent=text;
  shareToast.classList.toggle("error",!!isError);
  shareToast.hidden=false;
  shareToastTimer=setTimeout(()=>{shareToast.hidden=true;},3600);
}
function makeStateShareUrl(code){
  if(location.protocol!=="https:" && location.protocol!=="http:"){
    throw new Error("QR 공유는 GitHub Pages에서 열었을 때 사용할 수 있어요.");
  }
  const url=new URL(location.href);
  url.search="";
  url.hash="";
  return url.toString()+"#s="+code;
}
function showCodeView(){
  stateModalView="code";
  stateCode.hidden=false;
  stateQrPanel.hidden=true;
  stateQr.textContent="QR";
  stateModalHelp.textContent="아래 코드를 복사해 다른 기기에서 불러올 수 있어요.";
  setStateMessage("");
  requestAnimationFrame(()=>{stateCode.focus();stateCode.select();});
}
function showQrView(){
  try{
    stateShareUrl=makeStateShareUrl(stateCode.value);
    const qr=MiniQR.toSvg(stateShareUrl);
    stateQrGraphic.innerHTML=qr.svg;
    stateQrNote.textContent=qr.moduleCount>=105
      ? "학습 기록이 많아 QR이 촘촘해요. 화면 밝기를 높이고 정면에서 스캔하세요."
      : "다른 기기의 카메라로 스캔하세요.";
  }catch(e){
    setStateMessage(e && e.message ? e.message : "QR 코드를 만들 수 없어요.",true);
    return;
  }
  stateModalView="qr";
  stateCode.hidden=true;
  stateQrPanel.hidden=false;
  stateQr.textContent="코드";
  stateModalHelp.textContent="카메라로 스캔하면 이 웹앱이 열리고 학습 상태가 자동으로 불러와져요.";
  setStateMessage("");
}
function openStateModal(mode){
  stateModalMode=mode;
  stateModalView="code";
  stateShareUrl="";
  stateModalReturnFocus=document.activeElement;
  stateQrGraphic.innerHTML="";
  stateQrPanel.hidden=true;
  setStateMessage("");
  if(mode==="save"){
    stateModalTitle.textContent="학습 상태 저장";
    stateModalHelp.textContent="아래 코드를 복사해 다른 기기에서 불러올 수 있어요.";
    stateCode.hidden=false;
    stateCode.value=makeShareCode();
    stateCode.readOnly=true;
    stateCode.placeholder="";
    stateQr.hidden=false;
    stateQr.textContent="QR";
    statePrimary.textContent="복사";
    stateCancel.textContent="닫기";
  }else{
    stateModalTitle.textContent="학습 상태 불러오기";
    stateModalHelp.textContent="다른 기기에서 저장한 코드를 붙여 넣으세요. 현재 학습 상태는 코드의 내용으로 바뀝니다.";
    stateCode.hidden=false;
    stateCode.value="";
    stateCode.readOnly=false;
    stateCode.placeholder="B3K1로 시작하는 학습 상태 코드";
    stateQr.hidden=true;
    statePrimary.textContent="불러오기";
    stateCancel.textContent="취소";
  }
  stateModal.hidden=false;
  document.body.classList.add("modal-open");
  requestAnimationFrame(()=>{
    stateCode.focus();
    if(mode==="save") stateCode.select();
  });
}
function closeStateModal(){
  stateModal.hidden=true;
  document.body.classList.remove("modal-open");
  stateQrGraphic.innerHTML="";
  stateShareUrl="";
  setStateMessage("");
  if(stateModalReturnFocus && typeof stateModalReturnFocus.focus==="function") stateModalReturnFocus.focus();
}
async function copyText(text,successMessage){
  let copied=false;
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      copied=true;
    }
  }catch(e){ /* 아래 선택 복사로 대체 */ }
  if(!copied){
    const fallback=stateModalView==="code" ? stateCode : document.createElement("textarea");
    if(stateModalView!=="code"){
      fallback.value=text;
      fallback.setAttribute("readonly","");
      fallback.style.position="fixed";
      fallback.style.opacity="0";
      document.body.appendChild(fallback);
    }
    fallback.focus();fallback.select();
    try{copied=document.execCommand("copy");}catch(e){copied=false;}
    if(stateModalView!=="code") fallback.remove();
  }
  setStateMessage(copied ? successMessage : "복사하지 못했어요. 다시 시도해 주세요.",!copied);
}
function copyStateCode(){
  if(stateModalView==="qr"){
    if(!stateShareUrl){
      try{stateShareUrl=makeStateShareUrl(stateCode.value);}
      catch(e){setStateMessage(e.message,true);return;}
    }
    copyText(stateShareUrl,"공유 링크를 복사했어요.");
  }else{
    copyText(stateCode.value,"복사했어요.");
  }
}
function importStateCode(){
  let next;
  try{next=decodeShareCode(stateCode.value);}
  catch(e){setStateMessage("올바른 학습 상태 코드가 아니에요.",true);return;}
  const keepId=currentCardId;
  cardStates=next; // 병합이 아니라 저장 코드의 상태로 완전히 복원
  saveState();
  renderStatusBar();
  applyFilter(keepId);
  closeStateModal();
}
function sharedCodeFromHash(){
  if(!location.hash.startsWith("#s=")) return null;
  if(location.hash.length>5000) throw new Error("공유 주소가 너무 깁니다.");
  return decodeURIComponent(location.hash.slice(3));
}
function clearShareHash(){
  try{history.replaceState(null,"",location.pathname+location.search);}catch(e){location.hash="";}
}
function consumeSharedStateFromHash(){
  let raw;
  try{raw=sharedCodeFromHash();}
  catch(e){clearShareHash();return {ok:false,message:"QR의 학습 상태 주소가 올바르지 않아요."};}
  if(raw===null) return null;
  try{
    cardStates=decodeShareCode(raw);
    saveState();
    clearShareHash();
    return {ok:true,message:"QR에서 학습 상태를 불러왔어요."};
  }catch(e){
    clearShareHash();
    return {ok:false,message:"QR의 학습 상태 코드가 올바르지 않아요."};
  }
}

resetBtn.addEventListener("click",()=>{
  const keepId=currentCardId;
  cardStates={};
  saveState();
  renderStatusBar();
  // 필터와 현재 위치는 유지하고, 새 조건 결과만 다시 계산
  applyFilter(keepId);
});
loadBtn.addEventListener("click",()=>openStateModal("load"));
saveBtn.addEventListener("click",()=>openStateModal("save"));
stateQr.addEventListener("click",()=>{
  if(stateModalView==="qr") showCodeView();
  else showQrView();
});
stateCancel.addEventListener("click",closeStateModal);
statePrimary.addEventListener("click",()=>{
  if(stateModalMode==="save") copyStateCode();
  else importStateCode();
});
stateModal.addEventListener("click",e=>{if(e.target===stateModal)closeStateModal();});
stateModal.addEventListener("keydown",e=>{
  if(e.key==="Escape"){e.preventDefault();closeStateModal();return;}
  if(e.key==="Enter" && stateModalMode==="load" && !e.shiftKey){
    e.preventDefault();importStateCode();return;
  }
  if(e.key==="Tab"){
    const focusable=[...stateDialog.querySelectorAll('textarea,button:not([disabled])')]
      .filter(el=>!el.hidden && el.offsetParent!==null);
    if(!focusable.length)return;
    const first=focusable[0],last=focusable[focusable.length-1];
    if(e.shiftKey && document.activeElement===first){e.preventDefault();last.focus();}
    else if(!e.shiftKey && document.activeElement===last){e.preventDefault();first.focus();}
  }
});

// 저장된 설정을 각 버튼 UI(라벨·활성·aria)에 반영
function syncSettingsUI(){
  // 속도
  speedBtn.classList.toggle("on",state.slow);
  speedBtn.setAttribute("aria-pressed",String(state.slow));
  speedLabel.textContent=state.slow?"속도-느림":"속도-보통";
  // 숨김
  maskBtn.classList.toggle("on",state.masked);
  maskBtn.setAttribute("aria-pressed",String(state.masked));
  maskBtn.textContent=state.masked?"뜻 보기":"뜻 숨기기";
  // 랜덤
  const on=state.orderMode==="shuffle";
  shuffleBtn.classList.toggle("on",on);
  shuffleBtn.setAttribute("aria-pressed",String(on));
  shuffleLabel.textContent=on?"랜덤":"순서대로";
}

/* ---- first paint ---- */
loadState();          // 1) 저장된 설정·기록 복원 (검증 포함, 실패해도 기본값)
const sharedImportResult=consumeSharedStateFromHash(); // 2) QR 공유 주소가 있으면 학습 상태만 복원
start(EMBED.map(d=>({ // 3) 내장 3,000개로 시작. start→applyFilter가 복원된 currentCardId를
  id:d.id||"",        //    유지 대상으로 삼아 위치를 잡고(없으면 첫 카드), orderMode도 반영
  word:d.word||"",ipa:d.ipa||"",kr:d.kr||"",
  mark:d.mark||"",pos:d.pos||"",mean:d.mean||"",
  ex:Array.isArray(d.ex)?d.ex:[]
})));
syncSettingsUI();     // 4) 설정 버튼 UI 동기화
renderStatusBar();    // 5) 학습 현황 표시
if(sharedImportResult) requestAnimationFrame(()=>showShareToast(sharedImportResult.message,!sharedImportResult.ok));
</script>
