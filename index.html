<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>초중고 영단어 3000</title>
<meta name="app-build" content="gpt-20260721-final-review-1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%236b1f2a'/%3E%3Crect x='14' y='16' width='30' height='34' rx='4' fill='%23f4ecdd' transform='rotate(-8 29 33)'/%3E%3Crect x='20' y='16' width='30' height='34' rx='4' fill='%23fbf7ee' stroke='%23c9a24a' stroke-width='2'/%3E%3Ctext x='35' y='40' font-family='Georgia,serif' font-size='22' font-weight='700' fill='%236b1f2a' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --paper:#F6F3EC;
    --card:#FFFFFF;
    --ink:#22201B;
    --ink-soft:#6B6455;
    --hair:#E4DECF;
    --oxblood:#8C3B2E;
    --oxblood-soft:#B5644F;
    --forest:#4F6B4A;
    --gold:#8F6D22;
    --shadow:rgba(40,34,24,.10);
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Noto Serif KR",Georgia,serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;
    min-height:100%;display:flex;flex-direction:column;
  }
  .wrap{width:100%;max-width:640px;margin:0 auto;padding:20px 18px 40px;flex:1;display:flex;flex-direction:column}
  button{font-family:inherit;cursor:pointer}

  /* header */
  header.mast{padding:8px 0 16px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .eyebrow{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--oxblood);margin:0}
  h1{font-size:20px;margin:0;font-weight:700;letter-spacing:-.01em}
  .counter{margin-left:auto;font-family:"SF Mono",ui-monospace,Menlo,monospace;
    font-size:13px;color:var(--ink-soft)}

  /* progress bar */
  .track{height:3px;background:var(--hair);border-radius:2px;overflow:hidden;margin:0 0 20px}
  .track > i{display:block;height:100%;width:0;background:var(--oxblood);transition:width .25s}

  /* search / index */
  .search-wrap{position:relative;margin:0 0 14px}
  #searchBox{width:100%;box-sizing:border-box;border:1.5px solid var(--hair);
    border-radius:2px;background:var(--paper);color:var(--ink);
    font-family:Georgia,"Times New Roman",serif;font-size:16px;padding:11px 14px;
    transition:border-color .15s}
  #searchBox:focus{outline:none;border-color:var(--gold)}
  #searchBox::placeholder{color:var(--ink-soft);opacity:.65;
    font-family:system-ui,-apple-system,sans-serif;font-size:14px}
  .suggest{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:20;margin:0;
    padding:4px;list-style:none;background:var(--paper);border:1.5px solid var(--gold);
    border-radius:3px;box-shadow:0 8px 24px rgba(60,30,20,.14)}
  .suggest li{padding:9px 12px;border-radius:2px;cursor:pointer;display:flex;
    align-items:baseline;gap:10px;transition:background .1s}
  .suggest li:hover,.suggest li.active{background:var(--hair)}
  .suggest .sg-word{font-family:Georgia,serif;font-size:16px;color:var(--ink);font-weight:600}
  .suggest .sg-word b{color:var(--oxblood);font-weight:800}
  .suggest .sg-pos{font-size:11px;color:var(--ink-soft);
    font-family:system-ui,-apple-system,sans-serif}
  .suggest .sg-star{margin-left:auto;color:var(--gold);font-size:12px}
  .suggest .sg-empty{color:var(--ink-soft);font-size:13px;cursor:default;
    font-family:system-ui,-apple-system,sans-serif}
  .suggest .sg-empty:hover{background:transparent}

  .btn{border:1.5px solid var(--ink);background:transparent;color:var(--ink);border-radius:2px;
    padding:6px 11px;font-size:12.5px;display:inline-flex;align-items:center;gap:6px;
    white-space:nowrap;transition:background .15s,color .15s}
  .btn.fixw{justify-content:center;min-width:82px}
  .btn:hover{background:var(--ink);color:var(--paper)}
  .btn.on{background:var(--oxblood);border-color:var(--oxblood);color:#fff}
  .btn.ghost{border-color:var(--hair);color:var(--ink-soft)}
  .btn.ghost:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* difficulty filter — checkbox style */
  .chk{display:inline-flex;align-items:center;gap:6px;background:transparent;
    border:1px solid var(--hair);border-radius:2px;padding:6px 9px;font-size:13px;
    color:var(--ink-soft);white-space:nowrap;transition:color .15s,border-color .15s}
  .chk:hover{border-color:var(--gold)}
  .chk .box{width:15px;height:15px;flex:none;border:1.5px solid var(--ink-soft);
    border-radius:3px;position:relative;transition:background .15s,border-color .15s}
  .chk .box::after{content:"";position:absolute;left:4px;top:0px;width:4px;height:9px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) scale(0);
    transition:transform .12s}
  .chk .lbl{color:var(--gold);font-weight:700;letter-spacing:.5px}
  .chk em{font-style:normal;font-size:10.5px;opacity:.65;
    font-family:"SF Mono",ui-monospace,Menlo,monospace}
  .chk.on{border-color:var(--gold);color:var(--ink)}
  .chk.on .box{background:var(--gold);border-color:var(--gold)}
  .chk.on .box::after{transform:rotate(45deg) scale(1)}

  /* toolbar layout */
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 12px}
  /* 필터가 접혀 있을 때 카드가 남은 화면의 중앙으로 밀려 내려가지 않게 함 */
  .wrap:not(.filters-open) .toolbar{margin-bottom:6px}
  .wrap:not(.filters-open) .stage{justify-content:flex-start}

  /* 꺾쇠 토글 버튼 */
  .btn.chevron{min-width:34px;justify-content:center;padding:6px 9px;margin-left:auto}
  .btn.chevron .chev{display:inline-block;font-size:18px;line-height:1;transition:transform .18s ease}
  .btn.chevron[aria-expanded="true"] .chev{transform:rotate(90deg)}

  /* 접이식 필터 패널 (난이도 + 학습 상태) */
  .filter-panel{display:flex;flex-direction:column;gap:12px;margin:0 0 12px;
    padding:12px;border:1px solid var(--hair);border-radius:4px;background:var(--card)}
  .filter-group{display:flex;flex-direction:column;gap:6px}
  .filter-heading{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    color:var(--ink);font-size:12px;font-weight:700;letter-spacing:.02em}
  .filter-note{color:var(--ink-soft);font-size:10.5px;font-weight:400}
  .filter-row{display:flex;flex-wrap:wrap;gap:6px}
  .chk-rev .lbl{color:var(--ink-soft);font-weight:600;letter-spacing:0}
  .chk-rev.on .lbl{color:var(--ink)}

  /* 학습 상태 제목 줄의 보조 동작 */
  .status-actions{margin-left:auto;display:inline-flex;align-items:center;gap:5px;
    white-space:nowrap;flex:0 0 auto}
  .status-action{display:inline-block;padding:2px 3px;border:0;background:transparent;color:var(--ink-soft);
    font-family:inherit;font-size:10.5px;font-weight:500;line-height:1.4;cursor:pointer}
  .status-sep{color:var(--hair);font-size:10px;line-height:1;user-select:none}
  .status-action:not(:disabled):hover{color:var(--oxblood);text-decoration:underline;
    text-underline-offset:2px}
  .status-action:disabled{opacity:.35;cursor:default;text-decoration:none}

  /* 학습 상태 저장 코드 팝업 */
  .state-modal{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:20px;
    background:rgba(42,35,29,.38);backdrop-filter:blur(2px)}
  .state-dialog{width:min(560px,100%);background:var(--card);border:1px solid var(--hair);
    border-radius:8px;box-shadow:0 18px 55px rgba(42,35,29,.22);padding:20px}
  .state-dialog h2{margin:0;color:var(--ink);font-size:18px;letter-spacing:-.01em}
  .state-dialog p{margin:7px 0 12px;color:var(--ink-soft);font-size:12px;line-height:1.55}
  .state-code{box-sizing:border-box;width:100%;min-height:150px;padding:12px;border:1px solid var(--hair);
    border-radius:4px;background:var(--paper);color:var(--ink);font-family:"SF Mono",ui-monospace,Menlo,monospace;
    font-size:12px;line-height:1.55;resize:vertical;overflow-wrap:anywhere;outline:none}
  .state-code:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(143,109,34,.12)}
  .state-message{min-height:20px;margin-top:8px;color:var(--ink-soft);font-size:11.5px}
  .state-message.error{color:var(--oxblood)}
  .state-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
  .state-modal-actions .btn{justify-content:center;min-width:72px}
  .state-qr-panel{display:flex;flex-direction:column;align-items:center;gap:9px}
  .state-qr-graphic{box-sizing:border-box;width:min(360px,100%);padding:10px;border:1px solid var(--hair);
    border-radius:4px;background:#fff}
  .state-qr-graphic svg{display:block;width:100%;height:auto}
  .state-qr-note{color:var(--ink-soft);font-size:11.5px;line-height:1.5;text-align:center}
  .share-toast{position:fixed;z-index:120;left:50%;bottom:24px;transform:translateX(-50%);
    max-width:min(420px,calc(100% - 32px));padding:9px 13px;border-radius:4px;background:var(--ink);
    color:var(--card);font-size:12px;box-shadow:0 8px 24px rgba(42,35,29,.2);text-align:center}
  .share-toast.error{background:var(--oxblood)}
  body.modal-open{overflow:hidden}

  /* 낯섦·익힘·익숙 학습 상태 버튼 */
  .rate{display:flex;gap:8px;margin-top:20px}
  .rate button{flex:1;justify-content:center;border:1.5px solid var(--hair);background:transparent;
    color:var(--ink-soft);border-radius:2px;padding:9px;font-size:13.5px;font-family:inherit;
    display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s,border-color .15s}
  .rate button:hover{border-color:var(--ink-soft);color:var(--ink)}
  .rate button.on[data-status="unknown"]{background:var(--oxblood);border-color:var(--oxblood);color:#fff}
  .rate button.on[data-status="unsure"]{background:var(--gold);border-color:var(--gold);color:#fff}
  .rate button.on[data-status="known"]{background:var(--forest);border-color:var(--forest);color:#fff}

  /* card */
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:340px}
  .card{
    background:var(--card);border:1px solid var(--hair);border-radius:8px;
    padding:34px 30px;box-shadow:0 6px 22px var(--shadow);position:relative;
  }
  .pos-mark{position:absolute;top:20px;right:24px;text-align:right;line-height:1.2}
  .pos{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--forest);border:1px solid var(--forest);
    border-radius:2px;padding:2px 7px;display:inline-block}
  .stars{color:var(--gold);font-size:15px;letter-spacing:2px;margin-top:6px;display:block}

  .word{font-size:clamp(32px,8vw,46px);font-weight:700;letter-spacing:-.015em;line-height:1.05;
    display:inline-flex;align-items:center;gap:13px;color:var(--ink);
    background:none;border:none;padding:0;margin:0;font-family:inherit;text-align:left}
  button.word{cursor:pointer}
  button.word:hover{color:var(--oxblood)}
  .spk{width:30px;height:30px;flex:none;border-radius:50%;border:2px solid currentColor;
    display:inline-flex;align-items:center;justify-content:center;font-size:12px}
  .phon{margin:12px 0 0;display:flex;gap:14px;flex-wrap:wrap;align-items:baseline}
  .ipa{font-size:16px;color:var(--ink-soft);font-family:"SF Mono",ui-monospace,Menlo,monospace}
  .kr{font-size:16px;color:var(--gold);font-weight:400}
  .kr b{font-weight:800;color:var(--oxblood)}

  .reveal-zone{margin-top:22px}
  .mean{font-size:21px;color:var(--ink);margin:0 0 4px}
  .exs{margin-top:16px;border-top:1px solid var(--hair);padding-top:6px}
  .ex{display:flex;gap:11px;padding:9px 0;align-items:flex-start}
  .ex + .ex{border-top:1px dashed var(--hair)}
  .ex .play{flex:none;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--hair);
    background:transparent;color:var(--ink-soft);display:inline-flex;align-items:center;
    justify-content:center;font-size:10px;margin-top:2px;transition:border-color .15s,color .15s}
  .ex .play:hover{border-color:var(--oxblood);color:var(--oxblood)}
  .ex-no{flex:none;font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:14px;
    color:var(--gold);margin-top:2px;line-height:1.4;user-select:none}
  .ex-en{font-size:16px;color:var(--ink)}
  .ex-en.speakable{cursor:pointer}
  .ex-en.speakable:hover{color:var(--oxblood)}
  .ex-en b{font-weight:800;color:var(--oxblood)}
  .ex-ko{color:var(--ink-soft);font-size:14px;margin-top:2px}

  /* hide/reveal mode */
  .card.masked .reveal-zone{filter:blur(7px);opacity:.45;pointer-events:none;user-select:none}
  .tap-hint{text-align:center;color:var(--ink-soft);font-style:italic;font-size:13px;
    margin-top:14px;display:none}
  .card.masked ~ .tap-hint{display:block}

  .speaking{color:var(--oxblood)!important}
  .speaking .spk,.ex.speaking .play{border-color:var(--oxblood);color:var(--oxblood)}

  /* nav */
  .nav{display:flex;gap:10px;margin-top:22px;align-items:center}
  .nav .btn{flex:1;justify-content:center;padding:12px;font-size:15px}
  .nav .prev{flex:.7}

  .empty{text-align:center;color:var(--ink-soft);font-style:italic;padding:50px 20px;
    border:1px dashed var(--hair);border-radius:6px;background:var(--card)}
  .hintbar{color:var(--ink-soft);font-size:12px;text-align:center;margin-top:16px;font-style:italic}

  @media (max-width:480px){
    .card{padding:26px 20px}
    .pos-mark{top:16px;right:18px}
    #reviewFilter{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px}
    #reviewFilter .chk{min-width:0;justify-content:center;padding:6px 3px;gap:3px;font-size:12px}
    #reviewFilter .chk .box{width:13px;height:13px}
    #reviewFilter .chk .box::after{left:3px;top:-1px}
    #reviewFilter .chk em{font-size:9px}
  }
  @media (max-width:360px){
    #reviewFilter{grid-template-columns:repeat(2,minmax(0,1fr))}
    #reviewFilter .chk{font-size:13px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div>
      <p class="eyebrow">Vocabulary · One card at a time</p>
      <h1>초중고 영단어 3000</h1>
    </div>
    <span class="counter" id="counter">0 / 0</span>
  </header>

  <div class="track"><i id="bar"></i></div>

  <div class="search-wrap">
    <input type="text" id="searchBox" placeholder="단어 찾기 — 철자를 입력하세요"
      autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="단어 검색">
    <ul class="suggest" id="suggest" hidden></ul>
  </div>

  <div class="toolbar">
    <button type="button" class="btn ghost fixw" id="speed" aria-pressed="false"><span id="speedLabel">속도-보통</span></button>
    <button type="button" class="btn ghost fixw" id="shuffle" aria-pressed="false"><span id="shuffleLabel">순서대로</span></button>
    <button type="button" class="btn ghost fixw" id="maskMode" aria-pressed="false">뜻 숨기기</button>
    <button type="button" class="btn ghost chevron" id="filterToggle" aria-expanded="false" aria-controls="filterPanel" aria-label="필터 펼치기">
      <span class="chev">›</span>
    </button>
  </div>

  <div class="filter-panel" id="filterPanel" hidden>
    <div class="filter-group">
      <div class="filter-heading" id="gradeFilterHeading">난이도</div>
      <div class="filter-row" id="filters" role="group" aria-labelledby="gradeFilterHeading">
        <button type="button" class="chk on" id="f-star1" data-grade="*" aria-pressed="true">
          <span class="box"></span><span class="lbl">★</span><em id="c-star1"></em>
        </button>
        <button type="button" class="chk on" id="f-star2" data-grade="**" aria-pressed="true">
          <span class="box"></span><span class="lbl">★★</span><em id="c-star2"></em>
        </button>
        <button type="button" class="chk on" id="f-star0" data-grade="" aria-pressed="true">
          <span class="box"></span><span class="lbl">☆</span><em id="c-star0"></em>
        </button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-heading" id="reviewFilterHeading">
        <span>학습 상태</span>
        <span class="filter-note">선택 없음 = 미평가</span>
        <span class="status-actions" role="group" aria-label="학습 상태 관리">
          <button class="status-action" id="resetProgress" type="button" disabled>초기화</button>
          <span class="status-sep" aria-hidden="true">/</span>
          <button class="status-action" id="loadProgress" type="button">불러오기</button>
          <span class="status-sep" aria-hidden="true">/</span>
          <button class="status-action" id="saveProgress" type="button">저장</button>
        </span>
      </div>
      <div class="filter-row" id="reviewFilter" role="group" aria-labelledby="reviewFilterHeading">
        <button type="button" class="chk chk-rev" id="r-all" aria-pressed="false">
          <span class="box"></span><span class="lbl">전체</span>
        </button>
        <button type="button" class="chk chk-rev" id="r-unknown" data-review="unknown" aria-pressed="false">
          <span class="box"></span><span class="lbl">낯섦</span><em id="c-unknown"></em>
        </button>
        <button type="button" class="chk chk-rev" id="r-unsure" data-review="unsure" aria-pressed="false">
          <span class="box"></span><span class="lbl">익힘</span><em id="c-unsure"></em>
        </button>
        <button type="button" class="chk chk-rev" id="r-known" data-review="known" aria-pressed="false">
          <span class="box"></span><span class="lbl">익숙</span><em id="c-known"></em>
        </button>
      </div>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="empty" id="empty">단어를 불러오는 중…</div>
  </div>
</div>

<div class="state-modal" id="stateModal" hidden>
  <section class="state-dialog" role="dialog" aria-modal="true" aria-labelledby="stateModalTitle" aria-describedby="stateModalHelp">
    <h2 id="stateModalTitle">학습 상태 저장</h2>
    <p id="stateModalHelp">아래 코드를 복사해 다른 기기에서 불러올 수 있어요.</p>
    <textarea class="state-code" id="stateCode" spellcheck="false" autocapitalize="off" autocomplete="off" aria-label="학습 상태 코드"></textarea>
    <div class="state-qr-panel" id="stateQrPanel" hidden>
      <div class="state-qr-graphic" id="stateQrGraphic"></div>
      <div class="state-qr-note" id="stateQrNote">다른 기기의 카메라로 스캔하세요.</div>
    </div>
    <div class="state-message" id="stateMessage" aria-live="polite"></div>
    <div class="state-modal-actions">
      <button class="btn ghost" id="stateQr" type="button" hidden>QR</button>
      <button class="btn" id="statePrimary" type="button">복사</button>
      <button class="btn ghost" id="stateCancel" type="button">닫기</button>
    </div>
  </section>
</div>
<div class="share-toast" id="shareToast" role="status" aria-live="polite" hidden></div>

<script>

남용하다","ex":[{"en":"Child **abuse** is a serious crime.","ko":"아동 학대는 심각한 범죄다."},{"en":"Drug **abuse** can harm families.","ko":"약물 남용은 가족에게 해를 끼칠 수 있다."},{"en":"Do not **abuse** your access rights.","ko":"접근 권한을 남용하지 마라."}]},{"id":"vocab-0016","word":"academy","ipa":"/əˈkædəmi/","kr":"어**캐**더미","mark":"","pos":"명","mean":"① 학원 ② 전문학교 ③ 학술원","ex":[{"en":"Nora studies at a music **academy**.","ko":"노라는 음악 학원에서 공부한다."},{"en":"Lucas trained at a military **academy**.","ko":"루카스는 군사 전문학교에서 훈련받았다."},{"en":"Sora was elected to the national **academy**.","ko":"소라는 국립 학술원의 회원으로 선출되었다."}]},{"id":"vocab-0017","word":"accelerate","ipa":"/əkˈseləreɪt/","kr":"억**셀**러레이트","mark":"","pos":"동","mean":"① 가속하다 ② 속도를 높이다","ex":[{"en":"The car can **accelerate** quickly.","ko":"그 차는 빠르게 가속할 수 있다."},{"en":"The car began to **accelerate**.","ko":"그 차는 속도를 높이기 시작했다."}]},{"id":"vocab-0018","word":"accent","ipa":"/ˈæksent/","kr":"**액**센트","mark":"**","pos":"명","mean":"① 억양 ② 악센트 ③ 강세","ex":[{"en":"Daniel speaks with a British **accent**.","ko":"다니엘은 영국식 억양으로 말한다."},{"en":"Her **accent** is easy to understand.","ko":"그녀의 악센트는 이해하기 쉽다."},{"en":"The **accent** falls on the first syllable.","ko":"강세는 첫 음절에 온다."}]},{"id":"vocab-0019","word":"accept","ipa":"/əkˈsept/","kr":"억**셉**트","mark":"**","pos":"동","mean":"① 받아들이다 ② 수락하다","ex":[{"en":"I **accepted** her offer.","ko":"나는 그녀의 제안을 받아들였다."},{"en":"After reviewing the terms, she **accepted** the job offer.","ko":"조건을 검토한 뒤 그녀는 그 일자리 제안을 수락했다."}]},{"id":"vocab-0020","word":"access","ipa":"/ˈækses/","kr":"**액**세스","mark":"**","pos":"명/동","mean":"① 접근 ② 이용 ③ 접근하다","ex":[{"en":"**Access** to the server is restricted.","ko":"서버에 대한 접근은 제한되어 있다."},{"en":"Students have **access** to the library.","ko":"학생들은 도서관을 이용할 수 있다."},{"en":"Only managers can **access** this folder.","ko":"관리자만 이 폴더에 접근할 수 있다."}]},{"id":"vocab-0021","word":"accident","ipa":"/ˈæksɪdənt/","kr":"**액**시던트","mark":"**","pos":"명","mean":"① 사고 ② 우연","ex":[{"en":"The **accident** happened yesterday.","ko":"그 사고는 어제 일어났다."},{"en":"We met by **accident** at the station.","ko":"우리는 역에서 우연히 만났다."}]},{"id":"vocab-0022","word":"accommodate","ipa":"/əˈkɑːmədeɪt/","kr":"어**카ː**머데이트","mark":"","pos":"동","mean":"① 수용하다 ② 편의를 봐주다","ex":[{"en":"This room can **accommodate** six people.","ko":"이 방은 여섯 명을 수용할 수 있다."},{"en":"We can **accommodate** your schedule.","ko":"우리는 당신의 일정에 편의를 맞출 수 있다."}]},{"id":"vocab-0023","word":"accompany","ipa":"/əˈkʌmpəni/","kr":"어**컴**퍼니","mark":"","pos":"동","mean":"① 동반하다 ② 동행하다","ex":[{"en":"A guide **accompanied** us to the office.","ko":"안내원이 우리를 사무실까지 동반했다."},{"en":"I will **accompany** you to the station.","ko":"나는 역까지 너와 동행할 것이다."}]},{"id":"vocab-0024","word":"accomplish","ipa":"/əˈkɑːmplɪʃ/","kr":"어**캄**플리시","mark":"","pos":"동","mean":"① 성취하다 ② 이루다","ex":[{"en":"Our team **accomplished** a difficult task.","ko":"우리 팀은 어려운 일을 성취했다."},{"en":"We **accomplished** our goal.","ko":"우리는 우리의 목표를 이루었다."}]},{"id":"vocab-0025","word":"accord","ipa":"/əˈkɔːrd/","kr":"어**코ː**드","mark":"","pos":"명/동","mean":"① 합의 ② 일치하다","ex":[{"en":"The two sides reached an **accord**.","ko":"양측은 합의에 이르렀다."},{"en":"The figures **accord** with the final report.","ko":"그 수치들은 최종 보고서와 일치한다."}]},{"id":"vocab-0026","word":"account","ipa":"/əˈkaʊnt/","kr":"어**카운**트","mark":"**","pos":"명/동","mean":"① 계좌 ② 설명 ③ 차지하다","ex":[{"en":"I opened a bank **account**.","ko":"나는 은행 계좌를 개설했다."},{"en":"Hana gave a clear **account** of the incident.","ko":"하나는 그 사건에 대해 명확한 설명을 했다."},{"en":"Online sales **account** for half of our revenue.","ko":"온라인 매출은 우리 수익의 절반을 차지한다."}]},{"id":"vocab-0027","word":"accumulate","ipa":"/əˈkjuːmjəleɪt/","kr":"어**큐ː**뮬레이트","mark":"","pos":"동","mean":"① 축적하다 ② 모으다","ex":[{"en":"The firm **accumulated** useful data.","ko":"그 기업은 유용한 자료를 축적했다."},{"en":"We **accumulated** enough points to win.","ko":"우리는 이기기에 충분한 점수를 모았다."}]},{"id":"vocab-0028","word":"accurate","ipa":"/ˈækjərət/","kr":"**애**큐릿","mark":"","pos":"형","mean":"정확한","ex":[{"en":"The information is **accurate**.","ko":"그 정보는 정확하다."}]},{"id":"vocab-0029","word":"accuse","ipa":"/əˈkjuːz/","kr":"어**큐ː**즈","mark":"**","pos":"동","mean":"① 비난하다 ② 고발하다","ex":[{"en":"They **accused** him of lying.","ko":"그들은 그가 거짓말했다고 비난했다."},{"en":"Prosecutors **accused** the driver of theft.","ko":"검찰은 그 운전자를 절도 혐의로 고발했다."}]},{"id":"vocab-0030","word":"ache (headache)","ipa":"/eɪk/","kr":"**에익**","mark":"","pos":"명/동","mean":"① 아픔 ② 아프다","ex":[{"en":"My back **aches**.","ko":"등이 아프다."},{"en":"My legs **ache** after running.","ko":"달리기 후에 내 다리가 아프다."}]},{"id":"vocab-0031","word":"achieve","ipa":"/əˈtʃiːv/","kr":"어**치ː**브","mark":"**","pos":"동","mean":"① 달성하다 ② 성취하다","ex":[{"en":"We **achieved** our sales target.","ko":"우리는 판매 목표를 달성했다."},{"en":"She **achieved** success through hard work.","ko":"그녀는 노력으로 성공을 성취했다."}]},{"id":"vocab-0032","word":"acid","ipa":"/ˈæsɪd/","kr":"**애**시드","mark":"","pos":"명/형","mean":"① 산 ② 산성의","ex":[{"en":"This liquid contains **acid**.","ko":"이 액체는 산을 포함한다."},{"en":"This soil is too **acid** for the plant.","ko":"이 토양은 그 식물에 너무 산성이다."}]},{"id":"vocab-0033","word":"acknowledge","ipa":"/əkˈnɑːlɪdʒ/","kr":"억**날**리지","mark":"","pos":"동","mean":"① 인정하다 ② 인지하다","ex":[{"en":"He **acknowledged** his mistake.","ko":"그는 자신의 실수를 인정했다."},{"en":"We **acknowledge** the risk in this plan.","ko":"우리는 이 계획의 위험을 인지한다."}]},{"id":"vocab-0034","word":"acquire","ipa":"/əˈkwaɪər/","kr":"어**콰이**어","mark":"","pos":"동","mean":"① 얻다 ② 습득하다","ex":[{"en":"A growing company **acquired** new equipment.","ko":"한 성장 중인 회사는 새 장비를 얻었다."},{"en":"She **acquired** new skills.","ko":"그녀는 새로운 기술을 습득했다."}]},{"id":"vocab-0035","word":"acquisition","ipa":"/ˌækwɪˈzɪʃn/","kr":"애퀴**지**션","mark":"","pos":"명","mean":"① 습득 ② 획득 ③ 인수","ex":[{"en":"Language **acquisition** takes time.","ko":"언어 습득에는 시간이 걸린다."},{"en":"The **acquisition** of new skills takes practice.","ko":"새로운 기술의 획득에는 연습이 필요하다."},{"en":"A local company announced a new **acquisition**.","ko":"한 지역 회사는 새로운 인수를 발표했다."}]},{"id":"vocab-0036","word":"across","ipa":"/əˈkrɔːs/","kr":"어**크로ː**스","mark":"*","pos":"전/부","mean":"① ~을 건너서 ② 가로질러","ex":[{"en":"We walked **across** the street.","ko":"우리는 길을 건너 걸었다."},{"en":"A narrow bridge runs **across** the river.","ko":"좁은 다리가 강을 가로질러 놓여 있다."}]},{"id":"vocab-0037","word":"act (actual, interact)","ipa":"/ækt/","kr":"**액트**","mark":"*","pos":"명/동","mean":"① 행동 ② 행동하다 ③ 연기하다","ex":[{"en":"Her **act** surprised everyone.","ko":"그녀의 행동은 모두를 놀라게 했다."},{"en":"Think before you **act**.","ko":"행동하기 전에 생각해라."},{"en":"Emma wants to **act** in a school play.","ko":"엠마는 학교 연극에서 연기하고 싶어 한다."}]},{"id":"vocab-0038","word":"adapt","ipa":"/əˈdæpt/","kr":"어**댑**트","mark":"**","pos":"동","mean":"① 적응하다 ② 개조하다","ex":[{"en":"Animals **adapt** to their environment.","ko":"동물은 환경에 적응한다."},{"en":"We can **adapt** the software for mobile use.","ko":"우리는 그 소프트웨어를 모바일용으로 개조할 수 있다."}]},{"id":"vocab-0039","word":"add","ipa":"/æd/","kr":"**애드**","mark":"*","pos":"동","mean":"① 더하다 ② 추가하다","ex":[{"en":"**Add** two and three.","ko":"2와 3을 더해라."},{"en":"Please **add** my name to the list.","ko":"목록에 내 이름을 추가해 주세요."}]},{"id":"vocab-0040","word":"addict","ipa":"/ˈædɪkt/","kr":"**애**딕트","mark":"","pos":"명/동","mean":"① 중독자 ② 중독시키다","ex":[{"en":"James is a game **addict**.","ko":"제임스는 게임 중독자다."},{"en":"The drug can **addict** users.","ko":"그 약물은 사용자를 중독시킬 수 있다."}]},{"id":"vocab-0041","word":"address","ipa":"/əˈdres/","kr":"어**드레스**","mark":"*","pos":"명/동","mean":"① 주소 ② 연설 ③ 다루다","ex":[{"en":"Please write your **address** here.","ko":"여기에 당신의 주소를 써 주세요."},{"en":"The CEO gave a short **address**.","ko":"CEO가 짧은 연설을 했다."},{"en":"We must **address** the server issue today.","ko":"우리는 오늘 서버 문제를 다뤄야 한다."}]},{"id":"vocab-0042","word":"adequate","ipa":"/ˈædɪkwət/","kr":"**애**디큇","mark":"","pos":"형","mean":"① 적절한 ② 충분한","ex":[{"en":"This room is **adequate** for the meeting.","ko":"이 방은 회의에 적절하다."},{"en":"We have **adequate** food for the trip.","ko":"우리는 여행에 충분한 음식을 가지고 있다."}]},{"id":"vocab-0043","word":"adjust","ipa":"/əˈdʒʌst/","kr":"어**저스트**","mark":"","pos":"동","mean":"① 조정하다 ② 적응하다","ex":[{"en":"Please **adjust** the meeting time.","ko":"회의 시간을 조정해 주세요."},{"en":"It took me a week to **adjust** to the new system.","ko":"새 시스템에 적응하는 데 일주일이 걸렸다."}]},{"id":"vocab-0044","word":"administer (administration)","ipa":"/ədˈmɪnɪstər/","kr":"어드**미**니스터","mark":"","pos":"동","mean":"① 관리하다 ② 시행하다","ex":[{"en":"She **administers** the school budget.","ko":"그녀는 학교 예산을 관리한다."},{"en":"The agency will **administer** the new program.","ko":"그 기관은 새 프로그램을 시행할 것이다."}]},{"id":"vocab-0045","word":"admire","ipa":"/ədˈmaɪər/","kr":"어드**마이**어","mark":"**","pos":"동","mean":"① 존경하다 ② 감탄하다","ex":[{"en":"I **admire** her leadership.","ko":"나는 그녀의 리더십을 존경한다."},{"en":"I **admire** the courage she showed.","ko":"나는 그녀가 보여 준 용기에 감탄한다."}]},{"id":"vocab-0046","word":"admit (admission)","ipa":"/ədˈmɪt/","kr":"어드**밋**","mark":"**","pos":"동","mean":"① 인정하다 ② 입장을 허락하다","ex":[{"en":"After a long silence, he **admitted** his mistake.","ko":"긴 침묵 끝에 그는 자신의 실수를 인정했다."},{"en":"The guard **admitted** us to the building.","ko":"경비원은 우리가 건물에 들어가도록 허락했다."}]},{"id":"vocab-0047","word":"adolescent","ipa":"/ˌædəˈlesnt/","kr":"애덜**레**슨트","mark":"","pos":"명/형","mean":"① 청소년 ② 청소년기의","ex":[{"en":"The **adolescent** needs support.","ko":"그 청소년은 도움이 필요하다."},{"en":"**Adolescent** health needs special care.","ko":"청소년기의 건강은 특별한 관리가 필요하다."}]},{"id":"vocab-0048","word":"adopt","ipa":"/əˈdɑːpt/","kr":"어**답**트","mark":"**","pos":"동","mean":"① 채택하다 ② 입양하다","ex":[{"en":"This team **adopted** a new policy.","ko":"이 팀은 새로운 정책을 채택했다."},{"en":"They decided to **adopt** a child.","ko":"그들은 아이를 입양하기로 결정했다."}]},{"id":"vocab-0049","word":"adult","ipa":"/ˈædʌlt/","kr":"**애**덜트","mark":"*","pos":"명/형","mean":"① 어른 ② 성인의","ex":[{"en":"An **adult** must sign this form.","ko":"어른이 이 양식에 서명해야 한다."},{"en":"The course is for **adult** learners.","ko":"그 과정은 성인 학습자를 위한 것이다."}]},{"id":"vocab-0050","word":"advance","ipa":"/ədˈvæns/","kr":"어드**밴스**","mark":"**","pos":"명/동","mean":"① 발전 ② 전진하다","ex":[{"en":"The **advance** of technology is rapid.","ko":"기술의 발전은 빠르다."},{"en":"The whole team **advanced** to the next round.","ko":"팀 전체는 다음 라운드로 전진했다."}]},{"id":"vocab-0051","word":"advantage (disadvantage)","ipa":"/ədˈvæntɪdʒ/","kr":"어드**밴**티지","mark":"**","pos":"명","mean":"① 이점 ② 유리함","ex":[{"en":"This plan has one **advantage**.","ko":"이 계획에는 한 가지 이점이 있다."},{"en":"Flexible hours give us an **advantage**.","ko":"유연한 근무 시간은 우리에게 유리함을 준다."}]},{"id":"vocab-0052","word":"adventure","ipa":"/ədˈventʃər/","kr":"어드**벤**처","mark":"**","pos":"명","mean":"모험","ex":[{"en":"The trip was a great **adventure**.","ko":"그 여행은 멋진 모험이었다."}]},{"id":"vocab-0053","word":"adverse","ipa":"/ædˈvɜːrs/","kr":"애드**버ː**스","mark":"","pos":"형","mean":"① 불리한 ② 부정적인","ex":[{"en":"The delay put us in an **adverse** position.","ko":"그 지연은 우리를 불리한 처지에 놓았다."},{"en":"The plan had an **adverse** effect.","ko":"그 계획은 부정적인 영향을 미쳤다."}]},{"id":"vocab-0054","word":"advertize / advertise","ipa":"/ˈædvərtaɪz/","kr":"**애**드버타이즈","mark":"**","pos":"동","mean":"광고하다","ex":[{"en":"They **advertize** their products online.","ko":"그들은 온라인에서 제품을 광고한다."}]},{"id":"vocab-0055","word":"advice","ipa":"/ədˈvaɪs/","kr":"어드**바이스**","mark":"**","pos":"명","mean":"① 조언 ② 충고","ex":[{"en":"Thank you for your **advice**.","ko":"당신의 조언에 감사한다."},{"en":"Her **advice** sounded like a firm warning.","ko":"그녀의 충고는 단호한 경고처럼 들렸다."}]},{"id":"vocab-0056","word":"advise","ipa":"/ədˈvaɪz/","kr":"어드**바이즈**","mark":"**","pos":"동","mean":"① 조언하다 ② 충고하다","ex":[{"en":"The doctor **advised** me to rest.","ko":"의사는 나에게 쉬라고 조언했다."},{"en":"The lawyer **advised** us to wait.","ko":"변호사는 우리에게 기다리라고 충고했다."}]},{"id":"vocab-0057","word":"advocate","ipa":"/ˈædvəkeɪt/","kr":"**애**드버케이트","mark":"","pos":"명/동","mean":"① 옹호자 ② 옹호하다","ex":[{"en":"Lina is an **advocate** for animal rights.","ko":"리나는 동물 권리의 옹호자다."},{"en":"She **advocates** for children's rights.","ko":"그녀는 아동의 권리를 옹호한다."}]},{"id":"vocab-0058","word":"aesthetic","ipa":"/esˈθetɪk/","kr":"에스**쎄**틱","mark":"","pos":"형/명","mean":"① 미적인 ② 미학","ex":[{"en":"The small room has a simple **aesthetic**.","ko":"작은 방은 단순한 미적 감각을 지니고 있다."},{"en":"Olivia studies **aesthetic** theory at college.","ko":"올리비아는 대학에서 미학 이론을 공부한다."}]},{"id":"vocab-0059","word":"affair","ipa":"/əˈfer/","kr":"어**페어**","mark":"**","pos":"명","mean":"① 일 ② 사건 ③ 문제","ex":[{"en":"It is a private **affair**.","ko":"그것은 개인적인 일이다."},{"en":"The police investigated the **affair** after receiving a tip.","ko":"경찰은 제보를 받은 뒤 그 사건을 조사했다."},{"en":"This **affair** needs immediate attention.","ko":"이 문제는 즉각적인 주의가 필요하다."}]},{"id":"vocab-0060","word":"affect (affection)","ipa":"/əˈfekt/","kr":"어**펙트**","mark":"**","pos":"동","mean":"영향을 미치다","ex":[{"en":"Weather can **affect** our mood.","ko":"날씨는 우리의 기분에 영향을 미칠 수 있다."}]},{"id":"vocab-0061","word":"afford","ipa":"/əˈfɔːrd/","kr":"어**포ː**드","mark":"**","pos":"동","mean":"~할 여유가 있다","ex":[{"en":"I can't **afford** a new car.","ko":"나는 새 차를 살 여유가 없다."}]},{"id":"vocab-0062","word":"afraid","ipa":"/əˈfreɪd/","kr":"어**프레이드**","mark":"*","pos":"형","mean":"① 두려워하는 ② 걱정하는","ex":[{"en":"One child is **afraid** of dogs.","ko":"한 아이는 개를 두려워한다."},{"en":"I am **afraid** the report may be late.","ko":"그 보고서가 늦을까 걱정된다."}]},{"id":"vocab-0063","word":"after","ipa":"/ˈæftər/","kr":"**애**프터","mark":"*","pos":"전/접","mean":"① ~후에 ② ~뒤에","ex":[{"en":"We went home **after** dinner.","ko":"우리는 저녁 식사 후에 집에 갔다."},{"en":"A puppy raced **after** the passing car.","ko":"강아지가 지나가는 차를 뒤쫓아 달렸다."}]},{"id":"vocab-0064","word":"afternoon","ipa":"/ˌæftərˈnuːn/","kr":"애프터**눈ː**","mark":"*","pos":"명","mean":"오후","ex":[{"en":"See you this **afternoon**.","ko":"오늘 오후에 만나자."}]},{"id":"vocab-0065","word":"again","ipa":"/əˈɡen/","kr":"어**겐**","mark":"*","pos":"부","mean":"① 다시 ② 또","ex":[{"en":"Please say it **again**.","ko":"그것을 다시 말해 주세요."},{"en":"Noah called **again** later that day.","ko":"노아는 그날 나중에 또 전화했다."}]},{"id":"vocab-0066","word":"against","ipa":"/əˈɡenst/","kr":"어**겐스트**","mark":"*","pos":"전","mean":"① ~에 반대하여 ② ~에 기대어","ex":[{"en":"Sophia is **against** the plan.","ko":"소피아는 그 계획에 반대한다."},{"en":"The bicycle rested **against** the wall.","ko":"자전거가 벽에 기대어 있었다."}]},{"id":"vocab-0067","word":"age","ipa":"/eɪdʒ/","kr":"**에이지**","mark":"*","pos":"명","mean":"① 나이 ② 시대","ex":[{"en":"**Age** is just a number.","ko":"나이는 단지 숫자일 뿐이다."},{"en":"We live in the digital **age**.","ko":"우리는 디지털 시대에 산다."}]},{"id":"vocab-0068","word":"agency","ipa":"/ˈeɪdʒənsi/","kr":"**에이**전시","mark":"","pos":"명","mean":"① 대리점 ② 기관","ex":[{"en":"I booked the trip through a local **agency**.","ko":"나는 지역 대리점을 통해 여행을 예약했다."},{"en":"The **agency** issued new safety rules.","ko":"그 기관은 새로운 안전 규정을 발표했다."}]},{"id":"vocab-0069","word":"agenda","ipa":"/əˈdʒendə/","kr":"어**젠**더","mark":"","pos":"명","mean":"① 의제 ② 안건","ex":[{"en":"The first item on the **agenda** is safety.","ko":"의제의 첫 항목은 안전이다."},{"en":"The meeting **agenda** is ready.","ko":"회의 안건이 준비되었다."}]},{"id":"vocab-0070","word":"agent","ipa":"/ˈeɪdʒənt/","kr":"**에이**전트","mark":"**","pos":"명","mean":"① 대리인 ② 요원","ex":[{"en":"Yuna acts as our sales **agent**.","ko":"유나는 우리의 판매 대리인으로 일한다."},{"en":"A secret **agent** entered the building.","ko":"비밀 요원이 그 건물에 들어갔다."}]},{"id":"vocab-0071","word":"aggress (aggressive)","ipa":"/əˈɡres/","kr":"어**그레스**","mark":"","pos":"동","mean":"공격하다","ex":[{"en":"Some animals **aggress** when they feel threatened.","ko":"일부 동물은 위협을 느끼면 공격한다."}]},{"id":"vocab-0072","word":"ago","ipa":"/əˈɡoʊ/","kr":"어**고**","mark":"*","pos":"부","mean":"~전에","ex":[{"en":"We met two years **ago**.","ko":"우리는 2년 전에 만났다."}]},{"id":"vocab-0073","word":"agree (disagree)","ipa":"/əˈɡriː/","kr":"어**그리ː**","mark":"*","pos":"동","mean":"동의하다","ex":[{"en":"I **agree** with you.","ko":"나는 너에게 동의한다."}]},{"id":"vocab-0074","word":"agriculture","ipa":"/ˈæɡrɪkʌltʃər/","kr":"**애**그리컬처","mark":"","pos":"명","mean":"농업","ex":[{"en":"**Agriculture** is important to this region.","ko":"농업은 이 지역에 중요하다."}]},{"id":"vocab-0075","word":"ahead","ipa":"/əˈhed/","kr":"어**헤드**","mark":"*","pos":"부","mean":"① 앞으로 ② 미리","ex":[{"en":"Go straight **ahead**.","ko":"앞으로 곧장 가세요."},{"en":"Please send the agenda **ahead** of time.","ko":"의제를 미리 보내 주세요."}]},{"id":"vocab-0076","word":"aid","ipa":"/eɪd/","kr":"**에이드**","mark":"**","pos":"명/동","mean":"① 도움 ② 원조 ③ 돕다","ex":[{"en":"Your advice was a great **aid**.","ko":"당신의 조언은 큰 도움이었다."},{"en":"They sent **aid** to the flood victims.","ko":"그들은 홍수 피해자들에게 원조를 보냈다."},{"en":"This guide will **aid** new employees.","ko":"이 안내서는 신입 직원들을 도울 것이다."}]},{"id":"vocab-0077","word":"aim","ipa":"/eɪm/","kr":"**에임**","mark":"**","pos":"명/동","mean":"① 목표 ② 겨누다 ③ 목표하다","ex":[{"en":"My **aim** is to become a teacher.","ko":"내 목표는 교사가 되는 것이다."},{"en":"**Aim** the camera at the screen.","ko":"카메라를 화면에 겨누어라."},{"en":"We **aim** to help children.","ko":"우리는 아이들을 돕는 것을 목표로 한다."}]},{"id":"vocab-0078","word":"air","ipa":"/er/","kr":"**에어**","mark":"*","pos":"명","mean":"① 공기 ② 대기","ex":[{"en":"Fresh **air** is good for you.","ko":"신선한 공기는 너에게 좋다."},{"en":"Pollution affects the **air** around the city.","ko":"오염은 도시 주변의 대기에 영향을 미친다."}]},{"id":"vocab-0079","word":"airline","ipa":"/ˈerlaɪn/","kr":"**에어**라인","mark":"**","pos":"명","mean":"항공사","ex":[{"en":"The **airline** canceled the flight.","ko":"그 항공사는 항공편을 취소했다."}]},{"id":"vocab-0080","word":"airplane / aeroplane","ipa":"/ˈerpleɪn/","kr":"**에어**플레인","mark":"*","pos":"명","mean":"비행기","ex":[{"en":"The **airplane** landed safely.","ko":"비행기가 안전하게 착륙했다."}]},{"id":"vocab-0081","word":"airport","ipa":"/ˈerpɔːrt/","kr":"**에어**포ː트","mark":"**","pos":"명","mean":"공항","ex":[{"en":"We arrived at the **airport** early.","ko":"우리는 공항에 일찍 도착했다."}]},{"id":"vocab-0082","word":"alarm","ipa":"/əˈlɑːrm/","kr":"어**람ː**","mark":"**","pos":"명/동","mean":"① 경보 ② 놀라게 하다","ex":[{"en":"The fire **alarm** went off.","ko":"화재 경보가 울렸다."},{"en":"The sudden message **alarmed** the team.","ko":"갑작스러운 메시지가 팀을 놀라게 했다."}]},{"id":"vocab-0083","word":"album","ipa":"/ˈælbəm/","kr":"**앨**범","mark":"*","pos":"명","mean":"앨범","ex":[{"en":"I put the photos in an **album**.","ko":"나는 사진들을 앨범에 넣었다."}]},{"id":"vocab-0084","word":"alcohol","ipa":"/ˈælkəhɔːl/","kr":"**앨**코홀","mark":"**","pos":"명","mean":"① 술 ② 알코올","ex":[{"en":"James does not drink **alcohol**.","ko":"제임스는 술을 마시지 않는다."},{"en":"This drink contains no **alcohol**.","ko":"이 음료에는 알코올이 없다."}]},{"id":"vocab-0085","word":"alert","ipa":"/əˈlɜːrt/","kr":"어**러ː**트","mark":"","pos":"형/명/동","mean":"① 경계하는 ② 경보 ③ 경고하다","ex":[{"en":"The guard stayed **alert** all night.","ko":"경비원은 밤새 경계 상태를 유지했다."},{"en":"The system sent a security **alert**.","ko":"시스템이 보안 경보를 보냈다."},{"en":"The internal system will **alert** us to any failure.","ko":"내부 시스템은 어떤 장애라도 우리에게 경고할 것이다."}]},{"id":"vocab-0086","word":"alien","ipa":"/ˈeɪliən/","kr":"**에이**리언","mark":"","pos":"명/형","mean":"① 외계인 ② 외국의 ③ 이질적인","ex":[{"en":"The movie is about an **alien**.","ko":"그 영화는 외계인에 관한 것이다."},{"en":"Ryan found the **alien** culture interesting.","ko":"라이언은 그 외국 문화가 흥미롭다고 생각했다."},{"en":"The new rules felt **alien** to the team.","ko":"새로운 규칙은 그 팀에 이질적으로 느껴졌다."}]},{"id":"vocab-0087","word":"alike","ipa":"/əˈlaɪk/","kr":"어**라익**","mark":"","pos":"형/부","mean":"① 비슷한 ② 똑같이","ex":[{"en":"The twins look **alike**.","ko":"그 쌍둥이는 비슷하게 생겼다."},{"en":"The policy applies to managers and staff **alike**.","ko":"그 정책은 관리자와 직원에게 똑같이 적용된다."}]},{"id":"vocab-0088","word":"alive","ipa":"/əˈlaɪv/","kr":"어**라이브**","mark":"**","pos":"형","mean":"살아 있는","ex":[{"en":"The fish is still **alive**.","ko":"그 물고기는 아직 살아 있다."}]},{"id":"vocab-0089","word":"all","ipa":"/ɔːl/","kr":"**올ː**","mark":"*","pos":"형/대/부","mean":"① 모든 ② 모두 ③ 완전히","ex":[{"en":"**All** students passed the test.","ko":"모든 학생이 시험에 합격했다."},{"en":"**All** of us agreed with the plan.","ko":"우리 모두가 그 계획에 동의했다."},{"en":"The data was **all** wrong.","ko":"그 데이터는 완전히 틀렸다."}]},{"id":"vocab-0090","word":"allocate","ipa":"/ˈæləkeɪt/","kr":"**앨**러케이트","mark":"","pos":"동","mean":"① 할당하다 ② 배분하다","ex":[{"en":"This manager **allocated** one task to each person.","ko":"이 관리자는 각 사람에게 업무 하나를 할당했다."},{"en":"The school **allocated** money for books.","ko":"학교는 책을 위해 돈을 배분했다."}]},{"id":"vocab-0091","word":"allow","ipa":"/əˈlaʊ/","kr":"어**라우**","mark":"**","pos":"동","mean":"① 허락하다 ② 허용하다","ex":[{"en":"The teacher **allowed** us to leave early.","ko":"선생님은 우리가 일찍 떠나는 것을 허락했다."},{"en":"This system **allows** remote access.","ko":"이 시스템은 원격 접속을 허용한다."}]},{"id":"vocab-0092","word":"ally","ipa":"/ˈælaɪ/","kr":"**앨**라이","mark":"","pos":"명/동","mean":"① 동맹 ② 동맹을 맺다","ex":[{"en":"The two companies formed an **ally** relationship.","ko":"두 회사는 동맹 관계를 맺었다."},{"en":"The two countries are close **allies**.","ko":"그 두 나라는 가까운 동맹이다."}]},{"id":"vocab-0093","word":"almost","ipa":"/ˈɔːlmoʊst/","kr":"**올ː**모스트","mark":"*","pos":"부","mean":"거의","ex":[{"en":"It is **almost** midnight.","ko":"거의 자정이다."}]},{"id":"vocab-0094","word":"alone","ipa":"/əˈloʊn/","kr":"어**론**","mark":"*","pos":"형/부","mean":"① 혼자인 ② 홀로","ex":[{"en":"Minho was **alone** in the office.","ko":"민호는 사무실에 혼자였다."},{"en":"Sophia completed the task **alone**.","ko":"소피아는 그 일을 홀로 완료했다."}]},{"id":"vocab-0095","word":"along","ipa":"/əˈlɔːŋ/","kr":"어**롱ː**","mark":"*","pos":"전/부","mean":"① ~을 따라 ② 함께","ex":[{"en":"We walked **along** the river.","ko":"우리는 강을 따라 걸었다."},{"en":"Bring your laptop **along**.","ko":"노트북을 함께 가져오세요."}]},{"id":"vocab-0096","word":"alongside","ipa":"/əˌlɔːŋˈsaɪd/","kr":"얼롱**사이드**","mark":"","pos":"전/부","mean":"① ~와 나란히 ② 옆에","ex":[{"en":"The dog ran **alongside** the car.","ko":"개가 차 옆에서 나란히 달렸다."},{"en":"A bicycle stood **alongside** the wall.","ko":"자전거 한 대가 벽 옆에 서 있었다."}]},{"id":"vocab-0097","word":"aloud","ipa":"/əˈlaʊd/","kr":"어**라우드**","mark":"**","pos":"부","mean":"① 소리 내어 ② 큰 소리로","ex":[{"en":"Please read the message **aloud**.","ko":"그 메시지를 소리 내어 읽어 주세요."},{"en":"The teacher asked me to read the sentence **aloud**.","ko":"선생님은 나에게 그 문장을 큰 소리로 읽으라고 했다."}]},{"id":"vocab-0098","word":"already","ipa":"/ɔːlˈredi/","kr":"올**레**디","mark":"*","pos":"부","mean":"① 이미 ② 벌써","ex":[{"en":"Nora has **already** left.","ko":"노라는 이미 떠났다."},{"en":"The client has **already** replied.","ko":"그 고객은 벌써 답장했다."}]},{"id":"vocab-0099","word":"alright","ipa":"/ɔːlˈraɪt/","kr":"올**라잇**","mark":"*","pos":"형/부","mean":"① 괜찮은 ② 좋아","ex":[{"en":"Is everything **alright**?","ko":"모든 것이 괜찮니?"},{"en":"**Alright**, let's begin the meeting.","ko":"좋아, 회의를 시작하자."}]},{"id":"vocab-0100","word":"also","ipa":"/ˈɔːlsoʊ/","kr":"**올ː**소","mark":"*","pos":"부","mean":"① 또한 ② 게다가","ex":[{"en":"She **also** speaks French.","ko":"그녀는 또한 프랑스어를 말한다."},{"en":"The server is faster and **also** more secure.","ko":"그 서버는 더 빠르고 게다가 더 안전하다."}]},{"id":"vocab-0101","word":"alter","ipa":"/ˈɔːltər/","kr":"**올ː**터","mark":"**","pos":"동","mean":"① 바꾸다 ② 변경하다","ex":[{"en":"She **altered** her plan.","ko":"그녀는 계획을 바꾸었다."},{"en":"We **altered** the schedule after lunch.","ko":"우리는 점심 후에 일정을 변경했다."}]},{"id":"vocab-0102","word":"alternate (alternative)","ipa":"/ˈɔːltərnət/","kr":"**올ː**터닛","mark":"","pos":"동/형","mean":"① 번갈아 하다 ② 대체의","ex":[{"en":"We **alternate** between two tasks.","ko":"우리는 두 가지 일을 번갈아 한다."},{"en":"We need an **alternate** route to the office.","ko":"우리는 사무실로 가는 대체 경로가 필요하다."}]},{"id":"vocab-0103","word":"although","ipa":"/ɔːlˈðoʊ/","kr":"올**도**","mark":"**","pos":"접","mean":"비록 ~이지만","ex":[{"en":"**Although** it rained, we went out.","ko":"비록 비가 왔지만, 우리는 나갔다."}]},{"id":"vocab-0104","word":"altogether","ipa":"/ˌɔːltəˈɡeðər/","kr":"올터**게**더","mark":"**","pos":"부","mean":"① 완전히 ② 전부 합쳐","ex":[{"en":"The trip was **altogether** wonderful.","ko":"그 여행은 완전히 멋졌다."},{"en":"The trip cost fifty dollars **altogether**.","ko":"그 여행은 모두 합쳐 50달러가 들었다."}]},{"id":"vocab-0105","word":"always","ipa":"/ˈɔːlweɪz/","kr":"**올ː**웨이즈","mark":"*","pos":"부","mean":"① 항상 ② 늘","ex":[{"en":"She **always** arrives on time.","ko":"그녀는 항상 제시간에 도착한다."},{"en":"Grace is **always** kind to new employees.","ko":"그레이스는 신입 직원들에게 늘 친절하다."}]},{"id":"vocab-0106","word":"amaze","ipa":"/əˈmeɪz/","kr":"어**메이즈**","mark":"**","pos":"동","mean":"놀라게 하다","ex":[{"en":"Her talent **amazed** everyone.","ko":"그녀의 재능은 모두를 놀라게 했다."}]},{"id":"vocab-0107","word":"ambassador","ipa":"/æmˈbæsədər/","kr":"앰**배**서더","mark":"","pos":"명","mean":"대사","ex":[{"en":"The **ambassador** met the president.","ko":"그 대사는 대통령을 만났다."}]},{"id":"vocab-0108","word":"ambition (ambitious)","ipa":"/æmˈbɪʃn/","kr":"앰**비**션","mark":"","pos":"명","mean":"① 야망 ② 포부","ex":[{"en":"His **ambition** is to lead the company.","ko":"그의 야망은 그 회사를 이끄는 것이다."},{"en":"Her **ambition** is to become a doctor.","ko":"그녀의 포부는 의사가 되는 것이다."}]},{"id":"vocab-0109","word":"ambulance","ipa":"/ˈæmbjələns/","kr":"**앰**뷸런스","mark":"**","pos":"명","mean":"구급차","ex":[{"en":"An **ambulance** arrived quickly.","ko":"구급차가 빠르게 도착했다."}]},{"id":"vocab-0110","word":"among","ipa":"/əˈmʌŋ/","kr":"어**멍**","mark":"**","pos":"전","mean":"① ~사이에 ② ~중에","ex":[{"en":"Nora sat **among** her friends.","ko":"노라는 친구들 사이에 앉았다."},{"en":"This tool is **among** the most useful.","ko":"이 도구는 가장 유용한 것들 중에 있다."}]},{"id":"vocab-0111","word":"amount","ipa":"/əˈmaʊnt/","kr":"어**마운**트","mark":"**","pos":"명/동","mean":"① 양 ② 총액 ③ 이르다","ex":[{"en":"A small **amount** of water is enough.","ko":"적은 양의 물이면 충분하다."},{"en":"The total **amount** is shown on the bill.","ko":"총액은 청구서에 표시되어 있다."},{"en":"The cost **amounts** to fifty dollars.","ko":"비용은 50달러에 이른다."}]},{"id":"vocab-0112","word":"amuse","ipa":"/əˈmjuːz/","kr":"어**뮤ː**즈","mark":"**","pos":"동","mean":"즐겁게 하다","ex":[{"en":"The clown **amused** the children.","ko":"광대가 아이들을 즐겁게 했다."}]},{"id":"vocab-0113","word":"analysis","ipa":"/əˈnæləsɪs/","kr":"어**낼**러시스","mark":"**","pos":"명","mean":"분석","ex":[{"en":"The report includes a careful **analysis**.","ko":"그 보고서에는 신중한 분석이 포함되어 있다."}]},{"id":"vocab-0114","word":"analyze / analyse","ipa":"/ˈænəlaɪz/","kr":"**애**널라이즈","mark":"","pos":"동","mean":"분석하다","ex":[{"en":"We **analyzed** the test results.","ko":"우리는 시험 결과를 분석했다."}]},{"id":"vocab-0115","word":"anchor","ipa":"/ˈæŋkər/","kr":"**앵**커","mark":"","pos":"명/동","mean":"① 닻 ② 고정시키다","ex":[{"en":"The ship dropped its **anchor**.","ko":"배가 닻을 내렸다."},{"en":"We use bolts to **anchor** the shelf to the wall.","ko":"우리는 선반을 벽에 고정시키기 위해 볼트를 쓴다."}]},{"id":"vocab-0116","word":"ancient","ipa":"/ˈeɪnʃənt/","kr":"**에인**션트","mark":"","pos":"형","mean":"① 고대의 ② 오래된","ex":[{"en":"They visited an **ancient** temple.","ko":"그들은 고대 사원을 방문했다."},{"en":"An **ancient** tree stands near the temple.","ko":"오래된 나무 한 그루가 사원 근처에 서 있다."}]},{"id":"vocab-0117","word":"and","ipa":"/ænd/","kr":"**앤드**","mark":"*","pos":"접","mean":"① 그리고 ② ~와","ex":[{"en":"I called her, **and** she answered.","ko":"나는 그녀에게 전화했고, 그녀가 받았다."},{"en":"I like apples **and** oranges.","ko":"나는 사과와 오렌지를 좋아한다."}]},{"id":"vocab-0118","word":"angel","ipa":"/ˈeɪndʒl/","kr":"**에인**절","mark":"**","pos":"명","mean":"천사","ex":[{"en":"A child drew an **angel**.","ko":"한 아이는 천사를 그렸다."}]},{"id":"vocab-0119","word":"anger","ipa":"/ˈæŋɡər/","kr":"**앵**거","mark":"**","pos":"명","mean":"① 분노 ② 화","ex":[{"en":"His rude words caused **anger**.","ko":"그의 무례한 말은 분노를 일으켰다."},{"en":"His rude reply made me feel **anger**.","ko":"그의 무례한 답변은 나에게 화를 느끼게 했다."}]},{"id":"vocab-0120","word":"angle","ipa":"/ˈæŋɡl/","kr":"**앵**글","mark":"","pos":"명","mean":"① 각도 ② 각","ex":[{"en":"Look at the picture from another **angle**.","ko":"그 그림을 다른 각도에서 보아라."},{"en":"Measure the **angle** carefully.","ko":"각도를 주의 깊게 재라."}]},{"id":"vocab-0121","word":"animal","ipa":"/ˈænɪml/","kr":"**애**니멀","mark":"*","pos":"명","mean":"동물","ex":[{"en":"The elephant is a large **animal**.","ko":"코끼리는 큰 동물이다."}]},{"id":"vocab-0122","word":"anniversary","ipa":"/ˌænɪˈvɜːrsəri/","kr":"애니**버ː**서리","mark":"","pos":"명","mean":"기념일","ex":[{"en":"Today is their wedding **anniversary**.","ko":"오늘은 그들의 결혼기념일이다."}]},{"id":"vocab-0123","word":"announce","ipa":"/əˈnaʊns/","kr":"어**나운스**","mark":"**","pos":"동","mean":"① 발표하다 ② 알리다","ex":[{"en":"They **announced** the winner.","ko":"그들은 우승자를 발표했다."},{"en":"Please **announce** the change to the team.","ko":"변경 사항을 팀에 알려 주세요."}]},{"id":"vocab-0124","word":"annoy","ipa":"/əˈnɔɪ/","kr":"어**노이**","mark":"**","pos":"동","mean":"짜증나게 하다","ex":[{"en":"The loud noise **annoyed** me.","ko":"시끄러운 소리가 나를 짜증나게 했다."}]},{"id":"vocab-0125","word":"annual","ipa":"/ˈænjuəl/","kr":"**애**뉴얼","mark":"**","pos":"형","mean":"① 연례의 ② 매년의","ex":[{"en":"The **annual** festival is in May.","ko":"그 연례 축제는 5월에 있다."},{"en":"The school holds an **annual** festival.","ko":"그 학교는 매년 축제를 연다."}]},{"id":"vocab-0126","word":"another","ipa":"/əˈnʌðər/","kr":"어**너**더","mark":"*","pos":"형/대","mean":"① 또 하나의 ② 다른 하나","ex":[{"en":"Can I have **another** copy of the report?","ko":"보고서 한 부를 또 받을 수 있을까요?"},{"en":"This option failed, so try **another**.","ko":"이 선택지는 실패했으니 다른 하나를 시도해라."}]},{"id":"vocab-0127","word":"answer","ipa":"/ˈænsər/","kr":"**앤**서","mark":"*","pos":"명/동","mean":"① 대답 ② 답하다","ex":[{"en":"I received a quick **answer**.","ko":"나는 빠른 대답을 받았다."},{"en":"Please **answer** my question.","ko":"내 질문에 답해 주세요."}]},{"id":"vocab-0128","word":"ant","ipa":"/ænt/","kr":"**앤트**","mark":"**","pos":"명","mean":"개미","ex":[{"en":"An **ant** carried a crumb.","ko":"개미 한 마리가 빵 부스러기를 날랐다."}]},{"id":"vocab-0129","word":"anticipate","ipa":"/ænˈtɪsɪpeɪt/","kr":"앤**티**시페이트","mark":"","pos":"동","mean":"① 예상하다 ② 기대하다","ex":[{"en":"We **anticipate** heavy traffic.","ko":"우리는 교통 체증이 심할 것으로 예상한다."},{"en":"We **anticipate** the product launch with excitement.","ko":"우리는 제품 출시를 기대한다."}]},{"id":"vocab-0130","word":"anxiety","ipa":"/æŋˈzaɪəti/","kr":"앵**자이**어티","mark":"","pos":"명","mean":"① 불안 ② 걱정","ex":[{"en":"Sora felt great **anxiety** before the test.","ko":"소라는 시험 전에 큰 불안을 느꼈다."},{"en":"Money was a source of **anxiety** for him.","ko":"돈은 그에게 걱정의 원인이었다."}]},{"id":"vocab-0131","word":"anxious","ipa":"/ˈæŋkʃəs/","kr":"**앵**셔스","mark":"**","pos":"형","mean":"① 불안한 ② 걱정하는","ex":[{"en":"James was **anxious** about the exam.","ko":"제임스는 시험에 대해 불안해했다."},{"en":"Waiting for the result made him **anxious**.","ko":"결과를 기다리는 것은 그를 불안하게 했다."}]},{"id":"vocab-0132","word":"any","ipa":"/ˈeni/","kr":"**에**니","mark":"*","pos":"형/대","mean":"① 어떤 ② 조금도","ex":[{"en":"Choose **any** seat you like.","ko":"네가 좋아하는 어떤 자리든 골라라."},{"en":"We did not receive **any** complaints.","ko":"우리는 불만을 조금도 받지 않았다."}]},{"id":"vocab-0133","word":"apart","ipa":"/əˈpɑːrt/","kr":"어**파ː**트","mark":"**","pos":"부","mean":"① 떨어져 ② 따로","ex":[{"en":"The two houses stand far **apart**.","ko":"그 두 집은 멀리 떨어져 있다."},{"en":"Please keep the two files **apart**.","ko":"두 파일을 따로 두어 주세요."}]},{"id":"vocab-0134","word":"apartment","ipa":"/əˈpɑːrtmənt/","kr":"어**파ː**트먼트","mark":"*","pos":"명","mean":"아파트","ex":[{"en":"Emma lives in a small **apartment**.","ko":"엠마는 작은 아파트에 산다."}]},{"id":"vocab-0135","word":"apology","ipa":"/əˈpɑːlədʒi/","kr":"어**팔**러지","mark":"","pos":"명","mean":"사과","ex":[{"en":"Lucas offered a sincere **apology**.","ko":"루카스는 진심 어린 사과를 했다."}]},{"id":"vocab-0136","word":"apparent","ipa":"/əˈpærənt/","kr":"어**패**런트","mark":"","pos":"형","mean":"① 명백한 ② 분명한","ex":[{"en":"The error was **apparent** on the screen.","ko":"그 오류는 화면에 명백하게 나타났다."},{"en":"It became **apparent** that he was right.","ko":"그가 옳았다는 것이 분명해졌다."}]},{"id":"vocab-0137","word":"appeal","ipa":"/əˈpiːl/","kr":"어**피ː**일","mark":"**","pos":"명/동","mean":"① 호소 ② 매력 ③ 호소하다","ex":[{"en":"The charity made an **appeal** for help.","ko":"그 자선단체는 도움을 호소했다."},{"en":"The simple design has wide **appeal**.","ko":"그 단순한 디자인은 폭넓은 매력이 있다."},{"en":"The group **appealed** for help.","ko":"그 단체는 도움을 호소했다."}]},{"id":"vocab-0138","word":"appear (disappear)","ipa":"/əˈpɪr/","kr":"어**피어**","mark":"**","pos":"동","mean":"① 나타나다 ② ~처럼 보이다","ex":[{"en":"A rainbow **appeared** in the sky.","ko":"하늘에 무지개가 나타났다."},{"en":"The task **appears** easy.","ko":"그 일은 쉬워 보인다."}]},{"id":"vocab-0139","word":"apple","ipa":"/ˈæpl/","kr":"**애**플","mark":"*","pos":"명","mean":"사과","ex":[{"en":"I ate a red **apple**.","ko":"나는 빨간 사과를 먹었다."}]},{"id":"vocab-0140","word":"apply (applicant)","ipa":"/əˈplaɪ/","kr":"어**플라이**","mark":"**","pos":"동","mean":"① 지원하다 ② 적용하다","ex":[{"en":"She **applied** for the job.","ko":"그녀는 그 일자리에 지원했다."},{"en":"**Apply** the same rule to every team.","ko":"같은 규칙을 모든 팀에 적용해라."}]},{"id":"vocab-0141","word":"appoint","ipa":"/əˈpɔɪnt/","kr":"어**포인트**","mark":"**","pos":"동","mean":"① 임명하다 ② 정하다","ex":[{"en":"They **appointed** him as leader.","ko":"그들은 그를 리더로 임명했다."},{"en":"They **appointed** Friday as the deadline.","ko":"그들은 금요일을 마감일로 정했다."}]},{"id":"vocab-0142","word":"appreciate","ipa":"/əˈpriːʃieɪt/","kr":"어**프리ː**시에이트","mark":"**","pos":"동","mean":"① 감사하다 ② 감상하다","ex":[{"en":"I **appreciate** your help.","ko":"나는 너의 도움에 감사한다."},{"en":"I **appreciate** modern art.","ko":"나는 현대 미술을 감상한다."}]},{"id":"vocab-0143","word":"approach","ipa":"/əˈproʊtʃ/","kr":"어**프로치**","mark":"**","pos":"명/동","mean":"① 접근 ② 접근하다 ③ 다가가다","ex":[{"en":"We need a new **approach** to the problem.","ko":"우리는 그 문제에 새로운 접근이 필요하다."},{"en":"We should **approach** the problem one step at a time.","ko":"우리는 그 문제에 한 단계씩 접근해야 한다."},{"en":"A stranger **approached** us.","ko":"낯선 사람이 우리에게 다가왔다."}]},{"id":"vocab-0144","word":"appropriate","ipa":"/əˈproʊpriət/","kr":"어**프로**프리엇","mark":"**","pos":"형","mean":"적절한","ex":[{"en":"Wear **appropriate** clothes.","ko":"적절한 옷을 입어라."}]},{"id":"vocab-0145","word":"approve","ipa":"/əˈpruːv/","kr":"어**프루ː**브","mark":"","pos":"동","mean":"① 승인하다 ② 찬성하다","ex":[{"en":"The teacher **approved** our plan.","ko":"선생님은 우리의 계획을 승인했다."},{"en":"I **approve** of the new policy.","ko":"나는 새 정책에 찬성한다."}]},{"id":"vocab-0146","word":"approximate","ipa":"/əˈprɑːksɪmət/","kr":"어**프락**시밋","mark":"","pos":"형/동","mean":"① 대략의 ② 근접하다","ex":[{"en":"The **approximate** time is one hour.","ko":"대략의 시간은 한 시간이다."},{"en":"The final cost will **approximate** one million won.","ko":"최종 비용은 백만 원에 근접할 것이다."}]},{"id":"vocab-0147","word":"architect (architecture)","ipa":"/ˈɑːrkɪtekt/","kr":"**아ː**키텍트","mark":"","pos":"명","mean":"건축가","ex":[{"en":"The **architect** designed the building.","ko":"그 건축가가 그 건물을 설계했다."}]},{"id":"vocab-0148","word":"area","ipa":"/ˈeriə/","kr":"**에**리어","mark":"*","pos":"명","mean":"① 지역 ② 면적","ex":[{"en":"This **area** is very quiet.","ko":"이 지역은 매우 조용하다."},{"en":"The office has an **area** of 200 square meters.","ko":"그 사무실의 면적은 200제곱미터다."}]},{"id":"vocab-0149","word":"argue","ipa":"/ˈɑːrɡjuː/","kr":"**아ː**규","mark":"**","pos":"동","mean":"① 논쟁하다 ② 주장하다","ex":[{"en":"The two managers **argued** about the budget.","ko":"두 관리자는 예산을 두고 논쟁했다."},{"en":"She **argued** that the plan was too costly.","ko":"그녀는 그 계획이 너무 비싸다고 주장했다."}]},{"id":"vocab-0150","word":"arise","ipa":"/əˈraɪz/","kr":"어**라이즈**","mark":"","pos":"동","mean":"① 생기다 ② 발생하다","ex":[{"en":"New problems may **arise** during the update.","ko":"업데이트 중에 새 문제가 생길 수 있다."},{"en":"A new problem **arose** during testing.","ko":"테스트 중에 새로운 문제가 발생했다."}]},{"id":"vocab-0151","word":"arm","ipa":"/ɑːrm/","kr":"**암ː**","mark":"*","pos":"명","mean":"팔","ex":[{"en":"Noah raised his right **arm**.","ko":"노아는 오른팔을 들었다."}]},{"id":"vocab-0152","word":"army","ipa":"/ˈɑːrmi/","kr":"**아ː**미","mark":"**","pos":"명","mean":"① 군대 ② 육군","ex":[{"en":"Lucas served in the **army**.","ko":"루카스는 군대에서 복무했다."},{"en":"After college, he served two years in the **army**.","ko":"대학 졸업 후 그는 육군에서 2년간 복무했다."}]},{"id":"vocab-0153","word":"around","ipa":"/əˈraʊnd/","kr":"어**라운드**","mark":"*","pos":"전/부","mean":"① ~주위에 ② 대략","ex":[{"en":"We sat **around** the table.","ko":"우리는 탁자 주위에 앉았다."},{"en":"The weekly meeting lasted **around** one hour.","ko":"주간 회의는 대략 한 시간 동안 계속되었다."}]},{"id":"vocab-0154","word":"arrange","ipa":"/əˈreɪndʒ/","kr":"어**레인지**","mark":"**","pos":"동","mean":"① 정리하다 ② 준비하다","ex":[{"en":"She **arranged** the books by size.","ko":"그녀는 책을 크기별로 정리했다."},{"en":"I **arranged** a meeting for Friday.","ko":"나는 금요일 회의를 준비했다."}]},{"id":"vocab-0155","word":"arrest","ipa":"/əˈrest/","kr":"어**레스트**","mark":"**","pos":"명/동","mean":"① 체포 ② 체포하다","ex":[{"en":"The **arrest** happened near the station.","ko":"그 체포는 역 근처에서 일어났다."},{"en":"The police **arrested** the thief near the station.","ko":"경찰은 역 근처에서 그 도둑을 체포했다."}]},{"id":"vocab-0156","word":"arrive","ipa":"/əˈraɪv/","kr":"어**라이브**","mark":"*","pos":"동","mean":"도착하다","ex":[{"en":"The train **arrived** at noon.","ko":"기차는 정오에 도착했다."}]},{"id":"vocab-0157","word":"arrow","ipa":"/ˈæroʊ/","kr":"**애**로","mark":"","pos":"명","mean":"① 화살 ② 화살표","ex":[{"en":"Daniel shot an **arrow** at the target.","ko":"다니엘은 과녁을 향해 화살을 쏘았다."},{"en":"Follow the **arrow** on the screen.","ko":"화면의 화살표를 따라라."}]},{"id":"vocab-0158","word":"art","ipa":"/ɑːrt/","kr":"**아ː**트","mark":"*","pos":"명","mean":"① 예술 ② 미술","ex":[{"en":"**Art** can change how we see the world.","ko":"예술은 우리가 세상을 보는 방식을 바꿀 수 있다."},{"en":"Emma studies **art** at school.","ko":"엠마는 학교에서 미술을 공부한다."}]},{"id":"vocab-0159","word":"article","ipa":"/ˈɑːrtɪkl/","kr":"**아ː**티클","mark":"**","pos":"명","mean":"① 기사 ② 물품 ③ 관사","ex":[{"en":"I read an interesting **article**.","ko":"나는 흥미로운 기사를 읽었다."},{"en":"Each **article** in the shop has a price tag.","ko":"그 가게의 각 물품에는 가격표가 있다."},{"en":"A is an **article** in English.","ko":"A는 영어에서 관사다."}]},{"id":"vocab-0160","word":"artifice (artificial)","ipa":"/ˈɑːrtɪfɪs/","kr":"**아ː**티피스","mark":"","pos":"명","mean":"① 술책 ② 기교","ex":[{"en":"The trick was pure **artifice**.","ko":"그 속임수는 순전히 술책이었다."},{"en":"The design shows great **artifice**.","ko":"그 디자인은 뛰어난 기교를 보여 준다."}]},{"id":"vocab-0161","word":"as","ipa":"/æz/","kr":"**애즈**","mark":"*","pos":"접/전","mean":"① ~로서 ② ~할 때 ③ ~때문에","ex":[{"en":"Yuna works **as** an IT manager.","ko":"유나는 IT 관리자로 일한다."},{"en":"Call me **as** you leave the office.","ko":"사무실을 나설 때 나에게 전화해라."},{"en":"**As** the server was down, we delayed the update.","ko":"서버가 다운되었기 때문에 우리는 업데이트를 미뤘다."}]},{"id":"vocab-0162","word":"aside","ipa":"/əˈsaɪd/","kr":"어**사이드**","mark":"**","pos":"부","mean":"① 옆으로 ② 따로","ex":[{"en":"Noah stepped **aside** to let me pass.","ko":"노아는 내가 지나가도록 옆으로 비켰다."},{"en":"Please set the old files **aside**.","ko":"오래된 파일들을 따로 두어 주세요."}]},{"id":"vocab-0163","word":"ask","ipa":"/æsk/","kr":"**애스크**","mark":"*","pos":"동","mean":"① 묻다 ② 부탁하다","ex":[{"en":"May I **ask** your name?","ko":"당신의 이름을 물어봐도 될까요?"},{"en":"I **asked** him to send the report.","ko":"나는 그에게 보고서를 보내 달라고 부탁했다."}]},{"id":"vocab-0164","word":"asleep","ipa":"/əˈsliːp/","kr":"어**슬리ː**프","mark":"**","pos":"형","mean":"잠든","ex":[{"en":"The baby was **asleep** in the car.","ko":"그 아기는 차 안에서 잠들어 있었다."}]},{"id":"vocab-0165","word":"aspect","ipa":"/ˈæspekt/","kr":"**애**스펙트","mark":"","pos":"명","mean":"① 측면 ② 양상","ex":[{"en":"We considered every **aspect** of the problem.","ko":"우리는 문제의 모든 측면을 고려했다."},{"en":"The final report shows a new **aspect** of the problem.","ko":"최종 보고서는 문제의 새로운 양상을 보여 준다."}]},{"id":"vocab-0166","word":"aspire","ipa":"/əˈspaɪər/","kr":"어**스파이**어","mark":"","pos":"동","mean":"① 열망하다 ② 갈망하다","ex":[{"en":"She **aspires** to be a pilot.","ko":"그녀는 조종사가 되기를 열망한다."},{"en":"He **aspires** to lead the company someday.","ko":"그는 언젠가 회사를 이끌기를 갈망한다."}]},{"id":"vocab-0167","word":"assault","ipa":"/əˈsɔːlt/","kr":"어**솔ː**트","mark":"","pos":"명/동","mean":"① 폭행 ② 공격하다","ex":[{"en":"Lucas was charged with **assault**.","ko":"루카스는 폭행 혐의로 기소되었다."},{"en":"The army plans to **assault** the position at dawn.","ko":"그 군대는 새벽에 그 진지를 공격할 계획이다."}]},{"id":"vocab-0168","word":"assemble","ipa":"/əˈsembl/","kr":"어**셈**블","mark":"","pos":"동","mean":"① 조립하다 ② 모으다","ex":[{"en":"We **assembled** the table at home.","ko":"우리는 집에서 탁자를 조립했다."},{"en":"Please **assemble** the team in the lobby.","ko":"팀을 로비에 모아 주세요."}]},{"id":"vocab-0169","word":"assert","ipa":"/əˈsɜːrt/","kr":"어**서ː**트","mark":"","pos":"동","mean":"① 주장하다 ② 단언하다","ex":[{"en":"She **asserted** her opinion firmly.","ko":"그녀는 자신의 의견을 단호히 주장했다."},{"en":"She **asserted** that the report was true.","ko":"그녀는 그 보고서가 사실이라고 단언했다."}]},{"id":"vocab-0170","word":"assess","ipa":"/əˈses/","kr":"어**세스**","mark":"**","pos":"동","mean":"평가하다","ex":[{"en":"The doctor **assessed** his condition.","ko":"의사는 그의 상태를 평가했다."}]},{"id":"vocab-0171","word":"asset","ipa":"/ˈæset/","kr":"**애**셋","mark":"","pos":"명","mean":"① 자산 ② 재산","ex":[{"en":"Good health is a valuable **asset**.","ko":"건강은 귀중한 자산이다."},{"en":"The house is her largest **asset**.","ko":"그 집은 그녀의 가장 큰 재산이다."}]},{"id":"vocab-0172","word":"assign (assignment)","ipa":"/əˈsaɪn/","kr":"어**사인**","mark":"**","pos":"동","mean":"① 배정하다 ② 할당하다","ex":[{"en":"This manager **assigned** each person a task.","ko":"이 관리자는 각 사람에게 업무를 배정했다."},{"en":"Please **assign** a budget to each project.","ko":"각 프로젝트에 예산을 할당해 주세요."}]},{"id":"vocab-0173","word":"assist (assistant)","ipa":"/əˈsɪst/","kr":"어**시스트**","mark":"**","pos":"동","mean":"① 돕다 ② 보조하다","ex":[{"en":"Can you **assist** me with this file?","ko":"이 파일 작업을 나에게 도와줄 수 있나요?"},{"en":"The new tool **assists** the support team.","ko":"새 도구는 지원팀을 보조한다."}]},{"id":"vocab-0174","word":"associate","ipa":"/əˈsoʊʃieɪt/","kr":"어**소**시에이트","mark":"**","pos":"동/명","mean":"① 연관 짓다 ② 동료","ex":[{"en":"People **associate** spring with flowers.","ko":"사람들은 봄을 꽃과 연관 짓는다."},{"en":"Sophia is a close business **associate**.","ko":"소피아는 가까운 업무 동료다."}]},{"id":"vocab-0175","word":"assume","ipa":"/əˈsuːm/","kr":"어**숨ː**","mark":"**","pos":"동","mean":"① 가정하다 ② 추정하다","ex":[{"en":"Let us **assume** that the answer is correct.","ko":"답이 맞다고 가정해 보자."},{"en":"We **assume** the server will restart soon.","ko":"우리는 서버가 곧 재시작할 것이라고 추정한다."}]},{"id":"vocab-0176","word":"assure","ipa":"/əˈʃʊr/","kr":"어**슈어**","mark":"","pos":"동","mean":"① 장담하다 ② 확신시키다","ex":[{"en":"I **assure** you it is safe.","ko":"나는 그것이 안전하다고 장담한다."},{"en":"The doctor **assured** me that the test was safe.","ko":"의사는 그 검사가 안전하다고 나를 확신시켰다."}]},{"id":"vocab-0177","word":"astonish","ipa":"/əˈstɑːnɪʃ/","kr":"어**스타**니시","mark":"","pos":"동","mean":"깜짝 놀라게 하다","ex":[{"en":"The news **astonished** everyone.","ko":"그 소식은 모두를 깜짝 놀라게 했다."}]},{"id":"vocab-0178","word":"at","ipa":"/æt/","kr":"**앳**","mark":"*","pos":"전","mean":"① ~에 ② ~에서","ex":[{"en":"We met **at** the station.","ko":"우리는 역에서 만났다."},{"en":"Please be **at** the station by six.","ko":"여섯 시까지 역에 있어 주세요."}]},{"id":"vocab-0179","word":"athlete","ipa":"/ˈæθliːt/","kr":"**애**슬리ː트","mark":"","pos":"명","mean":"운동선수","ex":[{"en":"The **athlete** trains every day.","ko":"그 운동선수는 매일 훈련한다."}]},{"id":"vocab-0180","word":"atmosphere","ipa":"/ˈætməsfɪr/","kr":"**앳**머스피어","mark":"**","pos":"명","mean":"① 대기 ② 분위기","ex":[{"en":"Earth's **atmosphere** contains oxygen.","ko":"지구의 대기에는 산소가 들어 있다."},{"en":"The café has a friendly **atmosphere**.","ko":"그 카페는 친근한 분위기이다."}]},{"id":"vocab-0181","word":"atom","ipa":"/ˈætəm/","kr":"**애**텀","mark":"","pos":"명","mean":"원자","ex":[{"en":"Everything is made of **atoms**.","ko":"모든 것은 원자로 이루어져 있다."}]},{"id":"vocab-0182","word":"attach","ipa":"/əˈtætʃ/","kr":"어**태치**","mark":"**","pos":"동","mean":"① 붙이다 ② 첨부하다","ex":[{"en":"**Attach** the label to the box.","ko":"상자에 라벨을 붙여라."},{"en":"Please **attach** the file to the email.","ko":"그 파일을 이메일에 첨부해 주세요."}]},{"id":"vocab-0183","word":"attack","ipa":"/əˈtæk/","kr":"어**택**","mark":"**","pos":"명/동","mean":"① 공격 ② 공격하다","ex":[{"en":"The enemy launched an **attack**.","ko":"적이 공격을 시작했다."},{"en":"The dog did not **attack** anyone.","ko":"그 개는 아무도 공격하지 않았다."}]},{"id":"vocab-0184","word":"attempt","ipa":"/əˈtempt/","kr":"어**템프트**","mark":"**","pos":"명/동","mean":"① 시도 ② 시도하다","ex":[{"en":"Ethan made an **attempt** to escape.","ko":"이선은 탈출을 시도했다."},{"en":"She **attempted** to open the door.","ko":"그녀는 문을 열려고 시도했다."}]},{"id":"vocab-0185","word":"attend","ipa":"/əˈtend/","kr":"어**텐드**","mark":"**","pos":"동","mean":"① 참석하다 ② 다니다","ex":[{"en":"Many students **attended** the meeting.","ko":"많은 학생이 회의에 참석했다."},{"en":"She **attends** a language class every Tuesday.","ko":"그녀는 매주 화요일 언어 수업에 다닌다."}]},{"id":"vocab-0186","word":"attention","ipa":"/əˈtenʃn/","kr":"어**텐**션","mark":"**","pos":"명","mean":"① 주의 ② 관심","ex":[{"en":"Please pay **attention** to the signs.","ko":"표지판에 주의를 기울여 주세요."},{"en":"The issue received public **attention**.","ko":"그 문제는 대중의 관심을 받았다."}]},{"id":"vocab-0187","word":"attitude","ipa":"/ˈætɪtuːd/","kr":"**애**티튜ː드","mark":"**","pos":"명","mean":"태도","ex":[{"en":"Julia has a positive **attitude**.","ko":"줄리아는 긍정적인 태도를 지녔다."}]},{"id":"vocab-0188","word":"attract","ipa":"/əˈtrækt/","kr":"어**트랙트**","mark":"**","pos":"동","mean":"① 끌어당기다 ② 매혹하다","ex":[{"en":"Magnets **attract** small pieces of iron.","ko":"자석은 작은 철 조각들을 끌어당긴다."},{"en":"The product's design **attracts** many buyers.","ko":"그 제품의 디자인은 많은 구매자를 매혹한다."}]},{"id":"vocab-0189","word":"attribute","ipa":"/ˈætrɪbjuːt/","kr":"**애**트리뷰ː트","mark":"","pos":"명/동","mean":"① 속성 ② ~의 탓으로 돌리다","ex":[{"en":"Speed is an important **attribute** of this system.","ko":"속도는 이 시스템의 중요한 속성이다."},{"en":"A short report **attributes** the delay to a network error.","ko":"짧은 보고서는 지연을 네트워크 오류의 탓으로 돌린다."}]},{"id":"vocab-0190","word":"auction","ipa":"/ˈɔːkʃn/","kr":"**옥**션","mark":"","pos":"명/동","mean":"① 경매 ② 경매하다","ex":[{"en":"The painting will go to **auction** tomorrow.","ko":"그 그림은 내일 경매에 나올 것이다."},{"en":"They **auctioned** the painting online.","ko":"그들은 온라인에서 그 그림을 경매했다."}]},{"id":"vocab-0191","word":"audience","ipa":"/ˈɔːdiəns/","kr":"**오ː**디언스","mark":"**","pos":"명","mean":"① 청중 ② 관객","ex":[{"en":"The **audience** listened quietly to the speaker.","ko":"청중은 발표자의 말을 조용히 들었다."},{"en":"The **audience** clapped loudly.","ko":"관객이 크게 박수를 쳤다."}]},{"id":"vocab-0192","word":"aunt","ipa":"/ænt/","kr":"**앤트**","mark":"*","pos":"명","mean":"① 이모 ② 고모 ③ 숙모","ex":[{"en":"My **aunt** lives in Busan.","ko":"나의 이모는 부산에 산다."},{"en":"My **aunt** on my father's side lives in Daegu.","ko":"아버지 쪽 고모는 대구에 산다."},{"en":"My uncle's wife is my **aunt**.","ko":"삼촌의 아내는 나의 숙모다."}]},{"id":"vocab-0193","word":"authentic","ipa":"/ɔːˈθentɪk/","kr":"오**쎈**틱","mark":"","pos":"형","mean":"① 진짜의 ② 진정한","ex":[{"en":"This bag is made of **authentic** leather.","ko":"이 가방은 진짜 가죽으로 만들어졌다."},{"en":"Her apology sounded **authentic**.","ko":"그녀의 사과는 진정하게 들렸다."}]},{"id":"vocab-0194","word":"author","ipa":"/ˈɔːθər/","kr":"**오ː**써","mark":"","pos":"명","mean":"① 작가 ② 저자","ex":[{"en":"The **author** signed my book.","ko":"그 작가는 내 책에 서명했다."},{"en":"The **author** explained the main idea.","ko":"그 저자는 핵심 생각을 설명했다."}]},{"id":"vocab-0195","word":"automatic","ipa":"/ˌɔːtəˈmætɪk/","kr":"오터**매**틱","mark":"**","pos":"형","mean":"자동의","ex":[{"en":"The door is **automatic**.","ko":"그 문은 자동이다."}]},{"id":"vocab-0196","word":"autumn","ipa":"/ˈɔːtəm/","kr":"**오ː**텀","mark":"*","pos":"명","mean":"가을","ex":[{"en":"The leaves turn red in **autumn**.","ko":"가을에는 나뭇잎이 빨갛게 변한다."}]},{"id":"vocab-0197","word":"avail (available)","ipa":"/əˈveɪl/","kr":"어**베일**","mark":"","pos":"동","mean":"① 이용하다 ② 도움이 되다","ex":[{"en":"Please **avail** yourself of this chance.","ko":"이 기회를 이용하세요."},{"en":"Nothing could **avail** him in that situation.","ko":"그 상황에서는 아무것도 그에게 도움이 되지 못했다."}]},{"id":"vocab-0198","word":"average","ipa":"/ˈævərɪdʒ/","kr":"**애**버리지","mark":"**","pos":"명/형","mean":"① 평균 ② 평균의","ex":[{"en":"The **average** of the three scores is 80.","ko":"세 점수의 평균은 80이다."},{"en":"The **average** score was 80.","ko":"평균 점수는 80점이었다."}]},{"id":"vocab-0199","word":"avoid","ipa":"/əˈvɔɪd/","kr":"어**보이드**","mark":"**","pos":"동","mean":"피하다","ex":[{"en":"Try to **avoid** making the same mistake.","ko":"같은 실수를 하는 것을 피하도록 해라."}]},{"id":"vocab-0200","word":"await","ipa":"/əˈweɪt/","kr":"어**웨이트**","mark":"","pos":"동","mean":"기다리다","ex":[{"en":"We **await** your final decision.","ko":"우리는 당신의 최종 결정을 기다린다."}]},{"id":"vocab-0201","word":"awake","ipa":"/əˈweɪk/","kr":"어**웨익**","mark":"**","pos":"동/형","mean":"① 깨우다 ② 깨어 있는","ex":[{"en":"Please **awake** me before six.","ko":"여섯 시 전에 나를 깨워 주세요."},{"en":"I was still **awake** at midnight.","ko":"나는 자정에도 여전히 깨어 있었다."}]},{"id":"vocab-0202","word":"award","ipa":"/əˈwɔːrd/","kr":"어**워ː**드","mark":"**","pos":"명/동","mean":"① 상 ② 수여하다","ex":[{"en":"Nora won an **award** for her painting.","ko":"노라는 그림으로 상을 받았다."},{"en":"A small company **awarded** her a bonus.","ko":"한 소규모 회사는 그녀에게 보너스를 수여했다."}]},{"id":"vocab-0203","word":"aware (unaware)","ipa":"/əˈwer/","kr":"어**웨어**","mark":"**","pos":"형","mean":"① 알고 있는 ② 인식하는","ex":[{"en":"Are you **aware** of the danger?","ko":"그 위험을 알고 있나요?"},{"en":"Employees are **aware** of the security risk.","ko":"직원들은 보안 위험을 인식하고 있다."}]},{"id":"vocab-0204","word":"away","ipa":"/əˈweɪ/","kr":"어**웨이**","mark":"*","pos":"부","mean":"① 떨어져 ② 멀리","ex":[{"en":"The school is two miles **away**.","ko":"그 학교는 2마일 떨어져 있다."},{"en":"The new office is only two blocks **away**.","ko":"새 사무실은 겨우 두 블록 떨어져 있다."}]},{"id":"vocab-0205","word":"awe (awful)","ipa":"/ɔː/","kr":"**오ː**","mark":"","pos":"명","mean":"① 경외 ② 두려움","ex":[{"en":"We watched the huge waterfall in **awe**.","ko":"우리는 경외감에 차서 거대한 폭포를 바라보았다."},{"en":"A child looked at the storm in **awe** and fear.","ko":"한 아이는 경외와 두려움 속에서 폭풍을 바라보았다."}]},{"id":"vocab-0206","word":"awkward","ipa":"/ˈɔːkwərd/","kr":"**오ː**크워드","mark":"**","pos":"형","mean":"① 어색한 ② 불편한","ex":[{"en":"There was an **awkward** silence.","ko":"어색한 침묵이 흘렀다."},{"en":"This chair is **awkward** to sit in.","ko":"이 의자는 앉기에 불편하다."}]},{"id":"vocab-0207","word":"baby","ipa":"/ˈbeɪbi/","kr":"**베이**비","mark":"*","pos":"명","mean":"아기","ex":[{"en":"The **baby** is sleeping.","ko":"아기가 자고 있다."}]},{"id":"vocab-0208","word":"back","ipa":"/bæk/","kr":"**백**","mark":"*","pos":"명/부","mean":"① 등 ② 뒤 ③ 뒤로","ex":[{"en":"My **back** hurts today.","ko":"오늘은 내 등이 아프다."},{"en":"The storage room is at the **back**.","ko":"창고는 뒤에 있다."},{"en":"Could you step **back**?","ko":"뒤로 한 걸음 물러서 주실 수 있나요?"}]},{"id":"vocab-0209","word":"background","ipa":"/ˈbækɡraʊnd/","kr":"**백**그라운드","mark":"**","pos":"명","mean":"배경","ex":[{"en":"The mountains form a beautiful **background**.","ko":"산들이 아름다운 배경을 이룬다."}]},{"id":"vocab-0210","word":"bacon","ipa":"/ˈbeɪkən/","kr":"**베이**컨","mark":"**","pos":"명","mean":"베이컨","ex":[{"en":"Minho cooked eggs and **bacon**.","ko":"민호는 달걀과 베이컨을 요리했다."}]},{"id":"vocab-0211","word":"bad","ipa":"/bæd/","kr":"**배드**","mark":"*","pos":"형","mean":"① 나쁜 ② 안 좋은","ex":[{"en":"That was a **bad** decision.","ko":"그것은 나쁜 결정이었다."},{"en":"Heavy rain brought **bad** weather all day.","ko":"폭우가 하루 종일 나쁜 날씨를 가져왔다."}]},{"id":"vocab-0212","word":"badminton","ipa":"/ˈbædmɪntən/","kr":"**배**드민턴","mark":"*","pos":"명","mean":"배드민턴","ex":[{"en":"We play **badminton** after school.","ko":"우리는 방과 후에 배드민턴을 친다."}]},{"id":"vocab-0213","word":"bag","ipa":"/bæɡ/","kr":"**백**","mark":"*","pos":"명","mean":"① 가방 ② 봉지","ex":[{"en":"Mina put the books in her **bag**.","ko":"미나는 책들을 가방에 넣었다."},{"en":"Put the cables in a plastic **bag**.","ko":"케이블을 비닐봉지에 넣어라."}]},{"id":"vocab-0214","word":"bake","ipa":"/beɪk/","kr":"**베익**","mark":"*","pos":"동","mean":"굽다","ex":[{"en":"My mom **bakes** bread.","ko":"우리 엄마는 빵을 굽는다."}]},{"id":"vocab-0215","word":"balance","ipa":"/ˈbæləns/","kr":"**밸**런스","mark":"**","pos":"명/동","mean":"① 균형 ② 균형을 잡다","ex":[{"en":"Try to keep your **balance**.","ko":"균형을 유지하려고 노력해라."},{"en":"She **balanced** the box on one hand.","ko":"그녀는 한 손으로 상자의 균형을 잡았다."}]},{"id":"vocab-0216","word":"ball","ipa":"/bɔːl/","kr":"**볼ː**","mark":"*","pos":"명","mean":"공","ex":[{"en":"Minho kicked the **ball**.","ko":"민호는 공을 찼다."}]},{"id":"vocab-0217","word":"balloon","ipa":"/bəˈluːn/","kr":"벌**룬ː**","mark":"**","pos":"명","mean":"풍선","ex":[{"en":"The red **balloon** floated away.","ko":"빨간 풍선이 떠내려갔다."}]},{"id":"vocab-0218","word":"ban","ipa":"/bæn/","kr":"**밴**","mark":"","pos":"명/동","mean":"① 금지 ② 금지하다","ex":[{"en":"The city introduced a smoking **ban**.","ko":"그 도시는 흡연 금지를 도입했다."},{"en":"The school **banned** smoking on campus.","ko":"그 학교는 교내 흡연을 금지했다."}]},{"id":"vocab-0219","word":"banana","ipa":"/bəˈnænə/","kr":"버**내**너","mark":"*","pos":"명","mean":"바나나","ex":[{"en":"I ate a **banana** for breakfast.","ko":"나는 아침 식사로 바나나를 먹었다."}]},{"id":"vocab-0220","word":"band","ipa":"/bænd/","kr":"**밴드**","mark":"**","pos":"명","mean":"① 밴드 ② 무리 ③ 띠","ex":[{"en":"The **band** played my favorite song.","ko":"그 밴드는 내가 가장 좋아하는 노래를 연주했다."},{"en":"A **band** of volunteers cleaned the park.","ko":"자원봉사자 무리가 공원을 청소했다."},{"en":"A narrow **band** of light crossed the wall.","ko":"좁은 빛의 띠가 벽을 가로질렀다."}]},{"id":"vocab-0221","word":"bang","ipa":"/bæŋ/","kr":"**뱅**","mark":"**","pos":"명/동","mean":"① 쾅 소리 ② 쾅 치다","ex":[{"en":"The door closed with a **bang**.","ko":"문이 쾅 하고 닫혔다."},{"en":"He **banged** on the door.","ko":"그는 문을 쾅쾅 두드렸다."}]},{"id":"vocab-0222","word":"bank","ipa":"/bæŋk/","kr":"**뱅크**","mark":"*","pos":"명","mean":"① 은행 ② 강둑","ex":[{"en":"I need to go to the **bank**.","ko":"나는 은행에 가야 한다."},{"en":"We sat on the river **bank**.","ko":"우리는 강둑에 앉았다."}]},{"id":"vocab-0223","word":"bankrupt","ipa":"/ˈbæŋkrʌpt/","kr":"**뱅**크럽트","mark":"","pos":"형/동","mean":"① 파산한 ② 파산시키다","ex":[{"en":"The parent company went **bankrupt**.","ko":"그 모회사는 파산했다."},{"en":"The lawsuit could **bankrupt** the company.","ko":"그 소송은 그 회사를 파산시킬 수 있다."}]},{"id":"vocab-0224","word":"bar","ipa":"/bɑːr/","kr":"**바ː**","mark":"**","pos":"명","mean":"① 막대기 ② 술집 ③ 창살","ex":[{"en":"Ethan held an iron **bar**.","ko":"이선은 쇠막대기를 들고 있었다."},{"en":"We met at a quiet **bar** after work.","ko":"우리는 퇴근 후 조용한 술집에서 만났다."},{"en":"The prisoner looked through the **bars**.","ko":"그 죄수는 창살 사이로 내다보았다."}]},{"id":"vocab-0225","word":"bare","ipa":"/ber/","kr":"**베어**","mark":"**","pos":"형","mean":"① 벌거벗은 ② 텅 빈","ex":[{"en":"The baby walked with **bare** feet.","ko":"그 아기는 맨발로 걸었다."},{"en":"The small room was **bare** and empty.","ko":"작은 방은 텅 비어 있었다."}]},{"id":"vocab-0226","word":"bargain","ipa":"/ˈbɑːrɡən/","kr":"**바ː**건","mark":"","pos":"명/동","mean":"① 흥정 ② 흥정하다","ex":[{"en":"They reached a **bargain** after a long talk.","ko":"그들은 긴 대화 후에 흥정에 합의했다."},{"en":"She **bargained** with the seller over the price.","ko":"그녀는 가격을 두고 판매자와 흥정했다."}]},{"id":"vocab-0227","word":"bark","ipa":"/bɑːrk/","kr":"**바ː**크","mark":"**","pos":"명/동","mean":"① 짖는 소리 ② 짖다","ex":[{"en":"The dog's **bark** woke me up.","ko":"개의 짖는 소리가 나를 깨웠다."},{"en":"The dog began to **bark**.","ko":"개가 짖기 시작했다."}]},{"id":"vocab-0228","word":"barrier","ipa":"/ˈbæriər/","kr":"**배**리어","mark":"","pos":"명","mean":"① 장벽 ② 장애물","ex":[{"en":"Language can be a **barrier**.","ko":"언어는 장벽이 될 수 있다."},{"en":"Cost is a major **barrier** to the project.","ko":"비용은 그 프로젝트의 큰 장애물이다."}]},{"id":"vocab-0229","word":"base","ipa":"/beɪs/","kr":"**베이스**","mark":"*","pos":"명/동","mean":"① 기초 ② 기지 ③ ~에 근거를 두다","ex":[{"en":"The building has a strong **base**.","ko":"그 건물은 튼튼한 기초를 가지고 있다."},{"en":"The soldiers returned to **base**.","ko":"그 군인들은 기지로 돌아왔다."},{"en":"We **based** the decision on user data.","ko":"우리는 그 결정을 사용자 자료에 근거를 두었다."}]},{"id":"vocab-0230","word":"baseball","ipa":"/ˈbeɪsbɔːl/","kr":"**베이스**볼","mark":"*","pos":"명","mean":"야구","ex":[{"en":"They played **baseball** in the park.","ko":"그들은 공원에서 야구를 했다."}]},{"id":"vocab-0231","word":"basis","ipa":"/ˈbeɪsɪs/","kr":"**베이**시스","mark":"**","pos":"명","mean":"① 기초 ② 근거","ex":[{"en":"Trust is the **basis** of friendship.","ko":"신뢰는 우정의 기초이다."},{"en":"We made the decision on the **basis** of the data.","ko":"우리는 자료를 근거로 결정을 내렸다."}]},{"id":"vocab-0232","word":"basket","ipa":"/ˈbæskɪt/","kr":"**배**스킷","mark":"*","pos":"명","mean":"바구니","ex":[{"en":"Grace filled the **basket** with apples.","ko":"그레이스는 바구니를 사과로 채웠다."}]},{"id":"vocab-0233","word":"basketball","ipa":"/ˈbæskɪtbɔːl/","kr":"**배**스킷볼","mark":"*","pos":"명","mean":"농구","ex":[{"en":"My brother enjoys **basketball**.","ko":"내 남동생은 농구를 즐긴다."}]},{"id":"vocab-0234","word":"bat","ipa":"/bæt/","kr":"**뱃**","mark":"*","pos":"명","mean":"① 방망이 ② 박쥐","ex":[{"en":"Jun hit the ball with a **bat**.","ko":"준은 방망이로 공을 쳤다."},{"en":"A **bat** flew out of the cave.","ko":"박쥐 한 마리가 동굴에서 날아 나왔다."}]},{"id":"vocab-0235","word":"bath","ipa":"/bæθ/","kr":"**배쓰**","mark":"*","pos":"명","mean":"목
