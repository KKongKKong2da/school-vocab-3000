","ex":[{"en":"Many families **populate** the new town.","ko":"많은 가족이 그 새 도시에 산다."},{"en":"Many families **populate** the valley.","ko":"많은 가족들이 그 계곡에 거주한다."}]},{"id":"vocab-2004","word":"pork","ipa":"/pɔːrk/","kr":"**포ː**크","mark":"**","pos":"명","mean":"돼지고기","ex":[{"en":"We had **pork** for dinner.","ko":"우리는 저녁으로 돼지고기를 먹었다."}]},{"id":"vocab-2005","word":"port","ipa":"/pɔːrt/","kr":"**포ː**트","mark":"**","pos":"명","mean":"항구","ex":[{"en":"The ship arrived at the **port**.","ko":"그 배는 항구에 도착했다."}]},{"id":"vocab-2006","word":"portion","ipa":"/ˈpɔːrʃn/","kr":"**포ː**션","mark":"","pos":"명","mean":"① 부분 ② 몫","ex":[{"en":"Only a small **portion** of the report is public.","ko":"보고서의 작은 부분만 공개되어 있다."},{"en":"Each employee received an equal **portion**.","ko":"각 직원은 같은 몫을 받았다."}]},{"id":"vocab-2007","word":"portrait","ipa":"/ˈpɔːrtrət/","kr":"**포ː**트릿","mark":"","pos":"명","mean":"초상화","ex":[{"en":"The artist painted a **portrait** of the king.","ko":"그 화가는 왕의 초상화를 그렸다."}]},{"id":"vocab-2008","word":"pose (dispose)","ipa":"/poʊz/","kr":"**포즈**","mark":"","pos":"동/명","mean":"① 자세를 취하다 ② 자세","ex":[{"en":"She **posed** for a photograph.","ko":"그녀는 사진을 위해 자세를 취했다."},{"en":"His **pose** looked natural.","ko":"그의 자세는 자연스러워 보였다."}]},{"id":"vocab-2009","word":"posit (position, positive)","ipa":"/ˈpɑːzɪt/","kr":"**파**짓","mark":"","pos":"동","mean":"① 상정하다 ② 두다","ex":[{"en":"The theory **posits** a new idea.","ko":"그 이론은 새로운 생각을 상정한다."},{"en":"Place and **posit** the server near the wall.","ko":"서버를 벽 근처에 두어라."}]},{"id":"vocab-2010","word":"possess","ipa":"/pəˈzes/","kr":"퍼**제스**","mark":"**","pos":"동","mean":"① 소유하다 ② 지니다","ex":[{"en":"The organization **possesses** several patents.","ko":"그 조직은 특허 몇 개를 소유한다."},{"en":"She **possesses** great patience.","ko":"그녀는 대단한 인내심을 지니고 있다."}]},{"id":"vocab-2011","word":"possible","ipa":"/ˈpɑːsəbl/","kr":"**파**서블","mark":"**","pos":"형","mean":"가능한","ex":[{"en":"Is it **possible** to finish today?","ko":"오늘 끝내는 것이 가능하니?"}]},{"id":"vocab-2012","word":"post (poster)","ipa":"/poʊst/","kr":"**포스트**","mark":"**","pos":"명/동","mean":"① 우편 ② 기둥 ③ 게시하다","ex":[{"en":"The **post** arrived in the morning mail.","ko":"우편이 아침 우편물로 도착했다."},{"en":"The sign is fixed to a wooden **post**.","ko":"그 표지판은 나무 기둥에 고정되어 있다."},{"en":"She **posted** the notice online.","ko":"그녀는 공지를 온라인에 게시했다."}]},{"id":"vocab-2013","word":"pot","ipa":"/pɑːt/","kr":"**팟**","mark":"**","pos":"명","mean":"① 냄비 ② 항아리","ex":[{"en":"The soup is in the **pot**.","ko":"수프는 냄비 안에 있다."},{"en":"Grace stored rice in a clay **pot**.","ko":"그레이스는 흙 항아리에 쌀을 보관했다."}]},{"id":"vocab-2014","word":"potato","ipa":"/pəˈteɪtoʊ/","kr":"퍼**테이**토","mark":"*","pos":"명","mean":"감자","ex":[{"en":"James peeled the **potatoes**.","ko":"제임스는 감자 껍질을 벗겼다."}]},{"id":"vocab-2015","word":"potential","ipa":"/pəˈtenʃl/","kr":"퍼**텐**셜","mark":"**","pos":"명/형","mean":"① 잠재력 ② 잠재적인","ex":[{"en":"The idea has great **potential**.","ko":"그 생각은 큰 잠재력이 있다."},{"en":"We discussed a **potential** security risk.","ko":"우리는 잠재적인 보안 위험을 논의했다."}]},{"id":"vocab-2016","word":"pour","ipa":"/pɔːr/","kr":"**포ː**","mark":"**","pos":"동","mean":"① 붓다 ② 따르다","ex":[{"en":"**Pour** the coffee into the cup.","ko":"커피를 컵에 부어라."},{"en":"Could you **pour** me some coffee?","ko":"나에게 커피를 조금 따라 주실 수 있나요?"}]},{"id":"vocab-2017","word":"powder","ipa":"/ˈpaʊdər/","kr":"**파우**더","mark":"**","pos":"명","mean":"① 가루 ② 분말","ex":[{"en":"Add a spoon of **powder**.","ko":"가루 한 숟가락을 넣어라."},{"en":"Mix the **powder** with cold water.","ko":"그 분말을 찬물과 섞어라."}]},{"id":"vocab-2018","word":"power","ipa":"/ˈpaʊər/","kr":"**파우**어","mark":"*","pos":"명","mean":"① 힘 ② 권력 ③ 전력","ex":[{"en":"Knowledge is **power**.","ko":"아는 것이 힘이다."},{"en":"The new law gives the agency more **power**.","ko":"새 법은 그 기관에 더 많은 권력을 준다."},{"en":"The storm cut off the **power**.","ko":"폭풍 때문에 전력이 끊겼다."}]},{"id":"vocab-2019","word":"practical","ipa":"/ˈpræktɪkl/","kr":"**프랙**티클","mark":"**","pos":"형","mean":"① 실용적인 ② 현실적인","ex":[{"en":"This tool offers a **practical** solution.","ko":"이 도구는 실용적인 해결책을 제공한다."},{"en":"We need a **practical** solution that works today.","ko":"우리는 오늘 효과가 있는 현실적인 해결책이 필요하다."}]},{"id":"vocab-2020","word":"practice / practise","ipa":"/ˈpræktɪs/","kr":"**프랙**티스","mark":"**","pos":"명/동","mean":"① 연습 ② 연습하다","ex":[{"en":"**Practice** makes perfect.","ko":"연습이 완벽을 만든다."},{"en":"You need more **practice**.","ko":"너는 연습이 더 필요하다."}]},{"id":"vocab-2021","word":"praise","ipa":"/preɪz/","kr":"**프레이즈**","mark":"","pos":"명/동","mean":"① 칭찬 ② 칭찬하다","ex":[{"en":"Her work received **praise** from the manager.","ko":"그녀의 일은 관리자에게 칭찬을 받았다."},{"en":"The teacher **praised** her work.","ko":"선생님이 그녀의 과제를 칭찬했다."}]},{"id":"vocab-2022","word":"pray","ipa":"/preɪ/","kr":"**프레이**","mark":"**","pos":"동","mean":"기도하다","ex":[{"en":"They **prayed** for peace.","ko":"그들은 평화를 위해 기도했다."}]},{"id":"vocab-2023","word":"preach","ipa":"/priːtʃ/","kr":"**프리ː**치","mark":"","pos":"동","mean":"설교하다","ex":[{"en":"The priest **preached** about kindness.","ko":"그 성직자는 친절에 관해 설교했다."}]},{"id":"vocab-2024","word":"precede (unprecedented)","ipa":"/prɪˈsiːd/","kr":"프리**시ː**드","mark":"","pos":"동","mean":"① 앞서다 ② 선행하다","ex":[{"en":"A short speech **preceded** the concert.","ko":"짧은 연설이 콘서트에 앞서 있었다."},{"en":"A short test will **precede** the interview.","ko":"짧은 시험이 면접에 선행할 것이다."}]},{"id":"vocab-2025","word":"precise","ipa":"/prɪˈsaɪs/","kr":"프리**사이스**","mark":"","pos":"형","mean":"① 정확한 ② 정밀한","ex":[{"en":"We need **precise** measurements.","ko":"우리는 정확한 측정값이 필요하다."},{"en":"This machine makes **precise**, detailed cuts.","ko":"이 기계는 정밀한 절단을 한다."}]},{"id":"vocab-2026","word":"predator","ipa":"/ˈpredətər/","kr":"**프레**더터","mark":"","pos":"명","mean":"포식자","ex":[{"en":"The lion is a powerful **predator**.","ko":"사자는 강력한 포식자다."}]},{"id":"vocab-2027","word":"predict","ipa":"/prɪˈdɪkt/","kr":"프리**딕트**","mark":"","pos":"동","mean":"① 예측하다 ② 예언하다","ex":[{"en":"Scientists **predicted** heavy rain.","ko":"과학자들은 폭우를 예측했다."},{"en":"The old story **predicts** a storm.","ko":"그 오래된 이야기는 폭풍을 예언한다."}]},{"id":"vocab-2028","word":"prefer","ipa":"/prɪˈfɜːr/","kr":"프리**퍼ː**","mark":"**","pos":"동","mean":"① 선호하다 ② 더 좋아하다","ex":[{"en":"I **prefer** tea to coffee.","ko":"나는 커피보다 차를 선호한다."},{"en":"I **prefer** email to phone calls.","ko":"나는 전화보다 이메일을 더 좋아한다."}]},{"id":"vocab-2029","word":"pregnant","ipa":"/ˈpreɡnənt/","kr":"**프레**그넌트","mark":"**","pos":"형","mean":"임신한","ex":[{"en":"The **pregnant** woman rested often.","ko":"그 임신한 여성은 자주 쉬었다."}]},{"id":"vocab-2030","word":"prejudice","ipa":"/ˈpredʒudɪs/","kr":"**프레**주디스","mark":"","pos":"명","mean":"편견","ex":[{"en":"We should judge without **prejudice**.","ko":"우리는 편견 없이 판단해야 한다."}]},{"id":"vocab-2031","word":"premium","ipa":"/ˈpriːmiəm/","kr":"**프리ː**미엄","mark":"","pos":"명/형","mean":"① 할증금 ② 고급의","ex":[{"en":"The insurance **premium** is paid monthly.","ko":"보험 할증금은 매달 낸다."},{"en":"They sell **premium** coffee.","ko":"그들은 고급 커피를 판다."}]},{"id":"vocab-2032","word":"prepare","ipa":"/prɪˈper/","kr":"프리**페어**","mark":"**","pos":"동","mean":"준비하다","ex":[{"en":"We **prepared** food for the trip.","ko":"우리는 여행을 위해 음식을 준비했다."}]},{"id":"vocab-2033","word":"prescribe","ipa":"/prɪˈskraɪb/","kr":"프리**스크라이브**","mark":"","pos":"동","mean":"처방하다","ex":[{"en":"The doctor **prescribed** medicine.","ko":"의사가 약을 처방했다."}]},{"id":"vocab-2034","word":"presence","ipa":"/ˈprezns/","kr":"**프레**즌스","mark":"**","pos":"명","mean":"① 존재 ② 참석","ex":[{"en":"The **presence** of a manager helped the team.","ko":"관리자의 존재가 팀에 도움이 되었다."},{"en":"Your **presence** is important.","ko":"너의 참석은 중요하다."}]},{"id":"vocab-2035","word":"present","ipa":"/ˈpreznt/","kr":"**프레**즌트","mark":"*","pos":"형/명/동","mean":"① 현재의 ② 선물 ③ 제시하다","ex":[{"en":"The **present** system is too slow.","ko":"현재의 시스템은 너무 느리다."},{"en":"Yuna gave me a **present**.","ko":"유나는 나에게 선물을 주었다."},{"en":"Please **present** your findings to the team.","ko":"조사 결과를 팀에 제시해 주세요."}]},{"id":"vocab-2036","word":"preserve","ipa":"/prɪˈzɜːrv/","kr":"프리**저ː**브","mark":"","pos":"동","mean":"① 보존하다 ② 지키다","ex":[{"en":"We must **preserve** historic buildings.","ko":"우리는 역사적인 건물을 보존해야 한다."},{"en":"We must **preserve** customer trust.","ko":"우리는 고객 신뢰를 지켜야 한다."}]},{"id":"vocab-2037","word":"preside (president)","ipa":"/prɪˈzaɪd/","kr":"프리**자이드**","mark":"","pos":"동","mean":"① 주재하다 ② 사회를 보다","ex":[{"en":"She **presided** over the meeting.","ko":"그녀가 그 회의를 주재했다."},{"en":"A senior judge will **preside** over the hearing.","ko":"한 고위 판사가 그 심리를 주재할 것이다."}]},{"id":"vocab-2038","word":"press","ipa":"/pres/","kr":"**프레스**","mark":"**","pos":"동/명","mean":"① 누르다 ② 언론","ex":[{"en":"**Press** the green button to continue.","ko":"계속하려면 초록색 버튼을 눌러라."},{"en":"The **press** asked several questions.","ko":"언론은 몇 가지 질문을 했다."}]},{"id":"vocab-2039","word":"presume","ipa":"/prɪˈzuːm/","kr":"프리**줌ː**","mark":"","pos":"동","mean":"① 추정하다 ② 가정하다","ex":[{"en":"I **presume** he is at home.","ko":"나는 그가 집에 있다고 추정한다."},{"en":"Let us **presume** the figures are correct.","ko":"수치가 정확하다고 가정하자."}]},{"id":"vocab-2040","word":"pretend","ipa":"/prɪˈtend/","kr":"프리**텐드**","mark":"**","pos":"동","mean":"~인 척하다","ex":[{"en":"He **pretended** to be asleep.","ko":"그는 자는 척했다."}]},{"id":"vocab-2041","word":"pretty","ipa":"/ˈprɪti/","kr":"**프리**티","mark":"*","pos":"형/부","mean":"① 예쁜 ② 꽤","ex":[{"en":"Nora has a **pretty** smile.","ko":"노라는 예쁜 미소를 지녔다."},{"en":"The test was **pretty** easy.","ko":"그 시험은 꽤 쉬웠다."}]},{"id":"vocab-2042","word":"prevail","ipa":"/prɪˈveɪl/","kr":"프리**베일**","mark":"","pos":"동","mean":"① 우세하다 ② 만연하다","ex":[{"en":"Common sense finally **prevailed**.","ko":"상식이 마침내 우세했다."},{"en":"The same problem **prevails** across the industry.","ko":"같은 문제가 업계 전체에 만연해 있다."}]},{"id":"vocab-2043","word":"prevent","ipa":"/prɪˈvent/","kr":"프리**벤트**","mark":"**","pos":"동","mean":"① 막다 ② 예방하다","ex":[{"en":"Regular backups **prevent** data loss.","ko":"규칙적인 백업은 자료 손실을 막는다."},{"en":"Washing hands helps **prevent** disease.","ko":"손 씻기는 질병을 예방하는 데 도움이 된다."}]},{"id":"vocab-2044","word":"previous","ipa":"/ˈpriːviəs/","kr":"**프리ː**비어스","mark":"**","pos":"형","mean":"이전의","ex":[{"en":"I met her on a **previous** visit.","ko":"나는 이전 방문 때 그녀를 만났다."}]},{"id":"vocab-2045","word":"prey","ipa":"/preɪ/","kr":"**프레이**","mark":"","pos":"명","mean":"먹이","ex":[{"en":"The eagle caught its **prey**.","ko":"독수리가 먹이를 잡았다."}]},{"id":"vocab-2046","word":"price","ipa":"/praɪs/","kr":"**프라이스**","mark":"**","pos":"명","mean":"가격","ex":[{"en":"What is the **price** of this bag?","ko":"이 가방의 가격은 얼마니?"}]},{"id":"vocab-2047","word":"pride","ipa":"/praɪd/","kr":"**프라이드**","mark":"**","pos":"명","mean":"① 자부심 ② 자존심","ex":[{"en":"Mina takes **pride** in her work.","ko":"미나는 자신의 일에 자부심을 느낀다."},{"en":"Leo swallowed his **pride** and asked for help.","ko":"레오는 자존심을 누르고 도움을 요청했다."}]},{"id":"vocab-2048","word":"priest","ipa":"/priːst/","kr":"**프리ː**스트","mark":"","pos":"명","mean":"① 사제 ② 성직자","ex":[{"en":"The **priest** led the service.","ko":"그 사제가 예배를 이끌었다."},{"en":"The **priest** spoke to the villagers.","ko":"그 성직자는 마을 사람들에게 말했다."}]},{"id":"vocab-2049","word":"prime (primary)","ipa":"/praɪm/","kr":"**프라임**","mark":"**","pos":"형","mean":"① 주요한 ② 최고의","ex":[{"en":"Security is a **prime** concern.","ko":"보안은 주요한 관심사다."},{"en":"This location is **prime** office space.","ko":"이 위치는 최고의 사무실 공간이다."}]},{"id":"vocab-2050","word":"primitive","ipa":"/ˈprɪmətɪv/","kr":"**프리**머티브","mark":"","pos":"형","mean":"① 원시의 ② 초기의","ex":[{"en":"They used **primitive** tools.","ko":"그들은 원시적인 도구를 사용했다."},{"en":"The device used a **primitive** form of software.","ko":"그 장치는 초기 형태의 소프트웨어를 사용했다."}]},{"id":"vocab-2051","word":"prince","ipa":"/prɪns/","kr":"**프린스**","mark":"*","pos":"명","mean":"왕자","ex":[{"en":"The **prince** rode a white horse.","ko":"왕자는 흰 말을 탔다."}]},{"id":"vocab-2052","word":"principal","ipa":"/ˈprɪnsəpl/","kr":"**프린**서플","mark":"","pos":"명/형","mean":"① 교장 ② 주요한","ex":[{"en":"The **principal** spoke to the students.","ko":"교장이 학생들에게 이야기했다."},{"en":"Cost is the **principal** factor.","ko":"비용은 주요한 요소다."}]},{"id":"vocab-2053","word":"principle","ipa":"/ˈprɪnsəpl/","kr":"**프린**서플","mark":"**","pos":"명","mean":"① 원칙 ② 원리","ex":[{"en":"Honesty is an important **principle**.","ko":"정직은 중요한 원칙이다."},{"en":"The machine works on a simple **principle**.","ko":"그 기계는 간단한 원리로 작동한다."}]},{"id":"vocab-2054","word":"print","ipa":"/prɪnt/","kr":"**프린트**","mark":"*","pos":"동/명","mean":"① 인쇄하다 ② 인쇄물","ex":[{"en":"Please **print** this document.","ko":"이 문서를 인쇄해 주세요."},{"en":"The brochure is a colorful **printed** item.","ko":"그 안내 책자는 화려한 인쇄물이다."}]},{"id":"vocab-2055","word":"prior","ipa":"/ˈpraɪər/","kr":"**프라이**어","mark":"","pos":"형","mean":"① 이전의 ② 우선하는","ex":[{"en":"I had no **prior** experience.","ko":"나는 이전 경험이 없었다."},{"en":"Give **prior** attention to safety.","ko":"안전에 우선적인 주의를 기울여라."}]},{"id":"vocab-2056","word":"prison","ipa":"/ˈprɪzn/","kr":"**프리**즌","mark":"**","pos":"명","mean":"① 교도소 ② 감옥","ex":[{"en":"The prisoner was sent to **prison**.","ko":"그 죄수는 교도소로 보내졌다."},{"en":"A ten-year sentence sent the criminal to **prison**.","ko":"10년 형으로 그 범죄자는 교도소에 수감되었다."}]},{"id":"vocab-2057","word":"privacy","ipa":"/ˈpraɪvəsi/","kr":"**프라이**버시","mark":"**","pos":"명","mean":"사생활","ex":[{"en":"Everyone needs some **privacy**.","ko":"모든 사람은 어느 정도 사생활이 필요하다."}]},{"id":"vocab-2058","word":"private","ipa":"/ˈpraɪvət/","kr":"**프라이**빗","mark":"**","pos":"형","mean":"① 사적인 ② 개인의","ex":[{"en":"This is a **private** conversation.","ko":"이것은 사적인 대화다."},{"en":"Do not share your **private** information.","ko":"개인의 정보를 공유하지 마라."}]},{"id":"vocab-2059","word":"privilege","ipa":"/ˈprɪvəlɪdʒ/","kr":"**프리**벌리지","mark":"","pos":"명","mean":"특권","ex":[{"en":"Education is a **privilege** for many.","ko":"교육은 많은 사람에게 특권이다."}]},{"id":"vocab-2060","word":"prize","ipa":"/praɪz/","kr":"**프라이즈**","mark":"**","pos":"명","mean":"① 상 ② 상품","ex":[{"en":"Julia won first **prize**.","ko":"줄리아는 1등 상을 받았다."},{"en":"The winner received a useful **prize**.","ko":"우승자는 유용한 상품을 받았다."}]},{"id":"vocab-2061","word":"probable (probably)","ipa":"/ˈprɑːbəbl/","kr":"**프라**버블","mark":"**","pos":"형","mean":"① 있음 직한 ② 유력한","ex":[{"en":"A delay is **probable** in this weather.","ko":"이 날씨에는 지연이 있음 직하다."},{"en":"Emma is the **probable** candidate.","ko":"엠마는 유력한 지원자다."}]},{"id":"vocab-2062","word":"problem","ipa":"/ˈprɑːbləm/","kr":"**프라**블럼","mark":"*","pos":"명","mean":"문제","ex":[{"en":"We solved the **problem** together.","ko":"우리는 그 문제를 함께 해결했다."}]},{"id":"vocab-2063","word":"proceed (procedure)","ipa":"/prəˈsiːd/","kr":"프러**시ː**드","mark":"**","pos":"동","mean":"① 진행하다 ② 나아가다","ex":[{"en":"Please **proceed** to the next step.","ko":"다음 단계로 진행해 주세요."},{"en":"The path **proceeds** forward through the forest.","ko":"그 길은 숲을 통해 앞으로 나아간다."}]},{"id":"vocab-2064","word":"process","ipa":"/ˈprɑːses/","kr":"**프라**세스","mark":"**","pos":"명","mean":"① 과정 ② 절차","ex":[{"en":"Learning is a gradual **process**.","ko":"학습은 점진적인 과정이다."},{"en":"The safety **process** starts with a risk check.","ko":"안전 절차는 위험 점검으로 시작한다."}]},{"id":"vocab-2065","word":"produce","ipa":"/prəˈduːs/","kr":"프러**듀ː**스","mark":"**","pos":"동/명","mean":"① 생산하다 ② 농산물","ex":[{"en":"This farm **produces** fresh milk.","ko":"이 농장은 신선한 우유를 생산한다."},{"en":"The market sells fresh farm **produce**.","ko":"그 시장은 신선한 농산물을 판다."}]},{"id":"vocab-2066","word":"profession","ipa":"/prəˈfeʃn/","kr":"프러**페**션","mark":"**","pos":"명","mean":"① 직업 ② 전문직","ex":[{"en":"Teaching is a noble **profession**.","ko":"가르치는 일은 고귀한 직업이다."},{"en":"Medicine remains a highly respected **profession**.","ko":"의학은 여전히 매우 존중받는 전문직이다."}]},{"id":"vocab-2067","word":"professor","ipa":"/prəˈfesər/","kr":"프러**페**서","mark":"","pos":"명","mean":"교수","ex":[{"en":"The **professor** answered our questions.","ko":"교수는 우리의 질문에 답했다."}]},{"id":"vocab-2068","word":"profile","ipa":"/ˈproʊfaɪl/","kr":"**프로**파일","mark":"","pos":"명","mean":"① 옆모습 ② 프로필","ex":[{"en":"The photo shows her **profile**.","ko":"그 사진은 그녀의 옆모습을 보여 준다."},{"en":"Leo updated his online **profile**.","ko":"레오는 온라인 프로필을 갱신했다."}]},{"id":"vocab-2069","word":"profit","ipa":"/ˈprɑːfɪt/","kr":"**프라**핏","mark":"**","pos":"명","mean":"① 이익 ② 수익","ex":[{"en":"The parent company made a big **profit**.","ko":"그 모회사는 큰 이익을 냈다."},{"en":"The project made a small **profit**.","ko":"그 프로젝트는 작은 수익을 냈다."}]},{"id":"vocab-2070","word":"profound","ipa":"/prəˈfaʊnd/","kr":"프러**파운드**","mark":"","pos":"형","mean":"① 심오한 ② 깊은","ex":[{"en":"Sora made a **profound** remark.","ko":"소라는 심오한 말을 했다."},{"en":"The book had a **profound** effect on me.","ko":"그 책은 나에게 깊은 영향을 미쳤다."}]},{"id":"vocab-2071","word":"program / programme (programmatic)","ipa":"/ˈproʊɡræm/","kr":"**프로**그램","mark":"*","pos":"명","mean":"① 프로그램 ② 계획","ex":[{"en":"We joined a reading **program**.","ko":"우리는 독서 프로그램에 참여했다."},{"en":"The project manager presented a clear action **program**.","ko":"프로젝트 관리자는 명확한 실행 계획을 제시했다."}]},{"id":"vocab-2072","word":"progress","ipa":"/ˈprɑːɡres/","kr":"**프라**그레스","mark":"**","pos":"명/동","mean":"① 진전 ② 진행하다","ex":[{"en":"Sora is making good **progress**.","ko":"소라는 좋은 진전을 보이고 있다."},{"en":"The work will **progress** next week.","ko":"그 일은 다음 주에 진행될 것이다."}]},{"id":"vocab-2073","word":"prohibit","ipa":"/proʊˈhɪbɪt/","kr":"프로**히**빗","mark":"","pos":"동","mean":"금지하다","ex":[{"en":"The law **prohibits** smoking here.","ko":"법은 이곳에서 흡연을 금지한다."}]},{"id":"vocab-2074","word":"project","ipa":"/ˈprɑːdʒekt/","kr":"**프라**젝트","mark":"*","pos":"명/동","mean":"① 프로젝트 ② 계획하다","ex":[{"en":"Our science **project** is due Friday.","ko":"우리 과학 프로젝트는 금요일까지다."},{"en":"We **project** and plan next year's costs.","ko":"우리는 내년 비용을 계획한다."}]},{"id":"vocab-2075","word":"prominent","ipa":"/ˈprɑːmɪnənt/","kr":"**프라**미넌트","mark":"","pos":"형","mean":"① 두드러진 ② 저명한","ex":[{"en":"A **prominent** warning appears on the screen.","ko":"두드러진 경고가 화면에 나타난다."},{"en":"Mina is a **prominent** scientist.","ko":"미나는 저명한 과학자다."}]},{"id":"vocab-2076","word":"promise","ipa":"/ˈprɑːmɪs/","kr":"**프라**미스","mark":"**","pos":"명/동","mean":"① 약속 ② 약속하다","ex":[{"en":"I keep my **promise**.","ko":"나는 약속을 지킨다."},{"en":"I **promise** to return the book.","ko":"나는 그 책을 돌려주겠다고 약속한다."}]},{"id":"vocab-2077","word":"promote","ipa":"/prəˈmoʊt/","kr":"프러**모트**","mark":"**","pos":"동","mean":"① 촉진하다 ② 승진시키다","ex":[{"en":"Exercise **promotes** good health.","ko":"운동은 건강을 촉진한다."},{"en":"The parent company **promoted** her to team leader.","ko":"그 모회사는 그녀를 팀장으로 승진시켰다."}]},{"id":"vocab-2078","word":"prompt","ipa":"/prɑːmpt/","kr":"**프람프트**","mark":"","pos":"형/동","mean":"① 신속한 ② 촉발하다","ex":[{"en":"Thank you for your **prompt** reply.","ko":"신속한 답변에 감사드립니다."},{"en":"The outage **prompted** an investigation.","ko":"그 장애는 조사를 촉발했다."}]},{"id":"vocab-2079","word":"pronounce (pronunciation)","ipa":"/prəˈnaʊns/","kr":"프러**나운스**","mark":"**","pos":"동","mean":"발음하다","ex":[{"en":"How do you **pronounce** this word?","ko":"이 단어를 어떻게 발음하니?"}]},{"id":"vocab-2080","word":"proof","ipa":"/pruːf/","kr":"**프루ː**프","mark":"","pos":"명","mean":"증거","ex":[{"en":"Do you have **proof** of payment?","ko":"지불 증거가 있니?"}]},{"id":"vocab-2081","word":"proper","ipa":"/ˈprɑːpər/","kr":"**프라**퍼","mark":"**","pos":"형","mean":"① 적절한 ② 올바른","ex":[{"en":"This is the **proper** room for the meeting.","ko":"이곳이 회의에 적절한 방이다."},{"en":"Use the **proper** password.","ko":"올바른 비밀번호를 사용해라."}]},{"id":"vocab-2082","word":"property","ipa":"/ˈprɑːpərti/","kr":"**프라**퍼티","mark":"**","pos":"명","mean":"① 재산 ② 부동산 ③ 속성","ex":[{"en":"This land is private **property**.","ko":"이 땅은 사유 재산이다."},{"en":"The organization bought a new **property**.","ko":"그 조직은 새 부동산을 샀다."},{"en":"Color is one **property** of the object.","ko":"색은 그 물체의 한 속성이다."}]},{"id":"vocab-2083","word":"proportion","ipa":"/prəˈpɔːrʃn/","kr":"프러**포ː**션","mark":"","pos":"명","mean":"① 비율 ② 부분","ex":[{"en":"A large **proportion** of students agreed.","ko":"많은 비율의 학생이 동의했다."},{"en":"Only a small **proportion** of users reported the error.","ko":"사용자의 작은 부분만 오류를 보고했다."}]},{"id":"vocab-2084","word":"propose","ipa":"/prəˈpoʊz/","kr":"프러**포즈**","mark":"**","pos":"동","mean":"① 제안하다 ② 청혼하다","ex":[{"en":"She **proposed** a new solution.","ko":"그녀는 새로운 해결책을 제안했다."},{"en":"He **proposed** marriage during dinner.","ko":"그는 저녁 식사 중에 청혼했다."}]},{"id":"vocab-2085","word":"prospect","ipa":"/ˈprɑːspekt/","kr":"**프라**스펙트","mark":"","pos":"명","mean":"① 전망 ② 가능성","ex":[{"en":"The sales **prospect** for next year is positive.","ko":"내년 판매 전망은 긍정적이다."},{"en":"There is little **prospect** of rain.","ko":"비가 올 가능성은 거의 없다."}]},{"id":"vocab-2086","word":"prosper","ipa":"/ˈprɑːspər/","kr":"**프라**스퍼","mark":"","pos":"동","mean":"번영하다","ex":[{"en":"The town **prospered** through trade.","ko":"그 마을은 무역으로 번영했다."}]},{"id":"vocab-2087","word":"protect","ipa":"/prəˈtekt/","kr":"프러**텍트**","mark":"**","pos":"동","mean":"보호하다","ex":[{"en":"We must **protect** the environment.","ko":"우리는 환경을 보호해야 한다."}]},{"id":"vocab-2088","word":"protein","ipa":"/ˈproʊtiːn/","kr":"**프로**틴ː","mark":"","pos":"명","mean":"단백질","ex":[{"en":"Eggs are rich in **protein**.","ko":"달걀은 단백질이 풍부하다."}]},{"id":"vocab-2089","word":"protest","ipa":"/ˈproʊtest/","kr":"**프로**테스트","mark":"**","pos":"명/동","mean":"① 항의 ② 항의하다","ex":[{"en":"The workers held a **protest**.","ko":"노동자들은 항의를 벌였다."},{"en":"They **protested** against the decision.","ko":"그들은 그 결정에 항의했다."}]},{"id":"vocab-2090","word":"proud","ipa":"/praʊd/","kr":"**프라우드**","mark":"**","pos":"형","mean":"자랑스러운","ex":[{"en":"I am **proud** of our support team.","ko":"나는 우리 지원팀이 자랑스럽다."}]},{"id":"vocab-2091","word":"prove","ipa":"/pruːv/","kr":"**프루ː**브","mark":"**","pos":"동","mean":"증명하다","ex":[{"en":"She **proved** that she was right.","ko":"그녀는 자신이 옳았음을 증명했다."}]},{"id":"vocab-2092","word":"provide","ipa":"/prəˈvaɪd/","kr":"프러**바이드**","mark":"**","pos":"동","mean":"제공하다","ex":[{"en":"The school **provides** free lunch.","ko":"그 학교는 무료 점심을 제공한다."}]},{"id":"vocab-2093","word":"province","ipa":"/ˈprɑːvɪns/","kr":"**프라**빈스","mark":"","pos":"명","mean":"① 지방 ② 도","ex":[{"en":"Owen grew up in a northern **province**.","ko":"오언은 북부 지방에서 자랐다."},{"en":"Our company opened an office in the northern **province**.","ko":"우리 회사는 북쪽 도에 사무실을 열었다."}]},{"id":"vocab-2094","word":"provoke","ipa":"/prəˈvoʊk/","kr":"프러**보크**","mark":"","pos":"동","mean":"① 유발하다 ② 화나게 하다","ex":[{"en":"His comment **provoked** an argument.","ko":"그의 발언은 말다툼을 유발했다."},{"en":"His rude comment **provoked** her.","ko":"그의 무례한 발언은 그녀를 화나게 했다."}]},{"id":"vocab-2095","word":"psychology","ipa":"/saɪˈkɑːlədʒi/","kr":"사이**칼**러지","mark":"","pos":"명","mean":"심리학","ex":[{"en":"Julia studies child **psychology**.","ko":"줄리아는 아동 심리학을 공부한다."}]},{"id":"vocab-2096","word":"pub","ipa":"/pʌb/","kr":"**펍**","mark":"**","pos":"명","mean":"① 술집 ② 주점","ex":[{"en":"They met at a local **pub**.","ko":"그들은 동네 술집에서 만났다."},{"en":"After work, they met at a quiet **pub**.","ko":"퇴근 후 그들은 조용한 주점에서 만났다."}]},{"id":"vocab-2097","word":"public","ipa":"/ˈpʌblɪk/","kr":"**퍼**블릭","mark":"**","pos":"형/명","mean":"① 대중의 ② 대중","ex":[{"en":"The **public** needs clear information.","ko":"대중은 명확한 정보가 필요하다."},{"en":"The park is open to the **public**.","ko":"그 공원은 대중에게 개방되어 있다."}]},{"id":"vocab-2098","word":"publish (publisher)","ipa":"/ˈpʌblɪʃ/","kr":"**퍼**블리시","mark":"","pos":"동","mean":"① 출판하다 ② 발표하다","ex":[{"en":"She **published** her first book.","ko":"그녀는 첫 책을 출판했다."},{"en":"The business will **publish** the results tomorrow.","ko":"그 사업체는 내일 결과를 발표할 것이다."}]},{"id":"vocab-2099","word":"pull","ipa":"/pʊl/","kr":"**풀**","mark":"**","pos":"동","mean":"① 당기다 ② 끌다","ex":[{"en":"**Pull** the door toward you.","ko":"문을 네 쪽으로 당겨라."},{"en":"**Pull** the heavy box toward the wall.","ko":"무거운 상자를 벽 쪽으로 끌어라."}]},{"id":"vocab-2100","word":"pump","ipa":"/pʌmp/","kr":"**펌프**","mark":"**","pos":"명/동","mean":"① 펌프 ② 퍼 올리다","ex":[{"en":"The **pump** moves water through the pipe.","ko":"펌프는 관을 통해 물을 이동시킨다."},{"en":"The machine **pumps** water from the basement.","ko":"그 기계는 지하실에서 물을 퍼 올린다."}]},{"id":"vocab-2101","word":"punch","ipa":"/pʌntʃ/","kr":"**펀치**","mark":"**","pos":"동/명","mean":"① 주먹으로 치다 ② 주먹질","ex":[{"en":"He **punched** the wall.","ko":"그는 벽을 주먹으로 쳤다."},{"en":"Jun threw a **punch** during the fight.","ko":"준은 싸움 중에 주먹질을 했다."}]},{"id":"vocab-2102","word":"punish","ipa":"/ˈpʌnɪʃ/","kr":"**퍼**니시","mark":"**","pos":"동","mean":"① 벌하다 ② 처벌하다","ex":[{"en":"The teacher **punished** him.","ko":"선생님이 그를 벌했다."},{"en":"The law **punishes** serious fraud.","ko":"그 법은 심각한 사기를 처벌한다."}]},{"id":"vocab-2103","word":"pupil","ipa":"/ˈpjuːpl/","kr":"**퓨ː**플","mark":"","pos":"명","mean":"① 학생 ② 눈동자","ex":[{"en":"The teacher spoke to each **pupil**.","ko":"선생님은 각 학생에게 말했다."},{"en":"Bright light makes the **pupil** smaller.","ko":"밝은 빛은 눈동자를 더 작게 만든다."}]},{"id":"vocab-2104","word":"puppy","ipa":"/ˈpʌpi/","kr":"**퍼**피","mark":"*","pos":"명","mean":"강아지","ex":[{"en":"The **puppy** followed me home.","ko":"강아지는 나를 따라 집에 왔다."}]},{"id":"vocab-2105","word":"purchase","ipa":"/ˈpɜːrtʃəs/","kr":"**퍼ː**처스","mark":"**","pos":"동/명","mean":"① 구매하다 ② 구매","ex":[{"en":"We **purchased** new computers.","ko":"우리는 새 컴퓨터를 구매했다."},{"en":"The **purchase** was approved yesterday.","ko":"그 구매는 어제 승인되었다."}]},{"id":"vocab-2106","word":"pure","ipa":"/pjʊr/","kr":"**퓨어**","mark":"**","pos":"형","mean":"① 순수한 ② 깨끗한","ex":[{"en":"We need **pure** and clean water.","ko":"우리는 순수한 물이 필요하다."},{"en":"The water is **pure** and safe.","ko":"그 물은 깨끗하고 안전하다."}]},{"id":"vocab-2107","word":"purple","ipa":"/ˈpɜːrpl/","kr":"**퍼ː**플","mark":"**","pos":"형/명","mean":"① 보라색의 ② 보라","ex":[{"en":"Claire wore a **purple** scarf.","ko":"클레어는 보라색 스카프를 둘렀다."},{"en":"Her favorite color has always been **purple**.","ko":"그녀가 가장 좋아하는 색은 늘 보라색이었다."}]},{"id":"vocab-2108","word":"purpose","ipa":"/ˈpɜːrpəs/","kr":"**퍼ː**퍼스","mark":"**","pos":"명","mean":"목적","ex":[{"en":"What is the **purpose** of this?","ko":"이것의 목적이 뭐니?"}]},{"id":"vocab-2109","word":"pursue","ipa":"/pərˈsuː/","kr":"퍼**수ː**","mark":"","pos":"동","mean":"① 추구하다 ② 뒤쫓다","ex":[{"en":"Grace decided to **pursue** her dream.","ko":"그레이스는 꿈을 추구하기로 결정했다."},{"en":"The police **pursued** the thief through the station.","ko":"경찰은 역을 지나 도둑을 뒤쫓았다."}]},{"id":"vocab-2110","word":"push","ipa":"/pʊʃ/","kr":"**푸시**","mark":"*","pos":"동","mean":"밀다","ex":[{"en":"**Push** the door gently.","ko":"문을 부드럽게 밀어라."}]},{"id":"vocab-2111","word":"put","ipa":"/pʊt/","kr":"**풋**","mark":"*","pos":"동","mean":"① 놓다 ② 두다","ex":[{"en":"**Put** the book on the shelf.","ko":"책을 선반에 놓아라."},{"en":"**Put** the file on my desk.","ko":"그 파일을 내 책상에 두어라."}]},{"id":"vocab-2112","word":"puzzle","ipa":"/ˈpʌzl/","kr":"**퍼**즐","mark":"**","pos":"명/동","mean":"① 퍼즐 ② 어리둥절하게 하다","ex":[{"en":"This **puzzle** is difficult to solve.","ko":"이 퍼즐은 풀기 어렵다."},{"en":"The strange error **puzzled** the whole team.","ko":"그 이상한 오류는 팀 전체를 어리둥절하게 했다."}]},{"id":"vocab-2113","word":"quality (qualify)","ipa":"/ˈkwɑːləti/","kr":"**콸**러티","mark":"**","pos":"명","mean":"① 질 ② 품질","ex":[{"en":"We need to improve service **quality**.","ko":"우리는 서비스의 질을 향상시켜야 한다."},{"en":"This product is of high **quality**.","ko":"이 제품은 품질이 좋다."}]},{"id":"vocab-2114","word":"quantity","ipa":"/ˈkwɑːntəti/","kr":"**콴**터티","mark":"","pos":"명","mean":"① 양 ② 수량","ex":[{"en":"We need a large **quantity** of water.","ko":"우리는 많은 양의 물이 필요하다."},{"en":"Please enter the exact **quantity** in the form.","ko":"양식에 정확한 수량을 입력해 주세요."}]},{"id":"vocab-2115","word":"quarter","ipa":"/ˈkwɔːrtər/","kr":"**쿼ː**터","mark":"**","pos":"명","mean":"① 4분의 1 ② 15분","ex":[{"en":"A **quarter** of the class was absent.","ko":"반 학생의 4분의 1이 결석했다."},{"en":"The weekly meeting starts in a **quarter** of an hour.","ko":"주간 회의는 십오 분 후에 시작한다."}]},{"id":"vocab-2116","word":"queen","ipa":"/kwiːn/","kr":"**퀸ː**","mark":"*","pos":"명","mean":"여왕","ex":[{"en":"The **queen** welcomed the guests.","ko":"여왕은 손님들을 맞이했다."}]},{"id":"vocab-2117","word":"question","ipa":"/ˈkwestʃən/","kr":"**퀘**스천","mark":"*","pos":"명","mean":"① 질문 ② 문제","ex":[{"en":"Ask a **question** if you are unsure.","ko":"확실하지 않으면 질문해라."},{"en":"The final **question** was a difficult problem.","ko":"마지막 문제는 어려웠다."}]},{"id":"vocab-2118","word":"questionnaire","ipa":"/ˌkwestʃəˈner/","kr":"퀘스처**네어**","mark":"","pos":"명","mean":"설문지","ex":[{"en":"Please complete this **questionnaire**.","ko":"이 설문지를 작성해 주세요."}]},{"id":"vocab-2119","word":"quick","ipa":"/kwɪk/","kr":"**퀵**","mark":"*","pos":"형","mean":"빠른","ex":[{"en":"Mina gave a **quick** answer.","ko":"미나는 빠른 답을 했다."}]},{"id":"vocab-2120","word":"quiet","ipa":"/ˈkwaɪət/","kr":"**콰이**엇","mark":"*","pos":"형","mean":"조용한","ex":[{"en":"Please be **quiet** in the library.","ko":"도서관에서는 조용히 해 주세요."}]},{"id":"vocab-2121","word":"quit","ipa":"/kwɪt/","kr":"**큇**","mark":"**","pos":"동","mean":"① 그만두다 ② 끊다","ex":[{"en":"He **quit** his job last month.","ko":"그는 지난달에 일을 그만두었다."},{"en":"She **quit** drinking coffee at night.","ko":"그녀는 밤에 커피 마시는 것을 끊었다."}]},{"id":"vocab-2122","word":"quite","ipa":"/kwaɪt/","kr":"**콰잇**","mark":"**","pos":"부","mean":"① 꽤 ② 상당히","ex":[{"en":"The waiting room is **quite** small.","ko":"그 대기실은 꽤 작다."},{"en":"The new process is **quite** simple.","ko":"새 절차는 상당히 간단하다."}]},{"id":"vocab-2123","word":"quiz","ipa":"/kwɪz/","kr":"**퀴즈**","mark":"*","pos":"명","mean":"① 퀴즈 ② 쪽지 시험","ex":[{"en":"We had a math **quiz** today.","ko":"우리는 오늘 수학 퀴즈를 봤다."},{"en":"Today’s short **quiz** covers the last lesson.","ko":"오늘의 쪽지 시험은 지난 수업 내용을 다룬다."}]},{"id":"vocab-2124","word":"quote","ipa":"/kwoʊt/","kr":"**쿼트**","mark":"**","pos":"동/명","mean":"① 인용하다 ② 인용문","ex":[{"en":"She **quoted** a line from the poem.","ko":"그녀는 그 시의 한 구절을 인용했다."},{"en":"That report begins with a short **quote**.","ko":"그 보고서는 짧은 인용문으로 시작한다."}]},{"id":"vocab-2125","word":"rabbit","ipa":"/ˈræbɪt/","kr":"**래**빗","mark":"*","pos":"명","mean":"토끼","ex":[{"en":"A hungry **rabbit** nibbled a carrot.","ko":"배고픈 토끼가 당근을 조금씩 갉아 먹었다."}]},{"id":"vocab-2126","word":"race (racial)","ipa":"/reɪs/","kr":"**레이스**","mark":"*","pos":"명/동","mean":"① 경주 ② 인종 ③ 경주하다","ex":[{"en":"Lina won the running **race**.","ko":"리나는 달리기 경주에서 이겼다."},{"en":"The form asks about **race** and nationality.","ko":"그 양식은 인종과 국적을 묻는다."},{"en":"They **raced** to the finish line.","ko":"그들은 결승선까지 경주했다."}]},{"id":"vocab-2127","word":"radio","ipa":"/ˈreɪdioʊ/","kr":"**레이**디오","mark":"*","pos":"명","mean":"라디오","ex":[{"en":"I heard the news on the **radio**.","ko":"나는 라디오에서 그 소식을 들었다."}]},{"id":"vocab-2128","word":"rage","ipa":"/reɪdʒ/","kr":"**레이지**","mark":"","pos":"명","mean":"① 격노 ② 분노","ex":[{"en":"Owen shouted in **rage**.","ko":"오언은 격노하여 소리쳤다."},{"en":"His unfair treatment filled her with **rage**.","ko":"그의 부당한 대우는 그녀를 분노로 가득 채웠다."}]},{"id":"vocab-2129","word":"rail","ipa":"/reɪl/","kr":"**레일**","mark":"**","pos":"명","mean":"① 철도 ② 난간","ex":[{"en":"The new **rail** line connects two cities.","ko":"새 철도 노선은 두 도시를 연결한다."},{"en":"Hold the **rail** as you go down.","ko":"내려갈 때 난간을 잡아라."}]},{"id":"vocab-2130","word":"rain","ipa":"/reɪn/","kr":"**레인**","mark":"*","pos":"명/동","mean":"① 비 ② 비가 오다","ex":[{"en":"It began to **rain**.","ko":"비가 오기 시작했다."},{"en":"It **rained** all day.","ko":"하루 종일 비가 왔다."}]},{"id":"vocab-2131","word":"rainbow","ipa":"/ˈreɪnboʊ/","kr":"**레인**보","mark":"**","pos":"명","mean":"무지개","ex":[{"en":"A **rainbow** appeared after the rain.","ko":"비가 온 뒤 무지개가 나타났다."}]},{"id":"vocab-2132","word":"raise","ipa":"/reɪz/","kr":"**레이즈**","mark":"**","pos":"동","mean":"① 올리다 ② 기르다 ③ 모으다","ex":[{"en":"**Raise** the screen to eye level.","ko":"화면을 눈높이로 올려라."},{"en":"They **raise** chickens on the farm.","ko":"그들은 농장에서 닭을 기른다."},{"en":"The event **raised** money for charity.","ko":"그 행사는 자선을 위해 돈을 모았다."}]},{"id":"vocab-2133","word":"rally","ipa":"/ˈræli/","kr":"**랠**리","mark":"","pos":"명/동","mean":"① 집회 ② 결집하다","ex":[{"en":"People gathered for a peace **rally**.","ko":"사람들은 평화 집회를 위해 모였다."},{"en":"The leader **rallied** the team.","ko":"그 지도자는 팀을 결집했다."}]},{"id":"vocab-2134","word":"random","ipa":"/ˈrændəm/","kr":"**랜**덤","mark":"","pos":"형","mean":"무작위의","ex":[{"en":"The computer chose a **random** number.","ko":"컴퓨터가 무작위 숫자를 골랐다."}]},{"id":"vocab-2135","word":"range","ipa":"/reɪndʒ/","kr":"**레인지**","mark":"**","pos":"명","mean":"① 범위 ② 폭","ex":[{"en":"The price **range** is wide.","ko":"가격 범위가 넓다."},{"en":"The temperature **range** was twenty degrees.","ko":"온도의 폭은 20도였다."}]},{"id":"vocab-2136","word":"rank","ipa":"/ræŋk/","kr":"**랭크**","mark":"","pos":"명/동","mean":"① 계급 ② 순위를 매기다","ex":[{"en":"Grace holds a high **rank**.","ko":"그레이스는 높은 계급을 지녔다."},{"en":"The survey **ranks** the services from best to worst.","ko":"그 조사는 서비스를 최고부터 최악까지 순위를 매긴다."}]},{"id":"vocab-2137","word":"rapid","ipa":"/ˈræpɪd/","kr":"**래**피드","mark":"**","pos":"형","mean":"① 빠른 ② 급속한","ex":[{"en":"We need a **rapid** response from IT.","ko":"우리는 IT팀의 빠른 대응이 필요하다."},{"en":"Our company experienced **rapid** growth.","ko":"우리 회사는 급속한 성장을 경험했다."}]},{"id":"vocab-2138","word":"rare","ipa":"/rer/","kr":"**레어**","mark":"**","pos":"형","mean":"① 드문 ② 희귀한","ex":[{"en":"This is a **rare** network error.","ko":"이것은 드문 네트워크 오류다."},{"en":"This is a **rare** bird.","ko":"이것은 희귀한 새다."}]},{"id":"vocab-2139","word":"rat","ipa":"/ræt/","kr":"**랫**","mark":"**","pos":"명","mean":"쥐","ex":[{"en":"A **rat** ran across the street.","ko":"쥐 한 마리가 길을 가로질러 달렸다."}]},{"id":"vocab-2140","word":"rate","ipa":"/reɪt/","kr":"**레잇**","mark":"**","pos":"명","mean":"① 비율 ② 요금 ③ 속도","ex":[{"en":"The error **rate** fell last month.","ko":"오류 비율은 지난달에 떨어졌다."},{"en":"The hotel **rate** already includes breakfast.","ko":"호텔 요금에는 이미 아침 식사가 포함되어 있다."},{"en":"The machine works at a high **rate**.","ko":"그 기계는 높은 속도로 작동한다."}]},{"id":"vocab-2141","word":"rather","ipa":"/ˈræðər/","kr":"**래**더","mark":"**","pos":"부","mean":"① 오히려 ② 꽤","ex":[{"en":"I would **rather** work from home today.","ko":"나는 오늘 오히려 집에서 일하겠다."},{"en":"The task was **rather** difficult.","ko":"그 일은 꽤 어려웠다."}]},{"id":"vocab-2142","word":"rational","ipa":"/ˈræʃnl/","kr":"**래**셔늘","mark":"","pos":"형","mean":"① 이성적인 ② 합리적인","ex":[{"en":"We need a **rational** reason for the change.","ko":"우리는 그 변화에 대한 이성적인 이유가 필요하다."},{"en":"We need a **rational** decision.","ko":"우리는 합리적인 결정이 필요하다."}]},{"id":"vocab-2143","word":"raw","ipa":"/rɔː/","kr":"**로ː**","mark":"","pos":"형","mean":"① 날것의 ② 가공하지 않은","ex":[{"en":"Keep **raw** meat away from other food.","ko":"날것의 고기를 다른 음식에서 멀리 두어라."},{"en":"The factory buys **raw** materials.","ko":"그 공장은 가공하지 않은 원자재를 산다."}]},{"id":"vocab-2144","word":"reach","ipa":"/riːtʃ/","kr":"**리ː**치","mark":"**","pos":"동","mean":"① 도달하다 ② 닿다","ex":[{"en":"We **reached** the top of the hill.","ko":"우리는 언덕 꼭대기에 도달했다."},{"en":"The cable is too short to **reach** the socket.","ko":"그 케이블은 소켓에 닿기에는 너무 짧다."}]},{"id":"vocab-2145","word":"react","ipa":"/riˈækt/","kr":"리**액트**","mark":"**","pos":"동","mean":"반응하다","ex":[{"en":"How did she **react** to the news?","ko":"그녀는 그 소식에 어떻게 반응했니?"}]},{"id":"vocab-2146","word":"read","ipa":"/riːd/","kr":"**리ː**드","mark":"*","pos":"동","mean":"읽다","ex":[{"en":"I **read** a book every week.","ko":"나는 매주 책 한 권을 읽는다."}]},{"id":"vocab-2147","word":"ready","ipa":"/ˈredi/","kr":"**레**디","mark":"*","pos":"형","mean":"준비된","ex":[{"en":"The latest report is **ready** for review.","ko":"최근 보고서는 검토할 준비가 되어 있다."}]},{"id":"vocab-2148","word":"real (realize / realise)","ipa":"/ˈriːəl/","kr":"**리ː**얼","mark":"**","pos":"형","mean":"① 진짜의 ② 현실의","ex":[{"en":"Is this a **real** diamond?","ko":"이것은 진짜 다이아몬드니?"},{"en":"The film shows the problems of **real** life.","ko":"그 영화는 현실의 문제들을 보여 준다."}]},{"id":"vocab-2149","word":"rear","ipa":"/rɪr/","kr":"**리어**","mark":"","pos":"명/형","mean":"① 뒤쪽 ② 뒤의","ex":[{"en":"The garden is at the **rear** of the house.","ko":"정원은 집 뒤쪽에 있다."},{"en":"Sit in the **rear** of the bus.","ko":"버스 뒤쪽에 앉아라."}]},{"id":"vocab-2150","word":"reason (reasonable)","ipa":"/ˈriːzn/","kr":"**리ː**즌","mark":"**","pos":"명","mean":"① 이유 ② 이성","ex":[{"en":"What is the **reason** for the delay?","ko":"지연의 이유는 무엇이니?"},{"en":"**Reason** should guide important decisions.","ko":"이성은 중요한 결정을 이끌어야 한다."}]},{"id":"vocab-2151","word":"rebel","ipa":"/ˈrebl/","kr":"**레**블","mark":"","pos":"명/동","mean":"① 반란자 ② 반항하다","ex":[{"en":"The **rebels** fought the army.","ko":"반란자들이 군대와 싸웠다."},{"en":"The students **rebelled** against the rule.","ko":"학생들은 그 규칙에 반항했다."}]},{"id":"vocab-2152","word":"receipt","ipa":"/rɪˈsiːt/","kr":"리**시ː**트","mark":"","pos":"명","mean":"영수증","ex":[{"en":"Keep the **receipt** in case you need a refund.","ko":"환불이 필요할 경우를 대비해 영수증을 보관하세요."}]},{"id":"vocab-2153","word":"receive (reception)","ipa":"/rɪˈsiːv/","kr":"리**시ː**브","mark":"**","pos":"동","mean":"받다","ex":[{"en":"I **received** your email.","ko":"나는 네 이메일을 받았다."}]},{"id":"vocab-2154","word":"recent","ipa":"/ˈriːsnt/","kr":"**리ː**슨트","mark":"**","pos":"형","mean":"최근의","ex":[{"en":"Have you seen her **recent** work?","ko":"그녀의 최근 작품을 보았니?"}]},{"id":"vocab-2155","word":"recipe","ipa":"/ˈresəpi/","kr":"**레**서피","mark":"**","pos":"명","mean":"① 조리법 ② 요리법","ex":[{"en":"This **recipe** is easy to follow.","ko":"이 조리법은 따라 하기 쉽다."},{"en":"Grace shared her cookie **recipe**.","ko":"그레이스는 쿠키 요리법을 공유했다."}]},{"id":"vocab-2156","word":"recognize","ipa":"/ˈrekəɡnaɪz/","kr":"**레**커그나이즈","mark":"**","pos":"동","mean":"① 알아보다 ② 인정하다","ex":[{"en":"I **recognized** her voice.","ko":"나는 그녀의 목소리를 알아보았다."},{"en":"This company **recognized** her contribution.","ko":"이 회사는 그녀의 기여를 인정했다."}]},{"id":"vocab-2157","word":"recommend","ipa":"/ˌrekəˈmend/","kr":"레커**멘드**","mark":"**","pos":"동","mean":"추천하다","ex":[{"en":"I **recommend** this book.","ko":"나는 이 책을 추천한다."}]},{"id":"vocab-2158","word":"record","ipa":"/ˈrekɔːrd/","kr":"**레**코드","mark":"**","pos":"명/동","mean":"① 기록 ② 기록하다","ex":[{"en":"The updated system keeps a **record** of every login.","ko":"업데이트된 시스템은 모든 로그인의 기록을 보관한다."},{"en":"Please **record** the meeting.","ko":"회의를 기록해 주세요."}]},{"id":"vocab-2159","word":"recover","ipa":"/rɪˈkʌvər/","kr":"리**커**버","mark":"**","pos":"동","mean":"① 회복하다 ② 되찾다","ex":[{"en":"He **recovered** from the illness.","ko":"그는 그 병에서 회복했다."},{"en":"We **recovered** the lost data.","ko":"우리는 잃어버린 데이터를 되찾았다."}]},{"id":"vocab-2160","word":"recreation","ipa":"/ˌrekriˈeɪʃn/","kr":"레크리**에이**션","mark":"*","pos":"명","mean":"① 오락 ② 여가 활동","ex":[{"en":"The park offers outdoor **recreation**.","ko":"그 공원은 야외 오락 활동을 제공한다."},{"en":"Swimming is my favorite **recreation**.","ko":"수영은 내가 가장 좋아하는 여가 활동이다."}]},{"id":"vocab-2161","word":"recruit","ipa":"/rɪˈkruːt/","kr":"리**크루ː**트","mark":"","pos":"동/명","mean":"① 모집하다 ② 신입","ex":[{"en":"The business **recruited** new workers.","ko":"그 사업체는 새 직원을 모집했다."},{"en":"The **recruit** completed basic training.","ko":"그 신입은 기본 교육을 마쳤다."}]},{"id":"vocab-2162","word":"red","ipa":"/red/","kr":"**레드**","mark":"*","pos":"형/명","mean":"① 빨간 ② 빨강","ex":[{"en":"Sora wore a **red** hat.","ko":"소라는 빨간 모자를 썼다."},{"en":"**Red** is used for error messages.","ko":"빨강은 오류 메시지에 사용된다."}]},{"id":"vocab-2163","word":"reduce","ipa":"/rɪˈduːs/","kr":"리**듀ː**스","mark":"**","pos":"동","mean":"① 줄이다 ② 감소시키다","ex":[{"en":"We must **reduce** plastic waste.","ko":"우리는 플라스틱 쓰레기를 줄여야 한다."},{"en":"Better planning can **reduce** delays.","ko":"더 나은 계획은 지연을 감소시킬 수 있다."}]},{"id":"vocab-2164","word":"refer","ipa":"/rɪˈfɜːr/","kr":"리**퍼ː**","mark":"**","pos":"동","mean":"① 언급하다 ② 참조하다","ex":[{"en":"This manager **referred** to the earlier report.","ko":"이 관리자는 이전 보고서를 언급했다."},{"en":"Please **refer** to page five.","ko":"5쪽을 참조해 주세요."}]},{"id":"vocab-2165","word":"refine","ipa":"/rɪˈfaɪn/","kr":"리**파인**","mark":"","pos":"동","mean":"① 정제하다 ② 다듬다","ex":[{"en":"They **refine** the oil here.","ko":"그들은 여기서 기름을 정제한다."},{"en":"We **refined** the final draft.","ko":"우리는 최종 초안을 다듬었다."}]},{"id":"vocab-2166","word":"reflect","ipa":"/rɪˈflekt/","kr":"리**플렉트**","mark":"**","pos":"동","mean":"① 반영하다 ② 반사하다","ex":[{"en":"Our report **reflects** customer needs.","ko":"우리 보고서는 고객 요구를 반영한다."},{"en":"The mirror **reflects** light.","ko":"거울은 빛을 반사한다."}]},{"id":"vocab-2167","word":"reform","ipa":"/rɪˈfɔːrm/","kr":"리**폼ː**","mark":"","pos":"명/동","mean":"① 개혁 ② 개혁하다","ex":[{"en":"They called for education **reform**.","ko":"그들은 교육 개혁을 요구했다."},{"en":"The government **reformed** the tax system.","ko":"정부는 세금 제도를 개혁했다."}]},{"id":"vocab-2168","word":"refrigerate (refrigerator)","ipa":"/rɪˈfrɪdʒəreɪt/","kr":"리**프리**저레이트","mark":"","pos":"동","mean":"냉장하다","ex":[{"en":"**Refrigerate** the milk after opening.","ko":"우유는 개봉 후 냉장 보관해라."}]},{"id":"vocab-2169","word":"refuse","ipa":"/rɪˈfjuːz/","kr":"리**퓨ː**즈","mark":"**","pos":"동","mean":"거절하다","ex":[{"en":"She **refused** to answer.","ko":"그녀는 대답하기를 거절했다."}]},{"id":"vocab-2170","word":"regard","ipa":"/rɪˈɡɑːrd/","kr":"리**가ː**드","mark":"**","pos":"동/명","mean":"① 여기다 ② 관심","ex":[{"en":"I **regard** her as an excellent leader.","ko":"나는 그녀를 훌륭한 지도자로 여긴다."},{"en":"This manager showed **regard** for safety.","ko":"이 관리자는 안전에 관심을 보였다."}]},{"id":"vocab-2171","word":"region","ipa":"/ˈriːdʒən/","kr":"**리ː**전","mark":"**","pos":"명","mean":"① 지역 ② 지방","ex":[{"en":"This **region** is famous for apples.","ko":"이 지역은 사과로 유명하다."},{"en":"Claire grew up in a rural **region**.","ko":"클레어는 시골 지방에서 자랐다."}]},{"id":"vocab-2172","word":"register","ipa":"/ˈredʒɪstər/","kr":"**레**지스터","mark":"**","pos":"동/명","mean":"① 등록하다 ② 명부","ex":[{"en":"Please **register** for the class.","ko":"그 수업에 등록해 주세요."},{"en":"Please write your name in the visitor **register**.","ko":"방문자 명부에 이름을 써 주세요."}]},{"id":"vocab-2173","word":"regret","ipa":"/rɪˈɡret/","kr":"리**그렛**","mark":"","pos":"동/명","mean":"① 후회하다 ② 후회","ex":[{"en":"I **regret** my mistake.","ko":"나는 내 실수를 후회한다."},{"en":"I **regret** saying those words.","ko":"나는 그런 말을 한 것을 후회한다."}]},{"id":"vocab-2174","word":"regular","ipa":"/ˈreɡjələr/","kr":"**레**귤러","mark":"**","pos":"형","mean":"① 규칙적인 ② 정기적인","ex":[{"en":"**Regular** exercise is important.","ko":"규칙적인 운동은 중요하다."},{"en":"The organization holds **regular** monthly meetings.","ko":"그 조직은 정기적인 월례 회의를 연다."}]},{"id":"vocab-2175","word":"regulate","ipa":"/ˈreɡjuleɪt/","kr":"**레**귤레이트","mark":"","pos":"동","mean":"① 규제하다 ② 조절하다","ex":[{"en":"The law **regulates** traffic.","ko":"그 법은 교통을 규제한다."},{"en":"This device **regulates** temperature.","ko":"이 장치는 온도를 조절한다."}]},{"id":"vocab-2176","word":"reinforce","ipa":"/ˌriːɪnˈfɔːrs/","kr":"리인**포ː**스","mark":"","pos":"동","mean":"① 강화하다 ② 보강하다","ex":[{"en":"Training **reinforces** safe habits.","ko":"교육은 안전 습관을 강화한다."},{"en":"They **reinforced** the wall.","ko":"그들은 그 벽을 보강했다."}]},{"id":"vocab-2177","word":"reject","ipa":"/rɪˈdʒekt/","kr":"리**젝트**","mark":"","pos":"동","mean":"① 거부하다 ② 거절하다","ex":[{"en":"They **rejected** my plan.","ko":"그들은 내 계획을 거부했다."},{"en":"They **rejected** our proposal.","ko":"그들은 우리의 제안을 거절했다."}]},{"id":"vocab-2178","word":"relate (relative, relation, relationship)","ipa":"/rɪˈleɪt/","kr":"리**레잇**","mark":"**","pos":"동","mean":"① 관련시키다 ② 이야기하다","ex":[{"en":"The lesson **relates** science to daily life.","ko":"그 수업은 과학을 일상생활과 관련시킨다."},{"en":"He **related** the event to us in detail.","ko":"그는 그 사건을 우리에게 자세히 이야기했다."}]},{"id":"vocab-2179","word":"relax","ipa":"/rɪˈlæks/","kr":"리**랙스**","mark":"**","pos":"동","mean":"① 긴장을 풀다 ② 쉬다","ex":[{"en":"**Relax** and take a deep breath.","ko":"긴장을 풀고 깊게 숨을 쉬어라."},{"en":"Sit down and **relax**.","ko":"앉아서 쉬어라."}]},{"id":"vocab-2180","word":"release","ipa":"/rɪˈliːs/","kr":"리**리ː**스","mark":"**","pos":"동/명","mean":"① 풀어 주다 ② 발표하다","ex":[{"en":"They **released** the bird into the wild.","ko":"그들은 새를 야생으로 풀어 주었다."},{"en":"The local company **released** the new policy.","ko":"그 지역 회사는 새 정책을 발표했다."}]},{"id":"vocab-2181","word":"relevant","ipa":"/ˈreləvənt/","kr":"**렐**러번트","mark":"","pos":"형","mean":"① 관련 있는 ② 적절한","ex":[{"en":"Please include only **relevant** information.","ko":"관련 있는 정보만 포함해라."},{"en":"Your point is **relevant**.","ko":"네 요점은 적절하다."}]},{"id":"vocab-2182","word":"relief","ipa":"/rɪˈliːf/","kr":"리**리ː**프","mark":"**","pos":"명","mean":"① 안도 ② 안심","ex":[{"en":"I felt great **relief** after the test.","ko":"시험 후에 큰 안도감을 느꼈다."},{"en":"Her safe arrival brought us great **relief**.","ko":"그녀가 무사히 도착한 것 ","word":"respect (respective)","ipa":"/rɪˈspekt/","kr":"리**스펙트**","mark":"**","pos":"명/동","mean":"① 존경 ② 존중하다","ex":[{"en":"Claire earned the team's **respect**.","ko":"클레어는 팀의 존경을 얻었다."},{"en":"We should **respect** different opinions.","ko":"우리는 서로 다른 의견을 존중해야 한다."}]},{"id":"vocab-2216","word":"respond","ipa":"/rɪˈspɑːnd/","kr":"리**스판드**","mark":"**","pos":"동","mean":"① 응답하다 ② 반응하다","ex":[{"en":"She **responded** quickly.","ko":"그녀는 빠르게 응답했다."},{"en":"Customers **responded** positively to the update.","ko":"고객들은 업데이트에 긍정적으로 반응했다."}]},{"id":"vocab-2217","word":"responsible","ipa":"/rɪˈspɑːnsəbl/","kr":"리**스판**서블","mark":"**","pos":"형","mean":"책임이 있는","ex":[{"en":"Ryan is **responsible** for the team.","ko":"라이언은 그 팀에 대한 책임이 있다."}]},{"id":"vocab-2218","word":"rest","ipa":"/rest/","kr":"**레스트**","mark":"**","pos":"명/동","mean":"① 휴식 ② 나머지 ③ 쉬다","ex":[{"en":"You need some **rest**.","ko":"너는 휴식이 좀 필요하다."},{"en":"The **rest** of the team joined later.","ko":"팀의 나머지는 나중에 합류했다."},{"en":"You should **rest** after the trip.","ko":"출장 후에는 쉬어야 한다."}]},{"id":"vocab-2219","word":"restaurant","ipa":"/ˈrestrɑːnt/","kr":"**레**스트란트","mark":"*","pos":"명","mean":"① 식당 ② 레스토랑","ex":[{"en":"We ate at a nice **restaurant**.","ko":"우리는 좋은 식당에서 먹었다."},{"en":"The **restaurant** is fully booked tonight.","ko":"그 레스토랑은 오늘 밤 예약이 꽉 찼다."}]},{"id":"vocab-2220","word":"restore","ipa":"/rɪˈstɔːr/","kr":"리**스토ː**","mark":"","pos":"동","mean":"① 복원하다 ② 회복시키다","ex":[{"en":"They **restored** the old painting.","ko":"그들은 오래된 그림을 복원했다."},{"en":"The update **restored** normal service.","ko":"그 업데이트는 정상 서비스를 회복시켰다."}]},{"id":"vocab-2221","word":"restrain","ipa":"/rɪˈstreɪn/","kr":"리**스트레인**","mark":"","pos":"동","mean":"① 억제하다 ② 참다","ex":[{"en":"He **restrained** his anger.","ko":"그는 분노를 억제했다."},{"en":"Sophia could not **restrain** her tears.","ko":"소피아는 눈물을 참을 수 없었다."}]},{"id":"vocab-2222","word":"restrict","ipa":"/rɪˈstrɪkt/","kr":"리**스트릭트**","mark":"","pos":"동","mean":"제한하다","ex":[{"en":"The rule **restricts** access to the area.","ko":"그 규칙은 그 지역에 대한 접근을 제한한다."}]},{"id":"vocab-2223","word":"restroom","ipa":"/ˈrestruːm/","kr":"**레**스트룸","mark":"*","pos":"명","mean":"화장실","ex":[{"en":"The **restroom** is down the hall.","ko":"화장실은 복도 끝에 있다."}]},{"id":"vocab-2224","word":"result","ipa":"/rɪˈzʌlt/","kr":"리**절트**","mark":"**","pos":"명/동","mean":"① 결과 ② 결과로 생기다","ex":[{"en":"The test **result** was good.","ko":"시험 결과가 좋았다."},{"en":"The experiment produced surprising **results**.","ko":"그 실험은 놀라운 결과를 낳았다."}]},{"id":"vocab-2225","word":"resume","ipa":"/rɪˈzuːm/","kr":"리**줌ː**","mark":"","pos":"동","mean":"재개하다","ex":[{"en":"They **resumed** the game.","ko":"그들은 그 경기를 재개했다."}]},{"id":"vocab-2226","word":"retail","ipa":"/ˈriːteɪl/","kr":"**리ː**테일","mark":"","pos":"명","mean":"소매","ex":[{"en":"The product sells for ten dollars at **retail**.","ko":"그 제품은 소매가로 10달러에 팔린다."}]},{"id":"vocab-2227","word":"retain","ipa":"/rɪˈteɪn/","kr":"리**테인**","mark":"","pos":"동","mean":"① 유지하다 ② 보유하다","ex":[{"en":"This bottle **retains** heat well.","ko":"이 병은 열을 잘 유지한다."},{"en":"The parent company **retains** ownership of the data.","ko":"그 모회사는 자료의 소유권을 보유한다."}]},{"id":"vocab-2228","word":"retire","ipa":"/rɪˈtaɪər/","kr":"리**타이**어","mark":"**","pos":"동","mean":"은퇴하다","ex":[{"en":"My grandfather **retired** last year.","ko":"우리 할아버지는 작년에 은퇴하셨다."}]},{"id":"vocab-2229","word":"retreat","ipa":"/rɪˈtriːt/","kr":"리**트리ː**트","mark":"","pos":"동/명","mean":"① 후퇴하다 ② 후퇴","ex":[{"en":"The soldiers **retreated** across the river.","ko":"군인들은 강을 건너 후퇴했다."},{"en":"The army had to **retreat**.","ko":"그 군대는 후퇴해야 했다."}]},{"id":"vocab-2230","word":"return","ipa":"/rɪˈtɜːrn/","kr":"리**턴ː**","mark":"*","pos":"동/명","mean":"① 돌아가다 ② 반납하다 ③ 반환","ex":[{"en":"After lunch, she **returned** to her desk.","ko":"점심 후에 그녀는 책상으로 돌아갔다."},{"en":"Please **return** the book.","ko":"그 책을 반납해 주세요."},{"en":"The **return** of the equipment is required.","ko":"그 장비의 반환이 필요하다."}]},{"id":"vocab-2231","word":"reveal","ipa":"/rɪˈviːl/","kr":"리**빌ː**","mark":"","pos":"동","mean":"① 드러내다 ② 밝히다","ex":[{"en":"The audit **revealed** hidden problems.","ko":"감사는 숨겨진 문제들을 드러냈다."},{"en":"This manager **revealed** the final decision.","ko":"이 관리자는 최종 결정을 밝혔다."}]},{"id":"vocab-2232","word":"revenge","ipa":"/rɪˈvendʒ/","kr":"리**벤지**","mark":"","pos":"명","mean":"복수","ex":[{"en":"Leo wanted **revenge** for the attack.","ko":"레오는 그 공격에 대한 복수를 원했다."}]},{"id":"vocab-2233","word":"reverse","ipa":"/rɪˈvɜːrs/","kr":"리**버ː**스","mark":"","pos":"동/명","mean":"① 뒤집다 ② 반대","ex":[{"en":"**Reverse** the order of the words.","ko":"단어의 순서를 뒤집어라."},{"en":"The **reverse** of this process is much faster.","ko":"이 과정의 반대는 훨씬 빠르다."}]},{"id":"vocab-2234","word":"revise","ipa":"/rɪˈvaɪz/","kr":"리**바이즈**","mark":"","pos":"동","mean":"① 수정하다 ② 개정하다","ex":[{"en":"I **revised** my essay twice.","ko":"나는 에세이를 두 번 수정했다."},{"en":"A local company **revised** its policy.","ko":"한 지역 회사는 정책을 개정했다."}]},{"id":"vocab-2235","word":"revive","ipa":"/rɪˈvaɪv/","kr":"리**바이브**","mark":"","pos":"동","mean":"① 되살리다 ② 회복시키다","ex":[{"en":"The new campaign **revived** interest in the product.","ko":"새 캠페인은 제품에 대한 관심을 되살렸다."},{"en":"A short break **revived** the tired team.","ko":"짧은 휴식은 지친 팀을 회복시켰다."}]},{"id":"vocab-2236","word":"revolution","ipa":"/ˌrevəˈluːʃn/","kr":"레벌**루ː**션","mark":"","pos":"명","mean":"혁명","ex":[{"en":"The invention caused an industrial **revolution**.","ko":"그 발명은 산업 혁명을 일으켰다."}]},{"id":"vocab-2237","word":"reward","ipa":"/rɪˈwɔːrd/","kr":"리**워ː**드","mark":"","pos":"명/동","mean":"① 보상 ② 보상하다","ex":[{"en":"Julia got a **reward** for her work.","ko":"줄리아는 자신의 일에 대한 보상을 받았다."},{"en":"Yuna received a **reward** for her honesty.","ko":"유나는 정직함에 대한 보상을 받았다."}]},{"id":"vocab-2238","word":"rhythm","ipa":"/ˈrɪðəm/","kr":"**리**덤","mark":"","pos":"명","mean":"① 리듬 ② 박자","ex":[{"en":"Clap your hands to the **rhythm**.","ko":"리듬에 맞춰 손뼉을 쳐라."},{"en":"The drummer kept a steady **rhythm**.","ko":"그 드러머는 일정한 박자를 유지했다."}]},{"id":"vocab-2239","word":"ribbon","ipa":"/ˈrɪbən/","kr":"**리**번","mark":"*","pos":"명","mean":"리본","ex":[{"en":"Mina tied a **ribbon** around the box.","ko":"미나는 상자 둘레에 리본을 묶었다."}]},{"id":"vocab-2240","word":"rice","ipa":"/raɪs/","kr":"**라이스**","mark":"**","pos":"명","mean":"① 쌀 ② 밥","ex":[{"en":"The farm produces **rice**.","ko":"그 농장은 쌀을 생산한다."},{"en":"We eat **rice** every day.","ko":"우리는 매일 밥을 먹는다."}]},{"id":"vocab-2241","word":"rich","ipa":"/rɪtʃ/","kr":"**리치**","mark":"*","pos":"형","mean":"① 부유한 ② 풍부한","ex":[{"en":"They are a **rich** family.","ko":"그들은 부유한 가족이다."},{"en":"The soil is **rich** in nutrients.","ko":"그 토양은 영양분이 풍부하다."}]},{"id":"vocab-2242","word":"rid","ipa":"/rɪd/","kr":"**리드**","mark":"","pos":"동","mean":"① 없애다 ② 제거하다","ex":[{"en":"We must **rid** the room of insects.","ko":"우리는 방에서 벌레를 없애야 한다."},{"en":"We need to **rid** the system of old data.","ko":"우리는 시스템에서 오래된 자료를 제거해야 한다."}]},{"id":"vocab-2243","word":"ride","ipa":"/raɪd/","kr":"**라이드**","mark":"**","pos":"동/명","mean":"① 타다 ② 타기","ex":[{"en":"She **rides** a bicycle to school.","ko":"그녀는 자전거를 타고 학교에 간다."},{"en":"The train **ride** took two hours.","ko":"기차 타기는 두 시간 걸렸다."}]},{"id":"vocab-2244","word":"ridicule (ridiculous)","ipa":"/ˈrɪdɪkjuːl/","kr":"**리**디큘","mark":"","pos":"동/명","mean":"① 조롱하다 ② 조롱","ex":[{"en":"It is wrong to **ridicule** others.","ko":"다른 사람을 조롱하는 것은 잘못이다."},{"en":"His words were a form of **ridicule**.","ko":"그의 말은 조롱의 한 형태였다."}]},{"id":"vocab-2245","word":"right","ipa":"/raɪt/","kr":"**라잇**","mark":"*","pos":"형/명","mean":"① 옳은 ② 오른쪽의 ③ 권리","ex":[{"en":"You made the **right** choice.","ko":"너는 옳은 선택을 했다."},{"en":"The pharmacy is on the **right** side of the street.","ko":"약국은 거리 오른쪽에 있다."},{"en":"Every employee has the **right** to speak.","ko":"모든 직원은 말할 권리가 있다."}]},{"id":"vocab-2246","word":"ring","ipa":"/rɪŋ/","kr":"**링**","mark":"*","pos":"명/동","mean":"① 반지 ② 울리다","ex":[{"en":"Julia wore a silver **ring**.","ko":"줄리아는 은반지를 꼈다."},{"en":"The phone is **ringing**.","ko":"전화가 울리고 있다."}]},{"id":"vocab-2247","word":"riot","ipa":"/ˈraɪət/","kr":"**라이**엇","mark":"","pos":"명","mean":"폭동","ex":[{"en":"The **riot** damaged several shops.","ko":"그 폭동은 여러 가게를 파손했다."}]},{"id":"vocab-2248","word":"rise","ipa":"/raɪz/","kr":"**라이즈**","mark":"**","pos":"동/명","mean":"① 오르다 ② 상승","ex":[{"en":"Fuel prices may **rise** again next month.","ko":"연료 가격은 다음 달에 다시 오를 수 있다."},{"en":"The **rise** in costs worried the team.","ko":"비용의 상승은 팀을 걱정시켰다."}]},{"id":"vocab-2249","word":"risk","ipa":"/rɪsk/","kr":"**리스크**","mark":"**","pos":"명/동","mean":"① 위험 ② 위험을 무릅쓰다","ex":[{"en":"There is a **risk** of injury.","ko":"부상의 위험이 있다."},{"en":"Do not **risk** your safety.","ko":"네 안전을 위험에 빠뜨리지 마라."}]},{"id":"vocab-2250","word":"rival","ipa":"/ˈraɪvl/","kr":"**라이**블","mark":"","pos":"명","mean":"① 경쟁자 ② 라이벌","ex":[{"en":"Our team defeated its main **rival**.","ko":"우리 팀은 주요 경쟁자를 이겼다."},{"en":"Our main **rival** launched a similar product.","ko":"우리의 주된 라이벌이 비슷한 제품을 출시했다."}]},{"id":"vocab-2251","word":"river","ipa":"/ˈrɪvər/","kr":"**리**버","mark":"*","pos":"명","mean":"강","ex":[{"en":"The **river** flows through the city.","ko":"그 강은 도시를 가로질러 흐른다."}]},{"id":"vocab-2252","word":"road","ipa":"/roʊd/","kr":"**로드**","mark":"*","pos":"명","mean":"① 길 ② 도로","ex":[{"en":"The **road** is very long.","ko":"그 길은 매우 길다."},{"en":"The **road** is closed today.","ko":"그 도로는 오늘 폐쇄되었다."}]},{"id":"vocab-2253","word":"roar","ipa":"/rɔːr/","kr":"**로ː**","mark":"","pos":"동/명","mean":"① 으르렁거리다 ② 포효","ex":[{"en":"The lion began to **roar**.","ko":"그 사자는 으르렁거리기 시작했다."},{"en":"The lion **roared** loudly.","ko":"사자가 크게 포효했다."}]},{"id":"vocab-2254","word":"roast","ipa":"/roʊst/","kr":"**로스트**","mark":"","pos":"동","mean":"① 굽다 ② 구이하다","ex":[{"en":"**Roast** the vegetables for twenty minutes.","ko":"채소를 20분 동안 구워라."},{"en":"They **roast** coffee beans at the factory.","ko":"그들은 공장에서 커피 원두를 구이한다."}]},{"id":"vocab-2255","word":"rob","ipa":"/rɑːb/","kr":"**랍**","mark":"**","pos":"동","mean":"① 강탈하다 ② 털다","ex":[{"en":"The thieves **robbed** the store at night.","ko":"도둑들은 밤에 그 가게를 강탈했다."},{"en":"A thief **robbed** the bank.","ko":"도둑이 은행을 털었다."}]},{"id":"vocab-2256","word":"robot","ipa":"/ˈroʊbɑːt/","kr":"**로**밧","mark":"*","pos":"명","mean":"로봇","ex":[{"en":"The **robot** can clean the floor.","ko":"그 로봇은 바닥을 청소할 수 있다."}]},{"id":"vocab-2257","word":"rock","ipa":"/rɑːk/","kr":"**락**","mark":"*","pos":"명","mean":"① 바위 ② 돌","ex":[{"en":"Ryan sat on a large **rock**.","ko":"라이언은 큰 바위에 앉았다."},{"en":"A small **rock** blocked the path.","ko":"작은 돌 하나가 길을 막았다."}]},{"id":"vocab-2258","word":"rocket","ipa":"/ˈrɑːkɪt/","kr":"**라**킷","mark":"**","pos":"명","mean":"로켓","ex":[{"en":"The **rocket** rose into the sky.","ko":"로켓이 하늘로 솟아올랐다."}]},{"id":"vocab-2259","word":"rod","ipa":"/rɑːd/","kr":"**랏**","mark":"","pos":"명","mean":"① 막대기 ② 낚싯대","ex":[{"en":"Use a metal **rod** to support the shelf.","ko":"선반을 지탱하려면 금속 막대기를 사용해라."},{"en":"Ethan caught a fish with a **rod**.","ko":"이선은 낚싯대로 물고기를 잡았다."}]},{"id":"vocab-2260","word":"role","ipa":"/roʊl/","kr":"**롤**","mark":"**","pos":"명","mean":"역할","ex":[{"en":"Hana played the **role** of a doctor.","ko":"하나는 의사 역할을 맡았다."}]},{"id":"vocab-2261","word":"roll (enroll / enrol)","ipa":"/roʊl/","kr":"**롤**","mark":"**","pos":"동/명","mean":"① 구르다 ② 두루마리","ex":[{"en":"The ball **rolled** across the floor and stopped by the door.","ko":"공은 바닥을 가로질러 굴러가 문 옆에 멈췄다."},{"en":"David bought a **roll** of paper.","ko":"데이비드는 종이 한 두루마리를 샀다."}]},{"id":"vocab-2262","word":"romantic","ipa":"/roʊˈmæntɪk/","kr":"로**맨**틱","mark":"","pos":"형","mean":"낭만적인","ex":[{"en":"They had a **romantic** dinner.","ko":"그들은 낭만적인 저녁 식사를 했다."}]},{"id":"vocab-2263","word":"roof","ipa":"/ruːf/","kr":"**루ː**프","mark":"**","pos":"명","mean":"지붕","ex":[{"en":"Snow covered the **roof**.","ko":"눈이 지붕을 덮었다."}]},{"id":"vocab-2264","word":"room","ipa":"/ruːm/","kr":"**룸ː**","mark":"*","pos":"명","mean":"① 방 ② 공간","ex":[{"en":"My **room** is small.","ko":"내 방은 작다."},{"en":"There is no **room** in the bag.","ko":"가방 안에 공간이 :"This is my favorite **song**.","ko":"이것은 내가 가장 좋아하는 노래다."}]},{"id":"vocab-2466","word":"soon","ipa":"/suːn/","kr":"**순ː**","mark":"**","pos":"부","mean":"① 곧 ② 이내","ex":[{"en":"Lina will arrive **soon**.","ko":"리나는 곧 도착할 것이다."},{"en":"The update will finish **soon**.","ko":"그 업데이트는 이내 끝날 것이다."}]},{"id":"vocab-2467","word":"sophisticate","ipa":"/səˈfɪstɪkeɪt/","kr":"서**피**스티케이트","mark":"","pos":"동","mean":"정교하게 하다","ex":[{"en":"They **sophisticated** the design.","ko":"그들은 그 디자인을 정교하게 다듬었다."}]},{"id":"vocab-2468","word":"sore","ipa":"/sɔːr/","kr":"**소ː**","mark":"**","pos":"형","mean":"① 아픈 ② 쓰라린","ex":[{"en":"My shoulder is **sore** after moving the boxes.","ko":"상자를 옮긴 후에 내 어깨가 아프다."},{"en":"The cut left a **sore**, painful spot.","ko":"그 상처는 쓰라린 부분을 남겼다."}]},{"id":"vocab-2469","word":"sorry","ipa":"/ˈsɑːri/","kr":"**사**리","mark":"*","pos":"형","mean":"① 미안한 ② 유감스러운","ex":[{"en":"I am **sorry** for being late.","ko":"늦어서 미안하다."},{"en":"It was a **sorry** result for the team.","ko":"그 팀에게 유감스러운 결과였다."}]},{"id":"vocab-2470","word":"sort","ipa":"/sɔːrt/","kr":"**소ː**트","mark":"**","pos":"명/동","mean":"① 종류 ② 분류하다","ex":[{"en":"Which **sort** of tea would you like?","ko":"어떤 종류의 차를 원하세요?"},{"en":"**Sort** the books by size.","ko":"책을 크기별로 분류해라."}]},{"id":"vocab-2471","word":"soul","ipa":"/soʊl/","kr":"**솔**","mark":"**","pos":"명","mean":"① 영혼 ② 마음","ex":[{"en":"Music touched her **soul**.","ko":"음악은 그녀의 영혼을 감동시켰다."},{"en":"Her kind words touched my heart and **soul**.","ko":"그녀의 친절한 말은 내 마음을 움직였다."}]},{"id":"vocab-2472","word":"sound","ipa":"/saʊnd/","kr":"**사운드**","mark":"*","pos":"명/동","mean":"① 소리 ② ~처럼 들리다","ex":[{"en":"I heard a strange **sound**.","ko":"나는 이상한 소리를 들었다."},{"en":"That **sounds** like a good idea.","ko":"그것은 좋은 생각처럼 들린다."}]},{"id":"vocab-2473","word":"soup","ipa":"/suːp/","kr":"**숩ː**","mark":"*","pos":"명","mean":"① 수프 ② 국","ex":[{"en":"The **soup** is hot.","ko":"그 수프는 뜨겁다."},{"en":"We had rice and **soup** for lunch.","ko":"우리는 점심으로 밥과 국을 먹었다."}]},{ :"/spiːk/","kr":"**스픽ː**","mark":"*","pos":"동","mean":"말하다","ex":[{"en":"Please **speak** slowly.","ko":"천천히 말해 주세요."}]},{"id":"vocab-2483","word":"species (special)","ipa":"/ˈspiːʃiːz/","kr":"**스피ː**시즈","mark":"**","pos":"명","mean":"종","ex":[{"en":"This **species** lives only here.","ko":"이 종은 이곳에만 산다."}]},{"id":"vocab-2484","word":"specific","ipa":"/spəˈsɪfɪk/","kr":"스퍼**시**픽","mark":"**","pos":"형","mean":"① 구체적인 ② 특정한","ex":[{"en":"Please give a **specific** example.","ko":"구체적인 예를 들어 주세요."},{"en":"A **specific** employee reported the problem.","ko":"특정한 직원이 그 문제를 보고했다."}]},{"id":"vocab-2485","word":"spectacle","ipa":"/ˈspektəkl/","kr":"**스펙**터클","mark":"","pos":"명","mean":"① 장관 ② 광경","ex":[{"en":"The mountains were a grand **spectacle**.","ko":"그 산들은 장관이었다."},{"en":"The accident was a shocking **spectacle**.","ko":"그 사고는 충격적인 광경이었다."}]},{"id":"vocab-2486","word":"spectrum","ipa":"/ˈspektrəm/","kr":"**스펙**트럼","mark":"","pos":"명","mean":"① 스펙트럼 ② 범위","ex":[{"en":"The colors form a broad **spectrum**.","ko":"그 색들은 넓은 스펙트럼을 이룬다."},{"en":"The service covers a broad **spectrum** of needs.","ko":"그 서비스는 넓은 범위의 요구를 다룬다."}]},{"id":"vocab-2487","word":"speech","ipa":"/spiːtʃ/","kr":"**스피ː**치","mark":"**","pos":"명","mean":"① 연설 ② 말","ex":[{"en":"Sophia gave a great **speech**.","ko":"소피아는 훌륭한 연설을 했다."},{"en":"Her **speech** was clear and polite.","ko":"그녀의 말은 분명하고 공손했다."}]},{"id":"vocab-2488","word":"speed","ipa":"/spiːd/","kr":"**스피ː**드","mark":"*","pos":"명","mean":"속도","ex":[{"en":"The car reduced its **speed**.","ko":"그 차는 속도를 줄였다."}]},{"id":"vocab-2489","word":"spell","ipa":"/spel/","kr":"**스펠**","mark":"**","pos":"동","mean":"철자를 쓰다","ex":[{"en":"Can you **spell** your name?","ko":"네 이름의 철자를 말할 수 있니?"}]},{"id":"vocab-2490","word":"spend","ipa":"/spend/","kr":"**스펜드**","mark":"**","pos":"동","mean":"① 쓰다 ② 보내다","ex":[{"en":"We **spend** too much money on repairs.","ko":"우리는 수리에 돈을 너무 많이 쓴다."},{"en":"I **spent** the afternoon in training.","ko":"나는 오후를 교육으로 보냈다."}]},{"id":"vocab-2491","word":"sphere","ipa":"/sfɪr/","kr":"**스피어**","mark":"","pos":"명","mean":"① 구 ② 영역","ex":[{"en":"The Earth is nearly a **sphere**.","ko":"지구는 거의 구형이다."},{"en":"Data security is outside my **sphere** of work.","ko":"자료 보안은 내 업무 영역 밖에 있다."}]},{"id":"vocab-2492","word":"spill","ipa":"/spɪl/","kr":"**스필**","mark":"","pos":"동","mean":"① 엎지르다 ② 흘리다","ex":[{"en":"Don't **spill** the milk.","ko":"우유를 엎지르지 마라."},{"en":"Do not **spill** coffee on the keyboard.","ko":"키보드에 커피를 흘리지 마라."}]},{"id":"vocab-2493","word":"spin","ipa":"/spɪn/","kr":"**스핀**","mark":"**","pos":"동","mean":"① 돌다 ② 회전하다","ex":[{"en":"The wheel **spun** quickly.","ko":"바퀴가 빠르게 돌았다."},{"en":"The fan blades **spin** faster on the highest setting.","ko":"선풍기 날개는 최고 설정에서 더 빠르게 회전한다."}]},{"id":"vocab-2494","word":"spirit","ipa":"/ˈspɪrɪt/","kr":"**스피**릿","mark":"**","pos":"명","mean":"① 정신 ② 영혼","ex":[{"en":"Team **spirit** helped us win.","ko":"팀 정신이 우리가 이기는 데 도움이 되었다."},{"en":"The story says a **spirit** remained in the house.","ko":"그 이야기는 영혼이 그 집에 남았다고 말한다."}]},{"id":"vocab-2495","word":"spit","ipa":"/spɪt/","kr":"**스핏**","mark":"","pos":"동","mean":"① 뱉다 ② 침을 뱉다","ex":[{"en":"Do not **spit** on the floor.","ko":"바닥에 침을 뱉지 마라."},{"en":"A sign says, “Do not **spit** on the ground.”","ko":"표지판에는 “바닥에 침을 뱉지 마세요”라고 적혀 있다."}]},{"id":"vocab-2496","word":"splash","ipa":"/splæʃ/","kr":"**스플래시**","mark":"","pos":"동/명","mean":"① 물을 튀기다 ② 첨벙","ex":[{"en":"The children **splashed** water at each other.","ko":"아이들은 서로에게 물을 튀겼다."},{"en":"The stone fell into the water with a **splash**.","ko":"돌은 첨벙 소리와 함께 물에 떨어졌다."}]},{"id":"vocab-2497","word":"split","ipa":"/splɪt/","kr":"**스플릿**","mark":"","pos":"동/명","mean":"① 쪼개다 ② 나누다","ex":[{"en":"**Split** the team into two groups.","ko":"팀을 두 그룹으로 쪼개라."},{"en":"We **split** the cake into four pieces.","ko":"우리는 케이크를 네 조각으로 나누었다."}]},{"id":"vocab-2498","word":"spoil","ipa":"/spɔɪl/","kr":"**스포일**","mark":"**","pos":"동","mean":"① 망치다 ② 상하다","ex":[{"en":"One careless comment can **spoil** the meeting.","ko":"부주의한 말 한마디가 회의를 망칠 수 있다."},{"en":"The heat **spoiled** the food.","ko":"더위가 음식을 상하게 했다."}]},{"id":"vocab-2499","word":"sponsor","ipa":"/ˈspɑːnsər/","kr":"**스판**서","mark":"**","pos":"명/동","mean":"① 후원자 ② 후원하다","ex":[{"en":"Our **sponsor** paid for the event.","ko":"우리 후원자가 그 행사 비용을 냈다."},{"en":"A local company **sponsored** the event.","ko":"지역 회사가 그 행사를 후원했다."}]},{"id":"vocab-2500","word":"spoon","ipa":"/spuːn/","kr":"**스푼ː**","mark":"*","pos":"명","mean":"숟가락","ex":[{"en":"Eat the soup with a **spoon**.","ko":"숟가락으로 수프를 먹어라."}]},{"id":"vocab-2501","word":"sport","ipa":"/spɔːrt/","kr":"**스포ː**트","mark":"*","pos":"명","mean":"① 스포츠 ② 운동","ex":[{"en":"Soccer is a popular **sport**.","ko":"축구는 인기 있는 스포츠다."},{"en":"For me, swimming is the most enjoyable **sport**.","ko":"나에게 수영은 가장 즐거운 운동이다."}]},{"id":"vocab-2502","word":"spot","ipa":"/spɑːt/","kr":"**스팟**","mark":"**","pos":"명/동","mean":"① 점 ② 장소 ③ 발견하다","ex":[{"en":"A red **spot** appeared on the screen.","ko":"화면에 빨간 점이 나타났다."},{"en":"We found a quiet **spot** by the river.","ko":"우리는 강가에서 조용한 장소를 찾았다."},{"en":"Can you **spot** the error in this line?","ko":"이 줄에서 오류를 발견할 수 있니?"}]},{"id":"vocab-2503","word":"spouse","ipa":"/spaʊs/","kr":"**스파우스**","mark":"","pos":"명","mean":"배우자","ex":[{"en":"Employees may bring their **spouse**.","ko":"직원들은 배우자를 데려올 수 있다."}]},{"id":"vocab-2504","word":"spray","ipa":"/spreɪ/","kr":"**스프레이**","mark":"**","pos":"명/동","mean":"① 분무 ② 뿌리다","ex":[{"en":"Use a cleaning **spray** on the glass.","ko":"유리에 청소 분무를 사용해라."},{"en":"**Spray** water on the plants.","ko":"식물에 물을 뿌려라."}]},{"id":"vocab-2505","word":"spread","ipa":"/spred/","kr":"**스프레드**","mark":"**","pos":"동","mean":"① 펼치다 ② 퍼지다","ex":[{"en":"**Spread** the map across the table.","ko":"지도를 탁자 위에 펼쳐라."},{"en":"The rumor **spread** through the office.","ko":"그 소문은 사무실에 퍼졌다."}]},{"id":"vocab-2506","word":"spring","ipa":"/sprɪŋ/","kr":"**스프링**","mark":"*","pos":"명","mean":"① 봄 ② 샘 ③ 용수철","ex":[{"en":"Flowers bloom in **spring**.","ko":"꽃은 봄에 핀다."},{"en":"Fresh water flows from the **spring**.","ko":"신선한 물이 샘에서 흐른다."},{"en":"The **spring** inside the lock is broken.","ko":"자물쇠 안의 용수철이 부러졌다."}]},{"id":"vocab-2507","word":"spy","ipa":"/spaɪ/","kr":"**스파이**","mark":"**","pos":"명/동","mean":"① 스파이 ② 염탐하다","ex":[{"en":"The **spy** sent secret messages.","ko":"그 스파이는 비밀 메시지를 보냈다."},{"en":"Someone tried to **spy** on the meeting.","ko":"누군가 그 회의를 염탐하려 했다."}]},{"id":"vocab-2508","word":"square","ipa":"/skwer/","kr":"**스퀘어**","mark":"**","pos":"명/형","mean":"① 정사각형 ② 광장 ③ 네모난","ex":[{"en":"The table is **square**.","ko":"그 탁자는 정사각형이다."},{"en":"A crowd gathered in the town **square**.","ko":"군중이 마을 광장에 모였다."},{"en":"Use a **square** box for the parts.","ko":"그 부품에는 네모난 상자를 사용해라."}]},{"id":"vocab-2509","word":"squeeze","ipa":"/skwiːz/","kr":"**스퀴ː**즈","mark":"","pos":"동","mean":"① 짜다 ② 꽉 쥐다","ex":[{"en":"**Squeeze** the lemon into the cup.","ko":"레몬을 컵에 짜 넣어라."},{"en":"She **squeezed** my hand tightly.","ko":"그녀는 내 손을 꽉 쥐었다."}]},{"id":"vocab-2510","word":"stable","ipa":"/ˈsteɪbl/","kr":"**스테이**블","mark":"**","pos":"형/명","mean":"① 안정된 ② 마구간","ex":[{"en":"The network is **stable** now.","ko":"네트워크는 지금 안정되어 있다."},{"en":"The horse returned to the **stable**.","ko":"그 말은 마구간으로 돌아갔다."}]},{"id":"vocab-2511","word":"stack","ipa":"/stæk/","kr":"**스택**","mark":"","pos":"명/동","mean":"① 더미 ② 쌓다","ex":[{"en":"There is a **stack** of papers.","ko":"종이 한 더미가 있다."},{"en":"**Stack** the boxes against the wall.","ko":"상자들을 벽에 붙여 쌓아라."}]},{"id":"vocab-2512","word":"staff","ipa":"/stæf/","kr":"**스태프**","mark":"*","pos":"명","mean":"직원","ex":[{"en":"The hotel **staff** were helpful.","ko":"호텔 직원들은 도움이 되었다."}]},{"id":"vocab-2513","word":"stage","ipa":"/steɪdʒ/","kr":"**스테이지**","mark":"**","pos":"명","mean":"① 무대 ② 단계","ex":[{"en":"The actor walked onto the **stage**.","ko":"배우가 무대로 걸어 나왔다."},{"en":"The project has entered its final **stage**.","ko":"그 프로젝트는 마지막 단계에 들어갔다."}]},{"id":"vocab-2514","word":"stain","ipa":"/steɪn/","kr":"**스테인**","mark":"","pos":"명/동","mean":"① 얼룩 ② 얼룩지게 하다","ex":[{"en":"Coffee **stained** my shirt.","ko":"커피가 내 셔츠에 얼룩을 남겼다."},{"en":"Coffee can **stain** the white carpet.","ko":"커피는 흰 카펫을 얼룩지게 할 수 있다."}]},{"id":"vocab-2515","word":"stairs","ipa":"/sterz/","kr":"**스테어스**","mark":"**","pos":"명","mean":"계단","ex":[{"en":"Julia ran up the **stairs**.","ko":"줄리아는 계단을 뛰어 올라갔다."}]},{"id":"vocab-2516","word":"stamp","ipa":"/stæmp/","kr":"**스탬프**","mark":"**","pos":"명/동","mean":"① 우표 ② 도장 ③ 짓밟다","ex":[{"en":"Put a **stamp** on the envelope.","ko":"봉투에 우표를 붙여라."},{"en":"A small office uses an official rubber **stamp**.","ko":"작은 사무실은 공식 도장을 사용한다."},{"en":"Do not **stamp** on the flowers.","ko":"꽃을 짓밟지 마라."}]},{"id":"vocab-2517","word":"stand","ipa":"/stænd/","kr":"**스탠드**","mark":"*","pos":"동","mean":"① 서다 ② 참다","ex":[{"en":"Please **stand** in a line.","ko":"줄을 서 주세요."},{"en":"I cannot **stand** the loud noise.","ko":"나는 그 큰 소음을 참을 수 없다."}]},{"id":"vocab-2518","word":"standard","ipa":"/ˈstændərd/","kr":"**스탠**더드","mark":"**","pos":"명/형","mean":"① 기준 ② 표준의","ex":[{"en":"The product meets safety **standards**.","ko":"그 제품은 안전 기준을 충족한다."},{"en":"Use the **standard** company format.","ko":"표준의 회사 서식을 사용해라."}]},{"id":"vocab-2519","word":"star","ipa":"/stɑːr/","kr":"**스타ː**","mark":"*","pos":"명","mean":"① 별 ② 스타","ex":[{"en":"The **stars** are bright tonight.","ko":"오늘 밤 별들이 밝다."},{"en":"The actor became a movie **star**.","ko":"그 배우는 영화 스타가 되었다."}]},{"id":"vocab-2520","word":"stare","ipa":"/ster/","kr":"**스테어**","mark":"**","pos":"동/명","mean":"① 응시하다 ② 빤히 봄","ex":[{"en":"Do not **stare** at the screen for too long.","ko":"화면을 너무 오래 응시하지 마라."},{"en":"Don't **stare** at people.","ko":"사람들을 빤히 쳐다보지 마라."}]},{"id":"vocab-2521","word":"start","ipa":"/stɑːrt/","kr":"**스타ː**트","mark":"*","pos":"동/명","mean":"① 시작하다 ② 시작","ex":[{"en":"The movie **starts** at eight.","ko":"그 영화는 여덟 시에 시작한다."},{"en":"The class **starts** at nine.","ko":"수업은 9시에 시작한다."}]},{"id":"vocab-2522","word":"starve","ipa":"/stɑːrv/","kr":"**스타ː**브","mark":"","pos":"동","mean":"굶주리다","ex":[{"en":"The lost hikers began to **starve**.","ko":"길을 잃은 등산객들은 굶주리기 시작했다."}]},{"id":"vocab-2523","word":"state","ipa":"/steɪt/","kr":"**스테잇**","mark":"**","pos":"명/동","mean":"① 상태 ② 국가 ③ 진술하다","ex":[{"en":"The house is in a bad **state**.","ko":"그 집은 상태가 나쁘다."},{"en":"The treaty created a new independent **state**.","ko":"그 조약은 새 독립 국가를 만들었다."},{"en":"Please **state** your reason clearly.","ko":"이유를 분명히 진술해 주세요."}]},{"id":"vocab-2524","word":"station","ipa":"/ˈsteɪʃn/","kr":"**스테이**션","mark":"**","pos":"명","mean":"① 역 ② 정거장","ex":[{"en":"Meet me at the train **station**.","ko":"기차역에서 나를 만나자."},{"en":"The bus stops at every **station**.","ko":"그 버스는 모든 정거장에 선다."}]},{"id":"vocab-2525","word":"statistic","ipa":"/stəˈtɪstɪk/","kr":"스터**티**스틱","mark":"","pos":"명","mean":"통계","ex":[{"en":"This **statistic** shows a clear trend.","ko":"이 통계 수치는 분명한 추세를 보여 준다."}]},{"id":"vocab-2526","word":"statue","ipa":"/ˈstætʃuː/","kr":"**스태**추","mark":"","pos":"명","mean":"① 조각상 ② 동상","ex":[{"en":"A **statue** stands in the square.","ko":"광장에 조각상이 서 있다."},{"en":"They built a **statue** of the hero.","ko":"그들은 그 영웅의 동상을 세웠다."}]},{"id":"vocab-2527","word":"status","ipa":"/ˈstætəs/","kr":"**스태**터스","mark":"","pos":"명","mean":"① 지위 ② 상태","ex":[{"en":"Her **status** in the company changed.","ko":"회사에서 그녀의 지위가 바뀌었다."},{"en":"Check the **status** of your order.","ko":"네 주문 상태를 확인해라."}]},{"id":"vocab-2528","word":"stay","ipa":"/steɪ/","kr":"**스테이**","mark":"*","pos":"동/명","mean":"① 머무르다 ② 체류","ex":[{"en":"Please **stay** in the meeting room.","ko":"회의실에 머물러 주세요."},{"en":"His **stay** in Seoul lasted a week.","ko":"그의 서울 체류는 일주일간 계속되었다."}]},{"id":"vocab-2529","word":"steady","ipa":"/ˈstedi/","kr":"**스테**디","mark":"**","pos":"형","mean":"① 꾸준한 ② 안정된","ex":[{"en":"Keep a **steady** pace.","ko":"꾸준한 속도를 유지해라."},{"en":"The current system remained **steady** during the update.","ko":"현재 시스템은 업데이트 동안 안정된 ","ex":[{"en":"I bought it at the **store**.","ko":"나는 그것을 가게에서 샀다."},{"en":"**Store** the backup in a safe place.","ko":"백업을 안전한 곳에 저장해라."}]},{"id":"vocab-2548","word":"storm","ipa":"/stɔːrm/","kr":"**스톰ː**","mark":"**","pos":"명","mean":"폭풍","ex":[{"en":"The **storm** damaged many houses.","ko":"폭풍이 많은 집을 파손했다."}]},{"id":"vocab-2549","word":"story","ipa":"/ˈstɔːri/","kr":"**스토ː**리","mark":"*","pos":"명","mean":"① 이야기 ② 층","ex":[{"en":"Lina told us a funny **story**.","ko":"리나는 우리에게 재미있는 이야기를 들려주었다."},{"en":"Our office is on the tenth **story**.","ko":"우리 사무실은 10층에 있다."}]},{"id":"vocab-2550","word":"stove","ipa":"/stoʊv/","kr":"**스토브**","mark":"","pos":"명","mean":"① 난로 ② 가스레인지","ex":[{"en":"The **stove** kept the room warm.","ko":"난로가 방을 따뜻하게 유지했다."},{"en":"Yuna cooked on the **stove**.","ko":"유나는 가스레인지에서 요리했다."}]},{"id":"vocab-2551","word":"straight","ipa":"/streɪt/","kr":"**스트레잇**","mark":"**","pos":"형/부","mean":"① 곧은 ② 똑바로","ex":[{"en":"Use a ruler to draw a **straight** line.","ko":"자를 사용해 곧은 선을 그어라."},{"en":"Go **straight** for two blocks.","ko":"두 블록 동안 똑바로 가라."}]},{"id":"vocab-2552","word":"strain","ipa":"/streɪn/","kr":"**스트레인**","mark":"","pos":"명/동","mean":"① 긴장 ② 무리하게 하다","ex":[{"en":"The deadline caused **strain** in the team.","ko":"마감일은 팀에 긴장을 초래했다."},{"en":"Do not **strain** your back.","ko":"허리에 무리를 주지 마라."}]},{"id":"vocab-2553","word":"strange","ipa":"/streɪndʒ/","kr":"**스트레인지**","mark":"**","pos":"형","mean":"① 이상한 ② 낯선","ex":[{"en":"I heard a **strange** noise.","ko":"나는 이상한 소리를 들었다."},{"en":"This interface looks **strange** to me.","ko":"이 인터페이스는 나에게 낯설어 보인다."}]},{"id":"vocab-2554","word":"strategy","ipa":"/ˈstrætədʒi/","kr":"**스트래**터지","mark":"**","pos":"명","mean":"전략","ex":[{"en":"We need a new **strategy**.","ko":"우리는 새로운 전략이 필요하다."}]},{"id":"vocab-2555","word":"strawberry","ipa":"/ˈstrɔːberi/","kr":"**스트로ː**베리","mark":"**","pos":"명","mean":"딸기","ex":[{"en":"Nora likes **strawberry** jam.","ko":"노라는 딸기잼을 좋아한다."}]},{"id":"vocab-2556","word":"stream","ipa":"/striːm/","kr":"**스트림ː**","mark":"**","pos":"명","mean":"① 개울 ② 시내","ex":[{"en":"A small **stream** runs nearby.","ko":"작은 개울이 근처에 흐른다."},{"en":"A clear **stream** runs through the forest.","ko":"맑은 시내가 숲을 통과해 흐른다."}]},{"id":"vocab-2557","word":"street","ipa":"/striːt/","kr":"**스트리ː**트","mark":"*","pos":"명","mean":"① 거리 ② 도로","ex":[{"en":"The **street** is very busy.","ko":"그 거리는 매우 붐빈다."},{"en":"The **street** is closed for repairs.","ko":"그 도로는 수리를 위해 폐쇄되어 있다."}]},{"id":"vocab-2558","word":"stress","ipa":"/stres/","kr":"**스트레스**","mark":"**","pos":"명/동","mean":"① 스트레스 ② 강조하다","ex":[{"en":"Too much **stress** can harm your health.","ko":"너무 많은 스트레스는 건강을 해칠 수 있다."},{"en":"This manager **stressed** the need for security.","ko":"이 관리자는 보안의 필요성을 강조했다."}]},{"id":"vocab-2559","word":"stretch","ipa":"/stretʃ/","kr":"**스트레치**","mark":"**","pos":"동","mean":"① 늘이다 ② 뻗다","ex":[{"en":"**Stretch** your arms before exercise.","ko":"운동 전에 팔을 늘여라."},{"en":"**Stretch** your arms above your head.","ko":"팔을 머리 위로 뻗어라."}]},{"id":"vocab-2560","word":"strict","ipa":"/strɪkt/","kr":"**스트릭트**","mark":"","pos":"형","mean":"엄격한","ex":[{"en":"Our teacher is **strict** but fair.","ko":"우리 선생님은 엄격하지만 공정하다."}]},{"id":"vocab-2561","word":"strike","ipa":"/straɪk/","kr":"**스트라익**","mark":"**","pos":"동/명","mean":"① 치다 ② 파업","ex":[{"en":"The ball **struck** the window.","ko":"공이 창문을 쳤다."},{"en":"The workers began a **strike** on Monday.","ko":"노동자들은 월요일에 파업을 시작했다."}]},{"id":"vocab-2562","word":"string","ipa":"/strɪŋ/","kr":"**스트링**","mark":"**","pos":"명","mean":"① 끈 ② 줄","ex":[{"en":"Tie the package with **string**.","ko":"소포를 끈으로 묶어라."},{"en":"A piece of **string** held the box shut.","ko":"끈 한 조각이 상자가 닫힌 상태를 유지하게 했다."}]},{"id":"vocab-2563","word":"strip","ipa":"/strɪp/","kr":"**스트립**","mark":"","pos":"동/명","mean":"① 벗기다 ② 가느다란 조각","ex":[{"en":"She **stripped** the old paint.","ko":"그녀는 오래된 페인트를 벗겨 냈다."},{"en":"Cut the paper into **strips**.","ko":"종이를 가느다란 조각으로 잘라라."}]},{"id":"vocab-2564","word":"stripe","ipa":"/straɪp/","kr":"**스트라입**","mark":"","pos":"명","mean":"줄무늬","ex":[{"en":"The shirt has blue **stripes**.","ko":"그 셔츠에는 파란 줄무늬가 있다."}]},{"id":"vocab-2565","word":"stroke","ipa":"/stroʊk/","kr":"**스트로크**","mark":"","pos":"명","mean":"① 뇌졸중 ② 타격 ③ 쓰다듬기","ex":[{"en":"David had a **stroke** last year.","ko":"데이비드는 작년에 뇌졸중을 겪었다."},{"en":"One strong **stroke** sent the ball forward.","ko":"한 번의 강한 타격이 공을 앞으로 보냈다."},{"en":"The dog relaxed after a gentle **stroke**.","ko":"그 개는 부드러운 쓰다듬기 후 편안해졌다."}]},{"id":"vocab-2566","word":"strong","ipa":"/strɔːŋ/","kr":"**스트롱ː**","mark":"*","pos":"형","mean":"① 강한 ② 튼튼한","ex":[{"en":"We need a **strong** password.","ko":"우리는 강한 비밀번호가 필요하다."},{"en":"This rope is very **strong**.","ko":"이 밧줄은 매우 튼튼하다."}]},{"id":"vocab-2567","word":"structure","ipa":"/ˈstrʌktʃər/","kr":"**스트럭**처","mark":"**","pos":"명","mean":"① 구조 ② 건축물","ex":[{"en":"The bridge has a simple **structure**.","ko":"그 다리는 구조가 단순하다."},{"en":"The old **structure** needs repairs.","ko":"그 오래된 건축물은 수리가 필요하다."}]},{"id":"vocab-2568","word":"struggle","ipa":"/ˈstrʌɡl/","kr":"**스트러**글","mark":"**","pos":"동/명","mean":"① 애쓰다 ② 투쟁","ex":[{"en":"I **struggled** to understand the message.","ko":"나는 그 메시지를 이해하려고 애썼다."},{"en":"The workers continued their **struggle** for fair pay.","ko":"노동자들은 공정한 임금을 위한 투쟁을 계속했다."}]},{"id":"vocab-2569","word":"studio","ipa":"/ˈstuːdioʊ/","kr":"**스투ː**디오","mark":"**","pos":"명","mean":"① 작업실 ② 스튜디오","ex":[{"en":"The artist works in a **studio**.","ko":"그 예술가는 작업실에서 일한다."},{"en":"The video was recorded in a small **studio**.","ko":"그 영상은 작은 스튜디오에서 녹화되었다."}]},{"id":"vocab-2570","word":"study (student)","ipa":"/ˈstʌdi/","kr":"**스터**디","mark":"*","pos":"동/명","mean":"① 공부하다 ② 연구","ex":[{"en":"I **study** English every day.","ko":"나는 매일 영어를 공부한다."},{"en":"The **study** found a clear pattern.","ko":"그 연구는 명확한 패턴을 발견했다."}]},{"id":"vocab-2571","word":"stuff","ipa":"/stʌf/","kr":"**스터프**","mark":"**","pos":"명","mean":"① 물건 ② 것","ex":[{"en":"Put your **stuff** in the bag.","ko":"네 물건을 가방에 넣어라."},{"en":"Please move your **stuff** off the desk.","ko":"네 물건들을 책상에서 치워 주세요."}]},{"id":"vocab-2572","word":"style","ipa":"/staɪl/","kr":"**스타일**","mark":"*","pos":"명","mean":"① 스타일 ② 방식","ex":[{"en":"Grace has her own **style**.","ko":"그레이스는 자신만의 스타일을 지녔다."},{"en":"I like her writing **style**.","ko":"나는 그녀의 글쓰기 방식을 좋아한다."}]},{"id":"vocab-2573","word":"subject (subjective)","ipa":"/ˈsʌbdʒɪkt/","kr":"**서브**직트","mark":"**","pos":"명","mean":"① 과목 ② 주제 ③ 대상","ex":[{"en":"Math became my favorite **subject** in middle school.","ko":"수학은 중학교 때 내가 가장 좋아하는 과목이 되었다."},{"en":"The **subject** of the meeting is remote work.","ko":"그 회의의 주제는 원격근무다."},{"en":"The patients were **subjects** in the study.","ko":"그 환자들은 그 연구의 대상이었다."}]},{"id":"vocab-2574","word":"submarine","ipa":"/ˌsʌbməˈriːn/","kr":"서브머**린ː**","mark":"","pos":"명","mean":"잠수함","ex":[{"en":"The **submarine** moved under the sea.","ko":"잠수함은 바다 아래로 움직였다."}]},{"id":"vocab-2575","word":"submit (submission)","ipa":"/səbˈmɪt/","kr":"섭**밋**","mark":"","pos":"동","mean":"제출하다","ex":[{"en":"Please **submit** your report today.","ko":"오늘 보고서를 제출해 주세요."}]},{"id":"vocab-2576","word":"subscribe","ipa":"/səbˈskraɪb/","kr":"섭**스크라이브**","mark":"","pos":"동","mean":"구독하다","ex":[{"en":"I **subscribe** to a magazine.","ko":"나는 잡지를 구독한다."}]},{"id":"vocab-2577","word":"substance (substantial)","ipa":"/ˈsʌbstəns/","kr":"**서브**스턴스","mark":"","pos":"명","mean":"물질","ex":[{"en":"Water is a common **substance**.","ko":"물은 흔한 물질이다."}]},{"id":"vocab-2578","word":"substitute","ipa":"/ˈsʌbstɪtuːt/","kr":"**서브**스티투ː트","mark":"","pos":"명/동","mean":"① 대체물 ② 대신하다","ex":[{"en":"Honey can be a **substitute** for sugar.","ko":"꿀은 설탕의 대체물이 될 수 있다."},{"en":"Use yogurt as a **substitute** for cream.","ko":"크림 대신 요구르트를 사용해라."}]},{"id":"vocab-2579","word":"subtle","ipa":"/ˈsʌtl/","kr":"**서**틀","mark":"","pos":"형","mean":"① 미묘한 ② 은은한","ex":[{"en":"A **subtle** difference changes the tone.","ko":"미묘한 차이가 어조를 바꾼다."},{"e
