":"직선을 그어라."},{"en":"Passengers formed a straight **line** at the gate.","ko":"승객들은 탑승구에서 일렬로 줄을 섰다."}]},{"id":"vocab-1577","word":"linguistic","ipa":"/lɪŋˈɡwɪstɪk/","kr":"링**귀**스틱","mark":"","pos":"형","mean":"① 언어의 ② 언어학의","ex":[{"en":"Sophia has strong **linguistic** skills.","ko":"소피아는 뛰어난 언어 능력을 지녔다."},{"en":"Grace studies **linguistic** theory at university.","ko":"그레이스는 대학에서 언어학 이론을 공부한다."}]},{"id":"vocab-1578","word":"link","ipa":"/lɪŋk/","kr":"**링크**","mark":"**","pos":"명/동","mean":"① 연결 ② 연결하다","ex":[{"en":"There is a direct **link** between the two errors.","ko":"두 오류 사이에는 직접적인 연결이 있다."},{"en":"The bridge **links** the two towns.","ko":"그 다리는 두 마을을 연결한다."}]},{"id":"vocab-1579","word":"lion","ipa":"/ˈlaɪən/","kr":"**라이**언","mark":"*","pos":"명","mean":"사자","ex":[{"en":"The **lion** rested under a tree.","ko":"사자는 나무 아래에서 쉬었다."}]},{"id":"vocab-1580","word":"lip","ipa":"/lɪp/","kr":"**립**","mark":"*","pos":"명","mean":"입술","ex":[{"en":"Emma bit her **lip**.","ko":"엠마는 입술을 깨물었다."}]},{"id":"vocab-1581","word":"liquid","ipa":"/ˈlɪkwɪd/","kr":"**리**퀴드","mark":"","pos":"명/형","mean":"① 액체 ② 액체의","ex":[{"en":"The blue **liquid** is safe to use.","ko":"그 파란 액체는 사용하기에 안전하다."},{"en":"Water is a **liquid**.","ko":"물은 액체다."}]},{"id":"vocab-1582","word":"list","ipa":"/lɪst/","kr":"**리스트**","mark":"**","pos":"명/동","mean":"① 목록 ② 나열하다","ex":[{"en":"Make a **list** of things to buy.","ko":"살 것들의 목록을 만들어라."},{"en":"Please **list** the required documents.","ko":"필요한 문서들을 나열해 주세요."}]},{"id":"vocab-1583","word":"listen","ipa":"/ˈlɪsn/","kr":"**리**슨","mark":"*","pos":"동","mean":"① 듣다 ② 귀 기울이다","ex":[{"en":"**Listen** to the recorded message.","ko":"녹음된 메시지를 들어라."},{"en":"Please **listen** carefully to the customer.","ko":"고객에게 주의 깊게 귀 기울여 주세요."}]},{"id":"vocab-1584","word":"literature","ipa":"/ˈlɪtrətʃər/","kr":"**리**트러처","mark":"","pos":"명","mean":"문학","ex":[{"en":"Nora studies English **literature**.","ko":"노라는 영문학을 공부한다."}]},{"id":"vocab-1585","word":"little","ipa":"/ˈlɪtl/","kr":"**리**틀","mark":"*","pos":"형","mean":"① 작은 ② 거의 없는","ex":[{"en":"The **little** dog barked.","ko":"그 작은 개가 짖었다."},{"en":"I have **little** time today.","ko":"나는 오늘 시간이 거의 없다."}]},{"id":"vocab-1586","word":"live","ipa":"/lɪv/","kr":"**리브**","mark":"*","pos":"동","mean":"살다","ex":[{"en":"They **live** near the main office.","ko":"그들은 본사 근처에 산다."}]},{"id":"vocab-1587","word":"livingroom","ipa":"/ˈlɪvɪŋruːm/","kr":"**리**빙룸","mark":"**","pos":"명","mean":"거실","ex":[{"en":"The family gathered in the **living room**.","ko":"가족은 거실에 모였다."}]},{"id":"vocab-1588","word":"load","ipa":"/loʊd/","kr":"**로드**","mark":"**","pos":"명/동","mean":"① 짐 ② 싣다","ex":[{"en":"The truck carried a heavy **load**.","ko":"그 트럭은 무거운 짐을 실었다."},{"en":"Workers **loaded** the equipment onto the truck.","ko":"작업자들은 장비를 트럭에 실었다."}]},{"id":"vocab-1589","word":"loan","ipa":"/loʊn/","kr":"**론**","mark":"**","pos":"명/동","mean":"① 대출 ② 빌려주다","ex":[{"en":"Claire took out a bank **loan**.","ko":"클레어는 은행 대출을 받았다."},{"en":"The bank will **loan** us the money.","ko":"은행은 우리에게 돈을 빌려줄 것이다."}]},{"id":"vocab-1590","word":"local","ipa":"/ˈloʊkl/","kr":"**로**컬","mark":"**","pos":"형","mean":"① 지역의 ② 현지의","ex":[{"en":"We bought food at a **local** market.","ko":"우리는 지역 시장에서 음식을 샀다."},{"en":"A **local** guide showed us the city.","ko":"현지의 안내원이 우리에게 도시를 보여 주었다."}]},{"id":"vocab-1591","word":"locate","ipa":"/ˈloʊkeɪt/","kr":"**로**케이트","mark":"**","pos":"동","mean":"① 위치시키다 ② 찾아내다","ex":[{"en":"The main office is **located** near the station.","ko":"본사 사무실은 역 근처에 위치해 있다."},{"en":"The search team **located** the missing file.","ko":"검색팀은 사라진 파일을 찾아냈다."}]},{"id":"vocab-1592","word":"lock","ipa":"/lɑːk/","kr":"**락**","mark":"**","pos":"명/동","mean":"① 자물쇠 ② 잠그다","ex":[{"en":"The old door has a broken **lock**.","ko":"그 낡은 문에는 고장 난 자물쇠가 있다."},{"en":"**Lock** your computer before leaving.","ko":"떠나기 전에 컴퓨터를 잠가라."}]},{"id":"vocab-1593","word":"log","ipa":"/lɔːɡ/","kr":"**로ː**그","mark":"**","pos":"명/동","mean":"① 통나무 ② 기록하다","ex":[{"en":"They sat on a fallen **log**.","ko":"그들은 쓰러진 통나무에 앉았다."},{"en":"Please **log** every support request.","ko":"모든 지원 요청을 기록해 주세요."}]},{"id":"vocab-1594","word":"logic","ipa":"/ˈlɑːdʒɪk/","kr":"**라**직","mark":"","pos":"명","mean":"논리","ex":[{"en":"I cannot follow his **logic**.","ko":"나는 그의 논리를 이해할 수 없다."}]},{"id":"vocab-1595","word":"lone","ipa":"/loʊn/","kr":"**론**","mark":"","pos":"형","mean":"① 혼자의 ② 외로운","ex":[{"en":"A **lone** worker remained in the office.","ko":"한 명의 혼자인 작업자가 사무실에 남았다."},{"en":"A **lone** traveler waited at the station.","ko":"외로운 여행자 한 명이 역에서 기다렸다."}]},{"id":"vocab-1596","word":"long","ipa":"/lɔːŋ/","kr":"**롱ː**","mark":"*","pos":"형/부","mean":"① 긴 ② 오래","ex":[{"en":"Claire has **long** hair.","ko":"클레어는 긴 머리를 지녔다."},{"en":"Our meeting continued for a **long** time.","ko":"우리 회의는 오랫동안 계속되었다."}]},{"id":"vocab-1597","word":"look","ipa":"/lʊk/","kr":"**룩**","mark":"*","pos":"동/명","mean":"① 보다 ② 표정","ex":[{"en":"**Look** at the board.","ko":"칠판을 보아라."},{"en":"Mina had a worried **look** on her face.","ko":"미나는 얼굴에 걱정스러운 표정을 지었다."}]},{"id":"vocab-1598","word":"loose","ipa":"/luːs/","kr":"**루ː**스","mark":"**","pos":"형","mean":"① 헐거운 ② 느슨한","ex":[{"en":"This cable is **loose** in the socket.","ko":"이 케이블은 소켓에서 헐겁다."},{"en":"The rules are too **loose** and unclear.","ko":"그 규칙들은 너무 느슨하고 불명확하다."}]},{"id":"vocab-1599","word":"lose","ipa":"/luːz/","kr":"**루ː**즈","mark":"**","pos":"동","mean":"① 잃다 ② 지다","ex":[{"en":"Do not **lose** your access card.","ko":"출입 카드를 잃지 마라."},{"en":"Don't **lose** your ticket.","ko":"표를 잃어버리지 마라."}]},{"id":"vocab-1600","word":"loss","ipa":"/lɔːs/","kr":"**로ː**스","mark":"**","pos":"명","mean":"① 상실 ② 손실","ex":[{"en":"The **loss** of data delayed the project.","ko":"자료의 상실이 프로젝트를 지연시켰다."},{"en":"The business reported a large **loss**.","ko":"그 사업체는 큰 손실을 보고했다."}]},{"id":"vocab-1601","word":"lot","ipa":"/lɑːt/","kr":"**랏**","mark":"**","pos":"명","mean":"① 많음 ② 다량","ex":[{"en":"A **lot** means a large amount.","ko":"많음은 많은 양을 뜻한다."},{"en":"We ordered a **lot** of office supplies.","ko":"우리는 다량의 사무용품을 주문했다."}]},{"id":"vocab-1602","word":"loud","ipa":"/laʊd/","kr":"**라우드**","mark":"**","pos":"형","mean":"① 시끄러운 ② 큰 소리의","ex":[{"en":"The printer makes a **loud** noise.","ko":"그 프린터는 시끄러운 소리를 낸다."},{"en":"A **loud** alarm woke everyone.","ko":"큰 소리의 경보가 모두를 깨웠다."}]},{"id":"vocab-1603","word":"love","ipa":"/lʌv/","kr":"**러브**","mark":"*","pos":"동/명","mean":"① 사랑하다 ② 사랑","ex":[{"en":"She **loves** her family.","ko":"그녀는 가족을 사랑한다."},{"en":"Their **love** grew over time.","ko":"그들의 사랑은 시간이 지나며 커졌다."}]},{"id":"vocab-1604","word":"low","ipa":"/loʊ/","kr":"**로**","mark":"*","pos":"형","mean":"낮은","ex":[{"en":"The table is too **low**.","ko":"그 탁자는 너무 낮다."}]},{"id":"vocab-1605","word":"loyal","ipa":"/ˈlɔɪəl/","kr":"**로이**얼","mark":"","pos":"형","mean":"충성스러운","ex":[{"en":"Dogs are **loyal** animals.","ko":"개는 충성스러운 동물이다."}]},{"id":"vocab-1606","word":"luck","ipa":"/lʌk/","kr":"**럭**","mark":"*","pos":"명","mean":"① 운 ② 행운","ex":[{"en":"Success takes skill and **luck**.","ko":"성공에는 기술과 운이 필요하다."},{"en":"Good **luck** on your test.","ko":"시험에서 행운을 빈다."}]},{"id":"vocab-1607","word":"lump","ipa":"/lʌmp/","kr":"**럼프**","mark":"","pos":"명","mean":"① 덩어리 ② 혹","ex":[{"en":"There was a **lump** of sugar in the cup.","ko":"컵 안에 설탕 덩어리가 있었다."},{"en":"The doctor checked the **lump** on his neck.","ko":"의사는 그의 목에 난 혹을 확인했다."}]},{"id":"vocab-1608","word":"lunch","ipa":"/lʌntʃ/","kr":"**런치**","mark":"*","pos":"명","mean":"점심","ex":[{"en":"We had **lunch** at noon.","ko":"우리는 정오에 점심을 먹었다."}]},{"id":"vocab-1609","word":"luxury","ipa":"/ˈlʌɡʒəri/","kr":"**럭**셔리","mark":"","pos":"명","mean":"① 사치 ② 호화","ex":[{"en":"A private pool is a **luxury**.","ko":"개인 수영장은 사치다."},{"en":"They stayed in a hotel of great **luxury**.","ko":"그들은 매우 호화로운 호텔에 머물렀다."}]},{"id":"vocab-1610","word":"machine","ipa":"/məˈʃiːn/","kr":"머**신ː**","mark":"**","pos":"명","mean":"기계","ex":[{"en":"This **machine** washes dishes.","ko":"이 기계는 접시를 씻는다."}]},{"id":"vocab-1611","word":"mad","ipa":"/mæd/","kr":"**매드**","mark":"*","pos":"형","mean":"① 화난 ② 미친","ex":[{"en":"One customer was **mad** about the long delay.","ko":"한 고객은 긴 지연에 화가 났다."},{"en":"The idea sounded **mad** at first.","ko":"그 생각은 처음에는 미친 것처럼 들렸다."}]},{"id":"vocab-1612","word":"magazine","ipa":"/ˈmæɡəziːn/","kr":"**매**거진","mark":"**","pos":"명","mean":"잡지","ex":[{"en":"I read a fashion **magazine**.","ko":"나는 패션 잡지를 읽었다."}]},{"id":"vocab-1613","word":"magic","ipa":"/ˈmædʒɪk/","kr":"**매**직","mark":"**","pos":"명/형","mean":"① 마법 ② 마술의","ex":[{"en":"The show was full of **magic**.","ko":"그 공연은 마법으로 가득했다."},{"en":"The magician performed a **magic** trick.","ko":"마술사는 마술을 보여 주었다."}]},{"id":"vocab-1614","word":"magnet","ipa":"/ˈmæɡnət/","kr":"**매**그넛","mark":"","pos":"명","mean":"자석","ex":[{"en":"The **magnet** attracts iron.","ko":"그 자석은 철을 끌어당긴다."}]},{"id":"vocab-1615","word":"magnificent","ipa":"/mæɡˈnɪfɪsnt/","kr":"매그**니**피슨트","mark":"","pos":"형","mean":"① 웅장한 ② 훌륭한","ex":[{"en":"The view was **magnificent**.","ko":"그 경치는 웅장했다."},{"en":"Lina did a **magnificent** job on the project.","ko":"리나는 그 프로젝트에서 훌륭한 일을 했다."}]},{"id":"vocab-1616","word":"mail","ipa":"/meɪl/","kr":"**메일**","mark":"*","pos":"명/동","mean":"① 우편 ② 부치다","ex":[{"en":"I **mailed** the package yesterday.","ko":"나는 어제 그 소포를 우편으로 보냈다."},{"en":"Please **mail** the signed contract today.","ko":"오늘 서명된 계약서를 부쳐 주세요."}]},{"id":"vocab-1617","word":"main","ipa":"/meɪn/","kr":"**메인**","mark":"**","pos":"형","mean":"① 주요한 ② 주된","ex":[{"en":"This is the **main** road.","ko":"이것이 주요 도로다."},{"en":"What is the **main** reason for the delay?","ko":"지연의 주된 이유는 무엇인가요?"}]},{"id":"vocab-1618","word":"maintain","ipa":"/meɪnˈteɪn/","kr":"메인**테인**","mark":"**","pos":"동","mean":"① 유지하다 ② 지키다","ex":[{"en":"Exercise helps **maintain** good health.","ko":"운동은 건강을 유지하는 데 도움이 된다."},{"en":"We must **maintain** data security.","ko":"우리는 자료 보안을 지켜야 한다."}]},{"id":"vocab-1619","word":"major (majority)","ipa":"/ˈmeɪdʒər/","kr":"**메이**저","mark":"**","pos":"형","mean":"① 주요한 ② 중대한","ex":[{"en":"Pollution is a **major** problem.","ko":"오염은 주요 문제다."},{"en":"The outage created a **major** problem for users.","ko":"그 장애는 사용자들에게 중대한 문제를 일으켰다."}]},{"id":"vocab-1620","word":"make","ipa":"/meɪk/","kr":"**메익**","mark":"*","pos":"동","mean":"만들다","ex":[{"en":"She **made** a cake for me.","ko":"그녀는 나를 위해 케이크를 만들었다."}]},{"id":"vocab-1621","word":"male","ipa":"/meɪl/","kr":"**메일**","mark":"**","pos":"명/형","mean":"① 남성 ② 수컷의","ex":[{"en":"The survey included both **male** and female staff.","ko":"그 조사는 남성 직원과 여성 직원을 모두 포함했다."},{"en":"The **male** bird has bright feathers.","ko":"수컷 새는 밝은 깃털을 가지고 있다."}]},{"id":"vocab-1622","word":"man","ipa":"/mæn/","kr":"**맨**","mark":"*","pos":"명","mean":"① 남자 ② 사람","ex":[{"en":"A **man** opened the door.","ko":"한 남자가 문을 열었다."},{"en":"**Man** needs water to live.","ko":"사람은 살기 위해 물이 필요하다."}]},{"id":"vocab-1623","word":"manage","ipa":"/ˈmænɪdʒ/","kr":"**매**니지","mark":"**","pos":"동","mean":"① 관리하다 ② 해내다","ex":[{"en":"She **manages** a large team.","ko":"그녀는 큰 팀을 관리한다."},{"en":"We **managed** to finish before the deadline.","ko":"우리는 마감 전에 끝내는 데 성공했다."}]},{"id":"vocab-1624","word":"manifest","ipa":"/ˈmænɪfest/","kr":"**매**니페스트","mark":"","pos":"동/형","mean":"① 나타내다 ② 명백한","ex":[{"en":"Her actions **manifest** clear concern for the team.","ko":"그녀의 행동은 팀에 대한 분명한 관심을 나타낸다."},{"en":"The benefits of the change are **manifest**.","ko":"그 변화의 이점은 명백하다."}]},{"id":"vocab-1625","word":"manipulate","ipa":"/məˈnɪpjuleɪt/","kr":"머**니**퓰레이트","mark":"","pos":"동","mean":"① 조종하다 ② 조작하다","ex":[{"en":"He **manipulated** the controls carefully.","ko":"그는 조종 장치를 조심스럽게 다루었다."},{"en":"Do not **manipulate** the figures in the report.","ko":"보고서의 수치를 조작하지 마라."}]},{"id":"vocab-1626","word":"manner","ipa":"/ˈmænər/","kr":"**매**너","mark":"**","pos":"명","mean":"① 방식 ② 태도","ex":[{"en":"Please handle the issue in a calm **manner**.","ko":"그 문제를 침착한 방식으로 처리해 주세요."},{"en":"Nora spoke in a kind **manner**.","ko":"노라는 친절한 태도로 말했다."}]},{"id":"vocab-1627","word":"manufacture","ipa":"/ˌmænjuˈfæktʃər/","kr":"매뉴**팩**처","mark":"**","pos":"동/명","mean":"① 제조하다 ② 제조","ex":[{"en":"They **manufacture** cars.","ko":"그들은 자동차를 제조한다."},{"en":"The **manufacture** of these parts takes time.","ko":"이 부품들의 제조에는 시간이 걸린다."}]},{"id":"vocab-1628","word":"many","ipa":"/ˈmeni/","kr":"**메**니","mark":"*","pos":"형/대","mean":"① 많은 ② 다수","ex":[{"en":"**Many** students joined the club this semester.","ko":"많은 학생이 이번 학기에 동아리에 가입했다."},{"en":"A great **many** applied, but only a few were hired.","ko":"다수가 지원했지만 소수만 채용되었다."}]},{"id":"vocab-1629","word":"map","ipa":"/mæp/","kr":"**맵**","mark":"*","pos":"명","mean":"지도","ex":[{"en":"Find the city on the **map**.","ko":"지도에서 그 도시를 찾아라."}]},{"id":"vocab-1630","word":"marathon","ipa":"/ˈmærəθɑːn/","kr":"**매**러싼","mark":"*","pos":"명","mean":"마라톤","ex":[{"en":"Nora finished her first **marathon**.","ko":"노라는 첫 마라톤을 완주했다."}]},{"id":"vocab-1631","word":"margin","ipa":"/ˈmɑːrdʒɪn/","kr":"**마ː**진","mark":"","pos":"명","mean":"① 여백 ② 차이","ex":[{"en":"Write your name in the **margin**.","ko":"여백에 이름을 써라."},{"en":"Our sales **margin** was ten percent higher.","ko":"우리 판매 차이는 10퍼센트 더 높았다."}]},{"id":"vocab-1632","word":"marine","ipa":"/məˈriːn/","kr":"머**린ː**","mark":"","pos":"형","mean":"① 해양의 ② 바다의","ex":[{"en":"Plastic harms **marine** life.","ko":"플라스틱은 해양 생물에 해를 끼친다."},{"en":"The boat returned from the open **marine** waters.","ko":"그 배는 바다의 열린 수역에서 돌아왔다."}]},{"id":"vocab-1633","word":"mark","ipa":"/mɑːrk/","kr":"**마ː**크","mark":"**","pos":"명/동","mean":"① 표시 ② 자국 ③ 표시하다","ex":[{"en":"Put a **mark** next to each completed task.","ko":"완료된 각 업무 옆에 표시를 해라."},{"en":"There is a **mark** on the wall.","ko":"벽에 자국이 있다."},{"en":"**Mark** the correct answer.","ko":"정답에 표시해라."}]},{"id":"vocab-1634","word":"market","ipa":"/ˈmɑːrkɪt/","kr":"**마ː**킷","mark":"*","pos":"명","mean":"시장","ex":[{"en":"We bought vegetables at the **market**.","ko":"우리는 시장에서 채소를 샀다."}]},{"id":"vocab-1635","word":"marry","ipa":"/ˈmæri/","kr":"**매**리","mark":"*","pos":"동","mean":"결혼하다","ex":[{"en":"They **married** last spring.","ko":"그들은 지난봄에 결혼했다."}]},{"id":"vocab-1636","word":"marvel","ipa":"/ˈmɑːrvl/","kr":"**마ː**블","mark":"**","pos":"명/동","mean":"① 경이 ② 경탄하다","ex":[{"en":"The new bridge is a **marvel** of engineering.","ko":"그 새 다리는 공학의 경이다."},{"en":"We **marveled** at the view.","ko":"우리는 그 경치에 경탄했다."}]},{"id":"vocab-1637","word":"mask","ipa":"/mæsk/","kr":"**매스크**","mark":"**","pos":"명","mean":"① 마스크 ② 가면","ex":[{"en":"The doctor wore a **mask**.","ko":"의사는 마스크를 썼다."},{"en":"A wooden **mask** covered the actor’s face.","ko":"나무 가면이 배우의 얼굴을 가렸다."}]},{"id":"vocab-1638","word":"mass","ipa":"/mæs/","kr":"**매스**","mark":"**","pos":"명/형","mean":"① 덩어리 ② 대량 ③ 대중의","ex":[{"en":"A **mass** of clouds covered the sky.","ko":"구름 덩어리가 하늘을 덮었다."},{"en":"We ordered office paper in **mass** quantities.","ko":"우리는 사무용 종이를 대량으로 주문했다."},{"en":"The campaign used **mass** media.","ko":"그 캠페인은 대중 매체를 사용했다."}]},{"id":"vocab-1639","word":"master","ipa":"/ˈmæstər/","kr":"**매**스터","mark":"**","pos":"명/동","mean":"① 주인 ② 대가 ③ 숙달하다","ex":[{"en":"The dog followed its **master**.","ko":"그 개는 주인을 따라갔다."},{"en":"Leo is a **master** of chess.","ko":"레오는 체스의 대가다."},{"en":"She **mastered** the basic skills.","ko":"그녀는 기본 기술을 숙달했다."}]},{"id":"vocab-1640","word":"match","ipa":"/mætʃ/","kr":"**매치**","mark":"**","pos":"명/동","mean":"① 성냥 ② 경기 ③ 어울리다","ex":[{"en":"Lucas lit the candle with a **match**.","ko":"루카스는 성냥으로 촛불을 켰다."},{"en":"We watched a soccer **match**.","ko":"우리는 축구 경기를 봤다."},{"en":"The blue chairs **match** the office walls.","ko":"파란 의자들은 사무실 벽과 잘 어울린다."}]},{"id":"vocab-1641","word":"mate","ipa":"/meɪt/","kr":"**메잇**","mark":"**","pos":"명","mean":"① 친구 ② 짝","ex":[{"en":"Noah is a good work **mate**.","ko":"노아는 좋은 직장 동료다."},{"en":"The bird stayed close to its **mate**.","ko":"그 새는 짝 가까이에 머물렀다."}]},{"id":"vocab-1642","word":"mathematics / maths / math","ipa":"/ˌmæθəˈmætɪks/","kr":"매써**매**틱스","mark":"*","pos":"명","mean":"수학","ex":[{"en":"**Math** is my favorite subject.","ko":"수학은 내가 가장 좋아하는 과목이다."}]},{"id":"vocab-1643","word":"matter (material)","ipa":"/ˈmætər/","kr":"**매**터","mark":"**","pos":"명/동","mean":"① 문제 ② 물질 ③ 중요하다","ex":[{"en":"This is a serious **matter** for HR.","ko":"이것은 HR의 심각한 문제다."},{"en":"Dark **matter** is difficult to study.","ko":"암흑 물질은 연구하기 어렵다."},{"en":"Your opinion **matters** to me.","ko":"네 의견은 나에게 중요하다."}]},{"id":"vocab-1644","word":"mature","ipa":"/məˈtʃʊr/","kr":"머**추어**","mark":"","pos":"형/동","mean":"① 성숙한 ② 익다","ex":[{"en":"Grace is **mature** for her age.","ko":"그레이스는 나이에 비해 성숙하다."},{"en":"The fruit will **mature** in late summer.","ko":"그 과일은 늦여름에 익을 것이다."}]},{"id":"vocab-1645","word":"maximum","ipa":"/ˈmæksɪməm/","kr":"**맥**시멈","mark":"**","pos":"명/형","mean":"① 최대 ② 최대의","ex":[{"en":"The room has a **maximum** of twenty seats.","ko":"그 방의 최대는 좌석 스무 개다."},{"en":"Do not exceed the **maximum** speed.","ko":"최대의 속도를 넘지 마라."}]},{"id":"vocab-1646","word":"may","ipa":"/meɪ/","kr":"**메이**","mark":"*","pos":"동","mean":"① ~해도 된다 ② ~일지도 모른다","ex":[{"en":"You **may** leave after the meeting.","ko":"회의 후에 떠나도 된다."},{"en":"It **may** rain this afternoon.","ko":"오늘 오후에 비가 올지도 모른다."}]},{"id":"vocab-1647","word":"maybe","ipa":"/ˈmeɪbi/","kr":"**메이**비","mark":"**","pos":"부","mean":"① 어쩌면 ② 아마","ex":[{"en":"**Maybe** she will come.","ko":"어쩌면 그녀가 올지도 모른다."},{"en":"**Maybe** we can meet tomorrow.","ko":"아마 우리는 내일 만날 수 있을 것이다."}]},{"id":"vocab-1648","word":"mayor","ipa":"/ˈmeɪər/","kr":"**메이**어","mark":"","pos":"명","mean":"시장","ex":[{"en":"The **mayor** opened the new park.","ko":"시장이 새 공원을 개장했다."}]},{"id":"vocab-1649","word":"meal","ipa":"/miːl/","kr":"**밀ː**","mark":"**","pos":"명","mean":"① 식사 ② 끼니","ex":[{"en":"Breakfast is an important **meal**.","ko":"아침 식사는 중요한 식사다."},{"en":"Breakfast is the first **meal** of the day.","ko":"아침 식사는 하루의 첫 끼니다."}]},{"id":"vocab-1650","word":"mean","ipa":"/miːn/","kr":"**민ː**","mark":"**","pos":"동/형","mean":"① 의미하다 ② 못된","ex":[{"en":"This symbol **means** an error.","ko":"이 기호는 오류를 의미한다."},{"en":"That was a **mean** comment.","ko":"그것은 못된 말이었다."}]},{"id":"vocab-1651","word":"meanwhile","ipa":"/ˈmiːnwaɪl/","kr":"**민ː**와일","mark":"","pos":"부","mean":"① 그동안 ② 한편","ex":[{"en":"I cooked dinner; **meanwhile**, he set the table.","ko":"나는 저녁을 요리했고 그동안 그는 식탁을 차렸다."},{"en":"The support team handled calls; **meanwhile**, IT fixed the server.","ko":"지원팀은 전화를 처리했다. 한편 IT팀은 서버를 고쳤다."}]},{"id":"vocab-1652","word":"measure","ipa":"/ˈmeʒər/","kr":"**메**저","mark":"**","pos":"동/명","mean":"① 측정하다 ② 조치","ex":[{"en":"We **measured** the room before buying desks.","ko":"우리는 책상을 사기 전에 방을 측정했다."},{"en":"A local company took a safety **measure**.","ko":"한 지역 회사는 안전 조치를 취했다."}]},{"id":"vocab-1653","word":"meat","ipa":"/miːt/","kr":"**미ː**트","mark":"*","pos":"명","mean":"고기","ex":[{"en":"We do not eat much **meat**.","ko":"우리는 고기를 많이 먹지 않는다."}]},{"id":"vocab-1654","word":"mechanic","ipa":"/məˈkænɪk/","kr":"머**캐**닉","mark":"","pos":"명","mean":"정비공","ex":[{"en":"The **mechanic** fixed the car.","ko":"정비공이 그 차를 고쳤다."}]},{"id":"vocab-1655","word":"mechanism","ipa":"/ˈmekənɪzəm/","kr":"**메**커니즘","mark":"","pos":"명","mean":"① 기제 ② 구조","ex":[{"en":"The study explains the **mechanism** of memory.","ko":"그 연구는 기억의 기제를 설명한다."},{"en":"The clock has a simple **mechanism**.","ko":"그 시계는 단순한 구조를 지녔다."}]},{"id":"vocab-1656","word":"medal","ipa":"/ˈmedl/","kr":"**메**들","mark":"*","pos":"명","mean":"메달","ex":[{"en":"Claire won a gold **medal**.","ko":"클레어는 금메달을 땄다."}]},{"id":"vocab-1657","word":"mediate","ipa":"/ˈmiːdieɪt/","kr":"**미ː**디에이트","mark":"","pos":"동","mean":"① 중재하다 ② 조정하다","ex":[{"en":"The teacher **mediated** the dispute.","ko":"선생님이 그 분쟁을 중재했다."},{"en":"HR offered to **mediate** between the two teams.","ko":"HR은 두 팀 사이를 중재하겠다고 제안했다."}]},{"id":"vocab-1658","word":"medical","ipa":"/ˈmedɪkl/","kr":"**메**디클","mark":"**","pos":"형","mean":"① 의학의 ② 의료의","ex":[{"en":"Grace reads **medical** journals.","ko":"그레이스는 의학 학술지를 읽는다."},{"en":"Hana needs **medical** care.","ko":"하나는 의료가 필요하다."}]},{"id":"vocab-1659","word":"medicine","ipa":"/ˈmedɪsn/","kr":"**메**디슨","mark":"**","pos":"명","mean":"① 약 ② 의학","ex":[{"en":"Take this **medicine** after meals.","ko":"이 약을 식후에 복용해라."},{"en":"Olivia studies **medicine** at university.","ko":"올리비아는 대학에서 의학을 공부한다."}]},{"id":"vocab-1660","word":"medieval","ipa":"/ˌmedˈiːvl/","kr":"메드**이ː**블","mark":"","pos":"형","mean":"중세의","ex":[{"en":"They visited a **medieval** castle.","ko":"그들은 중세의 성을 방문했다."}]},{"id":"vocab-1661","word":"medium (media)","ipa":"/ˈmiːdiəm/","kr":"**미ː**디엄","mark":"","pos":"명/형","mean":"① 매체 ② 중간의","ex":[{"en":"Television is a powerful **medium**.","ko":"텔레비전은 강력한 매체다."},{"en":"Choose a **medium** size.","ko":"중간 크기를 골라라."}]},{"id":"vocab-1662","word":"meet","ipa":"/miːt/","kr":"**미ː**트","mark":"*","pos":"동","mean":"만나다","ex":[{"en":"Let us **meet** after school.","ko":"방과 후에 만나자."}]},{"id":"vocab-1663","word":"melon","ipa":"/ˈmelən/","kr":"**멜**런","mark":"**","pos":"명","mean":"멜론","ex":[{"en":"The **melon** was sweet and juicy.","ko":"그 멜론은 달고 즙이 많았다."}]},{"id":"vocab-1664","word":"melt","ipa":"/melt/","kr":"**멜트**","mark":"**","pos":"동","mean":"① 녹다 ② 녹이다","ex":[{"en":"The ice will **melt** soon.","ko":"얼음은 곧 녹을 것이다."},{"en":"The ice **melted** in the sun.","ko":"얼음이 햇빛에 녹았다."}]},{"id":"vocab-1665","word":"member (membership)","ipa":"/ˈmembər/","kr":"**멤**버","mark":"*","pos":"명","mean":"① 회원 ② 구성원","ex":[{"en":"Hana is a **member** of the club.","ko":"하나는 그 클럽의 회원이다."},{"en":"Every **member** has a vote.","ko":"모든 구성원은 투표권이 있다."}]},{"id":"vocab-1666","word":"memory","ipa":"/ˈmeməri/","kr":"**메**머리","mark":"*","pos":"명","mean":"① 기억 ② 추억","ex":[{"en":"I have a clear **memory** of that day.","ko":"나는 그날을 또렷하게 기억한다."},{"en":"I have good **memories** of the trip.","ko":"나는 그 여행에 대한 좋은 추억이 있다."}]},{"id":"vocab-1667","word":"mental","ipa":"/ˈmentl/","kr":"**멘**틀","mark":"**","pos":"형","mean":"① 정신의 ② 마음의","ex":[{"en":"Exercise is good for **mental** health.","ko":"운동은 정신 건강에 좋다."},{"en":"Stress can affect your **mental** state.","ko":"스트레스는 당신의 마음 상태에 영향을 줄 수 있다."}]},{"id":"vocab-1668","word":"mention","ipa":"/ˈmenʃn/","kr":"**멘**션","mark":"**","pos":"동/명","mean":"① 언급하다 ② 언급","ex":[{"en":"She **mentioned** your name.","ko":"그녀는 네 이름을 언급했다."},{"en":"The latest report makes no **mention** of cost.","ko":"최근 보고서는 비용에 대한 언급이 없다."}]},{"id":"vocab-1669","word":"menu","ipa":"/ˈmenjuː/","kr":"**메**뉴","mark":"**","pos":"명","mean":"메뉴","ex":[{"en":"Please look at the **menu**.","ko":"메뉴를 봐 주세요."}]},{"id":"vocab-1670","word":"merchant","ipa":"/ˈmɜːrtʃənt/","kr":"**머ː**천트","mark":"","pos":"명","mean":"상인","ex":[{"en":"The **merchant** sold silk and spices.","ko":"그 상인은 비단과 향신료를 팔았다."}]},{"id":"vocab-1671","word":"mere","ipa":"/mɪr/","kr":"**미어**","mark":"","pos":"형","mean":"① 단지 ② 겨우 ~에 불과한","ex":[{"en":"David is a **mere** child.","ko":"데이비드는 단지 어린아이일 뿐이다."},{"en":"It was a **mere** mistake, not a lie.","ko":"그것은 단순한 실수였지 거짓말은 아니었다."}]},{"id":"vocab-1672","word":"merge","ipa":"/mɜːrdʒ/","kr":"**머ː**지","mark":"","pos":"동","mean":"① 합병하다 ② 합치다","ex":[{"en":"The two companies **merged**.","ko":"그 두 회사는 합병했다."},{"en":"Please **merge** the two files before upload.","ko":"업로드 전에 두 파일을 합쳐 주세요."}]},{"id":"vocab-1673","word":"merit","ipa":"/ˈmerɪt/","kr":"**메**릿","mark":"","pos":"명","mean":"① 장점 ② 가치","ex":[{"en":"The plan has some **merit**.","ko":"그 계획은 어느 정도 장점이 있다."},{"en":"The proposal has enough **merit** to discuss further.","ko":"그 제안은 더 논의할 만한 가치가 있다."}]},{"id":"vocab-1674","word":"mess","ipa":"/mes/","kr":"**메스**","mark":"**","pos":"명","mean":"① 엉망 ② 어질러진 상태","ex":[{"en":"Your room is a **mess**.","ko":"네 방은 엉망이다."},{"en":"The desk was a complete **mess**.","ko":"그 책상은 완전히 어질러진 상태였다."}]},{"id":"vocab-1675","word":"message","ipa":"/ˈmesɪdʒ/","kr":"**메**시지","mark":"**","pos":"명","mean":"① 메시지 ② 전언","ex":[{"en":"I left you a **message**.","ko":"나는 네게 메시지를 남겼다."},{"en":"Olivia left a verbal **message**.","ko":"올리비아는 전언을 남겼다."}]},{"id":"vocab-1676","word":"metal","ipa":"/ˈmetl/","kr":"**메**틀","mark":"**","pos":"명","mean":"금속","ex":[{"en":"Iron is a common **metal**.","ko":"철은 흔한 금속이다."}]},{"id":"vocab-1677","word":"method","ipa":"/ˈmeθəd/","kr":"**메**써드","mark":"**","pos":"명","mean":"방법","ex":[{"en":"This is an effective teaching **method**.","ko":"이것은 효과적인 교수 방법이다."}]},{"id":"vocab-1678","word":"metropolitan","ipa":"/ˌmetrəˈpɑːlɪtən/","kr":"메트러**팔**리턴","mark":"","pos":"형","mean":"대도시의","ex":[{"en":"Claire lives in a **metropolitan** area.","ko":"클레어는 대도시 지역에 산다."}]},{"id":"vocab-1679","word":"microphone","ipa":"/ˈmaɪkrəfoʊn/","kr":"**마이**크러폰","mark":"","pos":"명","mean":"마이크","ex":[{"en":"Speak into the **microphone**.","ko":"마이크에 대고 말해라."}]},{"id":"vocab-1680","word":"microwave","ipa":"/ˈmaɪkrəweɪv/","kr":"**마이**크러웨이브","mark":"**","pos":"명","mean":"전자레인지","ex":[{"en":"Heat the soup in the **microwave**.","ko":"전자레인지에서 수프를 데워라."}]},{"id":"vocab-1681","word":"middle","ipa":"/ˈmɪdl/","kr":"**미**들","mark":"*","pos":"명/형","mean":"① 중간 ② 가운데의","ex":[{"en":"We took a break in the **middle** of the meeting.","ko":"우리는 회의 중간에 휴식했다."},{"en":"The **middle** seat is empty.","ko":"가운데의 좌석은 비어 있다."}]},{"id":"vocab-1682","word":"might","ipa":"/maɪt/","kr":"**마잇**","mark":"*","pos":"동","mean":"~일지도 모른다","ex":[{"en":"We **might** arrive late.","ko":"우리는 늦게 도착할지도 모른다."}]},{"id":"vocab-1683","word":"migrate (migrant)","ipa":"/ˈmaɪɡreɪt/","kr":"**마이**그레이트","mark":"","pos":"동","mean":"① 이주하다 ② 이동하다","ex":[{"en":"Many workers **migrate** to cities for jobs.","ko":"많은 노동자가 일자리를 찾아 도시로 이주한다."},{"en":"Many birds **migrate** south in winter.","ko":"많은 새가 겨울에 남쪽으로 이동한다."}]},{"id":"vocab-1684","word":"mild","ipa":"/maɪld/","kr":"**마일드**","mark":"","pos":"형","mean":"① 온화한 ② 순한","ex":[{"en":"We had a **mild** winter.","ko":"우리는 온화한 겨울을 보냈다."},{"en":"This soap is **mild** on the skin.","ko":"이 비누는 피부에 순하다."}]},{"id":"vocab-1685","word":"military","ipa":"/ˈmɪləteri/","kr":"**밀**리테리","mark":"**","pos":"형/명","mean":"① 군사의 ② 군대","ex":[{"en":"The museum displays **military** equipment.","ko":"그 박물관은 군사 장비를 전시한다."},{"en":"Daniel joined the **military**.","ko":"다니엘은 군대에 입대했다."}]},{"id":"vocab-1686","word":"milk","ipa":"/mɪlk/","kr":"**밀크**","mark":"*","pos":"명","mean":"우유","ex":[{"en":"I drink **milk** every morning.","ko":"나는 매일 아침 우유를 마신다."}]},{"id":"vocab-1687","word":"mill","ipa":"/mɪl/","kr":"**밀**","mark":"**","pos":"명","mean":"① 방앗간 ② 공장","ex":[{"en":"The old **mill** stands by the river.","ko":"오래된 방앗간이 강가에 서 있다."},{"en":"The steel **mill** is the largest factory in town.","ko":"그 제철 공장은 마을에서 가장 큰 공장이다."}]},{"id":"vocab-1688","word":"million","ipa":"/ˈmɪljən/","kr":"**밀**리언","mark":"","pos":"명/형","mean":"백만","ex":[{"en":"The city has a **million** people.","ko":"그 도시는 백만 명의 사람이 산다."}]},{"id":"vocab-1689","word":"mind","ipa":"/maɪnd/","kr":"**마인드**","mark":"*","pos":"명/동","mean":"① 마음 ② 꺼리다","ex":[{"en":"Please keep an open **mind** during the discussion.","ko":"논의 중에는 열린 마음을 유지해 주세요."},{"en":"Do you **mind** waiting for five minutes?","ko":"5분 기다리는 것을 꺼리나요?"}]},{"id":"vocab-1690","word":"mine (miner)","ipa":"/maɪn/","kr":"**마인**","mark":"","pos":"대/명","mean":"① 나의 것 ② 광산","ex":[{"en":"This book is **mine**.","ko":"이 책은 내 것이다."},{"en":"The old **mine** closed years ago.","ko":"그 오래된 광산은 몇 년 전에 문을 닫았다."}]},{"id":"vocab-1691","word":"mineral","ipa":"/ˈmɪnərəl/","kr":"**미**너럴","mark":"","pos":"명","mean":"① 광물 ② 미네랄","ex":[{"en":"Iron is an essential **mineral** for the body.","ko":"철분은 몸에 필수적인 광물이다."},{"en":"Milk is rich in **minerals**.","ko":"우유는 미네랄이 풍부하다."}]},{"id":"vocab-1692","word":"minimal","ipa":"/ˈmɪnɪml/","kr":"**미**니멀","mark":"","pos":"형","mean":"최소의","ex":[{"en":"The damage was **minimal**.","ko":"피해는 최소였다."}]},{"id":"vocab-1693","word":"minimum","ipa":"/ˈmɪnɪməm/","kr":"**미**니멈","mark":"","pos":"명/형","mean":"① 최소 ② 최소의","ex":[{"en":"Pay the **minimum** amount.","ko":"최소 금액을 지불해라."},{"en":"The **minimum** age is eighteen.","ko":"최소 나이는 18세다."}]},{"id":"vocab-1694","word":"ministry","ipa":"/ˈmɪnɪstri/","kr":"**미**니스트리","mark":"","pos":"명","mean":"① (정부의) 부 ② 목회","ex":[{"en":"The **Ministry** of Education announced the plan.","ko":"교육부가 그 계획을 발표했다."},{"en":"Leo entered the **ministry** after college.","ko":"레오는 대학 후에 목회에 들어갔다."}]},{"id":"vocab-1695","word":"minor","ipa":"/ˈmaɪnər/","kr":"**마이**너","mark":"**","pos":"형/명","mean":"① 작은 ② 사소한 ③ 미성년자","ex":[{"en":"The update caused only a **minor** problem.","ko":"그 업데이트는 작은 문제만 일으켰다."},{"en":"Restarting the app fixed the **minor** problem.","ko":"앱을 다시 시작하자 그 사소한 문제가 해결되었다."},{"en":"A **minor** needs a guardian's consent.","ko":"미성년자는 보호자의 동의가 필요하다."}]},{"id":"vocab-1696","word":"minute","ipa":"/ˈmɪnɪt/","kr":"**미**닛","mark":"**","pos":"명","mean":"① 분 ② 잠깐","ex":[{"en":"The call lasted one **minute**.","ko":"그 통화는 1분 동안 계속되었다."},{"en":"Wait a **minute**, please.","ko":"잠깐만 기다려 주세요."}]},{"id":"vocab-1697","word":"miracle","ipa":"/ˈmɪrəkl/","kr":"**미**러클","mark":"","pos":"명","mean":"기적","ex":[{"en":"Her recovery seemed like a **miracle**.","ko":"그녀의 회복은 기적처럼 보였다."}]},{"id":"vocab-1698","word":"mirror","ipa":"/ˈmɪrər/","kr":"**미**러","mark":"**","pos":"명","mean":"거울","ex":[{"en":"Sophia looked at herself in the **mirror**.","ko":"소피아는 거울 속 자신을 보았다."}]},{"id":"vocab-1699","word":"miss","ipa":"/mɪs/","kr":"**미스**","mark":"*","pos":"동","mean":"① 놓치다 ② 그리워하다","ex":[{"en":"Do not **miss** the morning meeting.","ko":"아침 회의를 놓치지 마라."},{"en":"I **miss** my old team.","ko":"나는 옛 팀을 그리워한다."}]},{"id":"vocab-1700","word":"missile","ipa":"/ˈmɪsl/","kr":"**미**슬","mark":"","pos":"명","mean":"미사일","ex":[{"en":"The **missile** was launched from the ship.","ko":"미사일이 배에서 발사되었다."}]},{"id":"vocab-1701","word":"mission","ipa":"/ˈmɪʃn/","kr":"**미**션","mark":"**","pos":"명","mean":"① 임무 ② 사명","ex":[{"en":"The group completed the **mission**.","ko":"그 그룹은 임무를 완수했다."},{"en":"Our **mission** is to support employees.","ko":"우리의 사명은 직원들을 지원하는 것이다."}]},{"id":"vocab-1702","word":"mix","ipa":"/mɪks/","kr":"**믹스**","mark":"**","pos":"동/명","mean":"① 섞다 ② 혼합","ex":[{"en":"**Mix** the flour and eggs.","ko":"밀가루와 달걀을 섞어라."},{"en":"The material is a **mix** of metal and plastic.","ko":"그 재료는 금속과 플라스틱의 혼합이다."}]},{"id":"vocab-1703","word":"mobile","ipa":"/ˈmoʊbl/","kr":"**모**블","mark":"","pos":"형/명","mean":"① 이동하는 ② 휴대전화","ex":[{"en":"**Mobile** workers move between several sites.","ko":"이동하는 직원들은 여러 현장 사이를 오간다."},{"en":"Yuna has a new **mobile** phone.","ko":"유나는 새 휴대전화가 있다."}]},{"id":"vocab-1704","word":"mock","ipa":"/mɑːk/","kr":"**막**","mark":"","pos":"동","mean":"① 조롱하다 ② 흉내 내다","ex":[{"en":"Don't **mock** other people.","ko":"다른 사람을 조롱하지 마라."},{"en":"One child **mocked** the robot's voice.","ko":"한 아이는 로봇의 목소리를 흉내 냈다."}]},{"id":"vocab-1705","word":"mode","ipa":"/moʊd/","kr":"**모드**","mark":"","pos":"명","mean":"① 방식 ② 모드","ex":[{"en":"The app has a simple work **mode**.","ko":"그 앱에는 간단한 작업 방식이 있다."},{"en":"Set the phone to silent **mode**.","ko":"전화기를 무음 모드로 설정해라."}]},{"id":"vocab-1706","word":"modify","ipa":"/ˈmɑːdɪfaɪ/","kr":"**마**디파이","mark":"","pos":"동","mean":"① 수정하다 ② 변경하다","ex":[{"en":"We **modified** the plan slightly.","ko":"우리는 그 계획을 조금 수정했다."},{"en":"We **modified** the access rule.","ko":"우리는 접속 규칙을 변경했다."}]},{"id":"vocab-1707","word":"model","ipa":"/ˈmɑːdl/","kr":"**마**들","mark":"*","pos":"명","mean":"① 모형 ② 모델 ③ 본보기","ex":[{"en":"The students built a **model** bridge.","ko":"학생들은 모형 다리를 만들었다."},{"en":"Sophia works as a fashion **model**.","ko":"소피아는 패션 모델로 일한다."},{"en":"Her team became a **model** for others.","ko":"그녀의 팀은 다른 팀들의 본보기가 되었다."}]},{"id":"vocab-1708","word":"moderate","ipa":"/ˈmɑːdərət/","kr":"**마**더릿","mark":"","pos":"형","mean":"① 적당한 ② 온건한","ex":[{"en":"Do **moderate** exercise daily.","ko":"매일 적당한 운동을 해라."},{"en":"Owen took a **moderate** position.","ko":"오언은 온건한 입장을 취했다."}]},{"id":"vocab-1709","word":"modern","ipa":"/ˈmɑːdərn/","kr":"**마**던","mark":"**","pos":"형","mean":"① 현대의 ② 근대의","ex":[{"en":"The museum has a **modern** design.","ko":"그 박물관은 현대적인 디자인을 가지고 있다."},{"en":"The museum studies early **modern** history.","ko":"그 박물관은 근대 역사를 연구한다."}]},{"id":"vocab-1710","word":"modest","ipa":"/ˈmɑːdɪst/","kr":"**마**디스트","mark":"","pos":"형","mean":"① 겸손한 ② 수수한","ex":[{"en":"Minho is **modest** about his success.","ko":"민호는 자신의 성공에 대해 겸손하다."},{"en":"Owen wore a **modest** suit.","ko":"오언은 수수한 정장을 입었다."}]},{"id":"vocab-1711","word":"moist (moisture)","ipa":"/mɔɪst/","kr":"**모이스트**","mark":"","pos":"형","mean":"① 촉촉한 ② 습기 있는","ex":[{"en":"Keep the soil **moist**.","ko":"흙을 촉촉하게 유지해라."},{"en":"A humidifier keeps the room cool and **moist**.","ko":"가습기는 방을 서늘하고 습기 있게 유지한다."}]},{"id":"vocab-1712","word":"molecule","ipa":"/ˈmɑːlɪkjuːl/","kr":"**말**리큘","mark":"","pos":"명","mean":"분자","ex":[{"en":"Water **molecules** contain oxygen and hydrogen.","ko":"물 분자는 산소와 수소를 포함한다."}]},{"id":"vocab-1713","word":"moment","ipa":"/ˈmoʊmənt/","kr":"**모**먼트","mark":"**","pos":"명","mean":"① 순간 ② 잠깐","ex":[{"en":"That system failed for one brief **moment**.","ko":"그 시스템은 한순간 동안 고장 났다."},{"en":"Please wait a **moment**.","ko":"잠깐 기다려 주세요."}]},{"id":"vocab-1714","word":"money","ipa":"/ˈmʌni/","kr":"**머**니","mark":"*","pos":"명","mean":"돈","ex":[{"en":"I saved **money** for the trip.","ko":"나는 여행을 위해 돈을 모았다."}]},{"id":"vocab-1715","word":"monitor","ipa":"/ˈmɑːnɪtər/","kr":"**마**니터","mark":"**","pos":"명/동","mean":"① 화면 ② 감시하다","ex":[{"en":"The error message appeared on the **monitor** screen.","ko":"오류 메시지가 모니터 화면에 나타났다."},{"en":"We **monitor** system performance every hour.","ko":"우리는 매시간 시스템 성능을 감시한다."}]},{"id":"vocab-1716","word":"monkey","ipa":"/ˈmʌŋki/","kr":"**멍**키","mark":"*","pos":"명","mean":"원숭이","ex":[{"en":"The **monkey** climbed the tree.","ko":"그 원숭이는 나무를 올랐다."}]},{"id":"vocab-1717","word":"monster","ipa":"/ˈmɑːnstər/","kr":"**만**스터","mark":"","pos":"명","mean":"괴물","ex":[{"en":"One child was afraid of the **monster**.","ko":"한 아이는 괴물을 무서워했다."}]},{"id":"vocab-1718","word":"month","ipa":"/mʌnθ/","kr":"**먼쓰**","mark":"*","pos":"명","mean":"① 달 ② 개월","ex":[{"en":"July is the seventh **month**.","ko":"7월은 일곱 번째 달이다."},{"en":"Lina worked here for six **months**.","ko":"리나는 여기서 6개월 동안 일했다."}]},{"id":"vocab-1719","word":"monument","ipa":"/ˈmɑːnjumənt/","kr":"**마**뉴먼트","mark":"","pos":"명","mean":"① 기념물 ② 기념비","ex":[{"en":"The city built a **monument** to the workers.","ko":"그 도시는 노동자들을 위한 기념물을 세웠다."},{"en":"A stone **monument** honors the fallen hero.","ko":"돌로 된 기념비가 전사한 영웅을 기린다."}]},{"id":"vocab-1720","word":"mood","ipa":"/muːd/","kr":"**무ː**드","mark":"**","pos":"명","mean":"① 기분 ② 분위기","ex":[{"en":"Hana is in a good **mood** today.","ko":"하나는 오늘 기분이 좋다."},{"en":"Soft music changed the **mood** of the room.","ko":"부드러운 음악은 방의 분위기를 바꾸었다."}]},{"id":"vocab-1721","word":"moon (half-moon)","ipa":"/muːn/","kr":"**문ː**","mark":"*","pos":"명","mean":"달","ex":[{"en":"The **moon** is bright tonight.","ko":"오늘 밤 달이 밝다."}]},{"id":"vocab-1722","word":"moral","ipa":"/ˈmɔːrəl/","kr":"**모ː**럴","mark":"**","pos":"형/명","mean":"① 도덕적인 ② 교훈","ex":[{"en":"It is a **moral** question.","ko":"그것은 도덕적인 문제다."},{"en":"The story teaches a **moral** lesson.","ko":"그 이야기는 도덕적 교훈을 가르친다."}]},{"id":"vocab-1723","word":"moreover","ipa":"/mɔːrˈoʊvər/","kr":"모**로**버","mark":"**","pos":"부","mean":"① 게다가 ② 더욱이","ex":[{"en":"Our room is clean; **moreover**, it is quiet.","ko":"우리 방은 깨끗하다. 게다가 조용하다."},{"en":"The plan is safe; **moreover**, it is affordable.","ko":"그 계획은 안전하다. 더욱이 비용도 적당하다."}]},{"id":"vocab-1724","word":"morning","ipa":"/ˈmɔːrnɪŋ/","kr":"**모ː**닝","mark":"*","pos":"명","mean":"아침","ex":[{"en":"I take a walk every **morning** before work.","ko":"나는 매일 아침 출근 전에 산책한다."}]},{"id":"vocab-1725","word":"mortal","ipa":"/ˈmɔːrtl/","kr":"**모ː**틀","mark":"","pos":"형","mean":"① 죽을 운명의 ② 치명적인","ex":[{"en":"All humans are **mortal**.","ko":"모든 인간은 죽을 운명이다."},{"en":"The injury was **mortal**.","ko":"그 부상은 치명적이었다."}]},{"id":"vocab-1726","word":"mother (mom, mommy)","ipa":"/ˈmʌðər/","kr":"**머**더","mark":"*","pos":"명","mean":"어머니","ex":[{"en":"My **mother** makes breakfast.","ko":"우리 어머니는 아침 식사를 만드신다."}]},{"id":"vocab-1727","word":"motion","ipa":"/ˈmoʊʃn/","kr":"**모**션","mark":"**","pos":"명","mean":"① 움직임 ② 동작","ex":[{"en":"The camera detected **motion**.","ko":"카메라는 움직임을 감지했다."},{"en":"The robot repeated the same **motion**.","ko":"그 로봇은 같은 동작을 반복했다."}]},{"id":"vocab-1728","word":"motive","ipa":"/ˈmoʊtɪv/","kr":"**모**티브","mark":"","pos":"명","mean":"동기","ex":[{"en":"Police are looking for a **motive**.","ko":"경찰은 동기를 찾고 있다."}]},{"id":"vocab-1729","word":"motor","ipa":"/ˈmoʊtər/","kr":"**모**터","mark":"**","pos":"명","mean":"① 모터 ② 전동기","ex":[{"en":"The **motor** stopped suddenly.","ko":"모터가 갑자기 멈췄다."},{"en":"The electric **motor** drives the fan.","ko":"그 전동기가 선풍기를 움직인다."}]},{"id":"vocab-1730","word":"mount","ipa":"/maʊnt/","kr":"**마운트**","mark":"**","pos":"동","mean":"① 오르다 ② 설치하다","ex":[{"en":"We **mounted** the stairs to reach the roof.","ko":"우리는 지붕에 닿으려고 계단을 올라갔다."},{"en":"They **mounted** the camera on the wall.","ko":"그들은 카메라를 벽에 설치했다."}]},{"id":"vocab-1731","word":"mountain","ipa":"/ˈmaʊntn/","kr":"**마운**튼","mark":"*","pos":"명","mean":"산","ex":[{"en":"We climbed a high **mountain**.","ko":"우리는 높은 산을 올랐다."}]},{"id":"vocab-1732","word":"mouse","ipa":"/maʊs/","kr":"**마우스**","mark":"*","pos":"명","mean":"① 쥐 ② 마우스","ex":[{"en":"A **mouse** ran across the floor.","ko":"쥐 한 마리가 바닥을 가로질러 달렸다."},{"en":"Click the icon with the **mouse**.","ko":"마우스로 아이콘을 클릭해라."}]},{"id":"vocab-1733","word":"mouth","ipa":"/maʊθ/","kr":"**마우쓰**","mark":"*","pos":"명","mean":"입","ex":[{"en":"Open your **mouth** wide.","ko":"입을 크게 벌려라."}]},{"id":"vocab-1734","word":"move","ipa":"/muːv/","kr":"**무ː**브","mark":"*","pos":"동/명","mean":"① 움직이다 ② 이사하다","ex":[{"en":"The cursor **moves** across the screen.","ko":"커서가 화면을 가로질러 움직인다."},{"en":"We **moved** to a new house.","ko":"우리는 새집으로 이사했다."}]},{"id":"vocab-1735","word":"movie","ipa":"/ˈmuːvi/","kr":"**무ː**비","mark":"*","pos":"명","mean":"영화","ex":[{"en":"We watched a **movie**
