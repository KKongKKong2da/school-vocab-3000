tree stood by the river.","ko":"거대한 나무가 강가에 서 있었다."}]},{"id":"vocab-1204","word":"gift","ipa":"/ɡɪft/","kr":"**기프트**","mark":"**","pos":"명","mean":"① 선물 ② 재능","ex":[{"en":"This book is a **gift** from my aunt.","ko":"이 책은 이모가 준 선물이다."},{"en":"Sora has a **gift** for solving problems.","ko":"소라는 문제 해결의 재능이 있다."}]},{"id":"vocab-1205","word":"giraffe","ipa":"/dʒəˈræf/","kr":"저**래프**","mark":"**","pos":"명","mean":"기린","ex":[{"en":"The **giraffe** has a long neck.","ko":"기린은 긴 목을 지녔다."}]},{"id":"vocab-1206","word":"girl","ipa":"/ɡɜːrl/","kr":"**걸ː**","mark":"*","pos":"명","mean":"소녀","ex":[{"en":"The **girl** is reading a book.","ko":"그 소녀는 책을 읽고 있다."}]},{"id":"vocab-1207","word":"give","ipa":"/ɡɪv/","kr":"**기브**","mark":"*","pos":"동","mean":"주다","ex":[{"en":"Please **give** me some water.","ko":"나에게 물을 좀 주세요."}]},{"id":"vocab-1208","word":"glad","ipa":"/ɡlæd/","kr":"**글래드**","mark":"*","pos":"형","mean":"기쁜","ex":[{"en":"I am **glad** that the update worked.","ko":"업데이트가 작동해서 나는 기쁘다."}]},{"id":"vocab-1209","word":"glance","ipa":"/ɡlæns/","kr":"**글랜스**","mark":"**","pos":"동/명","mean":"① 흘긋 보다 ② 흘긋 봄","ex":[{"en":"She **glanced** at the message.","ko":"그녀는 메시지를 흘긋 보았다."},{"en":"Ethan gave the report a quick **glance**.","ko":"이선은 그 보고서를 흘긋 보았다."}]},{"id":"vocab-1210","word":"glare","ipa":"/ɡler/","kr":"**글레어**","mark":"","pos":"동/명","mean":"① 노려보다 ② 눈부신 빛","ex":[{"en":"He **glared** at the noisy boy.","ko":"그는 시끄러운 소년을 노려보았다."},{"en":"The **glare** from the screen hurt my eyes.","ko":"화면의 눈부신 빛이 내 눈을 아프게 했다."}]},{"id":"vocab-1211","word":"glass","ipa":"/ɡlæs/","kr":"**글래스**","mark":"*","pos":"명","mean":"① 유리 ② 잔","ex":[{"en":"The window is made of **glass**.","ko":"그 창문은 유리로 만들어졌다."},{"en":"Please fill the **glass** with water.","ko":"유리잔에 물을 채워 주세요."}]},{"id":"vocab-1212","word":"globe (global)","ipa":"/ɡloʊb/","kr":"**글로브**","mark":"","pos":"명","mean":"① 지구 ② 지구본","ex":[{"en":"Olivia spun the **globe** slowly.","ko":"올리비아는 지구본을 천천히 돌렸다."},{"en":"The teacher pointed to Korea on the **globe**.","ko":"선생님은 지구본에서 한국을 가리켰다."}]},{"id":"vocab-1213","word":"glory","ipa":"/ˈɡlɔːri/","kr":"**글로ː**리","mark":"**","pos":"명","mean":"영광","ex":[{"en":"This team returned home in **glory**.","ko":"이 팀은 영광스럽게 귀국했다."}]},{"id":"vocab-1214","word":"glove","ipa":"/ɡlʌv/","kr":"**글러브**","mark":"**","pos":"명","mean":"장갑","ex":[{"en":"I lost one of my **gloves**.","ko":"나는 장갑 한 짝을 잃어버렸다."}]},{"id":"vocab-1215","word":"glow","ipa":"/ɡloʊ/","kr":"**글로**","mark":"","pos":"동/명","mean":"① 빛나다 ② 불빛","ex":[{"en":"The moon **glowed** above the lake.","ko":"달이 호수 위에서 빛났다."},{"en":"A warm **glow** came from the lamp.","ko":"따뜻한 불빛이 램프에서 나왔다."}]},{"id":"vocab-1216","word":"glue","ipa":"/ɡluː/","kr":"**글루ː**","mark":"**","pos":"명/동","mean":"① 접착제 ② 붙이다","ex":[{"en":"Use **glue** to fix the paper.","ko":"종이를 고치려면 접착제를 사용해라."},{"en":"Stick the paper with **glue**.","ko":"접착제로 종이를 붙여라."}]},{"id":"vocab-1217","word":"go","ipa":"/ɡoʊ/","kr":"**고**","mark":"*","pos":"동","mean":"가다","ex":[{"en":"Let's **go** home.","ko":"집에 가자."}]},{"id":"vocab-1218","word":"goal","ipa":"/ɡoʊl/","kr":"**골**","mark":"*","pos":"명","mean":"① 목표 ② 골","ex":[{"en":"My **goal** is to become a doctor.","ko":"내 목표는 의사가 되는 것이다."},{"en":"Daniel scored the winning **goal**.","ko":"다니엘은 결승 골을 넣었다."}]},{"id":"vocab-1219","word":"goat","ipa":"/ɡoʊt/","kr":"**고트**","mark":"","pos":"명","mean":"염소","ex":[{"en":"The **goat** is eating grass.","ko":"그 염소는 풀을 먹고 있다."}]},{"id":"vocab-1220","word":"god","ipa":"/ɡɑːd/","kr":"**갓**","mark":"*","pos":"명","mean":"① 신 ② 하느님","ex":[{"en":"The ancient people prayed to their **god**.","ko":"고대 사람들은 자신들의 신에게 기도했다."},{"en":"They prayed to **God** for help.","ko":"그들은 도움을 위해 하느님께 기도했다."}]},{"id":"vocab-1221","word":"gold","ipa":"/ɡoʊld/","kr":"**골드**","mark":"*","pos":"명","mean":"금","ex":[{"en":"The ring is made of **gold**.","ko":"그 반지는 금으로 만들어졌다."}]},{"id":"vocab-1222","word":"golf","ipa":"/ɡɑːlf/","kr":"**골프**","mark":"**","pos":"명","mean":"골프","ex":[{"en":"My father plays **golf** on weekends.","ko":"우리 아버지는 주말마다 골프를 치신다."}]},{"id":"vocab-1223","word":"good (goods)","ipa":"/ɡʊd/","kr":"**굿**","mark":"*","pos":"형","mean":"① 좋은 ② 착한","ex":[{"en":"This is a **good** idea.","ko":"이것은 좋은 생각이다."},{"en":"Claire is **good** to everyone.","ko":"클레어는 모두에게 착하다."}]},{"id":"vocab-1224","word":"goodbye (bye)","ipa":"/ˌɡʊdˈbaɪ/","kr":"굿**바이**","mark":"*","pos":"감","mean":"① 안녕 ② 잘 가","ex":[{"en":"**Goodbye**, and thank you for your help.","ko":"안녕, 그리고 도와줘서 고맙습니다."},{"en":"**Goodbye**, see you tomorrow.","ko":"잘 가, 내일 보자."}]},{"id":"vocab-1225","word":"gorgeous","ipa":"/ˈɡɔːrdʒəs/","kr":"**고ː**저스","mark":"**","pos":"형","mean":"① 아주 멋진 ② 화려한","ex":[{"en":"The sunset was **gorgeous**.","ko":"그 노을은 아주 멋졌다."},{"en":"Nora wore a **gorgeous** dress.","ko":"노라는 화려한 드레스를 입었다."}]},{"id":"vocab-1226","word":"govern (government)","ipa":"/ˈɡʌvərn/","kr":"**거**번","mark":"**","pos":"동","mean":"① 통치하다 ② 다스리다","ex":[{"en":"The elected council **governs** the city.","ko":"선출된 의회가 그 도시를 통치한다."},{"en":"A wise leader **governs** the country fairly.","ko":"현명한 지도자는 나라를 공정하게 다스린다."}]},{"id":"vocab-1227","word":"grab","ipa":"/ɡræb/","kr":"**그랩**","mark":"**","pos":"동","mean":"① 붙잡다 ② 움켜쥐다","ex":[{"en":"She **grabbed** my arm.","ko":"그녀는 내 팔을 붙잡았다."},{"en":"**Grab** the handle firmly.","ko":"손잡이를 단단히 움켜쥐어라."}]},{"id":"vocab-1228","word":"grace","ipa":"/ɡreɪs/","kr":"**그레이스**","mark":"**","pos":"명","mean":"① 우아함 ② 은총","ex":[{"en":"The dancer moved across the stage with **grace**.","ko":"그 무용수는 우아함을 가지고 무대를 가로질러 움직였다."},{"en":"They thanked God for his **grace**.","ko":"그들은 신의 은총에 감사했다."}]},{"id":"vocab-1229","word":"grade (gradual)","ipa":"/ɡreɪd/","kr":"**그레이드**","mark":"**","pos":"명","mean":"① 학년 ② 등급 ③ 성적","ex":[{"en":"Olivia is in the fifth **grade**.","ko":"올리비아는 5학년이다."},{"en":"This material is a higher **grade**.","ko":"이 재료는 더 높은 등급이다."},{"en":"Her math **grade** improved.","ko":"그녀의 수학 성적이 향상되었다."}]},{"id":"vocab-1230","word":"graduate","ipa":"/ˈɡrædʒuət/","kr":"**그래**주엇","mark":"","pos":"동/명","mean":"① 졸업하다 ② 졸업생","ex":[{"en":"He **graduated** from high school last year.","ko":"그는 작년에 고등학교를 졸업했다."},{"en":"A recent **graduate** joined the IT team.","ko":"최근 졸업생이 IT팀에 합류했다."}]},{"id":"vocab-1231","word":"grain","ipa":"/ɡreɪn/","kr":"**그레인**","mark":"","pos":"명","mean":"① 곡물 ② 알갱이","ex":[{"en":"Barley is a **grain** used in many foods.","ko":"보리는 많은 음식에 쓰이는 곡물이다."},{"en":"A **grain** of rice fell on the table.","ko":"쌀 한 알갱이가 탁자에 떨어졌다."}]},{"id":"vocab-1232","word":"grand","ipa":"/ɡrænd/","kr":"**그랜드**","mark":"**","pos":"형","mean":"① 웅장한 ② 대단한","ex":[{"en":"They stayed in a **grand** hotel.","ko":"그들은 웅장한 호텔에 묵었다."},{"en":"A **grand** hotel welcomed us with marble stairs.","ko":"웅장한 호텔이 대리석 계단으로 우리를 맞이했다."}]},{"id":"vocab-1233","word":"grandfather","ipa":"/ˈɡrænfɑːðər/","kr":"**그랜**파더","mark":"*","pos":"명","mean":"할아버지","ex":[{"en":"My **grandfather** tells funny stories.","ko":"우리 할아버지는 재미있는 이야기를 들려주신다."}]},{"id":"vocab-1234","word":"grant","ipa":"/ɡrænt/","kr":"**그랜트**","mark":"**","pos":"동/명","mean":"① 승인하다 ② 보조금","ex":[{"en":"The project manager **granted** our request.","ko":"프로젝트 관리자는 우리의 요청을 승인했다."},{"en":"The project received a government **grant**.","ko":"그 프로젝트는 정부 보조금을 받았다."}]},{"id":"vocab-1235","word":"grape","ipa":"/ɡreɪp/","kr":"**그레입**","mark":"*","pos":"명","mean":"포도","ex":[{"en":"These **grapes** are sweet.","ko":"이 포도는 달다."}]},{"id":"vocab-1236","word":"graph (graphic)","ipa":"/ɡræf/","kr":"**그래프**","mark":"**","pos":"명","mean":"① 그래프 ② 도표","ex":[{"en":"The **graph** shows the change in temperature.","ko":"그 그래프는 온도 변화를 보여 준다."},{"en":"Monthly sales rise sharply on the **graph**.","ko":"월별 매출이 그래프에서 급격히 상승한다."}]},{"id":"vocab-1237","word":"grasp","ipa":"/ɡræsp/","kr":"**그래스프**","mark":"","pos":"동","mean":"① 꽉 잡다 ② 이해하다","ex":[{"en":"He **grasped** the rope tightly.","ko":"그는 밧줄을 꽉 잡았다."},{"en":"Sora quickly **grasped** the main idea.","ko":"소라는 핵심 생각을 빠르게 이해했다."}]},{"id":"vocab-1238","word":"grass","ipa":"/ɡræs/","kr":"**그래스**","mark":"*","pos":"명","mean":"① 풀 ② 잔디","ex":[{"en":"The cow eats fresh **grass**.","ko":"그 소는 신선한 풀을 먹는다."},{"en":"The children sat on the **grass**.","ko":"아이들은 잔디에 앉았다."}]},{"id":"vocab-1239","word":"grateful","ipa":"/ˈɡreɪtfl/","kr":"**그레잇**플","mark":"","pos":"형","mean":"감사하는","ex":[{"en":"I am **grateful** for your help.","ko":"나는 너의 도움에 감사한다."}]},{"id":"vocab-1240","word":"grave","ipa":"/ɡreɪv/","kr":"**그레이브**","mark":"","pos":"명/형","mean":"① 무덤 ② 심각한","ex":[{"en":"They placed flowers on the **grave**.","ko":"그들은 무덤에 꽃을 놓았다."},{"en":"The outage caused a **grave** problem.","ko":"그 장애는 심각한 문제를 일으켰다."}]},{"id":"vocab-1241","word":"gray / grey","ipa":"/ɡreɪ/","kr":"**그레이**","mark":"*","pos":"형/명","mean":"① 회색의 ② 회색","ex":[{"en":"Dark **gray** clouds covered the sky.","ko":"짙은 회색 구름이 하늘을 덮었다."},{"en":"**Gray** is a common office color.","ko":"회색은 흔한 사무실 색이다."}]},{"id":"vocab-1242","word":"great","ipa":"/ɡreɪt/","kr":"**그레잇**","mark":"*","pos":"형","mean":"① 위대한 ② 큰","ex":[{"en":"Nora is a **great** singer.","ko":"노라는 위대한 가수다."},{"en":"A **great** crowd filled the hall.","ko":"큰 군중이 강당을 가득 채웠다."}]},{"id":"vocab-1243","word":"greed","ipa":"/ɡriːd/","kr":"**그리ː**드","mark":"","pos":"명","mean":"탐욕","ex":[{"en":"**Greed** can destroy friendships.","ko":"탐욕은 우정을 파괴할 수 있다."}]},{"id":"vocab-1244","word":"green","ipa":"/ɡriːn/","kr":"**그린ː**","mark":"*","pos":"형/명","mean":"① 초록의 ② 초록","ex":[{"en":"The **green** light means go.","ko":"초록 불은 가라는 뜻이다."},{"en":"**Green** is our team color.","ko":"초록은 우리 팀 색이다."}]},{"id":"vocab-1245","word":"greet","ipa":"/ɡriːt/","kr":"**그리ː**트","mark":"**","pos":"동","mean":"① 인사하다 ② 맞이하다","ex":[{"en":"She **greeted** me with a smile.","ko":"그녀는 미소로 나에게 인사했다."},{"en":"At the door, the host **greeted** every guest.","ko":"문 앞에서 주인이 모든 손님을 맞이했다."}]},{"id":"vocab-1246","word":"grief","ipa":"/ɡriːf/","kr":"**그리ː**프","mark":"","pos":"명","mean":"① 슬픔 ② 비탄","ex":[{"en":"The family shared their **grief**.","ko":"그 가족은 슬픔을 함께 나누었다."},{"en":"The family expressed deep **grief** at the funeral.","ko":"그 가족은 장례식에서 깊은 비탄을 나타냈다."}]},{"id":"vocab-1247","word":"grip","ipa":"/ɡrɪp/","kr":"**그립**","mark":"","pos":"동/명","mean":"① 꽉 쥐다 ② 움켜쥠","ex":[{"en":"He **gripped** the handle.","ko":"그는 손잡이를 꽉 쥐었다."},{"en":"His **grip** on the handle was strong.","ko":"손잡이를 움켜쥔 그의 힘은 강했다."}]},{"id":"vocab-1248","word":"grocery","ipa":"/ˈɡroʊsəri/","kr":"**그로**서리","mark":"**","pos":"명","mean":"① 식료품 ② 식료품점","ex":[{"en":"I bought **groceries** after work.","ko":"나는 퇴근 후 식료품을 샀다."},{"en":"I stopped at the **grocery** on my way home.","ko":"나는 집에 가는 길에 식료품점에 들렀다."}]},{"id":"vocab-1249","word":"gross","ipa":"/ɡroʊs/","kr":"**그로스**","mark":"","pos":"형","mean":"① 총 ② 역겨운","ex":[{"en":"The **gross** weight is ten kilos.","ko":"총 무게는 10킬로그램이다."},{"en":"The spoiled food smelled **gross**.","ko":"상한 음식은 역겨운 냄새가 났다."}]},{"id":"vocab-1250","word":"ground","ipa":"/ɡraʊnd/","kr":"**그라운드**","mark":"*","pos":"명","mean":"① 땅 ② 운동장","ex":[{"en":"The ball fell on the **ground**.","ko":"공이 땅에 떨어졌다."},{"en":"The students gathered on the school **ground**.","ko":"학생들은 학교 운동장에 모였다."}]},{"id":"vocab-1251","word":"group","ipa":"/ɡruːp/","kr":"**그룹ː**","mark":"*","pos":"명","mean":"① 집단 ② 무리","ex":[{"en":"We work in small **groups**.","ko":"우리는 작은 집단으로 일한다."},{"en":"A **group** of visitors entered the office.","ko":"방문객 무리가 사무실에 들어왔다."}]},{"id":"vocab-1252","word":"grow","ipa":"/ɡroʊ/","kr":"**그로**","mark":"*","pos":"동","mean":"① 자라다 ② 기르다","ex":[{"en":"Plants need sunlight to **grow**.","ko":"식물은 자라기 위해 햇빛이 필요하다."},{"en":"They **grow** vegetables behind the office.","ko":"그들은 사무실 뒤에서 채소를 기른다."}]},{"id":"vocab-1253","word":"guarantee","ipa":"/ˌɡærənˈtiː/","kr":"개런**티ː**","mark":"**","pos":"명/동","mean":"① 보장 ② 보증하다","ex":[{"en":"This ticket **guarantees** your entry.","ko":"이 표는 네 입장을 보장한다."},{"en":"This watch has a **guarantee**.","ko":"이 시계에는 보증이 있다."}]},{"id":"vocab-1254","word":"guard","ipa":"/ɡɑːrd/","kr":"**가ː**드","mark":"**","pos":"명/동","mean":"① 경비원 ② 지키다","ex":[{"en":"A **guard** stood at the gate.","ko":"경비원이 문 앞에 서 있었다."},{"en":"Security staff **guard** the main entrance.","ko":"보안 직원들이 주 출입구를 지킨다."}]},{"id":"vocab-1255","word":"guardian","ipa":"/ˈɡɑːrdiən/","kr":"**가ː**디언","mark":"","pos":"명","mean":"① 보호자 ② 후견인","ex":[{"en":"A parent or **guardian** must sign the form.","ko":"부모나 보호자가 그 양식에 서명해야 한다."},{"en":"The court appointed him as her legal **guardian**.","ko":"법원은 그를 그녀의 법적 후견인으로 임명했다."}]},{"id":"vocab-1256","word":"guess","ipa":"/ɡes/","kr":"**게스**","mark":"*","pos":"동/명","mean":"① 추측하다 ② 추측","ex":[{"en":"Can you **guess** the password?","ko":"비밀번호를 추측할 수 있나요?"},{"en":"My first **guess** was wrong.","ko":"나의 첫 추측은 틀렸다."}]},{"id":"vocab-1257","word":"guest","ipa":"/ɡest/","kr":"**게스트**","mark":"**","pos":"명","mean":"손님","ex":[{"en":"We have a **guest** for dinner.","ko":"저녁 식사에 손님이 온다."}]},{"id":"vocab-1258","word":"guide","ipa":"/ɡaɪd/","kr":"**가이드**","mark":"**","pos":"명/동","mean":"① 안내자 ② 안내하다","ex":[{"en":"A **guide** showed us around the city.","ko":"안내자가 우리에게 도시를 구경시켜 주었다."},{"en":"She **guided** us through the museum.","ko":"그녀는 박물관에서 우리를 안내했다."}]},{"id":"vocab-1259","word":"guideline","ipa":"/ˈɡaɪdlaɪn/","kr":"**가이드**라인","mark":"","pos":"명","mean":"지침","ex":[{"en":"Follow the safety **guidelines**.","ko":"안전 지침을 따라라."}]},{"id":"vocab-1260","word":"guilt (guilty)","ipa":"/ɡɪlt/","kr":"**길트**","mark":"**","pos":"명","mean":"① 죄책감 ② 유죄","ex":[{"en":"Lucas felt **guilt** after telling the lie.","ko":"루카스는 거짓말을 한 뒤 죄책감을 느꼈다."},{"en":"The court decided his **guilt**.","ko":"법원은 그의 유죄를 결정했다."}]},{"id":"vocab-1261","word":"guitar","ipa":"/ɡɪˈtɑːr/","kr":"기**타ː**","mark":"*","pos":"명","mean":"기타","ex":[{"en":"David plays the **guitar** well.","ko":"데이비드는 기타를 잘 친다."}]},{"id":"vocab-1262","word":"gulf","ipa":"/ɡʌlf/","kr":"**걸프**","mark":"","pos":"명","mean":"① 만 ② 격차","ex":[{"en":"The ship sailed into the **gulf**.","ko":"그 배는 만으로 항해해 들어갔다."},{"en":"A wide **gulf** separates the two views.","ko":"두 견해 사이에는 큰 격차가 있다."}]},{"id":"vocab-1263","word":"gum","ipa":"/ɡʌm/","kr":"**검**","mark":"*","pos":"명","mean":"① 껌 ② 잇몸","ex":[{"en":"Claire chewed a piece of **gum**.","ko":"클레어는 껌 한 조각을 씹었다."},{"en":"The dentist checked my **gums**.","ko":"치과 의사는 내 잇몸을 확인했다."}]},{"id":"vocab-1264","word":"gun","ipa":"/ɡʌn/","kr":"**건**","mark":"**","pos":"명","mean":"총","ex":[{"en":"The police officer carried a **gun**.","ko":"그 경찰관은 총을 가지고 있었다."}]},{"id":"vocab-1265","word":"guy","ipa":"/ɡaɪ/","kr":"**가이**","mark":"*","pos":"명","mean":"① 남자 ② 녀석","ex":[{"en":"A tall **guy** opened the door.","ko":"키 큰 남자가 문을 열었다."},{"en":"That **guy** fixed the printer quickly.","ko":"그 녀석은 프린터를 빨리 고쳤다."}]},{"id":"vocab-1266","word":"gymnasium / gym","ipa":"/dʒɪmˈneɪziəm/","kr":"짐**네이**지엄","mark":"","pos":"명","mean":"체육관","ex":[{"en":"The students gathered in the **gymnasium**.","ko":"학생들은 체육관에 모였다."}]},{"id":"vocab-1267","word":"habit","ipa":"/ˈhæbɪt/","kr":"**해**빗","mark":"*","pos":"명","mean":"습관","ex":[{"en":"Reading before bed is a good **habit**.","ko":"잠자기 전에 책을 읽는 것은 좋은 습관이다."}]},{"id":"vocab-1268","word":"habitat","ipa":"/ˈhæbɪtæt/","kr":"**해**비탯","mark":"","pos":"명","mean":"서식지","ex":[{"en":"The forest is the bear's natural **habitat**.","ko":"그 숲은 곰의 자연 서식지다."}]},{"id":"vocab-1269","word":"hair","ipa":"/her/","kr":"**헤어**","mark":"*","pos":"명","mean":"① 머리카락 ② 털","ex":[{"en":"Her **hair** is long and black.","ko":"그녀의 머리카락은 길고 검다."},{"en":"The cat left **hair** on the chair.","ko":"고양이가 의자에 털을 남겼다."}]},{"id":"vocab-1270","word":"half","ipa":"/hæf/","kr":"**해프**","mark":"**","pos":"명/형","mean":"① 절반 ② 반의","ex":[{"en":"I ate **half** the cake.","ko":"나는 케이크의 절반을 먹었다."},{"en":"Cut the apple in **half**.","ko":"사과를 반으로 잘라라."}]},{"id":"vocab-1271","word":"hall","ipa":"/hɔːl/","kr":"**홀ː**","mark":"**","pos":"명","mean":"① 복도 ② 강당","ex":[{"en":"The meeting rooms are along the **hall**.","ko":"회의실들은 복도를 따라 있다."},{"en":"The concert was in a large **hall**.","ko":"그 콘서트는 큰 강당에서 열렸다."}]},{"id": n":"Olivia wore a big **hat**.","ko":"올리비아는 큰 모자를 썼다."}]},{"id":"vocab-1289","word":"hate","ipa":"/heɪt/","kr":"**헤잇**","mark":"*","pos":"동/명","mean":"① 싫어하다 ② 증오","ex":[{"en":"I **hate** waiting in long lines.","ko":"나는 긴 줄에서 기다리는 것을 몹시 싫어한다."},{"en":"The long conflict filled him with **hate**.","ko":"긴 갈등은 그를 증오로 가득 채웠다."}]},{"id":"vocab-1290","word":"haunt","ipa":"/hɔːnt/","kr":"**혼ː**트","mark":"","pos":"동","mean":"① 출몰하다 ② 괴롭히다","ex":[{"en":"Ghosts **haunt** the old house.","ko":"유령이 그 낡은 집에 출몰한다."},{"en":"The old mistake still **haunts** him.","ko":"그 오래된 실수는 아직도 그를 괴롭힌다."}]},{"id":"vocab-1291","word":"have","ipa":"/hæv/","kr":"**해브**","mark":"*","pos":"동","mean":"① 가지다 ② 있다","ex":[{"en":"I **have** a company laptop.","ko":"나는 회사 노트북을 가지고 있다."},{"en":"I **have** two sisters.","ko":"나는 자매가 두 명 있다."}]},{"id":"vocab-1292","word":"hazard","ipa":"/ˈhæzərd/","kr":"**해**저드","mark":"","pos":"명","mean":"위험 (요소)","ex":[{"en":"Wet floors are a safety **hazard**.","ko":"젖은 바닥은 안전 위험 요소다."}]},{"id":"vocab-1293","word":"he","ipa":"/hiː/","kr":"**히ː**","mark":"*","pos":"대","mean":"① 그 ② 그가","ex":[{"en":"**He** is my friend.","ko":"그는 내 친구다."},{"en":"**He** lives next door.","ko":"그는 옆집에 산다."}]},{"id":"vocab-1294","word":"head","ipa":"/hed/","kr":"**헤드**","mark":"*","pos":"명","mean":"① 머리 ② 우두머리","ex":[{"en":"James hit his **head** on the shelf.","ko":"제임스는 선반에 머리를 부딪쳤다."},{"en":"Yuna is the **head** of HR.","ko":"유나는 HR의 우두머리다."}]},{"id":"vocab-1295","word":"headquarters","ipa":"/ˈhedkwɔːrtərz/","kr":"**헤드**쿼터스","mark":"","pos":"명","mean":"① 본부 ② 본사","ex":[{"en":"The new **headquarters** is near the station.","ko":"새 본부는 역 근처에 있다."},{"en":"The company **headquarters** is in Seoul.","ko":"그 회사 본사는 서울에 있다."}]},{"id":"vocab-1296","word":"heal","ipa":"/hiːl/","kr":"**힐ː**","mark":"","pos":"동","mean":"① 낫다 ② 치유하다","ex":[{"en":"The wound will **heal** soon.","ko":"그 상처는 곧 나을 것이다."},{"en":"Time can **heal** emotional wounds.","ko":"시간은 감정적 상처를 치유할 수 있다."}]},{"id":"vocab-1297","word":"health (healthy)","ipa":"/helθ/","kr":"**헬쓰**","mark":"**","pos":"명","mean":"건강","ex":[{"en":"Regular sleep is important for your **health**.","ko":"규칙적인 수면은 건강에 중요하다."}]},{"id":"vocab-1298","word":"hear","ipa":"/hɪr/","kr":"**히어**","mark":"**","pos":"동","mean":"① 듣다 ② 들리다","ex":[{"en":"I **heard** the announcement clearly.","ko":"나는 그 안내 방송을 분명히 들었다."},{"en":"Can you **hear** the music?","ko":"그 음악이 들리니?"}]},{"id":"vocab-1299","word":"heart","ipa":"/hɑːrt/","kr":"**하ː**트","mark":"*","pos":"명","mean":"① 심장 ② 마음","ex":[{"en":"My **heart** was beating fast.","ko":"내 심장이 빠르게 뛰고 있었다."},{"en":"Lina spoke from the **heart**.","ko":"리나는 마음에서 우러나와 말했다."}]},{"id":"vocab-1300","word":"heat","ipa":"/hiːt/","kr":"**히ː**트","mark":"*","pos":"명/동","mean":"① 열 ② 데우다","ex":[{"en":"The **heat** of the sun is strong.","ko":"태양의 열기가 강하다."},{"en":"**Heat** the soup for five minutes.","ko":"수프를 5분 동안 데워라."}]},{"id":"vocab-1301","word":"heaven","ipa":"/ˈhevn/","kr":"**헤**븐","mark":"**","pos":"명","mean":"① 천국 ② 하늘","ex":[{"en":"They believed he went to **heaven**.","ko":"그들은 그가 천국에 갔다고 믿었다."},{"en":"Leo looked up toward **heaven**.","ko":"레오는 하늘을 올려다보았다."}]},{"id":"vocab-1302","word":"heavy","ipa":"/ˈhevi/","kr":"**헤**비","mark":"*","pos":"형","mean":"무거운","ex":[{"en":"This server is too **heavy** to move alone.","ko":"이 서버는 혼자 옮기기에는 너무 무겁다."}]},{"id":"vocab-1303","word":"heel","ipa":"/hiːl/","kr":"**힐ː**","mark":"","pos":"명","mean":"① 뒤꿈치 ② 굽","ex":[{"en":"My **heel** hurts after the long walk.","ko":"긴 산책 후에 발뒤꿈치가 아프다."},{"en":"The **heel** of her shoe was broken.","ko":"그녀의 신발 굽이 부러졌다."}]},{"id":"vocab-1304","word":"height","ipa":"/haɪt/","kr":"**하잇**","mark":"**","pos":"명","mean":"① 높이 ② 키","ex":[{"en":"What is the **height** of the building?","ko":"그 건물의 높이는 얼마니?"},{"en":"What is your **height**?","ko":"네 키가 얼마니?"}]},{"id":"vocab-1305","word":"heir","ipa":"/er/","kr":"**에어**","mark":"","pos":"명","mean":"상속인","ex":[{"en":"Lina is the **heir** to the family business.","ko":"리나는 가족 사업의 상속인이다."}]},{"id":"vocab-1306","word":"helicopter","ipa":"/ˈhelɪkɑːptər/","kr":"**헬**리캅터","mark":"**","pos":"명","mean":"헬리콥터","ex":[{"en":"A **helicopter** flew over the mountain.","ko":"헬리콥터 한 대가 산 위를 날았다."}]},{"id":"vocab-1307","word":"hell","ipa":"/hel/","kr":"**헬**","mark":"**","pos":"명","mean":"지옥","ex":[{"en":"The story describes heaven and **hell**.","ko":"그 이야기는 천국과 지옥을 묘사한다."}]},{"id":"vocab-1308","word":"hello / hey / hi","ipa":"/heˈloʊ/","kr":"헐**로**","mark":"*","pos":"감","mean":"① 안녕 ② 여보세요","ex":[{"en":"**Hello**, how are you?","ko":"안녕, 어떻게 지내니?"},{"en":"**Hello**, this is the IT support desk.","ko":"여보세요, IT 지원 데스크입니다."}]},{"id":"vocab-1309","word":"helmet","ipa":"/ˈhelmɪt/","kr":"**헬**밋","mark":"*","pos":"명","mean":"헬멧","ex":[{"en":"Always wear a **helmet** when riding a bike.","ko":"자전거를 탈 때는 항상 헬멧을 써라."}]},{"id":"vocab-1310","word":"help","ipa":"/help/","kr":"**헬프**","mark":"*","pos":"동/명","mean":"① 돕다 ② 도움","ex":[{"en":"Can you **help** me install this program?","ko":"이 프로그램 설치를 도와줄 수 있나요?"},{"en":"Your **help** saved us a lot of time.","ko":"당신의 도움은 우리에게 많은 시간을 절약해 주었다."}]},{"id":"vocab-1311","word":"hence","ipa":"/hens/","kr":"**헨스**","mark":"","pos":"부","mean":"① 그러므로 ② 이후로","ex":[{"en":"The server was down; **hence**, we delayed the launch.","ko":"서버가 중단되었다. 그러므로 우리는 출시를 미뤘다."},{"en":"Two weeks **hence**, the system will close.","ko":"지금부터 이 주 후에 그 시스템은 종료될 것이다."}]},{"id":"vocab-1312","word":"here","ipa":"/hɪr/","kr":"**히어**","mark":"*","pos":"부","mean":"① 여기에 ② 여기로","ex":[{"en":"Please sit **here**.","ko":"여기에 앉아 주세요."},{"en":"Come **here**, please.","ko":"여기로 와 주세요."}]},{"id":"vocab-1313","word":"heritage","ipa":"/ˈherɪtɪdʒ/","kr":"**헤**리티지","mark":"","pos":"명","mean":"유산","ex":[{"en":"We should protect our cultural **heritage**.","ko":"우리는 문화유산을 보호해야 한다."}]},{"id":"vocab-1314","word":"hero","ipa":"/ˈhɪroʊ/","kr":"**히**로","mark":"*","pos":"명","mean":"① 영웅 ② 주인공","ex":[{"en":"The firefighter became a local **hero**.","ko":"그 소방관은 지역의 영웅이 되었다."},{"en":"The main **hero** of the film is a doctor.","ko":"그 영화의 주인공은 의사다."}]},{"id":"vocab-1315","word":"hesitate","ipa":"/ˈhezɪteɪt/","kr":"**헤**지테이트","mark":"**","pos":"동","mean":"① 망설이다 ② 주저하다","ex":[{"en":"Do not **hesitate** to ask questions.","ko":"질문하기를 망설이지 마라."},{"en":"If anything is unclear, do not **hesitate** to ask.","ko":"무엇이든 불분명하면 주저하지 말고 물어보세요."}]},{"id":"vocab-1316","word":"hide","ipa":"/haɪd/","kr":"**하이드**","mark":"**","pos":"동","mean":"① 숨기다 ② 숨다","ex":[{"en":"Do not **hide** the error from the team.","ko":"그 오류를 팀에게 숨기지 마라."},{"en":"The cat **hid** under the bed.","ko":"고양이는 침대 아래에 숨었다."}]},{"id":"vocab-1317","word":"hierarchy","ipa":"/ˈhaɪərɑːrki/","kr":"**하이**어라키","mark":"","pos":"명","mean":"① 계급 ② 위계","ex":[{"en":"The military uses a clear rank **hierarchy**.","ko":"군대는 분명한 계급 체계를 사용한다."},{"en":"The parent company has a strict **hierarchy**.","ko":"그 모회사는 엄격한 위계를 지녔다."}]},{"id":"vocab-1318","word":"high","ipa":"/haɪ/","kr":"**하이**","mark":"*","pos":"형/부","mean":"① 높은 ② 높이","ex":[{"en":"The mountain is very **high**.","ko":"그 산은 매우 높다."},{"en":"The bird flew **high** in the sky.","ko":"그 새는 하늘 높이 날았다."}]},{"id":"vocab-1319","word":"highlight","ipa":"/ˈhaɪlaɪt/","kr":"**하이**라잇","mark":"","pos":"동/명","mean":"① 강조하다 ② 가장 중요한 부분","ex":[{"en":"She **highlighted** the key point.","ko":"그녀는 핵심 요점을 강조했다."},{"en":"The **highlight** of the event was the final speech.","ko":"그 행사의 가장 중요한 부분은 마지막 연설이었다."}]},{"id":"vocab-1320","word":"highway","ipa":"/ˈhaɪweɪ/","kr":"**하이**웨이","mark":"**","pos":"명","mean":"고속도로","ex":[{"en":"We drove on the **highway**.","ko":"우리는 고속도로에서 운전했다."}]},{"id":"vocab-1321","word":"hike","ipa":"/haɪk/","kr":"**하익**","mark":"*","pos":"동/명","mean":"① 하이킹하다 ② 도보 여행","ex":[{"en":"We **hiked** through the forest on Sunday.","ko":"우리는 일요일에 숲을 하이킹했다."},{"en":"The weekend **hike** took three hours.","ko":"주말 도보 여행은 세 시간 걸렸다."}]},{"id":"vocab-1322","word":"hill","ipa":"/hɪl/","kr":"**힐**","mark":"*","pos":"명","mean":"언덕","ex":[{"en":"The house is on a **hill**.","ko":"그 집은 언덕 위에 있다."}]},{"id":"vocab-1323","word":"hint","ipa":"/hɪnt/","kr":"**힌트**","mark":"**","pos":"명/동","mean":"① 힌트 ② 암시하다","ex":[{"en":"Can you give me a **hint**?","ko":"나에게 힌트를 줄 수 있니?"},{"en":"His silence **hinted** that something was wrong.","ko":"그의 침묵은 무언가 잘못되었다고 암시했다."}]},{"id":"vocab-1324","word":"hire","ipa":"/ˈhaɪər/","kr":"**하이**어","mark":"**","pos":"동","mean":"① 고용하다 ② 빌리다","ex":[{"en":"The store **hired** two new workers.","ko":"그 가게는 새 직원 두 명을 고용했다."},{"en":"We **hired** a car for the business trip.","ko":"우리는 출장을 위해 차를 빌렸다."}]},{"id":"vocab-1325","word":"history","ipa":"/ˈhɪstri/","kr":"**히**스트리","mark":"*","pos":"명","mean":"역사","ex":[{"en":"We learned about Korean **history**.","ko":"우리는 한국 역사에 관해 배웠다."}]},{"id":"vocab-1326","word":"hit","ipa":"/hɪt/","kr":"**힛**","mark":"*","pos":"동/명","mean":"① 치다 ② 때리다 ③ 타격","ex":[{"en":"He **hit** the nail with a hammer.","ko":"그는 망치로 못을 쳤다."},{"en":"Do not **hit** the machine.","ko":"그 기계를 때리지 마라."},{"en":"The delay was a major **hit** to sales.","ko":"그 지연은 매출에 큰 타격이었다."}]},{"id":"vocab-1327","word":"hobby","ipa":"/ˈhɑːbi/","kr":"**하**비","mark":"*","pos":"명","mean":"취미","ex":[{"en":"Painting is her favorite **hobby**.","ko":"그림 그리기는 그녀가 가장 좋아하는 취미다."}]},{"id":"vocab-1328","word":"hold","ipa":"/hoʊld/","kr":"**홀드**","mark":"*","pos":"동","mean":"① 잡다 ② 들다 ③ 개최하다","ex":[{"en":"**Hold** my hand when we cross the street.","ko":"길을 건널 때 내 손을 잡아라."},{"en":"Please **hold** the box above your head.","ko":"상자를 머리 위로 들어 주세요."},{"en":"We will **hold** the meeting online.","ko":"우리는 회의를 온라인으로 개최할 것이다."}]},{"id":"vocab-1329","word":"hole","ipa":"/hoʊl/","kr":"**홀**","mark":"**","pos":"명","mean":"구멍","ex":[{"en":"There is a **hole** in my sock.","ko":"내 양말에 구멍이 났다."}]},{"id":"vocab-1330","word":"holiday","ipa":"/ˈhɑːlədeɪ/","kr":"**할**러데이","mark":"*","pos":"명","mean":"① 휴일 ② 방학","ex":[{"en":"We go abroad during the **holiday**.","ko":"우리는 휴일 동안 해외에 간다."},{"en":"The children have a two-week school **holiday**.","ko":"아이들은 2주간의 학교 방학이 있다."}]},{"id":"vocab-1331","word":"holy","ipa":"/ˈhoʊli/","kr":"**홀**리","mark":"","pos":"형","mean":"① 신성한 ② 거룩한","ex":[{"en":"They visited a **holy** place.","ko":"그들은 신성한 장소를 방문했다."},{"en":"Pilgrims gathered at the **holy** site before dawn.","ko":"순례자들은 동이 트기 전에 그 신성한 장소에 모였다."}]},{"id":"vocab-1332","word":"home","ipa":"/hoʊm/","kr":"**홈**","mark":"*","pos":"명","mean":"① 집 ② 가정","ex":[{"en":"I went **home** after school.","ko":"나는 방과 후 집에 갔다."},{"en":"A safe **home** begins with trust.","ko":"안전한 가정은 신뢰에서 시작된다."}]},{"id":"vocab-1333","word":"homework","ipa":"/ˈhoʊmwɜːrk/","kr":"**홈**워크","mark":"*","pos":"명","mean":"숙제","ex":[{"en":"I finished my **homework**.","ko":"나는 숙제를 끝냈다."}]},{"id":"vocab-1334","word":"honest","ipa":"/ˈɑːnɪst/","kr":"**아**니스트","mark":"*","pos":"형","mean":"정직한","ex":[{"en":"Julia is an **honest** person.","ko":"줄리아는 정직한 사람이다."}]},{"id":"vocab-1335","word":"honey","ipa":"/ˈhʌni/","kr":"**허**니","mark":"**","pos":"명","mean":"꿀","ex":[{"en":"Add a spoonful of **honey** to the tea.","ko":"차에 꿀 한 숟가락을 넣어라."}]},{"id":"vocab-1336","word":"honor / honour","ipa":"/ˈɑːnər/","kr":"**아**너","mark":"**","pos":"명/동","mean":"① 명예 ② 존경하다","ex":[{"en":"It was an **honor** to represent the team.","ko":"팀을 대표하는 것은 명예였다."},{"en":"We **honor** employees who serve the community.","ko":"우리는 지역사회에 봉사하는 직원들을 존경한다."}]},{"id":"vocab-1337","word":"hook","ipa":"/hʊk/","kr":"**훅**","mark":"","pos":"명","mean":"① 고리 ② 갈고리","ex":[{"en":"Hang the coat on the **hook**.","ko":"외투를 고리에 걸어라."},{"en":"The worker used a **hook** to lift the bag.","ko":"그 작업자는 가방을 들기 위해 갈고리를 사용했다."}]},{"id":"vocab-1338","word":"hope","ipa":"/hoʊp/","kr":"**호프**","mark":"*","pos":"명/동","mean":"① 희망 ② 바라다","ex":[{"en":"There is still **hope** for a quick recovery.","ko":"빠른 회복에 대한 희망이 아직 있다."},{"en":"I **hope** the new employee feels welcome.","ko":"나는 신입 직원이 환영받는다고 느끼기를 바란다."}]},{"id":"vocab-1339","word":"horizon","ipa":"/həˈraɪzn/","kr":"허**라이**즌","mark":"","pos":"명","mean":"① 지평선 ② 수평선","ex":[{"en":"The sun rose above the **horizon**.","ko":"해가 지평선 위로 떠올랐다."},{"en":"The sun sank below the **horizon**.","ko":"해가 수평선 아래로 졌다."}]},{"id":"vocab-1340","word":"horror","ipa":"/ˈhɔːrər/","kr":"**호ː**러","mark":"","pos":"명","mean":"공포","ex":[{"en":"Emma watched a **horror** movie.","ko":"엠마는 공포 영화를 봤다."}]},{"id":"vocab-1341","word":"horse","ipa":"/hɔːrs/","kr":"**호ː**스","mark":"*","pos":"명","mean":"말","ex":[{"en":"The **horse** ran across the field.","ko":"말이 들판을 가로질러 달렸다."}]},{"id":"vocab-1342","word":"hospital","ipa":"/ˈhɑːspɪtl/","kr":"**하**스피틀","mark":"*","pos":"명","mean":"병원","ex":[{"en":"Minho was taken to the **hospital**.","ko":"민호는 병원으로 옮겨졌다."}]},{"id":"vocab-1343","word":"host","ipa":"/hoʊst/","kr":"**호스트**","mark":"","pos":"명/동","mean":"① 주인 ② 진행자 ③ 주최하다","ex":[{"en":"Hana was a kind **host**.","ko":"하나는 친절한 주인이었다."},{"en":"The **host** introduced the first speaker.","ko":"진행자가 첫 발표자를 소개했다."},{"en":"Our school will **host** the event.","ko":"우리 학교가 그 행사를 주최할 것이다."}]},{"id":"vocab-1344","word":"hostile","ipa":"/ˈhɑːstl/","kr":"**하**스틀","mark":"","pos":"형","mean":"적대적인","ex":[{"en":"Noah gave a **hostile** look.","ko":"노아는 적대적인 표정을 지었다."}]},{"id":"vocab-1345","word":"hot","ipa":"/hɑːt/","kr":"**핫**","mark":"*","pos":"형","mean":"① 뜨거운 ② 더운","ex":[{"en":"Be careful; the coffee is **hot**.","ko":"조심해라. 커피가 뜨겁다."},{"en":"It is **hot** in the office today.","ko":"오늘 사무실은 덥다."}]},{"id":"vocab-1346","word":"hotel","ipa":"/hoʊˈtel/","kr":"호**텔**","mark":"**","pos":"명","mean":"호텔","ex":[{"en":"We stayed at a small **hotel**.","ko":"우리는 작은 호텔에 묵었다."}]},{"id":"vocab-1347","word":"hour","ipa":"/ˈaʊər/","kr":"**아우**어","mark":"*","pos":"명","mean":"시간","ex":[{"en":"The trip takes one **hour**.","ko":"그 여행은 한 시간 걸린다."}]},{"id":"vocab-1348","word":"house","ipa":"/haʊs/","kr":"**하우스**","mark":"*","pos":"명","mean":"집","ex":[{"en":"They live in a white **house**.","ko":"그들은 흰 집에 산다."}]},{"id":"vocab-1349","word":"household","ipa":"/ˈhaʊshoʊld/","kr":"**하우스**홀드","mark":"","pos":"명","mean":"① 가정 ② 가구","ex":[{"en":"Every **household** needs clean water.","ko":"모든 가정에는 깨끗한 물이 필요하다."},{"en":"Five people live in this **household**.","ko":"이 가구에는 다섯 명이 산다."}]},{"id":"vocab-1350","word":"how","ipa":"/haʊ/","kr":"**하우**","mark":"*","pos":"부","mean":"① 어떻게 ② 얼마나","ex":[{"en":"**How** did you solve the problem?","ko":"너는 그 문제를 어떻게 풀었니?"},{"en":"**How** much time do we have?","ko":"우리에게 시간이 얼마나 있나요?"}]},{"id":"vocab-1351","word":"however","ipa":"/haʊˈevər/","kr":"하우**에**버","mark":"*","pos":"부","mean":"① 그러나 ② 하지만","ex":[{"en":"The task is difficult; **however**, it is possible.","ko":"그 일은 어렵다. 그러나 가능하다."},{"en":"I understand your point; **however**, I disagree.","ko":"당신의 요점을 이해한다. 하지만 나는 동의하지 않는다."}]},{"id":"vocab-1352","word":"hug","ipa":"/hʌɡ/","kr":"**허그**","mark":"**","pos":"동/명","mean":"① 껴안다 ② 포옹","ex":[{"en":"She **hugged** her mother.","ko":"그녀는 어머니를 껴안았다."},{"en":"Mina gave her friend a warm **hug**.","ko":"미나는 친구에게 따뜻한 포옹을 했다."}]},{"id":"vocab-1353","word":"huge","ipa":"/hjuːdʒ/","kr":"**휴ː**지","mark":"**","pos":"형","mean":"① 거대한 ② 막대한","ex":[{"en":"A **huge** crowd filled the square.","ko":"거대한 군중이 광장을 가득 메웠다."},{"en":"A growing company suffered a **huge** financial loss.","ko":"한 성장 중인 회사는 막대한 재정 손실을 입었다."}]},{"id":"vocab-1354","word":"human","ipa":"/ˈhjuːmən/","kr":"**휴ː**먼","mark":"*","pos":"명/형","mean":"① 인간 ② 인간의","ex":[{"en":"Every **human** needs water.","ko":"모든 인간은 물이 필요하다."},{"en":"**Human** error caused the problem.","ko":"인간의 실수가 그 문제를 일으켰다."}]},{"id":"vocab-1355","word":"humor / humour","ipa":"/ˈhjuːmər/","kr":"**휴ː**머","mark":"**","pos":"명","mean":"① 유머 ② 익살","ex":[{"en":"Alex has a good sense of **humor**.","ko":"알렉스는 유머 감각이 좋다."},{"en":"His dry **humor** made us laugh.","ko":"그의 건조한 익살은 우리를 웃게 했다."}]},{"id":"vocab-1356","word":"hundred","ipa":"/ˈhʌndrəd/","kr":"**헌**드러드","mark":"*","pos":"명/형","mean":"① 백 ② 100","ex":[{"en":"The book has a **hundred** pages.","ko":"그 책은 백 쪽이다."},{"en":"One **hundred** is written as 100.","ko":"백은 100으로 쓴다."}]},{"id":"vocab-1357","word":"hunger (hungry)","ipa":"/ˈhʌŋɡər/","kr":"**헝**거","mark":"**","pos":"명","mean":"① 배고픔 ② 굶주림","ex":[{"en":"The food ended his **hunger**.","ko":"그 음식은 그의 배고픔을 없앴다."},{"en":"Many children suffer from **hunger**.","ko":"많은 아이들이 굶주림에 시달린다."}]},{"id":"vocab-1358","word":"hunt","ipa":"/hʌnt/","kr":"**헌트**","mark":"*","pos":"동/명","mean":"① 사냥하다 ② 사냥","ex":[{"en":"Lions **hunt** at night.","ko":"사자는 밤에 사냥한다."},{"en":"The **hunt** lasted all day.","ko":"그 사냥은 하루 종일 계속됐다."}]},{"id":"vocab-1359","word":"hurry","ipa":"/ˈhɜːri/","kr":"**허ː**리","mark":"*","pos":"동/명","mean":"① 서두르다 ② 서두름","ex":[{"en":"**Hurry** to the gate before it closes.","ko":"문이 닫히기 전에 서둘러 대문으로 가라."},{"en":"There is no need for **hurry**.","ko":"서두름이 필요 없다."}]},{"id":"vocab-1360","word":"hurt","ipa":"/hɜːrt/","kr":"**허ː**트","mark":"**","pos":"동","mean":"① 다치게 하다 ② 아프다","ex":[{"en":"The falling box **hurt** his foot.","ko":"떨어진 상자가 그의 발을 다치게 했다."},{"en":"My ankle **hurts** when I walk.","ko":"걸을 때 내 발목이 아프다."}]},{"id":"vocab-1361","word":"husband","ipa":"/ˈhʌzbənd/","kr":"**허**즈번드","mark":"*","pos":"명","mean":"남편","ex":[{"en":"Her **husband** works at a bank.","ko":"그녀의 남편은 은행에서 일한다."}]},{"id":"vocab-1362","word":"hut","ipa":"/hʌt/","kr":"**헛**","mark":"","pos":"명","mean":"오두막","ex":[{"en":"The hikers slept in a mountain **hut**.","ko":"등산객들은 산속 오두막에서 잤다."}]},{"id":"vocab-1363","word":"hypothesis","ipa":"/haɪˈpɑːθəsɪs/","kr":"하이**파**써시스","mark":"","pos":"명","mean":"가설","ex":[{"en":"The experiment supported her **hypothesis**.","ko":"그 실험은 그녀의 가설을 뒷받침했다."}]},{"id":"vocab-1364","word":"I","ipa":"/aɪ/","kr":"**아이**","mark":"*","pos":"대","mean":"① 나 ② 내가","ex":[{"en":"**I** like music.","ko":"나는 음악을 좋아한다."},{"en":"**I** will send the report today.","ko":"내가 오늘 그 보고서를 보낼 것이다."}]},{"id":"vocab-1365","word":"ice","ipa":"/aɪs/","kr":"**아이스**","mark":"*","pos":"명","mean":"얼음","ex":[{"en":"Put some **ice** in the drink.","ko":"음료에 얼음을 좀 넣어라."}]},{"id":"vocab-1366","word":"idea","ipa":"/aɪˈdiːə/","kr":"아이**디ː**어","mark":"*","pos":"명","mean":"① 생각 ② 아이디어","ex":[{"en":"That is a great **idea**.","ko":"그것은 훌륭한 생각이다."},{"en":"Her **idea** improved the support process.","ko":"그녀의 아이디어는 지원 절차를 개선했다."}]},{"id":"vocab-1367","word":"ideal","ipa":"/aɪˈdiːəl/","kr":"아이**디ː**얼","mark":"","pos":"형/명","mean":"① 이상적인 ② 이상","ex":[{"en":"This is an **ideal** place to rest.","ko":"이곳은 쉬기에 이상적인 장소다."},{"en":"This weather is **ideal** for a picnic.","ko":"이 날씨는 소풍에 이상적이다."}]},{"id":"vocab-1368","word":"identical","ipa":"/aɪˈdentɪkl/","kr":"아이**덴**티클","mark":"","pos":"형","mean":"① 똑같은 ② 동일한","ex":[{"en":"The twins wore **identical** clothes.","ko":"그 쌍둥이는 똑같은 옷을 입었다."},{"en":"The two contracts are **identical** in every detail.","ko":"두 계약서는 모든 세부 사항에서 동일하다."}]},{"id":"vocab-1369","word":"identity (identify)","ipa":"/aɪˈdentəti/","kr":"아이**덴**터티","mark":"**","pos":"명","mean":"① 신원 ② 정체성","ex":[{"en":"The police checked his **identity**.","ko":"경찰이 그의 신원을 확인했다."},{"en":"The parent company is building a new brand **identity**.","ko":"그 모회사는 새로운 브랜드 정체성을 구축하고 있다."}]},{"id":"vocab-1370","word":"ideology","ipa":"/ˌaɪdiˈɑːlədʒi/","kr":"아이디**알**러지","mark":"","pos":"명","mean":"① 이념 ② 이데올로기","ex":[{"en":"The book examines political **ideology**.","ko":"그 책은 정치 이념을 살펴본다."},{"en":"The book explains political **ideology** in plain language.","ko":"그 책은 정치 이데올로기를 쉬운 말로 설명한다."}]},{"id":"vocab-1371","word":"if","ipa":"/ɪf/","kr":"**이프**","mark":"*","pos":"접","mean":"만약 ~라면","ex":[{"en":"**If** the system fails, call IT support.","ko":"만약 시스템이 고장 나면 IT 지원팀에 전화해라."}]},{"id":"vocab-1372","word":"ignore","ipa":"/ɪɡˈnɔːr/","kr":"이그**노ː**","mark":"**","pos":"동","mean":"무시하다","ex":[{"en":"Do not **ignore** the warning.","ko":"그 경고를 무시하지 마라."}]},{"id":"vocab-1373","word":"ill","ipa":"/ɪl/","kr":"**일**","mark":"**","pos":"형","mean":"① 아픈 ② 병든","ex":[{"en":"I felt **ill** after lunch.","ko":"나는 점심 후에 아팠다."},{"en":"The clinic cares for **ill** patients.","ko":"그 진료소는 병든 환자들을 돌본다."}]},{"id":"vocab-1374","word":"illude (illusion)","ipa":"/ɪˈluːd/","kr":"일**루ː**드","mark":"","pos":"동","mean":"착각하게 하다","ex":[{"en":"Do not let appearances **illude** you.","ko":"겉모습이 너를 속이게 하지 마라."}]},{"id":"vocab-1375","word":"illustrate","ipa":"/ˈɪləstreɪt/","kr":"**일**러스트레이트","mark":"**","pos":"동","mean":"① 삽화를 그리다 ② 설명하다","ex":[{"en":"She **illustrated** the book with simple drawings.","ko":"그녀는 간단한 그림으로 책에 삽화를 그렸다."},{"en":"She **illustrated** the story with pictures.","ko":"그녀는 그 이야기를 그림으로 설명했다."}]},{"id":"vocab-1376","word":"image","ipa":"/ˈɪmɪdʒ/","kr":"**이**미지","mark":"*","pos":"명","mean":"① 이미지 ② 형상","ex":[{"en":"The **image** is very clear.","ko":"그 이미지는 매우 선명하다."},{"en":"The statue has the **image** of a bird.","ko":"그 조각상은 새의 형상을 가지고 있다."}]},{"id":"vocab-1377","word":"imagine","ipa":"/ɪˈmædʒɪn/","kr":"이**매**진","mark":"**","pos":"동","mean":"상상하다","ex":[{"en":"**Imagine** living on the moon.","ko":"달에서 사는 것을 상상해 봐라."}]},{"id":"vocab-1378","word":"imitate","ipa":"/ˈɪmɪteɪt/","kr":"**이**미테이트","mark":"","pos":"동","mean":"① 모방하다 ② 흉내 내다","ex":[{"en":"Children **imitate** their parents.","ko":"아이들은 부모를 모방한다."},{"en":"One child **imitated** the bird's song.","ko":"한 아이는 새의 노래를 흉내 냈다."}]},{"id":"vocab-1379","word":"immediate","ipa":"/ɪˈmiːdiət/","kr":"이**미ː**디엇","mark":"**","pos":"형","mean":"① 즉각적인 ② 당면한","ex":[{"en":"The patient needs **immediate** help.","ko":"그 환자는 즉각적인 도움이 필요하다."},{"en":"Our **immediate** concern is the current outage.","ko":"우리의 당면한 관심사는 현재 장애다."}]},{"id":"vocab-1380","word":"immense","ipa":"/ɪˈmens/","kr":"이**멘스**","mark":"","pos":"형","mean":"① 엄청난 ② 거대한","ex":[{"en":"The project took **immense** effort.","ko":"그 프로젝트는 엄청난 노력이 들었다."},{"en":"An **immense** building stood beside the river.","ko":"거대한 건물이 강 옆에 서 있었다."}]},{"id":"vocab-1381","word":"immigrate","ipa":"/ˈɪmɪɡreɪt/","kr":"**이**미그레이트","mark":"","pos":"동","mean":"이민 오다","ex":[{"en":"They **immigrated** to Canada.","ko":"그들은 캐나다로 이민 왔다."}]},{"id":"vocab-1382","word":"immune","ipa":"/ɪˈmjuːn/","kr":"이**뮨ː**","mark":"","pos":"형","mean":"① 면역의 ② 면제된","ex":[{"en":"The vaccine made them **immune** to the disease.","ko":"그 백신은 그들이 그 질병에 면역을 갖게 했다."},{"en":"Managers are not **immune** from the rule.","ko":"관리자들은 그 규칙에서 면제되지 않는다."}]},{"id":"vocab-1383","word":"impact","ipa":"/ˈɪmpækt/","kr":"**임**팩트","mark":"","pos":"명/동","mean":"① 영향 ② 충격","ex":[{"en":"The news had a big **impact**.","ko":"그 소식은 큰 영향을 미쳤다."},{"en":"The fall caused a strong **impact**.","ko":"그 추락은 강한 충격을 일으켰다."}]},{"id":"vocab-1384","word":"imperial","ipa":"/ɪmˈpɪriəl/","kr":"임**피**리얼","mark":"","pos":"형","mean":"① 제국의 ② 황제의","ex":[{"en":"The map shows the old **imperial** borders.","ko":"그 지도는 옛 제국의 국경을 보여 준다."},{"en":"The **imperial** family lived in the palace.","ko":"황제의 가족은 궁전에 살았다."}]},{"id":"vocab-1385","word":"implement","ipa":"/ˈɪmplɪment/","kr":"**임**플리먼트","mark":"","pos":"동","mean":"① 시행하다 ② 실행하다","ex":[{"en":"The school **implemented** a new policy.","ko":"학교는 새 정책을 시행했다."},{"en":"One team **implemented** the plan.","ko":"한 팀은 계획을 실행했다."}]},{"id":"vocab-1386","word":"imply","ipa":"/ɪmˈplaɪ/","kr":"임**플라이**","mark":"","pos":"동","mean":"① 암시하다 ② 함축하다","ex":[{"en":"His silence **implied** agreement.","ko":"그의 침묵은 동의를 암시했다."},{"en":"The phrase **implies** more than it says.","ko":"그 표현은 말한 것보다 더 많은 뜻을 함축한다."}]},{"id":"vocab-1387","word":"import (importance, important)","ipa":"/ɪmˈpɔːrt/","kr":"임**포ː**트","mark":"","pos":"명/동","mean":"① 수입 ② 수입하다","ex":[{"en":"Oil **imports** increased last year.","ko":"석유 수입은 지난해 증가했다."},{"en":"The country **imports** most of its oil.","ko":"그 나라는 석유 대부분을 수입한다."}]},{"id":"vocab-1388","word":"impose","ipa":"/ɪmˈpoʊz/","kr":"임**포즈**","mark":"","pos":"동","mean":"① 부과하다 ② 강요하다","ex":[{"en":"The city **imposed** a new tax.","ko":"시는 새 세금을 부과했다."},{"en":"Do not **impose** your opinion on the team.","ko":"당신의 의견을 팀에 강요하지 마라."}]},{"id":"vocab-1389","word":"impress","ipa":"/ɪmˈpres/","kr":"임**프레스**","mark":"**","pos":"동","mean":"감명을 주다","ex":[{"en":"Her speech **impressed** the audience.","ko":"그녀의 연설은 청중에게 감명을 주었다."}]},{"id":"vocab-1390","word":"improve","ipa":"/ɪmˈpruːv/","kr":"임**프루ː**브","mark":"**","pos":"동","mean":"① 향상시키다 ② 개선하다","ex":[{"en":"I want to **improve** my English.","ko":"나는 영어를 향상시키고 싶다."},{"en":"We changed the process to **improve** customer service.","ko":"우리는 고객 서비스를 개선하려고 절차를 바꿨다."}]},{"id":"vocab-1391","word":"in","ipa":"/ɪn/","kr":"**인**","mark":"*","pos":"전","mean":"① ~안에 ② ~에","ex":[{"en":"The keys are **in** my bag.","ko":"열쇠는 내 가방 안에 있다."},{"en":"I left the spare keys **in** the box.","ko":"나는 여분의 열쇠를 상자 안에 두었다."}]},{"id":"vocab-1392","word":"incentive","ipa":"/ɪnˈsentɪv/","kr":"인**센**티브","mark":"","pos":"명","mean":"① 유인 ② 장려책","ex":[{"en":"Money is a strong **incentive**.","ko":"돈은 강력한 유인이다."},{"en":"Flexible hours are a useful hiring **incentive**.","ko":"유연한 근무 시간은 유용한 채용 장려책이다."}]},{"id":"vocab-1393","word":"incident","ipa":"/ˈɪnsɪdənt/","kr":"**인**시던트","mark":"","pos":"명","mean":"사건","ex":[{"en":"The police investigated the **incident**.","ko":"경찰은 그 사건을 조사했다."}]},{"id":"vocab-1394","word":"incline","ipa":"/ɪnˈklaɪn/","kr":"인**클라인**","mark":"","pos":"동/명","mean":"① 기울다 ② 경사","ex":[{"en":"The road **inclines** steeply.","ko":"그 길은 가파르게 기울어 있다."},{"en":"The road has a steep **incline** near the bridge.","ko":"그 길은 다리 근처에 가파른 경사가 있다."}]},{"id":"vocab-1395","word":"include","ipa":"/ɪnˈkluːd/","kr":"인**클루ː**드","mark":"**","pos":"동","mean":"포함하다","ex":[{"en":"The price **includes** breakfast.","ko":"그 가격에는 아침 식사가 포함된다."}]},{"id":"vocab-1396","word":"income","ipa":"/ˈɪnkʌm/","kr":"**인**컴","mark":"**","pos":"명","mean":"① 소득 ② 수입","ex":[{"en":"His monthly **income** is stable.","ko":"그의 월 소득은 안정적이다."},{"en":"Her monthly **income** is her main source of money.","ko":"그녀의 월수입은 주된 돈의 원천이다."}]},{"id":"vocab-1397","word":"incorporate","ipa":"/ɪnˈkɔːrpəreɪt/","kr":"인**코ː**퍼레이트","mark":"","pos":"동","mean":"① 포함하다 ② 통합하다","ex":[{"en":"The design **incorporates** natural materials.","ko":"그 디자인은 천연 재료를 포함한다."},{"en":"The new system **incorporates** two tools.","ko":"새 시스템은 두 도구를 통합한다."}]},{"id":"vocab-1398","word":"increase","ipa":"/ɪnˈkriːs/","kr":"인**크리ː**스","mark":"**","pos":"동/명","mean":"① 증가하다 ② 증가","ex":[{"en":"Online orders continue to **increase**.","ko":"온라인 주문은 계속 증가한다."},{"en":"We saw a sharp **increase** in support requests.","ko":"우리는 지원 요청의 급격한 증가를 보았다."}]},{"id":"vocab-1399","word":"indeed","ipa":"/ɪnˈdiːd/","kr":"인**디ː**드","mark":"**","pos":"부","mean":"① 정말로 ② 실로","ex":[{"en":"It was **indeed** a difficult task.","ko":"그것은 정말로 어려운 일이었다."},{"en":"The result was **indeed** surprising.","ko":"그 결과는 실로 놀라웠다."}]},{"id":"vocab-1400","word":"index","ipa":"/ˈɪndeks/","kr":"**인**덱스","mark":"","pos":"명","mean":"① 색인 ② 지수","ex":[{"en":"Look up the word in the **index**.","ko":"색인에서 그 단어를 찾아봐라."},{"en":"The stock **index** rose today.","ko":"주가 지수가 오늘 올랐다."}]},{"id":"vocab-1401","word":"indicate","ipa":"/ˈɪndɪkeɪt/","kr":"**인**디케이트","mark":"**","pos":"동","mean":"① 나타내다 ② 가리키다","ex":[{"en":"The red icon **indicates** an error.","ko":"빨간 아이콘은 오류를 나타낸다."},{"en":"The arrow **indicates** the exit.","ko":"화살표는 출구를 가리킨다."}]},{"id":"vocab-1402","word":"individual","ipa":"/ˌɪndɪˈvɪdʒuəl/","kr":"인디**비**주얼","mark":"**","pos":"명/형","mean":"① 개인 ② 개별의","ex":[{"en":"Each **individual** has different needs.","ko":"각 개인은 서로 다른 필요를 가지고 있다."},{"en":"Each folder stores an **individual** file.","ko":"각 폴더는 개별의 파일을 저장한다."}]},{"id":"vocab-1403","word":"induce","ipa":"/ɪnˈduːs/","kr":"인**듀ː**스","mark":"","pos":"동","mean":"① 유도하다 ② 유발하다","ex":[{"en":"The doctor **induced** sleep.","ko":"의사가 잠을 유도했다."},{"en":"This medicine may **induce** sleep.","ko":"이 약은 잠을 유발할 수 있다."}]},{"id":"vocab-1404","word":"industry","ipa":"/ˈɪndəstri/","kr":"**인**더스트리","mark":"**","pos":"명","mean":"① 산업 ② 근면","ex":[{"en":"Tourism is an important **industry** here.","ko":"관광업은 이곳의 중요한 산업이다."},{"en":"Her **industry** impressed the manager.","ko":"그녀의 근면은 관리자를 감동시켰다."}]},{"id":"vocab-1405","word":"infant","ipa":"/ˈɪnfənt/","kr":"**인**펀트","mark":"","pos":"명","mean":"① 유아 ② 아기","ex":[{"en":"The **infant** slept peacefully.","ko":"그 유아는 평화롭게 잠들었다."},{"en":"The **infant** slept quietly beside her mother.","ko":"그 아기는 어머니 옆에서 조용히 잤다."}]},{"id":"vocab-1406","word":"infect","ipa":"/ɪnˈfekt/","kr":"인**펙트**","mark":"","pos":"동","mean":"감염시키다","ex":[{"en":"The virus can **infect** humans.","ko":"그 바이러스는 인간을 감염시킬 수 있다."}]},{"id":"vocab-1407","word":"infer (inference)","ipa":"/ɪnˈfɜːr/","kr":"인**퍼ː**","mark":"","pos":"동","mean":"① 추론하다 ② 유추하다","ex":[{"en":"We can **infer** the answer from the evidence.","ko":"우리는 그 증거에서 답을 추론할 수 있다."},{"en":"From these examples, we can **infer** the rule.","ko":"이 예들로부터 우리는 규칙을 유추할 수 있다."}]},{"id":"vocab-1408","word":"inflate","ipa":"/ɪnˈfleɪt/","kr":"인**플레잇**","mark":"","pos":"동","mean":"① 부풀리다 ② 팽창시키다","ex":[{"en":"**Inflate** the balloon with air.","ko":"풍선을 공기로 부풀려라."},{"en":"The pump **inflates** the tire.","ko":"그 펌프는 타이어를 팽창시킨다."}]},{"id":"vocab-1409","word":"influence","ipa":"/ˈɪnfluəns/","kr":"**인**플루언스","mark":"**","pos":"명/동","mean":"① 영향 ② 영향을 주다","ex":[{"en":"Her teacher had a big **influence**.","ko":"그녀의 선생님은 큰 영향을 미쳤다."},{"en":"Parents **influence** their children.","ko":"부모는 자녀에게 영향을 준다."}]},{"id":"vocab-1410","word":"inform","ipa":"/ɪnˈfɔːrm/","kr":"인**폼ː**","mark":"**","pos":"동","mean":"① 알리다 ② 통지하다","ex":[{"en":"Please **inform** me of the change.","ko":"그 변경 사항을 나에게 알려 주세요."},{"en":"HR **informed** all staff of the change.","ko":"HR은 모든 직원에게 변경 사항을 통지했다."}]},{"id":"vocab-1411","word":"ingredient","ipa":"/ɪnˈɡriːdiənt/","kr":"인**그리ː**디언트","mark":"","pos":"명","mean":"① 재료 ② 성분","ex":[{"en":"Flour is the main **ingredient** in bread.","ko":"밀가루는 빵의 주재료다."},{"en":"Sugar is one **ingredient** in the sauce.","ko":"설탕은 그 소스의 한 성분이다."}]},{"id":"vocab-1412","word":"inhabit","ipa":"/ɪnˈhæbɪt/","kr":"인**해**빗","mark":"","pos":"동","mean":"① 살다 ② 서식하다","ex":[{"en":"Many people **inhabit** the coastal town.","ko":"많은 사람들이 그 해안 도시에 산다."},{"en":"Rare birds **inhabit** this wetland.","ko":"희귀한 새들이 이 습지에 서식한다."}]},{"id":"vocab-1413","word":"inherent","ipa":"/ɪnˈhɪrənt/","kr":"인**히**런트","mark":"","pos":"형","mean":"① 내재된 ② 타고난","ex":[{"en":"Risk is **inherent** in every major change.","ko":"위험은 모든 큰 변화에 내재되어 있다."},{"en":"Curiosity is **inherent** in children.","ko":"호기심은 아이들에게 타고난 것이다."}]},{"id":"vocab-1414","word":"inhibit","ipa":"/ɪnˈhɪbɪt/","kr":"인**히**빗","mark":"","pos":"동","mean":"① 억제하다 ② 방해하다","ex":[{"en":"Fear can **inhibit** growth.","ko":"두려움은 성장을 억제할 수 있다."},{"en":"Fear can **inhibit** a student’s learning.","ko":"두려움은 학생의 학습을 방해할 수 있다."}]},{"id":"vocab-1415","word":"initial","ipa":"/ɪˈnɪʃl/","kr":"이**니**셜","mark":"","pos":"형/명","mean":"① 처음의 ② 머리글자","ex":[{"en":"The **initial** plan was simple.","ko":"처음 계획은 단순했다."},{"en":"Write your first and last **initials** here.","ko":"여기에 이름과 성의 머리글자를 써라."}]},{"id":"vocab-1416","word":"inject","ipa":"/ɪnˈdʒekt/","kr":"인**젝트**","mark":"","pos":"동","mean":"① 주사하다 ② 주입하다","ex":[{"en":"The nurse **injected** the medicine.","ko":"간호사가 약을 주사했다."},{"en":"The pump **injects** fuel into the engine.","ko":"그 펌프는 엔진에 연료를 주입한다."}]},{"id":"vocab-1417","word":"injure","ipa":"/ˈɪndʒər/","kr":"**인**저","mark":"**","pos":"동","mean":"① 부상을 입히다 ② 다치게 하다","ex":[{"en":"The accident **injured** three workers.","ko":"그 사고는 노동자 세 명에게 부상을 입혔다."},{"en":"The sharp edge may **injure** your hand.","ko":"날카로운 모서리는 당신의 손을 다치게 할 수 있다."}]},{"id":"vocab-1418","word":"inn","ipa":"/ɪn/","kr":"**인**","mark":"","pos":"명","mean":"여관","ex":[{"en":"During the weekend, we stayed at a small **inn**.","ko":"주말 동안, 우리는 작은 여관에 묵었다."}]},{"id":"vocab-1419","word":"innocent","ipa":"/ˈɪnəsnt/","kr":"**이**너슨트","mark":"**","pos":"형","mean":"① 무죄의 ② 순진한","ex":[{"en":"The court found him **innocent**.","ko":"법원은 그가 무죄라고 판단했다."},{"en":"The **innocent** child trusted everyone.","ko":"그 순진한 아이는 모두를 믿었다."}]},{"id":"vocab-1420","word":"innovate","ipa":"/ˈɪnəveɪt/","kr":"**이**너베이트","mark":"","pos":"동","mean":"혁신하다","ex":[{"en":"Companies must **innovate** to survive.","ko":"기업은 살아남기 위해 혁신해야 한다."}]},{"id":"vocab-1421","word":"input","ipa":"/ˈɪnpʊt/","kr":"**인**풋","mark":"","pos":"명/동","mean":"① 입력 ② 투입하다","ex":[{"en":"This system accepts voice **input**.","ko":"이 시스템은 음성 입력을 받는다."},{"en":"Please **input** the new employee data.","ko":"신입 직원 자료를 입력해 주세요."}]},{"id":"vocab-1422","word":"inquire / enquire","ipa":"/ɪnˈkwaɪər/","kr":"인**콰이**어","mark":"","pos":"동","mean":"① 문의하다 ② 묻다","ex":[{"en":"Grace called to **inquire** about the course.","ko":"그레이스는 강좌에 관해 문의하려고 전화했다."},{"en":"I **inquired** about the open position.","ko":"나는 그 빈 자리에 대해 물었다."}]},{"id":"vocab-1423","word":"insect","ipa":"/ˈɪnsekt/","kr":"**인**섹트","mark":"","pos":"명","mean":"곤충","ex":[{"en":"A butterfly is an **insect**.","ko":"나비는 곤충이다."}]},{"id":"vocab-1424","word":"insert","ipa":"/ɪnˈsɜːrt/","kr":"인**서ː**트","mark":"","pos":"동","mean":"① 삽입하다 ② 끼워 넣다","ex":[{"en":"**Insert** the card into the reader.","ko":"카드를 판독기에 삽입해라."},{"en":"The ticket slides into the machine after you **insert** it.","ko":"표를 기계에 끼워 넣으면 안으로 들어간다."}]},{"id":"vocab-1425","word":"inside","ipa":"/ˌɪnˈsaɪd/","kr":"인**사이드**","mark":"*","pos":"전/명","mean":"① ~안에 ② 내부","ex":[{"en":"Wait **inside** the building.","ko":"건물 안에서 기다려라."},{"en":"The **inside** of the server case was dusty.","ko":"서버 케이스의 내부는 먼지가 많았다."}]},{"id":"vocab-1426","word":"insight","ipa":"/ˈɪnsaɪt/","kr":"**인**사잇","mark":"","pos":"명","mean":"① 통찰 ② 통찰력","ex":[{"en":"The book gives **insight** into human behavior.","ko":"그 책은 인간 행동에 대한 통찰을 준다."},{"en":"Her experience gave her valuable **insight**.","ko":"그녀의 경험은 그녀에게 귀중한 통찰력을 주었다."}]},{"id":"vocab-1427","word":"insist","ipa":"/ɪnˈsɪst/","kr":"인**시스트**","mark":"**","pos":"동","mean":"① 주장하다 ② 고집하다","ex":[{"en":"She **insisted** that the data was correct.","ko":"그녀는 자료가 정확하다고 주장했다."},{"en":"She **insisted** on paying the bill.","ko":"그녀는 계산서를 내겠다고 고집했다."}]},{"id":"vocab-1428","word":"inspect","ipa":"/ɪnˈspekt/","kr":"인**스펙트**","mark":"**","pos":"동","mean":"① 검사하다 ② 점검하다","ex":[{"en":"The engineer **inspected** the cable for damage.","ko":"기술자는 손상 여부를 확인하려고 케이블을 검사했다."},{"en":"Before the test drive, the mechanic **inspected** the engine.","ko":"시험 운전 전에 정비사는 엔진을 점검했다."}]},{"id":"vocab-1429","word":"inspire","ipa":"/ɪnˈspaɪər/","kr":"인**스파이**어","mark":"","pos":"동","mean":"① 영감을 주다 ② 고무하다","ex":[{"en":"Her story **inspired** many people.","ko":"그녀의 이야기는 많은 사람에게 영감을 주었다."},{"en":"Her success **inspired** the new employees.","ko":"그녀의 성공은 신입 직원들을 고무했다."}]},{"id":"vocab-1430","word":"install","ipa":"/ɪnˈstɔːl/","kr":"인**스톨ː**","mark":"","pos":"동","mean":"설치하다","ex":[{"en":"They **installed** a new computer system.","ko":"그들은 새 컴퓨터 시스템을 설치했다."}]},{"id":"vocab-1431","word":"instance","ipa":"/ˈɪnstəns/","kr":"**인**스턴스","mark":"**","pos":"명","mean":"① 사례 ② 경우","ex":[{"en":"This is one **instance** of good teamwork.","ko":"이것은 훌륭한 협동의 한 사례다."},{"en":"In this **instance**, we should wait.","ko":"이 경우에는 우리가 기다려야 한다."}]},{"id":"vocab-1432","word":"instant","ipa":"/ˈɪnstənt/","kr":"**인**스턴트","mark":"**","pos":"형/명","mean":"① 즉각적인 ② 순간","ex":[{"en":"Mina made an **instant** decision.","ko":"미나는 즉각적인 결정을 내렸다."},{"en":"For an **instant**, the screen went dark.","ko":"한 순간 동안 화면이 어두워졌다."}]},{"id":"vocab-1433","word":"instead","ipa":"/ɪnˈsted/","kr":"인**스테드**","mark":"**","pos":"부","mean":"대신에","ex":[{"en":"We walked **instead** of taking a bus.","ko":"우리는 버스를 타는 대신 걸었다."}]},{"id":"vocab-1434","word":"instinct","ipa":"/ˈɪnstɪŋkt/","kr":"**인**스팅트","mark":"","pos":"명","mean":"본능","ex":[{"en":"Birds build nests by **instinct**.","ko":"새들은 본능적으로 둥지를 짓는다."}]},{"id":"vocab-1435","word":"institute (institution)","ipa":"/ˈɪnstɪtuːt/","kr":"**인**스티투ː트","mark":"","pos":"명","mean":"① 협회 ② 연구소","ex":[{"en":"The **institute** published new guidelines.","ko":"그 협회는 새로운 지침을 발표했다."},{"en":"Lina works at a research **institute**.","ko":"리나는 연구소에서 일한다."}]},{"id":"vocab-1436","word":"instruct","ipa":"/ɪnˈstrʌkt/","kr":"인**스트럭트**","mark":"**","pos":"동","mean":"① 지시하다 ② 가르치다","ex":[{"en":"The teacher **instructed** us to wait.","ko":"선생님은 우리에게 기다리라고 지시했다."},{"en":"She **instructs** new employees in basic safety.","ko":"그녀는 신입 직원들에게 기본 안전을 가르친다."}]},{"id":"vocab-1437","word":"instrument","ipa":"/ˈɪnstrəmənt/","kr":"**인**스트러먼트","mark":"**","pos":"명","mean":"① 도구 ② 악기","ex":[{"en":"A thermometer is a useful **instrument**.","ko":"온도계는 유용한 도구다."},{"en":"The piano is a musical **instrument**.","ko":"피아노는 악기다."}]},{"id":"vocab-1438","word":"insult","ipa":"/ɪnˈsʌlt/","kr":"인**설트**","mark":"","pos":"명/동","mean":"① 모욕 ② 모욕하다","ex":[{"en":"His words were an **insult**.","ko":"그의 말은 모욕이었다."},{"en":"His careless remark **insulted** her.","ko":"그의 경솔한 말이 그녀를 모욕했다."}]},{"id":"vocab-1439","word":"insure (insurance)","ipa":"/ɪnˈʃʊr/","kr":"인**슈어**","mark":"**","pos":"동","mean":"보험에 들다","ex":[{"en":"We **insured** the car against accidents.","ko":"우리는 사고에 대비해 자동차 보험에 들었다."}]},{"id":"vocab-1440","word":"integrate","ipa":"/ˈɪntɪɡreɪt/","kr":"**인**티그레이트","mark":"","pos":"동","mean":"① 통합하다 ② 융합하다","ex":[{"en":"We **integrated** the two systems.","ko":"우리는 두 시스템을 통합했다."},{"en":"The design **integrates** art with technology.","ko":"그 디자인은 예술과 기술을 융합한다."}]},{"id":"vocab-1441","word":"intellect (intellectual)","ipa":"/ˈɪntəlekt/","kr":"**인**털렉트","mark":"","pos":"명","mean":"① 지성 ② 지능","ex":[{"en":"Lina is known for her sharp **intellect**.","ko":"리나는 뛰어난 지성으로 알려져 있다."},{"en":"The test measures memory and **intellect**.","ko":"그 검사는 기억력과 지능을 측정한다."}]},{"id":"vocab-1442","word":"intelligent","ipa":"/ɪnˈtelɪdʒənt/","kr":"인**텔**리전트","mark":"","pos":"형","mean":"① 지능이 높은 ② 총명한","ex":[{"en":"Dolphins are **intelligent** animals.","ko":"돌고래는 지능이 높은 동물이다."},{"en":"Julia is an **intelligent** and careful analyst.","ko":"줄리아는 총명하고 신중한 분석가다."}]},{"id":"vocab-1443","word":"intend","ipa":"/ɪnˈtend/","kr":"인**텐드**","mark":"**","pos":"동","mean":"① 의도하다 ② 작정하다","ex":[{"en":"I **intend** to finish the report today.","ko":"나는 오늘 그 보고서를 끝낼 의도다."},{"en":"I **intend** to study hard.","ko":"나는 열심히 공부할 작정이다."}]},{"id":"vocab-1444","word":"intense","ipa":"/ɪnˈtens/","kr":"인**텐스**","mark":"**","pos":"형","mean":"① 강렬한 ② 극심한","ex":[{"en":"The interview created **intense** pressure.","ko":"그 면접은 강렬한 압박을 만들었다."},{"en":"The heat was **intense**.","ko":"그 더위는 극심했다."}]},{"id":"vocab-1445","word":"intent (intention)","ipa":"/ɪnˈtent/","kr":"인**텐트**","mark":"**","pos":"명","mean":"① 의도 ② 목적","ex":[{"en":"His **intent** was to help others.","ko":"그의 의도는 다른 사람을 돕는 것이었다."},{"en":"The main **intent** of the policy is safety.","ko":"그 정책의 주된 목적은 안전이다."}]},{"id":"vocab-1446","word":"interest","ipa":"/ˈɪntrəst/","kr":"**인**트러스트","mark":"**","pos":"명/동","mean":"① 흥미 ② 이자 ③ 관심을 끌다","ex":[{"en":"Hana has an **interest** in art.","ko":"하나는 예술에 흥미가 있다."},{"en":"The bank charges **interest** on the loan.","ko":"은행은 그 대출에 이자를 부과한다."},{"en":"Science **interests** me.","ko":"과학은 내 관심을 끈다."}]},{"id":"vocab-1447","word":"interfere","ipa":"/ˌɪntərˈfɪr/","kr":"인터**피어**","mark":"","pos":"동","mean":"① 간섭하다 ② 방해하다","ex":[{"en":"Don't **interfere** in my work.","ko":"내 일에 간섭하지 마라."},{"en":"Background noise may **interfere** with their work.","ko":"배경 소음은 그들의 업무를 방해할 수 있다."}]},{"id":"vocab-1448","word":"interior","ipa":"/ɪnˈtɪriər/","kr":"인**티**리어","mark":"","pos":"명/형","mean":"① 내부 ② 실내의","ex":[{"en":"The car has a clean **interior**.","ko":"그 차의 내부는 깨끗하다."},{"en":"The designer chose warm **interior** colors.","ko":"그 디자이너는 따뜻한 실내의 색을 골랐다."}]},{"id":"vocab-1449","word":"intermediate","ipa":"/ˌɪntərˈmiːdiət/","kr":"인터**미ː**디엇","mark":"","pos":"형","mean":"① 중급의 ② 중간의","ex":[{"en":"This class is for **intermediate** learners.","ko":"이 수업은 중급 학습자를 위한 것이다."},{"en":"Our office is at an **intermediate** stage of the move.","ko":"우리 사무실은 이전의 중간 단계에 있다."}]},{"id":"vocab-1450","word":"internal","ipa":"/ɪnˈtɜːrnl/","kr":"인**터ː**늘","mark":"**","pos":"형","mean":"내부의","ex":[{"en":"The machine has an **internal** battery.","ko":"그 기계에는 내부 배터리가 있다."}]},{"id":"vocab-1451","word":"internet","ipa":"/ˈɪntərnet/","kr":"**인**터넷","mark":"*","pos":"명","mean":"인터넷","ex":[{"en":"I found the information on the **internet**.","ko":"나는 인터넷에서 그 정보를 찾았다."}]},{"id":"vocab-1452","word":"interpret","ipa":"/ɪnˈtɜːrprət/","kr":"인**터ː**프릿","mark":"","pos":"동","mean":"① 해석하다 ② 통역하다","ex":[{"en":"How do you **interpret** this poem?","ko":"너는 이 시를 어떻게 해석하니?"},{"en":"She **interpreted** the manager's words for the visitors.","ko":"그녀는 방문객들을 위해 관리자의 말을 통역했다."}]},{"id":"vocab-1453","word":"interrupt","ipa":"/ˌɪntəˈrʌpt/","kr":"인터**럽트**","mark":"**","pos":"동","mean":"① 방해하다 ② 가로막다","ex":[{"en":"Don't **interrupt** me while I speak.","ko":"내가 말할 때 방해하지 마라."},{"en":"Please do not **interrupt** the speaker.","ko":"발표자의 말을 가로막지 마세요."}]},{"id":"vocab-1454","word":"interval","ipa":"/ˈɪntərvl/","kr":"**인**터벌","mark":"","pos":"명","mean":"① 간격 ② 사이","ex":[{"en":"The buses arrive at ten-minute **intervals**.","ko":"버스는 10분 간격으로 도착한다."},{"en":"A short **interval** separated the two sessions.","ko":"짧은 사이가 두 세션을 갈랐다."}]},{"id":"vocab-1455","word":"intervene","ipa":"/ˌɪntərˈviːn/","kr":"인터**빈ː**","mark":"","pos":"동","mean":"① 개입하다 ② 끼어들다","ex":[{"en":"The teacher **intervened** in the fight.","ko":"선생님이 그 싸움에 개입했다."},{"en":"Please do not **intervene** while they are speaking.","ko":"그들이 말하는 동안 끼어들지 마세요."}]},{"id":"vocab-1456","word":"intimate","ipa":"/ˈɪntɪmət/","kr":"**인**티밋","mark":"","pos":"형","mean":"친밀한","ex":[{"en":"They are **intimate** friends.","ko":"그들은 친밀한 친구다."}]},{"id":"vocab-1457","word":"into","ipa":"/ˈɪntuː/","kr":"**인**투","mark":"*","pos":"전","mean":"~안으로","ex":[{"en":"Yuna walked **into** the room.","ko":"유나는 방 안으로 걸어 들어갔다."}]},{"id":"vocab-1458","word":"intrigue","ipa":"/ɪnˈtriːɡ/","kr":"인**트리ː**그","mark":"","pos":"동/명","mean":"① 흥미를 끌다 ② 음모","ex":[{"en":"The mystery **intrigued** the students.","ko":"그 수수께끼는 학생들의 흥미를 끌었다."},{"en":"The novel describes a political **intrigue**.","ko":"그 소설은 정치적 음모를 묘사한다."}]},{"id":"vocab-1459","word":"introduce","ipa":"/ˌɪntrəˈduːs/","kr":"인트러**듀ː**스","mark":"*","pos":"동","mean":"① 소개하다 ② 도입하다","ex":[{"en":"Let me **introduce** my friend.","ko":"내 친구를 소개할게."},{"en":"This company **introduced** a new leave policy.","ko":"이 회사는 새로운 휴가 정책을 도입했다."}]},{"id":"vocab-1460","word":"invade","ipa":"/ɪnˈveɪd/","kr":"인**베이드**","mark":"","pos":"동","mean":"① 침략하다 ② 침입하다","ex":[{"en":"The army **invaded** the country.","ko":"그 군대가 나라를 침략했다."},{"en":"The virus can **invade** the network through email.","ko":"그 바이러스는 이메일을 통해 네트워크에 침입할 수 있다."}]},{"id":"vocab-1461","word":"invent (inventor)","ipa":"/ɪnˈvent/","kr":"인**벤트**","mark":"**","pos":"동","mean":"발명하다","ex":[{"en":"Bell **invented** the telephone.","ko":"벨은 전화를 발명했다."}]},{"id":"vocab-1462","word":"invest","ipa":"/ɪnˈvest/","kr":"인**베스트**","mark":"**","pos":"동","mean":"투자하다","ex":[{"en":"She **invested** her savings in the business.","ko":"그녀는 저축한 돈을 그 사업에 투자했다."}]},{"id":"vocab-1463","word":"investigate","ipa":"/ɪnˈvestɪɡeɪt/","kr":"인**베**스티게이트","mark":"**","pos":"동","mean":"① 조사하다 ② 수사하다","ex":[{"en":"One team will **investigate** the login failure.","ko":"한 팀은 로그인 장애를 조사할 것이다."},{"en":"The police **investigated** the case.","ko":"경찰이 그 사건을 수사했다."}]},{"id":"vocab-1464","word":"invite","ipa":"/ɪnˈvaɪt/","kr":"인**바잇**","mark":"*","pos":"동","mean":"초대하다","ex":[{"en":"We **invited** our neighbors to dinner.","ko":"우리는 이웃을 저녁 식사에 초대했다."}]},{"id":"vocab-1465","word":"involve","ipa":"/ɪnˈvɑːlv/","kr":"인**볼브**","mark":"**","pos":"동","mean":"① 포함하다 ② 관련시키다","ex":[{"en":"The job **involves** travel.","ko":"그 일은 여행을 포함한다."},{"en":"A department manager **involved** HR in the discussion.","ko":"한 부서 관리자는 HR을 논의에 관련시켰다."}]},{"id":"vocab-1466","word":"iron","ipa":"/ˈaɪərn/","kr":"**아이**언","mark":"**","pos":"명/동","mean":"① 철 ② 다리미 ③ 다림질하다","ex":[{"en":"**Iron** is a strong metal.","ko":"철은 강한 금속이다."},{"en":"The **iron** is hot, so do not touch it.","ko":"다리미가 뜨거우니 만지지 마라."},{"en":"I need to **iron** this shirt.","ko":"나는 이 셔츠를 다림질해야 한다."}]},{"id":"vocab-1467","word":"irony","ipa":"/ˈaɪrəni/","kr":"**아이**러니","mark":"","pos":"명","mean":"① 아이러니 ② 역설","ex":[{"en":"It was an **irony** that the fire station burned down.","ko":"소방서가 불탄 것은 아이러니였다."},{"en":"The **irony** is that the backup also failed.","ko":"역설은 백업도 실패했다는 것이다."}]},{"id":"vocab-1468","word":"irritate","ipa":"/ˈɪrɪteɪt/","kr":"**이**리테이트","mark":"","pos":"동","mean":"① 짜증나게 하다 ② 자극하다","ex":[{"en":"The noise **irritated** her.","ko":"그 소음이 그녀를 짜증나게 했다."},{"en":"This soap may **irritate** sensitive skin.","ko":"이 비누는 민감한 피부를 자극할 수 있다."}]},{"id":"vocab-1469","word":"island","ipa":"/ˈaɪlənd/","kr":"**아이**런드","mark":"**","pos":"명","mean":"섬","ex":[{"en":"They live on a small **island**.","ko":"그들은 작은 섬에 산다."}]},{"id":"vocab-1470","word":"isolate","ipa":"/ˈaɪsəleɪt/","kr":"**아이**설레이트","mark":"","pos":"동","mean":"① 고립시키다 ② 격리하다","ex":[{"en":"The illness **isolated** him.","ko":"그 병이 그를 고립시켰다."},{"en":"The patient was **isolated** from others.","ko":"그 환자는 다른 사람들과 격리되었다."}]},{"id":"vocab-1471","word":"issue","ipa":"/ˈɪʃuː/","kr":"**이**슈","mark":"*","pos":"명/동","mean":"① 문제 ② 발행하다","ex":[{"en":"We discussed an important **issue**.","ko":"우리는 중요한 문제를 논의했다."},{"en":"The publisher will **issue** the new guide tomorrow.","ko":"출판사는 내일 새 안내서를 발행할 것이다."}]},{"id":"vocab-1472","word":"it","ipa":"/ɪt/","kr":"**잇**","mark":"*","pos":"대","mean":"그것","ex":[{"en":"I found the file, and **it** is on the desktop.","ko":"나는 그 파일을 찾았고 그것은 바탕 화면에 있다."}]},{"id":"vocab-1473","word":"item","ipa":"/ˈaɪtəm/","kr":"**아이**텀","mark":"**","pos":"명","mean":"① 항목 ② 물품","ex":[{"en":"The last **item** on the list is milk.","ko":"목록의 마지막 항목은 우유다."},{"en":"Each **item** has a price.","ko":"각 물품에는 가격이 있다."}]},{"id":"vocab-1474","word":"jacket","ipa":"/ˈdʒækɪt/","kr":"**재**킷","mark":"*","pos":"명","mean":"① 재킷 ② 상의","ex":[{"en":"Put on your **jacket**.","ko":"재킷을 입어라."},{"en":"This **jacket** is a useful work top.","ko":"이 재킷은 유용한 작업 상의다."}]},{"id":"voc sued a **joint** statement.","ko":"그 두 팀은 공동 성명을 발표했다."}]},{"id":"vocab-1484","word":"joke","ipa":"/dʒoʊk/","kr":"**조크**","mark":"**","pos":"명/동","mean":"① 농담 ② 농담하다","ex":[{"en":"That was only a **joke**.","ko":"그것은 단지 농담이었다."},{"en":"David told a funny **joke**.","ko":"데이비드는 재미있는 농담을 했다."}]},{"id":"vocab-1485","word":"journal","ipa":"/ˈdʒɜːrnl/","kr":"**저ː**늘","mark":"","pos":"명","mean":"① 일지 ② 학술지","ex":[{"en":"Mina keeps a daily **journal**.","ko":"미나는 매일 일지를 쓴다."},{"en":"The study appeared in a medical **journal**.","ko":"그 연구는 의학 학술지에 실렸다."}]},{"id":"vocab-1486","word":"journey","ipa":"/ˈdʒɜːrni/","kr":"**저ː**니","mark":"**","pos":"명","mean":"① 여행 ② 여정","ex":[{"en":"The train **journey** took four hours.","ko":"그 기차 여행은 네 시간 걸렸다."},{"en":"The **journey** took three days.","ko":"그 여정은 사흘 걸렸다."}]},{"id":"vocab-1487","word":"joy (enjoy)","ipa":"/dʒɔɪ/","kr":"**조이**","mark":"**","pos":"명","mean":"기쁨","ex":[{"en":"The news filled us with **joy**.","ko":"그 소식은 우리를 기쁨으로 가득 채웠다."}]},{"id":"vocab-1488","word":"judge","ipa":"/dʒʌdʒ/","kr":"**저지**","mark":"**","pos":"명/동","mean":"① 판사 ② 판단하다","ex":[{"en":"The **judge** read the final decision.","ko":"그 판사는 최종 결정을 읽었다."},{"en":"Do not **judge** people by their appearance.","ko":"사람을 외모로 판단하지 마라."}]},{"id":"vocab-1489","word":"juice","ipa":"/dʒuːs/","kr":"**주ː**스","mark":"*","pos":"명","mean":"① 주스 ② 즙","ex":[{"en":"Would you like some orange **juice**?","ko":"오렌지 주스를 좀 마실래?"},{"en":"Lemon **juice** contains natural fruit extract.","ko":"레몬즙은 천연 과일 즙을 포함한다."}]},{"id":"vocab-1490","word":"jump","ipa":"/dʒʌmp/","kr":"**점프**","mark":"*","pos":"동/명","mean":"① 뛰다 ② 도약","ex":[{"en":"The cat **jumped** onto the table.","ko":"그 고양이는 탁자 위로 뛰어올랐다."},{"en":"The athlete made a long **jump**.","ko":"그 선수는 긴 도약을 했다."}]},{"id":"vocab-1491","word":"junior","ipa":"/ˈdʒuːniər/","kr":"**주ː**니어","mark":"**","pos":"형/명","mean":"① 손아래의 ② 후배","ex":[{"en":"Claire is **junior** to me at work.","ko":"클레어는 직장에서 나보다 손아래다."},{"en":"As my **junior**, he ]},{"id":"vocab-1561","word":"let","ipa":"/let/","kr":"**렛**","mark":"**","pos":"동","mean":"① ~하게 하다 ② 허락하다","ex":[{"en":"**Let** me help you.","ko":"내가 너를 돕게 해 줘."},{"en":"My manager **let** me work from home.","ko":"내 관리자는 내가 재택근무하도록 허락했다."}]},{"id":"vocab-1562","word":"letter (literal)","ipa":"/ˈletər/","kr":"**레**터","mark":"*","pos":"명","mean":"① 편지 ② 글자","ex":[{"en":"I wrote a **letter** to my grandmother.","ko":"나는 할머니께 편지를 썼다."},{"en":"The code begins with the **letter** A.","ko":"그 코드는 글자 A로 시작한다."}]},{"id":"vocab-1563","word":"level","ipa":"/ˈlevl/","kr":"**레**벌","mark":"**","pos":"명","mean":"① 수준 ② 단계","ex":[{"en":"Her English is at an intermediate **level**.","ko":"그녀의 영어는 중급 수준이다."},{"en":"The project moved to the next **level**.","ko":"그 프로젝트는 다음 단계로 이동했다."}]},{"id":"vocab-1564","word":"liberal","ipa":"/ˈlɪbərəl/","kr":"**리**버럴","mark":"","pos":"형","mean":"① 자유주의의 ② 개방적인","ex":[{"en":"Lina has **liberal** views on education.","ko":"리나는 교육에 자유주의적인 견해를 가지고 있다."},{"en":"Jun holds **liberal** views on social issues.","ko":"준은 사회 문제에 개방적인 견해를 갖고 있다."}]},{"id":"vocab-1565","word":"liberty","ipa":"/ˈlɪbərti/","kr":"**리**버티","mark":"","pos":"명","mean":"자유","ex":[{"en":"They fought for **liberty**.","ko":"그들은 자유를 위해 싸웠다."}]},{"id":"vocab-1566","word":"library","ipa":"/ˈlaɪbreri/","kr":"**라이**브레리","mark":"*","pos":"명","mean":"도서관","ex":[{"en":"I borrowed a book from the **library**.","ko":"나는 도서관에서 책을 빌렸다."}]},{"id":"vocab-1567","word":"license / licence","ipa":"/ˈlaɪsns/","kr":"**라이**슨스","mark":"**","pos":"명","mean":"① 면허 ② 허가","ex":[{"en":"Lina got a driver's **license**.","ko":"리나는 운전면허를 땄다."},{"en":"You need a **license** to drive.","ko":"운전하려면 면허가 필요하다."}]},{"id":"vocab-1568","word":"lid","ipa":"/lɪd/","kr":"**리드**","mark":"**","pos":"명","mean":"뚜껑","ex":[{"en":"Put the **lid** on the pot.","ko":"냄비에 뚜껑을 덮어라."}]},{"id":"vocab-1569","word":"lie","ipa":"/laɪ/","kr":"**라이**","mark":"*","pos":"동/명","mean":"① 눕다 ② 거짓말하다 ③ 거짓말","ex":[{"en":"Please **lie** down and
