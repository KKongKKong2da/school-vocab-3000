om the room.","ko":"펌프는 방에서 물을 배수한다."},{"en":"The water flowed into the floor **drain**.","ko":"물이 바닥 배수구로 흘러갔다."}]},{"id":"vocab-0860","word":"drama","ipa":"/ˈdrɑːmə/","kr":"**드라**머","mark":"**","pos":"명","mean":"① 연극 ② 드라마","ex":[{"en":"We watched a school **drama**.","ko":"우리는 학교 연극을 보았다."},{"en":"Claire loves watching **drama**.","ko":"클레어는 드라마 보는 것을 좋아한다."}]},{"id":"vocab-0861","word":"draw (drawer)","ipa":"/drɔː/","kr":"**드로ː**","mark":"*","pos":"동","mean":"① 그리다 ② 끌다","ex":[{"en":"**Draw** a picture of your family.","ko":"네 가족의 그림을 그려라."},{"en":"The horse **drew** the cart slowly.","ko":"그 말은 수레를 천천히 끌었다."}]},{"id":"vocab-0862","word":"dread","ipa":"/dred/","kr":"**드레드**","mark":"","pos":"동/명","mean":"① 두려워하다 ② 공포","ex":[{"en":"I **dread** going to the dentist.","ko":"나는 치과에 가는 것을 몹시 두려워한다."},{"en":"A feeling of **dread** filled the room.","ko":"공포의 느낌이 방을 가득 채웠다."}]},{"id":"vocab-0863","word":"dream","ipa":"/driːm/","kr":"**드림ː**","mark":"*","pos":"명/동","mean":"① 꿈 ② 꿈꾸다","ex":[{"en":"I had a strange **dream** last night.","ko":"나는 어젯밤 이상한 꿈을 꾸었다."},{"en":"She **dreams** of starting her own company.","ko":"그녀는 자신의 회사를 시작하는 꿈을 꾼다."}]},{"id":"vocab-0864","word":"dress","ipa":"/dres/","kr":"**드레스**","mark":"*","pos":"명/동","mean":"① 드레스 ② 옷을 입다","ex":[{"en":"Sophia wore a red **dress**.","ko":"소피아는 빨간 드레스를 입었다."},{"en":"She **dressed** quickly for work.","ko":"그녀는 출근하려고 빨리 옷을 입었다."}]},{"id":"vocab-0865","word":"drill","ipa":"/drɪl/","kr":"**드릴**","mark":"","pos":"명/동","mean":"① 드릴 ② 반복 연습","ex":[{"en":"Use a **drill** to make a hole in the wall.","ko":"벽에 구멍을 만들려면 드릴을 사용해라."},{"en":"We do a short spelling **drill** every morning.","ko":"우리는 매일 아침 짧은 철자 반복 연습을 한다."}]},{"id":"vocab-0866","word":"drink","ipa":"/drɪŋk/","kr":"**드링크**","mark":"*","pos":"동/명","mean":"① 마시다 ② 음료","ex":[{"en":"**Drink** plenty of water.","ko":"물을 많이 마셔라."},{"en":"Would you like a cold **drink**?","ko":"차가운 음료를 원하세요?"}]},{"id":"vocab-0867","word":"drive","ipa":"/draɪv/","kr":"**드라이브**","mark":"*","pos":"동/명","mean":"① 운전하다 ② 드라이브","ex":[{"en":"She **drives** the company van.","ko":"그녀는 회사 승합차를 운전한다."},{"en":"We went for a short **drive** after work.","ko":"우리는 퇴근 후 짧은 드라이브를 갔다."}]},{"id":"vocab-0868","word":"drop","ipa":"/drɑːp/","kr":"**드랍**","mark":"*","pos":"동/명","mean":"① 떨어뜨리다 ② 방울","ex":[{"en":"Do not **drop** the glass.","ko":"그 유리잔을 떨어뜨리지 마라."},{"en":"A **drop** of water fell on the keyboard.","ko":"물 한 방울이 키보드 위에 떨어졌다."}]},{"id":"vocab-0869","word":"drown","ipa":"/draʊn/","kr":"**드라운**","mark":"","pos":"동","mean":"① 익사하다 ② 물에 빠지다","ex":[{"en":"The swimmer nearly **drowned**.","ko":"그 수영 선수는 거의 익사할 뻔했다."},{"en":"A child fell into the pool and nearly **drowned**.","ko":"한 아이는 수영장에 빠져 거의 익사할 뻔했다."}]},{"id":"vocab-0870","word":"drug","ipa":"/drʌɡ/","kr":"**드럭**","mark":"**","pos":"명","mean":"① 약 ② 마약","ex":[{"en":"This **drug** may make you sleepy.","ko":"이 약은 너를 졸리게 할 수 있다."},{"en":"The police found illegal **drugs** in the bag.","ko":"경찰은 가방에서 불법 마약을 발견했다."}]},{"id":"vocab-0871","word":"drum","ipa":"/drʌm/","kr":"**드럼**","mark":"*","pos":"명","mean":"① 북 ② 드럼","ex":[{"en":"David played the **drum** loudly.","ko":"데이비드는 북을 크게 쳤다."},{"en":"Ryan plays the **drum** in a band.","ko":"라이언은 밴드에서 드럼을 연주한다."}]},{"id":"vocab-0872","word":"dry","ipa":"/draɪ/","kr":"**드라이**","mark":"*","pos":"형/동","mean":"① 마른 ② 말리다","ex":[{"en":"Keep the files in a **dry** place.","ko":"파일들을 마른 곳에 보관해라."},{"en":"Let the clothes **dry** in the sun.","ko":"옷을 햇볕에 말려라."}]},{"id":"vocab-0873","word":"dual","ipa":"/ˈduːəl/","kr":"**두ː**얼","mark":"","pos":"형","mean":"① 이중의 ② 둘의","ex":[{"en":"The car has a **dual** purpose.","ko":"그 차는 이중 목적을 지닌다."},{"en":"The role has a **dual** focus on HR and IT.","ko":"그 역할은 HR과 IT 두 분야에 초점을 둔다."}]},{"id":"vocab-0874","word":"duck","ipa":"/dʌk/","kr":"**덕**","mark":"*","pos":"명","mean":"오리","ex":[{"en":"The **duck** swam across the pond.","ko":"그 오리는 연못을 가로질러 헤엄쳤다."}]},{"id":"vocab-0875","word":"due","ipa":"/duː/","kr":"**두ː**","mark":"**","pos":"형","mean":"① 예정된 ② ~때문에","ex":[{"en":"This report is **due** on Friday.","ko":"이 보고서는 금요일에 제출될 예정이다."},{"en":"The flight was canceled **due** to fog.","ko":"그 항공편은 안개 때문에 취소되었다."}]},{"id":"vocab-0876","word":"dull","ipa":"/dʌl/","kr":"**덜**","mark":"","pos":"형","mean":"① 지루한 ② 무딘","ex":[{"en":"The lecture was **dull**.","ko":"그 강의는 지루했다."},{"en":"This knife is too **dull** to cut the rope.","ko":"이 칼은 밧줄을 자르기에는 너무 무디다."}]},{"id":"vocab-0877","word":"dump","ipa":"/dʌmp/","kr":"**덤프**","mark":"**","pos":"동/명","mean":"① 버리다 ② 쓰레기장","ex":[{"en":"Don't **dump** trash here.","ko":"여기에 쓰레기를 버리지 마라."},{"en":"The old chairs were taken to the **dump**.","ko":"낡은 의자들은 쓰레기장으로 옮겨졌다."}]},{"id":"vocab-0878","word":"during","ipa":"/ˈdʊrɪŋ/","kr":"**두**링","mark":"*","pos":"전","mean":"~동안","ex":[{"en":"It rained **during** the night.","ko":"밤 동안 비가 내렸다."}]},{"id":"vocab-0879","word":"dust","ipa":"/dʌst/","kr":"**더스트**","mark":"**","pos":"명","mean":"먼지","ex":[{"en":"There was **dust** on the shelf.","ko":"선반 위에 먼지가 있었다."}]},{"id":"vocab-0880","word":"duty","ipa":"/ˈduːti/","kr":"**두ː**티","mark":"**","pos":"명","mean":"① 의무 ② 임무","ex":[{"en":"It is our **duty** to help others.","ko":"다른 사람을 돕는 것은 우리의 의무다."},{"en":"Your first **duty** is to check the server.","ko":"당신의 첫 임무는 서버를 확인하는 것이다."}]},{"id":"vocab-0881","word":"dwell","ipa":"/dwel/","kr":"**드웰**","mark":"","pos":"동","mean":"① 살다 ② 거주하다","ex":[{"en":"Many people **dwell** in this valley.","ko":"많은 사람들이 이 계곡에 산다."},{"en":"They **dwell** in a small apartment downtown.","ko":"그들은 시내의 작은 아파트에 거주한다."}]},{"id":"vocab-0882","word":"dynamic","ipa":"/daɪˈnæmɪk/","kr":"다이**내**믹","mark":"","pos":"형","mean":"① 역동적인 ② 활발한","ex":[{"en":"Olivia is a **dynamic** leader.","ko":"올리비아는 역동적인 지도자다."},{"en":"Olivia is an active and **dynamic** speaker.","ko":"올리비아는 활발하고 역동적인 발표자다."}]},{"id":"vocab-0883","word":"each","ipa":"/iːtʃ/","kr":"**이ː**치","mark":"**","pos":"형/대","mean":"① 각각의 ② 각자","ex":[{"en":"**Each** employee received a new laptop.", :[{"en":"We **ate** lunch together.","ko":"우리는 함께 점심을 먹었다."}]},{"id":"vocab-0892","word":"economy","ipa":"/ɪˈkɑːnəmi/","kr":"이**카**너미","mark":"**","pos":"명","mean":"경제","ex":[{"en":"The country's **economy** is growing.","ko":"그 나라의 경제는 성장하고 있다."}]},{"id":"vocab-0893","word":"edge","ipa":"/edʒ/","kr":"**에지**","mark":"**","pos":"명","mean":"① 가장자리 ② 모서리","ex":[{"en":"Don't stand near the **edge**.","ko":"가장자리 가까이에 서지 마라."},{"en":"The **edge** of the desk is sharp.","ko":"책상의 모서리는 날카롭다."}]},{"id":"vocab-0894","word":"edit","ipa":"/ˈedɪt/","kr":"**에**딧","mark":"**","pos":"동","mean":"① 편집하다 ② 수정하다","ex":[{"en":"She **edits** the school newspaper.","ko":"그녀는 학교 신문을 편집한다."},{"en":"Please **edit** the last paragraph.","ko":"마지막 문단을 수정해 주세요."}]},{"id":"vocab-0895","word":"educate","ipa":"/ˈedʒukeɪt/","kr":"**에**주케이트","mark":"**","pos":"동","mean":"교육하다","ex":[{"en":"Schools **educate** young people.","ko":"학교는 젊은이들을 교육한다."}]},{"id":"vocab-0896","word":"effect (effective)","ipa":"/ɪˈfekt/","kr":"이**펙트**","mark":"**","pos":"명","mean":"① 효과 ② 영향","ex":[{"en":"The medicine had a quick **effect**.","ko":"그 약은 빠른 효과를 보였다."},{"en":"The update had a strong **effect** on performance.","ko":"그 업데이트는 성능에 강한 영향을 미쳤다."}]},{"id":"vocab-0897","word":"efficient","ipa":"/ɪˈfɪʃnt/","kr":"이**피**션트","mark":"","pos":"형","mean":"효율적인","ex":[{"en":"This method is very **efficient**.","ko":"이 방법은 매우 효율적이다."}]},{"id":"vocab-0898","word":"effort","ipa":"/ˈefərt/","kr":"**에**퍼트","mark":"**","pos":"명","mean":"노력","ex":[{"en":"Your **effort** will bring good results.","ko":"너의 노력은 좋은 결과를 가져올 것이다."}]},{"id":"vocab-0899","word":"egg","ipa":"/eɡ/","kr":"**에그**","mark":"*","pos":"명","mean":"① 달걀 ② 알","ex":[{"en":"Hana boiled an **egg** for breakfast.","ko":"하나는 아침 식사로 달걀 하나를 삶았다."},{"en":"A bird laid an **egg** in the nest.","ko":"새 한 마리가 둥지에 알을 낳았다."}]},{"id":"vocab-0900","word":"eight","ipa":"/eɪt/","kr":"**에잇**","mark":"*","pos":"명/형","mean":"① 여덟 ② 8","ex":[{"en":"There are **eight** chairs in the room.","ko":"방에 의자가 여덟 개 있다."},{"en":"**Eight** is an even number.","ko":"8은 짝수다."}]},{"id":"vocab-0901","word":"either","ipa":"/ˈaɪðər/","kr":"**아이**더","mark":"**","pos":"형/대/접","mean":"① 어느 하나의 ② 어느 쪽도","ex":[{"en":"You can take **either** book.","ko":"너는 어느 책이든 가져가도 된다."},{"en":"I do not like **either** option.","ko":"나는 어느 선택지도 좋아하지 않는다."}]},{"id":"vocab-0902","word":"elaborate","ipa":"/ɪˈlæbərət/","kr":"일**래**버릿","mark":"","pos":"형/동","mean":"① 정교한 ② 상세히 설명하다","ex":[{"en":"Julia made an **elaborate** plan.","ko":"줄리아는 정교한 계획을 세웠다."},{"en":"Could you **elaborate** on that point?","ko":"그 요점을 상세히 설명해 주시겠어요?"}]},{"id":"vocab-0903","word":"elect","ipa":"/ɪˈlekt/","kr":"일**렉트**","mark":"**","pos":"동","mean":"선출하다","ex":[{"en":"People **elected** her as mayor.","ko":"사람들은 그녀를 시장으로 선출했다."}]},{"id":"vocab-0904","word":"electric","ipa":"/ɪˈlektrɪk/","kr":"일**렉**트릭","mark":"**","pos":"형","mean":"전기의","ex":[{"en":"We bought an **electric** car.","ko":"우리는 전기 자동차를 샀다."}]},{"id":"vocab-0905","word":"electronic","ipa":"/ɪˌlekˈtrɑːnɪk/","kr":"일렉**트라**닉","mark":"","pos":"형","mean":"전자의","ex":[{"en":"Please send an **electronic** copy.","ko":"전자 사본을 보내 주세요."}]},{"id":"vocab-0906","word":"elegant","ipa":"/ˈelɪɡənt/","kr":"**엘**리건트","mark":"","pos":"형","mean":"① 우아한 ② 품위 있는","ex":[{"en":"Yuna wore an **elegant** dress.","ko":"유나는 우아한 드레스를 입었다."},{"en":"Her **elegant** response ended the argument.","ko":"그녀의 품위 있는 답변이 논쟁을 끝냈다."}]},{"id":"vocab-0907","word":"element (elementary)","ipa":"/ˈelɪmənt/","kr":"**엘**리먼트","mark":"**","pos":"명","mean":"① 요소 ② 원소","ex":[{"en":"Trust is an important **element** of friendship.","ko":"신뢰는 우정의 중요한 요소다."},{"en":"Oxygen is a chemical **element**.","ko":"산소는 화학 원소다."}]},{"id":"vocab-0908","word":"elephant","ipa":"/ˈelɪfənt/","kr":"**엘**리펀트","mark":"*","pos":"명","mean":"코끼리","ex":[{"en":"The **elephant** has a long trunk.","ko":"코끼리는 긴 코를 가지고 있다."}]},{"id":"vocab-0909","word":"elevate (elevator)","ipa":"/ˈelɪveɪt/","kr":"**엘**리베이트","mark":"","pos":"동","mean":"① 올리다 ② 높이다","ex":[{"en":"The platform can **elevate** the box.","ko":"그 발판은 상자를 올릴 수 있다."},{"en":"The platform **elevates** the workers.","ko":"그 발판은 작업자들을 높이 올려 준다."}]},{"id":"vocab-0910","word":"eleven","ipa":"/ɪˈlevn/","kr":"일**레**븐","mark":"*","pos":"명/형","mean":"① 열하나 ② 11","ex":[{"en":"**Eleven** students joined the club.","ko":"열한 명의 학생이 동아리에 가입했다."},{"en":"The number **eleven** comes after ten.","ko":"숫자 11은 10 다음에 온다."}]},{"id":"vocab-0911","word":"eliminate","ipa":"/ɪˈlɪmɪneɪt/","kr":"일**리**미네이트","mark":"","pos":"동","mean":"① 제거하다 ② 없애다","ex":[{"en":"We must **eliminate** the errors.","ko":"우리는 오류를 제거해야 한다."},{"en":"We must **eliminate** unnecessary waste.","ko":"우리는 불필요한 낭비를 없애야 한다."}]},{"id":"vocab-0912","word":"elite","ipa":"/eɪˈliːt/","kr":"에이**리ː**트","mark":"","pos":"명/형","mean":"① 엘리트 ② 정예의","ex":[{"en":"Leo belongs to the **elite**.","ko":"레오는 엘리트 계층에 속한다."},{"en":"Only **elite** athletes enter this event.","ko":"정예 선수들만 이 경기에 참가한다."}]},{"id":"vocab-0913","word":"else","ipa":"/els/","kr":"**엘스**","mark":"**","pos":"부","mean":"① 그 밖에 ② 다른","ex":[{"en":"Is there anything **else**?","ko":"그 밖에 다른 것이 있나요?"},{"en":"What **else** do you need?","ko":"다른 무엇이 필요한가요?"}]},{"id":"vocab-0914","word":"embarrass","ipa":"/ɪmˈbærəs/","kr":"임**배**러스","mark":"**","pos":"동","mean":"당황하게 하다","ex":[{"en":"Her question **embarrassed** me.","ko":"그녀의 질문이 나를 당황하게 했다."}]},{"id":"vocab-0915","word":"embassy","ipa":"/ˈembəsi/","kr":"**엠**버시","mark":"","pos":"명","mean":"대사관","ex":[{"en":"Sora works at the **embassy**.","ko":"소라는 대사관에서 일한다."}]},{"id":"vocab-0916","word":"embrace","ipa":"/ɪmˈbreɪs/","kr":"임**브레이스**","mark":"","pos":"동/명","mean":"① 포옹하다 ② 받아들이다","ex":[{"en":"They **embraced** warmly.","ko":"그들은 따뜻하게 포옹했다."},{"en":"The parent company **embraced** remote work.","ko":"그 모회사는 원격 근무를 받아들였다."}]},{"id":"vocab-0917","word":"emerge (emergence)","ipa":"/ɪˈmɜːrdʒ/","kr":"이**머ː**지","mark":"","pos":"동","mean":"① 나타나다 ② 드러나다","ex":[{"en":"The sun **emerged** from the clouds.","ko":"해가 구름에서 나타났다."},{"en":"A clear pattern **emerged** from the data.","ko":"데이터에서 명확한 패턴이 드러났다."}]},{"id":"vocab-0918","word":"emergency","ipa":"/ɪˈmɜːrdʒənsi/","kr":"이**머ː**전시","mark":"","pos":"명","mean":"① 비상사태 ② 응급","ex":[{"en":"The outage became a serious **emergency**.","ko":"그 장애는 심각한 비상사태가 되었다."},{"en":"The clinic provides **emergency** care.","ko":"그 진료소는 응급 치료를 제공한다."}]},{"id":"vocab-0919","word":"emit (emission)","ipa":"/ɪˈmɪt/","kr":"이**밋**","mark":"","pos":"동","mean":"① 내뿜다 ② 배출하다","ex":[{"en":"The factory **emits** smoke into the air.","ko":"그 공장은 공기 중으로 연기를 내뿜는다."},{"en":"Cars **emit** harmful gases.","ko":"자동차는 해로운 가스를 배출한다."}]},{"id":"vocab-0920","word":"emotion","ipa":"/ɪˈmoʊʃn/","kr":"이**모**션","mark":"**","pos":"명","mean":"감정","ex":[{"en":"Music can express strong **emotions**.","ko":"음악은 강한 감정을 표현할 수 있다."}]},{"id":"vocab-0921","word":"emphasis","ipa":"/ˈemfəsɪs/","kr":"**엠**퍼시스","mark":"","pos":"명","mean":"강조","ex":[{"en":"The teacher put **emphasis** on practice.","ko":"선생님은 연습을 강조했다."}]},{"id":"vocab-0922","word":"emphasize","ipa":"/ˈemfəsaɪz/","kr":"**엠**퍼사이즈","mark":"**","pos":"동","mean":"강조하다","ex":[{"en":"She **emphasized** the need for safety.","ko":"그녀는 안전의 필요성을 강조했다."}]},{"id":"vocab-0923","word":"empire","ipa":"/ˈempaɪər/","kr":"**엠**파이어","mark":"**","pos":"명","mean":"제국","ex":[{"en":"The Roman **Empire** lasted for centuries.","ko":"로마 제국은 여러 세기 동안 지속되었다."}]},{"id":"vocab-0924","word":"employ","ipa":"/ɪmˈplɔɪ/","kr":"임**플로이**","mark":"**","pos":"동","mean":"고용하다","ex":[{"en":"Our company **employs** fifty people.","ko":"우리 회사는 50명을 고용한다."}]},{"id":"vocab-0925","word":"empty","ipa":"/ˈempti/","kr":"**엠**티","mark":"**","pos":"형/동","mean":"① 빈 ② 비우다","ex":[{"en":"The meeting room is **empty**.","ko":"그 회의실은 비어 있다."},{"en":"Please **empty** the trash bin.","ko":"쓰레기통을 비워 주세요."}]},{"id":"vocab-0926","word":"encounter","ipa":"/ɪnˈkaʊntər/","kr":"인**카운**터","mark":"","pos":"동/명","mean":"① 마주치다 ② 만남","ex":[{"en":"We **encountered** a former colleague at the station.","ko":"우리는 역에서 전 동료를 마주쳤다."},{"en":"Our first **encounter** was brief.","ko":"우리의 첫 만남은 짧았다."}]},{"id":"vocab-0927","word":"end","ipa":"/end/","kr":"**엔드**","mark":"*","pos":"명/동","mean":"① 끝 ② 끝나다","ex":[{"en":"The **end** of the report is missing.","ko":"보고서의 끝이 빠져 있다."},{"en":"The movie **ends** at nine.","ko":"그 영화는 9시에 끝난다."}]},{"id":"vocab-0928","word":"endure","ipa":"/ɪnˈdʊr/","kr":"인**두어**","mark":"","pos":"동","mean":"① 견디다 ② 참다","ex":[{"en":"This team **endured** a difficult week.","ko":"이 팀은 어려운 한 주를 견뎠다."},{"en":"I cannot **endure** the loud noise any longer.","ko":"나는 그 큰 소음을 더는 참을 수 없다."}]},{"id":"vocab-0929","word":"enemy","ipa":"/ˈenəmi/","kr":"**에**너미","mark":"**","pos":"명","mean":"적","ex":[{"en":"James refused to surrender to the **enemy**.","ko":"제임스는 적에게 항복하기를 거부했다."}]},{"id":"vocab-0930","word":"energy","ipa":"/ˈenərdʒi/","kr":"**에**너지","mark":"*","pos":"명","mean":"① 에너지 ② 활력","ex":[{"en":"Children have a lot of **energy**.","ko":"아이들은 많은 에너지를 가지고 있다."},{"en":"A short walk gave me more **energy**.","ko":"짧은 산책은 나에게 더 많은 활력을 주었다."}]},{"id":"vocab-0931","word":"engage","ipa":"/ɪnˈɡeɪdʒ/","kr":"인**게이지**","mark":"**","pos":"동","mean":"① 참여시키다 ② 약혼하다","ex":[{"en":"The game **engages** the students.","ko":"그 게임은 학생들을 참여시킨다."},{"en":"They became **engaged** last month.","ko":"그들은 지난달에 약혼했다."}]},{"id":"vocab-0932","word":"engine","ipa":"/ˈendʒɪn/","kr":"**엔**진","mark":"**","pos":"명","mean":"엔진","ex":[{"en":"The car's **engine** stopped suddenly.","ko":"자동차의 엔진이 갑자기 멈췄다."}]},{"id":"vocab-0933","word":"engineer","ipa":"/ˌendʒɪˈnɪr/","kr":"엔지**니어**","mark":"**","pos":"명","mean":"① 기술자 ② 엔지니어","ex":[{"en":"Lina wants to become an **engineer**.","ko":"리나는 기술자가 되고 싶어 한다."},{"en":"The **engineer** fixed the network problem.","ko":"그 엔지니어는 네트워크 문제를 고쳤다."}]},{"id":"vocab-0934","word":"enhance","ipa":"/ɪnˈhæns/","kr":"인**핸스**","mark":"","pos":"동","mean":"① 향상시키다 ② 높이다","ex":[{"en":"Exercise can **enhance** your health.","ko":"운동은 건강을 향상시킬 수 있다."},{"en":"Training **enhanced** employee skills.","ko":"교육은 직원의 기술을 높였다."}]},{"id":"vocab-0935","word":"enormous","ipa":"/ɪˈnɔːrməs/","kr":"이**노ː**머스","mark":"**","pos":"형","mean":"① 거대한 ② 막대한","ex":[{"en":"An **enormous** whale appeared beside us.","ko":"거대한 고래가 우리 옆에 나타났다."},{"en":"The project required an **enormous** amount of time.","ko":"그 프로젝트는 막대한 시간이 필요했다."}]},{"id":"vocab-0936","word":"enough","ipa":"/ɪˈnʌf/","kr":"이**너프**","mark":"*","pos":"형/부","mean":"① 충분한 ② 충분히","ex":[{"en":"We have **enough** food for everyone.","ko":"우리는 모두에게 충분한 음식을 가지고 있다."},{"en":"There is **enough** food for the whole team.","ko":"팀 전체가 먹기에 충분한 음식이 있다."}]},{"id":"vocab-0937","word":"enter","ipa":"/ˈentər/","kr":"**엔**터","mark":"*","pos":"동","mean":"① 들어가다 ② 입력하다","ex":[{"en":"Please **enter** the room quietly.","ko":"방에 조용히 들어가 주세요."},{"en":"**Enter** your employee ID here.","ko":"여기에 직원 ID를 입력해라."}]},{"id":"vocab-0938","word":"enterprise","ipa":"/ˈentərpraɪz/","kr":"**엔**터프라이즈","mark":"","pos":"명","mean":"① 기업 ② 사업","ex":[{"en":"Sophia runs a small **enterprise**.","ko":"소피아는 작은 기업을 운영한다."},{"en":"Her small **enterprise** began with two employees.","ko":"그녀의 작은 사업은 직원 두 명으로 시작했다."}]},{"id":"vocab-0939","word":"entertain","ipa":"/ˌentərˈteɪn/","kr":"엔터**테인**","mark":"**","pos":"동","mean":"① 즐겁게 하다 ② 접대하다","ex":[{"en":"The clown **entertained** the kids.","ko":"그 광대가 아이들을 즐겁게 했다."},{"en":"We will **entertain** the clients at dinner.","ko":"우리는 저녁 식사에서 고객들을 접대할 것이다."}]},{"id":"vocab-0940","word":"enthusiastic","ipa":"/ɪnˌθuːziˈæstɪk/","kr":"인쑤지**애**스틱","mark":"","pos":"형","mean":"① 열정적인 ② 열광적인","ex":[{"en":"Emma is **enthusiastic** about employee training.","ko":"엠마는 직원 교육에 열정적이다."},{"en":"The students were **enthusiastic** about the trip.","ko":"학생들은 그 여행에 열광적이었다."}]},{"id":"vocab-0941","word":"entire","ipa":"/ɪnˈtaɪər/","kr":"인**타이**어","mark":"**","pos":"형","mean":"① 전체의 ② 온전한","ex":[{"en":"Mina read the **entire** book.","ko":"미나는 그 책 전체를 읽었다."},{"en":"The old building is still **entire**.","ko":"그 오래된 건물은 아직 온전하다."}]},{"id":"vocab-0942","word":"entry","ipa":"/ˈentri/","kr":"**엔**트리","mark":"","pos":"명","mean":"① 입장 ② 출입 ③ 기입","ex":[{"en":"**Entry** is free for children.","ko":"아이들은 입장이 무료다."},{"en":"**Entry** is limited to staff.","ko":"출입은 직원으로 제한된다."},{"en":"Check every **entry** on the form.","ko":"양식의 모든 기입 내용을 확인해라."}]},{"id":"vocab-0943","word":"envelope","ipa":"/ˈenvəloʊp/","kr":"**엔**벌로프","mark":"**","pos":"명","mean":"봉투","ex":[{"en":"Put the letter in an **envelope**.","ko":"편지를 봉투에 넣어라."}]},{"id":"vocab-0944","word":"environ (environment)","ipa":"/ɪnˈvaɪrən/","kr":"인**바이**런","mark":"","pos":"동","mean":"둘러싸다","ex":[{"en":"Tall trees **environ** the village.","ko":"높은 나무들이 마을을 둘러싼다."}]},{"id":"vocab-0945","word":"envy","ipa":"/ˈenvi/","kr":"**엔**비","mark":"","pos":"명/동","mean":"① 부러움 ② 부러워하다","ex":[{"en":"His promotion caused **envy** in the office.","ko":"그의 승진은 사무실에서 부러움을 일으켰다."},{"en":"I **envy** her clear communication skills.","ko":"나는 그녀의 명확한 의사소통 능력을 부러워한다."}]},{"id":"vocab-0946","word":"equal","ipa":"/ˈiːkwəl/","kr":"**이ː**퀄","mark":"**","pos":"형/동","mean":"① 동등한 ② ~와 같다","ex":[{"en":"All applicants receive **equal** treatment.","ko":"모든 지원자는 동등한 대우를 받는다."},{"en":"Two plus three **equals** five.","ko":"2 더하기 3은 5와 같다."}]},{"id":"vocab-0947","word":"equip (equipment)","ipa":"/ɪˈkwɪp/","kr":"이**퀍**","mark":"","pos":"동","mean":"① 갖추다 ② 장비를 갖추다","ex":[{"en":"A quiet room is **equipped** with a computer.","ko":"조용한 방은 컴퓨터를 갖추고 있다."},{"en":"The school **equipped** every room with computers.","ko":"학교는 모든 교실에 컴퓨터를 갖추었다."}]},{"id":"vocab-0948","word":"era","ipa":"/ˈɪrə/","kr":"**이**러","mark":"","pos":"명","mean":"시대","ex":[{"en":"We live in a digital **era**.","ko":"우리는 디지털 시대에 산다."}]},{"id":"vocab-0949","word":"erase (eraser)","ipa":"/ɪˈreɪs/","kr":"이**레이스**","mark":"","pos":"동","mean":"지우다","ex":[{"en":"**Erase** the wrong answer.","ko":"틀린 답을 지워라."}]},{"id":"vocab-0950","word":"erect","ipa":"/ɪˈrekt/","kr":"이**렉트**","mark":"","pos":"형/동","mean":"① 똑바로 선 ② 세우다","ex":[{"en":"The flag stood **erect** in the wind.","ko":"그 깃발은 바람 속에서 똑바로 서 있었다."},{"en":"Workers **erected** a temporary wall.","ko":"작업자들은 임시 벽을 세웠다."}]},{"id":"vocab-0951","word":"err (error)","ipa":"/er/","kr":"**에어**","mark":"","pos":"동","mean":"① 실수하다 ② 잘못하다","ex":[{"en":"To **err** is human.","ko":"실수하는 것은 인간적인 일이다."},{"en":"We may **err** when we work too quickly.","ko":"너무 빨리 일하면 우리는 잘못할 수 있다."}]},{"id":"vocab-0952","word":"escape","ipa":"/ɪˈskeɪp/","kr":"이**스케이프**","mark":"**","pos":"동/명","mean":"① 탈출하다 ② 탈출","ex":[{"en":"The bird **escaped** from the cage.","ko":"그 새는 새장에서 탈출했다."},{"en":"The emergency exit offers a safe **escape**.","ko":"비상구는 안전한 탈출로를 제공한다."}]},{"id":"vocab-0953","word":"especial (especially)","ipa":"/ɪˈspeʃl/","kr":"이**스페**셜","mark":"**","pos":"형","mean":"특별한","ex":[{"en":"This is of **especial** importance.","ko":"이것은 특별히 중요하다."}]},{"id":"vocab-0954","word":"essay","ipa":"/ˈeseɪ/","kr":"**에**세이","mark":"**","pos":"명","mean":"① 수필 ② 에세이","ex":[{"en":"Nora wrote an **essay** about travel.","ko":"노라는 여행에 관한 수필을 썼다."},{"en":"Her second **essay** explores life in the countryside.","ko":"그녀의 두 번째 에세이는 시골 생활을 탐구한다."}]},{"id":"vocab-0955","word":"essence (essential)","ipa":"/ˈesns/","kr":"**에**슨스","mark":"","pos":"명","mean":"① 본질 ② 정수","ex":[{"en":"Honesty forms the **essence** of friendship.","ko":"정직은 우정의 본질을 이룬다."},{"en":"The short summary captures the **essence** of the report.","ko":"그 짧은 요약은 보고서의 정수를 담고 있다."}]},{"id":"vocab-0956","word":"establish","ipa":"/ɪˈstæblɪʃ/","kr":"이**스태**블리시","mark":"**","pos":"동","mean":"① 설립하다 ② 확립하다","ex":[{"en":"They **established** the school in 1990.","ko":"그들은 1990년에 그 학교를 설립했다."},{"en":"The new manager **established** clear rules.","ko":"새 관리자는 명확한 규칙을 확립했다."}]},{"id":"vocab-0957","word":"estate","ipa":"/ɪˈsteɪt/","kr":"이**스테잇**","mark":"","pos":"명","mean":"① 재산 ② 부동산","ex":[{"en":"Leo inherited a large **estate**.","ko":"레오는 큰 재산을 물려받았다."},{"en":"Claire works for a real **estate** company.","ko":"클레어는 부동산 회사에서 일한다."}]},{"id":"vocab-0958","word":"estimate","ipa":"/ˈestɪmeɪt/","kr":"**에**스티메이트","mark":"**","pos":"명/동","mean":"① 견적 ② 추정하다","ex":[{"en":"The vendor sent us a cost **estimate**.","ko":"공급업체는 우리에게 비용 견적을 보냈다."},{"en":"**Estimate** the total cost.","ko":"총비용을 추정해라."}]},{"id":"vocab-0959","word":"ethic (ethical)","ipa":"/ˈeθɪk/","kr":"**에**씩","mark":"","pos":"명","mean":"윤리","ex":[{"en":"Honesty is an important work **ethic**.","ko":"정직은 중요한 직업 윤리다."}]},{"id":"vocab-0960","word":"ethnic","ipa":"/ˈeθnɪk/","kr":"**에**쓰닉","mark":"","pos":"형","mean":"① 민족의 ② 인종의","ex":[{"en":"The country has many **ethnic** groups.","ko":"그 나라는 많은 민족 집단을 가지고 있다."},{"en":"The survey includes several **ethnic** groups.","ko":"그 조사는 여러 인종 집단을 포함한다."}]},{"id":"vocab-0961","word":"evacuate","ipa":"/ɪˈvækjueɪt/","kr":"이**배**큐에이트","mark":"","pos":"동","mean":"① 대피시키다 ② 비우다","ex":[{"en":"The police **evacuated** the building.","ko":"경찰은 건물에서 사람들을 대피시켰다."},{"en":"The pump **evacuated** the air from the chamber.","ko":"그 펌프는 그 방에서 공기를 빼냈다."}]},{"id":"vocab-0962","word":"evaluate","ipa":"/ɪˈvæljueɪt/","kr":"이**밸**류에이트","mark":"","pos":"동","mean":"평가하다","ex":[{"en":"The teacher **evaluated** our essays.","ko":"선생님이 우리의 수필을 평가했다."}]},{"id":"vocab-0963","word":"even","ipa":"/ˈiːvn/","kr":"**이ː**븐","mark":"**","pos":"부/형","mean":"① ~조차 ② 짝수의 ③ 평평한","ex":[{"en":"**Even** a child can do it.","ko":"아이조차도 그것을 할 수 있다."},{"en":"Eight belongs to the set of **even** numbers.","ko":"8은 짝수의 집합에 속한다."},{"en":"Place the box on an **even** surface.","ko":"상자를 평평한 표면에 놓아라."}]},{"id":"vocab-0964","word":"evening","ipa":"/ˈiːvnɪŋ/","kr":"**이ː**브닝","mark":"*","pos":"명","mean":"저녁","ex":[{"en":"We took a walk in the **evening**.","ko":"우리는 저녁에 산책했다."}]},{"id":"vocab-0965","word":"event (eventually)","ipa":"/ɪˈvent/","kr":"이**벤트**","mark":"**","pos":"명","mean":"① 사건 ② 행사","ex":[{"en":"The power failure was a serious **event**.","ko":"정전은 심각한 사건이었다."},{"en":"The school held a sports **event**.","ko":"학교는 체육 행사를 열었다."}]},{"id":"vocab-0966","word":"ever","ipa":"/ˈevər/","kr":"**에**버","mark":"**","pos":"부","mean":"① 언젠가 ② 한 번이라도","ex":[{"en":"Someday, if you **ever** visit Seoul, call me.","ko":"언젠가 서울을 방문한다면 나에게 전화해라."},{"en":"Have you **ever** used this tool even once?","ko":"이 도구를 한 번이라도 사용해 본 적이 있나요?"}]},{"id":"vocab-0967","word":"every","ipa":"/ˈevri/","kr":"**에**브리","mark":"*","pos":"형","mean":"① 모든 ② 매","ex":[{"en":"**Every** student passed the test.","ko":"모든 학생이 시험에 합격했다."},{"en":"I exercise **every** morning.","ko":"나는 매일 아침 운동한다."}]},{"id":"vocab-0968","word":"evidence","ipa":"/ˈevɪdəns/","kr":"**에**비던스","mark":"**","pos":"명","mean":"증거","ex":[{"en":"The police found new **evidence**.","ko":"경찰은 새로운 증거를 찾았다."}]},{"id":"vocab-0969","word":"evil","ipa":"/ˈiːvl/","kr":"**이ː**블","mark":"**","pos":"형/명","mean":"① 사악한 ② 악","ex":[{"en":"The story has an **evil** king.","ko":"그 이야기에는 사악한 왕이 나온다."},{"en":"The story shows the fight between good and **evil**.","ko":"그 이야기는 선과 악의 싸움을 보여 준다."}]},{"id":"vocab-0970","word":"evitable (inevitable)","ipa":"/ˈevɪtəbl/","kr":"**에**비터블","mark":"","pos":"형","mean":"피할 수 있는","ex":[{"en":"The problem is **evitable** with care.","ko":"그 문제는 주의하면 피할 수 있다."}]},{"id":"vocab-0971","word":"evolution","ipa":"/ˌevəˈluːʃn/","kr":"에벌**루ː**션","mark":"","pos":"명","mean":"① 진화 ② 발전","ex":[{"en":"The book explains human **evolution**.","ko":"그 책은 인간의 진화를 설명한다."},{"en":"The **evolution** of the system took several years.","ko":"그 시스템의 발전에는 몇 년이 걸렸다."}]},{"id":"vocab-0972","word":"evolve","ipa":"/ɪˈvɑːlv/","kr":"이**볼브**","mark":"","pos":"동","mean":"① 진화하다 ② 발전하다","ex":[{"en":"Languages **evolve** over time.","ko":"언어는 시간이 지나면서 진화한다."},{"en":"The service will **evolve** with user needs.","ko":"그 서비스는 사용자 요구와 함께 발전할 것이다."}]},{"id":"vocab-0973","word":"exact","ipa":"/ɪɡˈzækt/","kr":"이그**잭트**","mark":"**","pos":"형","mean":"정확한","ex":[{"en":"Tell me the **exact** time.","ko":"정확한 시간을 말해 줘."}]},{"id":"vocab-0974","word":"exaggerate","ipa":"/ɪɡˈzædʒəreɪt/","kr":"이그**재**저레이트","mark":"","pos":"동","mean":"과장하다","ex":[{"en":"Don't **exaggerate** the problem.","ko":"그 문제를 과장하지 마라."}]},{"id":"vocab-0975","word":"examine (examination / exam)","ipa":"/ɪɡˈzæmɪn/","kr":"이그**재**민","mark":"**","pos":"동","mean":"① 검사하다 ② 조사하다","ex":[{"en":"The doctor **examined** my knee.","ko":"의사는 내 무릎을 검사했다."},{"en":"The auditor **examined** the records carefully.","ko":"감사 담당자는 기록을 주의 깊게 조사했다."}]},{"id":"vocab-0976","word":"example","ipa":"/ɪɡˈzæmpl/","kr":"이그**잼**플","mark":"*","pos":"명","mean":"① 예 ② 본보기","ex":[{"en":"This is a good **example** of teamwork.","ko":"이것은 협동의 좋은 예다."},{"en":"Her calm response set a good **example**.","ko":"그녀의 침착한 대응은 좋은 본보기가 되었다."}]},{"id":"vocab-0977","word":"exceed","ipa":"/ɪkˈsiːd/","kr":"익**시ː**드","mark":"","pos":"동","mean":"① 초과하다 ② 넘다","ex":[{"en":"Do not **exceed** the speed limit.","ko":"제한 속도를 초과하지 마라."},{"en":"Do not **exceed** or go beyond the budget.","ko":"예산을 넘지 마라."}]},{"id":"vocab-0978","word":"excel (excellent)","ipa":"/ɪkˈsel/","kr":"익**셀**","mark":"","pos":"동","mean":"① 뛰어나다 ② 탁월하다","ex":[{"en":"She **excels** at math.","ko":"그녀는 수학에 뛰어나다."},{"en":"She **excels** in customer support.","ko":"그녀는 고객 지원에서 탁월하다."}]},{"id":"vocab-0979","word":"except","ipa":"/ɪkˈsept/","kr":"익**셉트**","mark":"**","pos":"전","mean":"~을 제외하고","ex":[{"en":"Everyone came **except** Tom.","ko":"톰을 제외하고 모두 왔다."}]},{"id":"vocab-0980","word":"excess","ipa":"/ɪkˈses/","kr":"익**세스**","mark":"","pos":"명","mean":"① 과잉 ② 초과","ex":[{"en":"An **excess** of sugar is bad.","ko":"설탕의 과잉은 나쁘다."},{"en":"The **excess** payment was refunded.","ko":"초과 지불액은 환불되었다."}]},{"id":"vocab-0981","word":"exchange","ipa":"/ɪksˈtʃeɪndʒ/","kr":"익스**체인지**","mark":"**","pos":"명/동","mean":"① 교환 ② 교환하다","ex":[{"en":"The **exchange** of ideas was useful.","ko":"아이디어의 교환은 유용했다."},{"en":"We **exchanged** phone numbers.","ko":"우리는 전화번호를 교환했다."}]},{"id":"vocab-0982","word":"excite","ipa":"/ɪkˈsaɪt/","kr":"익**사잇**","mark":"**","pos":"동","mean":"① 흥분시키다 ② 들뜨게 하다","ex":[{"en":"The new project **excited** the team.","ko":"새 프로젝트는 그 팀을 흥분시켰다."},{"en":"The news **excited** the children.","ko":"그 소식이 아이들을 들뜨게 했다."}]},{"id":"vocab-0983","word":"exclude (exclusive)","ipa":"/ɪkˈskluːd/","kr":"익**스클루ː**드","mark":"","pos":"동","mean":"① 제외하다 ② 배제하다","ex":[{"en":"They **excluded** him from the team.","ko":"그들은 그를 팀에서 제외했다."},{"en":"The policy must not **exclude** remote workers.","ko":"그 정책은 원격 근무자를 배제해서는 안 된다."}]},{"id":"vocab-0984","word":"excuse","ipa":"/ɪkˈskjuːz/","kr":"익**스큐ː**즈","mark":"**","pos":"명/동","mean":"① 변명 ② 용서하다","ex":[{"en":"That is a poor **excuse**.","ko":"그것은 형편없는 변명이다."},{"en":"Could you **excuse** my mistake?","ko":"내 실수를 용서해 주실 수 있나요?"}]},{"id":"vocab-0985","word":"executive","ipa":"/ɪɡˈzekjətɪv/","kr":"이그**제**큐티브","mark":"","pos":"명/형","mean":"① 임원 ② 경영의","ex":[{"en":"Sophia is a senior **executive** at the company.","ko":"소피아는 그 회사의 고위 임원이다."},{"en":"Yuna joined an **executive** training program.","ko":"유나는 경영 교육 프로그램에 참여했다."}]},{"id":"vocab-0986","word":"exercise","ipa":"/ˈeksərsaɪz/","kr":"**엑**서사이즈","mark":"*","pos":"명/동","mean":"① 운동 ② 연습 ③ 운동하다","ex":[{"en":"I **exercise** before breakfast most mornings.","ko":"나는 대부분의 아침에 아침 식사 전에 운동한다."},{"en":"This **exercise** helps you practice the pattern.","ko":"이 연습은 그 패턴을 연습하는 데 도움이 된다."},{"en":"Regular **exercise** keeps you healthy.","ko":"규칙적인 운동은 너를 건강하게 해 준다."}]},{"id":"vocab-0987","word":"exhaust","ipa":"/ɪɡˈzɔːst/","kr":"이그**조ː**스트","mark":"**","pos":"동","mean":"① 지치게 하다 ② 고갈시키다","ex":[{"en":"The long walk **exhausted** us.","ko":"긴 산책은 우리를 지치게 했다."},{"en":"Heavy use can **exhaust** the battery.","ko":"과도한 사용은 배터리를 고갈시킬 수 있다."}]},{"id":"vocab-0988","word":"exhibit","ipa":"/ɪɡˈzɪbɪt/","kr":"이그**지**빗","mark":"","pos":"동/명","mean":"① 전시하다 ② 전시품","ex":[{"en":"The museum **exhibits** ancient tools.","ko":"그 박물관은 고대 도구들을 전시한다."},{"en":"The new robot is the main **exhibit**.","ko":"그 새 로봇은 주요 전시품이다."}]},{"id":"vocab-0989","word":"exist","ipa":"/ɪɡˈzɪst/","kr":"이그**지스트**","mark":"**","pos":"동","mean":"존재하다","ex":[{"en":"Do life forms **exist** on other planets?","ko":"다른 행성에 생명체가 존재하니?"}]},{"id":"vocab-0990","word":"exit","ipa":"/ˈeksɪt/","kr":"**엑**싯","mark":"**","pos":"명/동","mean":"① 출구 ② 나가다","ex":[{"en":"Use the rear **exit**.","ko":"뒤쪽 출구를 이용해라."},{"en":"Please **exit** the building through the rear door.","ko":"뒤쪽 문으로 건물에서 나가 주세요."}]},{"id":"vocab-0991","word":"exotic","ipa":"/ɪɡˈzɑːtɪk/","kr":"이그**자**틱","mark":"","pos":"형","mean":"이국적인","ex":[{"en":"The market sells **exotic** fruits.","ko":"그 시장은 이국적인 과일을 판다."}]},{"id":"vocab-0992","word":"expand","ipa":"/ɪkˈspænd/","kr":"익**스팬드**","mark":"**","pos":"동","mean":"① 확장하다 ② 넓히다","ex":[{"en":"The local company plans to **expand**.","ko":"그 지역 회사는 확장할 계획이다."},{"en":"More desks would **expand** the available office space.","ko":"책상을 더 놓으면 사용 가능한 사무 공간이 넓어질 것이다."}]},{"id":"vocab-0993","word":"expect","ipa":"/ɪkˈspekt/","kr":"익**스펙트**","mark":"**","pos":"동","mean":"① 기대하다 ② 예상하다","ex":[{"en":"I **expect** good results.","ko":"나는 좋은 결과를 기대한다."},{"en":"I **expect** him to arrive soon.","ko":"나는 그가 곧 도착할 것으로 예상한다."}]},{"id":"vocab-0994","word":"expense (expensive)","ipa":"/ɪkˈspens/","kr":"익**스펜스**","mark":"**","pos":"명","mean":"① 비용 ② 지출","ex":[{"en":"Travel **expenses** were very high.","ko":"여행 비용이 매우 높았다."},{"en":"Please record every business **expense** and payment.","ko":"모든 업무 지출을 기록해 주세요."}]},{"id":"vocab-0995","word":"experience","ipa":"/ɪkˈspɪriəns/","kr":"익**스피**리언스","mark":"**","pos":"명/동","mean":"① 경험 ② 경험하다","ex":[{"en":"Emma has years of **experience**.","ko":"엠마는 수년의 경험이 있다."},{"en":"Olivia has **experience** in teaching.","ko":"올리비아는 가르친 경험이 있다."}]},{"id":"vocab-0996","word":"experiment","ipa":"/ɪkˈsperɪmənt/","kr":"익**스페**리먼트","mark":"**","pos":"명/동","mean":"① 실험 ② 실험하다","ex":[{"en":"The **experiment** produced clear results.","ko":"그 실험은 명확한 결과를 만들어 냈다."},{"en":"We did a science **experiment**.","ko":"우리는 과학 실험을 했다."}]},{"id":"vocab-0997","word":"expert","ipa":"/ˈekspɜːrt/","kr":"**엑**스퍼트","mark":"**","pos":"명","mean":"전문가","ex":[{"en":"Ask an **expert** for advice.","ko":"전문가에게 조언을 구해라."}]},{"id":"vocab-0998","word":"expertise","ipa":"/ˌekspɜːrˈtiːz/","kr":"엑스퍼**티ː**즈","mark":"","pos":"명","mean":"① 전문 지식 ② 전문성","ex":[{"en":"We need her technical **expertise**.","ko":"우리는 그녀의 기술적 전문 지식이 필요하다."},{"en":"Her technical **expertise** gives the team confidence.","ko":"그녀의 기술적 전문성은 팀에 신뢰를 준다."}]},{"id":"vocab-0999","word":"explain","ipa":"/ɪkˈspleɪn/","kr":"익**스플레인**","mark":"**","pos":"동","mean":"설명하다","ex":[{"en":"Can you **explain** this rule?","ko":"이 규칙을 설명해 줄 수 있니?"}]},{"id":"vocab-1000","word":"explicit","ipa":"/ɪkˈsplɪsɪt/","kr":"익**스플리**싯","mark":"","pos":"형","mean":"① 명확한 ② 분명한","ex":[{"en":"Julia gave **explicit** instructions.","ko":"줄리아는 명확한 지시를 내렸다."},{"en":"The contract makes the payment terms **explicit**.","ko":"그 계약서는 지급 조건을 분명하게 한다."}]},{"id":"vocab-1001","word":"explode","ipa":"/ɪkˈsploʊd/","kr":"익**스플로드**","mark":"","pos":"동","mean":"폭발하다","ex":[{"en":"The firework **exploded** in the sky.","ko":"폭죽이 하늘에서 폭발했다."}]},{"id":"vocab-1002","word":"explore","ipa":"/ɪkˈsplɔːr/","kr":"익**스플로ː**","mark":"","pos":"동","mean":"① 탐험하다 ② 탐구하다","ex":[{"en":"We **explored** the old castle.","ko":"우리는 오래된 성을 탐험했다."},{"en":"The research team **explored** the cause of the error.","ko":"연구팀은 오류의 원인을 탐구했다."}]},{"id":"vocab-1003","word":"export","ipa":"/ɪkˈspɔːrt/","kr":"익**스포ː**트","mark":"","pos":"명/동","mean":"① 수출 ② 수출하다","ex":[{"en":"Car **exports** increased last year.","ko":"자동차 수출은 지난해 증가했다."},{"en":"The country **exports** many cars.","ko":"그 나라는 많은 자동차를 수출한다."}]},{"id":"vocab-1004","word":"expose","ipa":"/ɪkˈspoʊz/","kr":"익**스포즈**","mark":"**","pos":"동","mean":"① 노출시키다 ② 드러내다","ex":[{"en":"Do not **expose** the film to light.","ko":"그 필름을 빛에 노출시키지 마라."},{"en":"The audit **exposed** the hidden cost.","ko":"감사는 숨겨진 비용을 드러냈다."}]},{"id":"vocab-1005","word":"express","ipa":"/ɪkˈspres/","kr":"익**스프레스**","mark":"**","pos":"동/형","mean":"① 표현하다 ② 급행의","ex":[{"en":"She **expressed** her feelings clearly.","ko":"그녀는 자신의 감정을 분명히 표현했다."},{"en":"We took the **express** train to the airport.","ko":"우리는 공항까지 급행 열차를 탔다."}]},{"id":"vocab-1006","word":"extend","ipa":"/ɪkˈstend/","kr":"익**스텐드**","mark":"**","pos":"동","mean":"① 연장하다 ② 늘리다","ex":[{"en":"They **extended** the road to the village.","ko":"그들은 도로를 마을까지 연장했다."},{"en":"The new server will **extend** our capacity.","ko":"새 서버는 우리의 수용 능력을 늘릴 것이다."}]},{"id":"vocab-1007","word":"extent","ipa":"/ɪkˈstent/","kr":"익**스텐트**","mark":"","pos":"명","mean":"① 정도 ② 범위","ex":[{"en":"I understand your concern to some **extent**.","ko":"나는 네 걱정을 어느 정도 이해한다."},{"en":"The problem affects the entire region to a wide **extent**.","ko":"그 문제는 넓은 범위에서 전체 지역에 영향을 미친다."}]},{"id":"vocab-1008","word":"external","ipa":"/ɪkˈstɜːrnl/","kr":"익**스터ː**늘","mark":"","pos":"형","mean":"① 외부의 ② 밖의","ex":[{"en":"The building has an **external** staircase.","ko":"그 건물에는 외부 계단이 있다."},{"en":"Please wait outside the **external** gate.","ko":"외부의 문 밖에서 기다려 주세요."}]},{"id":"vocab-1009","word":"extinct","ipa":"/ɪkˈstɪŋkt/","kr":"익**스팅트**","mark":"","pos":"형","mean":"멸종된","ex":[{"en":"Several local species are now **extinct**.","ko":"여러 지역 종이 지금 멸종되었다."}]},{"id":"vocab-1010","word":"extra","ipa":"/ˈekstrə/","kr":"**엑**스트러","mark":"**","pos":"형/부","mean":"① 추가의 ② 특별히","ex":[{"en":"We need an **extra** monitor for the new employee.","ko":"신입 직원을 위해 추가의 모니터가 필요하다."},{"en":"Claire worked **extra** hard before the launch.","ko":"클레어는 출시 전에 특별히 열심히 일했다."}]},{"id":"vocab-1011","word":"extract","ipa":"/ɪkˈstrækt/","kr":"익**스트랙트**","mark":"","pos":"동/명","mean":"① 추출하다 ② 발췌","ex":[{"en":"They **extract** oil from the seeds.","ko":"그들은 씨앗에서 기름을 추출한다."},{"en":"The monthly report includes an **extract** from the interview.","ko":"월간 보고서는 면접의 발췌문을 포함한다."}]},{"id":"vocab-1012","word":"extraordinary","ipa":"/ɪkˈstrɔːrdəneri/","kr":"익**스트로ː**더네리","mark":"","pos":"형","mean":"① 비범한 ② 놀라운","ex":[{"en":"Grace has an **extraordinary** talent.","ko":"그레이스는 비범한 재능을 지녔다."},{"en":"Her **extraordinary** memory impressed the interviewers.","ko":"그녀의 놀라운 기억력은 면접관들에게 깊은 인상을 주었다."}]},{"id":"vocab-1013","word":"extreme","ipa":"/ɪkˈstriːm/","kr":"익**스트림ː**","mark":"**","pos":"형","mean":"① 극단적인 ② 극심한","ex":[{"en":"That is an **extreme** solution to a small problem.","ko":"그것은 작은 문제에 대한 극단적인 해결책이다."},{"en":"The hikers faced **extreme** cold.","ko":"등산객들은 극심한 추위에 직면했다."}]},{"id":"vocab-1014","word":"eye","ipa":"/aɪ/","kr":"**아이**","mark":"*","pos":"명","mean":"눈","ex":[{"en":"Olivia has blue **eyes**.","ko":"올리비아는 파란 눈을 가지고 있다."}]},{"id":"vocab-1015","word":"eyebrow","ipa":"/ˈaɪbraʊ/","kr":"**아이**브라우","mark":"","pos":"명","mean":"눈썹","ex":[{"en":"Ryan raised his **eyebrow**.","ko":"라이언은 눈썹을 치켜올렸다."}]},{"id":"vocab-1016","word":"fabric","ipa":"/ˈfæbrɪk/","kr":"**패**브릭","mark":"","pos":"명","mean":"① 직물 ② 천","ex":[{"en":"This **fabric** is soft.","ko":"이 직물은 부드럽다."},{"en":"Silk **fabric** feels cool against the skin.","ko":"비단 천은 피부에 닿으면 시원하게 느껴진다."}]},{"id":"vocab-1017","word":"face","ipa":"/feɪs/","kr":"**페이스**","mark":"*","pos":"명/동","mean":"① 얼굴 ② 마주하다","ex":[{"en":"Nora washed her **face**.","ko":"노라는 얼굴을 씻었다."},{"en":"We must **face** the customer directly.","ko":"우리는 고객을 직접 마주해야 한다."}]},{"id":"vocab-1018","word":"facilitate","ipa":"/fəˈsɪlɪteɪt/","kr":"퍼**실**리테이트","mark":"","pos":"동","mean":"① 촉진하다 ② 용이하게 하다","ex":[{"en":"The new system **facilitates** communication.","ko":"새 시스템은 의사소통을 촉진한다."},{"en":"Good tools **facilitate** the work.","ko":"좋은 도구는 일을 수월하게 한다."}]},{"id":"vocab-1019","word":"facility","ipa":"/fəˈsɪləti/","kr":"퍼**실**러티","mark":"","pos":"명","mean":"① 시설 ② 설비","ex":[{"en":"The town has a sports **facility**.","ko":"그 마을에는 체육 시설이 있다."},{"en":"The factory installed a new cooling **facility**.","ko":"그 공장은 새 냉각 설비를 설치했다."}]},{"id":"vocab-1020","word":"fact (factual)","ipa":"/fækt/","kr":"**팩트**","mark":"*","pos":"명","mean":"사실","ex":[{"en":"It is a well-known **fact**.","ko":"그것은 잘 알려진 사실이다."}]},{"id":"vocab-1021","word":"factor","ipa":"/ˈfæktər/","kr":"**팩**터","mark":"**","pos":"명","mean":"① 요인 ② 요소","ex":[{"en":"Cost is an important **factor**.","ko":"비용은 중요한 요인이다."},{"en":"Time is an important **factor** in the decision.","ko":"시간은 그 결정의 중요한 요소다."}]},{"id":"vocab-1022","word":"factory","ipa":"/ˈfæktri/","kr":"**팩**트리","mark":"**","pos":"명","mean":"공장","ex":[{"en":"Ryan works in a car **factory**.","ko":"라이언은 자동차 공장에서 일한다."}]},{"id":"vocab-1023","word":"faculty","ipa":"/ˈfæklti/","kr":"**패**컬티","mark":"","pos":"명","mean":"① 교수진 ② 능력","ex":[{"en":"The university has a large **faculty**.","ko":"그 대학에는 많은 교수진이 있다."},{"en":"Humans have the **faculty** of reason.","ko":"인간은 이성의 능력을 가지고 있다."}]},{"id":"vocab-1024","word":"fade","ipa":"/feɪd/","kr":"**페이드**","mark":"","pos":"동","mean":"① 바래다 ② 희미해지다","ex":[{"en":"The printed label **faded** in the sun.","ko":"인쇄된 라벨은 햇빛에 바랬다."},{"en":"The sound began to **fade**.","ko":"그 소리는 희미해지기 시작했다."}]},{"id":"vocab-1025","word":"fail","ipa":"/feɪl/","kr":"**페일**","mark":"*","pos":"동","mean":"① 실패하다 ② 낙제하다","ex":[{"en":"Don't be afraid to **fail**.","ko":"실패를 두려워하지 마라."},{"en":"He **failed** the final exam.","ko":"그는 기말시험에 낙제했다."}]},{"id":"vocab-1026","word":"faint","ipa":"/feɪnt/","kr":"**페인트**","mark":"**","pos":"동/형","mean":"① 기절하다 ② 희미한","ex":[{"en":"She **fainted** in the heat.","ko":"그녀는 더위에 기절했다."},{"en":"I heard a **faint** sound.","ko":"나는 희미한 소리를 들었다."}]},{"id":"vocab-1027","word":"fair","ipa":"/fer/","kr":"**페어**","mark":"**","pos":"형/명","mean":"① 공정한 ② 박람회","ex":[{"en":"The judge made a **fair** decision.","ko":"판사는 공정한 결정을 내렸다."},{"en":"We visited the local job **fair**.","ko":"우리는 지역 취업 박람회를 방문했다."}]},{"id":"vocab-1028","word":"faith","ipa":"/feɪθ/","kr":"**페이쓰**","mark":"**","pos":"명","mean":"① 믿음 ② 신앙","ex":[{"en":"I have **faith** in the support team.","ko":"나는 지원팀을 믿는다."},{"en":"Her **faith** gives her strength.","ko":"그녀의 신앙은 그녀에게 힘을 준다."}]},{"id":"vocab-1029","word":"fall","ipa":"/fɔːl/","kr":"**폴ː**","mark":"*","pos":"동/명","mean":"① 떨어지다 ② 가을","ex":[{"en":"Prices may **fall** next month.","ko":"가격은 다음 달에 떨어질 수 있다."},{"en":"Leaves **fall** in autumn.","ko":"나뭇잎은 가을에 떨어진다."}]},{"id":"vocab-1030","word":"false","ipa":"/fɔːls/","kr":"**폴ː**스","mark":"","pos":"형","mean":"① 틀린 ② 거짓의","ex":[{"en":"The information in that email was **false**.","ko":"그 이메일의 정보는 틀렸다."},{"en":"The story was **false**.","ko":"그 이야기는 거짓이었다."}]},{"id":"vocab-1031","word":"fame (famous)","ipa":"/feɪm/","kr":"**페임**","mark":"","pos":"명","mean":"명성","ex":[{"en":"The singer gained **fame** quickly.","ko":"그 가수는 빠르게 명성을 얻었다."}]},{"id":"vocab-1032","word":"familiar","ipa":"/fəˈmɪliər/","kr":"퍼**밀**리어","mark":"**","pos":"형","mean":"① 익숙한 ② 친숙한","ex":[{"en":"This song sounds **familiar**.","ko":"이 노래는 익숙하게 들린다."},{"en":"Her voice is **familiar** to everyone in the office.","ko":"그녀의 목소리는 사무실의 모두에게 친숙하다."}]},{"id":"vocab-1033","word":"family","ipa":"/ˈfæməli/","kr":"**패**멀리","mark":"*","pos":"명","mean":"가족","ex":[{"en":"My **family** eats dinner together.","ko":"우리 가족은 함께 저녁을 먹는다."}]},{"id":"vocab-1034","word":"fan","ipa":"/fæn/","kr":"**팬**","mark":"*","pos":"명","mean":"① 부채 ② 선풍기 ③ 팬","ex":[{"en":"Sophia cooled herself with a paper **fan**.","ko":"소피아는 종이 부채로 몸을 식혔다."},{"en":"Turn on the **fan**.","ko":"선풍기를 켜라."},{"en":"Sophia is a big **fan** of the team.","ko":"소피아는 그 팀의 열렬한 팬이다."}]},{"id":"vocab-1035","word":"fancy","ipa":"/ˈfænsi/","kr":"**팬**시","mark":"**","pos":"형/동","mean":"① 화려한 ② 원하다","ex":[{"en":"They stayed at a **fancy** hotel.","ko":"그들은 화려한 호텔에 묵었다."},{"en":"Do you **fancy** a cup of coffee?","ko":"커피 한 잔을 원하나요?"}]},{"id":"vocab-1036","word":"fantastic","ipa":"/fænˈtæstɪk/","kr":"팬**태**스틱","mark":"**","pos":"형","mean":"① 환상적인 ② 멋진","ex":[{"en":"The show was **fantastic**.","ko":"그 공연은 환상적이었다."},{"en":"The new dashboard looks **fantastic**.","ko":"새 대시보드는 멋져 보인다."}]},{"id":"vocab-1037","word":"far","ipa":"/fɑːr/","kr":"**파ː**","mark":"*","pos":"형/부","mean":"① 먼 ② 멀리","ex":[{"en":"The airport is **far** from the office.","ko":"공항은 사무실에서 멀다."},{"en":"The new office is **far** from the nearest station.","ko":"새 사무실은 가장 가까운 역에서 멀리 떨어져 있다."}]},{"id":"vocab-1038","word":"fare","ipa":"/fer/","kr":"**페어**","mark":"","pos":"명","mean":"요금","ex":[{"en":"The bus **fare** is two dollars.","ko":"버스 요금은 2달러다."}]},{"id":"vocab-1039","word":"farm","ipa":"/fɑːrm/","kr":"**팜ː**","mark":"*","pos":"명","mean":"농장","ex":[{"en":"They grow rice on the **farm**.","ko":"그들은 농장에서 쌀을 재배한다."}]},{"id":"vocab-1040","word":"fascinate","ipa":"/ˈfæsɪneɪt/","kr":"**패**시네이트","mark":"**","pos":"동","mean":"① 매혹하다 ② 사로잡다","ex":[{"en":"The stars **fascinate** children.","ko":"별은 아이들을 매혹한다."},{"en":"The clear data **fascinated** the audience.","ko":"명확한 자료는 청중을 사로잡았다."}]},{"id":"vocab-1041","word":"fashion","ipa":"/ˈfæʃn/","kr":"**패**션","mark":"**","pos":"명","mean":"① 패션 ② 유행","ex":[{"en":"Nora works in the **fashion** industry.","ko":"노라는 패션 업계에서 일한다."},{"en":"This style is back in **fashion**.","ko":"이 스타일은 다시 유행하고 있다."}]},{"id":"vocab-1042","word":"fast","ipa":"/fæst/","kr":"**패스트**","mark":"*","pos":"형/부","mean":"① 빠른 ② 빨리","ex":[{"en":"We need a **fast** response from the vendor.","ko":"우리는 공급업체의 빠른 답변이 필요하다."},{"en":"Alex runs very **fast**.","ko":"알렉스는 매우 빨리 달린다."}]},{"id":"vocab-1043","word":"fasten","ipa":"/ˈfæsn/","kr":"**패**슨","mark":"","pos":"동","mean":"① 매다 ② 잠그다","ex":[{"en":"Please **fasten** your seat belt.","ko":"안전띠를 매 주세요."},{"en":"**Fasten** the gate before leaving.","ko":"떠나기 전에 대문을 잠가라."}]},{"id":"vocab-1044","word":"fat","ipa":"/fæt/","kr":"**팻**","mark":"*","pos":"형/명","mean":"① 뚱뚱한 ② 지방","ex":[{"en":"The cat is very **fat**.","ko":"그 고양이는 매우 뚱뚱하다."},{"en":"This food is high in **fat**.","ko":"이 음식은 지방이 많다."}]},{"id":"vocab-1045","word":"fate (fatal)","ipa":"/feɪt/","kr":"**페잇**","mark":"","pos":"명","mean":"운명","ex":[{"en":"No one can predict their **fate**.","ko":"아무도 자신의 운명을 예측할 수 없다."}]},{"id":"vocab-1046","word":"father (dad, daddy)","ipa":"/ˈfɑːðər/","kr":"**파ː**더","mark":"*","pos":"명","mean":"아버지","ex":[{"en":"My **father** cooks on Sundays.","ko":"우리 아버지는 일요일마다 요리하신다."}]},{"id":"vocab-1047","word":"fault","ipa":"/fɔːlt/","kr":"**폴ː**트","mark":"**","pos":"명","mean":"① 잘못 ② 결점","ex":[{"en":"The accident was not your **fault**.","ko":"그 사고는 네 잘못이 아니었다."},{"en":"The design has a serious **fault**.","ko":"그 설계에는 심각한 결점이 있다."}]},{"id":"vocab-1048","word":"favor / favour","ipa":"/ˈfeɪvər/","kr":"**페이**버","mark":"**","pos":"명/동","mean":"① 호의 ② 부탁 ③ 편들다","ex":[{"en":"Lina did me a great **favor**.","ko":"리나는 나에게 큰 호의를 베풀었다."},{"en":"Could you do me a **favor**?","ko":"내 부탁 하나 들어줄래?"},{"en":"The referee did not **favor** either team.","ko":"그 심판은 어느 팀도 편들지 않았다."}]},{"id":"vocab-1049","word":"favorite / favourite","ipa":"/ˈfeɪvərɪt/","kr":"**페이**버릿","mark":"*","pos":"형/명","mean":"① 가장 좋아하는 ② 좋아하는 것","ex":[{"en":"This is my **favorite** app.","ko":"이것은 내가 가장 좋아하는 앱이다."},{"en":"Blue is my **favorite**.","ko":"파란색은 내가 가장 좋아하는 것이다."}]},{"id":"vocab-1050","word":"fear","ipa":"/fɪr/","kr":"**피어**","mark":"**","pos":"명/동","mean":"① 두려움 ② 두려워하다","ex":[{"en":"**Fear** kept him from speaking.","ko":"두려움이 그가 말하지 못하게 했다."},{"en":"Many children **fear** the dark.","ko":"많은 아이들이 어둠을 두려워한다."}]},{"id":"vocab-1051","word":"feature","ipa":"/ˈfiːtʃər/","kr":"**피ː**처","mark":"**","pos":"명","mean":"① 특징 ② 특색","ex":[{"en":"Speed is the main **feature** of the tool.","ko":"속도는 그 도구의 주된 특징이다."},{"en":"A rooftop garden is the building's best **feature**.","ko":"옥상 정원은 그 건물의 가장 좋은 특징이다."}]},{"id":"vocab-1052","word":"federal","ipa":"/ˈfedərəl/","kr":"**페**더럴","mark":"","pos":"형","mean":"연방의","ex":[{"en":"The **federal** government announced a new policy.","ko":"연방 정부는 새 정책을 발표했다."}]},{"id":"vocab-1053","word":"fee","ipa":"/fiː/","kr":"**피ː**","mark":"**","pos":"명","mean":"① 요금 ② 수수료","ex":[{"en":"The hotel **fee** includes breakfast.","ko":"호텔 요금에는 아침 식사가 포함된다."},{"en":"The bank charged a small service **fee**.","ko":"은행은 작은 서비스 수수료를 부과했다."}]},{"id":"vocab-1054","word":"feed","ipa":"/fiːd/","kr":"**피ː**드","mark":"**","pos":"동","mean":"① 먹이다 ② 먹이를 주다","ex":[{"en":"She **feeds** the birds every day.","ko":"그녀는 매일 새들에게 먹이를 준다."},{"en":"Please **feed** the cat.","ko":"고양이에게 먹이를 주세요."}]},{"id":"vocab-1055","word":"feel","ipa":"/fiːl/","kr":"**필ː**","mark":"*","pos":"동","mean":"느끼다","ex":[{"en":"I **feel** tired after the night shift.","ko":"나는 야간 근무 후에 피곤함을 느낀다."}]},{"id":"vocab-1056","word":"fellow","ipa":"/ˈfeloʊ/","kr":"**펠**로","mark":"**","pos":"명","mean":"① 동료 ② 녀석","ex":[{"en":"Emma helped her **fellow** students.","ko":"엠마는 동료 학생들을 도왔다."},{"en":"Lucas is a nice **fellow**.","ko":"루카스는 좋은 녀석이다."}]},{"id":"vocab-1057","word":"female","ipa":"/ˈfiːmeɪl/","kr":"**피ː**메일","mark":"**","pos":"명/형","mean":"① 여성 ② 암컷의","ex":[{"en":"A small company hired more **female** employees.","ko":"한 소규모 회사는 여성 직원을 더 많이 고용했다."},{"en":"The **female** bird guards the nest.","ko":"암컷 새가 둥지를 지킨다."}]},{"id":"vocab-1058","word":"fence","ipa":"/fens/","kr":"**펜스**","mark":"**","pos":"명","mean":"울타리","ex":[{"en":"The garden has a wooden **fence**.","ko":"그 정원에는 나무 울타리가 있다."}]},{"id":"vocab-1059","word":"ferry","ipa":"/ˈferi/","kr":"**페**리","mark":"","pos":"명","mean":"① 여객선 ② 나룻배","ex":[{"en":"We took a **ferry** to the island.","ko":"우리는 여객선을 타고 섬에 갔다."},{"en":"A small **ferry** carried us across the river.","ko":"작은 나룻배가 우리를 강 건너로 실어 날랐다."}]},{"id":"vocab-1060","word":"fertile","ipa":"/ˈfɜːrtl/","kr":"**퍼ː**틀","mark":"","pos":"형","mean":"비옥한","ex":[{"en":"This valley has **fertile** soil.","ko":"이 계곡에는 비옥한 토양이 있다."}]},{"id":"vocab-1061","word":"festival","ipa":"/ˈfestɪvl/","kr":"**페**스티벌","mark":"*","pos":"명","mean":"축제","ex":[{"en":"The town holds a flower **festival**.","ko":"그 마을은 꽃 축제를 연다."}]},{"id":"vocab-1062","word":"fever","ipa":"/ˈfiːvər/","kr":"**피ː**버","mark":"**","pos":"명","mean":"① 열 ② 발열","ex":[{"en":"One child has a high **fever**.","ko":"한 아이는 고열이 있다."},{"en":"**Fever** can be a sign of infection.","ko":"발열은 감염의 징후일 수 있다."}]},{"id":"vocab-1063","word":"few","ipa":"/fjuː/","kr":"**퓨ː**","mark":"**","pos":"형/대","mean":"① 거의 없는 ② 소수","ex":[{"en":"**Few** people knew the answer.","ko":"답을 아는 사람은 거의 없었다."},{"en":"Only a **few** employees understood the new rule.","ko":"소수의 직원만 새 규칙을 이해했다."}]},{"id":"vocab-1064","word":"fiber / fibre","ipa":"/ˈfaɪbər/","kr":"**파이**버","mark":"","pos":"명","mean":"섬유","ex":[{"en":"Vegetables contain a lot of **fiber**.","ko":"채소에는 섬유질이 많다."}]},{"id":"vocab-1065","word":"fiction","ipa":"/ˈfɪkʃn/","kr":"**픽**션","mark":"","pos":"명","mean":"① 소설 ② 허구","ex":[{"en":"Hana enjoys reading science **fiction**.","ko":"하나는 공상 과학 소설 읽기를 즐긴다."},{"en":"The story is **fiction**, not fact.","ko":"그 이야기는 사실이 아니라 허구다."}]},{"id":"vocab-1066","word":"field","ipa":"/fiːld/","kr":"**필ː**드","mark":"*","pos":"명","mean":"① 들판 ② 분야","ex":[{"en":"The children played in the **field**.","ko":"아이들은 들판에서 놀았다."},{"en":"Ryan works in the medical **field**.","ko":"라이언은 의료 분야에서 일한다."}]},{"id":"vocab-1067","word":"fierce","ipa":"/fɪrs/","kr":"**피어스**","mark":"","pos":"형","mean":"① 사나운 ② 격렬한","ex":[{"en":"The guard dog looked **fierce**.","ko":"그 경비견은 사나워 보였다."},{"en":"The two companies faced **fierce** competition.","ko":"두 회사는 격렬한 경쟁에 직면했다."}]},{"id":"vocab-1068","word":"fight","ipa":"/faɪt/","kr":"**파잇**","mark":"*","pos":"동/명","mean":"① 싸우다 ② 싸움","ex":[{"en":"The brothers often **fight** over the computer.","ko":"그 형제들은 컴퓨터를 두고 자주 싸운다."},{"en":"A **fight** started outside the station.","ko":"역 밖에서 싸움이 시작되었다."}]},{"id":"vocab-1069","word":"figure","ipa":"/ˈfɪɡjər/","kr":"**피**겨","mark":"**","pos":"명/동","mean":"① 수치 ② 인물 ③ 이해하다","ex":[{"en":"The report includes several **figures**.","ko":"그 보고서에는 여러 수치가 포함되어 있다."},{"en":"Grace is a leading **figure** in the industry.","ko":"그레이스는 그 업계의 주요 인물이다."},{"en":"I cannot **figure** out this error.","ko":"나는 이 오류를 이해할 수 없다."}]},{"id":"vocab-1070","word":"file","ipa":"/faɪl/","kr":"**파일**","mark":"*","pos":"명/동","mean":"① 파일 ② 서류철 ③ 정리하다","ex":[{"en":"Save the document as a new **file**.","ko":"그 문서를 새 파일로 저장해라."},{"en":"Put the signed papers in the blue **file**.","ko":"서명된 서류를 파란 서류철에 넣어라."},{"en":"Please **file** these documents by date.","ko":"이 서류들을 날짜별로 정리해 주세요."}]},{"id":"vocab-1071","word":"fill","ipa":"/fɪl/","kr":"**필**","mark":"*","pos":"동","mean":"채우다","ex":[{"en":"**Fill** the glass with water.","ko":"잔을 물로 채워라."}]},{"id":"vocab-1072","word":"film","ipa":"/fɪlm/","kr":"**필름**","mark":"*","pos":"명","mean":"① 영화 ② 필름","ex":[{"en":"We watched a funny **film**.","ko":"우리는 재미있는 영화를 보았다."},{"en":"The camera needs a new roll of **film**.","ko":"그 카메라는 새 필름 한 통이 필요하다."}]},{"id":"vocab-1073","word":"filter","ipa":"/ˈfɪltər/","kr":"**필**터","mark":"","pos":"명/동","mean":"① 여과기 ② 거르다","ex":[{"en":"The **filter** cleans the water.","ko":"그 여과기는 물을 깨끗하게 한다."},{"en":"**Filter** the water before drinking it.","ko":"마시기 전에 물을 걸러라."}]},{"id":"vocab-1074","word":"final","ipa":"/ˈfaɪnl/","kr":"**파이**늘","mark":"**","pos":"형/명","mean":"① 마지막의 ② 결승전","ex":[{"en":"This is the **final** chapter.","ko":"이것은 마지막 장이다."},{"en":"Our team reached the **final**.","ko":"우리 팀은 결승전에 진출했다."}]},{"id":"vocab-1075","word":"finance","ipa":"/ˈfaɪnæns/","kr":"**파이**낸스","mark":"**","pos":"명","mean":"① 재정 ② 금융","ex":[{"en":"**Finance** is a key part of the plan.","ko":"재정은 그 계획의 핵심 부분이다."},{"en":"Emma studies **finance** at college.","ko":"엠마는 대학에서 금융을 공부한다."}]},{"id":"vocab-1076","word":"find","ipa":"/faɪnd/","kr":"**파인드**","mark":"*","pos":"동","mean":"① 찾다 ② 발견하다","ex":[{"en":"I can't **find** my keys.","ko":"나는 열쇠를 찾을 수 없다."},{"en":"The audit **found** several errors.","ko":"그 감사는 여러 오류를 발견했다."}]},{"id":"vocab-1077","word":"fine","ipa":"/faɪn/","kr":"**파인**","mark":"*","pos":"형/명","mean":"① 좋은 ② 괜찮은 ③ 벌금","ex":[{"en":"We enjoyed **fine** weather during the picnic.","ko":"우리는 소풍 동안 좋은 날씨를 즐겼다."},{"en":"The current plan is **fine**.","ko":"현재 계획은 괜찮다."},{"en":"A growing company paid a **fine**.","ko":"한 성장 중인 회사는 벌금을 냈다."}]},{"id":"vocab-1078","word":"finger","ipa":"/ˈfɪŋɡər/","kr":"**핑**거","mark":"*","pos":"명","mean":"손가락","ex":[{"en":"Nora cut her **finger**.","ko":"노라는 손가락을 베었다."}]},{"id":"vocab-1079","word":"finish","ipa":"/ˈfɪnɪʃ/","kr":"**피**니시","mark":"*","pos":"동","mean":"① 끝내다 ② 마치다","ex":[{"en":"Please **finish** your homework.","ko":"숙제를 끝내 주세요."},{"en":"Please **finish** the form today.","ko":"오늘 그 양식을 마쳐 주세요."}]},{"id":"vocab-1080","word":"finite","ipa":"/ˈfaɪnaɪt/","kr":"**파이**나잇","mark":"","pos":"형","mean":"① 유한한 ② 한정된","ex":[{"en":"We have **finite** resources.","ko":"우리는 유한한 자원을 가지고 있다."},{"en":"We have a **finite** amount of time.","ko":"우리에게는 한정된 시간이 있다."}]},{"id":"vocab-1081","word":"fire","ipa":"/ˈfaɪər/","kr":"**파이**어","mark":"*","pos":"명/동","mean":"① 불 ② 해고하다","ex":[{"en":"The **fire** spread quickly.","ko":"불이 빠르게 번졌다."},{"en":"The local company decided to **fire** the manager.","ko":"그 지역 회사는 그 관리자를 해고하기로 결정했다."}]},{"id":"vocab-1082","word":"firm","ipa":"/fɜːrm/","kr":"**펌ː**","mark":"**","pos":"형/명","mean":"① 단단한 ② 회사","ex":[{"en":"The mattress is **firm** but comfortable.","ko":"그 매트리스는 단단하지만 편안하다."},{"en":"Yuna joined a small consulting **firm**.","ko":"유나는 작은 컨설팅 회사에 입사했다."}]},{"id":"vocab-1083","word":"first","ipa":"/fɜːrst/","kr":"**퍼ː**스트","mark":"*","pos":"형/부","mean":"① 첫째의 ② 먼저","ex":[{"en":"This is the **first** item on the list.","ko":"이것은 목록의 첫째 항목이다."},{"en":"Mina arrived **first**.","ko":"미나는 가장 먼저 도착했다."}]},{"id":"vocab-1084","word":"fish","ipa":"/fɪʃ/","kr":"**피시**","mark":"*","pos":"명/동","mean":"① 물고기 ② 낚시하다","ex":[{"en":"We saw many **fish** in the river.","ko":"우리는 강에서 많은 물고기를 보았다."},{"en":"We **fish** in the lake every summer.","ko":"우리는 매년 여름 그 호수에서 낚시한다."}]},{"id":"vocab-1085","word":"fit","ipa":"/fɪt/","kr":"**핏**","mark":"**","pos":"동/형","mean":"① 맞다 ② 건강한","ex":[{"en":"These shoes **fit** well.","ko":"이 신발은 잘 맞는다."},{"en":"Regular exercise keeps you **fit**.","ko":"규칙적인 운동은 당신을 건강하게 유지한다."}]},{"id":"vocab-1086","word":"five","ipa":"/faɪv/","kr":"**파이브**","mark":"*","pos":"명/형","mean":"① 다섯 ② 5","ex":[{"en":"I have **five** pencils.","ko":"나는 연필 다섯 자루를 가지고 있다."},{"en":"The code contains the number **five**.","ko":"그 코드는 숫자 5를 포함한다."}]},{"id":"vocab-1087","word":"fix","ipa":"/fɪks/","kr":"**픽스**","mark":"*","pos":"동","mean":"① 고치다 ② 고정하다","ex":[{"en":"The technician **fixed** the broken printer.","ko":"그 기술자는 고장 난 프린터를 고쳤다."},{"en":"**Fix** the cable to the wall with a clip.","ko":"클립으로 케이블을 벽에 고정해라."}]},{"id":"vocab-1088","word":"flag","ipa":"/flæɡ/","kr":"**플래그**","mark":"**","pos":"명","mean":"깃발","ex":[{"en":"The **flag** waved in the wind.","ko":"깃발이 바람에 펄럭였다."}]},{"id":"vocab-1089","word":"flame","ipa":"/fleɪm/","kr":"**플레임**","mark":"**","pos":"명","mean":"① 불꽃 ② 화염","ex":[{"en":"The candle **flame** was small.","ko":"촛불의 불꽃은 작았다."},{"en":"The fire spread in a wall of **flame**.","ko":"불은 화염의 벽처럼 번졌다."}]},{"id":"vocab-1090","word":"flash","ipa":"/flæʃ/","kr":"**플래시**","mark":"**","pos":"명/동","mean":"① 섬광 ② 번쩍이다","ex":[{"en":"A **flash** of light appeared.","ko":"한 줄기 섬광이 나타났다."},{"en":"Lightning **flashed** across the sky.","ko":"번개가 하늘을 가로질러 번쩍였다."}]},{"id":"vocab-1091","word":"flat","ipa":"/flæt/","kr":"**플랫**","mark":"**","pos":"형","mean":"① 평평한 ② 납작한","ex":[{"en":"The road is **flat** and wide.","ko":"그 도로는 평평하고 넓다."},{"en":"The empty box folded **flat**.","ko":"빈 상자는 납작하게 접혔다."}]},{"id":"vocab-1092","word":"flavor / flavour","ipa":"/ˈfleɪvər/","kr":"**플레이**버","mark":"","pos":"명","mean":"① 맛 ② 풍미","ex":[{"en":"This ice cream has a rich **flavor**.","ko":"이 아이스크림은 풍부한 맛을 지녔다."},{"en":"Fresh herbs add **flavor** to the soup.","ko":"신선한 허브는 수프에 풍미를 더한다."}]},{"id":"vocab-1093","word":"flaw","ipa":"/flɔː/","kr":"**플로ː**","mark":"","pos":"명","mean":"① 결함 ② 흠","ex":[{"en":"The plan has one **flaw**.","ko":"그 계획에는 하나의 결함이 있다."},{"en":"There is a small **flaw** in the screen.","ko":"화면에 작은 흠이 있다."}]},{"id":"vocab-1094","word":"flee","ipa":"/fliː/","kr":"**플리ː**","mark":"","pos":"동","mean":"도망치다","ex":[{"en":"People **fled** the building after the alarm.","ko":"사람들은 경보 후에 건물에서 도망쳤다."}]},{"id":"vocab-1095","word":"flesh","ipa":"/fleʃ/","kr":"**플레시**","mark":"","pos":"명","mean":"① 살 ② 고기","ex":[{"en":"The thorn cut into his **flesh**.","ko":"가시가 그의 살을 찔렀다."},{"en":"The fish has firm white **flesh**.","ko":"그 생선은 단단한 흰 고기를 가지고 있다."}]},{"id":"vocab-1096","word":"flexible","ipa":"/ˈfleksəbl/","kr":"**플렉**서블","mark":"","pos":"형","mean":"① 유연한 ② 융통성 있는","ex":[{"en":"This material is strong and **flexible**.","ko":"이 재료는 튼튼하고 유연하다."},{"en":"The rules are **flexible**.","ko":"그 규칙은 융통성이 있다."}]},{"id":"vocab-1097","word":"flight","ipa":"/flaɪt/","kr":"**플라잇**","mark":"**","pos":"명","mean":"① 비행 ② 항공편","ex":[{"en":"The bird remained in **flight** for hours.","ko":"그 새는 몇 시간 동안 비행 상태를 유지했다."},{"en":"Our **flight** leaves at six.","ko":"우리 항공편은 6시에 출발한다."}]},{"id":"vocab-1098","word":"flip","ipa":"/flɪp/","kr":"**플립**","mark":"","pos":"동","mean":"① 뒤집다 ② 젖히다","ex":[{"en":"**Flip** the pancake carefully.","ko":"팬케이크를 조심스럽게 뒤집어라."},{"en":"**Flip** up the cover to open the box.","ko":"상자를 열려면 덮개를 위로 젖혀라."}]},{"id":"vocab-1099","word":"float","ipa":"/floʊt/","kr":"**플로트**","mark":"**","pos":"동","mean":"① 뜨다 ② 떠다니다","ex":[{"en":"Oil **floats** on water.","ko":"기름은 물 위에 뜬다."},{"en":"Small clouds **floated** across the sky.","ko":"작은 구름들이 하늘을 떠다녔다."}]},{"id":"vocab-1100","word":"flock","ipa":"/flɑːk/","kr":"**플락**","mark":"","pos":"명/동","mean":"① 무리 ② 떼 지어 가다","ex":[{"en":"A **flock** of sheep crossed the road.","ko":"양 무리가 길을 건넜다."},{"en":"A **flock** of birds flew overhead.","ko":"새 떼가 머리 위로 날아갔다."}]},{"id":"vocab-1101","word":"flood","ipa":"/flʌd/","kr":"**플러드**","mark":"**","pos":"명/동","mean":"① 홍수 ② 범람하다","ex":[{"en":"The **flood** destroyed the village.","ko":"그 홍수가 마을을 파괴했다."},{"en":"The river **flooded** after the heavy rain.","ko":"그 강은 폭우 후에 범람했다."}]},{"id":"vocab-1102","word":"floor","ipa":"/flɔːr/","kr":"**플로ː**","mark":"*","pos":"명","mean":"① 바닥 ② 층","ex":[{"en":"The books are on the **floor**.","ko":"책들이 바닥에 있다."},{"en":"My room is on the third **floor**.","ko":"내 방은 3층에 있다."}]},{"id":"vocab-1103","word":"flourish","ipa":"/ˈflɜːrɪʃ/","kr":"**플러ː**리시","mark":"","pos":"동","mean":"① 번성하다 ② 번창하다","ex":[{"en":"Small businesses can **flourish** online.","ko":"소규모 사업체는 온라인에서 번성할 수 있다."},{"en":"The business began to **flourish**.","ko":"그 사업은 번창하기 시작했다."}]},{"id":"vocab-1104","word":"flow","ipa":"/floʊ/","kr":"**플로**","mark":"**","pos":"동/명","mean":"① 흐르다 ② 흐름","ex":[{"en":"Traffic **flows** slowly during rush hour.","ko":"교통은 출퇴근 시간에 천천히 흐른다."},{"en":"The **flow** of information was slow.","ko":"정보의 흐름은 느렸다."}]},{"id":"vocab-1105","word":"flower","ipa":"/ˈflaʊər/","kr":"**플라우**어","mark":"*","pos":"명","mean":"꽃","ex":[{"en":"This **flower** smells sweet.","ko":"이 꽃은 향기로운 냄새가 난다."}]},{"id":"vocab-1106","word":"flush","ipa":"/flʌʃ/","kr":"**플러시**","mark":"","pos":"동","mean":"① 물을 내리다 ② 붉어지다","ex":[{"en":"Please **flush** the toilet.","ko":"변기 물을 내려 주세요."},{"en":"Her face **flushed** when everyone looked at her.","ko":"모두가 그녀를 보자 그녀의 얼굴이 붉어졌다."}]},{"id":"vocab-1107","word":"fly","ipa":"/flaɪ/","kr":"**플라이**","mark":"*","pos":"동/명","mean":"① 날다 ② 파리","ex":[{"en":"Birds can **fly** high.","ko":"새들은 높이 날 수 있다."},{"en":"A **fly** landed on the monitor.","ko":"파리 한 마리가 모니터에 앉았다."}]},{"id":"vocab-1108","word":"focus","ipa":"/ˈfoʊkəs/","kr":"**포**커스","mark":"*","pos":"명/동","mean":"① 초점 ② 집중하다","ex":[{"en":"The main **focus** of the meeting is security.","ko":"그 회의의 주된 초점은 보안이다."},{"en":"**Focus** on your work.","ko":"네 일에 집중해라."}]},{"id":"vocab-1109","word":"fog","ipa":"/fɔːɡ/","kr":"**포ː**그","mark":"**","pos":"명","mean":"안개","ex":[{"en":"Thick **fog** covered the road.","ko":"짙은 안개가 길을 덮었다."}]},{"id":"vocab-1110","word":"fold","ipa":"/foʊld/","kr":"**폴드**","mark":"**","pos":"동","mean":"접다","ex":[{"en":"**Fold** the paper in half.","ko":"그 종이를 반으로 접어라."}]},{"id":"vocab-1111","word":"folk","ipa":"/foʊk/","kr":"**포크**","mark":"**","pos":"명/형","mean":"① 사람들 ② 민속의","ex":[{"en":"The local **folk** welcomed the visitors.","ko":"지역 사람들이 방문객들을 맞이했다."},{"en":"We enjoyed **folk** music.","ko":"우리는 민속 음악을 즐겼다."}]},{"id":"vocab-1112","word":"follow","ipa":"/ˈfɑːloʊ/","kr":"**팔**로","mark":"**","pos":"동","mean":"① 따라가다 ② 따르다","ex":[{"en":"**Follow** me, please.","ko":"저를 따라오세요."},{"en":"**Follow** me to the classroom.","ko":"나를 따라 교실로 와라."}]},{"id":"vocab-1113","word":"fond","ipa":"/fɑːnd/","kr":"**판드**","mark":"","pos":"형","mean":"① 좋아하는 ② 애정 어린","ex":[{"en":"Emma is **fond** of animals.","ko":"엠마는 동물을 좋아한다."},{"en":"Minho gave the child a **fond** smile.","ko":"민호는 그 아이에게 애정 어린 미소를 지었다."}]},{"id":"vocab-1114","word":"food","ipa":"/fuːd/","kr":"**푸ː**드","mark":"*","pos":"명","mean":"음식","ex":[{"en":"We need enough **food** for the trip.","ko":"우리는 여행에 충분한 음식이 필요하다."}]},{"id":"vocab-1115","word":"fool","ipa":"/fuːl/","kr":"**풀ː**","mark":"*","pos":"명/동","mean":"① 바보 ② 속이다","ex":[{"en":"Don't be a **fool**.","ko":"바보가 되지 마라."},{"en":"Do not **fool** yourself.","ko":"자신을 속이지 마라."}]},{"id":"vocab-1116","word":"foot","ipa":"/fʊt/","kr":"**풋**","mark":"*","pos":"명","mean":"발","ex":[{"en":"My **foot** hurts.","ko":"내 발이 아프다."}]},{"id":"vocab-1117","word":"football","ipa":"/ˈfʊtbɔːl/","kr":"**풋**볼","mark":"*","pos":"명","mean":"① 축구 ② 미식축구","ex":[{"en":"They play **football** after school.","ko":"그들은 방과 후에 축구를 한다."},{"en":"They watched an American **football** game.","ko":"그들은 미식축구 경기를 봤다."}]},{"id":"vocab-1118","word":"for","ipa":"/fɔːr/","kr":"**포ː**","mark":"*","pos":"전","mean":"① ~을 위해 ② ~동안 ③ ~때문에","ex":[{"en":"This guide is **for** new employees.","ko":"이 안내서는 신입 직원을 위한 것이다."},{"en":"We waited **for** two hours.","ko":"우리는 두 시간 동안 기다렸다."},{"en":"Yuna was absent **for** health reasons.","ko":"유나는 건강상의 이유 때문에 결석했다."}]},{"id":"vocab-1119","word":"forbid","ipa":"/fərˈbɪd/","kr":"퍼**비드**","mark":"","pos":"동","mean":"금지하다","ex":[{"en":"The school **forbids** smoking.","ko":"학교는 흡연을 금지한다."}]},{"id":"vocab-1120","word":"force (enforce)","ipa":"/fɔːrs/","kr":"**포ː**스","mark":"**","pos":"명/동","mean":"① 힘 ② 강요하다","ex":[{"en":"They used **force** to open the door.","ko":"그들은 문을 열려고 힘을 썼다."},{"en":"No one should **force** an employee to agree.","ko":"누구도 직원에게 동의하도록 강요해서는 안 된다."}]},{"id":"vocab-1121","word":"forecast","ipa":"/ˈfɔːrkæst/","kr":"**포ː**캐스트","mark":"","pos":"명/동","mean":"① 예보 ② 예측하다","ex":[{"en":"The weather **forecast** says rain.","ko":"일기 예보는 비가 온다고 한다."},{"en":"Analysts **forecast** higher sales next month.","ko":"분석가들은 다음 달 판매 증가를 예측한다."}]},{"id":"vocab-1122","word":"forehead","ipa":"/ˈfɔːrhed/","kr":"**포ː**헤드","mark":"","pos":"명","mean":"이마","ex":[{"en":"Lina touched his **forehead**.","ko":"리나는 그의 이마를 만졌다."}]},{"id":"vocab-1123","word":"foreign","ipa":"/ˈfɔːrən/","kr":"**포ː**런","mark":"**","pos":"형","mean":"외국의","ex":[{"en":"Olivia speaks a **foreign** language.","ko":"올리비아는 외국어를 말한다."}]},{"id":"vocab-1124","word":"forest","ipa":"/ˈfɔːrɪst/","kr":"**포ː**리스트","mark":"*","pos":"명","mean":"숲","ex":[{"en":"Many animals live in the **forest**.","ko":"많은 동물이 숲에 산다."}]},{"id":"vocab-1125","word":"forever","ipa":"/fərˈevər/","kr":"퍼**레**버","mark":"**","pos":"부","mean":"영원히","ex":[{"en":"I will remember this day **forever**.","ko":"나는 이날을 영원히 기억할 것이다."}]},{"id":"vocab-1126","word":"forget","ipa":"/fərˈɡet/","kr":"퍼**겟**","mark":"*","pos":"동","mean":"잊다","ex":[{"en":"Don't **forget** your umbrella.","ko":"우산을 잊지 마라."}]},{"id":"vocab-1127","word":"forgive","ipa":"/fərˈɡɪv/","kr":"퍼**기브**","mark":"**","pos":"동","mean":"용서하다","ex":[{"en":"Please **forgive** my mistake.","ko":"내 실수를 용서해 주세요."}]},{"id":"vocab-1128","word":"fork","ipa":"/fɔːrk/","kr":"**포ː**크","mark":"*","pos":"명","mean":"포크","ex":[{"en":"Use a **fork** to eat the salad.","ko":"샐러드를 먹을 때 포크를 사용해라."}]},{"id":"vocab-1129","word":"form (formal, formation, informal)","ipa":"/fɔːrm/","kr":"**폼ː**","mark":"*","pos":"명/동","mean":"① 형태 ② 양식 ③ 형성하다","ex":[{"en":"The data appears in table **form**.","ko":"그 데이터는 표 형태로 나타난다."},{"en":"Fill out this **form**, please.","ko":"이 양식을 작성해 주세요."},{"en":"Water can **form** ice.","ko":"물은 얼음을 형성할 수 있다."}]},{"id":"vocab-1130","word":"format","ipa":"/ˈfɔːrmæt/","kr":"**포ː**맷","mark":"","pos":"명","mean":"① 형식 ② 서식","ex":[{"en":"Save the file in PDF **format**.","ko":"파일을 PDF 형식으로 저장해라."},{"en":"Please use the standard date **format**.","ko":"표준 날짜 서식을 사용해 주세요."}]},{"id":"vocab-1131","word":"former","ipa":"/ˈfɔːrmər/","kr":"**포ː**머","mark":"","pos":"형","mean":"① 이전의 ② 전자의","ex":[{"en":"A **former** manager returned as a consultant.","ko":"이전의 관리자가 컨설턴트로 돌아왔다."},{"en":"Of the two options, I prefer the **former**.","ko":"두 선택지 중 나는 전자를 선호한다."}]},{"id":"vocab-1132","word":"formula","ipa":"/ˈfɔːrmjələ/","kr":"**포ː**뮬러","mark":"","pos":"명","mean":"① 공식 ② 방식","ex":[{"en":"Use this **formula** to solve the problem.","ko":"이 공식을 사용해 문제를 풀어라."},{"en":"Clear communication is a **formula** for success.","ko":"명확한 의사소통은 성공의 방식이다."}]},{"id":"vocab-1133","word":"forth","ipa":"/fɔːrθ/","kr":"**포ː**쓰","mark":"**","pos":"부","mean":"① 앞으로 ② 밖으로","ex":[{"en":"The bird flew back and **forth**.","ko":"그 새는 앞뒤로 날아다녔다."},{"en":"The door opened and people came **forth**.","ko":"문이 열리고 사람들이 밖으로 나왔다."}]},{"id":"vocab-1134","word":"fortunate","ipa":"/ˈfɔːrtʃənət/","kr":"**포ː**처닛","mark":"**","pos":"형","mean":"① 운이 좋은 ② 다행인","ex":[{"en":"We were **fortunate** to find shelter.","ko":"우리는 운 좋게 피할 곳을 찾았다."},{"en":"It was **fortunate** that no data was lost.","ko":"자료가 손실되지 않은 것은 다행이었다."}]},{"id":"vocab-1135","word":"fortune","ipa":"/ˈfɔːrtʃən/","kr":"**포ː**천","mark":"**","pos":"명","mean":"① 행운 ② 재산","ex":[{"en":"Good **fortune** helped the small business.","ko":"행운이 그 소규모 사업체를 도왔다."},{"en":"Minho spent most of his **fortune**.","ko":"민호는 재산의 대부분을 썼다."}]},{"id":"vocab-1136","word":"forward","ipa":"/ˈfɔːrwərd/","kr":"**포ː**워드","mark":"**","pos":"부","mean":"앞으로","ex":[{"en":"Please step **forward**.","ko":"앞으로 나와 주세요."}]},{"id":"vocab-1137","word":"foster","ipa":"/ˈfɔːstər/","kr":"**포ː**스터","mark":"","pos":"동","mean":"① 조성하다 ② 기르다","ex":[{"en":"The workshop **fosters** a culture of cooperation.","ko":"그 워크숍은 협력 문화를 조성한다."},{"en":"Managers should **foster** young talent.","ko":"관리자들은 젊은 인재를 길러야 한다."}]},{"id":"vocab-1138","word":"found (foundation)","ipa":"/faʊnd/","kr":"**파운드**","mark":"**","pos":"동","mean":"설립하다","ex":[{"en":"They **founded** the club last year.","ko":"그들은 작년에 그 동아리를 설립했다."}]},{"id":"vocab-1139","word":"fountain","ipa":"/ˈfaʊntn/","kr":"**파운**튼","mark":"","pos":"명","mean":"① 분수 ② 샘","ex":[{"en":"Children played near the **fountain**.","ko":"아이들이 분수 근처에서 놀았다."},{"en":"The village grew around a natural **fountain**.","ko":"그 마을은 천연 샘 주위로 성장했다."}]},{"id":"vocab-1140","word":"four","ipa":"/fɔːr/","kr":"**포ː**","mark":"*","pos":"명/형","mean":"① 넷 ② 4","ex":[{"en":"**Four** people joined the call.","ko":"네 명이 통화에 참여했다."},{"en":"The number **four** appears twice in the code.","ko":"숫자 4가 그 코드에 두 번 나타난다."}]},{"id":"vocab-1141","word":"fox","ipa":"/fɑːks/","kr":"**팍스**","mark":"*","pos":"명","mean":"여우","ex":[{"en":"A **fox** ran across the field.","ko":"여우 한 마리가 들판을 가로질러 달렸다."}]},{"id":"vocab-1142","word":"fraction","ipa":"/ˈfrækʃn/","kr":"**프랙**션","mark":"","pos":"명","mean":"① 분수 ② 일부","ex":[{"en":"One half is a common **fraction**.","ko":"2분의 1은 흔한 분수다."},{"en":"Only a small **fraction** agreed.","ko":"아주 적은 일부만 동의했다."}]},{"id":"vocab-1143","word":"frame","ipa":"/freɪm/","kr":"**프레임**","mark":"**","pos":"명","mean":"① 틀 ② 액자","ex":[{"en":"The door **frame** needs repair.","ko":"문틀은 수리가 필요하다."},{"en":"Sora put the photo in a **frame**.","ko":"소라는 사진을 액자에 넣었다."}]},{"id":"vocab-1144","word":"framework","ipa":"/ˈfreɪmwɜːrk/","kr":"**프레임**워크","mark":"","pos":"명","mean":"① 뼈대 ② 틀","ex":[{"en":"The steel **framework** supports the building.","ko":"강철 뼈대가 그 건물을 지탱한다."},{"en":"The plan gives us a **framework**.","ko":"그 계획은 우리에게 틀을 제공한다."}]},{"id":"vocab-1145","word":"frankly","ipa":"/ˈfræŋkli/","kr":"**프랭**클리","mark":"**","pos":"부","mean":"솔직히","ex":[{"en":"**Frankly**, I do not agree.","ko":"솔직히 나는 동의하지 않는다."}]},{"id":"vocab-1146","word":"free","ipa":"/friː/","kr":"**프리ː**","mark":"*","pos":"형","mean":"① 자유로운 ② 무료의","ex":[{"en":"Employees are **free** to choose either option.","ko":"직원들은 어느 선택지든 고를 자유가 있다."},{"en":"The museum is **free** today.","ko":"그 박물관은 오늘 무료다."}]},{"id":"vocab-1147","word":"freeze","ipa":"/friːz/","kr":"**프리ː**즈","mark":"**","pos":"동","mean":"① 얼다 ② 얼리다","ex":[{"en":"The lake **freezes** in winter.","ko":"그 호수는 겨울에 언다."},{"en":"**Freeze** the food before shipping it.","ko":"배송 전에 음식을 얼려라."}]},{"id":"vocab-1148","word":"frequent","ipa":"/ˈfriːkwənt/","kr":"**프리ː**퀀트","mark":"","pos":"형","mean":"① 잦은 ② 빈번한","ex":[{"en":"**Frequent** practice improves your skill.","ko":"잦은 연습은 실력을 향상시킨다."},{"en":"**Frequent** system checks prevent errors.","ko":"빈번한 시스템 점검은 오류를 막는다."}]},{"id":"vocab-1149","word":"fresh","ipa":"/freʃ/","kr":"**프레시**","mark":"*","pos":"형","mean":"신선한","ex":[{"en":"We bought **fresh** bread.","ko":"우리는 신선한 빵을 샀다."}]},{"id":"vocab-1150","word":"friend (friendship)","ipa":"/frend/","kr":"**프렌드**","mark":"*","pos":"명","mean":"친구","ex":[{"en":"Sora is my best **friend**.","ko":"소라는 나의 가장 친한 친구다."}]},{"id":"vocab-1151","word":"fright","ipa":"/fraɪt/","kr":"**프라잇**","mark":"**","pos":"명","mean":"① 놀람 ② 두려움","ex":[{"en":"The sudden alarm gave everyone a **fright**.","ko":"갑작스러운 경보는 모두를 놀라게 했다."},{"en":"One child shook with **fright**.","ko":"한 아이는 두려움으로 떨었다."}]},{"id":"vocab-1152","word":"frog","ipa":"/frɔːɡ/","kr":"**프로ː**그","mark":"**","pos":"명","mean":"개구리","ex":[{"en":"A **frog** jumped into the pond.","ko":"개구리 한 마리가 연못으로 뛰어들었다."}]},{"id":"vocab-1153","word":"from","ipa":"/frʌm/","kr":"**프럼**","mark":"*","pos":"전","mean":"① ~로부터 ② ~에서","ex":[{"en":"This message came **from** the HR team.","ko":"이 메시지는 HR팀으로부터 왔다."},{"en":"Grace came **from** Busan.","ko":"그레이스는 부산에서 왔다."}]},{"id":"vocab-1154","word":"front","ipa":"/frʌnt/","kr":"**프런트**","mark":"*","pos":"명/형","mean":"① 앞 ② 앞쪽의","ex":[{"en":"Wait in **front** of the school.","ko":"학교 앞에서 기다려라."},{"en":"Sit in the **front**.","ko":"앞쪽에 앉아라."}]},{"id":"vocab-1155","word":"frost","ipa":"/frɔːst/","kr":"**프로ː**스트","mark":"","pos":"명","mean":"서리","ex":[{"en":"**Frost** covered the ground.","ko":"서리가 땅을 덮었다."}]},{"id":"vocab-1156","word":"frown","ipa":"/fraʊn/","kr":"**프라운**","mark":"","pos":"동/명","mean":"① 얼굴을 찌푸리다 ② 찡그림","ex":[{"en":"She **frowned** at the bad news.","ko":"그녀는 나쁜 소식에 얼굴을 찌푸렸다."},{"en":"A deep **frown** appeared on his face.","ko":"그의 얼굴에 깊은 찡그림이 나타났다."}]},{"id":"vocab-1157","word":"fruit","ipa":"/fruːt/","kr":"**프루ː**트","mark":"*","pos":"명","mean":"과일","ex":[{"en":"Eat plenty of fresh **fruit**.","ko":"신선한 과일을 충분히 먹어라."}]},{"id":"vocab-1158","word":"frustrate","ipa":"/ˈfrʌstreɪt/","kr":"**프러**스트레이트","mark":"**","pos":"동","mean":"좌절시키다","ex":[{"en":"The delay **frustrated** the passengers.","ko":"그 지연은 승객들을 좌절시켰다."}]},{"id":"vocab-1159","word":"fry","ipa":"/fraɪ/","kr":"**프라이**","mark":"**","pos":"동","mean":"① 튀기다 ② 볶다","ex":[{"en":"**Fry** the potatoes in hot oil.","ko":"감자를 뜨거운 기름에 튀겨라."},{"en":"**Fry** the onions in a little oil until soft.","ko":"양파가 부드러워질 때까지 기름을 조금 두르고 볶으세요."}]},{"id":"vocab-1160","word":"fuel","ipa":"/ˈfjuːəl/","kr":"**퓨ː**얼","mark":"","pos":"명/동","mean":"① 연료 ② 연료를 공급하다","ex":[{"en":"The car ran out of **fuel**.","ko":"그 차는 연료가 떨어졌다."},{"en":"They **fueled** the truck before the trip.","ko":"그들은 출장 전에 트럭에 연료를 공급했다."}]},{"id":"vocab-1161","word":"fulfil","ipa":"/fʊlˈfɪl/","kr":"풀**필**","mark":"","pos":"동","mean":"① 이행하다 ② 성취하다","ex":[{"en":"She **fulfilled** her promise.","ko":"그녀는 약속을 이행했다."},{"en":"She **fulfilled** her goal of becoming a doctor.","ko":"그녀는 의사가 되려는 목표를 성취했다."}]},{"id":"vocab-1162","word":"full","ipa":"/fʊl/","kr":"**풀**","mark":"*","pos":"형","mean":"① 가득 찬 ② 배부른","ex":[{"en":"The bus is **full** of people.","ko":"버스는 사람들로 가득 차 있다."},{"en":"I am **full** after lunch.","ko":"나는 점심 후에 배부르다."}]},{"id":"vocab-1163","word":"fun","ipa":"/fʌn/","kr":"**펀**","mark":"*","pos":"명/형","mean":"① 재미 ② 즐거운","ex":[{"en":"We had a lot of **fun**.","ko":"우리는 아주 재미있었다."},{"en":"We had **fun** at the beach.","ko":"우리는 해변에서 즐거운 시간을 보냈다."}]},{"id":"vocab-1164","word":"function","ipa":"/ˈfʌŋkʃn/","kr":"**펑**션","mark":"**","pos":"명/동","mean":"① 기능 ② 작동하다","ex":[{"en":"The main **function** of the heart is to pump blood.","ko":"심장의 주된 기능은 피를 내보내는 것이다."},{"en":"The backup system **functions** well.","ko":"백업 시스템은 잘 작동한다."}]},{"id":"vocab-1165","word":"fund","ipa":"/fʌnd/","kr":"**펀드**","mark":"**","pos":"명/동","mean":"① 기금 ② 자금을 대다","ex":[{"en":"They raised a **fund** for the school.","ko":"그들은 학교를 위한 기금을 모았다."},{"en":"The city **funded** the new library.","ko":"시는 새 도서관에 자금을 댔다."}]},{"id":"vocab-1166","word":"fundamental","ipa":"/ˌfʌndəˈmentl/","kr":"펀더**멘**틀","mark":"","pos":"형","mean":"① 근본적인 ② 기본적인","ex":[{"en":"Clean water is a **fundamental** need.","ko":"깨끗한 물은 근본적인 필요다."},{"en":"Safety is a **fundamental** rule in this lab.","ko":"안전은 이 실험실의 기본 규칙이다."}]},{"id":"vocab-1167","word":"funeral","ipa":"/ˈfjuːnərəl/","kr":"**퓨ː**너럴","mark":"","pos":"명","mean":"장례식","ex":[{"en":"Many people attended the **funeral**.","ko":"많은 사람들이 장례식에 참석했다."}]},{"id":"vocab-1168","word":"fur","ipa":"/fɜːr/","kr":"**퍼ː**","mark":"**","pos":"명","mean":"① 털 ② 모피","ex":[{"en":"The cat has soft **fur**.","ko":"그 고양이는 부드러운 털을 지녔다."},{"en":"The coat is made of fake **fur**.","ko":"그 외투는 인조 모피로 만들어졌다."}]},{"id":"vocab-1169","word":"furnish","ipa":"/ˈfɜːrnɪʃ/","kr":"**퍼ː**니시","mark":"","pos":"동","mean":"① 비치하다 ② 가구를 들이다","ex":[{"en":"The office is **furnished** with new desks.","ko":"그 사무실에는 새 책상들이 비치되어 있다."},{"en":"They **furnished** the new house.","ko":"그들은 새 집에 가구를 들였다."}]},{"id":"vocab-1170","word":"furniture","ipa":"/ˈfɜːrnɪtʃər/","kr":"**퍼ː**니처","mark":"**","pos":"명","mean":"가구","ex":[{"en":"We bought new **furniture** for the house.","ko":"우리는 집에 놓을 새 가구를 샀다."}]},{"id":"vocab-1171","word":"furthermore","ipa":"/ˌfɜːrðərˈmɔːr/","kr":"퍼더**모ː**","mark":"","pos":"부","mean":"① 게다가 ② 더욱이","ex":[{"en":"The plan is simple and, **furthermore**, cheap.","ko":"그 계획은 간단하고 게다가 저렴하다."},{"en":"**Furthermore**, the new plan saves time.","ko":"더욱이 새 계획은 시간을 절약한다."}]},{"id":"vocab-1172","word":"fury (furious)","ipa":"/ˈfjʊri/","kr":"**퓨**리","mark":"","pos":"명","mean":"① 분노 ② 격노","ex":[{"en":"Jun shook with **fury**.","ko":"준은 분노로 떨었다."},{"en":"Jun reacted with **fury** when he heard the accusation.","ko":"준은 그 비난을 듣고 격노로 반응했다."}]},{"id":"vocab-1173","word":"fuse","ipa":"/fjuːz/","kr":"**퓨ː**즈","mark":"","pos":"명/동","mean":"① 퓨즈 ② 융합하다","ex":[{"en":"The **fuse** protects the machine.","ko":"퓨즈는 기계를 보호한다."},{"en":"The artist **fused** metal and glass together.","ko":"그 예술가는 금속과 유리를 함께 융합했다."}]},{"id":"vocab-1174","word":"future","ipa":"/ˈfjuːtʃər/","kr":"**퓨ː**처","mark":"*","pos":"명/형","mean":"① 미래 ② 미래의","ex":[{"en":"We hope for a bright **future**.","ko":"우리는 밝은 미래를 바란다."},{"en":"**Future** updates will be automatic.","ko":"미래의 업데이트는 자동일 것이다."}]},{"id":"vocab-1175","word":"gain","ipa":"/ɡeɪn/","kr":"**게인**","mark":"**","pos":"동/명","mean":"① 얻다 ② 이득","ex":[{"en":"She **gained** confidence through practice.","ko":"그녀는 연습을 통해 자신감을 얻었다."},{"en":"The change brought a clear financial **gain**.","ko":"그 변화는 분명한 재정적 이득을 가져왔다."}]},{"id":"vocab-1176","word":"gallery","ipa":"/ˈɡæləri/","kr":"**갤**러리","mark":"","pos":"명","mean":"① 미술관 ② 화랑","ex":[{"en":"We visited an art **gallery**.","ko":"우리는 미술관을 방문했다."},{"en":"The **gallery** sells local art.","ko":"그 화랑은 지역 미술품을 판다."}]},{"id":"vocab-1177","word":"gamble","ipa":"/ˈɡæmbl/","kr":"**갬**블","mark":"","pos":"동/명","mean":"① 도박하다 ② 도박","ex":[{"en":"He **gambled** online and lost money.","ko":"그는 온라인으로 도박해서 돈을 잃었다."},{"en":"Ethan lost money in a **gamble**.","ko":"이선은 도박으로 돈을 잃었다."}]},{"id":"vocab-1178","word":"game","ipa":"/ɡeɪm/","kr":"**게임**","mark":"*","pos":"명","mean":"① 게임 ② 경기","ex":[{"en":"We played a board **game**.","ko":"우리는 보드게임을 했다."},{"en":"The **game** starts at seven.","ko":"그 경기는 7시에 시작한다."}]},{"id":"vocab-1179","word":"gang","ipa":"/ɡæŋ/","kr":"**갱**","mark":"","pos":"명","mean":"① 갱단 ② 무리","ex":[{"en":"The police arrested the **gang**.","ko":"경찰이 그 갱단을 체포했다."},{"en":"A **gang** of children ran past us.","ko":"아이들 무리가 우리 곁을 뛰어갔다."}]},{"id":"vocab-1180","word":"gap","ipa":"/ɡæp/","kr":"**갭**","mark":"","pos":"명","mean":"① 틈 ② 격차","ex":[{"en":"There is a small **gap** under the door.","ko":"문 아래에 작은 틈이 있다."},{"en":"There is a large pay **gap** between the two roles.","ko":"두 역할 사이에는 큰 임금 격차가 있다."}]},{"id":"vocab-1181","word":"garage","ipa":"/ɡəˈrɑːʒ/","kr":"거**라ː**지","mark":"**","pos":"명","mean":"① 차고 ② 정비소","ex":[{"en":"The car is in the **garage**.","ko":"그 차는 차고에 있다."},{"en":"The car is at the **garage** for repairs.","ko":"그 차는 수리를 위해 정비소에 있다."}]},{"id":"vocab-1182","word":"garden","ipa":"/ˈɡɑːrdn/","kr":"**가ː**든","mark":"*","pos":"명","mean":"정원","ex":[{"en":"Flowers bloom in the **garden**.","ko":"정원에 꽃이 핀다."}]},{"id":"vocab-1183","word":"gas","ipa":"/ɡæs/","kr":"**개스**","mark":"*","pos":"명","mean":"① 기체 ② 가스","ex":[{"en":"The balloon is full of **gas**.","ko":"그 풍선은 기체로 가득하다."},{"en":"The stove uses natural **gas**.","ko":"그 난로는 천연가스를 사용한다."}]},{"id":"vocab-1184","word":"gasoline / petrol","ipa":"/ˈɡæsəliːn/","kr":"**개**설린","mark":"","pos":"명","mean":"휘발유","ex":[{"en":"Our car stopped when it ran out of **gasoline**.","ko":"우리 차는 휘발유가 떨어지자 멈췄다."}]},{"id":"vocab-1185","word":"gate","ipa":"/ɡeɪt/","kr":"**게잇**","mark":"**","pos":"명","mean":"① 문 ② 대문","ex":[{"en":"Meet me at the school **gate**.","ko":"학교 정문에서 나를 만나자."},{"en":"Close the **gate**, please.","ko":"대문을 닫아 주세요."}]},{"id":"vocab-1186","word":"gather","ipa":"/ˈɡæðər/","kr":"**개**더","mark":"**","pos":"동","mean":"① 모으다 ② 모이다","ex":[{"en":"Could you **gather** the signed forms?","ko":"서명된 양식들을 모아 주실 수 있나요?"},{"en":"We **gathered** around the table.","ko":"우리는 탁자 둘레에 모였다."}]},{"id":"vocab-1187","word":"gaze","ipa":"/ɡeɪz/","kr":"**게이즈**","mark":"","pos":"동/명","mean":"① 응시하다 ② 응시","ex":[{"en":"She **gazed** at the stars.","ko":"그녀는 별을 응시했다."},{"en":"Her **gaze** stayed on the screen.","ko":"그녀의 응시는 화면에 머물렀다."}]},{"id":"vocab-1188","word":"gear","ipa":"/ɡɪr/","kr":"**기어**","mark":"**","pos":"명","mean":"① 기어 ② 장비","ex":[{"en":"Ryan changed the **gear**.","ko":"라이언은 기어를 바꿨다."},{"en":"Wear the right safety **gear**.","ko":"알맞은 안전 장비를 착용해라."}]},{"id":"vocab-1189","word":"gender","ipa":"/ˈdʒendər/","kr":"**젠**더","mark":"","pos":"명","mean":"성별","ex":[{"en":"The form asks for your **gender**.","ko":"그 양식은 네 성별을 묻는다."}]},{"id":"vocab-1190","word":"gene (genetic)","ipa":"/dʒiːn/","kr":"**진ː**","mark":"","pos":"명","mean":"유전자","ex":[{"en":"**Genes** carry information from parents.","ko":"유전자는 부모에게서 정보를 전달한다."}]},{"id":"vocab-1191","word":"general","ipa":"/ˈdʒenrəl/","kr":"**제**너럴","mark":"**","pos":"형/명","mean":"① 일반적인 ② 장군","ex":[{"en":"This is a **general** rule.","ko":"이것은 일반적인 규칙이다."},{"en":"The **general** inspected the troops.","ko":"그 장군은 부대를 점검했다."}]},{"id":"vocab-1192","word":"generate (generation)","ipa":"/ˈdʒenəreɪt/","kr":"**제**너레이트","mark":"","pos":"동","mean":"① 발생시키다 ② 만들어내다","ex":[{"en":"The update **generated** several new errors.","ko":"그 업데이트는 새 오류 몇 개를 발생시켰다."},{"en":"The tool **generates** a daily report.","ko":"그 도구는 일일 보고서를 만들어낸다."}]},{"id":"vocab-1193","word":"generous","ipa":"/ˈdʒenərəs/","kr":"**제**너러스","mark":"","pos":"형","mean":"① 관대한 ② 후한","ex":[{"en":"This manager was **generous** when judging the mistake.","ko":"이 관리자는 그 실수를 판단할 때 관대했다."},{"en":"The business gave employees a **generous** bonus.","ko":"그 사업체는 직원들에게 후한 보너스를 주었다."}]},{"id":"vocab-1194","word":"genius","ipa":"/ˈdʒiːniəs/","kr":"**지ː**니어스","mark":"","pos":"명","mean":"천재","ex":[{"en":"Mozart was a musical **genius**.","ko":"모차르트는 음악 천재였다."}]},{"id":"vocab-1195","word":"gentle","ipa":"/ˈdʒentl/","kr":"**젠**틀","mark":"**","pos":"형","mean":"① 온화한 ② 부드러운","ex":[{"en":"Daniel has a **gentle** nature.","ko":"다니엘은 온화한 성격을 가지고 있다."},{
