narrow","ipa":"/ˈnæroʊ/","kr":"**내**로","mark":"**","pos":"형","mean":"좁은","ex":[{"en":"We walked along a **narrow** path.","ko":"우리는 좁은 길을 따라 걸었다."}]},{"id":"vocab-1754","word":"nasty","ipa":"/ˈnæsti/","kr":"**내**스티","mark":"","pos":"형","mean":"① 불쾌한 ② 못된","ex":[{"en":"Leo made a **nasty** remark.","ko":"레오는 불쾌한 말을 했다."},{"en":"The bully made a **nasty** comment.","ko":"그 괴롭히는 사람은 못된 말을 했다."}]},{"id":"vocab-1755","word":"nation (international)","ipa":"/ˈneɪʃn/","kr":"**네이**션","mark":"*","pos":"명","mean":"① 국가 ② 나라","ex":[{"en":"The whole **nation** celebrated the victory.","ko":"온 국민이 승리를 축하했다."},{"en":"Korea is a peaceful **nation**.","ko":"한국은 평화로운 나라다."}]},{"id":"vocab-1756","word":"native","ipa":"/ˈneɪtɪv/","kr":"**네이**티브","mark":"**","pos":"형/명","mean":"① 태어난 곳의 ② 원주민","ex":[{"en":"Emma returned to her **native** town.","ko":"엠마는 태어난 곳의 도시로 돌아왔다."},{"en":"The island's **natives** welcomed us.","ko":"그 섬의 원주민들이 우리를 맞이했다."}]},{"id":"vocab-1757","word":"nature","ipa":"/ˈneɪtʃər/","kr":"**네이**처","mark":"*","pos":"명","mean":"① 자연 ② 본성","ex":[{"en":"We should protect **nature**.","ko":"우리는 자연을 보호해야 한다."},{"en":"It is human **nature** to seek safety.","ko":"안전을 찾는 것은 인간의 본성이다."}]},{"id":"vocab-1758","word":"navy","ipa":"/ˈneɪvi/","kr":"**네이**비","mark":"**","pos":"명","mean":"해군","ex":[{"en":"Ryan served in the **navy**.","ko":"라이언은 해군에서 복무했다."}]},{"id":"vocab-1759","word":"near","ipa":"/nɪr/","kr":"**니어**","mark":"*","pos":"전/형","mean":"① 가까이 ② 가까운","ex":[{"en":"The store is **near** my house.","ko":"그 가게는 우리 집 가까이에 있다."},{"en":"The main office is **near** the station.","ko":"본사 사무실은 역에 가깝다."}]},{"id":"vocab-1760","word":"neat","ipa":"/niːt/","kr":"**니ː**트","mark":"**","pos":"형","mean":"① 깔끔한 ② 정돈된","ex":[{"en":"Keep your desk **neat**.","ko":"책상을 깔끔하게 유지해라."},{"en":"Keep the storage room **neat**.","ko":"창고를 정돈된 상태로 유지해라."}]},{"id":"vocab-1761","word":"necessary","ipa":"/ˈnesəseri/","kr":"**네**서세리","mark":"**","pos":"형","mean":"① 필요한 ② 필수의","ex":[{"en":"A password is **necessary** for access.","ko":"접근에는 비밀번호가 필요하다."},{"en":"Clean water is **necessary** for life.","ko":"깨끗한 물은 생명에 필수적이다."}]},{"id":"vocab-1762","word":"neck","ipa":"/nek/","kr":"**넥**","mark":"*","pos":"명","mean":"목","ex":[{"en":"Sora wore a scarf around her **neck**.","ko":"소라는 목에 스카프를 둘렀다."}]},{"id":"vocab-1763","word":"need","ipa":"/niːd/","kr":"**니ː**드","mark":"*","pos":"동/명","mean":"① 필요하다 ② 필요","ex":[{"en":"We **need** more time.","ko":"우리는 시간이 더 필요하다."},{"en":"I **need** your help with this form.","ko":"이 양식에 관해 네 도움이 필요하다."}]},{"id":"vocab-1764","word":"needle","ipa":"/ˈniːdl/","kr":"**니ː**들","mark":"","pos":"명","mean":"바늘","ex":[{"en":"Thread the **needle** carefully.","ko":"바늘에 실을 조심히 꿰라."}]},{"id":"vocab-1765","word":"negate (negative)","ipa":"/nɪˈɡeɪt/","kr":"니**게잇**","mark":"","pos":"동","mean":"① 부정하다 ② 무효화하다","ex":[{"en":"The new evidence does not **negate** his claim.","ko":"새 증거는 그의 주장을 부정하지 않는다."},{"en":"His error **negated** the result.","ko":"그의 실수가 결과를 무효화했다."}]},{"id":"vocab-1766","word":"neglect","ipa":"/nɪˈɡlekt/","kr":"니**글렉트**","mark":"","pos":"동/명","mean":"① 방치하다 ② 소홀히 함","ex":[{"en":"Do not **neglect** small security issues.","ko":"작은 보안 문제를 방치하지 마라."},{"en":"Don't **neglect** your health.","ko":"네 건강을 소홀히 하지 마라."}]},{"id":"vocab-1767","word":"negotiate","ipa":"/nɪˈɡoʊʃieɪt/","kr":"니**고**시에이트","mark":"","pos":"동","mean":"협상하다","ex":[{"en":"The two sides **negotiated** a peace agreement.","ko":"양측은 평화 협정을 협상했다."}]},{"id":"vocab-1768","word":"neighbor / neighbour","ipa":"/ˈneɪbər/","kr":"**네이**버","mark":"**","pos":"명","mean":"이웃","ex":[{"en":"Our **neighbor** has a friendly dog.","ko":"우리 이웃에게는 친절한 개가 있다."}]},{"id":"vocab-1769","word":"neither","ipa":"/ˈniːðər/","kr":"**니ː**더","mark":"**","pos":"형/대/접","mean":"어느 쪽도 아닌","ex":[{"en":"**Neither** answer is correct.","ko":"어느 답도 맞지 않다."}]},{"id":"vocab-1770","word":"nephew","ipa":"/ˈnefjuː/","kr":"**네**퓨","mark":"","pos":"명","mean":"조카 (남자)","ex":[{"en":"My **nephew** is five years old.","ko":"내 조카는 다섯 살이다."}]},{"id":"vocab-1771","word":"nerve (nervous)","ipa":"/nɜːrv/","kr":"**너ː**브","mark":"**","pos":"명","mean":"① 신경 ② 용기","ex":[{"en":"The tooth has a damaged **nerve**.","ko":"그 치아의 신경이 손상되었다."},{"en":"Lina had the **nerve** to ask for a raise.","ko":"리나는 임금 인상을 요구할 용기가 있었다."}]},{"id":"vocab-1772","word":"nest","ipa":"/nest/","kr":"**네스트**","mark":"**","pos":"명","mean":"둥지","ex":[{"en":"The birds built a **nest** in the tree.","ko":"새들은 나무에 둥지를 지었다."}]},{"id":"vocab-1773","word":"net","ipa":"/net/","kr":"**넷**","mark":"**","pos":"명","mean":"① 그물 ② 망","ex":[{"en":"The fisherman threw his **net** into the sea.","ko":"어부는 바다에 그물을 던졌다."},{"en":"The safety **net** is made of strong mesh.","ko":"그 안전망은 튼튼한 망으로 만들어졌다."}]},{"id":"vocab-1774","word":"network","ipa":"/ˈnetwɜːrk/","kr":"**넷**워크","mark":"","pos":"명","mean":"① 망 ② 네트워크","ex":[{"en":"The city has a bus **network**.","ko":"그 도시는 버스망을 갖추고 있다."},{"en":"The computers are connected to a **network**.","ko":"컴퓨터들은 하나의 네트워크에 연결되어 있다."}]},{"id":"vocab-1775","word":"neutral","ipa":"/ˈnuːtrəl/","kr":"**누ː**트럴","mark":"","pos":"형","mean":"중립의","ex":[{"en":"The country remained **neutral** in the war.","ko":"그 나라는 전쟁에서 중립을 지켰다."}]},{"id":"vocab-1776","word":"never","ipa":"/ˈnevər/","kr":"**네**버","mark":"*","pos":"부","mean":"결코 ~않다","ex":[{"en":"I **never** lie.","ko":"나는 결코 거짓말하지 않는다."}]},{"id":"vocab-1777","word":"nevertheless","ipa":"/ˌnevərðəˈles/","kr":"네버덜**레스**","mark":"","pos":"부","mean":"그럼에도 불구하고","ex":[{"en":"It was raining; **nevertheless**, we went out.","ko":"비가 왔지만 그럼에도 우리는 밖에 나갔다."}]},{"id":"vocab-1778","word":"new","ipa":"/nuː/","kr":"**뉴ː**","mark":"*","pos":"형","mean":"새로운","ex":[{"en":"I bought a **new** phone.","ko":"나는 새 전화기를 샀다."}]},{"id":"vocab-1779","word":"news","ipa":"/nuːz/","kr":"**뉴ː**즈","mark":"*","pos":"명","mean":"① 뉴스 ② 소식","ex":[{"en":"I watch the **news** at night.","ko":"나는 밤에 뉴스를 본다."},{"en":"I have good **news** for you.","ko":"너에게 좋은 소식이 있다."}]},{"id":"vocab-1780","word":"newspaper","ipa":"/ˈnuːzpeɪpər/","kr":"**뉴ː**즈페이퍼","mark":"*","pos":"명","mean":"신문","ex":[{"en":"My father reads the **newspaper** every morning.","ko":"우리 아버지는 매일 아침 신문을 읽으신다."}]},{"id":"vocab-1781","word":"next","ipa":"/nekst/","kr":"**넥스트**","mark":"*","pos":"형/부","mean":"① 다음의 ② 다음에","ex":[{"en":"The **next** meeting is on Monday.","ko":"다음 회의는 월요일이다."},{"en":"See you **next** week.","ko":"다음 주에 보자."}]},{"id":"vocab-1782","word":"nice","ipa":"/naɪs/","kr":"**나이스**","mark":"*","pos":"형","mean":"① 좋은 ② 멋진","ex":[{"en":"Have a **nice** day.","ko":"좋은 하루 보내라."},{"en":"That is a **nice** design.","ko":"그것은 멋진 디자인이다."}]},{"id":"vocab-1783","word":"night","ipa":"/naɪt/","kr":"**나잇**","mark":"*","pos":"명","mean":"밤","ex":[{"en":"The stars shine at **night**.","ko":"별은 밤에 빛난다."}]},{"id":"vocab-1784","word":"nightmare","ipa":"/ˈnaɪtmer/","kr":"**나잇**메어","mark":"","pos":"명","mean":"악몽","ex":[{"en":"I had a terrible **nightmare**.","ko":"나는 끔찍한 악몽을 꾸었다."}]},{"id":"vocab-1785","word":"nine","ipa":"/naɪn/","kr":"**나인**","mark":"*","pos":"명/형","mean":"① 아홉 ② 9","ex":[{"en":"There are **nine** players.","ko":"아홉 명의 선수가 있다."},{"en":"**Nine** is written as 9.","ko":"아홉은 9로 쓴다."}]},{"id":"vocab-1786","word":"no / nope / nay","ipa":"/noʊ/","kr":"**노**","mark":"*","pos":"감/형","mean":"① 아니요 ② 조금도 없는","ex":[{"en":"**No**, thank you.","ko":"아니요, 괜찮습니다."},{"en":"There is **no** milk left.","ko":"남은 우유가 없다."}]},{"id":"vocab-1787","word":"noble","ipa":"/ˈnoʊbl/","kr":"**노**블","mark":"","pos":"형","mean":"① 고귀한 ② 숭고한","ex":[{"en":"Helping others is a **noble** act.","ko":"다른 사람을 돕는 것은 고귀한 행동이다."},{"en":"Protecting the weak is a **noble** goal.","ko":"약자를 보호하는 것은 숭고한 목표다."}]},{"id":"vocab-1788","word":"nod","ipa":"/nɑːd/","kr":"**낫**","mark":"","pos":"동/명","mean":"① 끄덕이다 ② 끄덕임","ex":[{"en":"She **nodded** in agreement.","ko":"그녀는 동의하며 고개를 끄덕였다."},{"en":"A quick **nod** showed her agreement.","ko":"빠른 끄덕임은 그녀의 동의를 나타냈다."}]},{"id":"vocab-1789","word":"noise","ipa":"/nɔɪz/","kr":"**노이즈**","mark":"**","pos":"명","mean":"소음","ex":[{"en":"The **noise** woke the baby.","ko":"그 소음이 아기를 깨웠다."}]},{"id":"vocab-1790","word":"nominate","ipa":"/ˈnɑːmɪneɪt/","kr":"**나**미네이트","mark":"","pos":"동","mean":"① 지명하다 ② 후보로 추천하다","ex":[{"en":"The board **nominated** her for the award.","ko":"이사회는 그녀를 상 후보로 지명했다."},{"en":"The project manager **nominated** Mina for team lead.","ko":"프로젝트 관리자는 미나를 팀장 후보로 추천했다."}]},{"id":"vocab-1791","word":"none","ipa":"/nʌn/","kr":"**넌**","mark":"**","pos":"대","mean":"① 아무도 ~않다 ② 하나도 없다","ex":[{"en":"**None** of the answers is correct.","ko":"답 중 어느 것도 맞지 않다."},{"en":"I checked every box, but **none** was empty.","ko":"나는 모든 상자를 확인했지만 하나도 비어 있지 않았다."}]},{"id":"vocab-1792","word":"nonetheless","ipa":"/ˌnʌnðəˈles/","kr":"넌덜**레스**","mark":"","pos":"부","mean":"그럼에도 불구하고","ex":[{"en":"The task was hard but **nonetheless** useful.","ko":"그 일은 어려웠지만 그럼에도 유용했다."}]},{"id":"vocab-1793","word":"noon","ipa":"/nuːn/","kr":"**눈ː**","mark":"**","pos":"명","mean":"① 정오 ② 낮 12시","ex":[{"en":"We eat lunch at **noon**.","ko":"우리는 정오에 점심을 먹는다."},{"en":"This meeting starts at **noon**, or 12 p.m.","ko":"이번 회의는 낮 12시에 시작한다."}]},{"id":"vocab-1794","word":"nor","ipa":"/nɔːr/","kr":"**노ː**","mark":"**","pos":"접","mean":"~도 아니다","ex":[{"en":"Lucas cannot swim, **nor** can I.","ko":"루카스는 수영을 못하고 나도 못한다."}]},{"id":"vocab-1795","word":"norm (normal)","ipa":"/nɔːrm/","kr":"**놈ː**","mark":"","pos":"명","mean":"① 표준 ② 규범","ex":[{"en":"This is the **norm** here.","ko":"이것이 이곳의 표준이다."},{"en":"Respect for others is an important social **norm**.","ko":"다른 사람에 대한 존중은 중요한 사회 규범이다."}]},{"id":"vocab-1796","word":"north","ipa":"/nɔːrθ/","kr":"**노ː**쓰","mark":"*","pos":"명/형","mean":"① 북쪽 ② 북쪽의","ex":[{"en":"The warehouse is **north** of the office.","ko":"창고는 사무실의 북쪽에 있다."},{"en":"The wind blows from the **north**.","ko":"바람이 북쪽에서 분다."}]},{"id":"vocab-1797","word":"nose","ipa":"/noʊz/","kr":"**노즈**","mark":"*","pos":"명","mean":"코","ex":[{"en":"My **nose** is cold.","ko":"내 코가 차갑다."}]},{"id":"vocab-1798","word":"not","ipa":"/nɑːt/","kr":"**낫**","mark":"*","pos":"부","mean":"① ~아니다 ② ~않다","ex":[{"en":"This is **not** my book.","ko":"이것은 내 책이 아니다."},{"en":"I am **not** hungry.","ko":"나는 배고프지 않다."}]},{"id":"vocab-1799","word":"note (notion)","ipa":"/noʊt/","kr":"**노트**","mark":"*","pos":"명/동","mean":"① 메모 ② 주목하다","ex":[{"en":"Nora wrote a **note** to her teacher.","ko":"노라는 선생님께 메모를 썼다."},{"en":"Please **note** the change in the schedule.","ko":"일정의 변화를 주목해 주세요."}]},{"id":"vocab-1800","word":"notebook","ipa":"/ˈnoʊtbʊk/","kr":"**노트**북","mark":"*","pos":"명","mean":"① 공책 ② 노트","ex":[{"en":"Write the answer in your **notebook**.","ko":"공책에 답을 써라."},{"en":"Olivia opened a new **notebook** for the project.","ko":"올리비아는 그 프로젝트를 위해 새 노트를 펼쳤다."}]},{"id":"vocab-1801","word":"nothing","ipa":"/ˈnʌθɪŋ/","kr":"**너**씽","mark":"*","pos":"대","mean":"아무것도 (아니다)","ex":[{"en":"There is **nothing** in the box.","ko":"그 상자에는 아무것도 없다."}]},{"id":"vocab-1802","word":"notice","ipa":"/ˈnoʊtɪs/","kr":"**노**티스","mark":"**","pos":"동/명","mean":"① 알아채다 ② 공지","ex":[{"en":"I **noticed** a small error in the report.","ko":"나는 보고서의 작은 오류를 알아챘다."},{"en":"A local company posted a **notice** about the holiday.","ko":"한 지역 회사는 휴일에 대한 공지를 게시했다."}]},{"id":"vocab-1803","word":"novel","ipa":"/ˈnɑːvl/","kr":"**나**블","mark":"","pos":"명/형","mean":"① 소설 ② 새로운","ex":[{"en":"Sora is reading a historical **novel**.","ko":"소라는 역사 소설을 읽고 있다."},{"en":"That team tried a **novel** approach.","ko":"그 팀은 새로운 접근법을 시도했다."}]},{"id":"vocab-1804","word":"now","ipa":"/naʊ/","kr":"**나우**","mark":"*","pos":"부","mean":"① 지금 ② 이제","ex":[{"en":"I am busy **now**.","ko":"나는 지금 바쁘다."},{"en":"The old process ends **now**; use the new one.","ko":"오래된 절차는 이제 끝난다. 새 절차를 사용해라."}]},{"id":"vocab-1805","word":"nowadays","ipa":"/ˈnaʊədeɪz/","kr":"**나**우어데이즈","mark":"**","pos":"부","mean":"① 요즘 ② 오늘날","ex":[{"en":"**Nowadays**, many people use phones.","ko":"요즘 많은 사람들이 전화기를 쓴다."},{"en":"**Nowadays**, most meetings include a video call.","ko":"오늘날 대부분의 회의에는 화상 통화가 포함된다."}]},{"id":"vocab-1806","word":"nowhere","ipa":"/ˈnoʊwer/","kr":"**노**웨어","mark":"**","pos":"부","mean":"아무 데도 (없다)","ex":[{"en":"The keys were **nowhere** to be found.","ko":"그 열쇠는 어디에서도 찾을 수 없었다."}]},{"id":"vocab-1807","word":"nuclear","ipa":"/ˈnuːkliər/","kr":"**누ː**클리어","mark":"","pos":"형","mean":"① 핵의 ② 원자력의","ex":[{"en":"The lab studies **nuclear** reactions.","ko":"그 연구실은 핵반응을 연구한다."},{"en":"The country uses **nuclear** power.","ko":"그 나라는 원자력을 사용한다."}]},{"id":"vocab-1808","word":"number","ipa":"/ˈnʌmbər/","kr":"**넘**버","mark":"*","pos":"명","mean":"① 숫자 ② 번호","ex":[{"en":"Write the **number** in the first box.","ko":"첫 번째 칸에 숫자를 써라."},{"en":"Write your phone **number**.","ko":"네 전화번호를 써라."}]},{"id":"vocab-1809","word":"numerous","ipa":"/ˈnuːmərəs/","kr":"**누ː**머러스","mark":"","pos":"형","mean":"① 많은 ② 수많은","ex":[{"en":"Hana has **numerous** friends.","ko":"하나는 수많은 친구가 있다."},{"en":"**Numerous** birds live in this wetland.","ko":"수많은 새가 이 습지에 산다."}]},{"id":"vocab-1810","word":"nurse","ipa":"/nɜːrs/","kr":"**너ː**스","mark":"*","pos":"명","mean":"간호사","ex":[{"en":"The **nurse** checked my temperature.","ko":"간호사가 내 체온을 쟀다."}]},{"id":"vocab-1811","word":"nut","ipa":"/nʌt/","kr":"**넛**","mark":"**","pos":"명","mean":"① 견과 ② 너트","ex":[{"en":"Sophia ate a bowl of **nuts**.","ko":"소피아는 견과 한 그릇을 먹었다."},{"en":"Tighten the **nut** with a wrench.","ko":"렌치로 너트를 조여라."}]},{"id":"vocab-1812","word":"oak","ipa":"/oʊk/","kr":"**오크**","mark":"**","pos":"명","mean":"① 참나무 ② 오크","ex":[{"en":"A large **oak** stood in the yard.","ko":"큰 참나무가 마당에 서 있었다."},{"en":"The desk is made of dark **oak**.","ko":"그 책상은 어두운 오크로 만들어졌다."}]},{"id":"vocab-1813","word":"obey","ipa":"/oʊˈbeɪ/","kr":"오**베이**","mark":"","pos":"동","mean":"① 복종하다 ② 따르다","ex":[{"en":"Soldiers must **obey** orders.","ko":"군인은 명령에 복종해야 한다."},{"en":"You must **obey** the rules.","ko":"너는 규칙을 따라야 한다."}]},{"id":"vocab-1814","word":"object (objective)","ipa":"/ˈɑːbdʒekt/","kr":"**압**젝트","mark":"**","pos":"명/동","mean":"① 물체 ② 반대하다","ex":[{"en":"What is that **object**?","ko":"저 물체는 무엇이니?"},{"en":"I **object** to this unfair rule.","ko":"나는 이 불공정한 규칙에 반대한다."}]},{"id":"vocab-1815","word":"oblige","ipa":"/əˈblaɪdʒ/","kr":"어**블라이지**","mark":"","pos":"동","mean":"① 의무를 지우다 ② 강요하다","ex":[{"en":"The law **obliges** drivers to stop.","ko":"그 법은 운전자에게 정지할 의무를 지운다."},{"en":"Staff shortages **obliged** us to work late.","ko":"인력 부족 때문에 우리는 늦게 일해야 했다."}]},{"id":"vocab-1816","word":"observe","ipa":"/əbˈzɜːrv/","kr":"업**저ː**브","mark":"**","pos":"동","mean":"① 관찰하다 ② 준수하다","ex":[{"en":"We **observed** the moon through a telescope.","ko":"우리는 망원경으로 달을 관찰했다."},{"en":"All employees must **observe** the safety rules.","ko":"모든 직원은 안전 규칙을 준수해야 한다."}]},{"id":"vocab-1817","word":"obsess","ipa":"/əbˈses/","kr":"업**세스**","mark":"","pos":"동","mean":"① 사로잡다 ② 집착하게 하다","ex":[{"en":"The puzzle **obsessed** him for days.","ko":"그 퍼즐은 며칠 동안 그의 마음을 사로잡았다."},{"en":"James is **obsessed** with games.","ko":"제임스는 게임에 집착한다."}]},{"id":"vocab-1818","word":"obtain","ipa":"/əbˈteɪn/","kr":"업**테인**","mark":"","pos":"동","mean":"① 얻다 ② 획득하다","ex":[{"en":"You need permission to **obtain** the data.","ko":"그 데이터를 얻으려면 허가가 필요하다."},{"en":"She **obtained** a security certificate.","ko":"그녀는 보안 자격증을 획득했다."}]},{"id":"vocab-1819","word":"obvious","ipa":"/ˈɑːbviəs/","kr":"**압**비어스","mark":"**","pos":"형","mean":"① 명백한 ② 분명한","ex":[{"en":"The answer is **obvious**.","ko":"그 답은 명백하다."},{"en":"The mistake became **obvious** after the review.","ko":"검토 후 그 실수가 분명해졌다."}]},{"id":"vocab-1820","word":"occasion","ipa":"/əˈkeɪʒn/","kr":"어**케이**전","mark":"**","pos":"명","mean":"① 경우 ② 행사","ex":[{"en":"We meet on special **occasions**.","ko":"우리는 특별한 경우에 만난다."},{"en":"The annual meeting is a formal **occasion**.","ko":"연례 회의는 공식 행사다."}]},{"id":"vocab-1821","word":"occupy (occupation)","ipa":"/ˈɑːkjupaɪ/","kr":"**아**큐파이","mark":"","pos":"동","mean":"① 차지하다 ② 점령하다","ex":[{"en":"The sofa **occupies** most of the room.","ko":"소파가 방의 대부분을 차지한다."},{"en":"The army **occupied** the town at dawn.","ko":"군대는 새벽에 그 도시를 점령했다."}]},{"id":"vocab-1822","word":"occur (occurrence)","ipa":"/əˈkɜːr/","kr":"어**커ː**","mark":"**","pos":"동","mean":"① 일어나다 ② 발생하다","ex":[{"en":"The accident **occurred** at night.","ko":"그 사고는 밤에 일어났다."},{"en":"The error **occurred** during the update.","ko":"그 오류는 업데이트 중에 발생했다."}]},{"id":"vocab-1823","word":"ocean","ipa":"/ˈoʊʃn/","kr":"**오**션","mark":"**","pos":"명","mean":"① 대양 ② 바다","ex":[{"en":"The Pacific is the largest **ocean**.","ko":"태평양은 가장 큰 대양이다."},{"en":"The **ocean** looked calm at dawn.","ko":"바다는 새벽에 잔잔해 보였다."}]},{"id":"vocab-1824","word":"odd","ipa":"/ɑːd/","kr":"**아드**","mark":"**","pos":"형","mean":"① 이상한 ② 홀수의","ex":[{"en":"That is an **odd** question.","ko":"그것은 이상한 질문이다."},{"en":"Nine is an **odd** number.","ko":"9는 홀수다."}]},{"id":"vocab-1825","word":"of","ipa":"/əv/","kr":"**어브**","mark":"*","pos":"전","mean":"~의","ex":[{"en":"The roof **of** the house is red.","ko":"그 집의 지붕은 빨간색이다."}]},{"id":"vocab-1826","word":"off","ipa":"/ɔːf/","kr":"**오ː**프","mark":"*","pos":"부/전","mean":"① 떨어져 ② ~에서 떨어져","ex":[{"en":"The button fell **off** my shirt.","ko":"단추가 내 셔츠에서 떨어졌다."},{"en":"The island lies **off** the coast.","ko":"그 섬은 해안에서 떨어져 있다."}]},{"id":"vocab-1827","word":"offend","ipa":"/əˈfend/","kr":"어**펜드**","mark":"","pos":"동","mean":"① 기분 상하게 하다 ② 위반하다","ex":[{"en":"I didn't mean to **offend** you.","ko":"나는 너를 기분 상하게 할 뜻이 없었다."},{"en":"Do not **offend** against the safety rules.","ko":"안전 규칙을 위반하지 마라."}]},{"id":"vocab-1828","word":"offer","ipa":"/ˈɔːfər/","kr":"**오ː**퍼","mark":"**","pos":"동/명","mean":"① 제안하다 ② 제공하다 ③ 제안","ex":[{"en":"I **offered** a simple solution.","ko":"나는 간단한 해결책을 제안했다."},{"en":"The parent company **offers** free training.","ko":"그 모회사는 무료 교육을 제공한다."},{"en":"A local company made her a job **offer**.","ko":"한 지역 회사는 그녀에게 일자리 제안을 했다."}]},{"id":"vocab-1829","word":"office (official)","ipa":"/ˈɔːfɪs/","kr":"**오ː**피스","mark":"*","pos":"명","mean":"① 사무실 ② 관청","ex":[{"en":"Her **office** is on the second floor.","ko":"그녀의 사무실은 2층에 있다."},{"en":"The permit is issued by a local government **office**.","ko":"그 허가는 지역 관청에서 발급된다."}]},{"id":"vocab-1830","word":"officer","ipa":"/ˈɔːfɪsər/","kr":"**오ː**피서","mark":"**","pos":"명","mean":"① 장교 ② 관리","ex":[{"en":"The **officer** gave an order.","ko":"그 장교가 명령을 내렸다."},{"en":"A government **officer** checked the document.","ko":"정부 관리가 그 문서를 확인했다."}]},{"id":"vocab-1831","word":"often","ipa":"/ˈɔːfn/","kr":"**오ː**픈","mark":"*","pos":"부","mean":"① 자주 ② 흔히","ex":[{"en":"We **often** walk after dinner.","ko":"우리는 저녁 식사 후 자주 걷는다."},{"en":"This error **often** appears after an update.","ko":"이 오류는 업데이트 후에 흔히 나타난다."}]},{"id":"vocab-1832","word":"oil","ipa":"/ɔɪl/","kr":"**오일**","mark":"*","pos":"명","mean":"① 기름 ② 석유","ex":[{"en":"Heat the **oil** in a pan.","ko":"팬에 기름을 데워라."},{"en":"The country exports a large amount of **oil**.","ko":"그 나라는 많은 양의 석유를 수출한다."}]},{"id":"vocab-1833","word":"okay / okey / OK","ipa":"/oʊˈkeɪ/","kr":"오**케이**","mark":"*","pos":"형/감","mean":"① 괜찮은 ② 좋아","ex":[{"en":"Is it **okay** to sit here?","ko":"여기에 앉아도 괜찮니?"},{"en":"**Okay**, let's start the call.","ko":"좋아, 통화를 시작하자."}]},{"id":"vocab-1834","word":"old","ipa":"/oʊld/","kr":"**올드**","mark":"*","pos":"형","mean":"① 늙은 ② 오래된","ex":[{"en":"The **old** man walked slowly.","ko":"그 늙은 남자는 천천히 걸었다."},{"en":"This is an **old** house.","ko":"이것은 오래된 집이다."}]},{"id":"vocab-1835","word":"on","ipa":"/ɑːn/","kr":"**안**","mark":"*","pos":"전","mean":"① ~위에 ② ~에","ex":[{"en":"The book is **on** the table.","ko":"그 책은 탁자 위에 있다."},{"en":"I left the file **on** the desk.","ko":"나는 파일을 책상 위에 두었다."}]},{"id":"vocab-1836","word":"once","ipa":"/wʌns/","kr":"**원스**","mark":"**","pos":"부/접","mean":"① 한 번 ② 예전에 ③ 일단 ~하면","ex":[{"en":"I visit my grandmother **once** a week.","ko":"나는 일주일에 한 번 할머니를 찾아뵙는다."},{"en":"I **once** worked in customer support.","ko":"나는 예전에 고객 지원에서 일했다."},{"en":"**Once** you log in, open the dashboard.","ko":"일단 로그인하면 대시보드를 열어라."}]},{"id":"vocab-1837","word":"one","ipa":"/wʌn/","kr":"**원**","mark":"*","pos":"명/형/대","mean":"① 하나 ② 한 개의","ex":[{"en":"I have **one** question.","ko":"나는 질문이 하나 있다."},{"en":"I need **one** copy of the form.","ko":"나는 그 양식 한 개가 필요하다."}]},{"id":"vocab-1838","word":"only","ipa":"/ˈoʊnli/","kr":"**온**리","mark":"*","pos":"형/부","mean":"① 유일한 ② 오직","ex":[{"en":"This is the **only** available room.","ko":"이것은 유일한 이용 가능한 방이다."},{"en":"**Only** managers can change this setting.","ko":"오직 관리자만 이 설정을 바꿀 수 있다."}]},{"id":"vocab-1839","word":"open","ipa":"/ˈoʊpən/","kr":"**오**픈","mark":"*","pos":"형/동","mean":"① 열린 ② 열다","ex":[{"en":"A small office is **open** until six.","ko":"작은 사무실은 여섯 시까지 열려 있다."},{"en":"Please **open** the window.","ko":"창문을 열어 주세요."}]},{"id":"vocab-1840","word":"opera","ipa":"/ˈɑːprə/","kr":"**아**프러","mark":"**","pos":"명","mean":"오페라","ex":[{"en":"We watched an **opera** at the theater.","ko":"우리는 극장에서 오페라를 보았다."}]},{"id":"vocab-1841","word":"operate","ipa":"/ˈɑːpəreɪt/","kr":"**아**퍼레이트","mark":"**","pos":"동","mean":"① 작동시키다 ② 수술하다","ex":[{"en":"This machine is easy to **operate**.","ko":"이 기계는 작동하기 쉽다."},{"en":"The surgeon will **operate** on the patient tomorrow.","ko":"그 외과 의사는 내일 환자를 수술할 것이다."}]},{"id":"vocab-1842","word":"opinion","ipa":"/əˈpɪnjən/","kr":"어**피**니언","mark":"**","pos":"명","mean":"의견","ex":[{"en":"What is your **opinion** on this issue?","ko":"이 문제에 대한 네 의견은 무엇이니?"}]},{"id":"vocab-1843","word":"opportune (opportunity)","ipa":"/ˌɑːpərˈtuːn/","kr":"아퍼**툰ː**","mark":"","pos":"형","mean":"시기적절한","ex":[{"en":"This is an **opportune** moment.","ko":"지금이 시기적절한 순간이다."}]},{"id":"vocab-1844","word":"oppose","ipa":"/əˈpoʊz/","kr":"어**포즈**","mark":"**","pos":"동","mean":"반대하다","ex":[{"en":"Many residents **opposed** the plan.","ko":"많은 주민이 그 계획에 반대했다."}]},{"id":"vocab-1845","word":"opt (option)","ipa":"/ɑːpt/","kr":"**압트**","mark":"","pos":"동","mean":"선택하다","ex":[{"en":"She **opted** to walk home.","ko":"그녀는 집까지 걸어가기로 선택했다."}]},{"id":"vocab-1846","word":"optimist","ipa":"/ˈɑːptɪmɪst/","kr":"**압**티미스트","mark":"","pos":"명","mean":"낙천주의자","ex":[{"en":"Noah is a true **optimist**.","ko":"노아는 진정한 낙천주의자다."}]},{"id":"vocab-1847","word":"or","ipa":"/ɔːr/","kr":"**오ː**","mark":"*","pos":"접","mean":"① 또는 ② 혹은","ex":[{"en":"You can call **or** send an email.","ko":"전화하거나 이메일을 보낼 수 있다."},{"en":"Choose the blue file **or** the green one.","ko":"파란 파일 혹은 초록 파일을 골라라."}]},{"id":"vocab-1848","word":"oral","ipa":"/ˈɔːrəl/","kr":"**오ː**럴","mark":"","pos":"형","mean":"① 구두의 ② 입의","ex":[{"en":"We had an **oral** test.","ko":"우리는 구두 시험을 봤다."},{"en":"The dentist checked my **oral** health.","ko":"치과 의사는 내 입의 건강을 확인했다."}]},{"id":"vocab-1849","word":"orange","ipa":"/ˈɔːrɪndʒ/","kr":"**오ː**린지","mark":"*","pos":"명/형","mean":"① 오렌지 ② 주황색의","ex":[{"en":"Mina peeled an **orange**.","ko":"미나는 오렌지 껍질을 벗겼다."},{"en":"Grace wore an **orange** jacket.","ko":"그레이스는 주황색의 재킷을 입었다."}]},{"id":"vocab-1850","word":"orbit","ipa":"/ˈɔːrbɪt/","kr":"**오ː**빗","mark":"","pos":"명/동","mean":"① 궤도 ② 궤도를 돌다","ex":[{"en":"The satellite entered **orbit**.","ko":"그 위성은 궤도에 진입했다."},{"en":"The moon **orbits** the earth.","ko":"달은 지구 궤도를 돈다."}]},{"id":"vocab-1851","word":"orchestra","ipa":"/ˈɔːrkɪstrə/","kr":"**오ː**키스트러","mark":"","pos":"명","mean":"① 관현악단 ② 오케스트라","ex":[{"en":"The **orchestra** played beautifully.","ko":"그 관현악단은 아름답게 연주했다."},{"en":"The **orchestra** rehearses every Friday.","ko":"그 오케스트라는 매주 금요일에 연습한다."}]},{"id":"vocab-1852","word":"order (disorder)","ipa":"/ˈɔːrdər/","kr":"**오ː**더","mark":"**","pos":"명/동","mean":"① 순서 ② 명령 ③ 주문하다","ex":[{"en":"Put the books in **order**.","ko":"책을 순서대로 놓아라."},{"en":"The officer gave a direct **order**.","ko":"그 장교는 직접적인 명령을 내렸다."},{"en":"I **ordered** a bowl of soup.","ko":"나는 수프 한 그릇을 주문했다."}]},{"id":"vocab-1853","word":"ordinary","ipa":"/ˈɔːrdəneri/","kr":"**오ː**디네리","mark":"**","pos":"형","mean":"① 평범한 ② 보통의","ex":[{"en":"It was an **ordinary** day.","ko":"그것은 평범한 날이었다."},{"en":"Nothing unusual happened during the **ordinary** workday.","ko":"그 평범한 근무일에는 특별한 일이 일어나지 않았다."}]},{"id":"vocab-1854","word":"organ (organic, organize / organise)","ipa":"/ˈɔːrɡən/","kr":"**오ː**건","mark":"","pos":"명","mean":"① 장기 ② 오르간","ex":[{"en":"The heart is a vital **organ**.","ko":"심장은 중요한 장기다."},{"en":"Olivia played the **organ** at church.","ko":"올리비아는 교회에서 오르간을 연주했다."}]},{"id":"vocab-1855","word":"orient (orientation)","ipa":"/ˈɔːriənt/","kr":"**오ː**리언트","mark":"","pos":"동","mean":"① 방향을 잡다 ② 적응시키다","ex":[{"en":"The map helped us **orient** ourselves.","ko":"그 지도는 우리가 방향을 잡도록 도와주었다."},{"en":"The program helps **orient** new employees.","ko":"그 프로그램은 신입 직원들을 적응시키는 데 도움을 준다."}]},{"id":"vocab-1856","word":"origin (original)","ipa":"/ˈɔːrɪdʒɪn/","kr":"**오ː**리진","mark":"","pos":"명","mean":"① 기원 ② 출신","ex":[{"en":"The **origin** of the word is Latin.","ko":"그 단어의 기원은 라틴어다."},{"en":"Her country of **origin** is Canada.","ko":"그녀의 출신 국가는 캐나다다."}]},{"id":"vocab-1857","word":"other","ipa":"/ˈʌðər/","kr":"**어**더","mark":"**","pos":"형/대","mean":"① 다른 ② 다른 것","ex":[{"en":"Do you have **other** colors?","ko":"다른 색이 있나요?"},{"en":"Do you have any **other** questions about the policy?","ko":"그 정책에 관해 다른 질문이 있나요?"}]},{"id":"vocab-1858","word":"otherwise","ipa":"/ˈʌðərwaɪz/","kr":"**어**더와이즈","mark":"**","pos":"부","mean":"① 그렇지 않으면 ② 달리","ex":[{"en":"Hurry, **otherwise** you'll be late.","ko":"서둘러라, 그렇지 않으면 늦을 것이다."},{"en":"I thought **otherwise**.","ko":"나는 달리 생각했다."}]},{"id":"vocab-1859","word":"ought","ipa":"/ɔːt/","kr":"**오ː**트","mark":"**","pos":"동","mean":"~해야 한다","ex":[{"en":"You **ought** to apologize.","ko":"너는 사과해야 한다."}]},{"id":"vocab-1860","word":"out","ipa":"/aʊt/","kr":"**아웃**","mark":"*","pos":"부","mean":"① 밖으로 ② 밖에","ex":[{"en":"The children went **out** to play.","ko":"아이들은 놀러 밖으로 나갔다."},{"en":"Yuna went **out** for a walk.","ko":"유나는 산책하러 밖에 나갔다."}]},{"id":"vocab-1861","word":"outcome","ipa":"/ˈaʊtkʌm/","kr":"**아웃**컴","mark":"","pos":"명","mean":"결과","ex":[{"en":"We were pleased with the **outcome**.","ko":"우리는 그 결과에 만족했다."}]},{"id":"vocab-1862","word":"outline","ipa":"/ˈaʊtlaɪn/","kr":"**아웃**라인","mark":"","pos":"명/동","mean":"① 개요 ② 윤곽을 그리다","ex":[{"en":"Lina wrote an **outline** of the plan.","ko":"리나는 그 계획의 개요를 작성했다."},{"en":"**Outline** the box with a black pen.","ko":"검은 펜으로 상자의 윤곽을 그려라."}]},{"id":"vocab-1863","word":"output","ipa":"/ˈaʊtpʊt/","kr":"**아웃**풋","mark":"","pos":"명","mean":"① 생산량 ② 출력","ex":[{"en":"The factory increased its **output**.","ko":"그 공장은 생산량을 늘렸다."},{"en":"Check the system **output** for errors.","ko":"시스템 출력을 오류가 있는지 확인해라."}]},{"id":"vocab-1864","word":"outrage","ipa":"/ˈaʊtreɪdʒ/","kr":"**아웃**레이지","mark":"","pos":"명","mean":"① 격분 ② 분노","ex":[{"en":"The unfair decision caused public **outrage**.","ko":"그 불공정한 결정은 대중의 격분을 일으켰다."},{"en":"Public **outrage** grew after the news spread.","ko":"그 소식이 퍼진 뒤 대중의 분노가 커졌다."}]},{"id":"vocab-1865","word":"outstanding","ipa":"/aʊtˈstændɪŋ/","kr":"아웃**스탠**딩","mark":"","pos":"형","mean":"① 뛰어난 ② 두드러진","ex":[{"en":"Mina gave an **outstanding** performance.","ko":"미나는 뛰어난 공연을 펼쳤다."},{"en":"Her **outstanding** performance impressed the team.","ko":"그녀의 두드러진 성과는 팀에 감명을 주었다."}]},{"id":"vocab-1866","word":"oven","ipa":"/ˈʌvn/","kr":"**어**븐","mark":"**","pos":"명","mean":"오븐","ex":[{"en":"Bake the bread in the **oven**.","ko":"오븐에서 빵을 구워라."}]},{"id":"vocab-1867","word":"over","ipa":"/ˈoʊvər/","kr":"**오**버","mark":"*","pos":"전/부","mean":"① ~위에 ② ~을 넘어 ③ 끝난","ex":[{"en":"The bird flew **over** the house.","ko":"새가 집 위로 날아갔다."},{"en":"The cost went **over** the budget.","ko":"비용은 예산을 넘어갔다."},{"en":"The training session is **over**.","ko":"교육 시간이 끝났다."}]},{"id":"vocab-1868","word":"overall","ipa":"/ˌoʊvərˈɔːl/","kr":"오버**올ː**","mark":"**","pos":"형/부","mean":"① 전반적인 ② 전체적으로","ex":[{"en":"The **overall** result was good.","ko":"전반적인 결과는 좋았다."},{"en":"**Overall**, the project went well.","ko":"전체적으로 그 프로젝트는 잘 진행되었다."}]},{"id":"vocab-1869","word":"overcome","ipa":"/ˌoʊvərˈkʌm/","kr":"오버**컴**","mark":"","pos":"동","mean":"극복하다","ex":[{"en":"She **overcame** her fear of water.","ko":"그녀는 물에 대한 두려움을 극복했다."}]},{"id":"vocab-1870","word":"overhead","ipa":"/ˌoʊvərˈhed/","kr":"오버**헤드**","mark":"","pos":"부/형","mean":"① 머리 위에 ② 상공의","ex":[{"en":"A plane flew **overhead**.","ko":"비행기 한 대가 머리 위로 날아갔다."},{"en":"An **overhead** cable crossed the street.","ko":"상공의 전선이 거리를 가로질렀다."}]},{"id":"vocab-1871","word":"overlap","ipa":"/ˌoʊvərˈlæp/","kr":"오버**랩**","mark":"","pos":"동/명","mean":"① 겹치다 ② 중복","ex":[{"en":"The two work shifts **overlap** for one hour.","ko":"두 근무 시간은 한 시간 겹친다."},{"en":"There is some **overlap** between the two roles.","ko":"두 역할 사이에는 약간의 중복이 있다."}]},{"id":"vocab-1872","word":"overlook","ipa":"/ˌoʊvərˈlʊk/","kr":"오버**룩**","mark":"","pos":"동","mean":"① 간과하다 ② 내려다보다","ex":[{"en":"Don't **overlook** small details.","ko":"사소한 세부 사항을 간과하지 마라."},{"en":"The room **overlooks** the sea.","ko":"그 방에서는 바다가 내려다보인다."}]},{"id":"vocab-1873","word":"overnight","ipa":"/ˌoʊvərˈnaɪt/","kr":"오버**나잇**","mark":"","pos":"부/형","mean":"① 밤새 ② 하룻밤 사이의","ex":[{"en":"The support team worked **overnight**.","ko":"지원팀은 밤새 일했다."},{"en":"They stayed **overnight** at a hotel.","ko":"그들은 호텔에서 하룻밤 묵었다."}]},{"id":"vocab-1874","word":"oversea / overseas","ipa":"/ˌoʊvərˈsiː/","kr":"오버**시ː**","mark":"","pos":"부/형","mean":"① 해외로 ② 해외의","ex":[{"en":"Leo works **overseas**.","ko":"레오는 해외에서 일한다."},{"en":"This company opened an **overseas** office.","ko":"이 회사는 해외 사무소를 열었다."}]},{"id":"vocab-1875","word":"overwhelm","ipa":"/ˌoʊvərˈwelm/","kr":"오버**웰름**","mark":"","pos":"동","mean":"압도하다","ex":[{"en":"The amount of work **overwhelmed** him.","ko":"엄청난 업무량이 그를 압도했다."}]},{"id":"vocab-1876","word":"owe","ipa":"/oʊ/","kr":"**오**","mark":"","pos":"동","mean":"① 빚지다 ② 신세를 지다","ex":[{"en":"The firm **owes** the vendor a large payment.","ko":"그 기업은 공급업체에 큰 금액을 빚지고 있다."},{"en":"I **owe** you a favor.","ko":"나는 당신에게 신세를 졌다."}]},{"id":"vocab-1877","word":"own","ipa":"/oʊn/","kr":"**온**","mark":"**","pos":"형/동","mean":"① 자신의 ② 소유하다","ex":[{"en":"Lina has her **own** office.","ko":"리나는 자신의 사무실을 가지고 있다."},{"en":"She **owns** a small café.","ko":"그녀는 작은 카페를 소유하고 있다."}]},{"id":"vocab-1878","word":"pace","ipa":"/peɪs/","kr":"**페이스**","mark":"","pos":"명","mean":"① 속도 ② 걸음","ex":[{"en":"Walk at your own **pace**.","ko":"자기 속도로 걸어라."},{"en":"James walked at a quick **pace**.","ko":"제임스는 빠른 걸음으로 걸었다."}]},{"id":"vocab-1879","word":"pack","ipa":"/pæk/","kr":"**팩**","mark":"**","pos":"동/명","mean":"① 싸다 ② 꾸러미","ex":[{"en":"**Pack** your bags tonight.","ko":"오늘 밤 가방을 싸라."},{"en":"A **pack** of documents arrived by mail.","ko":"문서 꾸러미가 우편으로 도착했다."}]},{"id":"vocab-1880","word":"pad","ipa":"/pæd/","kr":"**패드**","mark":"","pos":"명","mean":"① 패드 ② 방석","ex":[{"en":"Write the phone number on this **pad**.","ko":"이 패드에 전화번호를 써라."},{"en":"Put a soft **pad** on the chair.","ko":"의자에 부드러운 방석을 놓아라."}]},{"id":"vocab-1881","word":"page","ipa":"/peɪdʒ/","kr":"**페이지**","mark":"*","pos":"명","mean":"① 쪽 ② 페이지","ex":[{"en":"Turn to **page** ten.","ko":"10쪽을 펴라."},{"en":"Open the document on **page** ten.","ko":"그 문서의 10페이지를 열어라."}]},{"id":"vocab-1882","word":"pain","ipa":"/peɪn/","kr":"**페인**","mark":"**","pos":"명","mean":"① 고통 ② 아픔","ex":[{"en":"The injury caused severe **pain**.","ko":"그 부상은 심한 고통을 일으켰다."},{"en":"There is a dull **pain** in my shoulder.","ko":"내 어깨에 둔한 아픔이 있다."}]},{"id":"vocab-1883","word":"paint","ipa":"/peɪnt/","kr":"**페인트**","mark":"*","pos":"동/명","mean":"① 칠하다 ② 페인트","ex":[{"en":"She **painted** the wall blue.","ko":"그녀는 벽을 파란색으로 칠했다."},{"en":"We need more white **paint** for the wall.","ko":"우리는 벽에 칠할 흰 페인트가 더 필요하다."}]},{"id":"vocab-1884","word":"pair","ipa":"/per/","kr":"**페어**","mark":"**","pos":"명","mean":"① 한 쌍 ② 한 켤레","ex":[{"en":"A **pair** of gloves is on the desk.","ko":"장갑 한 쌍이 책상 위에 있다."},{"en":"I bought a **pair** of shoes.","ko":"나는 신발 한 켤레를 샀다."}]},{"id":"vocab-1885","word":"palace","ipa":"/ˈpæləs/","kr":"**팰**러스","mark":"**","pos":"명","mean":"궁전","ex":[{"en":"The king lived in a **palace**.","ko":"왕은 궁전에서 살았다."}]},{"id":"vocab-1886","word":"pale","ipa":"/peɪl/","kr":"**페일**","mark":"","pos":"형","mean":"① 창백한 ② 옅은","ex":[{"en":"Her face looked **pale**.","ko":"그녀의 얼굴은 창백해 보였다."},{"en":"A quiet room was painted a **pale** blue.","ko":"조용한 방은 옅은 파란색으로 칠해졌다."}]},{"id":"vocab-1887","word":"palm","ipa":"/pɑːm/","kr":"**팜ː**","mark":"","pos":"명","mean":"① 손바닥 ② 야자수","ex":[{"en":"Jun held the coin in his **palm**.","ko":"준은 손바닥에 동전을 쥐고 있었다."},{"en":"Tall **palm** trees lined the road.","ko":"키 큰 야자수들이 길을 따라 서 있었다."}]},{"id":"vocab-1888","word":"pan","ipa":"/pæn/","kr":"**팬**","mark":"**","pos":"명","mean":"① 냄비 ② 팬","ex":[{"en":"Boil the soup in a large **pan**.","ko":"큰 냄비에서 수프를 끓여라."},{"en":"Heat the butter in a **pan**.","ko":"팬에 버터를 데워라."}]},{"id":"vocab-1889","word":"panel","ipa":"/ˈpænl/","kr":"**패**늘","mark":"","pos":"명","mean":"① 판 ② 패널","ex":[{"en":"The door has a glass **panel**.","ko":"그 문은 유리판을 지녔다."},{"en":"The speaker joined a discussion **panel**.","ko":"그 발표자는 토론 패널에 참여했다."}]},{"id":"vocab-1890","word":"panic","ipa":"/ˈpænɪk/","kr":"**패**닉","mark":"**","pos":"명/동","mean":"① 공황 ② 공황에 빠지다","ex":[{"en":"The news caused **panic** in the office.","ko":"그 소식은 사무실에 공황을 일으켰다."},{"en":"The fire made everyone **panic**.","ko":"그 화재는 모두를 공황에 빠지게 했다."}]},{"id":"vocab-1891","word":"pants","ipa":"/pænts/","kr":"**팬츠**","mark":"*","pos":"명","mean":"바지","ex":[{"en":"These **pants** are too long.","ko":"이 바지는 너무 길다."}]},{"id":"vocab-1892","word":"paper","ipa":"/ˈpeɪpər/","kr":"**페이**퍼","mark":"*","pos":"명","mean":"① 종이 ② 신문","ex":[{"en":"Write your name on the **paper**.","ko":"종이에 이름을 써라."},{"en":"I read the news in the morning **paper**.","ko":"나는 아침 신문에서 그 소식을 읽었다."}]},{"id":"vocab-1893","word":"parade","ipa":"/pəˈreɪd/","kr":"퍼**레이드**","mark":"**","pos":"명","mean":"① 행진 ② 퍼레이드","ex":[{"en":"A **parade** moved through the town.","ko":"행진이 마을을 지나갔다."},{"en":"A colorful **parade** filled the main street.","ko":"화려한 퍼레이드가 중심가를 가득 메웠다."}]},{"id":"vocab-1894","word":"paragraph","ipa":"/ˈpærəɡræf/","kr":"**패**러그래프","mark":"**","pos":"명","mean":"① 단락 ② 문단","ex":[{"en":"Read the first **paragraph**.","ko":"첫 단락을 읽어라."},{"en":"Write one **paragraph** about your family.","ko":"가족에 관한 문단 하나를 써라."}]},{"id":"vocab-1895","word":"parallel","ipa":"/ˈpærəlel/","kr":"**패**러렐","mark":"","pos":"형/명","mean":"① 평행한 ② 유사점","ex":[{"en":"The two lines are **parallel**.","ko":"그 두 선은 평행하다."},{"en":"There is a clear **parallel** between the two cases.","ko":"그 두 사례 사이에는 분명한 유사점이 있다."}]},{"id":"vocab-1896","word":"pardon","ipa":"/ˈpɑːrdn/","kr":"**파ː**든","mark":"**","pos":"명/동","mean":"① 용서 ② 용서하다","ex":[{"en":"Noah asked for **pardon** after the mistake.","ko":"노아는 실수 후에 용서를 구했다."},{"en":"Please **pardon** my late reply.","ko":"늦은 답변을 용서해 주세요."}]},{"id":"vocab-1897","word":"parent","ipa":"/ˈperənt/","kr":"**페**런트","mark":"*","pos":"명","mean":"부모","ex":[{"en":"Every **parent** wants their child to be safe.","ko":"모든 부모는 자녀가 안전하기를 바란다."}]},{"id":"vocab-1898","word":"park","ipa":"/pɑːrk/","kr":"**파ː**크","mark":"*","pos":"명/동","mean":"① 공원 ② 주차하다","ex":[{"en":"We walked in the **park**.","ko":"우리는 공원에서 걸었다."},{"en":"Please **park** near the main entrance.","ko":"정문 근처에 주차해 주세요."}]},{"id":"vocab-1899","word":"parliament","ipa":"/ˈpɑːrləmənt/","kr":"**파ː**러먼트","mark":"","pos":"명","mean":"① 의회 ② 국회","ex":[{"en":"The **parliament** passed the law.","ko":"의회가 그 법을 통과시켰다."},{"en":"**Parliament** debated the new law.","ko":"국회는 새 법을 토론했다."}]},{"id":"vocab-1900","word":"part","ipa":"/pɑːrt/","kr":"**파ː**트","mark":"*","pos":"명","mean":"① 부분 ② 일부","ex":[{"en":"This is the best **part** of the movie.","ko":"이것은 영화에서 가장 좋은 부분이다."},{"en":"Only **part** of the report is complete.","ko":"보고서의 일부만 완성되었다."}]},{"id":"vocab-1901","word":"participate","ipa":"/pɑːrˈtɪsɪpeɪt/","kr":"파**티**시페이트","mark":"","pos":"동","mean":"참여하다","ex":[{"en":"Many students **participated** in the contest.","ko":"많은 학생이 대회에 참여했다."}]},{"id":"vocab-1902","word":"particle","ipa":"/ˈpɑːrtɪkl/","kr":"**파ː**티클","mark":"","pos":"명","mean":"① 입자 ② 작은 조각","ex":[{"en":"Dust **particles** filled the air.","ko":"먼지 입자들이 공기를 가득 채웠다."},{"en":"Dust is made of tiny **particles**.","ko":"먼지는 아주 작은 입자로 이루어진다."}]},{"id":"vocab-1903","word":"particular (particularly)","ipa":"/pərˈtɪkjələr/","kr":"퍼**티**큘러","mark":"**","pos":"형","mean":"① 특정한 ② 특별한","ex":[{"en":"This policy applies to a **particular** group.","ko":"이 정책은 특정 집단에 적용된다."},{"en":"Is there a **particular** reason?","ko":"특별한 이유가 있니?"}]},{"id":"vocab-1904","word":"partner","ipa":"/ˈpɑːrtnər/","kr":"**파ː**트너","mark":"*","pos":"명","mean":"① 동반자 ② 파트너","ex":[{"en":"Lina was my **partner** on the project.","ko":"리나는 그 프로젝트에서 내 동반자였다."},{"en":"Julia is my dance **partner**.","ko":"줄리아는 내 춤 파트너다."}]},{"id":"vocab-1905","word":"party","ipa":"/ˈpɑːrti/","kr":"**파ː**티","mark":"*","pos":"명","mean":"① 파티 ② 정당","ex":[{"en":"We had a birthday **party**.","ko":"우리는 생일 파티를 했다."},{"en":"The **party** announced its new leader.","ko":"그 정당은 새 지도자를 발표했다."}]},{"id":"vocab-1906","word":"pass","ipa":"/pæs/","kr":"**패스**","mark":"*","pos":"동","mean":"① 지나가다 ② 통과하다 ③ 건네다","ex":[{"en":"The bus **passed** our school.","ko":"버스가 우리 학교를 지나갔다."},{"en":"The request must **pass** security review.","ko":"그 요청은 보안 검토를 통과해야 한다."},{"en":"Please **pass** the salt.","ko":"소금을 건네주세요."}]},{"id":"vocab-1907","word":"passage","ipa":"/ˈpæsɪdʒ/","kr":"**패**시지","mark":"","pos":"명","mean":"① 통로 ② 구절","ex":[{"en":"The emergency exit leads to a narrow **passage**.","ko":"비상구는 좁은 통로로 이어진다."},{"en":"Read the **passage** aloud.","ko":"그 구절을 소리 내어 읽어라."}]},{"id":"vocab-1908","word":"passenger","ipa":"/ˈpæsɪndʒər/","kr":"**패**신저","mark":"","pos":"명","mean":"승객","ex":[{"en":"All **passengers** must wear seat belts.","ko":"모든 승객은 안전띠를 매야 한다."}]},{"id":"vocab-1909","word":"passion","ipa":"/ˈpæʃn/","kr":"**패**션","mark":"","pos":"명","mean":"열정","ex":[{"en":"Hana has a **passion** for music.","ko":"하나는 음악에 대한 열정을 지녔다."}]},{"id":"vocab-1910","word":"passport","ipa":"/ˈpæspɔːrt/","kr":"**패스**포트","mark":"","pos":"명","mean":"여권","ex":[{"en":"Do not forget your **passport**.","ko":"여권을 잊지 마라."}]},{"id":"vocab-1911","word":"past","ipa":"/pæst/","kr":"**패스트**","mark":"**","pos":"명/형","mean":"① 과거 ② 지난","ex":[{"en":"We talked about the **past**.","ko":"우리는 과거에 대해 이야기했다."},{"en":"We reviewed last month's **past** results.","ko":"우리는 지난달의 지난 결과를 검토했다."}]},{"id":"vocab-1912","word":"pat","ipa":"/pæt/","kr":"**팻**","mark":"","pos":"동/명","mean":"① 쓰다듬다 ② 토닥임","ex":[{"en":"She **patted** the dog gently.","ko":"그녀는 개를 부드럽게 쓰다듬었다."},{"en":"Minho gave the child a gentle **pat**.","ko":"민호는 아이에게 부드러운 토닥임을 주었다."}]},{"id":"vocab-1913","word":"patch","ipa":"/pætʃ/","kr":"**패치**","mark":"","pos":"명","mean":"① 조각 ② 헝겊","ex":[{"en":"Sew a small **patch** over the hole.","ko":"구멍 위에 작은 천 조각을 꿰매라."},{"en":"Alex sewed a **patch** on his jacket.","ko":"알렉스는 재킷에 헝겊을 꿰맸다."}]},{"id":"vocab-1914","word":"patent","ipa":"/ˈpætnt/","kr":"**패**튼트","mark":"","pos":"명","mean":"특허","ex":[{"en":"The inventor applied for a **patent**.","ko":"그 발명가는 특허를 신청했다."}]},{"id":"vocab-1915","word":"path","ipa":"/pæθ/","kr":"**패쓰**","mark":"**","pos":"명","mean":"① 길 ② 경로","ex":[{"en":"A narrow **path** led to the lake.","ko":"좁은 길이 호수로 이어졌다."},{"en":"The network **path** is shown on the screen.","ko":"네트워크 경로가 화면에 표시되어 있다."}]},{"id":"vocab-1916","word":"patient","ipa":"/ˈpeɪʃnt/","kr":"**페이**션트","mark":"**","pos":"명/형","mean":"① 환자 ② 참을성 있는","ex":[{"en":"The **patient** is getting better.","ko":"그 환자는 나아지고 있다."},{"en":"Be **patient** with younger children.","ko":"어린아이들에게 참을성을 가져라."}]},{"id":"vocab-1917","word":"pattern","ipa":"/ˈpætərn/","kr":"**패**턴","mark":"**","pos":"명","mean":"① 무늬 ② 패턴","ex":[{"en":"The cloth has a flower **pattern**.","ko":"그 천에는 꽃무늬가 있다."},{"en":"The same error **pattern** appeared again.","ko":"같은 오류 패턴이 다시 나타났다."}]},{"id":"vocab-1918","word":"pause","ipa":"/pɔːz/","kr":"**포ː**즈","mark":"**","pos":"명/동","mean":"① 멈춤 ② 잠시 멈추다","ex":[{"en":"There was a short **pause** before her answer.","ko":"그녀의 대답 전에 짧은 멈춤이 있었다."},{"en":"She **paused** before answering.","ko":"그녀는 대답하기 전에 잠시 멈췄다."}]},{"id":"vocab-1919","word":"pave","ipa":"/peɪv/","kr":"**페이브**","mark":"","pos":"동","mean":"포장하다","ex":[{"en":"They **paved** the road last year.","ko":"그들은 작년에 그 도로를 포장했다."}]},{"id":"vocab-1920","word":"pay","ipa":"/peɪ/","kr":"**페이**","mark":"*","pos":"동/명","mean":"① 지불하다 ② 급여","ex":[{"en":"I **paid** for the meal.","ko":"나는 식사비를 지불했다."},{"en":"The local company offers competitive **pay**.","ko":"그 지역 회사는 경쟁력 있는 급여를 제공한다."}]},{"id":"vocab-1921","word":"peace (peaceful)","ipa":"/piːs/","kr":"**피ː**스","mark":"**","pos":"명","mean":"평화","ex":[{"en":"Everyone hopes for **peace**.","ko":"모두가 평화를 바란다."}]},{"id":"vocab-1922","word":"peak","ipa":"/piːk/","kr":"**피ː**크","mark":"","pos":"명","mean":"① 정상 ② 최고점","ex":[{"en":"We reached the mountain **peak**.","ko":"우리는 산 정상에 도달했다."},{"en":"Website traffic reached its **peak** at noon.","ko":"웹사이트 트래픽은 정오에 최고점에 도달했다."}]},{"id":"vocab-1923","word":"pear","ipa":"/per/","kr":"**페어**","mark":"**","pos":"명","mean":"배 (과일)","ex":[{"en":"Julia ate a ripe **pear**.","ko":"줄리아는 잘 익은 배를 먹었다."}]},{"id":"vocab-1924","word":"peasant","ipa":"/ˈpeznt/","kr":"**페**즌트","mark":"","pos":"명","mean":"① 농부 ② 소작농","ex":[{"en":"The **peasant** worked in the fields.","ko":"그 농부는 들판에서 일했다."},{"en":"The **peasant** farmed land owned by another man.","ko":"그 소작농은 다른 사람이 소유한 땅을 경작했다."}]},{"id":"vocab-1925","word":"peel","ipa":"/piːl/","kr":"**필ː**","mark":"","pos":"동/명","mean":"① 껍질을 벗기다 ② 껍질","ex":[{"en":"**Peel** the apple before eating it.","ko":"사과를 먹기 전에 껍질을 벗겨라."},{"en":"The orange **peel** is thick.","ko":"그 오렌지 껍질은 두껍다."}]},{"id":"vocab-1926","word":"peer","ipa":"/pɪr/","kr":"**피어**","mark":"","pos":"명","mean":"① 또래 ② 동료","ex":[{"en":"Emma discussed the problem with her **peers**.","ko":"엠마는 또래들과 그 문제를 논의했다."},{"en":"Sophia asked a **peer** for advice.","ko":"소피아는 동료에게 조언을 구했다."}]},{"id":"vocab-1927","word":"pen","ipa":"/pen/","kr":"**펜**","mark":"*","pos":"명","mean":"펜","ex":[{"en":"Write with a blue **pen**.","ko":"파란 펜으로 써라."}]},{"id":"vocab-1928","word":"penalty","ipa":"/ˈpenəlti/","kr":"**페**널티","mark":"","pos":"명","mean":"① 벌 ② 벌칙","ex":[{"en":"Owen paid a **penalty** for parking there.","ko":"오언은 그곳에 주차한 대가로 벌금을 냈다."},{"en":"There is a **penalty** for cheating.","ko":"부정행위에는 벌칙이 있다."}]},{"id":"vocab-1929","word":"pencil","ipa":"/ˈpensl/","kr":"**펜**슬","mark":"*","pos":"명","mean":"연필","ex":[{"en":"I drew the picture with a **pencil**.","ko":"나는 연필로 그림을 그렸다."}]},{"id":"vocab-1930","word":"people","ipa":"/ˈpiːpl/","kr":"**피ː**플","mark":"*","pos":"명","mean":"사람들","ex":[{"en":"Many **people** came to the show.","ko":"많은 사람들이 그 공연에 왔다."}]},{"id":"vocab-1931","word":"pepper","ipa":"/ˈpepər/","kr":"**페**퍼","mark":"**","pos":"명","mean":"① 후추 ② 고추","ex":[{"en":"Add a little **pepper** to the soup.","ko":"수프에 후추를 조금 넣어라."},{"en":"The recipe needs one red **pepper**.","ko":"그 조리법에는 빨간 고추 하나가 필요하다."}]},{"id":"vocab-1932","word":"per","ipa":"/pər/","kr":"**퍼**","mark":"**","pos":"전","mean":"① ~마다 ② ~당","ex":[{"en":"Each person may take one file **per** day.","ko":"각 사람은 하루마다 파일 하나를 가져갈 수 있다."},{"en":"It costs ten dollars **per** person.","ko":"그것은 한 사람당 10달러다."}]},{"id":"vocab-1933","word":"perceive (perception)","ipa":"/pərˈsiːv/","kr":"퍼**시ː**브","mark":"","pos":"동","mean":"① 인지하다 ② 감지하다","ex":[{"en":"We **perceive** colors with our eyes.","ko":"우리는 눈으로 색을 인지한다."},{"en":"The sensor can **perceive** movement.","ko":"그 센서는 움직임을 감지할 수 있다."}]},{"id":"vocab-1934","word":"perfect","ipa":"/ˈpɜːrfɪkt/","kr":"**퍼ː**픽트","mark":"**","pos":"형","mean":"완벽한","ex":[{"en":"The weather was **perfect** for a picnic.","ko":"날씨는 소풍에 완벽했다."}]},{"id":"vocab-1935","word":"perform","ipa":"/pərˈfɔːrm/","kr":"퍼**폼ː**","mark":"**","pos":"동","mean":"① 공연하다 ② 수행하다","ex":[{"en":"The band **performed** on stage.","ko":"그 밴드는 무대에서 공연했다."},{"en":"The new system can **perform** the task automatically.","ko":"새 시스템은 그 업무를 자동으로 수행할 수 있다."}]},{"id":"vocab-1936","word":"perhaps","ipa":"/pərˈhæps/","kr":"퍼**햅스**","mark":"**","pos":"부","mean":"① 아마 ② 어쩌면","ex":[{"en":"**Perhaps** we should leave now.","ko":"아마 우리는 지금 떠나야 할 것이다."},{"en":"**Perhaps** the server will restart soon.","ko":"어쩌면 서버가 곧 재시작할 것이다."}]},{"id":"vocab-1937","word":"period","ipa":"/ˈpɪriəd/","kr":"**피**리어드","mark":"**","pos":"명","mean":"① 기간 ② 시기","ex":[{"en":"The trial **period** lasts three months.","ko":"시험 기간은 3개월 동안 계속된다."},{"en":"We studied a long **period** of history.","ko":"우리는 긴 역사의 시기를 공부했다."}]},{"id":"vocab-1938","word":"permanent","ipa":"/ˈpɜːrmənənt/","kr":"**퍼ː**머넌트","mark":"","pos":"형","mean":"영구적인","ex":[{"en":"This is a **permanent** solution.","ko":"이것은 영구적인 해결책이다."}]},{"id":"vocab-1939","word":"permit","ipa":"/pərˈmɪt/","kr":"퍼**밋**","mark":"","pos":"동/명","mean":"① 허가하다 ② 허가증","ex":[{"en":"Smoking is not **permitted** here.","ko":"여기서는 흡연이 허가되지 않는다."},{"en":"You need a parking **permit** to enter.","ko":"들어가려면 주차 허가증이 필요하다."}]},{"id":"vocab-1940","word":"persist","ipa":"/pərˈsɪst/","kr":"퍼**시스트**","mark":"","pos":"동","mean":"① 고집하다 ② 지속되다","ex":[{"en":"He **persisted** in asking for a clear answer.","ko":"그는 명확한 답을 요구하며 고집했다."},{"en":"The network problem **persisted** all morning.","ko":"네트워크 문제는 아침 내내 지속되었다."}]},{"id":"vocab-1941","word":"person (personality)","ipa":"/ˈpɜːrsn/","kr":"**퍼ː**슨","mark":"**","pos":"명","mean":"① 사람 ② 개인","ex":[{"en":"Nora is a kind **person**.","ko":"노라는 친절한 사람이다."},{"en":"Each **person** has a separate account.","ko":"각 개인은 별도의 계정을 가진다."}]},{"id":"vocab-1942","word":"perspective","ipa":"/pərˈspektɪv/","kr":"퍼**스펙**티브","mark":"","pos":"명","mean":"① 관점 ② 시각","ex":[{"en":"Try to see the issue from her **perspective**.","ko":"그녀의 관점에서 그 문제를 보려고 해라."},{"en":"From a customer **perspective**, the form is too long.","ko":"고객의 시각에서 그 양식은 너무 길다."}]},{"id":"vocab-1943","word":"persuade","ipa":"/pərˈsweɪd/","kr":"퍼**스웨이드**","mark":"","pos":"동","mean":"설득하다", y.","ko":"소라는 매일 피아노를 연습한다."}]},{"id":"vocab-1953","word":"pick","ipa":"/pɪk/","kr":"**픽**","mark":"*","pos":"동","mean":"① 고르다 ② 따다","ex":[{"en":"Please **pick** the safest option.","ko":"가장 안전한 선택지를 골라 주세요."},{"en":"We **picked** apples from the tree.","ko":"우리는 나무에서 사과를 땄다."}]},{"id":"vocab-1954","word":"picnic","ipa":"/ˈpɪknɪk/","kr":"**픽**닉","mark":"**","pos":"명","mean":"소풍","ex":[{"en":"We had a **picnic** by the river.","ko":"우리는 강가에서 소풍을 했다."}]},{"id":"vocab-1955","word":"picture","ipa":"/ˈpɪktʃər/","kr":"**픽**처","mark":"*","pos":"명","mean":"① 그림 ② 사진","ex":[{"en":"Sophia drew a **picture** of a cat.","ko":"소피아는 고양이 그림을 그렸다."},{"en":"Please attach a **picture** of the error.","ko":"그 오류의 사진을 첨부해 주세요."}]},{"id":"vocab-1956","word":"pie","ipa":"/paɪ/","kr":"**파이**","mark":"**","pos":"명","mean":"파이","ex":[{"en":"Alex baked an apple **pie**.","ko":"알렉스는 사과 파이를 구웠다."}]},{"id":"vocab-1957","word":"piece","ipa":"/piːs/","kr":"**피ː**스","mark":"**","pos":"명","mean":"① 조각 ② 하나","ex":[{"en":"May I have a **piece** of cake?","ko":"케이크 한 조각을 먹어도 될까요?"},{"en":"I need one **piece** of equipment.","ko":"나는 장비 하나가 필요하다."}]},{"id":"vocab-1958","word":"pig","ipa":"/pɪɡ/","kr":"**픽**","mark":"*","pos":"명","mean":"돼지","ex":[{"en":"The **pig** rolled in the mud.","ko":"돼지가 진흙에서 뒹굴었다."}]},{"id":"vocab-1959","word":"pile","ipa":"/paɪl/","kr":"**파일**","mark":"**","pos":"명/동","mean":"① 더미 ② 쌓다","ex":[{"en":"A **pile** of books lay on the desk.","ko":"책 더미가 책상 위에 놓여 있었다."},{"en":"**Pile** the boxes near the wall.","ko":"상자들을 벽 근처에 쌓아라."}]},{"id":"vocab-1960","word":"pill","ipa":"/pɪl/","kr":"**필**","mark":"","pos":"명","mean":"알약","ex":[{"en":"Take one **pill** after dinner.","ko":"저녁 식사 후 알약 하나를 복용해라."}]},{"id":"vocab-1961","word":"pilot","ipa":"/ˈpaɪlət/","kr":"**파이**럿","mark":"*","pos":"명","mean":"조종사","ex":[{"en":"The **pilot** landed the plane safely.","ko":"조종사는 비행기를 안전하게 착륙시켰다."}]},{"id":"vocab-1962","word":"pin","ipa":"/pɪn/","kr":"**핀**","mark":"**","pos":"명/동","mean":"① 핀 ② 고정 :"명","mean":"시인","ex":[{"en":"The **poet** wrote about nature.","ko":"그 시인은 자연에 관해 썼다."}]},{"id":"vocab-1988","word":"point","ipa":"/pɔɪnt/","kr":"**포인트**","mark":"*","pos":"명/동","mean":"① 요점 ② 점 ③ 가리키다","ex":[{"en":"The main **point** is easy to understand.","ko":"주된 요점은 이해하기 쉽다."},{"en":"Mark each **point** on the graph.","ko":"그래프의 각 점을 표시해라."},{"en":"The arrow **points** to the exit.","ko":"화살표는 출구를 가리킨다."}]},{"id":"vocab-1989","word":"poison","ipa":"/ˈpɔɪzn/","kr":"**포이**즌","mark":"**","pos":"명/동","mean":"① 독 ② 독을 넣다","ex":[{"en":"Keep this **poison** away from children.","ko":"이 독극물을 아이들에게서 멀리 두어라."},{"en":"Some plants contain **poison**.","ko":"어떤 식물은 독을 지니고 있다."}]},{"id":"vocab-1990","word":"pole (polar)","ipa":"/poʊl/","kr":"**폴**","mark":"**","pos":"명","mean":"① 막대기 ② 극","ex":[{"en":"Minho lifted the box with a metal **pole**.","ko":"민호는 금속 막대기로 상자를 들었다."},{"en":"The North **Pole** is covered with ice.","ko":"북극은 얼음으로 덮여 있다."}]},{"id":"vocab-1991","word":"police","ipa":"/pəˈliːs/","kr":"펄**리ː**스","mark":"*","pos":"명","mean":"경찰","ex":[{"en":"The **police** arrived quickly.","ko":"경찰이 빨리 도착했다."}]},{"id":"vocab-1992","word":"policy","ipa":"/ˈpɑːləsi/","kr":"**팔**러시","mark":"**","pos":"명","mean":"① 정책 ② 방침","ex":[{"en":"The organization changed its remote-work **policy**.","ko":"그 조직은 원격 근무 정책을 바꿨다."},{"en":"The school revised its uniform **policy**.","ko":"그 학교는 교복 방침을 개정했다."}]},{"id":"vocab-1993","word":"polish","ipa":"/ˈpɑːlɪʃ/","kr":"**팔**리시","mark":"","pos":"동/명","mean":"① 광을 내다 ② 광택제","ex":[{"en":"He **polished** his shoes.","ko":"그는 신발에 광을 냈다."},{"en":"Use this **polish** to shine the table.","ko":"탁자를 빛내려면 이 광택제를 사용해라."}]},{"id":"vocab-1994","word":"polite","ipa":"/pəˈlaɪt/","kr":"펄**라잇**","mark":"**","pos":"형","mean":"① 예의 바른 ② 공손한","ex":[{"en":"It is **polite** to say thank you.","ko":"감사하다고 말하는 것은 예의 바르다."},{"en":"Please use **polite** language with customers.","ko":"고객에게 공손한 말을 사용해 주세요."}]},{"id":"vocab-1995","word":"politics","ipa":"/ˈpɑːlətɪks/"
