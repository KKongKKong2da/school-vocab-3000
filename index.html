","ipa":"/ˈtempəreri/","kr":"**템**퍼레리","mark":"","pos":"형","mean":"① 일시적인 ② 임시의","ex":[{"en":"This is only a **temporary** solution.","ko":"이것은 일시적인 해결책일 뿐이다."},{"en":"The **temporary** office is on the second floor.","ko":"임시 사무실은 2층에 있다."}]},{"id":"vocab-2666","word":"tempt","ipa":"/tempt/","kr":"**템프트**","mark":"","pos":"동","mean":"유혹하다","ex":[{"en":"The cake **tempted** me.","ko":"그 케이크가 나를 유혹했다."}]},{"id":"vocab-2667","word":"ten","ipa":"/ten/","kr":"**텐**","mark":"*","pos":"명/형","mean":"① 열 ② 10","ex":[{"en":"There are **ten** students in the room.","ko":"방에 학생이 열 명 있다."},{"en":"A short meeting starts at **ten**.","ko":"짧은 회의는 10시에 시작한다."}]},{"id":"vocab-2668","word":"tenant","ipa":"/ˈtenənt/","kr":"**테**넌트","mark":"","pos":"명","mean":"세입자","ex":[{"en":"The **tenant** pays rent monthly.","ko":"그 세입자는 매달 집세를 낸다."}]},{"id":"vocab-2669","word":"tend","ipa":"/tend/","kr":"**텐드**","mark":"**","pos":"동","mean":"~하는 경향이 있다","ex":[{"en":"Children **tend** to learn quickly.","ko":"아이들은 빨리 배우는 경향이 있다."}]},{"id":"vocab-2670","word":"tender","ipa":"/ˈtendər/","kr":"**텐**더","mark":"","pos":"형","mean":"① 부드러운 ② 다정한","ex":[{"en":"The meat is **tender** and easy to cut.","ko":"그 고기는 부드럽고 자르기 쉽다."},{"en":"Nora gave the child a **tender** smile.","ko":"노라는 아이에게 다정한 미소를 지었다."}]},{"id":"vocab-2671","word":"tennis","ipa":"/ˈtenɪs/","kr":"**테**니스","mark":"*","pos":"명","mean":"테니스","ex":[{"en":"We play **tennis** on Saturdays.","ko":"우리는 토요일마다 테니스를 친다."}]},{"id":"vocab-2672","word":"tense","ipa":"/tens/","kr":"**텐스**","mark":"**","pos":"형","mean":"① 긴장한 ② 팽팽한","ex":[{"en":"The room became **tense** after the argument.","ko":"말다툼 후 방 안의 분위기가 긴장되었다."},{"en":"The rope was **tense** between the posts.","ko":"밧줄은 기둥들 사이에서 팽팽했다."}]},{"id":"vocab-2673","word":"tent","ipa":"/tent/","kr":"**텐트**","mark":"*","pos":"명","mean":"텐트","ex":[{"en":"We slept in a **tent**.","ko":"우리는 텐트에서 잤다."}]},{"id":"vocab-2674","word":"term","ipa":"/tɜːrm/","kr":"**텀ː**","mark":"**","pos":"명","mean":"① 용어 ② 기간 ③ 학기","ex":[{"en":"What does this **term** mean?","ko":"이 용어는 무슨 뜻이니?"},{"en":"The contract has a two-year **term**.","ko":"그 계약의 기간은 2년이다."},{"en":"The new **term** begins in March.","ko":"새 학기는 3월에 시작한다."}]},{"id":"vocab-2675","word":"terminal","ipa":"/ˈtɜːrmɪnl/","kr":"**터ː**미늘","mark":"","pos":"명","mean":"① 터미널 ② 종점","ex":[{"en":"Meet me at the bus **terminal**.","ko":"버스 터미널에서 나를 만나자."},{"en":"This station is the **terminal** for the line.","ko":"이 역은 그 노선의 종점이다."}]},{"id":"vocab-2676","word":"terminate","ipa":"/ˈtɜːrmɪneɪt/","kr":"**터ː**미네이트","mark":"","pos":"동","mean":"① 끝내다 ② 종료하다","ex":[{"en":"Our company **terminated** the contract.","ko":"우리 회사는 계약을 끝냈다."},{"en":"The service will **terminate** automatically at midnight.","ko":"그 서비스는 자정에 자동으로 종료될 것이다."}]},{"id":"vocab-2677","word":"terrace","ipa":"/ˈterəs/","kr":"**테**러스","mark":"","pos":"명","mean":"① 테라스 ② 계단식 논밭","ex":[{"en":"We ate breakfast on the **terrace**.","ko":"우리는 테라스에서 아침을 먹었다."},{"en":"Farmers grow rice on the **terraces**.","ko":"농부들은 계단식 논밭에서 벼를 기른다."}]},{"id":"vocab-2678","word":"terrible","ipa":"/ˈterəbl/","kr":"**테**러블","mark":"**","pos":"형","mean":"① 끔찍한 ② 심한","ex":[{"en":"The weather was **terrible**.","ko":"날씨가 끔찍했다."},{"en":"Lucas had a **terrible** headache.","ko":"루카스는 심한 두통이 있었다."}]},{"id":"vocab-2679","word":"terrific","ipa":"/təˈrɪfɪk/","kr":"터**리**픽","mark":"","pos":"형","mean":"① 멋진 ② 대단한","ex":[{"en":"You gave a **terrific** presentation.","ko":"너는 멋진 발표를 했다."},{"en":"The live show was **terrific** from start to finish.","ko":"그 라이브 공연은 처음부터 끝까지 대단했다."}]},{"id":"vocab-2680","word":"territory","ipa":"/ˈterətɔːri/","kr":"**테**러토리","mark":"","pos":"명","mean":"① 영토 ② 영역","ex":[{"en":"They defended their **territory**.","ko":"그들은 자신들의 영토를 지켰다."},{"en":"Wolves mark their **territory** with scent.","ko":"늑대는 냄새로 자신의 영역을 표시한다."}]},{"id":"vocab-2681","word":"terror (terrorist)","ipa":"/ˈterər/","kr":"**테**러","mark":"","pos":"명","mean":"① 공포 ② 테러","ex":[{"en":"The people lived in **terror**.","ko":"그 사람들은 공포 속에 살았다."},{"en":"The city increased security after the **terror** attack.","ko":"그 도시는 테러 공격 후 보안을 강화했다."}]},{"id":"vocab-2682","word":"test","ipa":"/test/","kr":"**테스트**","mark":"*","pos":"명/동","mean":"① 시험 ② 시험하다","ex":[{"en":"I passed the math **test**.","ko":"나는 수학 시험에 합격했다."},{"en":"We need to **test** the backup system.","ko":"우리는 백업 시스템을 시험해야 한다."}]},{"id":"vocab-2683","word":"text","ipa":"/tekst/","kr":"**텍스트**","mark":"**","pos":"명","mean":"① 본문 ② 문자","ex":[{"en":"The **text** explains how the system works.","ko":"본문은 시스템이 작동하는 방식을 설명한다."},{"en":"The screen displays **text** and images.","ko":"그 화면은 문자와 이미지를 표시한다."}]},{"id":"vocab-2684","word":"textbook","ipa":"/ˈtekstbʊk/","kr":"**텍스트**북","mark":"*","pos":"명","mean":"교과서","ex":[{"en":"Open your **textbook** to page ten.","ko":"교과서 10쪽을 펴라."}]},{"id":"vocab-2685","word":"than","ipa":"/ðæn/","kr":"**댄**","mark":"*","pos":"접/전","mean":"~보다","ex":[{"en":"Nora is taller **than** me.","ko":"노라는 나보다 키가 크다."}]},{"id":"vocab-2686","word":"thank","ipa":"/θæŋk/","kr":"**쌩크**","mark":"*","pos":"동","mean":"감사하다","ex":[{"en":"I **thanked** her for the gift.","ko":"나는 선물에 대해 그녀에게 감사했다."}]},{"id":"vocab-2687","word":"that","ipa":"/ðæt/","kr":"**댓**","mark":"*","pos":"대/형","mean":"① 저것 ② 저 ③ 그","ex":[{"en":"**That** is my bag.","ko":"저것은 내 가방이다."},{"en":"**That** book is mine.","ko":"저 책은 내 것이다."},{"en":"**That** file is confidential.","ko":"그 파일은 기밀이다."}]},{"id":"vocab-2688","word":"the","ipa":"/ðə/","kr":"**더**","mark":"*","pos":"관","mean":"그","ex":[{"en":"I left the keys on **the** desk.","ko":"나는 그 열쇠를 책상 위에 두었다."}]},{"id":"vocab-2689","word":"theater / theatre","ipa":"/ˈθiːətər/","kr":"**씨ː**어터","mark":"**","pos":"명","mean":"극장","ex":[{"en":"We watched a play at the **theater**.","ko":"우리는 극장에서 연극을 봤다."}]},{"id":"vocab-2690","word":"theme","ipa":"/θiːm/","kr":"**씸ː**","mark":"","pos":"명","mean":"① 주제 ② 테마","ex":[{"en":"The main **theme** is friendship.","ko":"주된 주제는 우정이다."},{"en":"Security is the main **theme** of the workshop.","ko":"보안이 그 워크숍의 주요 테마다."}]},{"id":"vocab-2691","word":"then","ipa":"/ðen/","kr":"**덴**","mark":"**","pos":"부","mean":"① 그때 ② 그다음에","ex":[{"en":"I worked in sales **then**.","ko":"나는 그때 영업 부서에서 일했다."},{"en":"Finish your homework, **then** go outside.","ko":"숙제를 끝내고 그다음 밖에 나가라."}]},{"id":"vocab-2692","word":"theory","ipa":"/ˈθiːəri/","kr":"**씨ː**어리","mark":"**","pos":"명","mean":"이론","ex":[{"en":"The experiment supports the **theory**.","ko":"그 실험은 그 이론을 뒷받침한다."}]},{"id":"vocab-2693","word":"therapy","ipa":"/ˈθerəpi/","kr":"**쎄**러피","mark":"","pos":"명","mean":"① 치료 ② 요법","ex":[{"en":"Physical **therapy** helped her walk again.","ko":"물리 치료는 그녀가 다시 걷는 데 도움이 되었다."},{"en":"The doctor recommended physical **therapy**.","ko":"의사는 물리 요법을 권했다."}]},{"id":"vocab-2694","word":"there","ipa":"/ðer/","kr":"**데어**","mark":"*","pos":"부","mean":"① 거기에 ② 그곳에","ex":[{"en":"Leave the package **there**.","ko":"소포를 거기에 두어라."},{"en":"The files are **there**.","ko":"파일들은 그곳에 있다."}]},{"id":"vocab-2695","word":"therefore","ipa":"/ˈðerfɔːr/","kr":"**데어**포","mark":"**","pos":"부","mean":"① 그러므로 ② 따라서","ex":[{"en":"The server is down; **therefore**, we cannot log in.","ko":"서버가 다운되었다. 그러므로 우리는 로그인할 수 없다."},{"en":"It rained; **therefore**, we stayed in.","ko":"비가 왔고, 따라서 우리는 안에 머물렀다."}]},{"id":"vocab-2696","word":"they","ipa":"/ðeɪ/","kr":"**데이**","mark":"*","pos":"대","mean":"그들","ex":[{"en":"**They** live near the school.","ko":"그들은 학교 근처에 산다."}]},{"id":"vocab-2697","word":"thick","ipa":"/θɪk/","kr":"**씩**","mark":"**","pos":"형","mean":"① 두꺼운 ② 짙은","ex":[{"en":"This cable has a **thick** cover.","ko":"이 케이블에는 두꺼운 덮개가 있다."},{"en":"**Thick** fog delayed the flight.","ko":"짙은 안개가 항공편을 지연시켰다."}]},{"id":"vocab-2698","word":"thief","ipa":"/θiːf/","kr":"**씨ː**프","mark":"**","pos":"명","mean":"도둑","ex":[{"en":"The **thief** stole a bicycle.","ko":"그 도둑은 자전거를 훔쳤다."}]},{"id":"vocab-2699","word":"thin","ipa":"/θɪn/","kr":"**씬**","mark":"**","pos":"형","mean":"① 얇은 ② 마른","ex":[{"en":"The ice is too **thin** to walk on.","ko":"그 얼음은 걸어 다니기에 너무 얇다."},{"en":"Jun looks **thin** after the illness.","ko":"준은 병을 앓은 뒤 말라 보인다."}]},{"id":"vocab-2700","word":"thing","ipa":"/θɪŋ/","kr":"**씽**","mark":"*","pos":"명","mean":"① 것 ② 물건","ex":[{"en":"The important **thing** is to stay calm.","ko":"중요한 것은 침착함을 유지하는 것이다."},{"en":"What is that **thing** on the floor?","ko":"바닥에 있는 저 물건은 무엇이니?"}]},{"id":"vocab-2701","word":"think","ipa":"/θɪŋk/","kr":"**씽크**","mark":"*","pos":"동","mean":"생각하다","ex":[{"en":"I **think** this answer is correct.","ko":"나는 이 답이 맞다고 생각한다."}]},{"id":"vocab-2702","word":"third","ipa":"/θɜːrd/","kr":"**써ː**드","mark":"*","pos":"형/명","mean":"① 세 번째의 ② 3분의 1","ex":[{"en":"This is my **third** try.","ko":"이것은 나의 세 번째 시도다."},{"en":"One **third** of the staff work remotely.","ko":"직원의 3분의 1은 원격으로 일한다."}]},{"id":"vocab-2703","word":"thirst","ipa":"/θɜːrst/","kr":"**써ː**스트","mark":"*","pos":"명","mean":"갈증","ex":[{"en":"Cold water satisfied my **thirst**.","ko":"찬물이 내 갈증을 해소했다."}]},{"id":"vocab-2704","word":"thirteen","ipa":"/ˌθɜːrˈtiːn/","kr":"써**틴ː**","mark":"*","pos":"명/형","mean":"① 열셋 ② 13","ex":[{"en":"Exactly **thirteen** people joined the call.","ko":"정확히 열세 명이 통화에 참여했다."},{"en":"Room **thirteen** is on the second floor.","ko":"13번 방은 2층에 있다."}]},{"id":"vocab-2705","word":"thirty","ipa":"/ˈθɜːrti/","kr":"**써ː**티","mark":"*","pos":"명/형","mean":"① 서른 ② 30","ex":[{"en":"There are **thirty** students.","ko":"서른 명의 학생이 있다."},{"en":"Today's meeting lasts **thirty** minutes.","ko":"오늘 회의는 30분 동안 계속된다."}]},{"id":"vocab-2706","word":"this","ipa":"/ðɪs/","kr":"**디스**","mark":"*","pos":"대/형","mean":"① 이것 ② 이","ex":[{"en":"**This** is my house.","ko":"이것은 내 집이다."},{"en":"**This** document needs your signature.","ko":"이 문서에는 당신의 서명이 필요하다."}]},{"id":"vocab-2707","word":"thorough","ipa":"/ˈθɜːroʊ/","kr":"**써ː**로","mark":"","pos":"형","mean":"철저한","ex":[{"en":"The police conducted a **thorough** search.","ko":"경찰은 철저한 수색을 했다."}]},{"id":"vocab-2708","word":"though","ipa":"/ðoʊ/","kr":"**도**","mark":"**","pos":"접/부","mean":"비록 ~이지만","ex":[{"en":"**Though** the task was simple, it took time.","ko":"그 업무는 간단했지만 시간이 걸렸다."}]},{"id":"vocab-2709","word":"thousand","ipa":"/ˈθaʊznd/","kr":"**싸우**즌드","mark":"**","pos":"명/형","mean":"① 천 ② 1,000","ex":[{"en":"The town has five **thousand** people.","ko":"그 마을에는 5천 명이 산다."},{"en":"The device costs one **thousand** dollars.","ko":"그 기기는 1,000달러이다."}]},{"id":"vocab-2710","word":"thread","ipa":"/θred/","kr":"**쓰레드**","mark":"","pos":"명","mean":"실","ex":[{"en":"Emma put the **thread** through the needle.","ko":"엠마는 바늘에 실을 꿰었다."}]},{"id":"vocab-2711","word":"threat","ipa":"/θret/","kr":"**쓰렛**","mark":"**","pos":"명","mean":"위협","ex":[{"en":"Pollution is a **threat** to wildlife.","ko":"오염은 야생 동물에게 위협이다."}]},{"id":"vocab-2712","word":"three","ipa":"/θriː/","kr":"**쓰리ː**","mark":"*","pos":"명/형","mean":"① 셋 ② 3","ex":[{"en":"I have **three** brothers.","ko":"나는 남자 형제가 셋 있다."},{"en":"Please complete these **three** steps.","ko":"이 세 단계를 완료해 주세요."}]},{"id":"vocab-2713","word":"thrill","ipa":"/θrɪl/","kr":"**쓰릴**","mark":"","pos":"명/동","mean":"① 전율 ② 짜릿하게 하다","ex":[{"en":"The final result gave us a **thrill**.","ko":"최종 결과는 우리에게 전율을 주었다."},{"en":"The ride **thrilled** the children.","ko":"그 놀이 기구는 아이들을 짜릿하게 했다."}]},{"id":"vocab-2714","word":"throat","ipa":"/θroʊt/","kr":"**쓰로트**","mark":"**","pos":"명","mean":"① 목구멍 ② 목","ex":[{"en":"The doctor examined my **throat**.","ko":"의사는 내 목구멍을 검사했다."},{"en":"My **throat** hurts when I swallow.","ko":"삼킬 때 목이 아프다."}]},{"id":"vocab-2715","word":"through","ipa":"/θruː/","kr":"**쓰루ː**","mark":"**","pos":"전","mean":"① ~을 통과하여 ② ~내내","ex":[{"en":"We walked **through** the forest.","ko":"우리는 숲을 통과해 걸었다."},{"en":"The current system ran **through** the night.","ko":"현재 시스템은 밤 내내 작동했다."}]},{"id":"vocab-2716","word":"throw","ipa":"/θroʊ/","kr":"**쓰로**","mark":"**","pos":"동","mean":"던지다","ex":[{"en":"**Throw** the ball to me.","ko":"공을 나에게 던져라."}]},{"id":"vocab-2717","word":"thumb","ipa":"/θʌm/","kr":"**썸**","mark":"","pos":"명","mean":"엄지손가락","ex":[{"en":"Jun cut his **thumb**.","ko":"준은 엄지손가락을 베었다."}]},{"id":"vocab-2718","word":"thus","ipa":"/ðʌs/","kr":"**더스**","mark":"**","pos":"부","mean":"① 따라서 ② 그러므로","ex":[{"en":"James was late; **thus**, he missed the bus.","ko":"제임스는 늦었고, 따라서 버스를 놓쳤다."},{"en":"The file was missing; **thus**, we could not continue.","ko":"파일이 없었다. 그러므로 우리는 계속할 수 없었다."}]},{"id":"vocab-2719","word":"tick","ipa":"/tɪk/","kr":"**틱**","mark":"","pos":"명/동","mean":"① 똑딱 소리 ② 체크 표시","ex":[{"en":"The clock **ticked** quietly.","ko":"시계가 조용히 똑딱거렸다."},{"en":"Put a **tick** beside each completed task.","ko":"완료된 각 업무 옆에 체크 표시를 해라."}]},{"id":"vocab-2720","word":"ticket","ipa":"/ˈtɪkɪt/","kr":"**티**킷","mark":"*","pos":"명","mean":"① 표 ② 입장권","ex":[{"en":"I bought a train **ticket**.","ko":"나는 기차표를 샀다."},{"en":"Show your **ticket** at the entrance.","ko":"입구에서 입장권을 보여라."}]},{"id":"vocab-2721","word":"tide (tidy)","ipa":"/taɪd/","kr":"**타이드**","mark":"**","pos":"명","mean":"① 조수 ② 흐름","ex":[{"en":"The **tide** changes twice a day.","ko":"조수는 하루에 두 번 바뀐다."},{"en":"The **tide** of public opinion changed quickly.","ko":"여론의 흐름이 빠르게 바뀌었다."}]},{"id":"vocab-2722","word":"tie","ipa":"/taɪ/","kr":"**타이**","mark":"**","pos":"동/명","mean":"① 묶다 ② 넥타이","ex":[{"en":"**Tie** your shoes tightly.","ko":"신발 끈을 단단히 묶어라."},{"en":"Ethan wore a blue **tie** to the interview.","ko":"이선은 면접에 파란 넥타이를 맸다."}]},{"id":"vocab-2723","word":"tiger","ipa":"/ˈtaɪɡər/","kr":"**타이**거","mark":"*","pos":"명","mean":"호랑이","ex":[{"en":"The **tiger** moved silently.","ko":"호랑이는 조용히 움직였다."}]},{"id":"vocab-2724","word":"tight","ipa":"/taɪt/","kr":"**타잇**","mark":"**","pos":"형","mean":"① 꽉 끼는 ② 단단한","ex":[{"en":"These shoes are too **tight**.","ko":"이 신발은 너무 꽉 낀다."},{"en":"Keep a **tight** grip on the handle.","ko":"손잡이를 단단하게 잡아라."}]},{"id":"vocab-2725","word":"till","ipa":"/tɪl/","kr":"**틸**","mark":"**","pos":"전/접","mean":"~까지","ex":[{"en":"Wait here **till** noon.","ko":"정오까지 여기서 기다려라."}]},{"id":"vocab-2726","word":"timber","ipa":"/ˈtɪmbər/","kr":"**팀**버","mark":"","pos":"명","mean":"목재","ex":[{"en":"The house is built of **timber**.","ko":"그 집은 목재로 지어졌다."}]},{"id":"vocab-2727","word":"time","ipa":"/taɪm/","kr":"**타임**","mark":"*","pos":"명","mean":"① 시간 ② 때","ex":[{"en":"We need more **time** to test the system.","ko":"우리는 시스템을 테스트할 시간이 더 필요하다."},{"en":"That was a difficult **time** for the team.","ko":"그때는 팀에게 어려운 때였다."}]},{"id":"vocab-2728","word":"tin","ipa":"/tɪn/","kr":"**틴**","mark":"**","pos":"명","mean":"① 주석 ② 통조림","ex":[{"en":"The can is made of **tin**.","ko":"그 깡통은 주석으로 만들어졌다."},{"en":"Claire opened a **tin** of beans.","ko":"클레어는 콩 통조림 하나를 열었다."}]},{"id":"vocab-2729","word":"tiny","ipa":"/ˈtaɪni/","kr":"**타이**니","mark":"**","pos":"형","mean":"아주 작은","ex":[{"en":"A **tiny** insect landed on my hand.","ko":"아주 작은 곤충이 내 손에 앉았다."}]},{"id":"vocab-2730","word":"tip","ipa":"/tɪp/","kr":"**팁**","mark":"**","pos":"명","mean":"① 끝 ② 조언 ③ 팁","ex":[{"en":"The **tip** of the pen is broken.","ko":"펜 끝이 부러졌다."},{"en":"Here is a useful study **tip**.","ko":"여기 유용한 공부 조언이 있다."},{"en":"I gave the waiter a **tip**.","ko":"나는 웨이터에게 팁을 주었다."}]},{"id":"vocab-2731","word":"tire (tired)","ipa":"/ˈtaɪər/","kr":"**타이**어","mark":"*","pos":"동/명","mean":"① 피곤하게 하다 ② 타이어","ex":[{"en":"The long walk **tired** me.","ko":"그 긴 산책이 나를 피곤하게 했다."},{"en":"The front **tire** needs air.","ko":"앞 타이어에는 공기가 필요하다."}]},{"id":"vocab-2732","word":"tissue","ipa":"/ˈtɪʃuː/","kr":"**티**슈","mark":"","pos":"명","mean":"① 화장지 ② 조직","ex":[{"en":"Pass me a **tissue**, please.","ko":"화장지 한 장을 건네주세요."},{"en":"The sample contains damaged **tissue**.","ko":"그 표본은 손상된 조직을 포함한다."}]},{"id":"vocab-2733","word":"title (entitle)","ipa":"/ˈtaɪtl/","kr":"**타이**틀","mark":"**","pos":"명","mean":"① 제목 ② 직함","ex":[{"en":"What is the **title** of the book?","ko":"그 책의 제목이 뭐니?"},{"en":"Her job **title** is operations manager.","ko":"그녀의 직함은 운영 관리자다."}]},{"id":"vocab-2734","word":"to","ipa":"/tuː/","kr":"**투ː**","mark":"*","pos":"전","mean":"① ~로 ② ~에게","ex":[{"en":"We walked **to** school.","ko":"우리는 학교로 걸어갔다."},{"en":"Please send the report **to** Mina.","ko":"보고서를 미나에게 보내 주세요."}]},{"id":"vocab-2735","word":"toast","ipa":"/toʊst/","kr":"**토스트**","mark":"**","pos":"명","mean":"① 토스트 ② 건배","ex":[{"en":"I had **toast** for breakfast.","ko":"나는 아침으로 토스트를 먹었다."},{"en":"They raised their glasses for a **toast**.","ko":"그들은 건배를 위해 잔을 들었다."}]},{"id":"vocab-2736","word":"today","ipa":"/təˈdeɪ/","kr":"터**데이**","mark":"*","pos":"부/명","mean":"오늘","ex":[{"en":"I am especially busy **today**.","ko":"나는 오늘 특히 바쁘다."}]},{"id":"vocab-2737","word":"toe","ipa":"/toʊ/","kr":"**토**","mark":"**","pos":"명","mean":"발가락","ex":[{"en":"I hurt my **toe**.","ko":"나는 발가락을 다쳤다."}]},{"id":"vocab-2738","word":"together","ipa":"/təˈɡeðər/","kr":"터**게**더","mark":"*","pos":"부","mean":"함께","ex":[{"en":"We studied **together**.","ko":"우리는 함께 공부했다."}]},{"id":"vocab-2739","word":"toilet","ipa":"/ˈtɔɪlət/","kr":"**토이**럿","mark":"**","pos":"명","mean":"① 변기 ② 화장실","ex":[{"en":"The **toilet** is broken.","ko":"그 변기는 고장 났다."},{"en":"The **toilet** is next to the stairs.","ko":"화장실은 계단 옆에 있다."}]},{"id":"vocab-2740","word":"tomato","ipa":"/təˈmeɪtoʊ/","kr":"터**메이**토","mark":"*","pos":"명","mean":"토마토","ex":[{"en":"Sophia sliced a **tomato** for the salad.","ko":"소피아는 샐러드에 넣을 토마토를 썰었다."}]},{"id":"vocab-2741","word":"tomorrow","ipa":"/təˈmɑːroʊ/","kr":"터**마**로","mark":"*","pos":"부/명","mean":"내일","ex":[{"en":"We will leave **tomorrow**.","ko":"우리는 내일 떠날 것이다."}]},{"id":"vocab-2742","word":"tone","ipa":"/toʊn/","kr":"**톤**","mark":"**","pos":"명","mean":"① 어조 ② 음색","ex":[{"en":"His **tone** was calm and friendly.","ko":"그의 어조는 차분하고 친절했다."},{"en":"His voice has a warm **tone**.","ko":"그의 목소리는 따뜻한 음색을 지녔다."}]},{"id":"vocab-2743","word":"tongue","ipa":"/tʌŋ/","kr":"**텅**","mark":"**","pos":"명","mean":"① 혀 ② 언어","ex":[{"en":"The soup burned my **tongue**.","ko":"수프가 내 혀를 데었다."},{"en":"English is not her mother **tongue**.","ko":"영어는 그녀의 모국어가 아니다."}]},{"id":"vocab-2744","word":"tonight","ipa":"/təˈnaɪt/","kr":"터**나잇**","mark":"*","pos":"부/명","mean":"오늘 밤","ex":[{"en":"We are having dinner together **tonight**.","ko":"우리는 오늘 밤 함께 저녁을 먹는다."}]},{"id":"vocab-2745","word":"too","ipa":"/tuː/","kr":"**투ː**","mark":"*","pos":"부","mean":"① 너무 ② ~도 또한","ex":[{"en":"This bag is **too** heavy.","ko":"이 가방은 너무 무겁다."},{"en":"I work in IT **too**.","ko":"나도 또한 IT에서 일한다."}]},{"id":"vocab-2746","word":"tool","ipa":"/tuːl/","kr":"**툴ː**","mark":"**","pos":"명","mean":"① 도구 ② 연장","ex":[{"en":"Use the right **tool** for the job.","ko":"그 일에 맞는 도구를 사용해라."},{"en":"This **tool** can cut metal.","ko":"이 연장은 금속을 자를 수 있다."}]},{"id":"vocab-2747","word":"tooth","ipa":"/tuːθ/","kr":"**투ː**쓰","mark":"*","pos":"명","mean":"① 이 ② 치아","ex":[{"en":"One **tooth** hurts when I chew.","ko":"씹을 때 이 하나가 아프다."},{"en":"The dentist checked each **tooth**.","ko":"치과 의사는 각각의 치아를 확인했다."}]},{"id":"vocab-2748","word":"top","ipa":"/tɑːp/","kr":"**탑**","mark":"*","pos":"명/형","mean":"① 꼭대기 ② 맨 위의","ex":[{"en":"After an hour of climbing, we reached the **top** of the hill.","ko":"한 시간 동안 오른 뒤 우리는 언덕 꼭대기에 도달했다."},{"en":"The **top** row contains the headers.","ko":"맨 위의 행에는 머리글이 들어 있다."}]},{"id":"vocab-2749","word":"topic","ipa":"/ˈtɑːpɪk/","kr":"**타**픽","mark":"**","pos":"명","mean":"① 주제 ② 화제","ex":[{"en":"Today's **topic** is climate change.","ko":"오늘의 주제는 기후 변화다."},{"en":"Let's change the **topic**.","ko":"화제를 바꾸자."}]},{"id":"vocab-2750","word":"torture","ipa":"/ˈtɔːrtʃər/","kr":"**토ː**처","mark":"","pos":"명/동","mean":"① 고문 ② 고문하다","ex":[{"en":"The prisoner faced **torture**.","ko":"그 죄수는 고문을 당했다."},{"en":"The guards **tortured** the prisoner for information.","ko":"경비원들은 정보를 얻으려고 그 죄수를 고문했다."}]},{"id":"vocab-2751","word":"toss","ipa":"/tɔːs/","kr":"**토ː**스","mark":"","pos":"동","mean":"① 던지다 ② 뒤척이다","ex":[{"en":"**Toss** the keys to me.","ko":"열쇠를 나에게 던져라."},{"en":"He **tossed** in bed all night.","ko":"그는 밤새 침 as is **toxic** to humans.","ko":"그 가스는 인간에게 유독하다."},{"en":"The gas is highly **toxic**.","ko":"그 가스는 독성이 강하다."}]},{"id":"vocab-2761","word":"toy","ipa":"/tɔɪ/","kr":"**토이**","mark":"*","pos":"명","mean":"장난감","ex":[{"en":"One child shared a **toy** with his brother.","ko":"한 아이가 자기 형제와 장난감을 함께 썼다."}]},{"id":"vocab-2762","word":"trace","ipa":"/treɪs/","kr":"**트레이스**","mark":"**","pos":"명/동","mean":"① 흔적 ② 추적하다","ex":[{"en":"There was no **trace** of the thief.","ko":"그 도둑의 흔적은 없었다."},{"en":"Police **traced** the call.","ko":"경찰은 그 전화를 추적했다."}]},{"id":"vocab-2763","word":"track","ipa":"/træk/","kr":"**트랙**","mark":"*","pos":"명","mean":"① 길 ② 트랙 ③ 자취","ex":[{"en":"We followed the forest **track**.","ko":"우리는 숲길을 따라갔다."},{"en":"They ran around the **track**.","ko":"그들은 트랙을 돌며 달렸다."},{"en":"The animal left **tracks** in the snow.","ko":"그 동물은 눈에 자취를 남겼다."}]},{"id":"vocab-2764","word":"trade","ipa":"/treɪd/","kr":"**트레이드**","mark":"**","pos":"명/동","mean":"① 무역 ② 거래하다","ex":[{"en":"**Trade** between the two countries is growing.","ko":"두 나라 사이의 무역이 증가하고 있다."},{"en":"The two countries **trade** goods.","ko":"그 두 나라는 상품을 거래한다."}]},{"id":"vocab-2765","word":"tradition","ipa":"/trəˈdɪʃn/","kr":"트러**디**션","mark":"**","pos":"명","mean":"전통","ex":[{"en":"The festival is an old **tradition**.","ko":"그 축제는 오래된 전통이다."}]},{"id":"vocab-2766","word":"traffic","ipa":"/ˈtræfɪk/","kr":"**트래**픽","mark":"**","pos":"명","mean":"① 교통 ② 차량","ex":[{"en":"**Traffic** was heavy this morning.","ko":"오늘 아침 교통량이 많았다."},{"en":"Only local **traffic** may enter this road.","ko":"지역 차량만 이 도로에 들어갈 수 있다."}]},{"id":"vocab-2767","word":"tragic","ipa":"/ˈtrædʒɪk/","kr":"**트래**직","mark":"","pos":"형","mean":"비극적인","ex":[{"en":"The accident had a **tragic** ending.","ko":"그 사고는 비극적인 결말을 맞았다."}]},{"id":"vocab-2768","word":"trail","ipa":"/treɪl/","kr":"**트레일**","mark":"","pos":"명","mean":"① 오솔길 ② 자취","ex":[{"en":"We followed a **trail** through the woods.","ko":"우리는 숲속 오솔길을 따라갔다."},{"en":"The thief left a **trail** {"en":"That team made **tremendous** progress.","ko":"그 팀은 엄청난 발전을 이루었다."},{"en":"Finishing on time was a **tremendous** achievement.","ko":"제시간에 끝낸 것은 굉장한 성취였다."}]},{"id":"vocab-2785","word":"trend","ipa":"/trend/","kr":"**트렌드**","mark":"","pos":"명","mean":"① 경향 ② 추세","ex":[{"en":"The data show a clear upward **trend**.","ko":"데이터는 분명한 상승 경향을 보여 준다."},{"en":"An upward **trend** appears clearly on the graph.","ko":"상승 추세가 그래프에 분명하게 나타난다."}]},{"id":"vocab-2786","word":"triangle","ipa":"/ˈtraɪæŋɡl/","kr":"**트라이**앵글","mark":"**","pos":"명","mean":"삼각형","ex":[{"en":"Draw a **triangle** on the paper.","ko":"종이에 삼각형을 그려라."}]},{"id":"vocab-2787","word":"tribe","ipa":"/traɪb/","kr":"**트라입**","mark":"","pos":"명","mean":"부족","ex":[{"en":"The **tribe** lived near the river.","ko":"그 부족은 강 근처에 살았다."}]},{"id":"vocab-2788","word":"trick","ipa":"/trɪk/","kr":"**트릭**","mark":"**","pos":"명/동","mean":"① 속임수 ② 속이다","ex":[{"en":"Minho played a **trick** on me.","ko":"민호는 나에게 속임수를 썼다."},{"en":"The fake email tried to **trick** users.","ko":"가짜 이메일은 사용자들을 속이려고 했다."}]},{"id":"vocab-2789","word":"trigger","ipa":"/ˈtrɪɡər/","kr":"**트리**거","mark":"","pos":"명/동","mean":"① 방아쇠 ② 유발하다","ex":[{"en":"Keep your finger off the **trigger**.","ko":"방아쇠에서 손가락을 떼어라."},{"en":"The news **triggered** panic.","ko":"그 소식이 공황을 유발했다."}]},{"id":"vocab-2790","word":"trim","ipa":"/trɪm/","kr":"**트림**","mark":"","pos":"동","mean":"① 다듬다 ② 손질하다","ex":[{"en":"**Trim** the branches in spring.","ko":"봄에 나뭇가지를 다듬어라."},{"en":"She **trimmed** the plants by the window.","ko":"그녀는 창가의 식물들을 손질했다."}]},{"id":"vocab-2791","word":"trip","ipa":"/trɪp/","kr":"**트립**","mark":"*","pos":"명","mean":"여행","ex":[{"en":"We took a **trip** to Jeju.","ko":"우리는 제주로 여행을 갔다."}]},{"id":"vocab-2792","word":"triumph","ipa":"/ˈtraɪʌmf/","kr":"**트라이**엄프","mark":"","pos":"명","mean":"① 승리 ② 대성공","ex":[{"en":"The victory was a great **triumph**.","ko":"그 승리는 대단한 성공이었다."},{"en":"The launch was a **triumph** for the team.","ko":"그 출시는 팀의 대성공이었다."}]},{"id":"vocab-2793","word":"troop","ipa":"/truːp/","kr":"**트룹ː**","mark":"","pos":"명","mean":"① 군대 ② 병력","ex":[{"en":"The **troops** marched forward.","ko":"그 군대는 앞으로 행진했다."},{"en":"A **troop** of soldiers guarded the border.","ko":"군인 한 부대가 국경을 지켰다."}]},{"id":"vocab-2794","word":"trouble","ipa":"/ˈtrʌbl/","kr":"**트러**블","mark":"**","pos":"명/동","mean":"① 문제 ② 곤란 ③ 괴롭히다","ex":[{"en":"The network **trouble** affected several offices.","ko":"네트워크 문제가 여러 사무실에 영향을 미쳤다."},{"en":"We had **trouble** opening the file.","ko":"우리는 파일을 여는 데 곤란을 겪었다."},{"en":"The noise **troubled** the night staff.","ko":"소음은 야간 직원을 괴롭혔다."}]},{"id":"vocab-2795","word":"truck","ipa":"/trʌk/","kr":"**트럭**","mark":"*","pos":"명","mean":"트럭","ex":[{"en":"The **truck** carried heavy boxes.","ko":"트럭은 무거운 상자들을 실어 날랐다."}]},{"id":"vocab-2796","word":"true","ipa":"/truː/","kr":"**트루ː**","mark":"*","pos":"형","mean":"① 진실한 ② 사실인","ex":[{"en":"Leo is a **true** friend.","ko":"레오는 진실한 친구다."},{"en":"The statement in the report is **true**.","ko":"그 보고서의 진술은 사실이다."}]},{"id":"vocab-2797","word":"trunk","ipa":"/trʌŋk/","kr":"**트렁크**","mark":"**","pos":"명","mean":"① 나무줄기 ② 코 ③ 트렁크","ex":[{"en":"The **trunk** of the tree is very wide.","ko":"그 나무의 나무줄기는 매우 넓다."},{"en":"The elephant lifted its **trunk**.","ko":"그 코끼리는 코를 들어 올렸다."},{"en":"Put the bags in the **trunk**.","ko":"가방을 자동차 트렁크에 넣어라."}]},{"id":"vocab-2798","word":"trust","ipa":"/trʌst/","kr":"**트러스트**","mark":"**","pos":"명/동","mean":"① 신뢰 ② 믿다","ex":[{"en":"**Trust** is essential in a team.","ko":"신뢰는 팀에서 필수적이다."},{"en":"I **trust** your judgment.","ko":"나는 네 판단을 믿는다."}]},{"id":"vocab-2799","word":"truth","ipa":"/truːθ/","kr":"**트루ː**쓰","mark":"**","pos":"명","mean":"진실","ex":[{"en":"Please tell me the **truth** about the error.","ko":"그 오류에 관한 진실을 말해 주세요."}]},{"id":"vocab-2800","word":"try (trial)","ipa":"/traɪ/","kr":"**트라이**","mark":"*","pos":"동/명","mean":"① 시도하다 ② 노력","ex":[{"en":"**Try** to restart the device.","ko":"기기를 다시 시작하려고 시도해라."},{"en":"**Try** your best.","ko":"최선을 다해 노력해라."}]},{"id":"vocab-2801","word":"tube","ipa":"/tuːb/","kr":"**튜ː**브","mark":"","pos":"명","mean":"① 관 ② 튜브","ex":[{"en":"The water flows through a plastic **tube**.","ko":"물이 플라스틱 관을 통해 흐른다."},{"en":"Toothpaste comes in a **tube**.","ko":"치약은 튜브에 담겨 나온다."}]},{"id":"vocab-2802","word":"tune","ipa":"/tuːn/","kr":"**튠ː**","mark":"**","pos":"명/동","mean":"① 곡 ② 조율하다","ex":[{"en":"I know the **tune** of this song.","ko":"나는 이 노래의 곡조를 안다."},{"en":"She **tuned** the guitar before the show.","ko":"그녀는 공연 전에 기타를 조율했다."}]},{"id":"vocab-2803","word":"tunnel","ipa":"/ˈtʌnl/","kr":"**터**늘","mark":"","pos":"명","mean":"터널","ex":[{"en":"The train passed through a long **tunnel**.","ko":"기차는 긴 터널을 통과했다."}]},{"id":"vocab-2804","word":"turn","ipa":"/tɜːrn/","kr":"**턴ː**","mark":"*","pos":"동/명","mean":"① 돌다 ② 돌리다 ③ 차례","ex":[{"en":"At the corner, **turn** left.","ko":"모퉁이에서 왼쪽으로 돌아라."},{"en":"**Turn** the handle slowly.","ko":"손잡이를 천천히 돌려라."},{"en":"It is your **turn** to present.","ko":"발표할 차례다."}]},{"id":"vocab-2805","word":"turnover","ipa":"/ˈtɜːrnoʊvər/","kr":"**턴ː**오버","mark":"","pos":"명","mean":"① 매출 ② 이직률","ex":[{"en":"The shop has a high **turnover**.","ko":"그 가게는 매출이 높다."},{"en":"High staff **turnover** has slowed recruitment.","ko":"높은 이직률이 채용을 늦추고 있다."}]},{"id":"vocab-2806","word":"twelve","ipa":"/twelv/","kr":"**트웰브**","mark":"*","pos":"명/형","mean":"① 열둘 ② 12","ex":[{"en":"**Twelve** people attended the workshop.","ko":"열두 명이 워크숍에 참석했다."},{"en":"The password must have **twelve** characters.","ko":"비밀번호는 12개의 문자를 가져야 한다."}]},{"id":"vocab-2807","word":"twenty","ipa":"/ˈtwenti/","kr":"**트웬**티","mark":"*","pos":"명/형","mean":"① 스물 ② 20","ex":[{"en":"**Twenty** employees joined the training.","ko":"직원 스무 명이 교육에 참여했다."},{"en":"Our room holds **twenty** people.","ko":"우리 방은 20명을 수용한다."}]},{"id":"vocab-2808","word":"twenty-first","ipa":"/ˌtwentiˈfɜːrst/","kr":"트웬티**퍼ː**스트","mark":"*","pos":"형","mean":"① 스물한 번째의 ② 21번째의","ex":[{"en":"This is our **twenty-first* ,"kr":"**어**글리","mark":"*","pos":"형","mean":"① 못생긴 ② 추한","ex":[{"en":"The old logo looks **ugly**.","ko":"오래된 로고는 못생겨 보인다."},{"en":"His **ugly** behavior shocked us.","ko":"그의 추한 행동이 우리를 놀라게 했다."}]},{"id":"vocab-2817","word":"ultimate","ipa":"/ˈʌltɪmət/","kr":"**얼**티밋","mark":"","pos":"형","mean":"① 궁극적인 ② 최후의","ex":[{"en":"Our **ultimate** goal is peace.","ko":"우리의 궁극적인 목표는 평화다."},{"en":"The director made the **ultimate** decision.","ko":"이사는 최후의 결정을 내렸다."}]},{"id":"vocab-2818","word":"umbrella","ipa":"/ʌmˈbrelə/","kr":"엄**브렐**러","mark":"*","pos":"명","mean":"우산","ex":[{"en":"Take an **umbrella** because it may rain.","ko":"비가 올 수 있으니 우산을 가져가라."}]},{"id":"vocab-2819","word":"uncle","ipa":"/ˈʌŋkl/","kr":"**엉**클","mark":"*","pos":"명","mean":"① 삼촌 ② 이모부 ③ 고모부","ex":[{"en":"My **uncle** has lived in Busan for ten years.","ko":"우리 삼촌은 부산에서 10년 동안 살았다."},{"en":"My aunt and **uncle** run a café in Busan.","ko":"우리 이모와 이모부는 부산에서 카페를 운영한다."},{"en":"My **uncle** is married to my father's sister.","ko":"나의 고모부는 아버지의 누이와 결혼했다."}]},{"id":"vocab-2820","word":"under","ipa":"/ˈʌndər/","kr":"**언**더","mark":"*","pos":"전","mean":"~아래에","ex":[{"en":"The cat is **under** the table.","ko":"고양이가 탁자 아래에 있다."}]},{"id":"vocab-2821","word":"undergo","ipa":"/ˌʌndərˈɡoʊ/","kr":"언더**고**","mark":"","pos":"동","mean":"① 겪다 ② 받다","ex":[{"en":"A growing company **underwent** major changes.","ko":"한 성장 중인 회사는 큰 변화를 겪었다."},{"en":"The bridge **underwent** major repairs.","ko":"그 다리는 대규모 수리를 받았다."}]},{"id":"vocab-2822","word":"underlie","ipa":"/ˌʌndərˈlaɪ/","kr":"언더**라이**","mark":"","pos":"동","mean":"① 기초가 되다 ② 밑에 있다","ex":[{"en":"Trust **underlies** a good friendship.","ko":"신뢰는 좋은 우정의 기초가 된다."},{"en":"A layer of rock **underlies** the soil.","ko":"암석층이 토양 밑에 있다."}]},{"id":"vocab-2823","word":"undermine","ipa":"/ˌʌndərˈmaɪn/","kr":"언더**마인**","mark":"","pos":"동","mean":"① 약화시키다 ② 훼손하다","ex":[{"en":"Lack of sleep can **undermine** your health.","ko":"수면 부족은 건강을 약화시킬 수 있다."},{"en":"The leak **undermined** customer trust.","ko":"그 유출은 고객 신뢰를 훼손했다."}]},{"id":"vocab-2824","word":"understand","ipa":"/ˌʌndərˈstænd/","kr":"언더**스탠드**","mark":"*","pos":"동","mean":"이해하다","ex":[{"en":"I **understand** the question.","ko":"나는 그 질문을 이해한다."}]},{"id":"vocab-2825","word":"undertake","ipa":"/ˌʌndərˈteɪk/","kr":"언더**테익**","mark":"","pos":"동","mean":"① 착수하다 ② 떠맡다","ex":[{"en":"They **undertook** a big project.","ko":"그들은 큰 프로젝트에 착수했다."},{"en":"She **undertook** the role of project lead.","ko":"그녀는 프로젝트 책임자 역할을 떠맡았다."}]},{"id":"vocab-2826","word":"uniform","ipa":"/ˈjuːnɪfɔːrm/","kr":"**유ː**니폼","mark":"**","pos":"명/형","mean":"① 제복 ② 균일한","ex":[{"en":"The security guard wore a blue **uniform**.","ko":"보안 요원은 파란 제복을 입었다."},{"en":"The boxes are **uniform** in size.","ko":"그 상자들은 크기가 균일하다."}]},{"id":"vocab-2827","word":"unify","ipa":"/ˈjuːnɪfaɪ/","kr":"**유ː**니파이","mark":"","pos":"동","mean":"① 통일하다 ② 통합하다","ex":[{"en":"The leader tried to **unify** the country.","ko":"그 지도자는 나라를 통일하려 했다."},{"en":"The new platform will **unify** our tools.","ko":"새 플랫폼은 우리의 도구들을 통합할 것이다."}]},{"id":"vocab-2828","word":"unique","ipa":"/juˈniːk/","kr":"유**니ː**크","mark":"","pos":"형","mean":"① 독특한 ② 유일한","ex":[{"en":"Each snowflake has a **unique** shape.","ko":"각 눈송이는 독특한 모양을 가지고 있다."},{"en":"Each employee has a **unique** ID.","ko":"각 직원은 유일한 ID를 가진다."}]},{"id":"vocab-2829","word":"unit","ipa":"/ˈjuːnɪt/","kr":"**유ː**닛","mark":"**","pos":"명","mean":"① 단위 ② 구성단위","ex":[{"en":"A meter is a **unit** of length.","ko":"미터는 길이의 단위다."},{"en":"A cell is the basic **unit** of life.","ko":"세포는 생명의 기본 구성단위다."}]},{"id":"vocab-2830","word":"unite (union)","ipa":"/juˈnaɪt/","kr":"유**나잇**","mark":"**","pos":"동","mean":"① 연합하다 ② 결합하다","ex":[{"en":"The teams **united** for the goal.","ko":"그 팀들은 목표를 위해 연합했다."},{"en":"The new platform **unites** several tools.","ko":"새 플랫폼은 여러 도구를 결합한다."}]},{"id":"vocab-2831","word":"universe","ipa":"/ˈjuːnɪvɜːrs/","kr":"**유ː**니버ː스","mark":"","pos":"명","mean":"우주","ex":[{"en":"The **universe** contains billions of galaxies.","ko":"우주에는 수십억 개의 은하가 있다."}]},{"id":"vocab-2832","word":"university","ipa":"/ˌjuːnɪˈvɜːrsəti/","kr":"유니**버ː**서티","mark":"**","pos":"명","mean":"대학교","ex":[{"en":"Sora studies science at **university**.","ko":"소라는 대학교에서 과학을 공부한다."}]},{"id":"vocab-2833","word":"unless","ipa":"/ənˈles/","kr":"언**레스**","mark":"**","pos":"접","mean":"~하지 않는 한","ex":[{"en":"I won't go **unless** you come.","ko":"네가 오지 않는 한 나는 가지 않겠다."}]},{"id":"vocab-2834","word":"until","ipa":"/ənˈtɪl/","kr":"언**틸**","mark":"**","pos":"전/접","mean":"~까지","ex":[{"en":"Wait here **until** I return.","ko":"내가 돌아올 때까지 여기서 기다려라."}]},{"id":"vocab-2835","word":"up","ipa":"/ʌp/","kr":"**업**","mark":"*","pos":"부/전","mean":"① 위로 ② 위에","ex":[{"en":"Move the box **up** a little.","ko":"상자를 조금 위로 옮겨라."},{"en":"The cat is **up** on the roof.","ko":"고양이는 지붕 위에 있다."}]},{"id":"vocab-2836","word":"update","ipa":"/ʌpˈdeɪt/","kr":"업**데잇**","mark":"","pos":"동/명","mean":"① 갱신하다 ② 최신 정보","ex":[{"en":"Please **update** the software.","ko":"소프트웨어를 갱신해 주세요."},{"en":"Please send me an **update** by noon.","ko":"정오까지 최신 정보를 보내 주세요."}]},{"id":"vocab-2837","word":"upon","ipa":"/əˈpɑːn/","kr":"어**판**","mark":"**","pos":"전","mean":"① ~위에 ② ~하자마자","ex":[{"en":"The book was lying **upon** the table.","ko":"그 책은 탁자 위에 놓여 있었다."},{"en":"**Upon** receiving the email, she replied.","ko":"이메일을 받자마자 그녀는 답장했다."}]},{"id":"vocab-2838","word":"upper","ipa":"/ˈʌpər/","kr":"**어**퍼","mark":"**","pos":"형","mean":"① 위쪽의 ② 상부의","ex":[{"en":"The books are on the **upper** shelf.","ko":"책들은 위쪽 선반에 있다."},{"en":"The **upper** section contains the settings.","ko":"상부 구역에는 설정이 들어 있다."}]},{"id":"vocab-2839","word":"upset","ipa":"/ʌpˈset/","kr":"업**셋**","mark":"**","pos":"형/동","mean":"① 속상한 ② 속상하게 하다","ex":[{"en":"Grace was **upset** about the result.","ko":"그레이스는 그 결과 때문에 속상했다."},{"en":"The news **upset** her.","ko":"그 소식은 그녀를 속상하게 했다."}]},{"id":"vocab-2840","word":"upward / upwards","ipa":"/ˈʌpwərd/","kr":"**업**워드","mark":"","pos":"부/형","mean":"① 위쪽으로 ② 위쪽의","ex":[{"en":"The balloon floated **upward**.","ko":"풍선이 위쪽으로 떠올랐다."},{"en":"The chart shows an **upward** trend.","ko":"그 차트는 상승 추세를 보여 준다."}]},{"id":"vocab-2841","word":"urban","ipa":"/ˈɜːrbən/","kr":"**어ː**번","mark":"","pos":"형","mean":"도시의","ex":[{"en":"The city needs more **urban** parks.","ko":"그 도시는 도시 공원이 더 필요하다."}]},{"id":"vocab-2842","word":"urge (urgent)","ipa":"/ɜːrdʒ/","kr":"**어ː**지","mark":"","pos":"동/명","mean":"① 촉구하다 ② 충동","ex":[{"en":"She **urged** me to hurry.","ko":"그녀는 나에게 서두르라고 촉구했다."},{"en":"I felt an **urge** to check my phone.","ko":"나는 휴대전화를 확인하고 싶은 충동을 느꼈다."}]},{"id":"vocab-2843","word":"use (usual)","ipa":"/juːz/","kr":"**유ː**즈","mark":"*","pos":"동/명","mean":"① 사용하다 ② 사용","ex":[{"en":"**Use** this tool to reset the password.","ko":"비밀번호를 재설정하려면 이 도구를 사용해라."},{"en":"The **use** of personal devices is limited.","ko":"개인 기기의 사용은 제한된다."}]},{"id":"vocab-2844","word":"utilize / utilise","ipa":"/ˈjuːtəlaɪz/","kr":"**유ː**털라이즈","mark":"","pos":"동","mean":"① 활용하다 ② 이용하다","ex":[{"en":"We should **utilize** our time well.","ko":"우리는 시간을 잘 활용해야 한다."},{"en":"We **utilize** cloud storage for backups.","ko":"우리는 백업에 클라우드 저장소를 이용한다."}]},{"id":"vocab-2845","word":"utter","ipa":"/ˈʌtər/","kr":"**어**터","mark":"","pos":"동/형","mean":"① 말하다 ② 완전한","ex":[{"en":"Daniel did not **utter** a word during the call.","ko":"다니엘은 통화 중에 한마디도 말하지 않았다."},{"en":"Our room was in **utter** silence.","ko":"우리 방은 완전한 침묵 속에 있었다."}]},{"id":"vocab-2846","word":"vacate (vacation)","ipa":"/ˈveɪkeɪt/","kr":"**베이**케잇","mark":"","pos":"동","mean":"① 비우다 ② 떠나다","ex":[{"en":"Please **vacate** the room by noon.","ko":"정오까지 방을 비워 주세요."},{"en":"All employees must **vacate** the office by six.","ko":"모든 직원은 여섯 시까지 사무실을 떠나야 한다."}]},{"id":"vocab-2847","word":"vaccine","ipa":"/vækˈsiːn/","kr":"백**신ː**","mark":"","pos":"명","mean":"백신","ex":[{"en":"The **vaccine** protects against the disease.","ko":"그 백신은 그 질병을 예방한다."}]},{"id":"vocab-2848","word":"vacuum","ipa":"/ˈvækjuəm/","kr":"**배**큐엄","mark":"","pos":"명/동","mean":"① 진공 ② 진공청소기로 청소하다","ex":[{"en":"The chamber creates a **vacuum**.","ko":"그 방은 진공을 만든다."},{"en":"She **vacuumed** the carpet.","ko":"그녀는 카펫을 진공청소기로 청소했다."}]},{"id":"vocab-2849","word":"vague","ipa":"/veɪɡ/","kr":"**베이그**","mark":"","pos":"형","mean":"① 모호한 ② 애매한","ex":[{"en":"His answer was **vague**.","ko":"그의 대답은 모호했다."},{"en":"The request was too **vague**.","ko":"그 요청은 너무 애매했다."}]},{"id":"vocab-2850","word":"valid","ipa":"/ˈvælɪd/","kr":"**밸**리드","mark":"","pos":"형","mean":"① 유효한 ② 타당한","ex":[{"en":"Your ticket is **valid** for one day.","ko":"네 표는 하루 동안 유효하다."},{"en":"Julia raised a **valid** concern.","ko":"줄리아는 타당한 우려를 제기했다."}]},{"id":"vocab-2851","word":"valley","ipa":"/ˈvæli/","kr":"**밸**리","mark":"**","pos":"명","mean":"① 계곡 ② 골짜기","ex":[{"en":"A river flows through the **valley**.","ko":"강이 계곡을 통과해 흐른다."},{"en":"A narrow road winds through the **valley**.","ko":"좁은 길이 계곡을 따라 구불구불 이어진다."}]},{"id":"vocab-2852","word":"value","ipa":"/ˈvæljuː/","kr":"**밸**류","mark":"**","pos":"명/동","mean":"① 가치 ② 소중히 여기다","ex":[{"en":"Trust has great **value** in a team.","ko":"신뢰는 팀에서 큰 가치를 지닌다."},{"en":"I **value** your honest advice.","ko":"나는 네 솔직한 조언을 소중히 여긴다."}]},{"id":"vocab-2853","word":"van","ipa":"/væn/","kr":"**밴**","mark":"**","pos":"명","mean":"① 승합차 ② 밴","ex":[{"en":"The boxes were loaded into a **van**.","ko":"상자들은 승합차에 실렸다."},{"en":"They loaded the **van** with boxes.","ko":"그들은 밴에 상자를 실었다."}]},{"id":"vocab-2854","word":"vanish","ipa":"/ˈvænɪʃ/","kr":"**배**니시","mark":"","pos":"동","mean":"사라지다","ex":[{"en":"The error **vanished** after the restart.","ko":"재시작 후 오류가 사라졌다."}]},{"id":"vocab-2855","word":"various","ipa":"/ˈveriəs/","kr":"**베**리어스","mark":"**","pos":"형","mean":"① 다양한 ② 여러 가지의","ex":[{"en":"The store sells **various** goods.","ko":"그 가게는 다양한 상품을 판다."},{"en":"The shop sells **various** kinds of tea.","ko":"그 가게는 여러 종류의 차를 판다."}]},{"id":"vocab-2856","word":"vary","ipa":"/ˈveri/","kr":"**베**리","mark":"**","pos":"동","mean":"① 다르다 ② 달라지다","ex":[{"en":"Prices **vary** from store to store.","ko":"가격은 가게마다 다르다."},{"en":"Working hours **vary** by team.","ko":"근무 시간은 팀마다 달라진다."}]},{"id":"vocab-2857","word":"vast","ipa":"/væst/","kr":"**배스트**","mark":"","pos":"형","mean":"① 광대한 ② 방대한","ex":[{"en":"The desert covers a **vast** area.","ko":"사막은 광대한 지역을 덮고 있다."},{"en":"The database contains a **vast** amount of information.","ko":"데이터베이스는 방대한 양의 정보를 담고 있다."}]},{"id":"vocab-2858","word":"vegetable","ipa":"/ˈvedʒtəbl/","kr":"**베**지터블","mark":"*","pos":"명","mean":"채소","ex":[{"en":"Eat more **vegetables**.","ko":"채소를 더 먹어라."}]},{"id":"vocab-2859","word":"vehicle","ipa":"/ˈviːɪkl/","kr":"**비ː**이클","mark":"**","pos":"명","mean":"① 차량 ② 탈것","ex":[{"en":"This road is closed to **vehicles**.","ko":"이 도로는 차량 통행이 금지되어 있다."},{"en":"A bicycle is a simple **vehicle**.","ko":"자전거는 단순한 탈것이다."}]},{"id":"vocab-2860","word":"venture","ipa":"/ˈventʃər/","kr":"**벤**처","mark":"","pos":"명/동","mean":"① 모험 ② 과감히 하다","ex":[{"en":"Starting the company was a risky **venture**.","ko":"회사를 시작하는 것은 위험한 모험이었다."},{"en":"They started a new business **venture**.","ko":"그들은 새 사업을 시작했다."}]},{"id":"vocab-2861","word":"verb (verbal)","ipa":"/vɜːrb/","kr":"**버ː**브","mark":"","pos":"명","mean":"동사","ex":[{"en":"'Run' is a **verb**.","ko":"'Run'은 동사다."}]},{"id":"vocab-2862","word":"verse","ipa":"/vɜːrs/","kr":"**버ː**스","mark":"","pos":"명","mean":"① 운문 ② 시 ③ 절","ex":[{"en":"The story is written in **verse**.","ko":"그 이야기는 운문으로 쓰였다."},{"en":"Julia read a short **verse** aloud.","ko":"줄리아는 짧은 시를 소리 내어 읽었다."},{"en":"Emma read a **verse** from the poem.","ko":"엠마는 그 시의 한 구절을 읽었다."}]},{"id":"vocab-2863","word":"version","ipa":"/ˈvɜːrʒn/","kr":"**버ː**전","mark":"**","pos":"명","mean":"① 판 ② 버전","ex":[{"en":"I read the English **version** of the book.","ko":"나는 그 책의 영어판을 읽었다."},{"en":"Please install the latest **version**.","ko":"최신 버전을 설치해 주세요."}]},{"id":"vocab-2864","word":"versus","ipa":"/ˈvɜːrsəs/","kr":"**버ː**서스","mark":"","pos":"전","mean":"~대 (對)","ex":[{"en":"The final is Korea **versus** Japan.","ko":"결승전은 한국 대 일본이다."}]},{"id":"vocab-2865","word":"vertical","ipa":"/ˈvɜːrtɪkl/","kr":"**버ː**티클","mark":"","pos":"형","mean":"수직의","ex":[{"en":"The chart uses a **vertical** line for each year.","ko":"그 차트는 각 연도에 수직선을 사용한다."}]},{"id":"vocab-2866","word":"very","ipa":"/ˈveri/","kr":"**베**리","mark":"*","pos":"부","mean":"① 매우 ② 아주","ex":[{"en":"The water is **very** cold.","ko":"물이 매우 차갑다."},{"en":"The issue is **very** urgent.","ko":"그 문제는 아주 긴급하다."}]},{"id":"vocab-2867","word":"vessel","ipa":"/ˈvesl/","kr":"**베**슬","mark":"","pos":"명","mean":"① 배 ② 그릇 ③ 혈관","ex":[{"en":"The **vessel** sailed across the sea.","ko":"그 배는 바다를 가로질러 항해했다."},{"en":"Pour the liquid into a clean **vessel**.","ko":"액체를 깨끗한 그릇에 부어라."},{"en":"Blood flows through this **vessel**.","ko":"피는 이 혈관을 통해 흐른다."}]},{"id":"vocab-2868","word":"veterinarian","ipa":"/ˌvetərɪˈneriən/","kr":"베터리**네**리언","mark":"","pos":"명","mean":"수의사","ex":[{"en":"The **veterinarian** treated the dog.","ko":"그 수의사가 개를 치료했다."}]},{"id":"vocab-2869","word":"via","ipa":"/ˈvaɪə/","kr":"**바이**어","mark":"","pos":"전","mean":"① ~을 통해 ② ~을 경유하여","ex":[{"en":"Please send the file **via** email.","ko":"이메일을 통해 파일을 보내 주세요."},{"en":"We flew to Paris **via** London.","ko":"우리는 런던을 경유하여 파리로 날아갔다."}]},{"id":"vocab-2870","word":"vice","ipa":"/vaɪs/","kr":"**바이스**","mark":"","pos":"명","mean":"① 악덕 ② 부도덕","ex":[{"en":"Greed is a common **vice**.","ko":"탐욕은 흔한 악덕이다."},{"en":"The novel shows the cost of **vice**.","ko":"그 소설은 부도덕의 대가를 보여 준다."}]},{"id":"vocab-2871","word":"victim","ipa":"/ˈvɪktɪm/","kr":"**빅**팀","mark":"**","pos":"명","mean":"① 희생자 ② 피해자","ex":[{"en":"The accident **victim** received help.","ko":"사고 희생자는 도움을 받았다."},{"en":"The **victim** received medical care.","ko":"피해자는 치료를 받았다."}]},{"id":"vocab-2872","word":"victory","ipa":"/ˈvɪktəri/","kr":"**빅**터리","mark":"","pos":"명","mean":"승리","ex":[{"en":"Players celebrated their **victory** after the final.","ko":"선수들은 결승  closed.","ko":"서쪽의 입구는 닫혀 있다."}]},{"id":"vocab-2933","word":"wet","ipa":"/wet/","kr":"**웻**","mark":"*","pos":"형","mean":"젖은","ex":[{"en":"My shoes are **wet**.","ko":"내 신발이 젖었다."}]},{"id":"vocab-2934","word":"whale","ipa":"/weɪl/","kr":"**웨일**","mark":"**","pos":"명","mean":"고래","ex":[{"en":"We saw a **whale** from the boat.","ko":"우리는 배에서 고래를 보았다."}]},{"id":"vocab-2935","word":"what","ipa":"/wʌt/","kr":"**왓**","mark":"*","pos":"대","mean":"무엇","ex":[{"en":"**What** do you want?","ko":"너는 무엇을 원하니?"}]},{"id":"vocab-2936","word":"wheat","ipa":"/wiːt/","kr":"**위ː**트","mark":"","pos":"명","mean":"밀","ex":[{"en":"Bread is made from **wheat**.","ko":"빵은 밀로 만들어진다."}]},{"id":"vocab-2937","word":"wheel","ipa":"/wiːl/","kr":"**윌ː**","mark":"**","pos":"명","mean":"바퀴","ex":[{"en":"The bicycle has two **wheels**.","ko":"자전거에는 바퀴가 두 개 있다."}]},{"id":"vocab-2938","word":"when","ipa":"/wen/","kr":"**웬**","mark":"*","pos":"부/접","mean":"① 언제 ② ~할 때","ex":[{"en":"**When** did you arrive?","ko":"너는 언제 도착했니?"},{"en":"Call me **when** the meeting ends.","ko":"회의가 끝날 때 나에게 전화해라."}]},{"id":"vocab-2939","word":"where","ipa":"/wer/","kr":"**웨어**","mark":"*","pos":"부","mean":"① 어디에 ② 어디로","ex":[{"en":"**Where** do you live?","ko":"너는 어디에 사니?"},{"en":"**Where** are you going?","ko":"너는 어디로 가고 있니?"}]},{"id":"vocab-2940","word":"whereas","ipa":"/werˈæz/","kr":"웨어**래즈**","mark":"","pos":"접","mean":"반면에","ex":[{"en":"Yuna likes tea, **whereas** I prefer coffee.","ko":"유나는 차를 좋아하는 반면 나는 커피를 더 좋아한다."}]},{"id":"vocab-2941","word":"whether","ipa":"/ˈweðər/","kr":"**웨**더","mark":"**","pos":"접","mean":"~인지 아닌지","ex":[{"en":"Please confirm **whether** the account is active.","ko":"계정이 활성 상태인지 아닌지 확인해 주세요."}]},{"id":"vocab-2942","word":"which","ipa":"/wɪtʃ/","kr":"**위치**","mark":"**","pos":"대","mean":"① 어느 것 ② 어느","ex":[{"en":"**Which** do you prefer?","ko":"너는 어느 것을 선호하니?"},{"en":"**Which** book do you want?","ko":"어느 책을 원하니?"}]},{"id":"vocab-2943","word":"while","ipa":"/waɪl/","kr":"**와일**","mark":"**","pos":"접","mean":"① ~하는 동안 ② 반면에","ex":[{"en":"Wait here **while** I get the car.","ko":"내가 차를 가져오는 동안 여기서 기다려라."},{"en":"The old system is slow, **while** the new one is fast.","ko":"이전 시스템은 느린 반면에 새 시스템은 빠르다."}]},{"id":"vocab-2944","word":"whip","ipa":"/wɪp/","kr":"**윕**","mark":"","pos":"명/동","mean":"① 채찍 ② 채찍질하다","ex":[{"en":"Leo cracked the **whip**.","ko":"레오는 채찍을 휘둘렀다."},{"en":"The rider **whipped** the horse.","ko":"기수는 말을 채찍질했다."}]},{"id":"vocab-2945","word":"whisper","ipa":"/ˈwɪspər/","kr":"**위**스퍼","mark":"**","pos":"동/명","mean":"① 속삭이다 ② 속삭임","ex":[{"en":"She **whispered** the answer to me.","ko":"그녀는 나에게 답을 속삭였다."},{"en":"I heard a **whisper** behind me.","ko":"나는 내 뒤에서 속삭임을 들었다."}]},{"id":"vocab-2946","word":"whistle","ipa":"/ˈwɪsl/","kr":"**위**슬","mark":"**","pos":"명/동","mean":"① 호루라기 ② 휘파람을 불다","ex":[{"en":"The referee blew the **whistle**.","ko":"심판이 호루라기를 불었다."},{"en":"He **whistled** a happy tune.","ko":"그는 즐거운 곡을 휘파람으로 불었다."}]},{"id":"vocab-2947","word":"white","ipa":"/waɪt/","kr":"**와잇**","mark":"*","pos":"형/명","mean":"① 하얀 ② 흰색","ex":[{"en":"Nora wore a **white** shirt.","ko":"노라는 하얀 셔츠를 입었다."},{"en":"**White** is used for the background.","ko":"흰색은 배경에 사용된다."}]},{"id":"vocab-2948","word":"who","ipa":"/huː/","kr":"**후ː**","mark":"*","pos":"대","mean":"누구","ex":[{"en":"**Who** is that man?","ko":"저 남자는 누구니?"}]},{"id":"vocab-2949","word":"whole","ipa":"/hoʊl/","kr":"**홀**","mark":"**","pos":"형/명","mean":"① 전체의 ② 전부","ex":[{"en":"I read the **whole** book.","ko":"나는 그 책 전체를 읽었다."},{"en":"We reviewed the **whole** report.","ko":"우리는 보고서 전부를 검토했다."}]},{"id":"vocab-2950","word":"why","ipa":"/waɪ/","kr":"**와이**","mark":"*","pos":"부","mean":"왜","ex":[{"en":"**Why** are you late?","ko":"너는 왜 늦었니?"}]},{"id":"vocab-2951","word":"wicked","ipa":"/ˈwɪkɪd/","kr":"**위**키드","mark":"","pos":"형","mean":"① 사악한 ② 못된","ex":[{"en":"The story has a **wicked** witch.","ko":"그 이야기에는 사악한 마녀가 나온다."},{"en":"The **wicked** manager blamed everyone else.","ko":"그 못된 관리자는 다른 모든 사 ."},{"en":"The farm had a high rice **yield**.","ko":"그 농장은 높은 쌀 수확량을 냈다."}]},{"id":"vocab-2995","word":"you","ipa":"/juː/","kr":"**유ː**","mark":"*","pos":"대","mean":"① 너 ② 당신","ex":[{"en":"**You** are my best friend.","ko":"너는 나의 가장 친한 친구다."},{"en":"**You** are responsible for this task.","ko":"당신은 이 업무를 담당한다."}]},{"id":"vocab-2996","word":"young","ipa":"/jʌŋ/","kr":"**영**","mark":"*","pos":"형","mean":"① 젊은 ② 어린","ex":[{"en":"Julia is still **young**.","ko":"줄리아는 아직 젊다."},{"en":"The **young** child held her mother's hand.","ko":"어린 아이는 어머니의 손을 잡았다."}]},{"id":"vocab-2997","word":"zebra","ipa":"/ˈziːbrə/","kr":"**지ː**브러","mark":"**","pos":"명","mean":"얼룩말","ex":[{"en":"A **zebra** has black and white stripes.","ko":"얼룩말은 검고 흰 줄무늬를 지녔다."}]},{"id":"vocab-2998","word":"zero","ipa":"/ˈzɪroʊ/","kr":"**지**로","mark":"**","pos":"명/형","mean":"① 영 ② 0","ex":[{"en":"The temperature fell below **zero**.","ko":"온도가 영하로 떨어졌다."},{"en":"Set the value to **zero**.","ko":"값을 0으로 설정해라."}]},{"id":"vocab-2999","word":"zone","ipa":"/zoʊn/","kr":"**존**","mark":"","pos":"명","mean":"① 구역 ② 지대","ex":[{"en":"This is a no-parking **zone**.","ko":"이곳은 주차 금지 구역이다."},{"en":"This area is a safety **zone**.","ko":"이 지역은 안전 지대다."}]},{"id":"vocab-3000","word":"zoo","ipa":"/zuː/","kr":"**주ː**","mark":"*","pos":"명","mean":"동물원","ex":[{"en":"We saw elephants at the **zoo**.","ko":"우리는 동물원에서 코끼리들을 보았다."}]}]`);

/* speakable form: 대표 표제어 하나만.
   1) 괄호 표기 제거: "a (an)" -> "a"
   2) 슬래시가 있으면 앞의 첫 표제어만: "advertize / advertise" -> "advertize" */
function speakWord(w){
  const base=String(w||"").replace(/\s*\(.*?\)\s*/g," ").split("/")[0].trim();
  return base || String(w||"").trim();
}

/* ---- TTS ---- */
const TTS = "speechSynthesis" in window;   // 음성 합성 지원 여부
let voices=[];
function loadVoices(){voices=speechSynthesis.getVoices().filter(v=>/^en/i.test(v.lang));}
if(TTS){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
let lastEl=null;
function speak(text,el){
  if(!TTS)return;
  speechSynthesis.cancel();
  if(lastEl)lastEl.classList.remove("speaking");
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";u.rate=state.slow?0.6:0.95;
  const pref=voices.find(v=>/en-US/i.test(v.lang))||voices[0];
  if(pref)u.voice=pref;
  if(el){
    el.classList.add("speaking");lastEl=el;
    u.onend=u.onerror=()=>{
      el.classList.remove("speaking");
      if(lastEl===el) lastEl=null;
    };
  }
  speechSynthesis.speak(u);
}

   B단계(localStorage)에서 이 객체를 그대로 저장/복원할 수 있도록 한곳에 모음. */

/* ---- 학습 상태 공유 코드 (B3K1) ----
   희소 기록은 간격 기반 가변 길이로, 기록이 많으면 2비트 고정 길이로 저장한다.
   둘 중 더 짧은 형식을 자동 선택하며 CRC32로 붙여넣기 오류를 검증한다. */
const SHARE_PREFIX = "B3K1";
const STATUS_TO_CODE = {unknown:1, unsure:2, known:3};
const CODE_TO_STATUS = {1:"unknown", 2:"unsure", 3:"known"};

function crc32(bytes){
  let crc=0xFFFFFFFF;
  for(let i=0;i<bytes.length;i++){
    crc^=bytes[i];
    for(let j=0;j<8;j++) crc=(crc>>>1)^((crc&1)?0xEDB88320:0);
  }
  return (crc^0xFFFFFFFF)>>>0;
}
function checksumFor(mode,bytes){
  const src=new Uint8Array(bytes.length+1);
  src[0]=mode.charCodeAt(0);
  src.set(bytes,1);
  return crc32(src).toString(16).toUpperCase().padStart(8,"0");
}
function bytesToBase64Url(bytes){
  if(!bytes.length) return "0"; // 빈 학습 기록용 짧은 표식
  let raw="";
  for(let i=0;i<bytes.length;i+=0x4000){
    raw+=String.fromCharCode(...bytes.subarray(i,i+0x4000));
  }
  return btoa(raw).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
}
function base64UrlToBytes(text){
  if(text==="0") return new Uint8Array(0);
  if(!/^[A-Za-z0-9_-]+$/.test(text)) throw new Error("문자");
  const b64=text.replace(/-/g,"+").replace(/_/g,"/")+"=".repeat((4-text.length%4)%4);
  const raw=atob(b64);
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}
function pushVarUint(out,value){
  value>>>=0;
  while(value>=0x80){out.push((value&0x7F)|0x80);value>>>=7;}
  out.push(value);
}
function encodeSparseStates(){
  const out=[];
  let prev=-1;
  for(let i=0;i<EMBED.length;i++){
    const rec=cardStates[EMBED[i].id];
    const st=rec ? STATUS_TO_CODE[rec.status] : 0;
    if(!st) continue;
    const gap=i-prev-1;
    pushVarUint(out,(gap<<2)|st);
    prev=i;
  }
  return new Uint8Array(out);
}
function encodeFixedStates(){
  const out=new Uint8Array(Math.ceil(EMBED.length/4));
  for(let i=0;i<EMBED.length;i++){
    const rec=cardStates[EMBED[i].id];
    const st=rec ? STATUS_TO_CODE[rec.status] : 0;
    out[i>>2]|=st<<((i&3)*2);
  }
  return out;
}
function makeShareCode(){
  const sparse=encodeSparseStates();
  const fixed=encodeFixedStates();
  const sparseText=bytesToBase64Url(sparse);
  const fixedText=bytesToBase64Url(fixed);
  const mode=sparseText.length<=fixedText.length ? "S" : "F";
  const bytes=mode==="S" ? sparse : fixed;
  const payload=mode==="S" ? sparseText : fixedText;
  return `${SHARE_PREFIX}${mode}:${payload}:${checksumFor(mode,bytes)}`;
}
function readVarUint(bytes,cursor){
  let value=0,shift=0;
  for(let n=0;n<5;n++){
    if(cursor.i>=bytes.length) throw new Error("잘린 코드");
    const b=bytes[cursor.i++];
    value|=(b&0x7F)<<shift;
    if(!(b&0x80)) return value>>>0;
    shift+=7;
  }
  throw new Error("잘못된 코드");
}
function decodeShareCode(text){
  const clean=String(text||"").trim().replace(/\s+/g,"");
  const m=clean.match(/^B3K1([SF]):([A-Za-z0-9_-]+):([0-9A-Fa-f]{8})$/);
  if(!m) throw new Error("형식");
  const mode=m[1];
  const bytes=base64UrlToBytes(m[2]);
  if(checksumFor(mode,bytes)!==m[3].toUpperCase()) throw new Error("검증");

  const next={};
  const now=Date.now();
  if(mode==="F"){
    const expected=Math.ceil(EMBED.length/4);
    if(bytes.length!==expected) throw new Error("길이");
    for(let i=0;i<EMBED.length;i++){
      const code=(bytes[i>>2]>>((i&3)*2))&3;
      if(code) next[EMBED[i].id]={status:CODE_TO_STATUS[code],updatedAt:now};
    }
  }else{
    const cursor={i:0};
    let prev=-1;
    while(cursor.i<bytes.length){
      const value=readVarUint(bytes,cursor);
      const code=value&3;
      const gap=value>>>2;
      if(!CODE_TO_STATUS[code]) throw new Error("상태");
      const index=prev+gap+1;
      if(index<=prev || index>=EMBED.length) throw new Error("범위");
      next[EMBED[index].id]={status:CODE_TO_STATUS[code],updatedAt:now};
      prev=index;
    }
  }
  return next;
}

let allCards=[];     // 내장 단어 전체 (필터 원본)
let cards=[];        // 현재 필터를 통과해 학습 중인 카드
let order=[];        // index order (for shuffle)
let pos=0;

// 표시 컬럼 값 → 등급 키로 정규화 (별표 외 문자는 안전하게 처리)
function gradeOf(mark){
  const m=(mark||"").trim();
  if(m==="**") return "**";
  if(m==="*")  return "*";
  return "";
}

// 상태 필터 키
const REVIEW_KEYS=["unknown","unsure","known"];
// 카드가 현재 학습 상태 필터를 통과하는가.
//  - 전체가 켜져 있으면: 학습 상태 지정 여부와 관계없이 표시
//  - 낯섦·익힘·익숙이 하나라도 켜져 있으면: 선택된 상태만 표시
//  - 모두 꺼져 있으면: 미평가 카드만 표시
function matchesReview(id){
  if(state.reviewAll) return true;
  const anyOn = state.reviewOn.unknown || state.reviewOn.unsure || state.reviewOn.known;
  const st = cardStates[id] ? cardStates[id].status : null; // null=미평가
  if(!anyOn) return st===null;
  if(st===null) return false;
  return !!state.reviewOn[st];
}

/* ---- 저장 ---- */
function buildStateForSave(){
  return {
    version: STORAGE_VERSION,
    datasetId: DATASET_ID,
    settings: {
      slow: state.slow,
      masked: state.masked,
      orderMode: state.orderMode,
      reviewAll: state.reviewAll,
      reviewOn: { unknown:state.reviewOn.unknown, unsure:state.reviewOn.unsure, known:state.reviewOn.known },
      gradeOn: { "*":state.gradeOn["*"], "**":state.gradeOn["**"], "":state.gradeOn[""] }
    },
    progress: {
      currentCardId: currentCardId,
      cardStates: cardStates
    }
  };
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(buildStateForSave()));
  }catch(e){ /* 저장 실패해도 앱 동작은 막지 않음 */ }
}

/* ---- 복원 (검증) ---- */
function loadState(){
  let raw=null;
  try{ raw=localStorage.getItem(STORAGE_KEY); }catch(e){ return; }
  if(!raw) return;
  let data;
  try{ data=JSON.parse(raw); }catch(e){ return; }   // 파싱 오류 → 기본값 유지
  if(!data || typeof data!=="object") return;
  // 버전/데이터셋 불일치 → 적용하지 않음
  if(data.version!==STORAGE_VERSION || data.datasetId!==DATASET_ID) return;

  // settings: 허용된 형식·값만 복원
  const s=data.settings;
  if(s && typeof s==="object"){
    if(typeof s.slow==="boolean") state.slow=s.slow;
    if(typeof s.masked==="boolean") state.masked=s.masked;
    if(s.orderMode==="sequential"||s.orderMode==="shuffle") state.orderMode=s.orderMode;
    if(typeof s.reviewAll==="boolean") state.reviewAll=s.reviewAll;
    if(s.reviewOn && typeof s.reviewOn==="object"){
      REVIEW_KEYS.forEach(k=>{ if(typeof s.reviewOn[k]==="boolean") state.reviewOn[k]=s.reviewOn[k]; });
    }
    // 전체와 개별 상태는 동시에 켜지지 않도록 정규화
    if(state.reviewAll) REVIEW_KEYS.forEach(k=>{ state.reviewOn[k]=false; });
    if(s.gradeOn && typeof s.gradeOn==="object"){
      ["*","**",""].forEach(g=>{ if(typeof s.gradeOn[g]==="boolean") state.gradeOn[g]=s.gradeOn[g]; });
    }
  }

  // progress
  const p=data.progress;
  if(p && typeof p==="object"){
    // cardStates: 존재하는 카드 + 허용 상태만
    const cs=p.cardStates;
    if(cs && typeof cs==="object"){
      Object.keys(cs).forEach(id=>{
        if(!validCardIds.has(id)) return;                 // 없는 카드 무시
        const rec=cs[id];
        if(!rec || typeof rec!=="object") return;
        if(!VALID_STATUS.includes(rec.status)) return;    // 허용 상태만
        const ts=Number.isFinite(rec.updatedAt) ? rec.updatedAt : Date.now();
        cardStates[id]={ status:rec.status, updatedAt:ts };
      });
    }
    // currentCardId: 존재하는 카드만
    if(typeof p.currentCardId==="string" && validCardIds.has(p.currentCardId)){
      currentCardId=p.currentCardId;
    }
  }
}

const stage=document.getElementById("stage");
const counter=document.getElementById("counter");
const bar=document.getElementById("bar");

function el(t,c,x){const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;}
// **볼드** 마크업을 <b>로 렌더 (그 외 텍스트는 이스케이프). 요소의 textContent 대신 사용.
function setRich(node,text){
  if(text==null){node.textContent="";return;}
  const esc=String(text).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  node.innerHTML=esc.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>");
}
// 볼드 마크업을 제거한 평문 (TTS·검색·비교용)
function stripBold(text){return String(text||"").replace(/\*\*/g,"");}
// 카드 ID 끝의 숫자를 원본 단어 번호로 사용 (vocab-1847 → 1847)
function getCardNumber(id){
  const match=String(id||"").match(/(\d+)$/);
  return match ? Number(match[1]) : null;
}
const POS_FULL={관:"관사",동:"동사",형:"형용사",명:"명사",부:"부사",전:"전치사","부/전":"부사·전치사",접:"접속사",대:"대명사",감:"감탄사"};

function renderCard(){
  stage.innerHTML="";
  if(!cards.length){
    stage.appendChild(el("div","empty","현재 필터 조건에 해당하는 단어가 없어요."));
    counter.textContent="0 / 0";bar.style.width="0";
    return;
  }
  const d=cards[order[pos]];
  const card=el("article","card"+(state.masked?" masked":""));

  // pos + stars
  const mark=el("div","pos-mark");
  if(d.pos){const p=el("span","pos",POS_FULL[d.pos]||d.pos);mark.appendChild(p);}
  if(d.mark){const s=el("span","stars",d.mark==="**"?"★★":"★");mark.appendChild(s);}
  card.appendChild(mark);

  // word — TTS 지원 시에만 버튼(발음 재생), 미지원 시 비대화형 div
  const wbtn = TTS ? el("button","word") : el("div","word");
  if(TTS){
    wbtn.type="button";
    wbtn.setAttribute("aria-label","표제어 발음 듣기");
    wbtn.appendChild(el("span","spk","▶"));
    wbtn.addEventListener("click",e=>{e.stopPropagation();speak(speakWord(d.word),wbtn);});
  }
  wbtn.appendChild(el("span",null,d.word));
  card.appendChild(wbtn);

  // phonetics
  const phon=el("div","phon");
  if(d.ipa)phon.appendChild(el("span","ipa",d.ipa));
  if(d.kr){const krEl=el("span","kr");setRich(krEl,d.kr);phon.appendChild(krEl);}
  if(phon.childNodes.length)card.appendChild(phon);

  // reveal zone (mean + examples)
  const rz=el("div","reveal-zone");
  if(d.mean){const meanEl=el("div","mean");setRich(meanEl,d.mean);rz.appendChild(meanEl);}
  if(d.ex.length){
    const exs=el("div","exs");
    const CIRCLED="①②③④⑤⑥⑦⑧⑨⑩";
    d.ex.forEach((x,i)=>{
      const row=el("div","ex");
      const plain=stripBold(x.en);
      if(TTS){
        const play=el("button","play","▶");
        play.type="button";
        play.setAttribute("aria-label",(i+1)+"번 예문 발음 듣기");
        play.addEventListener("click",e=>{e.stopPropagation();speak(plain,row);});
        row.appendChild(play);
      }
      // 화면용 번호 (TTS에는 포함하지 않음)
      row.appendChild(el("span","ex-no",CIRCLED[i]||String(i+1)+"."));
      const body=el("div","ex-body");
      const en=el("div","ex-en");setRich(en,x.en);
      if(TTS){
        en.classList.add("speakable");
        en.addEventListener("click",e=>{e.stopPropagation();speak(plain,row);});
      }
      body.appendChild(en);
      if(x.ko){const ko=el("div","ex-ko");setRich(ko,x.ko);body.appendChild(ko);}
      row.appendChild(body);
      exs.appendChild(row);
    });
    rz.appendChild(exs);
  }
  card.appendChild(rz);

  if(state.masked){
    card.addEventListener("click",ev=>{
      if(ev.target.closest(".word"))return; // 표제어 발음 버튼은 가림 해제와 분리
      card.classList.remove("masked");
    });
  }
  stage.appendChild(card);

  const hint=el("div","tap-hint","카드를 눌러 뜻·예문 보기");
  stage.appendChild(hint);

  // 낯섦·익힘·익숙 학습 상태 버튼 (이전/다음 위)
  const rate=el("div","rate");
  const cur=cardStates[d.id] ? cardStates[d.id].status : null;
  [["unknown","낯섦"],["unsure","익힘"],["known","익숙"]].forEach(([st,label])=>{
    const b=el("button",null,label);
    b.type="button";
    b.dataset.status=st;
    const on=(cur===st);
    b.classList.toggle("on",on);
    b.setAttribute("aria-pressed",String(on));
    b.addEventListener("click",()=>setStatus(st));
    rate.appendChild(b);
  });
  stage.appendChild(rate);

  const nav=el("div","nav");
  const prev=el("button","btn ghost prev","← 이전");
  prev.type="button";
  prev.addEventListener("click",go.bind(null,-1));
  const next=el("button","btn next","다음 →");
  next.type="button";
  next.addEventListener("click",go.bind(null,1));
  nav.appendChild(prev);nav.appendChild(next);
  stage.appendChild(nav);

  const kbd=el("div","hintbar","← → 이동 · 스페이스바 뜻 보기 · 1 낯섦 · 2 익힘 · 3 익숙");
  stage.appendChild(kbd);

  // 현재 카드 ID 저장 (이어보기)
  if(d.id && currentCardId!==d.id){ currentCardId=d.id; saveState(); }

  const cardNumber=getCardNumber(d.id);
  counter.textContent=(pos+1)+" / "+cards.length+(cardNumber!==null ? " · #"+cardNumber : "");
  bar.style.width=((pos+1)/cards.length*100)+"%";
}

function go(dir){
  if(!cards.length)return;
  if(TTS)speechSynthesis.cancel();
  pos=(pos+dir+cards.length)%cards.length;
  renderCard();
}

function start(list){
  allCards=list;
  applyFilter();
  updateFilterUI();
}

// 현재 켜진 등급으로 학습 목록을 다시 구성. orderMode는 그대로 유지.
// 난이도 필터 + 상태 필터를 교차 적용해 학습 목록을 재구성.
// keepId가 있으면 그 카드를, 없으면 현재 currentCardId를 유지 대상으로 삼고,
// 결과에 있으면 그 위치를, 없으면 첫 카드를 표시한다. orderMode는 유지.
function applyFilter(keepId){
  const target = keepId || currentCardId;
  cards=allCards.filter(d=>state.gradeOn[gradeOf(d.mark)] && matchesReview(d.id));
  order=cards.map((_,i)=>i);
  if(state.orderMode==="shuffle") shuffleArr(order);
  // 유지 대상 위치 찾기
  pos=0;
  if(target){
    const idx=cards.findIndex(d=>d.id===target);
    if(idx>=0){
      const p=order.indexOf(idx);
      if(p>=0) pos=p;
    }
  }
  renderCard();  // renderCard가 실제 표시 카드로 currentCardId를 맞추고 저장
}

function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

// 등급별 개수 세기 (버튼 라벨용)
function gradeCounts(){
  const n={ "**":0, "*":0, "":0 };
  allCards.forEach(d=>{ n[gradeOf(d.mark)]++; });
  return n;
}

/* ---- 학습 상태 기록 ---- */
// 현재 화면에 렌더된 카드 객체
function currentCard(){ return cards.length ? cards[order[pos]] : null; }

// 낯섦/익힘/익숙 설정: 같은 상태 재클릭=취소(삭제), 다른 상태=교체
function setStatus(status){
  const d=currentCard();
  if(!d || !d.id) return;
  if(!VALID_STATUS.includes(status)) return;
  const prev=cardStates[d.id] ? cardStates[d.id].status : null;
  if(prev===status){
    delete cardStates[d.id];             // 같은 상태 재클릭 → 취소(해제)
  }else{
    cardStates[d.id]={ status, updatedAt:Date.now() };  // 신규/교체
  }
  saveState();
  renderStatusBar();  // 상태 개수(체크박스 옆 (N)) 갱신 — 항상 전체 3,000 기준

  // 학습 상태 변경/해제 후 그 카드가 여전히 현재 (난이도+상태) 필터를 통과하면 목록 구성이 그대로다.
  // → 카드에 머물며 버튼 활성만 갱신(체크 표시 유지).
  const stillIn = state.gradeOn[gradeOf(d.mark)] && matchesReview(d.id);
  if(stillIn){
    updateRateUI();
    return;
  }
  // 필터를 벗어나면 목록에서 빼고 카운터를 즉시 갱신, 같은 위치의 다음 카드를 표시.
  const keepPos=pos;
  cards=allCards.filter(x=>state.gradeOn[gradeOf(x.mark)] && matchesReview(x.id));
  order=cards.map((_,i)=>i);
  if(state.orderMode==="shuffle") shuffleArr(order);
  pos = cards.length ? Math.min(keepPos, cards.length-1) : 0;
  renderCard();
}

// 현재 카드의 학습 상태 버튼 활성 상태만 갱신 (자동 이동 없음)
function updateRateUI(){
  const d=currentCard();
  const cur=(d && cardStates[d.id]) ? cardStates[d.id].status : null;
  stage.querySelectorAll(".rate button").forEach(b=>{
    const on=(b.dataset.status===cur);
    b.classList.toggle("on",on);
    b.setAttribute("aria-pressed",String(on));
  });
}

// 학습 상태 개수 — 전체 3,000개 기준. 상태 필터 체크박스 라벨의 (개수)를 갱신.
const resetBtn=document.getElementById("resetProgress");
const reviewCountEls={
  unknown:document.getElementById("c-unknown"),
  unsure:document.getElementById("c-unsure"),
  known:document.getElementById("c-known")
};
function renderStatusBar(){
  const hasRecords=Object.keys(cardStates).length>0;
  resetBtn.disabled=!hasRecords;
  let unknown=0,unsure=0,known=0;
  for(const id in cardStates){
    const st=cardStates[id].status;
    if(st==="unknown")unknown++;
    else if(st==="unsure")unsure++;
    else if(st==="known")known++;
  }
  reviewCountEls.unknown.textContent="("+unknown+")";
  reviewCountEls.unsure.textContent="("+unsure+")";
  reviewCountEls.known.textContent="("+known+")";
}

/* ---- 난이도 필터 ---- */
/* 필터 펼치기 토글 (난이도 + 학습 상태 필터를 접이식으로) */
const filterToggle=document.getElementById("filterToggle");
const filterPanel=document.getElementById("filterPanel");
const appWrap=document.querySelector(".wrap");
filterToggle.addEventListener("click",()=>{
  const open = filterPanel.hidden;   // 현재 숨김이면 이제 펼침
  filterPanel.hidden = !open;
  appWrap.classList.toggle("filters-open",open);
  filterToggle.setAttribute("aria-expanded",String(open));
  filterToggle.setAttribute("aria-label", open ? "필터 접기" : "필터 펼치기");
});

const gradeBtns={
  "*":document.getElementById("f-star1"),
  "**":document.getElementById("f-star2"),
  "":document.getElementById("f-star0")
};
const gradeCountEls={
  "*":document.getElementById("c-star1"),
  "**":document.getElementById("c-star2"),
  "":document.getElementById("c-star0")
};
function updateFilterUI(){
  // 데이터가 있을 때만 필터 펼치기(꺾쇠) 버튼 노출
  filterToggle.hidden = allCards.length===0;
  const n=gradeCounts();
  Object.keys(gradeBtns).forEach(g=>{
    const on=state.gradeOn[g];
    gradeBtns[g].classList.toggle("on",on);
    gradeBtns[g].setAttribute("aria-pressed",String(on));
    gradeCountEls[g].textContent = n[g]?("("+n[g]+")"):"(0)";
  });
  // 학습 상태 필터: 전체 또는 개별 상태 복수 선택. 모두 꺼짐은 미평가만.
  reviewAllBtn.classList.toggle("on",state.reviewAll);
  reviewAllBtn.setAttribute("aria-pressed",String(state.reviewAll));
  reviewBtns.forEach(b=>{
    const on=state.reviewOn[b.dataset.review];
    b.classList.toggle("on",on);
    b.setAttribute("aria-pressed",String(on));
  });
}

/* 학습 상태 필터 */
const reviewFilterBar=document.getElementById("reviewFilter");
const reviewAllBtn=document.getElementById("r-all");
const reviewBtns=[...reviewFilterBar.querySelectorAll(".chk-rev[data-review]")];
reviewAllBtn.addEventListener("click",()=>{
  state.reviewAll=!state.reviewAll;
  REVIEW_KEYS.forEach(k=>{ state.reviewOn[k]=false; });
